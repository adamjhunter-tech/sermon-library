n exchange persecution, seclusion, and suffering — because he had seen the risen Christ", "Jim Elliott: 'He is no fool who gives what he cannot keep to gain what he cannot lose'", "Galatians 1:15-17: after his conversion Paul went into Arabia — not to Jerusalem; he left behind everything immediately"], "scripture": ["Philippians 3:7", "Acts 9:15", "Galatians 1:15-17"]}, {"title": "2. 'I Count' — Present Tense: Ongoing Sanctification (v.8)", "subpoints": ["Verse 8: 'Indeed I count everything as loss because of the surpassing worth of knowing Christ Jesus my Lord' — present tense; not a one-time act but a continuing posture", "'Lord' in Philippians 2:11 = Jehovah/Yahweh — the eternal, unchangeable I AM, the shepherd of Psalm 23; the surpassing worth is knowing this one", "The more you get to know Christ, the more you love him — unlike most people, who become less likeable the more you know them; this is a process of sanctification (Philippians 4: contentment is learned)", "Eric Liddell: 'Many of us are missing something in life because we are after something less. Ever since I have been a young lad, I have had my eyes on a different prize'"], "scripture": ["Philippians 3:8", "Philippians 2:11", "Philippians 4"]}, {"title": "3. Four Applications: How to Value Christ", "subpoints": ["(1) Choose Christ over everything else daily — by default, apart from earnest effort, Christ will come second", "(2) Draw closer to Christ in everything — flowers at Pike Place Market: 'my God made these'; the mountains, the stars, people — attempt in everything to draw closer to Christ", "(3) Hold loosely to the things of the world — things diminish and grow stale; new car smell fades; be generous with what God has given; where your treasure is, there your heart will be", "(4) Do not let losses take your joy — speaker's father died six weeks prior at age 88; 'I have grieved from the depth of my spirit like I've never done before — but not without hope; we grieve with hope and in hope'"], "scripture": ["Matthew 13:44"]}], "summary": "A guest sermon by Pastor Jim Blizzard on Philippians 3:7-10. The text distinguishes between justification and sanctification through Paul's verb tenses: 'I counted' (aorist, past) in verse 7 points to Paul's conversion on the Damascus road — the decisive moment when he traded everything for Christ; 'I count' (present) in verse 8 points to ongoing sanctification — a continuous choice to value Christ above all things. Jim Elliott's quote ('He is no fool who gives what he cannot keep to gain what he cannot lose') and Eric Liddell's testimony ('I have had my eyes on a different prize') illustrate the posture. The word 'Lord' in Paul's phrase 'Christ Jesus my Lord' is Jehovah/Yahweh (Philippians 2:11) — the eternal shepherd of Psalm 23 — which gives 'the surpassing worth of knowing him' its full weight. Four applications: choose Christ daily; draw closer to Christ in everything; hold loosely to earthly things; do not let losses take your joy. Pastor Blizzard's father died six weeks before this sermon; he speaks from personal grief about grieving with hope.", "transcript": "## Introduction\n\nWe are glad to welcome Pastor Jim Blizzard to our pulpit this morning.\n\nBe in the book of Philippians chapter 3. Go back to verse 1. Paul says: *Finally, my brothers, rejoice in the Lord.*\n\nHe gives three exhortations in verses 1-3. First: rejoice in the Lord. Second: look out for the dogs, the evil doers, those who mutilate the flesh — warning. Third: *put no confidence in the flesh.* Without Christ we can do nothing. We tend to think that if we are educated or financially secure we have done this. Paul says: don't put any confidence in the flesh.\n\nAnd Paul shows us that if anybody had reason to put confidence in the flesh, he could have. He was the pinnacle of religious life, social life, power and authority. If anybody is going to take confidence in the flesh, here I am — and yet I don't.\n\nSome weeks ago I gave an illustration. I asked my grandson Jefferson to come to the front of the church with his father, Jeremy. Jefferson had just won a belt buckle — one of those big rodeo belt buckles. It was his most cherished possession. I said: *Jefferson, if you had to choose — the belt buckle, or your dad?* The dad was standing right there. I held my breath. He said: *My daddy.* I said: *Why would you choose your daddy over this prize you won?* He said: *Because he loves me and takes care of me.* That is why we choose Christ.\n\n## 1. 'I Counted' — Past Tense: Conversion (v.7)\n\nVerse 7: *But whatever gain I had, I counted as loss for the sake of Christ.*\n\nThe word *counted* is in the past tense. It happened when Paul met the Lord Jesus on the road to Damascus — Acts chapter 9. In Galatians 1:15-17, Paul tells us that after his conversion he did not go to Jerusalem to consult with the apostles. He went away into Arabia. He left behind the prestige, the influence, the applause. He exchanged applause and adulation for persecution, seclusion, and suffering — because he had seen the risen Christ.\n\nJim Elliott: *He is no fool who gives what he cannot keep to gain what he cannot lose.*\n\nIn verse 8 Paul says: *for whom I have suffered the loss of all things, and count them as rubbish, that I may gain Christ.* He had Christ. Christ was now his possession. The one I persecuted, the one I despised, the one I rejected — is now mine.\n\n## 2. 'I Count' — Present Tense: Ongoing Sanctification (v.8)\n\nVerse 8: *Indeed, I count everything as loss because of the surpassing worth of knowing Christ Jesus my Lord.*\n\nNotice the present tense. Look back at verse 7 — past tense. Here — present tense. I am still counting everything as loss. Why? *The surpassing worth of knowing Christ Jesus my Lord.*\n\nChrist. Jesus. Lord. We hear these names so often we can stop realizing their significance. The word *Lord* in Philippians 2:11 — *every tongue confess that Jesus Christ is Lord to the glory of God the Father* — that word is Jehovah, Yahweh. The name revealed to Moses at the burning bush. The eternal one. The unchangeable one. The great I AM. *The Lord is my shepherd; I shall not want. Surely goodness and mercy shall follow me all the days of my life.* The surpassing worth of knowing *that one.*\n\nEric Liddell — Olympic champion, missionary in China during the Second World War — said: *Many of us are missing something in life because we are after something less.* And then: *Ever since I have been a young lad, I have had my eyes on a different prize.* He also said: *Each one of us is in a greater race than any I have run in Paris, and this race ends when God gives out the medals.*\n\nYou know there are some people that the more you get to know them, the less you like them. But the more you get to know Christ and what he has done for you, the more you will value him, the more you will love him. That is a process — what we call sanctification. Philippians 4: *I have learned to be content.* We learn how to value the Lord Jesus Christ.\n\n## 3. Four Applications\n\n**First: choose Christ over everything else, daily.** We make choices about many things, and by default if we are honest, Christ will come second. We need to make an earnest effort to choose Christ every day.\n\n**Second: attempt in everything to draw closer to Christ.** I was at the market in Seattle yesterday — the beautiful flowers. My friend makes fun of me because I take pictures and send them to my wife. But I marvel at the variety and the beauty, and I think: my God made these. We can look at the mountains, the stars, one another, and see what God has done and draw closer to Christ. Make a conscious effort to serve him, exalt him, share him.\n\n**Third: hold loosely to the things of this world, showing they are not your treasure.** The new car smell fades. Things that are cherished grow old and stale. Hold loosely to them. Be generous with what God has given. *Where your heart is, there your treasure will be also.*\n\n**Fourth: do not let losses take your joy.** In small losses, do not grumble; in large losses, we will grieve — and we should. My father went home to be with the Lord six weeks ago, at almost 89 years old. I have grieved from the depth of my spirit like I have never done before. But it is not without hope. It is right and proper to grieve — but we grieve with hope and in hope. We have Christ.\n\n*Whatever gain I had, I counted as loss for the sake of Christ.* That is justification. *Indeed, I am counting everything as loss because of the surpassing worth of Christ.* That is sanctification. Why do we treasure Christ? Because he has loved us, because he is loving us, and because he will love us — and he takes care of us."};
