// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-a-song-from-affliction", "title": "A Song from Affliction", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["A Song from Affliction - Pastor Tito Lyro - Psalm 4.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/a-song-from-affliction-pastor-tito-lyro-psalm-4", "tags": [{"tag": "affliction", "source": "detected"}, {"tag": "prayer", "source": "detected"}, {"tag": "peace", "source": "detected"}, {"tag": "repentance", "source": "detected"}, {"tag": "joy", "source": "detected"}, {"tag": "trust in God", "source": "detected"}, {"tag": "worship", "source": "detected"}], "scripture_references": [{"reference": "Psalm 4", "type": "quoted", "source": "detected"}, {"reference": "Psalm 3", "type": "referenced", "source": "detected"}, {"reference": "Psalm 5", "type": "referenced", "source": "detected"}, {"reference": "Psalm 51", "type": "referenced", "source": "detected"}, {"reference": "Psalm 8", "type": "referenced", "source": "detected"}, {"reference": "Psalm 46:1-3", "type": "referenced", "source": "detected"}, {"reference": "Psalm 110", "type": "referenced", "source": "detected"}, {"reference": "Psalm 124:8", "type": "quoted", "source": "detected"}, {"reference": "1 Samuel 7", "type": "referenced", "source": "detected"}, {"reference": "1 Chronicles 6:14", "type": "referenced", "source": "detected"}, {"reference": "Ephesians 4:26", "type": "quoted", "source": "detected"}, {"reference": "Romans 3:25-26", "type": "quoted", "source": "detected"}, {"reference": "Hebrews 7:25", "type": "referenced", "source": "detected"}, {"reference": "Romans 8:34", "type": "referenced", "source": "detected"}, {"reference": "Isaiah 40:31", "type": "quoted", "source": "detected"}, {"reference": "Matthew 5:8", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Psalm and Its Occasion", "subpoints": ["Psalm 4 is historically called an evening Psalm; with Psalm 5 as morning Psalm, they were paired in Hebrew liturgy", "The title directs it to the chief musician with stringed instruments — this tells us that instruments are appropriate in worship", "The song ends with David going to bed in peace; no change in circumstances, only in his thinking and trust in God", "The Psalm was likely written during either the persecution under Saul or the flight from Absalom"], "scripture": ["Psalm 4"]}, {"title": "Prayer to God (verse 1)", "subpoints": ["David calls God the God of my righteousness — alien righteousness, not his own; God counts him righteous as he will count David's descendent Christ righteous on our behalf", "God has helped him in the past — David had Ebenezers, stones of help marking God's past faithfulness (1 Samuel 7)", "He prays in confidence because even as he is persecuted, God has relieved him in distress before", "Our help is in the name of the Lord who made heaven and earth (Psalm 124:8) — is it obvious to us that God is our ultimate help?"], "scripture": ["Psalm 4:1", "Psalm 124:8", "Romans 3:25-26"]}, {"title": "Call to Man (verses 2-5)", "subpoints": ["David calls his enemies — the sons of men, just common people, nothing special — to repentance: stop turning my glory to shame, stop loving worthlessness", "Verse 4 quoted in Ephesians 4:26: be angry and do not sin — rebellion against God is unreasonable, illogical, and foolish", "Taking time to meditate on the bed in silence is essential; agnosticism is not intellectual humility, it is admitting you are ignorant", "The sacrifice of righteousness in verse 5 is explained by the following line: trust in the Lord — offer yourself to Yahweh in truth, stop the hypocrisy"], "scripture": ["Psalm 4:2-5", "Ephesians 4:26"]}, {"title": "Contrast of the Peace of God and the Peace of Men (verses 6-8)", "subpoints": ["The many enemies use biblical language (the Aaronic benediction from Numbers 6) in their fake piety — but the only good they want is material good (grain and wine)", "David's joy comes from knowing the Lord: you have put gladness in my heart more than when grain and wine increased", "The result: I will both lie down in peace and sleep, for You alone, O Lord, make me dwell in safety", "David can act boldly and rest peacefully because his Lord is for him — those who wait on the Lord shall renew their strength (Isaiah 40:31)"], "scripture": ["Psalm 4:6-8", "Isaiah 40:31"]}], "summary": "Pastor Tito Lyro preaches from Psalm 4, which he introduces as historically paired with Psalm 5 in Hebrew morning and evening liturgy — Psalm 4 as the evening Psalm, ending with David lying down in peace and sleep. The occasion was likely the persecution under either Saul or Absalom, and the Psalmist Charles Spurgeon called it another choice flower from the garden of affliction, noting that much of Scripture would not exist were it not for the afflictions of the saints.\n\nThe sermon identifies the Psalm's three-part structure: a prayer to God (v. 1), a call to man (vv. 2-5), and a contrast between the peace of God and the peace of men (vv. 6-8). Nothing changes in the external circumstances between verse 1 and verse 8. The wicked are still prowling. What changes is how the Psalmist is thinking — and that transformation of thinking moves him from despair to joy, from sleeplessness to rest.\n\nA significant portion of the sermon focuses on Psalm 4:1, where David calls God the God of my righteousness. Pastor Lyro argues this reflects the Old Testament saints' awareness of alien righteousness — they did not stand before God on the basis of their own moral performance but on the basis of a righteousness God counted as theirs. Romans 3:25-26 confirms that God passed over the sins of Old Testament saints knowing his Son would pay for them. This connects the evening Psalm to Paul's letter and to the ongoing intercession of Christ (Hebrews 7:25, Romans 8:34).\n\nThe sermon closes with a pastoral application: the secret of David's peace is not better circumstances but right thinking about God. The enemies in verse 6 cry out for material prosperity — grain and wine. David cries out for the countenance of God, and receives gladness that exceeds any material increase. Verse 8 — I will both lie down in peace and sleep — is presented as the great pastoral promise of the Psalm: the people of God can act boldly and rest peacefully because the Lord alone is their security.", "transcript": "If we are able, would you remain standing? We are reading our scripture this morning, turning to Psalm 4. The 4th Psalm — we will read all eight verses. Psalm 4. This is the Word of our Lord.\n\n*To the Chief Musician. With stringed instruments. A Psalm of David. Hear me when I call, O God of my righteousness! You have relieved me in my distress; have mercy on me, and hear my prayer. How long, O you sons of men, will you turn my glory to shame? How long will you love worthlessness and seek falsehood? But know that the Lord has set apart for Himself him who is godly; the Lord will hear when I call to Him. Be angry, and do not sin. Meditate within your heart on your bed, and be still. Offer the sacrifices of righteousness, and put your trust in the Lord. There are many who say, \"Who will show us any good?\" Lord, lift up the light of Your countenance upon us. You have put gladness in my heart, more than in the season that their grain and wine increased. I will both lie down in peace, and sleep; for You alone, O Lord, make me dwell in safety.*\n\nThis is the Word of our Lord. Let us pray together. Father, thank You for Your Word. We pray that You speak to us as we consider it this morning. We pray in Jesus name. Amen. Please be seated.\n\nWhy Psalm 4? Three reasons, really. We finished our series on 1 John and I do not want to start another series until the end of August. One. Two, Elder Hollander recommended that we read a Psalm last week when he preached on Psalm 5. And three, we are camping this week and it was suggested that we should have a devotion on Psalm 4. So these three reasons are the reasons for Psalm 4 today.\n\nAs we find David in Psalm 4, once again afflicted by his enemies as he was in Psalms 2 and 3. There is this theme in the Psalms by David in which affliction gave birth to the songs. The tenor of the song itself indicates that an overwhelming enemy was persecuting David. So we can place the song into two periods of David's life: either the persecution under Saul or when Absalom ran him out of town. We saw in Psalm 3 that it was written during the persecution under Absalom.\n\nSpurgeon refers to the Psalm as another choice flower from the garden of affliction and then says, happy is it for us that David was tried, for probably we should never have heard the sweet sonnets of faith. And if you look at the Scriptures, much of it would not exist if were not for the affliction of the saints. Think of a great epistle of faith. We do not have that if were not for the destruction of Jerusalem and Jeremiah weeping over Jerusalem. We do not have Psalm 51 if were not for David's affliction with sin and repentance. We would not have the whole book of Jeremiah or Isaiah if were not for the affliction of God's people. So we praise the Lord for bringing good out of affliction.\n\nThe Psalm has historically been called an evening Psalm and the affliction of God's people. If you notice the Psalm ends with David going to bed and having a really good night of sleep. So Psalm 4 is historically associated with the evening. Together Psalm 5, which is called a morning Psalm, this Psalm was adopted very early in Hebrew liturgy as the two passages to be recited in the morning and in the evening in the Hebrew home. And you might wonder why Psalm 4 before Psalm 5 — remember in the Hebrew calendar the day was evening and morning, not morning and evening as we think of it.\n\nYou notice in the title that this Psalm is directed to the chief musician or the choir master. The one who is going to lead singing in the tabernacle and temple worship. That position was instituted by David and was approved by God. You can read of it in 1 Chronicles chapter 6 where Heman was the first choir director of the tabernacle, and David handed these songs to them for them to lead. And their job was to minister before the Lord. These chief musicians were there to minister before the Lord. In 1 Chronicles 6:14 we read that David appointed some of the Levites to minister before the Ark of the Lord — to commemorate, to thank and to praise the Lord God of Israel. That was their job.\n\nAnd this job description of the chief musician and the choir master teaches us what the purpose of music is in the worship of God. All music in worship is to have God as its object — that is, it is to be directed to God or at least about God and his mighty works. There are lots of great hymns in our hymnal that are great to sing as a church. But they are not necessarily fit for the worship of God because they are directed to one another, whereas in the worship of God, hymns should be directed to God or at least about God and his great works. They should be vertical in nature, because singing is to commemorate, to thank and to praise the Lord God of Israel.\n\nAnd it is interesting — if you look at the title of the song, it was designed to be sung with instruments. It says to the chief musician with stringed instruments. Now the New King James adds stringed instruments but the word itself is uncertain. The scholars are not fully sure, but they do think it was something you played with your hands — something you pluck, like a harp or a lute. But whatever it was, it was part of the musical instruction. This song was to be sung with a company of instruments, which tells us that the position that songs during the worship of God should be sung without instruments does not really take into consideration the entirety of the data we have in the Scriptures, when the very songs we have here were instructed to use instruments in singing them. So it is very appropriate that we use instruments in the singing of the church of Jesus Christ.\n\nThere are some Reformed bodies and churches that do not believe they should use instruments in the singing time of worship. You may have heard the name of Rosaria Butterfield — her husband, the notion that her husband's church holds is that there should be no instruments in the worship service and only songs sung a cappella. And actually the great Swiss Reformer Zwingli was a very accomplished musician, but he believed there should be no singing in the worship of God because it appealed to the emotions. Imagine that — there should be no singing in the worship of God because it appealed to the emotions. How we should thank God that God created emotions and calls every ounce of our being to be involved in the worship of God, mind and heart and soul and body. And that includes our emotions. And clearly from the Psalms, it is also appropriate to use instruments in the worship of the Lord.\n\n## The Three Parts of Psalm 4\n\nNotice that in verse 1, God is called the God of my righteousness. That is the only time in the whole book of Psalms that God is called the God of my righteousness. If you use the NIV, you are going to see that the NIV translates it as my righteous God — a very poor translation. The New King James, the ESV, the NASB, do a better job in translating it to the God of my righteousness, because the word my is associated with the word righteousness, not with God. Keep that in mind.\n\nAnd notice that in verse 2, David addresses the sons of men. What does that mean? Sons of men means mankind in general. What is the son of man if not another man? The idea here is that there is nothing special about the people who are persecuting David. They are just humans, just men like he is. An expression much like C.S. Lewis uses in the Chronicles of Narnia where he calls the children the sons of Adam and the daughters of Eve — meaning just common people.\n\nDo you notice that this Psalm is quoted in the New Testament? It is quoted by Paul in Ephesians chapter 4 verse 26, where it says, be angry and do not sin and do not let the sun go down in your wrath. So it is quoted in the context applying it to relationships and we are going to see that Paul uses it very much like David does here in this passage.\n\nOkay, one last introductory item. This is a little technical but not so much. It has to do with the quotation marks. If you have a New King James, look at verse 6 — you are going to see the quotation mark. Verse 6 says there are many who say, and then open quote, who will show us any good, close quote. If you have an ESV, the quotation marks are going to go all the way to the end of verse 6. That is the proper way — I think the right way to interpret that quotation mark. So this is an interpretation, but I think that is the proper way. And I hope to explain that to you in a moment as we get there, why that is important.\n\nOkay, done with the more technical stuff. Now that we have taken care of these preliminary issues we can take a closer look at the flow of the Psalm. In expounding this Psalm, John Calvin says: after David in the beginning of the Psalm has prayed to God to help him, he immediately turns his discourse to his enemies and depending on the promise of God triumphs over them as conqueror. Here therefore he teaches us by example that as often as we are weighed down by adversity or involved in any great distress we ought to meditate upon the promise of God in which the hope of salvation is held forth to us, so that defending ourselves by this shield we may break through all the temptations that assail. Nothing changed in David's condition. He prayed to God. He was reminded of the promises that God had made to him, and now he is ready to fight the enemies. He has victory over the enemies based on his recollection of the promises of God.\n\nWe can easily split this Psalm into three parts: a prayer to God, then a call to man, then the contrast of the peace of God and the peace of men.\n\n## Part One: A Prayer to God (verse 1)\n\nIn verse 1 we see a prayer to God. David says, hear me when I call, O God of my righteousness! You have relieved me in my distress. In the time of trouble David knows that there is only one who can ultimately help him and that is God himself. Whatever it is — either Saul's persecution or Absalom's persecution — David realizes that ultimately the Deliverer is God, so he prays to him. The ultimate help is God. He knows that because God has helped him in the past.\n\nIf you go back and read Psalm 3, David turns to his Ebenezers to see God's help. Remember in 1 Samuel chapter 7 where after a great victory given by the Lord, Samuel instructs Israel to build this pillar of stone and calls it Ebenezer, which means rock of help, and says, thus far the Lord has helped us. And then they start their march. We are going to build this so that we can look back and be reminded that the Lord is our helper. David had those in his life. He could look back: God is my helper. I am praying to him. Later on in Psalm 46, David describes God as a very present help in time of need.\n\nDavid was confident that God was the ultimate help that he needed in any time. It was obvious to him what he needed to do and that was to pray to the God who is his help. Is it obvious to you? Is it obvious to you that God is ultimately the only one who can help you in time of need? People of God, our help is in the name of the Lord who made heaven and earth, as Psalm 124:8 says.\n\nAnd he addresses God as the God of my righteousness in verse 1. Here we see the teaching that will be fully and clearly developed in the pages of the New Testament, especially the writings of Paul. David says that his righteousness is not his own — it is God's. The God of my righteousness. He has access to God because God counts David as righteous. We have here an indication that the Old Testament saints knew that their justification, their standing before God, was based on an alien righteousness. The righteousness was not their own. As Paul says in Romans 3:25-26, speaking of Christ: whom God set forth as a propitiation by his blood through faith, to demonstrate his righteousness, because in his forbearance God had passed over the sins that were previously committed.\n\nGod passed over David's sin. God passed over Moses's sin. God passed over Abraham's sin. Everyone listed in Hebrews 11 — he passed over those sins, knowing that his Son Jesus Christ was going to pay for all those sins. So David can say, God is my righteousness, because he is going to provide for that. God imputed to David — counted as David's — the righteousness that was going to be earned by Christ through his life, death, and resurrection. And so David can call God the God of my righteousness.\n\nAnd as he prays, David acknowledges that it is only because of God's mercy that his prayer is heard. Look again in verse 1: hear me when I call, O God of my righteousness! You have relieved me in my distress. Have mercy on me and hear my prayer. Now parents, you generally have your children's best interest in mind. But at the tenth mom-mom-mom or the twin-dad-dad-dad or the fifteenth interruption, even the best parent might get a little annoyed. But God our Father hears the prayers of the saints — those prayers brought to him in the name of the Son. No matter how many times we come before him, he never gets annoyed with us for coming before him. And David says, have mercy on me and hear my prayer. We can be confident that if you are going to your Father in the name of Jesus, he hears your prayers. No matter how many times you come to him.\n\nAs our Lord says, what man is there among you who, if his son asks for bread, will give him a stone? Or if he asks for a fish, will he give him a serpent? If you then, being evil, know how to give good gifts to your children, how much more will your Father who is in heaven give good things to those who ask him? That is the mercy of the Lord.\n\nHe answers our prayers. Now I wonder — and I am using human language here, so please do not charge me with heresy — I wonder if God is more tempted to say, man, Johnny is annoying because he is always praying to me. Or is he more like, hi Johnny, it has been a while since I saw you. What does God say about you and me? Would he say, I had better answer his prayer because he is not going to leave me alone? Or, oh good to see you, it has been a while? The praying itself is a mercy from God. The ability to just talk to God is a mercy from God. And he answers prayers.\n\n## Part Two: A Call to Man (verses 2-5)\n\nHaving prayed, David turns from God and talks to men in verses 2 through 5. He says: how long, O you sons of men, will you turn my glory to shame? How long will you love worthlessness and seek falsehood? But know that the Lord has set apart for Himself him who is godly; the Lord will hear when I call to Him. Be angry, and do not sin. Meditate within your heart on your bed, and be still. Offer the sacrifices of righteousness and put your trust in the Lord.\n\nHere in verses 2 through 5, David calls men to repentance. We learned that alongside trust in the Lord in prayer must go trust in the Lord in action. David prayed and then he acts. They have been praising and he faces the enemy. David prays and he calls all men to repentance. And that is the lesson for us: we cannot pray and not act according to what we have prayed. We cannot pray for our family's salvation and then refuse to share the gospel with them. We pray and then we act according to our prayers.\n\nThe sons of men here in verse 2 are his enemies who thought they were men of high rank. But by calling them sons of men — just common people — David says look, you are just calling people. You are not so great to think that you are greater than I. We are all sons of men. Do not rob the glory that is the Lord's. These men rebel against the King who was anointed by Yahweh to the throne of Jerusalem. They stole the glory that belonged to the King and made a mockery of it.\n\nDavid says, how long, O you sons of men, will you turn my glory to shame? And in the words of the first David we hear the voice of the final David, the Lord Jesus Christ: how long are you going to rebel in your sins against the anointed of Yahweh, trying to steal the glory that belongs to him alone? How long are you going to rebel against the Lord? How long are you going to pursue what does not satisfy? Here Christ tells us that pursuing anything else in the place of his glory is worthless, to pursue our own glory in rebellion to the Son of God.\n\nAnd David tells us that God is the one that sets apart the godly one and listens to him. In verse 3, David says, but know that the Lord has set apart for Himself him who is godly; the Lord will hear when I call to Him. David was the godly one set apart by God and God will hear David's prayer. But in a more majestic way, Christ is the godly one and the Father will hear his pleading for the saints. In Hebrews 7:25, he is also able to save to the uttermost those who come to God through him, since he always lives to make intercession for them. In Romans 8:34, who is he who condemns? It is Christ who died and furthermore is also risen, who is even at the right hand of God, who also makes intercession for us. It is Christ who pleads for you. Day and night he pleads for you with his own blood, and the Father will listen to the prayer of the one he set aside.\n\nDavid continues and says, if the enemies of the anointed of God would take a break from their constant agitation against him and stay still for a moment and think, they would stop hating the anointed one. Verse 4: be angry, and do not sin. Meditate within your heart on your bed and be still.\n\nThe expression be angry and do not sin means to be angry at the right thing with the right motive. In this case, David and the Messiah are saying: do not be angry at me — be angry at sin, particularly your sin. Two things I want you to notice from this.\n\nFirst: rebellion against God is unreasonable, illogical, and foolish. It is unintelligent. There is no great intellectual accomplishment in rebellion against God. You are not more scientific by rebelling against God. The favorite position today in academia is the position of being agnostic — the idea that there is not enough out there to prove that there is a God, whether there is or not. It is interesting that there is such pride in claiming to be an agnostic. When if you just change the language of origin from Greek to Latin, the word agnostic would be ignorant. To claim that you are agnostic is to claim that you are ignorant. It is illogical, it is unreasonable. To claim to be an agnostic, to claim that there is no God, is to be angry at him and to shake a fist at him.\n\nPsalm 14 says that the one who claims to be an atheist has to keep repeating to himself, there is no God, there is no God, there is no God — because if he stops for a second the evidence of God's presence is so great that his eyes are opened. Continued rebellion will lead to more rebellion to the point that God will give us over to ourselves. The worst punishment God can give to us is to turn us over to ourselves. The worst thing, the worst punishment God can give, is to turn us to our minds, as Paul says in Romans 1: even as they did not like to retain God in their knowledge, God gave them over to a debased mind to do those things which are not fitting, being filled with all unrighteousness.\n\nSecond: verse 4 says, meditate within your heart on your bed and be still. Taking time to think is of utmost importance if we want to follow the Lord. Christianity is a thinking religion, contrary to what some people say. This idea in verse 4 — meditate within your heart on your bed and be still — refers to that time when you lay your head on your uphill pillow and the house is quiet and there are no distractions. That moment when everything is quiet, you can hear the refrigerator because everything else is quiet. A time when you can think without outside stimuli.\n\nCalvin says: this exhortation has a respect to us all. For there is nothing to which men are more prone than to deceive one another with empty applause, until each man entering into himself and communing with his own heart... David says, instead of being angry at the anointed of Yahweh, repent from your sins.\n\nIn verse 5, offer the sacrifices of righteousness and put your trust in the Lord. The idea here — verse 5 is a couplet. When you read offer the sacrifices of righteousness, that expression is explained by the following line: put your trust in the Lord. The sacrifice of righteousness is putting your trust in Yahweh in the Lord. David is speaking to his enemies within the covenant community of Israel. So these enemies that David is talking to are not people out there — they are people in Israel, people in the Old Testament church, the covenant community of God. And Christ speaks to us in that way as well. In essence, the Messiah here is saying, stop your hypocrisy. You say you serve Yahweh, but nothing in your life evidences that. Turn to him in truth.\n\nIf that is you today, that is what God is telling you. Stop your hypocrisy. If you are pretending to be a Christian, turn from that, turn in true faith to Christ and serve him with your heart. Being here does nothing for you if this is an exercise of hypocrisy on your part. Turn to Christ and live for him truly. God says that the sacrifice he is looking for is not an hour sitting on a pew. The sacrifice he is looking for is a broken spirit, and a broken and a contrite heart — these he will not despise.\n\nSo if you are here and you are a hypocrite, pretending to be something you are not — repent, turn to the Lord, offer your life to him, turn to him in truth that you might receive his grace and grow in him.\n\n## Part Three: The Peace of God vs. the Peace of Men (verses 6-8)\n\nAnd then we come to the end where David contrasts the peace of God with the peace of man in verses 6 through 8.\n\nThere are many who say, who will show us any good? Lord, lift up the light of Your countenance upon us. You have put gladness in my heart, more than in the season that their grain and wine increased. I will both lie down in peace and sleep, for You alone, O Lord, make me dwell in safety.\n\nThe many in verse 6 are the enemies of David. They complain that no one is doing good to them. They even use biblical language in their prayer: Lord, lift up the light of Your countenance upon us. That is the Aaronic benediction in Numbers 6 where the high priestess was supposed to utter upon the people of Israel. So they use Bible language in their fake piety, praying to the Lord, even though they are the enemies of God. And yet the only good they want is the material good — as we can see from the grain and wine in verse 7.\n\nThat is why the enemies of God are in contrast with David. David knew the goodness of the Lord. In verse 7: you have put gladness in my heart, more than in the season that their grain and wine increased. David knew the Lord as his shepherd. He knew Yahweh as his righteousness. And that brought him more joy than any temporal blessing of provision could bring.\n\nAnd the result of knowing God like that was peace with God, peace with man and peace with oneself in verse 8. I will both lie down in peace and sleep, for You alone, O Lord, make me dwell in safety. Once again, as in Psalm 3, a good night of sleep is set forth as a result of trusting in God. David knew God alone could cause him to dwell in safety. The armies of the enemy were but vapor when compared with the strong arm of the Lord. And in God's name one could stand before a thousand, as Isaiah says: those who wait on the Lord shall renew their strength; they shall mount up with wings like eagles; they shall run and not be weary; they shall walk and not faint.\n\nSo people of God, we can rest. We can put our heads on the pillow knowing that our Heavenly Father is watching over us. We can also act and act boldly knowing that our Lord is for us.\n\nAnd so here we have it. The evening Psalm instructing us to trust in the Lord. The only way to trust the Lord is by trusting the Lord Jesus Christ. He is the one who opens the doors of heaven. He is the one who gives his beloved sleep. Do you know Jesus? Is he your Lord? Why are you playing church? He is the one who gives his beloved sleep. All glory be to Christ.\n\nLet us pray. Father, we pray that indeed we will be trusting You, that our heads will be able to go down on our pillows knowing that You are sovereign over all things and in control of all things and that You love us in Jesus Christ. We pray that this will be true of all of us here today. For asking Jesus name. Amen."};
