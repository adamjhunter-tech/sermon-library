window.LESSON_DATA = {"id": "undated-a-much-better-christ", "title": "A Much Better Christ", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["A Much Better Christ - Pastor Tito Lyro - Hebrews 1_1-4.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/a-much-better-christ-pastor-tito-lyro-hebrews-11-4", "tags": [{"tag": "Christology", "source": "detected"}, {"tag": "perseverance", "source": "detected"}, {"tag": "apostasy", "source": "detected"}, {"tag": "incarnation", "source": "detected"}], "scripture_references": [{"reference": "Hebrews 1:1-4", "type": "quoted", "source": "detected"}, {"reference": "Psalm 2:8", "type": "referenced", "source": "detected"}, {"reference": "Ephesians 1:22-23", "type": "quoted", "source": "detected"}, {"reference": "Romans 8:17", "type": "quoted", "source": "detected"}, {"reference": "Titus 3:7", "type": "quoted", "source": "detected"}, {"reference": "John 1:1-3", "type": "referenced", "source": "detected"}, {"reference": "Colossians 1:15-16", "type": "quoted", "source": "detected"}, {"reference": "Colossians 2:9-10", "type": "quoted", "source": "detected"}, {"reference": "2 Corinthians 4:4", "type": "quoted", "source": "detected"}, {"reference": "Philippians 2:5-8", "type": "referenced", "source": "detected"}, {"reference": "John 14:6-9", "type": "referenced", "source": "detected"}, {"reference": "Colossians 1:17", "type": "quoted", "source": "detected"}, {"reference": "Romans 11:36", "type": "quoted", "source": "detected"}, {"reference": "Hebrews 9:12", "type": "referenced", "source": "detected"}, {"reference": "Psalm 110", "type": "referenced", "source": "detected"}, {"reference": "Ephesians 4:10", "type": "referenced", "source": "detected"}, {"reference": "Philippians 2:9", "type": "referenced", "source": "detected"}, {"reference": "Psalm 8", "type": "referenced", "source": "detected"}], "outline": [{"title": "The Context: A Church Tempted to Leave Christ", "subpoints": ["The Hebrew congregation was contemplating returning to pre-Christian Judaism — life had become harder since conversion", "The author of Hebrews starts with no introduction but immediately addresses the main issue: there is no going back", "Any worship of God apart from Christ is not worship of the true God of the Bible", "The author unveils in four verses the most magnificent Christ to persuade them to stay"], "scripture": ["Hebrews 1:1-4"]}, {"title": "Christ the Heir of All Things", "subpoints": ["God appointed Christ the heir of all things — not just the earth but all things, visible and invisible, this age and the age to come", "Psalm 2:8 is the oracle behind this: ask of me and I will make the nations your heritage and the ends of the earth your possession", "He inherited all things by virtue of his obedience, death, resurrection, and ascension", "We are co-heirs with Christ through our union with him — adopted as sons and daughters of the Most High God (Romans 8:17, Titus 3:7)"], "scripture": ["Hebrews 1:2", "Psalm 2:8", "Romans 8:17", "Ephesians 1:22-23"]}, {"title": "Christ the Maker of All Things", "subpoints": ["Through Christ God made the worlds — not just this world but all things created, visible and invisible, space and time", "John 1:1-3 — all things were made through him and without him nothing was made", "Colossians 1:16 — for by him all things were created, in heaven and on earth, visible and invisible", "Romans 11:36 — of him and through him and to him are all things; he is the architect and engineer of the universe"], "scripture": ["Hebrews 1:2", "John 1:1-3", "Colossians 1:16", "Romans 11:36"]}, {"title": "Christ the Brightness of God's Glory and the Exact Imprint of His Nature", "subpoints": ["Christ is not the moon reflecting the sun — he is the sun itself, the actual radiance of the Godhead", "The exact imprint of his nature: not a copy but the thing itself — same substance, same nature as the Father", "Jesus says: I and the Father are one; whoever has seen me has seen the Father (John 14:9)", "Colossians 1:15 — he is the image of the invisible God; Colossians 2:9 — in him all the fullness of the Godhead dwells bodily"], "scripture": ["Hebrews 1:3", "Colossians 1:15", "Colossians 2:9", "2 Corinthians 4:4", "John 14:6-9"]}, {"title": "Christ the Sustainer and Purifier of Sins", "subpoints": ["Christ upholds all things by the word of his power — not like Atlas straining under the weight, but effortlessly", "Behind every law of physics — gravity, nuclear forces, the Higgs boson — is Christ's word actively sustaining creation", "He purged our sins by offering himself once for all: it is finished, a completed task", "He then sat down at the right hand of the Majesty on High — the sitting proves the work is done; Levitical priests could never sit"], "scripture": ["Hebrews 1:3", "Colossians 1:17", "Hebrews 9:12"]}, {"title": "Christ the Exalted King", "subpoints": ["Having sat down at the right hand of majesty, Christ is enthroned on David's throne, ruling over all things", "The mercy seat in the most holy place had room for only one — and Christ sat on it as the royal high priest", "Isaiah's vision in Isaiah 6 (John 12 identifies it as Christ on his throne) and Psalm 110 both point to this", "His people are not more secure than the glorified spirits in heaven — the believer's salvation is as guaranteed as those already with God"], "scripture": ["Hebrews 1:3-4", "Psalm 110", "Philippians 2:9"]}], "summary": "Pastor Tito Lyro preaches from Hebrews 1:1-4 under the title 'A Much Better Christ.' The sermon's occasion comes from the context of the epistle: the Hebrew congregation was tempted to return to Judaism because following Christ had brought hardship, persecution, and the loss of their former way of life. The author of Hebrews refuses any gentle preamble and plunges immediately into a description of Christ that makes retreat unthinkable. In two verses and seven attributes, he unveils the most magnificent Christ in all of Scripture.\n\nPastor Lyro walks through each of the seven descriptions. Christ is the heir of all things — not just the earth but everything, visible and invisible — and through union with him, believers are co-heirs. He is the maker of all things, the divine architect through whom all things were created and for whom all things exist. He is the brightness of God's glory: not the moon reflecting the sun but the sun itself, the actual radiance of the Godhead. And he is the exact imprint of the Father's nature — not a copy but the same substance, so that to see the Son is to see the Father.\n\nChrist also upholds all things by the word of his power, sustaining the universe effortlessly — every law of physics is simply Christ's active word keeping creation on its appointed course. He purified sins by once-for-all offering himself, completing the work that no Levitical priest could ever finish. And then he sat down, which is the sign that his work is done. No Levitical high priest was ever permitted to sit in the most holy place; Christ entered, offered himself, and sat down on the mercy seat as royal high priest and king.\n\nThe sermon repeatedly returns to the theme that applies to us: what could possibly compete with the Christ who made all things, owns all things, reveals God perfectly, sustains the universe, paid for our sins, and reigns as King? The world has nothing more glorious than Christ. Pastor Lyro urges the congregation not to hide behind intellectualism when tempted to wander — to leave Christ is not the rational or scientific position, it is foolishness — and to run deeper into Christ's glory in every season of struggle.", "transcript": "If you're able, you remain standing for a moment longer for the reading of God's Word. We're going to read four verses in the first chapter of the epistle to the Hebrews. Hebrews chapter 1, going to read verses 1 through 4. This is the Word of our Lord.\n\n*God, who at various times and in various ways spoke in time past to the fathers by the prophets, has in these last days spoken to us by His Son, whom He has appointed heir of all things, through whom also He made the worlds; who being the brightness of His glory and the express image of His person, and upholding all things by the word of His power, when He had by Himself purged our sins, sat down at the right hand of the Majesty on high, having become so much better than the angels, as He has by inheritance obtained a more excellent name than they.*\n\nThis is the Word of our Lord. Let us pray. Father, pray that Your Spirit will use what is said here this morning for Your glory, for the good of Your church, that our minds will be focused on the Christ who has saved us. For asking Jesus name, Amen. Please be seated.\n\nThis general letter to the Hebrews was written because this particular congregation that the human author is writing to was contemplating leaving the faith in the Lord. They were thinking that the struggles that Christ had brought to their lives were not worth remaining faithful to the Lord. They thought, you know what, we had it better before we believed in Christ. With the temple, we could go to the temple. Our businesses were not persecuted. People were not shunning us. We want to return to how things were prior to Christ. We do not want to leave God. We do not want to abandon God, but we want to go to a pre-Christian, pre-Christ way of worshiping God.\n\nThat is really the point that the author is trying to make. There is no going back. The whole book explains that there is no going back to something other than Christ. Any sort of worship of God, any sort of relationship with God that is apart from Christ, is not a relationship, is not the worship of the true God of the Bible. There is only one way to God and that is through the Lord Jesus Christ. So to go back to something else is to go back to a false religion. It is to go back to a way that does not lead to the Father, to the Son, and to the Spirit.\n\nAnd because of the seriousness of what this congregation was flirting with, the author of Hebrews starts this letter with a punch. Do you notice there is no introduction? There is no, hey, how are you? It was great to hear from you. I cannot wait to see you. There is none of that. He goes straight for the main issue because leaving Christ is the most serious issue that one can deal with. In essence, he says, do you think that what you had in Judaism without Christ is better than what you have now with Christ? Let me remind you of who saves you. And then at the end, let me know if you still want to go back to Judaism.\n\nAnd in the process, he unveils in these four verses the most magnificent Christ right before our eyes. I hope that we can see that as we look at these four verses here this morning.\n\nThe author here says that the things they loved about the Old Testament, the bells and the whistles, the smells, the sounds, the glory of the temple — all of that. They are great, they are exciting. And they came from God through His servants the prophets. But now, He has spoken to us in His Son. The final and most glorious revelation of God. All those things that they were used to in Judaism are now being fulfilled and magnified in Jesus Christ. In the Son we have the completion and fulfillment of everything that the Old Testament promised. And the Book of Hebrews says if they rightly listened to the prophets of the Old Testament, they must listen to the Son of God.\n\nRemember the transfiguration — Jesus goes up the mount to pray and He brings Peter, James and John. And all of a sudden Elijah and Moses show up. Peter being Peter says, Lord it is great that we are here. Let us build an altar, a tabernacle for you, for Moses and for Elijah. And then all of a sudden Elijah and Moses are gone. The heavens part and the voice says, this is My Son — you listen to Him, because it is to Him that Elijah and Moses point. The brothers and sisters in the Hebrew church had forgotten that.\n\nBut our author does not stop here. He continues to amass the case by giving us in two verses seven different descriptions of whom the Son is. And Lord willing we will walk through them.\n\n## First: Christ is the Heir of All Things\n\nThe first thing he says about Christ is that he is the heir of all things. Look at verse 2: God has in these last days spoken to us by His Son whom He has appointed the heir of all things. These words echo God's oracle in Psalm 2 verse 8 where the Father says to the Son, ask of me and I will make the nations your heritage and the ends of the earth your possession. In verse 5 of chapter 1 here the author applies Psalm 2 to Christ, but as the Holy Spirit applies Psalm 2 to Christ, he has more than just the earth as his inheritance. He was appointed the heir of all things — not just the earth, but all things. Heaven and earth. This age and the age to come. The visible and the invisible. Christ has conquered all; all belongs to him by virtue of his life, death, resurrection and ascension.\n\nEphesians 1 verse 22 and 23: Paul says, God the Father put all things under his feet, God the Son, and gave him to be head over all things to the church, which is his body, the fullness of him who fills all in all. So the Savior, the Christ, the Son of God, the one that these people want to leave, is the one who has inherited all things by virtue of what he has done.\n\nAnd the best news is this: because of our union with him, we are co-heirs with him of all things. Romans chapter 8 verse 17 — we are heirs of God and joint heirs with Christ. When you came to faith in Jesus Christ, God the Father not only justified you — declared you to be free of the guilt of sins. God the Father not only definitively sanctified you — declared you to be morally perfect in his sight, positionally. He also adopted you. If you are believing in Jesus Christ you are the daughter, you are the Son of the Most High God. And as the daughter and Son of the Most High God you inherit all things with Jesus Christ. Paul repeats himself in Titus 3:7 when he says, that having been justified by his grace we should become heirs according to the hope of eternal life. So he owns everything and through him we are heirs with him — and you want to turn away from him?\n\n## Second: Christ is the Maker of All Things\n\nHe is not only the heir of all things, but also the maker of all things. Look again at verse 2: God has in these last days spoken to us by His Son whom He has appointed heir of all things, through whom also He made the worlds. The word translated worlds here in the New King James is not the common word for world. It is a much more inclusive word than cosmos, the word usually translated as world. It includes much more than just this world. It includes everything that is created, visible and invisible, space and time, this age and the age to come — all was created by and through and for Jesus Christ.\n\nJohn 1:3 — all things were made through him and without him nothing was made that was made. Colossians 1:16 — for by him all things were created that are in heaven and that are on earth, visible and invisible, whether thrones or dominions or principalities or powers. All things are created through him and for him. Romans 11:36 — for of him and through him and to him are all things; to him be glory forever. Amen.\n\nSo the Son who speaks to you is not only the heir of all things but he also made all things — and you want to leave him? That does not make any sense. And you might think, no I have no desire to go back to Judaism, I have never been there. I do not want to go there. But we are all tempted at times with leaving our faith. What are we leaving to? What is out there that is better than what Christ has for us? What is out there that is better than serving the one who created all things, who owns all things? What is there out there that is better than inheriting all things through Jesus Christ? What is there out there that is better than seeing Christ as your Savior, being purified of your sin, having your heart changed to become more like Jesus Christ, and being able to worship God as our Father — our intimate Father? It is as crazy to want to leave Christ as it was for the Hebrews to want to go back to Judaism.\n\n## Third: Christ is the Brightness of the Glory of God\n\nThe author also says that Christ is the brightness of the glory of God. Look at verse 3: who being the brightness of His glory and the express image of His person, and upholding all things by the word of His power. The Son in His incarnation is the radiance of God's glory. What do you think of when you think of glory? Whiteness, brightness, the heavenly choir — Christ is the radiance of God's glory. Not the radiance as a reflection, but a radiance as in the brightness of the body itself. Christ is not the moon that reflects the sun's rays. Christ is the sun. He is the one who is the actual brightness of the Godhead. This is the shining of God's glory as it really is.\n\nBeliever, Jesus Christ is God himself. God of God, light of light, very God of very God, begotten not made, being of one substance with the Father, by whom all things were created — said our brethren way back in 451 AD in the Chalcedonian Creed. So if you want to see the glory of God, you must look at the Son. If you want to have any relationship with God, if you want to see God, if you want to pursue God, you must see the Son. The Word became flesh and dwelt among us and we beheld his glory, the glory of the only begotten of the Father, full of grace and truth. He is the revelation of God's majesty. You cannot see the glory of God apart from Jesus Christ.\n\n## Fourth: Christ is the Exact Imprint of God's Nature\n\nIf you notice in verse 3, it says who being the brightness of His glory and the express image of His person. The New King James says the express image of His person — it should actually say something like the exact imprint of His nature or the very image of His substance. Not a copy — he is the thing itself. The idea here is that Jesus Christ is the very substance, the very nature of God embodied in flesh. There is no difference between the substance of God and the substance of Christ. One is the imprint of the other. You see in the Father is what you see in the Son.\n\nJesus says, I and the Father are one. When Philip says, Lord show us the Father and Jesus says, Philip, I have been here with you three years and you still say that? You have not seen the Father? Look at me. I am the way, the truth and the life. No one comes to the Father except through me. F.F. Bruce in his commentary on Hebrews says, to see Christ is to see what the Father is like.\n\nIsn't there a Christmas carol that talks about Mary looking at the baby and beholding the face of God? Oh Mary did you know? Yes, a hundred percent true — when we behold Christ we are beholding the face of God. Colossians 1:15 — he is the image of the invisible God. Colossians 2:9-10 — for in him dwells all the fullness of the Godhead bodily, and you are complete in him who is the head of all principality and power. 2 Corinthians 4:4 — lest the light of the gospel of the glory of Christ who is the image of God should shine on them. Philippians 2:5 — he who was God himself did not think that it was something to grasp onto to be God, but he humbled himself to be like us, that we might be saved.\n\nSo the Son is of the same stuff as the Father. You see the Son, you see the Father. You behold the face of the Son, you behold the face of the Father. And yet there are two different persons. One is the Father. The other one is the Son. And you say you want to go back to the ceremonies of the Old Testament because you could see God better in the lamb being slain or the goat being burned? Christ is the fullest revelation of God. If you want to know God, know Christ.\n\n## Fifth: Christ is the Sustainer of Creation\n\nThe author continues and he says that Christ is the sustainer of creation. Look at verse 3 again: upholding all things by the word of His power. So not only did Christ create all things, but he also sustains all things — he makes sure things keep going. And the means he uses to sustain creation is the same he used to create it: the word of his power. Paul says in Colossians 1:17, he is before all things and in him all things consist.\n\nBrothers and sisters, Christ upholds the universe. But he does not do it like Atlas. Atlas is carrying the world on his back and it is a big burden to him, he is bent down. The ancient world thought the earth existed on the back of a turtle, the turtle struggling holding that world together. That is not how Christ does it. He holds the entire universe and he does it effortlessly. He carries all things forward on their appointed courses.\n\nI hope some of you go and get degrees in the sciences. I want to see physicists, chemists, biologists, engineers coming from our congregation. And I want you to talk about the laws of nature. I want you to talk about strong and weak nuclear forces. I want you to talk about the God particle. I want to talk about string theories. I want to talk about the Higgs boson. But behind all these laws is Christ. Why is it that we are not floating? Well because gravity is pulling us together at the average rate of 9.8 meters per second squared — that is true. But behind that is the powerful word of Christ making sure that gravity works the way it does. It is the word of his power that keeps everything together. Christ is actively making sure that everything does what God appointed it to do and that everything is moving to the completion of the ages.\n\nAnd this is the Savior that you want to abandon? This is the one who spoke to you and you want to turn away from him? That is illogical. It is unreasonable. It does not make any sense. If you want to turn away from Christ, do not hide behind the idea of intellectual sophistication. To leave Christ is not the rational or scientific position. It is the unreasonable position. It is foolishness.\n\n## Sixth: Christ is the Purifier of Sins\n\nThe author says that Christ is a purifier of sins. Look at the end of verse 3: when he had by himself purged our sins, sat down at the right hand of the Majesty on high. Here we pass from the cosmic functions of the Son of God to his personal relationship with mankind — from his universal function as the preserver of all things to his redeeming function as the Savior of the people of God, the Redeemer of God's elect, the only mediator between God and man, the man Jesus Christ.\n\nHere the author introduces Christ's work as a high priest, which will be elaborated throughout the epistle of Hebrews — probably the biggest theme of the book. The one in whom God speaks in these last days as verses 1 and 2 say is the one who has in the most effective way cleansed you from your sins — something that the Old Testament sacrifices could not do; they could only point to it. Christ has effectively cleansed his people from their sins. He did that by once for all offering his own blood for you.\n\nIt is a completed task, as indicated by the next phrase where he says he sat down. He is done. He has finished. He has saved you brothers and sisters. You do not have to save yourself. You do not need to be looking for salvation somewhere else. If you are a follower of Jesus Christ, Christ has cleansed you of your sins.\n\nThe author of Hebrews hits this truth from every possible angle throughout the book. He says in chapter 2 that Christ has made propitiation for sin — done. He has purged sins away so that God remembers them no more in chapter 8. He brought about redemption from transgressions in chapter 9. He abolished sin by sacrifice in chapter 9. He bore the sins of his people. He offered sacrifice for sins in chapter 10. He brought about remission of sins in chapter 10. All past tense. He has done it. Is there not a worship song that goes like that? It is finished. He has done it. Life conquered death, he has won it. True. He has done it. He is done. Whatever had to be done about sin, he has done it. You do not have to do it. All he asks of you is to trust that he has done it.\n\nAnd you want to leave the only one who has done this? There is no other sacrifice. If you turn away from Jesus Christ, there remains as chapter 10 says no other sacrifice for sin on your behalf.\n\n## Seventh: Christ is the Exalted King\n\nSeventhly, the author of Hebrews says that Christ is the exalted King. Look at the end of verse 3: when he had done all these things he sat down at the right hand of the Majesty on high. Jesus is enthroned on high. Jesus is King. The gospel says that we believe not just in the Savior Jesus but in the Lord Jesus — the King Jesus. Jesus finished what he came to do. And now he sits at the right hand of God ruling over the nations.\n\nWe see that in verse 13 when the author quotes Psalm 110 and says Christ has fulfilled Psalm 110. Paul says the same thing with different words in Ephesians 4:10 where he says Christ also is the one who descended far above all the heavens that he might fill all things. So God also has highly exalted him and given him the name which is above every name — and that name is King Jesus. That is your Savior.\n\nAnd the fact that he sat down is important. It tells us that his work is completed. Later on the author is going to contrast Jesus sitting down with the Levitical high priesthood not being able to sit. In chapters 7 and 10 the author makes a big deal about the priests just having to go into the most holy place and then leave without being able to sit. Jesus has finished his work. He is able to sit. He does not have to stand. He is able to sit. Our souls are secure in his hand.\n\nAnd top ladies, great him. He says my name from the palm of his hand eternity will not erase. Impressed on his heart it remains, in marks of indelible grace. He holds to the end shall endure as sure as the earth is given. And I really love this line: those saints below, more happy but not more secure than glorified spirits in heaven. Do you know what that means? If you are in Christ sitting here today in this hot sanctuary you are not any less secure in Jesus' hand than the souls of the departed already in God's presence. Your future is as guaranteed. Your salvation is as guaranteed as those already in God's presence. More happy surely, but not more secure.\n\nThe fact that he is seated at the right hand of the Majesty is also important. This is the position of authority, the position of kingship. He is a royal high priest who sits on the throne of God in the most holy place. You remember that in the most holy place in the temple there was only one piece of furniture. What was it? The Ark of the Covenant. And on top of the Ark of the Covenant was the seat — the mercy seat — where once a year the high priest would pour blood and then leave. Brothers and sisters, Christ came in, offered himself, and then sat down on the mercy seat to cover all your sins as King.\n\nRemember the vision of Isaiah in chapter 6 where King Uzziah has just died. Things are falling apart as far as civil government goes. Isaiah is depressed. He goes to the temple. The Lord gives him a vision — how does he see God? Sitting on a throne. John chapter 12 tells us that was Jesus Christ sitting on the throne of God. The only one who was allowed to sit on the throne of God was the one who came from David and that was Christ himself, our King.\n\nSo Christ has been enthroned on David's throne, ruling over all things and especially over the Israel of God that is his church. With this piece then we now have the complete picture that the author gives in these verses. God has spoken in his Son who is the eternal prophet, eternal priest, the eternal King. And you want to turn away from that?\n\nYou want to turn away from Christ, the only hope of God's elect? The one who can accomplish salvation, the one who rules over you, the one who gave himself for you, Christian — there is nothing better out there. The world does not have a more glorious Savior for you. Relationships are not more glorious than Christ. Careers are not more glorious than Christ. Doing whatever you want is not more glorious than Christ. And him lifted up is what is going to draw all people to God. And we as the church of Jesus Christ are the ones showing that glory to the world. Christ is the glory of God and we are the bright reflectors of that glory.\n\nRemember what Jesus told us: as we go about obeying God, going about doing our good works, going about glorifying him in our lives and people will see that — and what will they do? They will glorify our Father in heaven. That is Christ — the best. We are going to go through 13 ways that Hebrews calls Christ better. We will not finish today. But the book of Hebrews says that Christ is better — better than anything else.\n\nSo do what the Psalm said: O taste and see how good God is. Take a bite, as it were, and see how good God is. In Jesus Christ, the glorious Son revealed to us in His Word. May He be glorified in us. May we not leave Him but embrace Him even more tightly. That in times of struggles in our lives instead of running away from Him, we run into His glory and embrace Him, because His yoke is easy and His burden is light.\n\nLet us pray together. Father, thank You for Your Word. We thank You for Christ. Thank You that Your Word reveals Him to us. We pray that Your Spirit will be working in all of our hearts that we might be running to Christ every moment of our lives. We thank You that He is our King, our Savior who completed all things for us and that there is nothing better out there. Give us a conviction of that, for asking Jesus name. Amen."};
