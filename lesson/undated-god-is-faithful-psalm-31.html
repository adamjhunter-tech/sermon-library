<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-god-is-faithful-psalm-31", "title": "God Is Faithful", "speaker": "Pastor Tito Lyro", "date": null, "session": "PM", "series": "Psalms", "series_part": null, "parts": 1, "source_files": ["God is Faithful - Psalm 31 - Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/god-is-faithful-psalm-31-tito-lyro", "tags": [{"tag": "suffering", "source": "detected"}, {"tag": "deliverance", "source": "detected"}, {"tag": "faith", "source": "detected"}, {"tag": "trust in God", "source": "detected"}, {"tag": "enemies", "source": "detected"}, {"tag": "prayer", "source": "detected"}, {"tag": "encouragement", "source": "detected"}], "scripture_references": [{"reference": "Psalm 31", "type": "quoted", "source": "detected"}, {"reference": "Luke 23:46", "type": "quoted", "source": "detected"}, {"reference": "Hebrews 2", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 12", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 13:5", "type": "quoted", "source": "detected"}, {"reference": "Romans 5", "type": "referenced", "source": "detected"}, {"reference": "Romans 12:19-21", "type": "referenced", "source": "detected"}, {"reference": "2 Corinthians 1:3-4", "type": "referenced", "source": "detected"}, {"reference": "1 Corinthians 10:13", "type": "referenced", "source": "detected"}, {"reference": "Psalm 42-43", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Theme and Context of Psalm 31", "subpoints": ["Psalm 31 is the next in an ongoing series through the Psalms", "It is a Psalm of David, intended to be sung—the word “Psalm” means to pluck an instrument", "The theme: God is reliably faithful and thus can be trusted to deliver His servant", "Jesus appropriates verse 5 from the cross: “Into Your hands I commit my spirit” (Luke 23:46)"], "scripture": ["Psalm 31", "Luke 23:46"]}, {"title": "The Suffering of the Psalmist (Verses 1-13)", "subpoints": ["Suffering comes from enemies who lay secret nets for him (v. 4)", "Suffering is also internal and chronic: his eyes waste away with grief, his life is spent with sorrow (vv. 9-10)", "Honest admission: some suffering stems from his own sin (v. 10: “my strength fails because of my iniquity”)", "Some suffering comes because of obedience—enemies persecute him for trusting in the Lord (v. 6)", "Some suffering results from the sins of others who slander him and seek his life (v. 13)"], "scripture": ["Psalm 31:4", "Psalm 31:9-10", "Psalm 31:6", "Psalm 31:13"]}, {"title": "Why David Turns to God: What He Knows About God", "subpoints": ["God is a rock, fortress, and place of safety—like Masada, impregnable (vv. 2-3)", "God knows everything David is going through—no need to repeat the story (v. 7)", "God has delivered David in the past and will do so again (v. 8: “He has set my feet in a wide place”)", "God has made a covenant with His people that never changes (vv. 14-16)", "God will vindicate His people, if not in this life, certainly in the next (vv. 19-20)"], "scripture": ["Psalm 31:2-3", "Psalm 31:7-8", "Psalm 31:14-16", "Psalm 31:19-20"]}, {"title": "The Deliverance: God Always Delivers His People", "subpoints": ["Psalm 31 is written after the fact—David had already experienced deliverance when he wrote it", "Deliverance sometimes comes only when the sufferer is near despair: “I said in my haste, I am cut off” (v. 22)", "Nevertheless, God heard his supplications even when David thought He had abandoned him", "Deliverance does not have to mean the cessation of suffering—it can mean growth in knowing the Lord (Hebrews 12)", "Hebrews 13:5: “I will never leave you nor forsake you”—the ground of bold confidence even in suffering"], "scripture": ["Psalm 31:21-22", "Hebrews 12", "Hebrews 13:5"]}, {"title": "Using the Comfort to Encourage Others", "subpoints": ["David uses the comfort he received to exhort others: “Be of good courage and He shall strengthen your heart” (v. 24)", "2 Corinthians 1:3-4: we are comforted in our trials so that we can comfort others in theirs", "Suffering trains us to minister to others going through similar pain", "Whatever help and encouragement we receive from the Lord, we are to pass on to those around us"], "scripture": ["Psalm 31:24", "2 Corinthians 1:3-4"]}], "summary": "Continuing his expository series through the Psalms, Pastor Tito Lyro preaches on Psalm 31, a song of David that the pastor identifies as likely covering more than one episode of suffering—it seems to encompass the chronic experience of affliction across David's life. The overarching theme is announced at the outset: God is reliably faithful and can therefore be trusted to deliver His servant. The sermon notes that Jesus himself appropriated verse 5 as His final coherent words from the cross (“Into Your hands I commit My spirit”, Luke 23:46), thereby claiming this Psalm as His own and demonstrating that God remained faithful even through death.\n\nThe sermon walks through the complexity of David's suffering, which comes from multiple sources: enemies who lay hidden traps for him, internal grief and anguish, his own sin (which he confesses in verse 10), his faithfulness to the Lord (which provokes his enemies' hostility), and the sins of others who slander him. The pastor resists the temptation to oversimplify suffering and insists that it almost always has multiple layers. David does not come before God claiming to be perfect; he comes acknowledging both his partial obedience and his partial failure, and resting his case not on his merits but on God's character.\n\nA substantial portion of the sermon examines what David knows about God that gives him the courage to seek deliverance from Him: God is a fortress and rock (like the impregnable fortress of Masada), He already knows everything David is going through without being told, He has delivered David before, He has made an unbreakable covenant with His people, and He will vindicate His people—if not always in this life, then certainly in the life to come. The sermon draws on Romans 12 and the parable of the sheep and goats in Matthew 25 to encourage believers to leave vengeance to God.\n\nThe sermon's practical conclusion draws on 2 Corinthians 1:3-4: God allows His people to suffer so that the comfort they receive from Him can be passed on to others facing similar trials. Every comfort and encouragement received from the Lord during times of suffering is not just for the sufferer but for the whole body of Christ. David models this in verse 24: having experienced God's faithfulness, he turns and exhorts the congregation to be of good courage.", "transcript": "## Introduction\n\nThe rest of us, we're going to look at Psalm 31. And you might ask why Psalm 31? Well, the reasoning is simple, no magic—it's just the next one. I preached on one through thirty in others, and so 31 is the next one. My sequential mind kicks in and I need to have things in order. So that's why Psalm 31. The idea is that when I finish preaching through the Psalms, then it'll be time to be done with the ministry. So we'll see how that goes.\n\nThat's Psalm 31. We're going to read it. It's not very long—it's 24 verses. It's a Psalm of David. If you look at your Bible, you're going to have two sorts of titles. One says \"to the chief musician\" or \"the choirmaster, a Psalm of David\"—that's the inspired title, that's part of the text. In Hebrew manuscripts that's verse 1, so in most Hebrew manuscripts of Psalms, each Psalm has an extra verse because a lot of times the title is verse 1. You learn a lot from the Psalm by looking at the title. This one just tells us that it's from David, and it was intended to be sung—which makes sense because that's the point of all the Psalms. The very word Psalm comes from the Greek word to pluck, as in plucking an instrument. So these are songs, songs of the people of God.\n\n## Reading: Psalm 31\n\n*In you, O Lord, I put my trust. Let me never be ashamed. Deliver me in your righteousness. Bow down your ear to me, deliver me speedily, be my rock of refuge, a fortress of defense to save me. For you are my rock and my fortress; therefore, for Your name's sake, lead me and guide me. Pull me out of the net which they have secretly laid for me, for You are my strength. In Your hand I commit my spirit; You have redeemed me, O Lord God of truth. I have hated those who regard useless idols, but I trust in the Lord. I will be glad and rejoice in Your mercy, for You have considered my trouble; You have known my soul in adversities, and have not shut me up into the hand of the enemy. You have set my feet in a wide place. Have mercy on me, O Lord, for I am in trouble; my eye wastes away with grief, yes, my soul and my body. For my life is spent with grief and my years with sighing; my strength fails because of my iniquity, and my bones waste away. I am a reproach among all my enemies, but especially among my neighbors, and am repulsive to my acquaintances; those who see me outside flee from me. I am forgotten like a dead man, out of mind; I am like a broken vessel. For I hear the slander of many; fear is on every side; while they take counsel together against me, they scheme to take away my life. But as for me, I trust in You, O Lord; I say, \"You are my God.\" My times are in Your hand; deliver me from the hand of my enemies, and from those who persecute me. Make Your face shine upon Your servant; save me for Your mercies' sake. Do not let me be ashamed, O Lord, for I have called upon You; let the wicked be ashamed; let them be silent in the grave. Let the lying lips be put to silence, which speak insolent things proudly and contemptuously against the righteous. Oh, how great is Your goodness, which You have laid up for those who fear You, which You have prepared for those who trust in You in the presence of the sons of men! You shall hide them in the secret place of Your presence from the plots of men; You shall keep them secretly in a pavilion from the strife of tongues. Blessed be the Lord, for He has shown me His marvelous kindness in a strong city! For I said in my haste, \"I am cut off from before Your eyes\"; nevertheless You heard the voice of my supplications when I cried out to You. Oh, love the Lord, all you His saints! For the Lord preserves the faithful, and fully repays the proud person. Be of good courage, and He shall strengthen your heart, all you who hope in the Lord.*\n\n## The Theme: God Is Reliably Faithful\n\nThis song, as it is with a lot of the songs, is the result of suffering in the life of the believer. In this case, the suffering of the life of David. It's impossible to identify exactly what David is talking about because he experienced quite a bit of his life. He couldn't be describing just one moment in time—we get the impression it's more than just a moment, because as you remember reading it he said that his life is full of suffering, that his years are full of sighing. So I think he's not identifying one particular time of his life but something he was very acquainted with: suffering in his life.\n\nNow we often read the Bible thinking that it's not about our reality. We sometimes have this idea—not thought through, but present—that the Bible is about some other reality, that it's about the past, that things are not like that anymore. We are often tempted with the idea that it doesn't really include all the experiences of living in this world, a world broken down and full of sin, and if we're going to be honest, a world in which life sometimes stinks. This is especially true of the way that we think of suffering.\n\nAs we look at Psalm 31, these ideas will be challenged. The Bible speaks about and to all kinds of suffering, including whatever it is that you may be going through, whatever it is you may have gone through, whatever it is you are going to go through in life.\n\nThe theme of this Psalm is this: **God is reliably faithful and thus can be trusted to deliver His servant.** Not very poetic—the Psalm is poetic, my expression of the theme is not—but it does the job.\n\nJesus appropriates this Psalm for Himself in the New Testament. The last thing He says from the cross is verse 5. Luke 23:46 says: \"When Jesus had cried out with a loud voice, He said, 'Father, into Your hands I commit My spirit.' Having said this, He breathed His last.\" Jesus understood that God remained faithful to Him even in the midst of the deepest suffering. That's what He does by quoting that verse—He makes this Psalm about Him, about His experience. He also understood that God was going to deliver Him even if through death, which Hebrews 2 says is exactly what God did.\n\n## The Suffering of the Psalmist\n\nNotice that David is suffering at the hands of his enemies. In verse 4, it says, \"Pull me out of the net which they have secretly laid for me.\" So he is suffering at the hands of people who are out to get him.\n\nBut the suffering is also internal and chronic—not just people out there, but something going on in him. In verses 9-10 he says, \"Have mercy on me, O Lord, for I am in trouble. My eye wastes away with grief\"—have you ever cried so much that your eyes kind of feel like they're shrinking, swollen so much you can barely open them? That's the expression of the Psalmist. \"Yes, my soul and my body, for my life is spent with grief and my years with sighing.\"\n\nSuffering is usually complex. It's not usually a simple thing. It's not usually explained by just one factor. Sometimes we think, \"Oh, if only this thing were removed, I will stop suffering.\" But then that thing is removed and you don't experience the relief you thought you would, because there are other factors.\n\nI want you to notice the honest assessment of the Psalmist concerning his sin. In verse 10, he says some of his suffering is there because of his own sin: \"My strength fails because of my iniquity.\"\n\nHe also says that some of the suffering is there because of his obedience to the Lord. In verse 6, he says, \"I have hated those who regard useless idols, but I trust in the Lord.\" The implication is that enemies persecute him because of his faithfulness.\n\nAnd some of the suffering is because of the sins of others. In verse 13: \"For I hear the slander of many; fear is on every side; while they take counsel together against me, they scheme to take away my life.\"\n\nYou can see the complexity of suffering. David is pre-honest about that. Yes, some of the suffering is from his sins, some is from his righteousness, some is from the sins of other people. David doesn't come to the Lord and say, \"Look, Lord, I'm perfect, I've done all these things right, You owe me deliverance.\" He comes acknowledging both his obedience and his failures. That's not why he's asking for deliverance.\n\n## What David Knows About God\n\nSo in his suffering he seeks deliverance from the Lord. Look at what he says in verses 1-2: \"In you, O Lord, I put my trust. Let me never be ashamed. Deliver me in Your righteousness. Bow down Your ear to me, deliver me speedily, be my rock of refuge, a fortress of defense to save me.\"\n\nWhy is David turning to God for deliverance? What is it that he knows about God that causes him to look to the Lord at this time of chronic suffering?\n\nLet's look at some things out of Psalm 31 that tell us what David knows about God that gives him the courage to turn to God for deliverance.\n\n**Verse 2 and 3**: God is a rock of refuge and fortress. This idea is a stronghold, a place of safety. It reminds me of Masada, the Jewish fortress in the first century, the famous one where Jewish rebels were able to withstand Roman attacks for years because it was impregnable—built upon a rock. That's the idea here. He's confident in coming to the Lord to deliver him from the suffering because God is that kind of safe place.\n\n**Verse 7**: \"For You have considered my trouble; You have known my soul in adversities.\" God is not like when you've called a bank or an airline and you are not a man and not a service—I mean not a human and not a person—you give all that information to the computer, and then when you find a way to talk to somebody, you have to give all that information again because they haven't heard anything you said to the computer. God is not like that. He already knows all that you have been going through. So you can come confidently to Him.\n\n**Verse 8**: \"And have not shut me up into the hand of the enemy. You have set my feet in a wide place.\" David goes to God because God has delivered him in the past and preserved him. Have you ever watched Survivor? In Survivor you have all these challenges where you're supposed to stand in a really narrow place—it's hard to stand in after a few minutes. God says that when He rescues us, He puts us in a wide place. We stand; we don't have to just balance and wonder if we're going to stay safe.\n\nDavid had experience in the past with God that encourages him to go and talk to God about the current suffering. God provides the ability and the conditions for the believer to thrive—even in the midst of suffering. First Corinthians 10:13 says that God is going to give you grace to bear under the struggle, not to come out of the struggle, but to bear under it. So we can even thrive in the struggle.\n\n**Verse 14**: \"But as for me, I trust in You, O Lord; I say, 'You are my God.'\" There is a covenant element here and also in the plea for God to answer for His name's sake (v. 3) and for His mercy's sake (v. 16). God has made a covenant with His people. Not based on us, but based on Him—and because He never changes, His covenant with us never changes.\n\n**Verse 19**: \"Oh, how great is Your goodness.\" David knows that God is good. **Verse 21**: He knows that God is kind. **Verse 22**: He knows that God hears his prayers. **Verse 24**: He knows that God is faithful to the faithful. God strengthens those who hope in Him—that's the theme of Psalms 42-43 as well: \"Why are you cast down, O my soul? Hope in God.\"\n\nHe goes to God because He knows that God will vindicate His people. Verses 19-20: \"Oh, how great is Your goodness, which You have laid up for those who fear You, which You have prepared for those who trust in You in the presence of the sons of men! You shall hide them in the secret place of Your presence from the plots of men; You shall keep them secretly in a pavilion from the strife of tongues.\"\n\nSometimes God vindicates His people in this life; He is absolutely going to vindicate everyone in the life to come. We don't have to worry about seeking vengeance because God is going to avenge us—He is the ultimate avenger of all His people. As Paul says in Romans 12:19-21, don't seek to avenge yourself, return good for evil, let God be the one that avenges you.\n\n## The Deliverance\n\nWe see that the outcome of his cry to the Lord is deliverance. Verses 21-22: \"Blessed be the Lord, for He has shown me His marvelous kindness in a strong city! For I said in my haste, 'I am cut off from before Your eyes'; nevertheless You heard the voice of my supplications when I cried out to You.\"\n\nI hope you understand that pretty much every Psalm is written after the fact. What I mean by that is: David is not running from Absalom and writing a song. When everything has happened, then he writes, thinking back. With every single Psalm except Psalm 88, he writes after there's a resolution to the problem. By the time he sat down to write Psalm 31, he had already experienced the deliverance from the Lord.\n\nAnd it's interesting that in his case, deliverance didn't come until he was almost in despair—see that in verse 22: \"For I said in my haste, 'I am cut off from before Your eyes.'\" He thought God hadn't heard his prayers. He thought that because the suffering didn't stop, God hadn't heard him. We often commit that mistake. We think that because things haven't changed, because we're still suffering, God somehow hasn't heard us.\n\nGod never gives up. And often suffering is the means He uses for us to see Him more clearly. This is my experience and the experience of the saints in history. I read a lot; I like reading history. I've never read the testimony of a saint who said, \"When things were great, when life was like a bed of roses, I grew by leaps and bounds in the Lord.\" The testimony—and Hebrews 12 says this—is that as you're going through it, it's never pleasant, but afterwards it yields the fruit of righteousness. In times of suffering I have grown to know the Lord.\n\nThe deliverance doesn't have to be just a ceasing of suffering; a growth in the Lord is itself the deliverance. Hebrews 13:5: \"He Himself has said, 'I will never leave you nor forsake you.'\" So we may boldly say, \"The Lord is my helper; I will not fear. What can man do to me?\" That's the promise of the Lord.\n\n## Using the Comfort to Encourage Others\n\nWhen David has his eyes opened and sees that even in his suffering God is delivering him, he receives that comfort from the Lord—and he uses that encouragement to encourage others.\n\nVerse 24: \"Be of good courage, and He shall strengthen your heart, all you who hope in the Lord.\"\n\nHe learned from the Lord and uses that to encourage each other. Paul says the same thing in 2 Corinthians 1:3-4: \"You are going through stuff in your life so that you can be comforted by God, and then in turn, take whatever comfort you got from God and minister that comfort to others in their time of struggle.\"\n\nA lot of times that's what suffering does for us—it prepares us to minister to other people. Whatever help, whatever comfort, every encouragement we receive from the Lord through His people, through the Word, through whatever—now we use it. We've been trained in the school of suffering, we're ready to go comfort and encourage others.\n\n## Conclusion\n\nSuffering is real. I don't think there's anybody in this room who would deny that. Suffering is real, and so is what the Bible says about it. May we learn from the suffering of our brother David that we too may be comforted by our God through that, and in turn, be used by God to comfort others who are going through their trials in their lives.\n\n*Father, thank You that Your word is so clear, so helpful, so powerful. We pray that tonight it would penetrate into the deepest part of our hearts, that it would remove any unbelief from our hearts, help us to grow in faith. We pray that You encourage us and enable us to encourage others. In Jesus' name.*"};
