window.LESSON_DATA = {"id": "2024-07-28-gods-unwelcomed-command", "title": "God's Unwelcomed Command", "speaker": "Pastor Tito Lyro", "date": "2024-07-28", "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["7-28-24 -AM- God's Unwelcomed Command - James 5_1-12 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/7-28-24-am-gods-unwelcomed-command-james-5_1-12-pastor-tito-lyro", "tags": [{"tag": "patience", "source": "detected"}, {"tag": "suffering", "source": "detected"}, {"tag": "perseverance", "source": "detected"}, {"tag": "second coming", "source": "detected"}, {"tag": "sin", "source": "detected"}, {"tag": "obedience", "source": "detected"}, {"tag": "prophets", "source": "detected"}], "scripture_references": [{"reference": "James 5:1-12", "type": "quoted", "source": "detected"}, {"reference": "James 1:6", "type": "referenced", "source": "detected"}, {"reference": "2 Peter 3:4", "type": "quoted", "source": "detected"}, {"reference": "1 Corinthians 13:4", "type": "quoted", "source": "detected"}, {"reference": "1 Thessalonians 5:14", "type": "quoted", "source": "detected"}, {"reference": "Philippians 2:14", "type": "referenced", "source": "detected"}, {"reference": "Galatians 5:17-26", "type": "quoted", "source": "detected"}, {"reference": "Romans 4:18", "type": "referenced", "source": "detected"}, {"reference": "1 Corinthians 10:11", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: An Unwelcomed Command", "subpoints": ["The joke of praying for patience — \"Lord, give me patience, and give it now\"", "Being commanded to wait feels unnatural, especially in affliction", "Thesis: God's command to be patient is not unwelcome because it comes from Christ, whose yoke is easy"], "scripture": ["James 5:7-12"]}, {"title": "The Command Itself: Be Patient", "subpoints": ["Verse 7: This is a command, not a suggestion — God orders his people to be patient", "Context: verses 1–6 describe unjust oppression by wealthy unbelievers in the congregation", "Patience is linked to the assembly of God's people — implies patience with one another as well", "Definition: two sides — waiting (not retaliating) and enduring (persevering under affliction)", "Patience as an attribute of God himself (2 Peter 3:4)", "Patience as a characteristic of godly love (1 Corinthians 13:4)"], "scripture": ["James 5:7", "2 Peter 3:4", "1 Corinthians 13:4"]}, {"title": "Subordinate Commands: How to Practice Patience", "subpoints": ["Establish/strengthen your hearts (v. 8) — by trusting the Lord (James 1:6)", "Strengthen through ordinary means of grace: Bible reading, preaching, prayer, sacraments, fellowship", "Walk in the Spirit — patience is a fruit of the Spirit (Galatians 5:22)", "Do not grumble against one another (v. 9) — grumbling is retaliation; it is rendering evil for evil", "Receive the example of the prophets (v. 10) — take the recorded saints seriously", "Do not swear (v. 12) — establish yourself as a truth-teller so manipulation is unnecessary"], "scripture": ["James 5:8-12", "Galatians 5:22-26", "1 Thessalonians 5:14-15"]}, {"title": "Illustrations of Patience", "subpoints": ["The farmer (v. 7): waits patiently for rain after doing all he can; we may not see fruit until the Lord returns", "The prophets (vv. 10-11): we name our children after them and admire their endurance — we too are blessed to practice patience", "Job (v. 11): an example of enduring under affliction; he ran to God, not from him; he never denied his faith"], "scripture": ["James 5:7", "James 5:10-11"]}, {"title": "Motivation: The Lord Is Coming", "subpoints": ["The return of Christ is the great motivator for patience (vv. 7-9, 12)", "John Calvin: \"The confusion of things will not be perpetual because the Lord at his coming will reduce things to order\"", "Christ as Lord of Sabbath will vindicate the oppressed — you do not need to avenge yourself", "First coming redeemed us; second coming will finalize our transformation into his image"], "scripture": ["James 5:7-9"]}], "summary": "Pastor Lyro preaches from James 5:1-12, arguing that God's command to be patient — though it initially feels unwelcome — is in fact a light and easy command that comes from the Lord Jesus Christ himself. He works through verses 7-12, where James commands patience in the context of unjust affliction from wealthy oppressors, defining patience as a two-sided virtue: a waiting side (not retaliating or changing behavior to punish others) and an endurance side (persevering faithfully under pressure). The sermon surveys the subordinate commands that explain how patience is practiced: strengthening the heart through trust in Christ and the ordinary means of grace, avoiding grumbling (which is a form of retaliation and renders the Christian liable to judgment), receiving the example of the biblical prophets, and establishing oneself as a truth-teller rather than resorting to oath-swearing manipulation. Three illustrations ground the teaching — the farmer who must wait after he has done all he can, the prophets whom we admire precisely because they endured under affliction, and Job, who ran to God rather than from him. The sermon closes by presenting the imminent return of Christ as the supreme motivation for patience: at his coming, every wrong will be set right, making self-vindication both unnecessary and faithless.", "transcript": "## Scripture Reading: James 5:1-12\n\nIf you're able, would you remain standing as we read God's Word out of James chapter five? James chapter five, verses one through twelve. This is the word of our Lord.\n\nCome now, you rich, weep and howl for your miseries that are coming upon you. Your riches are corrupted and your garments are moth-eaten. Your gold and silver are corroded and their corrosion will be a witness against you, and will eat your flesh like fire. You have heaped up treasure in the last days. Indeed, the wages of the laborers who mowed your fields, which you kept back by fraud, cry out and the cries of the reapers have reached the ears of the Lord of Sabbath. You have lived on the earth in pleasure and luxury, you have fattened your hearts as in a day of slaughter. You have condemned, you have murdered the just; he does not resist you.\n\nTherefore be patient, brethren, until the coming of the Lord. See how the farmer waits for the precious fruit of the earth, waiting patiently for it until it receives the early and latter rain. You also be patient, establish your hearts, for the coming of the Lord is at hand. Do not grumble against one another, brethren, lest you be condemned. Behold the judge is standing at the door. My brethren, take the prophets who spoke in the name of the Lord as an example of suffering and patience. Indeed, we count them blessed who endure. You have heard of the perseverance of Job and seen the end intended by the Lord — that the Lord is very compassionate and merciful. But above all, my brethren, do not swear, either by heaven or by earth or with any other oath, but let your yes be yes and your no be no, lest you fall into judgment. This is the word of our Lord.\n\n## Introduction: An Unwelcomed Command\n\nI think we all have heard the joke of the guy who prays for patience and he prays like this: Lord, give me patience — and give it now. Being told to be patient is not something that we like to hear, especially in times of affliction. To be told to wait, to be told that it is not now, to be told that waiting is something good for us — it's not something that's natural for us. It's not what we want. We want resolution now. We want relief now. So when God tells us to be patient, we think it is an unwelcome command.\n\nWhat I want us to see today is that we should not think of God's command to be patient as an unwelcome command, because that command comes from Jesus Christ, whose yoke is light and whose burden is easy. We're going to do that by looking at the command itself, by considering the examples James gives us, and by looking at the motivation that James gives to us in this passage.\n\n## The Command: Be Patient\n\nStart with verse 7. The command itself in verse 7 is: be patient. This is really the first thing we need to note. It is a command. It's an order. God is telling us what to do. It's not a suggestion. It's not good advice. It's not an option among many. God wants his people to be patient. And he wants that because it brings glory to him and is good for us.\n\nNotice that the command to be patient is linked to the previous paragraph by the word \"therefore\" in verse 7. The previous paragraph informs us that God calls us to be patient in the context of unjust afflictions, especially at the hands of unbelievers. The verses 1-6 describe wealthy people who seem to have been unbelievers even though they were part of the congregation to which James originally wrote.\n\nNotice also that James was writing early enough in church history that by the time James was written, Christians had not yet left the synagogue. The place of worship was the synagogue. So you have Christians and non-believing Jews in the audience — we know that because in James 2:2 the term translated \"assembly\" is the term for synagogue. So you have a mixed audience, and James is writing to them.\n\nIt is in this context of affliction — the context of suffering, the context of things not going well — that the Holy Spirit commands us to be patient. But it's also in the context of the assembly of God's people, which implies that we're to be patient with one another in the house of the Lord as well.\n\n## Defining Patience\n\nWe've been talking about patience but we haven't yet defined it. Jay Adams says that patience is two-sided. There is an endurance side to patience, and there is a waiting side to patience. The command itself in verse 7 uses the word for the waiting side of patience. Yet later on in verse 11, James also uses the word for endurance to exemplify how we practice patience. So our passage speaks of both sides — the endurance side and the waiting side.\n\nSo we are committed to be patient — to wait. That is, not retaliating. We are committed to wait — not reacting. We are committed to wait — not changing the way we act toward someone in order to punish them. That's all part of waiting, all part of practicing patience. At the same time, we endure.\n\nPatience is the ability to wait for the Lord to do what he is going to do. And brothers and sisters, patience is a characteristic of God. In 2 Peter 3:4, Peter says, the Lord is not slow to fulfill his promise as some count slowness, but is patient toward you, not wishing that any should perish but that all should reach repentance.\n\nPatience is also a characteristic of godly love. In 1 Corinthians 13:4, Paul says, love is patient and kind. It is important to notice this pairing — patience and kindness go hand in hand. Where patience is present, kindness will also be present, and vice versa.\n\n## Subordinate Commands: How to Be Patient\n\nThe Holy Spirit expresses the main command to be patient in terms of other commands that are subordinate — explaining how we are patient, how we exercise patience.\n\nFirst, in verse 8: establish your hearts — literally, strengthen your hearts. How do we strengthen our hearts unto patience? We do that first and foremost by trusting in the Lord (James 1:6). We will only be able to wait for the Lord if we believe in who he says he is and what he says he is going to do. Secondly, we strengthen our hearts through the ordinary means of grace — reading the Bible, thoughtfully attending to the preaching of his Word, prayer, thoughtfully participating in the sacraments, fellowshiping with the body of Christ. And walking in the Spirit strengthens our heart. Patience is a fruit of the Spirit. In Galatians 5:17-26, Paul says, walk by the Spirit and you will not gratify the desires of the flesh, and then lists patience among the fruit of the Spirit.\n\nNext, in verse 9: do not grumble against one another. Complaining, especially about each other in the church, is the opposite of patience. When we're suffering, when things are not going the way we want, when people are getting in the way, we tend to complain, to grumble, to murmur. Patience is the opposite of retaliation, and grumbling is retaliation. It's getting back at someone. See that no one renders evil for evil to anyone (1 Thessalonians 5:15). And why is grumbling so serious? Because unhelpful criticism of one another puts us in danger of judgment. The judge stands at the door (v. 9).\n\nThen in verse 10: receive the example of the prophets. Paul tells us in 1 Corinthians 10:11 that the saints recorded in the Bible were written down for our instruction. James says, do you want to learn patience? Look at the prophets — they'll teach you.\n\nAnd verse 12: do not swear. This is not about bad language but about taking oaths so people will believe what you say. James is saying, when you're in affliction, when you're in a hurry for people to believe what you're saying, when you want to just get the problem solved — don't try to manipulate others with your words. Instead, establish yourself as a person who speaks the truth always. Let your yes be yes and your no be no. Part of being patient is being truthful in our speech and not trying to manipulate others for our own benefit.\n\n## Illustrations of Patience\n\nJames gives us three illustrations to help us understand what patience looks like.\n\nFirst, the farmer (v. 7). The farmer waits for the precious fruit of the earth, waiting patiently for it until it receives the early and latter rain. After he has done what he could, he must wait for things completely out of his control. The farmer teaches us two things: we are called to patience even when outcomes are uncertain and don't depend on us, and the final harvest of all that we have sown will not come until the Lord returns. We may never see one fruit of our work in this life.\n\nSecond, the prophets (vv. 10-11). James says we count the prophets blessed for having patiently endured hardships because of the Lord. We tell their stories. We name our kids after them. Yet we don't want to practice what they practiced. James is perhaps saying: you think that was good for them, but you don't think it's good for you? Learn from the prophets. Those who seek to bear the Lord's name faithfully will be afflicted, and like the prophets, we are to be patient in those afflictions.\n\nThird, Job (v. 11). Job is not an example of patiently waiting for the Lord — that's not Job. But here's an example of enduring under affliction. And we should be very thankful for Job's example, because Job is just like us. He started well, but as pressure increased, he started complaining, even thought he could take God to court. But at no time did Job deny his faith, run away from God, or discredit God. In his affliction, he ran to God, not away from God, and patiently endured. And brothers and sisters, as we practice patience, we will experience the same thing Job experienced — that God is merciful and compassionate, because that is who he is.\n\n## Motivation: The Lord Is Coming\n\nJames also gives us a motivation to be patient: the Lord Jesus is coming back (vv. 7, 8, 9, 12). If you're being unjustly treated, be patient. Because the Lord will vindicate you at his coming. John Calvin says, the confusion of things which is now seen in the world will not be perpetual, because the Lord at his coming will reduce things to order. The solution for everything is that the Lord is coming back, and all things will be made right.\n\nThe Lord Jesus Christ — referred to as the Lord of Sabbath, the Lord of Heaven's armies — is coming back, and he will take care of all the wrongs committed against you. So you don't have to avenge yourself, which allows you to be patient. The fact that our Lord is coming back for us motivates us to act righteously and selflessly now, of which patience is the fruit. And the fact that we will have to see him face to face and give an account for every time we lost our patience motivates us to be patient.\n\nSo at first glance, we look at this command to be patient as an unwelcome command. Yet when we consider that every act of patience is a blessing, that every act of impatience is judged by the Lord, that obedient patience is a display of God himself in our lives, and that the Lord will honor our patience at his return — then we start to realize that this command is not unwelcome after all. Rather, it is light and easy, because it comes from the Lord Jesus Christ himself, whose yoke is light and whose burden is easy. Let us pray together. Father, thank you for your Word. Enable us to be patient people, people who wait for what you are going to do — and that we do that in the context of relationships. In Jesus' name. Amen."};
