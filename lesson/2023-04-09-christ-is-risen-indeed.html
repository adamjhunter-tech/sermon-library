window.LESSON_DATA = {"id": "2023-04-09-christ-is-risen-indeed", "title": "Christ Is Risen Indeed", "speaker": "Pastor Tito Lyro", "date": "2023-04-09", "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["04-09-23 - Christ is Risen Indeed - 1 Corinthians 15_12-28 - Pastor Tito Lyro.txt"], "tags": [{"tag": "resurrection", "source": "detected"}, {"tag": "Easter", "source": "detected"}, {"tag": "gospel", "source": "detected"}, {"tag": "hope", "source": "detected"}, {"tag": "Christology", "source": "detected"}, {"tag": "glorification", "source": "detected"}], "scripture_references": [{"reference": "1 Corinthians 15:12-28", "type": "quoted", "source": "detected"}, {"reference": "2 Corinthians 4:17", "type": "referenced", "source": "detected"}, {"reference": "1 Timothy 1:20", "type": "referenced", "source": "detected"}, {"reference": "Revelation 7:9-10", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Centrality and Contested Nature of the Resurrection", "subpoints": ["Every Lord's Day is a resurrection celebration — we meet on the first day of the week because Christ rose on the first day; the resurrection established the new-covenant Sabbath", "The bodily resurrection is pivotal: without it, Christianity collapses; it has been attacked from the very beginning (teachers in the Corinthian church were denying it just 10-12 years after Paul founded the church)", "Paul's warning to Timothy (2 Timothy 2): men like Hymenaeus and Philetus were saying the resurrection had already passed, spreading like cancer and overthrowing the faith of some"], "scripture": ["1 Corinthians 15:12"]}, {"title": "1. Denial of the Resurrection Destroys the Gospel", "subpoints": ["Paul's logic: if God cannot raise people at the last day, he could not raise Christ; if Christ is not raised, preaching is empty, faith is empty, we are false witnesses, sins are not forgiven, those who have died in Christ have perished", "Verse 17: 'if Christ is not risen, your faith is futile; you are still in your sins' — no forgiveness, no reconciliation, no peace with God", "Verse 18: 'those who have fallen asleep in Christ have perished' — everyone who trusted Christ and died is simply dead", "Verse 19: 'if in this life only we have hope in Christ, we are of all men the most pitiable' — the Christian life, which involves self-denial and war against sin, is not worth it if there is no resurrection"], "scripture": ["1 Corinthians 15:12-19"]}, {"title": "2. Four Theories and Why They Fail", "subpoints": ["Enemies hid the body: if so, they would have produced it when the disciples preached the resurrection — they never did", "Disciples stole the body (what the Jewish elders told the soldiers to say): people do not die for something they know is a lie; every apostle gave his life for the claim that Jesus rose", "Swoon theory: Jesus merely fainted, recovered in the cool tomb, and walked out — requires believing a spear through the heart, a scourging, and crucifixion were survived with no treatment", "Spiritual-only resurrection: Jesus lives 'in us' but not bodily — contradicted by the NT's explicit emphasis on the physical body: the empty tomb, Jesus eating fish, the nail wounds"], "scripture": []}, {"title": "3. But Now Christ Is Risen (v.20-28)", "subpoints": ["Verse 20: 'But now Christ is risen from the dead and has become the first fruits of those who have fallen asleep' — the two beautiful words 'but now' cut through all the logic of unbelief", "First fruits point to the full harvest: the resurrection of Christ is not the end result but the first of a harvest that cannot be counted — Revelation 7:9, a multitude from every nation standing before the Lamb", "Adam-Christ parallel (vv.21-22): by one man came death, by one man came the resurrection of the dead; in Adam all die, in Christ all shall be made alive — the two representative men", "The defeat of the last enemy: Christ reigns until every enemy is under his feet; the last enemy destroyed is death (v.26); the resurrection of Christ inaugurated the history of death's defeat", "The resurrection of Christ gives meaning to all suffering — 2 Corinthians 4:17: 'our light and momentary troubles are achieving for us an eternal glory that far outweighs them all'"], "scripture": ["1 Corinthians 15:20-28", "2 Corinthians 4:17"]}], "summary": "An Easter Sunday sermon on 1 Corinthians 15:12-28. Every Lord's Day is a resurrection celebration; Easter is not uniquely special — we meet weekly because Christ rose weekly. Paul's letter addresses teachers in Corinth who were denying the bodily resurrection, a denial that has continued in every era. The sermon works through Paul's ironclad logic: to deny the resurrection is to deny the gospel itself — if Christ is not raised, preaching is empty, sins are unforgiven, the dead in Christ have perished, and the Christian life is not worth living (v.19). Four alternative theories (enemies hid the body; disciples stole it; Jesus swooned; the resurrection was merely spiritual) are examined and dismissed. Verse 20 pivots everything: 'But now Christ is risen.' He is the first fruits of an uncountable harvest (Revelation 7:9). The Adam-Christ parallel (vv.21-22) grounds the resurrection in federal theology. Death is the last enemy, already defeated in Christ's rising and to be finally destroyed at the last day. The resurrection gives every suffering meaning — 'our light and momentary troubles are achieving for us an eternal glory that far outweighs them all' (2 Corinthians 4:17).", "transcript": "## Introduction\n\nIt is great that we take a special day to remember the resurrection of the Lord Jesus Christ. But every Lord's Day — every Sunday that we meet — we meet to celebrate the resurrection of Christ. That is the very reason we meet on the first day of the week: because our Lord came back to life on the first day. From creation through to the resurrection of Christ, God's people met to worship on the last day of the week. But the Lord Jesus Christ rising on the first day gave us the new day of worship, the new-covenant Sabbath, on which we come together to celebrate because of the resurrection.\n\nThe bodily, real, physical resurrection of Christ and the resurrection of believers are pivotal doctrines of the Christian faith. Without them, everything falls apart. There is no Christianity apart from a real Savior who really came to life.\n\nBecause of its centrality, this doctrine has been attacked from the very beginning. The passage we read this morning was written because teachers in the Corinthian church — just a few years after Paul established it — were teaching that there was no such thing as the bodily resurrection. And 10 to 12 years later, Paul writes to Timothy and says that men like Hymenaeus and Philetas were saying the resurrection was already past — their message was 'spreading like cancer' and overthrowing the faith of some.\n\n## 1. Denial of the Resurrection Destroys the Gospel\n\nPaul presents the logic of unbelief in verses 12 through 19 with devastating clarity.\n\nIf it is impossible for God to raise his people in the future, then it was impossible for him to raise anyone at any time — including Christ. If God cannot do something tomorrow, he cannot do it today either.\n\nVerse 13: if there is no resurrection, Christ is not risen.\nVerse 14: if Christ is not risen, preaching is empty and your faith is empty.\nVerse 15: we are found to be false witnesses of God.\nVerse 17: if Christ is not risen, your faith is futile — you are still in your sins.\nVerse 18: those who have died in Christ have simply perished.\nVerse 19: if in this life only we have hope in Christ, we are of all men the most pitiable.\n\nLet's be honest about verse 19. The Christian life involves self-denial. War against the world, the flesh, and the devil. If this life is all there is, the Christian life is not worth it. You might as well eat, drink, and be merry. If there is no resurrection, close the doors, sell the property, and go enjoy whatever the world offers. It is not worth it without eternity.\n\nAnd to deny the resurrection is to deny that there is any meaning to suffering. Every child with cancer means nothing. Every chronic disease means nothing. Every betrayal, every abuse — meaningless. The joys of this life are only joyful because they point to eternal joy at the right hand of the Father. Remove the resurrection and you remove the meaning from everything.\n\n## 2. Four Alternative Theories\n\nThe empty tomb is an undeniable historical fact. No one of consequence disputes it. The debate is only about why it was empty.\n\nFirst theory: the enemies hid the body, to prevent the disciples from worshipping at the tomb. Problem: when the disciples started preaching the resurrection, the enemies had every incentive in the world to produce the body. They never did.\n\nSecond theory: the disciples stole the body. This is actually the explanation the Jewish elders told the Roman soldiers to spread (Matthew 28:13). Problem: people do not die for something they know is a lie. Every one of the apostles gave his life for the claim that Christ had risen from the dead.\n\nThird theory: the swoon theory — Jesus merely lost consciousness, revived in the cool tomb, and walked out. This requires believing that a man who received a spear through the heart, was scourged within an inch of his life, and had nails driven through his hands and feet — somehow, without any medical attention, in a sealed tomb — recovered enough to roll away a massive stone from the inside and overpower the guards.\n\nFourth theory — the most popular modern version: the resurrection was spiritual, not physical. Jesus lives in us, in our memories, in his teachings, but not bodily. This flatly contradicts what the NT actually says: the tomb was empty, Jesus ate broiled fish, the disciples touched his wounds, he appeared to five hundred people at once.\n\nAll four theories require more faith than the biblical account.\n\n## 3. But Now Christ Is Risen\n\nVerse 20. Those two words: *but now.*\n\n*But now Christ is risen from the dead, and has become the first fruits of those who have fallen asleep.*\n\nThe world in which Christ did not rise is the fairy-tale world. It is the believers — those who hold to the risen Christ on the basis of the evidence — who are living in reality. Those who deny it are the ones in the land of make-believe.\n\nChrist is the first fruits. The first fruits in the agricultural calendar pointed to the upcoming harvest. He is not the end result; he is the beginning of a harvest that Revelation 7:9 describes as a multitude no one could number — from every nation, tribe, people, and tongue — standing before the throne and before the Lamb, crying out: *Salvation belongs to our God who sits on the throne, and to the Lamb.*\n\nIf you are a believer, this is your story. You will be there. In the flesh. Seeing the Lamb. Singing to him. That is where history is heading.\n\nVerse 21: by man came death; by man also came the resurrection. In Adam all die — Adam represents the whole of humanity. In Christ all shall be made alive — Christ represents all who are his, all who are united to him by faith. The last enemy to be destroyed is death (v.26). Christ reigns until every enemy is under his feet. The resurrection of Christ inaugurated the final chapter: the defeat of death. Every faithful death since is a battle won. The final victory is still coming.\n\nAnd because of the resurrection, whatever you are facing right now has meaning. Paul says it from prison, from shipwreck, from beatings: 'our light and momentary troubles are achieving for us an eternal glory that far outweighs them all.' Whatever the struggle is — it is temporary. It is preparing you for eternity with God. The experience of joy that is eternal, with him.\n\nBrothers and sisters — Christ is risen. And because he lives, we shall live also.\n\nFather, thank you that you are the God who raised our Savior from the dead, and because he lives, so shall we. Help this truth to grow in us and to make us more like him. In the name of the risen Christ, amen.", "soundcloud_url": "https://soundcloud.com/olympiabp/04-09-23-christ-is-risen-indeed-1-corinthians-15_12-28-pastor-tito-lyro"};
