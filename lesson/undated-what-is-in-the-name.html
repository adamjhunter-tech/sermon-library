his glory; everything God reveals himself by must be honored and loved"], "scripture": ["Malachi 1:6-7", "Hosea 12:5"]}], "summary": "Preaching from Hosea 12:5 — 'The Lord is his memorable name' — Pastor Tito Lyro explores what it means that God's personal name is Yahweh, translated 'He is.' The sermon unpacks the attributes encoded in this name: God's ever-present existence, his unchangeableness, his aseity (self-existence), and his faithfulness across every generation. Because God 'always is,' he has no needs, is never surprised, and never changes what he expects of his people — a striking contrast to the unpredictable gods of the ancient Near East.\n\nThe name Yahweh belongs to the whole Trinity — Father, Son, and Holy Spirit — and whenever the Old Testament declares 'LORD,' the entire triune God is present. The sermon draws a connecting line from Exodus 3:14-15 ('I AM who I AM') through Hosea 12:5 to John 8:58, where Jesus declares 'Before Abraham was, I AM,' a claim so clear that his hearers immediately reached for stones. Jesus is the ultimate revelation of the divine name, and to know Yahweh one must know Jesus Christ.\n\nThe sermon closes with the practical demand of the third commandment: to not take the Lord's name in vain is to honor everything by which God makes himself known — his Word, his worship, his creation, and his providence. The name of God is a representation of his glory, and all he reveals of himself calls for our love, honor, and obedience.", "transcript": "## Introduction: Something Is in a Name\n\nWe are going to consider one verse out of Hosea 12. We will read verses 2 through 6. Hosea chapter 12, starting in verse 2:\n\n*The Lord also brings a charge against Judah and will punish Jacob according to his ways. According to his deeds he will recompense him. He took his brother by the heel in the womb and in his strength he struggled with God. Yes, he struggled with the angel and prevailed. He wept and sought favor from him. He found him in Bethel and there he spoke to us. That is the Lord God of hosts. The Lord is his memorable name. So you, by the help of your God, return; observe mercy and justice and wait on your God continually.*\n\nWhat's in a name? Names used to mean something. And when that name is God's name, everything is in that name.\n\nVerse 5 tells us: *That is the Lord God of hosts. The Lord is his memorable name.* Hosea declares that the name of God — the God of the Bible — is Yahweh. 'God' is not his name; 'God' is a title. The title of Yahweh is that he is the God who created heaven and earth. His personal name, the one he chose to reveal himself by, is Yahweh. Grammatically it is a form of the verb 'to be.' It means 'He is.'\n\n## 1. Yahweh Means 'He Is'\n\nIn Exodus 3:14, God says to Moses: *I AM WHO I AM.* That is what you shall say to the children of Israel — 'I AM has sent me to you.' When you talk about God, you do not say 'I am' — you say 'He is.' That is his name.\n\nWhat does it mean for God to be 'He is'? It means he is ever-present. There is never a time when God was. There is never a time when God will be. God always is. Nothing surprises him. Everything is in the present for him. He is always present.\n\nThe fact that he is tells us he is unchanging. He always is. He does not become something else. Our God is a God who does not change — which has all kinds of significance for our Christian walk. We do not have to guess what God expects of us because he does not change. What he said is always the same.\n\nIn the ancient Near East this was a great joy, because every god of the nations did not let his people know what he expected. They would offer a sacrifice hoping that god would be pleased. If things went better, perhaps he liked that sacrifice. But then a flood came and everything was gone — so now what does he want? That is not our God. Our God is unchanging because he always is.\n\nBecause his name is Yahweh — 'He is' — he is self-existent. He is the only being that is self-existing. His name is not 'I am becoming.' His name is always 'is.' He exists in and of himself.\n\nNone of us are self-existing. As Paul said, quoting the Athenian philosophers and poets in Acts 17:28: *In God we live and move and have our being.* We are completely dependent on God. But God is self-existing. This is the doctrine of the aseity of God.\n\nThis name tells us that God does not need us. Some evangelistic material says, 'God really needs you.' To which God says, No thank you. I am fine without you. I did not need to create you. I did not need to create anything. I exist in and of myself. And yet he chose to create us and to love us — not because it brings more fulfillment to him, because God was perfectly happy in himself in his triune existence before he created anything. He had no needs — having needs is a sign of limitation. And yet he chose to create you and to love you, which goes beyond any benefit to himself.\n\nRemember what Jesus says about his church: 'I will build my church and the gates of hell will not prevail against it.' We see the church going through its fashion highs and lows. We see the United States apparently leaving Christianity. We see Europe living in a post-Christian age. And we think the church needs this and the church needs that. God says: No thank you. I am the self-existing God. I will build my church whether you are on board or not. We had better just get on board and go with him.\n\n## 2. God Is Faithful Because He Is\n\nThe fact that he is Yahweh tells us he is also faithful. Throughout the Old Testament, God is called Yahweh the God of Abraham, of Isaac, and of Jacob. That phrase is used when speaking to the people of God centuries after the patriarchs were gone. What is God saying when he says, 'I am the God of Abraham, the God of Isaac, the God of Jacob'? He is the God of the living and of the resurrection — but he is also the God who is faithful.\n\nThe primary promise he made to Abraham, Isaac, and Jacob was: 'I will be your God and you will be my people.' That remains for his faithful forever. That is the central promise of the new covenant. God is our God and we are his people. We tend to assume that is such a common, simple idea — but it is only true because God is faithful. He did not have to be our God. He did not have to make us his people. And yet he does, because he is the faithful God.\n\n## 3. The Name of the Trinity\n\nYahweh is the name of the Father, the Son, and the Holy Spirit. The Father is Yahweh. The Son is Yahweh. The Holy Spirit is Yahweh. When you see the word 'LORD' in capital letters in your Old Testament, do not think only of the Father. The whole Trinity is speaking there. The whole Trinity is present. Our triune God is present.\n\nIn the book of Hebrews, for example, several passages say that the Spirit said something — and when you go to the Old Testament, it is Yahweh speaking. Jesus attributes to himself things that Yahweh says. The Father does the same. So what is in the name? It is the name of the Trinity — the title of the triune God who saves his people. In Jesus' name every attribute of God is contained: his self-existence, his infinity, his eternity, his unchangeableness. He is.\n\n## 4. The Ultimate Revelation: Jesus\n\nThis passage draws back from Exodus chapter 3. In Exodus 3:14-15, God says to Moses: *I AM WHO I AM.* 'Thus you shall say to the children of Israel: I AM has sent me to you.' Moreover, God said, 'Thus you shall say to the children of Israel: the Lord God of your fathers, the God of Abraham, the God of Isaac, and the God of Jacob has sent me to you. This is my name forever and this is my memorial to all generations.' Those words echo Hosea 12:5 where his name is memorable — unforgettable.\n\nAnd that name is also Jesus. Remember Philippians chapter 2 — because the Lord Jesus Christ humbled himself, was crucified, God has exalted him and given him a name above every name, to which every knee will bow. Some will bow under the weight of his grace; some will bow under the weight of his judgment and wrath.\n\nIn the Gospel of John, Jesus says he is the I AM. We often speak of the seven I AM statements — but there are at least nine of them, including the ones in John chapter 8. 'I am the vine. I am the door. I am the good shepherd.' But the most significant is in John 8:58 where Jesus tells the Pharisees: *Before Abraham was, I AM.* In Greek: ego eimi. In Aramaic, almost the same as in Exodus 3:14. The Jews understood exactly what he was claiming, because they picked up stones to stone him — he was claiming to be Yahweh.\n\nThat is the ultimate revelation of the name of God — in Jesus. Do you want to know this God whose name is Yahweh? Know Jesus. There is no other way to know him than through the Lord Jesus Christ.\n\n## 5. Honoring the Name\n\nWe honor the name of God by honoring everything he reveals himself by — his creation, his Word, his providence, our own conscience — but most clearly in the Lord Jesus Christ, who is the ultimate I AM.\n\nRemember the third commandment: do not take the Lord's name in vain. Our catechism says that what this commandment forbids is the profaning or abusing of anything whereby God makes himself known. The name of God is in his worship. We honor God by worshiping him and worshiping him properly. Malachi says, 'If I am a father, where is my honor? If I am a master, where is my reverence?' — to the priests who despised his name by offering defiled food on the altar.\n\nGod's name is often equated with the Scriptures themselves. We honor him by honoring the Scriptures. And when we take the Lord's name in vain by our actions or words, we are desecrating his glory. Because his name is a representation of his glory.\n\nSo what is in the name? If that name is God's — everything. He is Yahweh: the self-existing, the faithful, the unchanging God who reveals himself ultimately through the Lord Jesus Christ. Every attribute of God is in that name. Let us honor and love and glorify everything that Yahweh is and everything by which he reveals himself — for asking in Jesus' name. Amen."};
