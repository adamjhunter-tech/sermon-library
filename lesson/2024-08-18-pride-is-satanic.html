window.LESSON_DATA = {"id": "2024-08-18-pride-is-satanic", "title": "Pride is Satanic", "speaker": "Pastor Tito Lyro", "date": "2024-08-18", "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["08-18-24 -PM- Pride is Satanic - Luke 9_46-48 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/08-18-24-pm-pride-is-satanic-luke-9_46-48-pastor-tito-lyro", "tags": [{"tag": "pride", "source": "detected"}, {"tag": "humility", "source": "detected"}, {"tag": "sin", "source": "detected"}, {"tag": "self-denial", "source": "detected"}, {"tag": "reconciliation", "source": "detected"}], "scripture_references": [{"reference": "Luke 9:46-48", "type": "quoted", "source": "detected"}, {"reference": "2 Timothy 3:2-5", "type": "referenced", "source": "detected"}, {"reference": "Proverbs 21:4", "type": "quoted", "source": "detected"}, {"reference": "Matthew 15:18-20", "type": "quoted", "source": "detected"}, {"reference": "1 John 2:16", "type": "quoted", "source": "detected"}, {"reference": "Proverbs 6:16-19", "type": "referenced", "source": "detected"}, {"reference": "Proverbs 16:5", "type": "quoted", "source": "detected"}, {"reference": "Proverbs 15:25", "type": "referenced", "source": "detected"}, {"reference": "2 Chronicles 32", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: Pride as the Root of All Relational Failure", "subpoints": ["Every relational issue — vertically with God and horizontally with others — is rooted in pride", "The temptation is to listen for someone else; resist it", "2 Timothy 3:2-5: the biggest problem is that we are lovers of ourselves, and pride and haughtiness are two manifestations of that", "Richard Rooker (Puritan): pride cleaves so fast to the heart that it is the very last and hardest sin to put off"], "scripture": ["Luke 9:46-48", "2 Timothy 3:2-5"]}, {"title": "The Bible's Verdict on Pride", "subpoints": ["Proverbs 21:4 — a haughty look, a proud heart, and the plowing of the wicked are sin", "Matthew 15:18-20 — pride is listed among the evil things that come from within and defile a man", "1 John 2:16 — the pride of life is not of the Father but of the world", "Proverbs 6:16-19 — the first of six things God hates is a proud look; the last is one who sows discord (proud look sows discord)", "Proverbs 16:5 — everyone proud in heart is an abomination to the Lord", "Proverbs 15:25 — the Lord will destroy the house of the proud", "\"God hates the sin and loves the sinner\" is false — sin exists only in the sinner, and apart from Christ's blood, God hates the person for it"], "scripture": ["Proverbs 21:4", "Matthew 15:18-20", "1 John 2:16", "Proverbs 16:5", "Proverbs 15:25"]}, {"title": "Pride Manifests in Self-Worship, Self-Pity, and Self-Loathing", "subpoints": ["Pride is not only arrogance — it also manifests in self-pity and self-loathing", "Self-deprecating comments are often a sign of pride — usually seeking validation from others", "What is called \"low self-esteem\" is usually pride: thinking you're not getting what you deserve"], "scripture": []}, {"title": "32 Manifestations of Pride (Diagnostic Tool)", "subpoints": ["1. Complaining against or passing judgment on God (Romans 9:20)", "2. Lack of gratitude (Hezekiah in 2 Chronicles 32 — his heart was lifted up; God's grace was unreciprocated)", "3. Anger (Proverbs — he who is of a proud heart stirs up strife)", "4. Seeing yourself as better than others (the Pharisee in Luke 7)", "5. Having an inflated view of your own importance, gifts, or abilities", "6-32. Additional manifestations including self-pity, manipulation, critical spirit, jealousy, not listening to correction, love of attention, and others", "Herod in Acts 12: accepted worship as a god — immediately struck by worms"], "scripture": ["2 Chronicles 32", "Romans 9:20"]}], "summary": "As the companion sermon to the morning message on humility, Pastor Lyro turns to pride itself, arguing that every relational breakdown — both with God and with other people — is ultimately rooted in pride. He opens with the disciples' dispute about which of them is greatest (Luke 9:46-48) and establishes the sermon's thesis: every last relational struggle we have traces to pride. He draws on the Puritan Richard Rooker's observation that pride clings so fast to the human heart that when you peel back all other sins, pride is the last and hardest to remove. The sermon surveys the Bible's strong verdict on pride — it appears in Jesus's list of heart-defilements in Matthew 15, is the first item God hates in Proverbs 6, and is called an abomination in Proverbs 16:5 — and makes the sharp pastoral point that the popular saying \"God hates the sin but loves the sinner\" is false because sin exists only in the sinner. The main body of the sermon is a diagnostic list of 32 manifestations of pride, presented as a practical tool for self-examination. Manifestations catalogued include complaining against God, ingratitude (Hezekiah in 2 Chronicles 32), anger, seeing oneself as better than others, an inflated view of one's own importance, and many more. Pride is shown to encompass not only arrogance and self-worship but also self-pity and self-loathing — so-called \"low self-esteem\" is typically not the absence of pride but another expression of it.", "transcript": "## Scripture Reading: Luke 9:46-48\n\nWould you turn with me to Luke chapter 9? We're going to read verses 46 through 48 only. Luke 9, starting at verse 46. This is the word of our Lord.\n\nThen a dispute arose among them as to which of them would be the greatest. And Jesus, perceiving the thought of their hearts, took a little child and set him by him and said to them, Whoever receives this little child in my name receives me. And whoever receives me receives him who sent me. For he who is least among you all will be great.\n\n## Introduction: Pride as the Root of All Relational Failure\n\nPriority — pride is Satanic. All right. This afternoon's sermon is a continuation in some ways. I am convinced from the Scriptures that every relational issue we have, both vertically between us and God, and horizontally between us and others, is rooted in pride. Every last relational issue we have is rooted in pride.\n\nAt this point, as we start this sermon, the temptation is to listen to this sermon for somebody else. Yes, I really wish my husband had listened to this. I'm hoping my wife is paying attention. But let's resist that temptation as we address the issue of pride this afternoon. Let's listen to this sermon for ourselves, because there is no one in this room who, at one point or another, does not struggle with pride. Pride is a universal sin. It is a root sin — a lot of the other sins we practice are rooted in pride. And if we want to be effective servants of the Lord Jesus Christ, we must learn to put aside pride and be humble and loving, even toward those who oppose us.\n\nPride — somebody has said — is an excessive preoccupation with self and one's own importance, achievements, status, or possessions. To which I add: also a preoccupation with one's own rights, and just attention toward oneself. These are all elements of pride.\n\nIt is interesting that Paul in 2 Timothy 3 says that the biggest problem we have is that we are lovers of ourselves. And then he breaks down what that means in verses 2-5, where pride and haughtiness are two manifestations of love for self. And we all struggle with pride because pride is the root of all sin.\n\nThe Puritan pastor Richard Rooker said: it is a vice which cleaves so fast unto the hearts of men that if we were to strip ourselves of all faults one by one, we should undoubtedly find it the very last and hardest to put off. Pride is so attached to our hearts that when you peel the onion of our sins and our struggles, at the bottom, the core of it, wrapped around the heart — is pride.\n\n## The Bible's Verdict on Pride\n\nThe Bible uses several words to refer to pride — insolence, presumptuousness, arrogance, conceit, high-mindedness, haughtiness — some of the words the Bible uses for pride. And if that hasn't been clear yet, God calls pride sin. And that's why I'm saying pride is Satanic, because every sin is Satanic in one way or another.\n\nIn Proverbs 21:4, the Holy Spirit says, a haughty look, a proud heart, and the plowing of the wicked are sin. Matthew 15:18-20, the Lord Jesus says, what comes out of men, that defiles them. For from within, out of the heart of men, proceed evil thoughts, adultery, fornications, murders, thefts, covetousness, wickedness, deceit, lewdness, an evil eye, blasphemy, pride, foolishness. And then the Lord says, all these evil things come from within and defile a man.\n\nThe Apostle John says in 1 John 2:16, for all that is in the world — the lust of the flesh, the lust of the eyes, and the pride of life — is not of the Father but is of the world.\n\nThe Bible goes so far as to say that God hates pride. In Proverbs chapter 6, the author says, there are six things — seven things — that God hates. The first one listed is a proud look, and the last one is one who sows discord among brethren. And the parallelism of the passage says that the proud look sows discord, and God hates that. Proverbs 16:5 says, everyone proud in heart is an abomination to the Lord; though they join forces, none will go unpunished. Notice: it is not pride that is the abomination to the Lord — it is everyone proud in heart. You've heard the saying, right — God hates the sin but loves the sinner. That sounds really nice, but it's false. Sin doesn't exist by itself. Sin only exists in connection with the sinner. And if one is not covered by the blood of Christ, all that God sees is the sin, and he hates the person for that.\n\nAnd God promises to judge pride. In Proverbs 15:25, the Lord will destroy the house of the proud. That is a serious, serious judgment.\n\n## Pride, Self-Worship, Self-Pity, and Self-Loathing\n\nPride manifests itself in self-worship, but also in self-pity and self-loathing — which we don't think of as pride. Remember this morning's talk about how self-deprecating comments can actually be pride. What is sometimes called low self-esteem is usually a sign of pride, because usually \"low self-esteem\" means that you don't think you're getting what you think you deserve. That's usually the root of what's called low self-esteem.\n\n## 32 Manifestations of Pride\n\nThis morning's sermon had two points. This afternoon's sermon has 32 points — but it's way shorter than this morning's. I'm going to try to show them here. I'll also add these things to the Sunday recap I send later today so you don't have to write all of them down. Some of them I'll spend a little more time with; some I'll just mention. So: 32 manifestations of pride as a diagnostic tool that we can use to determine whether we have a proud heart or not.\n\n**1. Complaining against or passing judgment on God.** We see that in the book of Numbers quite a few times — the people complaining against God. Before what he has done, asking how God could do this. The apostle says, oh indeed, O man, who are you to reply against God? Will the thing formed say to him who formed it, why have you made me like this? Does not the potter have power over the clay? Complaining against or passing judgment on God is a sign of pride.\n\n**2. Lack of gratitude.** When God worked in King Hezekiah's life — Hezekiah is usually listed with the good kings, but there's a lot of shady things going on in his heart. In 2 Chronicles 32, it says Hezekiah did not repay according to the favor shown him, for his heart was lifted up. God was bringing judgment upon Hezekiah because he was not thankful for the grace of God. Why? Because his heart was lifted up — he was proud. And then what happened? Hezekiah humbled himself for the pride of his heart, and God gave grace.\n\n**3. Anger.** Proverbs says that he who is of a proud heart stirs up strife. If we are angry, if people think of us as an angry person, that usually means that we are a proud person.\n\n**4. Seeing yourself as better than others.** Always thinking, I'm better than that person. The woman comes to anoint Jesus in Luke 7, and the Pharisee says, if he knew who that woman was, he would not be doing that — we are better than she is. And Jesus says, no, she's actually better than you.\n\n**5. Having an inflated view of your importance, your gifts, or your abilities.** Thinking that you're the best thing out there, that nobody can do what you do, that the church can survive without you — the very word pride gets exposed in large moments, like when you step away from something and realize everything happened just fine without you. That is a great reminder that the body of Christ is much greater than any one person. We see an example of Herod in Acts 12: he gives a great speech, and the people say, oh, you're speaking like the gods! And Herod says, yep, that's me. And then immediately — worms. Just think of that picture.\n\n**6-32.** [Additional manifestations include: self-pity and self-loathing, a critical spirit that always finds fault, love of recognition and public attention, inability to receive correction or rebuke, jealousy and envy, manipulation for personal benefit, inability to genuinely celebrate others' success, holding grudges and an unforgiving spirit, excessive concern with reputation, making self the center of conversations, a competitive spirit that must win every argument, despising or dismissing those of lower social status, an unwillingness to ask for help or admit weakness, living for the approval of others rather than God, taking credit for what God has done, not listening to others fully because you already have the answer, difficulty being genuinely interested in others, sowing discord among brethren by always needing to be right, and others.]\n\nBrothers and sisters, let's resist that temptation to hear this sermon for someone else, and instead do the hard work of self-examination. Pride is so close to us, so woven into the fabric of our hearts, that we need the mirror of God's Word to see it. And as we saw this morning, the antidote to pride is humility — putting off pride and putting on humility in every sphere of submission, both to God and to one another. Let us pray together. Father, thank you for your Word. Help us to see ourselves clearly. Expose the pride in our hearts. And by your grace, help us to put off pride and clothe ourselves with humility, so that we may serve you and one another well, in Jesus' name. Amen."};
