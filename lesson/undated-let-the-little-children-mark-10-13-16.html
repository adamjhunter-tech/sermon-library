window.LESSON_DATA = {"id": "undated-let-the-little-children-mark-10-13-16", "title": "Let the Little Children", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["Let the Little Children __ Mark 10_13-16 (Pastor Tito Lyro).txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/let-the-little-children-mark", "tags": [{"tag": "children", "source": "detected"}, {"tag": "worship", "source": "detected"}, {"tag": "covenant", "source": "detected"}, {"tag": "parenting", "source": "detected"}, {"tag": "ecclesiology", "source": "detected"}, {"tag": "baptism", "source": "detected"}, {"tag": "Lord's Day", "source": "detected"}, {"tag": "regeneration", "source": "detected"}, {"tag": "preaching", "source": "detected"}], "scripture_references": [{"reference": "Mark 10:13-16", "type": "quoted", "source": "detected"}, {"reference": "Deuteronomy 29:10-11", "type": "quoted", "source": "detected"}, {"reference": "Deuteronomy 31", "type": "referenced", "source": "detected"}, {"reference": "Joel 2:15-16", "type": "quoted", "source": "detected"}, {"reference": "Genesis 12", "type": "referenced", "source": "detected"}, {"reference": "Genesis 17", "type": "referenced", "source": "detected"}, {"reference": "1 Corinthians 2:14", "type": "referenced", "source": "detected"}, {"reference": "1 Corinthians 7", "type": "referenced", "source": "detected"}, {"reference": "Psalm 78:4", "type": "quoted", "source": "detected"}, {"reference": "Ephesians 2:1", "type": "referenced", "source": "detected"}, {"reference": "Ezekiel 37", "type": "referenced", "source": "detected"}], "outline": [{"title": "Why the Bible Teaches That Young Children Should Be in Worship", "subpoints": ["From the institution of the visible church in Genesis, children were included: 'I will be a God to you and to your children'", "The sign of the covenant (circumcision) was applied to children on the eighth day, marking them as part of the community", "In Deuteronomy 29 and 31, Moses commanded the entire congregation — including little ones — to hear the Word proclaimed", "Joel 2 prophesies a great worship assembly at the last times that includes children and nursing babes", "Jesus's entire earthly ministry is bracketed by children worshiping: John the Baptist in the womb, children crying Hosanna at the triumphal entry"], "scripture": ["Mark 10:13-16", "Deuteronomy 29:10-11", "Joel 2:15-16", "Genesis 17"]}, {"title": "Mark 10:13-16 — Jesus Welcomes the Little Children", "subpoints": ["The context is Jewish Judea; these are children of covenant parents (circumcised community) being brought to Jesus for blessing", "Luke 18 uses the word for nursing infants — these are very young children, small enough to be held in Jesus's arms", "The disciples rebuked those who brought children; Jesus was greatly displeased — indignant — and commanded they be allowed to come", "Jesus says the kingdom of God belongs to such as these — children of believing parents have a place in His kingdom", "This passage is a microcosm of Christ's attitude toward children throughout His ministry"], "scripture": ["Mark 10:13-16", "Luke 18:15-17"]}, {"title": "Why It Is Difficult — and What We Should Not Believe", "subpoints": ["Children are sinners, we are sinners — this makes including children in worship difficult", "We do not believe what the Bible says about corporate worship: that the Lord's Day gathering is the most vital, heaven-touching thing we do", "We do not believe what the Bible says about preaching and regeneration: God works through preached Word on hearts incapable of understanding — apart from understanding (Ezekiel 37; Ephesians 2)", "Satan knows that right worship by the whole church, including children, will undo his kingdom — so he discourages it", "We do not take time to train ourselves or our children for worship before Sunday arrives"], "scripture": ["1 Corinthians 2:14", "Ephesians 2:1", "Ezekiel 37"]}, {"title": "How to Get Better at It: Practical Guidance", "subpoints": ["Right belief: whatever God says, commit to it — children belong in corporate worship because the Bible says so", "Right love: those without young children must be patient; those with children must train them at home before expecting it at church", "Training begins Monday: if you do not require sitting and listening at home during devotions, you cannot expect it at church", "Plan your worship: walk children through the liturgy beforehand, handle practical needs before the service begins", "If a child must be taken out, deal with the issue and return — do not remove yourself from worship entirely"], "scripture": ["Psalm 78:4"]}, {"title": "The Role of the Whole Congregation in Raising Covenant Children", "subpoints": ["The covenant baptism ceremony charges the entire congregation with love and care for baptized children", "Know children by name, pray for them, support parents by befriending them and sitting with them", "Do not distract children during services by making faces or gestures behind the parents' backs", "We are all passing what we received from the previous generation to the next: 'We will not hide them from their children' (Psalm 78:4)"], "scripture": ["Psalm 78:4"]}], "summary": "This sermon addresses the question of whether young children should be present in the corporate worship of the church on the Lord's Day, prompted by the growing number of young families and covenant children in the congregation. The text is Mark 10:13-16, where Jesus rebukes the disciples for preventing parents from bringing their children to Him and declares that the kingdom of God belongs to such as these.\n\nThe sermon establishes from Scripture that children have always been part of the visible church's worship. From Genesis through the Mosaic institution, including Deuteronomy 29 and 31, Joel 2, and Jesus's own earthly ministry, children and even nursing infants are explicitly included in the gathered assembly. The covenant promise — 'I will be your God and the God of your children' — means children belong in the congregation from the beginning.\n\nThe pastor then honestly addresses why this is difficult: children are sinners, we are sinners, and we often fail to believe what Scripture teaches about worship and regeneration. Specifically, we underestimate what happens on the Lord's Day (a unique meeting with God), and we doubt whether preaching can do anything for those who cannot understand it — forgetting that regeneration precedes understanding, not the other way around. Ezekiel preaching to dry bones is the model: the Spirit uses the proclaimed Word on dead hearts, independently of comprehension.\n\nThe sermon closes with practical counsel for both parents and the broader congregation. Parents are exhorted to train children at home (devotions, sitting, listening) before expecting it at church, to plan for the service beforehand, and to discipline calmly and return if a child needs to be removed. The wider congregation is charged to be patient, pray for covenant children by name, and not distract little ones during services. All are reminded that raising covenant children is a corporate calling, not a private parental burden.", "transcript": "## Introduction: Where Do Children Belong in Worship?\n\nThe arrival of so many little ones in our congregation gives us the opportunity to ask and answer the question: what is the place of young children in the public, corporate worship of the Lord on the Lord's Day?\n\nOn any given Sunday, we have forty children under twelve in our midst — twenty of them under five. So our worship service sometimes looks like I'm watching a wrestling event as parents work to keep the children sitting. And that is glorious. We have the problem — in quotation marks — of figuring out what to do with them when we gather to worship our God.\n\nThis sermon is not for parents of young children only. It is for all of us who are part of the Church of Jesus Christ. We all play a part in raising these children in the nurture and admonition of the Lord. Part of our covenant baptism ceremony ends with this statement: *\"This child, thus acknowledged to be part of the covenant promises, is commended to you, the members of this church, for your love and care, as God is your judge.\"* We all bear responsibility for the next generation.\n\nI want us to understand three things this morning. First, the Bible teaches that young children should be present in worship services. Second, having children in worship is difficult. Third, we can get better at it.\n\n## The Bible Teaches That Children Should Be in Worship\n\nThe visible church was instituted with a promise and a sacrament that included children. When God establishes His covenant with Abraham in Genesis 12, 13, 15, 17, 22, and 26, the promise is this: *\"I will be a God to you and to your children.\"* From the very beginning of the visible church, children are part of it. And the sacrament given to Abraham was circumcision, administered on the eighth day to infants.\n\nThroughout the Old Testament, children of all ages were commanded to be in the worship services. In Deuteronomy 29, as Moses prepares Israel to cross into the Promised Land, he says: *\"All of you stand today before the Lord your God — your leaders and your tribes and your elders and your officers, all the men of Israel, your little ones and your wives...\"* The Holy Spirit through Moses goes out of His way to specify that the little ones were to be present.\n\nIn Deuteronomy 31, Moses instructs the elders that every seven years the entire congregation should gather and hear the reading of Deuteronomy — and those who should attend include: *\"men and women and little ones.\"*\n\nIn the prophet Joel, a prophecy about the great worship service of the last days:\n\n> *\"Blow the trumpet in Zion, consecrate a fast, call a sacred assembly. Gather the people, sanctify the congregation, assemble the elders, gather the children and nursing babes.\"* (Joel 2:15–16)\n\nNot just children — *nursing babes* as well. And remember that all the solemn gatherings of the Old Covenant find their climax in the Christian Sabbath, the Lord's Day — the day when we celebrate the consummation of all God's promises in Jesus Christ.\n\nJesus' own interaction with children during His ministry shows His desire for them to come to Him in worship. His entire earthly life is bracketed by children worshiping Him. The first time He was worshiped was by John the Baptist in the womb. As He entered Jerusalem on Palm Sunday, it was the children who cried \"Hosanna.\" When the Pharisees said, \"Make them stop,\" Jesus replied: *\"Do you not know that out of the mouth of babes and nursing infants You have perfected praise?\"*\n\nMark 10:13–16 is a microcosm of Jesus' attitude toward the children of believing parents:\n\n> *\"Then they brought little children to Him, that He might touch them; but the disciples rebuked those who brought them. But when Jesus saw it, He was greatly displeased and said to them, 'Let the little children come to Me, and do not forbid them; for of such is the kingdom of God. Assuredly, I say to you, whoever does not receive the kingdom of God as a little child will by no means enter it.' And He took them up in His arms, laid His hands on them, and blessed them.\"* (Mark 10:13–16)\n\nThe disciples tried to protect Jesus by keeping children away. Jesus was angry with them for it. He commanded that the little children be allowed to come to Him — not just permitted, but welcomed. *\"Let the little children come to Me, and do not forbid them.\"* Stay out of the way. They have access to Me.\n\nJesus wants children — very young children — to come to Him in worship. And the place He has appointed for that is the gathered congregation, the Church of the Lord Jesus Christ.\n\n## Why It Is Difficult\n\nWhy is it so difficult to have children in worship? Two simple reasons: they are sinners, and we are sinners.\n\nDavid confesses in Psalm 51:5: *\"Behold, I was brought forth in iniquity, and in sin my mother conceived me.\"* From the moment of conception, every human being is a sinner. Children make this extremely apparent. And we are sinners too — we want the easy way to worship, the comfortable way.\n\nBut there is a third and deeper reason: **we don't truly believe what the Bible says about worship, preaching, and regeneration.**\n\nLet me ask honestly: how many of you really think that being here right now is the best thing you could possibly be doing with your life? Did you come this morning expecting to taste a little bit of heaven in worship? Do you really think this is of vital importance for your survival as a child of God?\n\nIf we don't believe that worship on the Lord's Day is of supreme importance, we won't think it is important for our children to be there either. And if you don't believe in what the Bible says about preaching and regeneration, you will conclude that children can't be there because they don't understand.\n\nBut here is the question: can *you* understand, apart from the work of God in your heart? The answer is no. The Bible teaches that through the preaching of the Word, God gives you a new heart — and it has nothing to do with your understanding and everything to do with the work of the Spirit using the Word to change your heart. Paul says in 1 Corinthians 2:14 that the natural man cannot understand the things of God. God makes the dead alive (Ephesians 2:5). Ezekiel was told to preach to a valley of dry bones — and he did, and those bones came to life. Not because they understood the sermon, but because the Spirit of God worked through the message proclaimed.\n\nThe Lord works mysteriously through the preaching of His Word, and His Spirit regenerates His people so that they may understand — not the other way around. We don't first understand in order to believe; we are changed in order to understand. That is why there is hope for very young children, and for those who do not have the mental capacity to understand what is going on.\n\n## How We Can Get Better\n\n**Right belief.** Whatever God says, let's take it seriously and not try to innovate. God wants young children in the worship service. Something powerful — though mysterious — happens through the preaching. The corporate worship of God is the most glorious thing we can do in this life. Our children belong to the Lord — they are not just little humans. Paul, writing to the saints in Corinth, also calls the children of believers \"holy\" in 1 Corinthians 7 — they are set apart as part of the covenant community.\n\n**Right love.** This is not about us. People without little kids — be patient. Be patient with those who have little kids. We live in a culture that gives dirty looks to families with more than one child. That cannot happen in the church. If that is your attitude toward young families, examine your heart. And people with kids — it's not about you either. Do your best to train your little ones before and during church so that the people around you are not too distracted. What is the principle in both of those comments? Love God, and love your neighbor.\n\n**Right practices.** For those with little children:\n- Have your young children with you in the worship service. It is okay if they make noise consistent with their age.\n- Understand that training children to sit in worship begins at home on Monday, not on Sunday. If you don't expect them to sit and listen during family devotions, they won't do it in church either. If you only discipline them in church because you are embarrassed, that is not discipline — that is the fear of man.\n- Walk your children through the order of service the night before, or even in the car on the way. We have followed the same liturgy for thirty years — it is not a surprise. Let them know what to expect.\n- Take care of water, bathroom needs, and snacks before the service.\n- If your child is crying and cannot be calmed, take them out briefly — and then come back.\n- If your child is chattering incessantly, take them out, address it with appropriate discipline, and bring them back to worship.\n\nFor those without young children:\n- Above all, be patient. The parents already feel guilty enough. They don't need your condemnation added to it.\n- Pray for them through the week. Know all the little kids in the church by name and pray for them.\n- Help families with multiple little ones by befriending them, sitting with them, engaging the children. But don't distract the little ones during the service — especially by making faces or gestures the parents can't see.\n- Be part of the team, not an enemy of the team.\n\nJesus said: *\"Let the little children come to Me, and do not forbid them.\"* That is His statement to the disciples. We are the body of Christ — that is our identity. We worship together as one. And in doing so, we pass what we have received to the next generation:\n\n> *\"We will not hide them from their children, telling to the generation to come the praises of the Lord, and His strength and His wonderful works that He has done.\"* (Psalm 78:4)\n"};
