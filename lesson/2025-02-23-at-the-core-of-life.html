window.LESSON_DATA = {"id": "2025-02-23-at-the-core-of-life", "title": "At the Core of Life", "speaker": "Pastor Tito Lyro", "date": "2025-02-23", "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["02-23-25 -PM- At the Core of Life - 1 Corinthians 1_18-31 - Pastor Tito Lyro.txt"], "tags": [{"tag": "cross of Christ", "source": "detected"}, {"tag": "gospel", "source": "detected"}, {"tag": "sanctification", "source": "detected"}, {"tag": "legalism", "source": "detected"}, {"tag": "truth", "source": "detected"}, {"tag": "assurance", "source": "detected"}, {"tag": "Christian living", "source": "detected"}], "scripture_references": [{"reference": "1 Corinthians 1:18-31", "type": "quoted", "source": "detected"}, {"reference": "Romans 3:21-28", "type": "quoted", "source": "detected"}, {"reference": "Galatians 2:20", "type": "quoted", "source": "detected"}, {"reference": "Galatians 6:14-15", "type": "quoted", "source": "detected"}, {"reference": "Philippians 3:7-11", "type": "referenced", "source": "detected"}, {"reference": "2 Corinthians 5:21", "type": "referenced", "source": "detected"}, {"reference": "Colossians 2:13-14", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Cross at the Core", "subpoints": ["This afternoon is the application companion to the morning explanation of 1 Corinthians 1:18-31", "The question: what is at the center of your life? The word of the cross must be at the core — not the periphery", "We are 'being saved' (present continuous) through the word of the cross — sanctification is ongoing through the same gospel that justified us", "Al Mohler: 'The cross isn't about playing it safe. It's about being found safe in Christ.'"], "scripture": ["1 Corinthians 1:18"]}, {"title": "1. Danger of Subjectivism: Basing Your View of God on Feelings", "subpoints": ["Subjectivism: determining what God is like based on how you feel, rather than on what he has revealed about himself", "When life goes well we feel God is good; when it goes badly we feel abandoned — but God's character does not change with our circumstances", "The cross is the fixed point: at the cross God demonstrated his love, justice, mercy, and power simultaneously — that is who he is", "John Stott: 'The cross is the blazing fire at which the flame of our love is kindled, but we have to get near enough for its sparks to fall on us.'"], "scripture": ["Romans 3:21-28"]}, {"title": "2. Danger of Legalism: Basing Your Relationship with God on Performance", "subpoints": ["Legalism: believing that God's acceptance of you rises and falls with your performance; living as though justification must be re-earned", "The cross declares a finished work — 'It is finished' means it is finished; there is nothing left to add", "Galatians 2:20: 'I have been crucified with Christ; it is no longer I who live, but Christ who lives in me' — our righteousness is alien, imputed", "Colossians 2:13-14: the record of debt was nailed to the cross — the ledger is settled"], "scripture": ["Galatians 2:20", "Colossians 2:13-14"]}, {"title": "3. Danger of Navel-Gazing: Focused on Your Own Sin Rather than God's Grace", "subpoints": ["Navel-gazing: excessive introspection about one's own sin to the point of paralysis, depression, and loss of joy", "There is a difference between honest conviction of sin (which drives us to Christ) and morbid self-focus (which drives us inward)", "The cross teaches us to look outward and upward — not at our sin but at the Savior who bore it", "Philippians 3: Paul counted everything loss for the surpassing worth of knowing Christ — the solution to navel-gazing is Christ-gazing"], "scripture": ["Philippians 3:7-11", "Galatians 6:14-15"]}, {"title": "Application: Three Questions", "subpoints": ["What is at the center of your life — your career, family, reputation, or Christ crucified?", "What do you boast about? Paul: 'God forbid that I should boast except in the cross of our Lord Jesus Christ' (Gal. 6:14)", "Are you amazed at the power of the gospel — that God uses the foolishness of the message proclaimed to save sinners like us?"], "scripture": ["Galatians 6:14-15", "2 Corinthians 5:21"]}], "summary": "The afternoon companion to the morning sermon on 1 Corinthians 1:18-31, this message applies 'the word of the cross' to daily life. Where the morning covered the explanation (the cross separates, inverts wisdom, and turns nobodies into sons), the afternoon covers the application: the cross must be at the core of all of life, not the periphery. Three dangers of drifting from cross-centeredness are examined: subjectivism (measuring God by feelings), legalism (earning acceptance by performance), and navel-gazing (excessive focus on one's own sin rather than God's grace). The remedy for all three is the same: return to the cross, where God's character, our justification, and our ongoing sanctification are fully on display.", "transcript": "## Introduction: The Application\n\nThis afternoon we return to 1 Corinthians 1:18-31 — the word of the cross. This morning we covered the explanation: the word of the cross separates those who are perishing from those who are being saved; it inverts the world's categories of wisdom and foolishness; and it turns the world's nobodies into sons and daughters of God. This afternoon is the application.\n\nThe question I want to ask is simply this: what is at the core of your life?\n\nPaul says in verse 18 that the word of the cross is *to us who are being saved* the power of God. The verb is present continuous — we are being saved. Salvation has a past moment (justification), an ongoing process (sanctification), and a future completion (glorification). And the word of the cross is the instrument of all three. The cross is not just the gateway into the Christian life; it is the road of the Christian life.\n\nAl Mohler has said: *The cross isn't about playing it safe. It's about being found safe in Christ.* That is where we want to be.\n\nJohn Stott: *The cross is the blazing fire at which the flame of our love is kindled, but we have to get near enough for its sparks to fall on us.*\n\nSo what keeps us from the cross? What pulls us away from cross-centeredness? I want to describe three dangers — three ways that Christians drift from having the cross at the core of their lives.\n\n## Danger 1: Subjectivism\n\nSubjectivism is basing your view of God on your feelings rather than on what he has revealed about himself.\n\nWe are creatures of emotion. When life is going well — health is good, relationships are strong, the future looks bright — we feel that God is good and near. When life is hard — sickness, grief, disappointment, unanswered prayer — we feel that God has withdrawn, or that perhaps he is not as good as advertised.\n\nBut God's character does not change with our circumstances. He is the same on the mountaintop and in the valley. Romans 3:21-28 shows us what God is like: at the cross he is simultaneously just (the penalty for sin is paid) and justifier (the sinner goes free) — both attributes in full force at the same moment. That is who God is. That is the fixed point.\n\nWhen you are tempted to measure God by how you feel, go back to the cross. The cross is the immovable demonstration of God's love, justice, mercy, and power. John Stott again: the cross is the blazing fire. But we have to get near enough.\n\n## Danger 2: Legalism\n\nLegalism is basing your relationship with God on your performance — living as though justification is something that must be re-earned, maintained, or sustained by your efforts.\n\nThis is the most common danger for serious Christians. The more seriously you take the Christian life, the more likely you are to slip into a performance-based relationship with God. You do well in your devotional life and feel close to God. You fail and feel distant. Your sense of God's acceptance rises and falls with your performance.\n\nBut the cross declares a finished work. *It is finished.* Not: it is mostly finished and you need to supply the rest. Finished.\n\nGalatians 2:20: *I have been crucified with Christ; it is no longer I who live, but Christ who lives in me.* The life I now live in the flesh I live by faith in the Son of God, who loved me and gave himself for me. My righteousness is not my own — it is alien to me. It was accomplished by Christ and imputed to me.\n\nColossians 2:13-14: the record of debt — all the legal demands that stood against us — was nailed to the cross. The ledger is settled. God is not keeping a running tab.\n\nWhen you find yourself performing for God rather than resting in Christ, the cross is the answer. Not: try harder. Return to the cross.\n\n## Danger 3: Navel-Gazing\n\nNavel-gazing is excessive introspection — a focus on your own sin so intense that it produces paralysis, depression, and loss of joy.\n\nThis is different from honest conviction of sin, which is healthy and necessary. Honest conviction of sin drives us outward and upward — to Christ, to repentance, to restoration. Navel-gazing drives us inward. We become experts in our own failures, cataloguing our sins in elaborate detail, spiraling in self-condemnation.\n\nBut the cross says: look up. Look at the Savior who bore your sin. *He made him to be sin who knew no sin, so that in him we might become the righteousness of God* (2 Cor. 5:21). The sin was placed on Christ at the cross. Your job is not to keep carrying it.\n\nPhilippians 3: Paul counted everything as loss — his credentials, his achievements, his religious performance — for the surpassing worth of knowing Christ Jesus his Lord. The solution to navel-gazing is not less self-awareness but more Christ-awareness. Gaze at Christ until your own reflection fades.\n\nGalatians 6:14-15: *God forbid that I should boast except in the cross of our Lord Jesus Christ, by whom the world has been crucified to me, and I to the world.* The cross kills both the world's hold on us and our preoccupation with ourselves.\n\n## Three Questions\n\nLet me close with three questions.\n\nFirst: what is at the center of your life? Not at the edges — at the center. Is it your career, your family, your health, your reputation? Or is it Christ crucified? Everything else can and should orbit the cross — but the cross must be at the center.\n\nSecond: what do you boast about? When you talk about your life — to friends, to yourself, in your own heart — what do you point to with pride? Paul's boast was the cross. Not his theology, not his church, not his suffering — the cross of the Lord Jesus Christ.\n\nThird: are you amazed? Are you still amazed that God uses the foolishness of the message proclaimed to save sinners like us? Paul said it: it pleased God through the foolishness of preaching to save those who believe. We should never get over that.\n\nFather, thank you that the word of the cross is still the power of God. Keep us close to the cross. Protect us from the drift — from subjectivism, legalism, and navel-gazing. Fix our eyes on Jesus, the author and finisher of our faith. In his name, amen.", "soundcloud_url": "https://soundcloud.com/olympiabp/02-23-25-pm-at-the-core-of"};
