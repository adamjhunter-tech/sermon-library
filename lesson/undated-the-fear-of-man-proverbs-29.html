window.LESSON_DATA = {"id": "undated-the-fear-of-man-proverbs-29", "title": "The Fear of Man", "speaker": "Pastor Tito Lyro", "date": null, "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["The Fear of Man - Proverbs 29 - Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/the-fear-of-man-proverbs-29-tito-lyro", "tags": [{"tag": "fear of God", "source": "detected"}, {"tag": "anxiety", "source": "detected"}, {"tag": "boldness", "source": "detected"}, {"tag": "evangelism", "source": "detected"}], "scripture_references": [{"reference": "Proverbs 29:25", "type": "quoted", "source": "detected"}, {"reference": "Matthew 10:28", "type": "quoted", "source": "detected"}, {"reference": "2 Timothy 1:7", "type": "quoted", "source": "detected"}], "outline": ["Text and definition: the fear of man is a moral fear that keeps a person from doing right or encourages wrong", "Biblical examples of the fear of man (Nicodemus, Peter, Barak, Elijah, Jonah, army of Israel, Abraham, the secret disciples, the one-talent man)", "Other names for the fear of man: people pleasing, golden-penance, cowardice, peer pressure, agoraphobia, perfectionism, low self-esteem, anxiety", "The danger: fear of man is opposed to fear of God; you cannot serve both", "People-pleasing inventory (Lou Priolo's test)", "Godly fear: treasuring Christ above all things; God has given a spirit not of fear but of power, love, and a sound mind (2 Timothy 1:7)"], "summary": "Pastor Tito Lyro exposits Proverbs 29:25 to define and diagnose the fear of man — the moral fear that keeps a person from doing right or drives them to do wrong. Drawing on biblical examples from both Testaments, he shows the breadth of this sin (people pleasing, anxiety, perfectionism, peer pressure) and its danger as the opposite of fearing God. The congregation works through Lou Priolo's people-pleasing inventory, and the lesson closes with the call to treasure Christ above all things as the antidote.", "transcript": "## Proverbs 29:25 — The Text\n\n> *\"The fear of man brings a snare, but whoever trusts in the LORD shall be safe.\"* (Proverbs 29:25)\n\nThis verse should be highlighted, memorized, and kept close. It is the only place in the Bible where this exact expression appears, though the concept runs throughout Scripture.\n\n## Defining the Fear of Man\n\nThe fear of man is a **moral fear** — one that either keeps a person from doing what is right, or encourages a person to do what is wrong. The word \"moral\" is important. This is not the same as being afraid of a poisonous snake or a man with a shotgun — those are legitimate fears with no moral dimension. The fear of man is the *opposite* of the fear of God.\n\nJesus says as much in Matthew 10:28:\n\n> *\"Do not fear those who kill the body but cannot kill the soul. But rather fear him who is able to destroy both soul and body in hell.\"*\n\nJesus directly contrasts the fear of men with the fear of God. You cannot juggle both. As he says concerning money, you cannot serve two masters — and you cannot fear men and fear God at the same time.\n\n## Biblical Examples\n\nThe Scriptures are full of examples of the fear of man:\n\n- **Nicodemus** came to Jesus by night, hiding in the shadows, afraid to be seen.\n- **Peter** denied Christ three times to people of no consequence — a young servant girl and household servants — because he feared what they might do.\n- **Barak** would not lead the army without Deborah, and as a result, the glory of the victory went to a woman (Judges 4–5).\n- **Jonah** ran from his calling.\n- **Elijah** had just called down fire from heaven and killed 450 prophets of Baal — then ran from Jezebel in terror (1 Kings 19).\n- **The Israelite army** trembled before Goliath while David asked, \"Why should we let him defy the armies of the living God?\" (1 Samuel 17).\n- **Moses** told God he could not speak well (Exodus 4).\n- **King David** arranged the death of Uriah to protect his reputation (2 Samuel 11).\n- **Abraham** told Pharaoh and Abimelech that Sarah was his sister, putting her in danger to protect himself (Genesis 12, 20).\n- **The secret disciples** of John 12:42–43, who believed in Jesus but would not confess him for fear of being put out of the synagogue.\n- **The one-talent man** of Matthew 25, who hid the money because he was afraid of what the master would do.\n\n## Other Names for the Fear of Man\n\nThe fear of man goes by many names: people-pleasing, approval-seeking, cowardice, peer pressure, the need to be liked, social anxiety, even the clinical term *agoraphobia* (fear of public spaces) can trace its roots to the fear of man addressed in Proverbs 29:25.\n\nOther manifestations include:\n- Perfectionism that paralyzes action\n- Low self-esteem driven by what others might think\n- Body image struggles\n- Anxiety (which is often rooted in the fear of man)\n- Marital issues rooted in undue deference to a spouse or parents\n- Easily taking offense\n- Lack of boldness for truth\n- Overachievement as identity-building for others' approval\n- Not sharing the gospel for fear of criticism\n\nThis is not a narrow subject. Every one of us, at some stage or in some area of life, has struggled with the fear of man.\n\n## Recommended Resources\n\n- Lou Priolo, *People-Pleasing: How Not to Be an Approval Junkie*\n- Ed Welch, *When People Are Big and God Is Small: Overcoming Peer Pressure, Codependency, and the Fear of Man* — a must-read for every Christian\n- Ed Welch, *Running Scared: Fear, Worry, and the God of Rest* — especially for those struggling with anxiety\n- Wayne and Joshua Mack, *The Fear Factor* (also published as *Courage: Fighting Fear with Fear*) — a workbook for personal use or helping children\n\n## A Self-Assessment\n\nThe fear of man is a snare — a trap. A trap is most effective when it is hidden and attractive. The fear of man has the same characteristics: it traps us without our noticing, and it is designed to appeal to something within us.\n\nTake honest stock: Do I listen with anxious attentiveness to what pleases or displeases others? Do I strive to be politically correct more than biblically correct? Do I worry about what people think of me? Am I willing to sin rather than face the rejection of certain individuals? Do I avoid conflict rather than trying to resolve it? Do I forget that being rejected by others is part of suffering for righteousness' sake? Do I long to be noticed more than I long to be godly? Do I not witness to others because I fear being criticized or rejected?\n\n## The Danger and the Remedy\n\nThe fear of man is not an insignificant misunderstanding — it is a destructive sin. It places men in the seat that belongs only to God. It is a form of idolatry.\n\nBut God calls us to the fear of *him* — a fear that brings freedom. Godly fear is the reality of faith in God through Jesus Christ, treasuring Christ above all things. As Paul wrote to the fearful young Timothy:\n\n> *\"For God has not given us a spirit of fear, but of power and of love and of a sound mind.\"* (2 Timothy 1:7)\n\nGod has not given us a spirit that causes us to fear men. He has given us a Spirit that causes us to fear him. If we continue this study, we will see that God has already given us everything we need to stand in the fear of God rather than the fear of man."};
