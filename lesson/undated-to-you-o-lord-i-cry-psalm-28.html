<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-to-you-o-lord-i-cry-psalm-28", "title": "To You, O Lord, I Cry", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["To You, O Lord, I Cry - Pastor Tito Lyro - Psalm 28.txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/to-you-o-lord-i-cry-pastor-tito-lyro-psalm-28", "tags": [{"tag": "prayer", "source": "detected"}, {"tag": "deliverance", "source": "detected"}, {"tag": "praise", "source": "detected"}, {"tag": "Good Shepherd", "source": "detected"}, {"tag": "trust in God", "source": "detected"}], "scripture_references": [{"reference": "Psalm 28", "type": "quoted", "source": "detected"}], "outline": ["Introduction: Psalm 28 — David's cry to God", "The urgent plea: Do not be silent, lest I be like those who go down to the pit", "Lifting hands toward the holy sanctuary", "Distinguishing himself from the wicked", "God hears the voice of his supplications", "Praise: The Lord is my strength and shield", "Conclusion: The Lord as shepherd and eternal king"], "summary": "Pastor Tito Lyro preaches from Psalm 28, in which David cries out urgently to God for deliverance from those who work evil. The sermon traces the movement from desperate petition to confident praise, as David declares that God has heard his prayer and is his strength, shield, and shepherd.", "transcript": "## Introduction\n\nAs it is so common in the book of Psalms, once again we find David in trouble. Once again we find David being persecuted by his enemies, surrounded by them. Though we cannot know exactly when this occurred — as is true of so many other psalms of David written during times of persecution — we can clearly see what David does when he is surrounded by his enemies. As you read this psalm there is a transition: in the beginning there is a clear note of fear on David's part that God is not going to hear his prayer, and that transitions to a statement of faith in verses 6 through 9.\n\nPsalm 28 reveals how David turns to the Lord from the edge of the pit. David uses vivid language — he often finds himself in the pit, in the grave, as good as dead, stuck in the miry mud at the bottom of a well, surrounded by his enemies. He paints a very grim picture of his reality, and in doing that he helps us relate to him. We tend to see our lives in grim ways too, and the man after God's own heart himself suffered at the hands of enemies, struggled with sin, and we are able to relate to him and learn from him.\n\nSo here in Psalm 28 we see how David turns to the Lord from the edge of the pit. Observing what David did 3,000 years ago, we can learn at least four important things. ## The First Lesson: In Times of Turmoil, Cry to God for Help (vv. 1-2)\n\n> *\"To You I will cry, O Lord my Rock; do not be silent to me, lest, if You are silent to me, I become like those who go down to the pit. Hear the voice of my supplications when I cry to You, when I lift up my hands toward Your holy sanctuary.\"* (Psalm 28:1-2)\n\nIn desperation, David seeks the covenant God of Israel — not just any savior, but the God who had saved him. The God who had established covenant with His people, Yahweh Himself. He knows that God alone can answer prayer. So he does not care how foolish he sounds as he dangles over death. He comes to God. He has experienced the Lord's deliverance before. In Psalm 30:3 he says, \"O Lord, You brought my soul up from the grave; You have kept me alive, that I should not go down to the pit.\"\n\nHe knows that God answers his prayer. He knows that God has the power to answer his prayer. And he knows that God wants to answer his prayer. So he does not care what everyone else thinks — he cries out to the Lord for deliverance. He calls upon the Lord as his rock, his place of refuge, his solid footing, and considers his life as good as done if Yahweh does not deliver him.\n\nHe knows that God always hears our prayers, even before they leave our tongue. As Psalm 139:4 says, \"For there is not a word on my tongue, but behold, O Lord, You know it altogether.\" So he lifts up his hands like a toddler reaching for his father, saying, \"O Lord, I need You. You are the only one who can help me — pick me up and rescue me.\"\n\nHe is doing what Jeremiah urged Judah to do in Lamentations: \"Arise, cry out in the night... Pour out your heart like water before the face of the Lord. Lift your hands toward Him.\" Pray to God. Lift your hands to God as if it matters — because it matters.\n\nHe stretches out his hands toward the Holy of Holies, where the Lord dwells among His people, where once a year the high priest sacrificed to atone for sins. David cries for help on the basis of the shed blood sprinkled on the mercy seat. God, You have atoned for my sin. I reach out to You and pour out my prayer in time of need.\n\nWe too cry out to our God in times of desperation. Remember the parable of the Pharisee and the tax collector. The Pharisee comes with pride: \"Lord, thank You that I am not like this man.\" The tax collector, knowing his need and his desperation, cannot even look up. He beats his chest and says, \"Be merciful to me, a sinner.\" We cry out to our God in times of desperation because He is our rock — our ever-present Father, the hearer of our prayers.\n\nSpurgeon comments on this psalm: \"We stretch out empty hands, for we are beggars. We lift them up, for we seek heavenly supplies. We lift them toward the mercy seat of Jesus, for there our expectation dwells.\"\n\nIs this how you are praying, brothers and sisters? Are you crying out to the Lord with empty hands, reaching out to Him as a toddler who knows his father is willing to help? Too often we pray with a bland routine — checking items off a prayer list. Yet if we are hanging on a cliff by our fingernails, if our life depends on it, we would not whisper a soft, \"Hello, is anybody there? When you have a chance, can you help me out?\" No — we scream at the top of our lungs. In the same way, let your prayers reflect your desperation and your need. Not a contrived or theatrical urgency, but a real cry to the Lord, knowing that our hope is only in Him.\n\nIn troubled times we really learn to pray. Not in times when everything is going well, but in the times of trouble — when we are in the pit with David — we really learn how much we need the Lord.\n\n## The Second Lesson: Call Out God's Enemies in Your Prayers (vv. 3-5)\n\n> *\"Do not take me away with the wicked and with the workers of iniquity, who speak peace to their neighbors, but evil is in their hearts. Give them according to their deeds, according to the wickedness of their endeavors... because they do not regard the works of the Lord, nor the operation of His hands. He shall destroy them and not build them up.\"* (Psalm 28:3-5)\n\nThese verses make you uncomfortable as you read them. They are imprecatory — David is calling down God's judgment upon the enemies of God. And yet this is the very Word of God, given by the inspiration of the Holy Spirit for us to live out.\n\nAs we cry to God for help, we call His enemies by name — like a spotter on the battlefield calling coordinates of the enemy so the bombardment can begin. At the center of this psalm, David prays for the Lord to give the wicked what they deserve — to judge them not simply as evildoers, but as those who despise what God has done. David is not asking the Lord to punish David's personal enemies; he is asking the Lord to punish God's enemies who have wronged him.\n\nIf you are an enemy of God, you are in a very dangerous spot. The judgment of God is upon you. Unless you repent, turn from your sins, and embrace Jesus Christ as your Savior, you have no hope in this life or the life to come. But the beauty of the gospel is that the moment you repent, the Lord counts the wrath that is yours as having been paid at the cross, and adopts you as His son or daughter.\n\nDavid says the enemies do not regard God as Creator and Redeemer. So David prays that God would tear them down and never build them up again. And God said He is going to do that. In Jeremiah 1:10 He says, \"See, I have set you over the nations and over the kingdoms, to root out and to pull down, to destroy and to throw down, to build and to plant.\"\n\nAnd yet you and I were those enemies at one point. The same could be said of us — for the wages of sin is death, not mere annihilation but spiritual destruction forever, existing in a state of experiencing the displeasure and wrath of God. This is us without Christ. In Christ Jesus, we have been promised eternal favor instead of judgment. In Christ, we do not receive the wages we deserve but instead the free gift of eternal life. In Christ, we are not dragged off with the wicked or cast into the pit of death.\n\nBrothers and sisters, we deserve God's silence and we deserve the judgment of Satan's domain. So we seek to be rewarded not for our evil deeds but for the deeds of Christ, who formed us at creation, restored us in redemption, and promises the hope of our eternal life. We name our enemies, but we also name the name of Christ — the name above every name, the name that has rescued us from the pit.\n\nPsalm 28 points us to our Savior. The perfect God-man alone could truly cry out: \"Do not take me away with the wicked and with the workers of iniquity.\" He is the only one who could truly pray that. Yet publicly, His enemies called Him evil and demon-possessed, a friend of tax collectors, prostitutes, and sinners. They accused Him falsely. They came at Him with swords and clubs. They crucified Him between two criminals. And from that cross, our Savior cried out: \"My God, My God, why have You forsaken Me?\" — or in the words of Psalm 28, why do You not hear my cry for help?\n\nAnd yet from the same cross, our greater David did not call down judgment on the wicked. Instead, He cried on their behalf: \"Father, forgive them, for they do not know what they are doing.\" In death He made payment for our evil deeds. He was dragged away to take the wages we deserve. He made atonement for our sins as He heard our pleas for mercy. But then from death He rose again in victory.\n\nSo because of that — call out God's enemies by name. Name the fleshly passions that fuel your sin: pride, idolatry, addiction. Name the world and the ideologies that pervade your thinking. Name the oppressors who seek to do you harm. Name the devil and his deceptions. Name the final enemy, death, and any sickness that leads toward it. Name them in your prayers, and call the Lord to give what they deserve. These are right and proper prayers against a fallen world and the consequences of human sin. Name your enemy. Your own sin is your greatest enemy. Name it before the Lord and ask Him to deliver you from it.\n\n## The Third Lesson: Count on God's Answer (vv. 6-7)\n\n> *\"Blessed be the Lord, because He has heard the voice of my supplications! The Lord is my strength and my shield; my heart trusted in Him, and I am helped; therefore my heart greatly rejoices, and with my song I will praise Him.\"* (Psalm 28:6-7)\n\nNotice that the answer to his prayer was not relief from his enemies, nor being spared from danger — it was a greater trust in the Lord. \"My heart trusted in Him and I am helped.\" That was the answer. As we pray, we count on God to answer. Instead of growing anxious about all possible outcomes, David trusts that God will do His work and combats his worry with anticipatory faith.\n\nFirst, he trusts in God as his strength — a pillar of support, a firm foundation, a refuge in the storm, a mighty fortress. God is always called this in the songs of David. Brothers and sisters, God is at His strongest when we are at our weakest — when we realize that.\n\nDavid also trusts in God as his shield — the God who is our protection in battle, our defender from enemy blows, who goes before us. So also, we rejoice in God even when we cannot rejoice in our circumstances. We trust Him as our strength in times of weakness, our shield when we are afraid, and our eternal song when we are tempted to grumble and complain. With anticipatory faith, we face life looking for what God is going to do. We count on God to answer.\n\n## The Fourth Lesson: Covenant with God's People (vv. 8-9)\n\n> *\"The Lord is their strength, and He is the saving refuge of His anointed. Save Your people and bless Your inheritance; shepherd them also, and bear them up forever.\"* (Psalm 28:8-9)\n\nWe covenant with God's people as David intercedes for Israel, and in some marvelous way for us as well. David's prayer for Israel is a prayer for us, as we are covenanted together before God and with God.\n\nThe \"anointed\" in verse 8 refers to more than just a human king — it points to every king appointed by God to serve as savior for his people. He would receive them as his royal inheritance. God's people who belong to God alone cannot be claimed by any other than the Son of God Himself. And here you and I are the heritage of the Lord. I would say He got the short end of the stick on this one — He gave His life so that He could gain us. Out of all the treasures in His inheritance, God chose you to be His priceless possession.\n\nDavid delights in the Lord as the shepherd who carries Israel as a shepherd carries his sheep. In verse 9 he says, \"Shepherd them also and bear them up forever.\" The Lord guides His people through the wilderness into the land of promise, protects them in the valley of death, and delivers them from their enemies. He leads them beside still waters and makes them lie down in green pastures. He carries them — not just in salvation, but forever and always.\n\nThis notion of being carried by the Lord is important. Compare our God with the idols of this world who must themselves be carried and do nothing more than weigh us down. Notice what Isaiah says concerning the idols of this world. In Isaiah 46:1-2:\n\n> *\"Bel bows down, Nebo stoops; their idols were on the beasts and on the cattle... They stoop, they bow down together; they could not deliver the burden, but have themselves gone into captivity.\"*\n\nHere were Bel and Nebo, the two great gods of Babylon. People would bow down to their statues, and when they were done bowing, they would pick the statues up and put them in a bag — and now the burden animal is overburdened because these gods cannot do anything for them. They have to be carried themselves. But David says our God bears us up forever. How much better is the one true God, who carries us from birth to old age?\n\nWe are humbled by our weakness, our dependence, our inability to save ourselves. Yet we are also humbled by God's mercy and His sacrifice on our behalf. So do not insist that He put you down. Do not say, \"God, I don't want you to bear me. Leave me alone.\" Trust the Lord to be your salvation and your shepherd — ask Him to carry you every day of your life.\n\nAs Isaiah 40:11 says:\n\n> *\"He will feed His flock like a shepherd; He will gather the lambs with His arm, and carry them in His bosom.\"*\n\n## Application\n\nGod calls us to be doers of the word, not just hearers. So let me suggest how to live this out.\n\nName the specific enemies you face. What are the fleshly passions you are struggling against? What are the sins? What are the things you are treasuring against God's Word? Name them, and repent. What are the human oppressors, worldly ideologies, spiritual enemies, physical sicknesses, and fears in your life? Name them before the Lord, who is the only one who can help you with them.\n\nThink about the idea of being carried by the Lord. Imagine your life if you were a paraplegic — completely paralyzed, dependent on others for everything. That is exactly what God calls us to be in Him: completely dependent on Him for everything. Does it comfort you or humble you to know that the Lord will carry you forever? You are the one who cannot do anything for yourself. And yet God picks you up, takes you out of the miry pit, puts you on a rock, and gives you a song to sing for His glory. And He carries you every step of the way.\n\nHow does it transform your identity to be the precious inheritance of Christ Himself? You are what Christ inherited. He went to the cross so that He could gain you. As Hebrews 12:2 says, for the joy set before Him, He endured the cross. What was that joy? Part of it was you. God the Father said, \"I will give You a people.\" God the Son said, \"I will give My life.\" And the result is you, saved by the Lord Jesus Christ.\n\nFinally, use this psalm to meditate on the character of God — the God to whom you pray. Read Psalm 28 and see who God is:\n\n- My rock (v. 1)\n- My God who grants mercy (v. 2)\n- My holy God who atones for sin (v. 2)\n- My God who judges justly (vv. 3-5)\n- My God who hears (v. 6)\n- My God who keeps His promises (vv. 1, 6-8)\n- My strength (v. 7)\n- My song (v. 7)\n- My shield (v. 7)\n- My salvation (vv. 8-9)\n- My shepherd (v. 9)\n\nThink about who your God is from Psalm 28. See how that affects the way you relate to Him. This is our God. You have heard His word. Now go and do the things He calls you to do."};
