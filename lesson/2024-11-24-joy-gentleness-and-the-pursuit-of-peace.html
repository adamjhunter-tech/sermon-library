his return is imminent", "This nearness is both encouragement (Psalm 145:18 — the Lord is near to all who call upon him; Christ is coming back to vindicate his church) and warning (Christ is witnessing our practice and coming to judge)"], "scripture": ["Philippians 4:5", "Philippians 2:3-4", "Psalm 145:18"]}, {"title": "3. How to Live Out These Commands", "subpoints": ["Look to the supreme example of Christ and imitate him — 1 Peter 2 (Christ is our example); Romans 15 (let each please his neighbor for his good, for even Christ did not please himself)", "Follow his teaching within the church: not pursuing self-assertion but considering the interests of one another", "Follow his teaching outside the church: Matthew 5 — pray for enemies, give your tunic and cloak to those who ask", "We must rely on Christ to do these things; obedience to these commands seems hard and unattractive without grace, but when our hearts and minds are in the right place, displaying forbearance will not be hard — by the grace of God, because Christ himself is gentle and lowly and we learn from him"], "scripture": ["1 Peter 2", "Romans 15", "Matthew 5"]}], "summary": "This afternoon sermon looks at Philippians 4:4-7 in the context of the ongoing fruit of the Spirit series, focusing on the connection between joy, gentleness, and peace. Pastor Lyro draws on Moises Silva's summary of the passage: replace discontent and anxiety with joy; look away from self to the needs of brothers; bring all needs before God in thankfulness — this is true contentment. Three commands are developed. First, the command to rejoice in the Lord is not a suggestion but an order Paul repeats because he anticipates resistance. It is grounded in two unchanging facts: God has saved us (Titus 3:3-5, from foolishness and malice to mercy) and God is for us (Romans 8:32). Second, the command to let gentleness be known to all translates the Greek \"forbearance\" — being people who do not prioritize personal rights but consider others as Christ considered us (Philippians 2:3-4). The attached clause \"the Lord is at hand\" works both directions — encouraging and warning: Christ is near to those who call on him and is coming back to vindicate and judge. Third, the practical question of how these commands are lived out is answered by looking to Christ as example and teacher, within the church (mutual consideration) and outside it (Matthew 5 ethics), always relying on his grace, since he himself is gentle and lowly.", "transcript": "## Introduction\n\nTurning to Philippians chapter 4, reading verses 4 through 7: *Rejoice in the Lord always. Again I will say, rejoice! Let your gentleness be known to all men. The Lord is at hand. Be anxious for nothing, but in everything by prayer and supplication, with thanksgiving, let your requests be made known to God; and the peace of God, which surpasses all understanding, will guard your hearts and minds through Christ Jesus.*\n\nFor a generation of kids growing up in the 90s and early 2000s, Hakuna Matata was the thing to say. For a previous generation, Bobby McFerrin sang, \"Don't worry, be happy.\" These songs — and I could not find any evidence that these artists were Christians — did capture in very simple form the truth of the passage before us this afternoon.\n\nAs was his custom, Paul, as he nears the end of the epistle, gives a series of short commands — here specifically five commands — then a prohibition, then encouragements. The command to rejoice in verse 4; the command to let gentleness be known in verse 5; the command to pray in verse 6; the command to think or meditate in verse 8; and the command to do or practice in verse 9. The prohibition: do not worry. The promise: peace in verse 7.\n\nMoises Silva — a Cuban theologian who taught at Westminster Seminary in Philadelphia — summarized the passage helpfully: *Let joy take the place of your discontent and anxiety. Look away from yourselves to the needs of your brothers, being willing to yield your rights and privileges for their sake. And as far as your needs are concerned, bring them all before God in the attitude of thankfulness for what he has already given you. If you do this, you will learn what true and unshakable contentment really is.*\n\n## 1. Rejoice in the Lord (v.4)\n\nFirst: rejoice in the Lord. I want to say two things about this.\n\nIt is a command, not a suggestion. We often think of happiness as something that happens to us and that we do not have a lot of control over — yet Paul commands us to be happy, which implies that we are capable of willing happiness. Paul repeats himself because he knows this command will find resistance. He does not just say rejoice. He says rejoice — and again, I say rejoice. As if he anticipates the church saying: he cannot have said that. And so he writes it again.\n\nPaul also tells us the manner in which we are to be happy: rejoice in the Lord. Our happiness is not primarily based on people and circumstances but on who the Lord Jesus Christ is and what he has done.\n\nWhy should we rejoice in the Lord? Two reasons that never change regardless of circumstances.\n\nFirst: God saved us. Titus 3:3-5 — *for we ourselves were also once foolish, disobedient, deceived, serving various lusts and pleasures, living in malice and envy, hateful and hating one another. But when the kindness and the love of God our Savior appeared, not by works of righteousness which we have done, but according to his mercy he saved us.* We are all that at the beginning, but God saved us. That is reason for us to rejoice always.\n\nSecond: God is for us. Romans 8:32 — *he who did not spare his own Son, but delivered him up for us all — how shall he not with him also freely give us all things?*\n\n## 2. Let Your Gentleness Be Known to All Men (v.5)\n\nPaul continues in verse 5: let your gentleness be known to every one. As we saw this morning, the Greek word behind gentleness is a hard one to translate. The closest single word is forbearance. We are to be known as people who are forbearing.\n\nThe thrust of this command is that we practice what Paul described earlier in chapter 2:3-4 — considering one another before ourselves, putting aside selfish ambition and actually considering the interests of others, just as Christ has done for us.\n\nMoises Silva again: Paul expects believers to be guided by a frame of mind that does not put priority on personal rights. Believers whose primary concern is whether or not they are being dealt with fairly will fail to exercise a fundamental element of Christian behavior — preferring others above themselves. Gentleness is the opposite of a spirit of contention and self-seeking. And it is to be displayed to all men, within and without the church.\n\nPaul attaches a phrase: the Lord is at hand. There are two interpretation questions: does this clause go with what precedes (the command to let gentleness be known) or with what follows (the command to be anxious for nothing)? And what does it mean for the Lord to be near — spatial nearness (he is present with us) or temporal nearness (his return is coming soon)?\n\nThe proper approach is to accept all four possibilities. The sentence goes with what goes before and with what goes after, providing encouragement and warning for all the commands. And it speaks of both kinds of nearness — Christ is near because of what he accomplished on the cross, and his return is imminent.\n\nHow is this an encouragement? Psalm 145:18 — *the Lord is near to all who call upon him.* The more we obey, the nearer he is to us. And he is coming back to vindicate his church — so we do not have to worry about revenge; we consider others, and Christ takes care of the rest at his return.\n\nBut this is also a warning: Christ is with us and witnessing what we do. He is examining our gentleness. Are we being known in the church and outside the church as gentle people? He is right there, and he is coming back to judge our practice.\n\n## 3. How Do We Live This Out?\n\nHow do we practice these things? First, we look at our supreme example and imitate him. 1 Peter 2 — Jesus Christ is our example. Romans 15 — let each of us please his neighbor for his good, for even Christ did not please himself. We look to Christ crucified.\n\nWithin the church: not pursuing self-assertion but considering the interests of one another as we serve one another. Outside the church: Matthew 5 — if an enemy asks for your tunic, give your cloak as well; pray for those who persecute you.\n\nTo do that, we need to rely on Christ. These commands seem so hard and unattractive to us. It is hard to rejoice. It is hard to be gentle. It is hard not to be anxious — some of us think anxiety is actually a gift from God and we practice it with great devotion.\n\nBut we can only do these things if we rely on him. If our hearts and minds are in the right place, displaying forbearance will not be hard — we will do it by the grace of God — because Christ himself tells us that he is gentle and lowly and calls us to come to him and learn from him. There is no better place to learn about gentleness than in him who in gentleness died for our sins, rose in victory for our salvation, and is willing and able to equip us to follow him."};
