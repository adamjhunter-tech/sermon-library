<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-the-unbreakable-chain-romans-5", "title": "The Unbreakable Chain", "speaker": "Mr. Craig Rowland", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["The Unbreakable Chain (Mr. Craig Rowland).txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/the-unbreakable-chain-mr-craig", "tags": [{"tag": "salvation", "source": "detected"}, {"tag": "perseverance", "source": "detected"}, {"tag": "assurance", "source": "detected"}, {"tag": "grace", "source": "detected"}, {"tag": "faith", "source": "detected"}, {"tag": "perseverance of the saints", "source": "detected"}], "scripture_references": [{"reference": "Romans 5", "type": "quoted", "source": "detected"}], "outline": ["Introduction: Planting a seed of truth", "Romans 5: the concentrated heart of the gospel", "Justification by faith and peace with God", "The chain of grace: tribulation, patience, experience, hope", "The love of God poured out through the Holy Spirit", "Christ dying for the ungodly — the unbreakable foundation", "Conclusion: The unbreakable chain of salvation"], "summary": "Guest speaker Mr. Craig Rowland preaches from Romans 5 on the unbreakable chain of God's saving work. He presents Romans 5 as the most concentrated passage on the gospel, tracing the unbreakable chain of grace from justification through tribulation to hope, grounded in Christ's death for the ungodly.", "transcript": "I have one and only one objective today: I want to plant a seed. For me, that seed was planted 35 years ago. A discipler gave me this seed a long time ago — he didn't actually give me a seed, he didn't know it at least — and my hope is it finds good soil in you.\n\nThe seed is going to be a \"much more\" seed, and there's no place in the Word more concentrated with \"much more\" than Romans 5.\n\n## Romans 5: The Unbreakable Chain\n\nI'm reading from the New King James Version, Romans 5:8-10:\n\n> *\"But God demonstrates His own love toward us, in that while we were still sinners, Christ died for us. Much more then, having now been justified by His blood, we shall be saved from wrath through Him. For if when we were enemies we were reconciled to God through the death of His Son, much more, having been reconciled, we shall be saved by His life.\"*\n\nRomans 5, the entire chapter, is glorious gospel. I'd encourage you to read the whole thing — it even talks about trials and tribulations. But I just have a sample here, because this is all the time we're going to have today. Can you see the gospel here? We don't have to have the whole chapter, but the gospel is here.\n\nA lot of people actually call Romans 5 \"the chain.\" So I brought a physical chain today, and I had a few volunteers try to break it — a young man, a young woman, a married couple. None of them could break it. What would they have to break in Romans 5? They would have to break the gospel. You can't. The gospel — even these few verses — is unbreakable. You cannot break them apart and say, \"I'll choose one and not the other.\" All the truths hold together. That's a chain.\n\n### The First Link: Justification (Romans 5:8)\n\nThe first verse is simple: *\"But God demonstrates His own love toward us, in that while we were still sinners, Christ died for us.\"*\n\nDid God love us sinners before Christ died? He did. While we were still sinners, Christ died. God the Father loved us even before the Son's death. That is amazing. Some people think Christ somehow coerced the Father into it, but He didn't. God the Father loved us before the Son's death. And notice — the love is toward us sinners.\n\n### The Second Link: Saved from Wrath (Romans 5:9)\n\nThe next verse says, *\"Much more then, having now been justified by His blood, we shall be saved from wrath through Him.\"*\n\nWhat does justification mean? Legally, not guilty. Remember that. Having now been justified by His blood, we shall be saved from God's wrath. What is wrath? Not good. Scripture talks about it in several ways. Romans 1 describes it this way: God gave them over — to moral impurity, vile affections, debased minds. That's a hard life. And in Revelation 20: *\"If anyone's name was not found written in the book of life, he was thrown into a lake of fire.\"* And Revelation 14: *\"They will be tormented with fire and brimstone in the presence of the holy angels and in the presence of the Lamb.\"*\n\nIf you know Christ as Savior and Lord, this is a wrath you will not experience. If you don't know Christ as Savior, this is a wrath you will know if you don't come to a saving knowledge of Him.\n\n### The Third Link: Saved by His Life (Romans 5:10)\n\nThe last verse says, *\"For if when we were enemies we were reconciled to God through the death of His Son, much more, having been reconciled, we shall be saved by His life.\"*\n\nReconciled means at peace — no wrath. You can consider yourself in a kind of friendship with God. The simple definition I think of: Christ gave me His righteousness; I gave Him my sin. That is what salvation is. I am clothed in His righteousness and He has taken my sin. That is what it means to be reconciled — you are at peace with God.\n\nNow let's talk about \"much more.\" I'm an engineer, so bear with me. \"Much more\" is actually a Latin term — *a fortiori*. What it means is: if this huge thing is true, then of course this other thing is also true. God demonstrates His love in that while we were sinners Christ died for us — if that is true, that is enormous. Then the next truths are a slam dunk. If that first one is true, being saved from His wrath is absolutely certain, because He already did the hardest work. We are at peace. And then the last, my favorite: if we've been reconciled, we shall be saved by His life.\n\nWhat life? His exalted life. Where is Christ right now? He is at the right hand of God. He completed His mission here on earth and now has an exalted life. But Christ is not in heaven with His feet up. Let's understand what He is there for.\n\nHebrews 7:25 has become my favorite verse:\n\n> *\"Therefore He is also able to save to the uttermost those who come to God through Him, since He always lives to make intercession for them.\"*\n\nIf you get anything out of today, get this: if you know Christ in salvation, at this moment and in our failures, He is interceding for us. He is intervening — He is between us and God. When we fail, He is our intercession. When we fail, we are clothed in His righteousness.\n\n## A Second Chain: Called, Sanctified, Preserved\n\nNow I want to talk about another chain — similar, but found in a different place. It deals with God's exceedingly great and precious promises. We are going to look at Jude.\n\nJude 1-2:\n\n> *\"Jude, a bondservant of Jesus Christ, and brother of James, to those who are called, sanctified by God the Father, and preserved in Jesus Christ: mercy, peace, and love be multiplied to you.\"*\n\nThere is a chain in there. Can you see the three links? Called. Sanctified. Preserved. I want to propose to you that those three are every bit as unbreakable as the chain in Romans 5.\n\n### Link One: Called\n\nRomans 8:30 is perhaps the clearest:\n\n> *\"Moreover whom He predestined, these He also called; whom He called, these He also justified; and whom He justified, these He also glorified.\"*\n\nAnd Ephesians 1:4:\n\n> *\"Just as He chose us in Him before the foundation of the world, that we should be holy and without blame before Him in love.\"*\n\nHe chose us before — not by our own works. He predestined and called us. That is what the \"called\" in Jude is.\n\n### Link Two: Sanctified\n\nHere is why Jude wrote what he wrote. You have been called — and because of that, you are going to be sanctified, which means you will be tried. There will be tribulation. There might even be tremendous sacrifice. Sanctification means you are set apart for a purpose: in this case, set apart for God.\n\nJude warns us that there will always be people who creep into the church — ungodly people who distort the grace of God into a license for immorality, and who deny our Lord and Savior Jesus Christ. Sanctification means we will know trials. But Romans 5 says, where sin abounds, grace abounds much more. Grace — unmerited favor — will abound. And 1 Peter 3:12:\n\n> *\"For the eyes of the Lord are on the righteous, and His ears are open to their prayers.\"*\n\nIf you are a saint, God's eyes are open to what you are going through in your trials, and His ears are open to your prayers. When you face sanctification trials, He is listening.\n\n### Link Three: Preserved\n\nThis is the best part. Jude 24-25:\n\n> *\"Now to Him who is able to keep you from stumbling, and to present you faultless before the presence of His glory with exceeding joy, to God our Savior, who alone is wise, be glory, majesty, dominion and power, both now and forever. Amen.\"*\n\nCan you imagine — faultless! Christ is there, the Father is there, and Christ is excited you have arrived. It will be with exceeding joy that He presents you faultless. When our life here on earth is gone, we will be with Him. He is going to preserve us, and in God's eyes, we will be faultless.\n\n## The Structure of Jude\n\nThis is how Jude is constructed. The entire book has two bookends. The beginning — the introduction — is one bookend. The end — the doxology — is the other bookend. And those bookends frame everything in between. The middle of Jude is filled with warnings: there will be trials, battles, ungodly people in the church. But the bookends declare: you are called, sanctified, and preserved, if you know Christ as Savior. You are going to finish well. And it is not by your power — none of you could break that chain. It is not by your power that you were saved. It was God's power. That same power is the one that keeps you, preserves you, and intercedes for you along the way.\n\nChrist did not just die and say, \"They're on their own now — I did my part.\" That is not the way it is at all. He is interceding right now. Do you believe that?\n\n## Conclusion\n\nThese three links — called, sanctified, preserved — are just like this chain. You do not get one without the others. Whether you are married or single, young or old, you cannot break this chain.\n\nSalvation is more than just \"I am saved, heaven one day.\" It is Christ right now, at this moment. The \"much more\" is this unbreakable chain — the fact that you have been called, you will be sanctified, and you will be preserved.\n\nWalk closer to Christ. It is more than just heaven one day. Salvation is Christ right this minute.\n\nPaul prays in Ephesians 3:17-21:\n\n> *\"That Christ may dwell in your hearts through faith; that you, being rooted and grounded in love, may be able to comprehend with all the saints what is the width and length and depth and height — to know the love of Christ which passes knowledge; that you may be filled with all the fullness of God. Now to Him who is able to do exceedingly abundantly above all that we ask or think, according to the power that works in us, to Him be glory in the church by Christ Jesus to all generations, forever and ever. Amen.\"*\n\nWhose glory is this? God's. Whose majesty? God's. Whose dominion do we live in? God's. God reigns. And it is His power — not ours — that holds the chain."};
