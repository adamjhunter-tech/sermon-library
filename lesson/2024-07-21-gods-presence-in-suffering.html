window.LESSON_DATA = {"id": "2024-07-21-gods-presence-in-suffering", "title": "God's Presence in Suffering", "speaker": "Pastor Tito Lyro", "date": "2024-07-21", "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["07-21-24 -AM- God's Presence in Suffering - Hebrews 4_14-16 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/07-21-24-am-gods-presence-in-suffering-hebrews-4_14-16-pastor-tito-lyro", "tags": [{"tag": "suffering", "source": "detected"}, {"tag": "compassion", "source": "detected"}, {"tag": "high priest", "source": "detected"}, {"tag": "cross of Christ", "source": "detected"}, {"tag": "comfort", "source": "detected"}, {"tag": "grace", "source": "detected"}, {"tag": "prayer", "source": "detected"}], "scripture_references": [{"reference": "Hebrews 4:14-16", "type": "quoted", "source": "detected"}, {"reference": "Mark 14:32-49", "type": "quoted", "source": "detected"}, {"reference": "Mark 15:16-39", "type": "quoted", "source": "detected"}, {"reference": "Romans 8:32", "type": "quoted", "source": "detected"}, {"reference": "Isaiah 43:2", "type": "quoted", "source": "detected"}, {"reference": "Isaiah 40", "type": "referenced", "source": "detected"}, {"reference": "Luke 22:43", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 7:25", "type": "referenced", "source": "detected"}, {"reference": "1 Peter 5:6-7", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: God Knows Suffering Through Christ", "subpoints": ["D.A. Carson: God knows suffering not merely in omniscience but by experience in Jesus Christ", "Reading of Gethsemane (Mark 14:32-49) and the Crucifixion (Mark 15:16-39)"], "scripture": ["Mark 14:32-49", "Mark 15:16-39"]}, {"title": "The Great High Priest Who Sympathizes", "subpoints": ["Hebrews 4:14-16: Jesus was tempted in all points yet without sin", "We can come boldly to the throne of grace to receive mercy and grace", "God gives help at the right time — not necessarily removal of suffering"], "scripture": ["Hebrews 4:14-16"]}, {"title": "Christ's Suffering Exceeds Ours", "subpoints": ["Mark 15:34 — \"My God, my God, why have you forsaken me?\" — the scream of the damned for us", "We are never truly abandoned by God; our feelings deceive us", "The one who drank the cup of wrath promises: \"I will never leave you nor forsake you\""], "scripture": ["Mark 15:34"]}, {"title": "The Cross as the Greatest Comfort", "subpoints": ["We must be trained to love the cross before suffering so we are sustained in suffering", "In our darkest hour, the Father sends the Son, not an angel", "Romans 8:32: He who did not spare his own Son will freely give us all things"], "scripture": ["Romans 8:32", "Luke 22:43"]}, {"title": "Practical Encouragement", "subpoints": ["Focusing on the \"why\" of suffering does not bring rest; focusing on the cross does", "God is sovereign over suffering and present with us in it", "Isaiah 40:28-31: Those who wait on the Lord shall renew their strength"], "scripture": ["Isaiah 43:2", "Isaiah 40:28-31"]}], "summary": "Taking a break from the 1 Peter series, Pastor Lyro addresses the reality of God's presence with his people in suffering. Beginning with the accounts of Gethsemane and the Crucifixion (Mark 14–15), he establishes that God is not merely theoretically aware of human suffering but has entered into it experientially through the person of Jesus Christ. Drawing from Hebrews 4:14–16, he shows that because Christ was tempted and suffered in every way as we are — yet without sin — he is uniquely qualified as our Great High Priest to sympathize with our weaknesses and provide mercy and grace at exactly the right time. The sermon underscores that our suffering will never match Christ's, who bore the very wrath of God at Calvary, and because he endured that dark hour, we have his promise that we will never be forsaken. Rather than seeking answers to the \"why\" of suffering, believers are called to fix their eyes on the cross and the God of the cross, who is both sovereign over suffering and present within it. The congregation is encouraged to cultivate a love for the cross before trials arrive, so that when suffering comes — cancer, loss, unemployment, grief — they are already prepared to be sustained by Christ, who always lives to make intercession for them.", "transcript": "## Scripture Reading: Gethsemane and the Crucifixion\n\nWell, that's going to be reading from Mark chapter 14, starting at verse 32, reading through verse 49. The gospel according to Mark, starting at verse 32 and chapter 14. This is the word of our Lord. Then they came to a place which was named Gethsemane. And he said to the disciples, Sit here while I pray. And he took Peter, James, and John with him. And he began to be troubled and deeply distressed. Then he said to them, My soul is exceedingly sorrowful, even to death. Stay here and watch. He went a little further and fell on the ground and prayed. That if it were possible, the hour might pass from him. And he said, Abba, Father, all things are possible for you. Take this cup away from me. Nevertheless, not what I will, but what you will. Then he came and found them sleeping and said to Peter, Simon, are you sleeping? Could you not watch one hour? Watch and pray, lest you enter into temptation. The spirit indeed is willing, but the flesh is weak. Again, he went away and prayed and spoke the same words. And when he returned, he found them asleep again for their eyes were heavy. And they did not know what to answer him. Then he came the third time and said to them, Are you still sleeping and resting? It is enough. The hour has come. The son of man is being betrayed into the hands of sinners. Rise. Let us go. See, my betrayer is at hand.\n\n## The Crucifixion (Mark 15:16–39)\n\nMark chapter 15, verse 16, reading through verse 39. Then the soldiers led him away into the hall called Praetorium and they called together the whole garrison. And they clothed him with purple. And they twisted a crown of thorns, put it on his head. And began to salute him, Hail King of the Jews. Then they struck him on the head with a reed and spat on him. And bowing the knee, they worshipped him. And when they had mocked him, they took the purple off him. But put his own clothes on him and led him out to crucify him. Then they compelled a certain man, Simon Sirenian, the father of Alexander and Rufus, as he was coming out of the country and passing by to bear his cross. And they brought him to the place Golgotha, which is translated Place of a Skull. Then they gave him wine mingled with myrrh to drink, but he did not take it. And when they crucified him, they divided his garments, casting lots for them, to determine what every man should take. Now it was the third hour and they crucified him. And the inscription of his accusation was written above: THE KING OF THE JEWS. With him, they also crucified two robbers, one on his right and the other on his left. So the scripture was fulfilled, which says, He was numbered with the transgressors. And those who passed by blasphemed him, wagging their heads and saying, Aha, you who destroyed the temple and built it in three days, save yourself and come down from the cross. Likewise, the chief priests also mocking among themselves with the scribes said, He saved others; himself He cannot save. Let the Christ, the King of Israel, descend now from the cross that we may see and believe. Even those who were crucified with him reviled him. Now when the sixth hour had come, there was darkness over the whole land until the ninth hour. And at the ninth hour, Jesus cried out with a loud voice saying, Eloi, Eloi, lama sabachthani, which is translated, My God, my God, why have you forsaken me? Some of those who stood by when they heard that said, Look, he is calling for Elijah. Then someone ran and filled a sponge full of sour wine, put it on a reed and offered it to him to drink, saying, Let him alone, let us see if Elijah will come to take him down. And Jesus cried out with a loud voice and breathed his last. Then the veil of the temple was torn in two from top to bottom. So when the centurion who stood opposite him saw that he cried out like this and breathed his last, he said, Surely this man was the Son of God.\n\n## God Knows Suffering by Experience\n\nWe're going to take a break today from our 1 Peter series, and likely we're going to take a break next week as well, to consider the idea that God is present in our suffering. D.A. Carson in his book, How Long, O Lord: Reflections on Suffering and Evil, says the God on whom we rely knows what suffering is all about, not merely in the way that God knows everything, but by experience. God's experience of suffering took place in the life and death of Jesus Christ. And that's why the Holy Spirit, in Hebrews 4:14–16, says, Seeing that we have a great high priest who has passed through the heavens, Jesus, the Son of God, let us hold fast our confession. For we do not have a high priest who cannot sympathize with our weaknesses, but was in all points tempted as we are, yet without sin. Let us therefore come boldly to the throne of grace, that we may obtain mercy and find grace to help in time of need.\n\nHow does this reality impact our suffering? How is this helpful for the sufferer? Well, our God always understands our suffering because at Calvary, he knew suffering that infinitely exceeds anything we will ever encounter. And because of that, he does not leave his people to suffer alone. He suffers with them.\n\n## The Cross as Preparation for Suffering\n\nIn Christ's darkest hour, we can recognize his love for us. In Mark 15:34, we read, at the ninth hour, Jesus cried out with a loud voice saying, Eloi, Eloi, lama sabachthani, which is translated, My God, my God, why have you forsaken me? One author says, this cry represents the most agonizing protest ever uttered on this planet. It bursts forth in the moment of unparalleled pain. It is the scream of the damned — for us. Because Christ was able to go through that and did go through that, he ministers to us in our suffering. So the Apostle Paul says that God demonstrated his own love toward us in that while we were still sinners, Christ died for us.\n\nBrothers and sisters, when we are going through suffering, we have a hard time seeing anything else. We ask why, and we want an answer that makes sense of the seemingly purposeless suffering in life. Why is my child dying? Why do I have cancer? Why did I lose my job? Why are my kids not interested in me? And more often than not, brothers and sisters, we're not going to get an answer to that question — at least not one that satisfies us. So focusing on the suffering itself and trying to find out why will not bring rest or satisfaction to you. But focusing on the cross, and the God of the cross, will. Because he knows what suffering is.\n\n## The High Priest Who Sympathizes\n\nSeeing then that we have a great high priest who has passed through the heavens, Jesus, the Son of God, let us hold fast our confession. For we do not have a high priest who cannot sympathize with our weaknesses, but was in all points tempted as we are, yet without sin. Let us therefore come boldly to the throne of grace, that we may obtain mercy and find grace to help in time of need.\n\nBecause Christ has experienced the same type of suffering as we experience, he can relate to us and is sympathetic to our suffering. And this is why we can come with confidence to him in our suffering. The result of coming with confidence is that we receive mercy and grace. And this particular word translated \"time of need\" means the right time, the suitable time. God gives us mercy and grace at the right time, whenever it suits us best.\n\nNotice that here in Hebrews 4, God doesn't promise removal of suffering, but suitable help — help that works in the form of mercy and grace because of Christ during our suffering. He gets us through it.\n\n## We Are Never Abandoned\n\nOur suffering does not truly compare to Christ's suffering. We have never been and will never be abandoned by God. I know that sometimes it feels like he has abandoned us. But those are deceptive feelings, brothers and sisters. Because the one who drank the cup says to you, I will never leave you nor forsake you. The one who prayed that the cup would pass — who was willing to drink the cup of the wrath of God, to have his relationship with the Father severed, even momentarily, for us — tells us, I will never leave you. I will never forsake you.\n\nIn Luke 22:43, talking about the parallel passage to Mark 14, it says this: Then an angel appeared to him from heaven and strengthened him. An angel was sent to Jesus in his moment of agony. But in our own depths of suffering, our Heavenly Father does not send an angel to us. In our own depths of suffering, our Lord sends his Son, who is the Savior. In our trials, we are given comfort and strength by Jesus himself.\n\nBrothers and sisters, regardless of how dark a day becomes — and there are some dark days in our lives — regardless of the severity of the anguish you are experiencing, he is always present. And that is sufficient. We must be convinced that Christ is sufficient. The one at God's right hand, at this moment — the one who on this earth suffered so uniquely — is the only one who always lives to make intercession for us, as Hebrews 7:25 says.\n\n## The God of All Comfort\n\nOur God, the God of all comfort, says to us, When you pass through the waters, I will be with you. And through the rivers, they shall not overflow you. When you walk through the fire, you shall not be burned. Nor shall the flame scorch you. For I am the Lord your God, the Holy One of Israel, your Savior (Isaiah 43:2).\n\nIn Isaiah 40, the Lord commands the prophet to comfort his people — to tell God's people, Behold your God! That's the comfort. Behold your God. And those who wait on the Lord shall renew their strength. They shall mount up with wings like eagles. They shall run and not be weary. They shall walk and not faint.\n\nSo know this: God loves you, and he is with you in your suffering. Let us pray together. Father, thank you that you are a God who ministers to your people through your Word. Father, we pray that we will be able to see you more clearly. We pray that you comfort our hearts, that we might see your presence in the darkest hours. In Jesus' name. Amen."};
