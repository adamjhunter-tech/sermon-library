window.LESSON_DATA = {"id": "2024-04-07-building-a-house", "title": "Building a House", "speaker": "Pastor Tito Lyro", "date": "2024-04-07", "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["04-07-24 -AM- Building a House - Luke 6_46-49 - Pastor Tito Lyro.txt"], "tags": [{"tag": "obedience", "source": "detected"}, {"tag": "faith", "source": "detected"}, {"tag": "discipleship", "source": "detected"}, {"tag": "Word of God", "source": "detected"}], "scripture_references": [{"reference": "Luke 6:46-49", "type": "quoted", "source": "detected"}, {"reference": "Matthew 7:24-27", "type": "referenced", "source": "detected"}, {"reference": "Ephesians 2:8-9", "type": "referenced", "source": "detected"}, {"reference": "John 3:16", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Question That Concludes the Sermon", "subpoints": ["Context: taking a break from 1 Peter; prompted also by the news of a formerly-professing brother's departure — it is fitting to consider our own faith and obedience before the Lord", "Luke 6:46-49 concludes a difficult sermon with a pointed question: 'Why do you call me Lord, Lord, and do not do the things which I say?'", "The same passage appears in Matthew 7:24-27 (Sermon on the Mount) — Jesus likely repeated this teaching because good teachers repeat the most important things"], "scripture": ["Luke 6:46-49"]}, {"title": "1. The Two Builders", "subpoints": ["The man who hears and does: builds on the rock; when the flood burst against the house it could not shake it", "The man who hears and does nothing: builds without foundation; the ruin of that house was great", "The illustration is clear: the foundation is not doctrine alone but obedience to what Christ teaches; hearing without doing is the worst kind of self-deception — this man called Jesus 'Lord' (v.46)"], "scripture": ["Luke 6:47-49"]}, {"title": "2. Obedience Is the Foundation of the Christian Life", "subpoints": ["Objection: is faith not the foundation? Paul says we are saved by grace through faith (Ephesians 2:8-9); John 3:16 says the one who believes has eternal life", "Answer: faith and obedience cannot be separated in real life; genuine faith produces obedience; to separate them is a theological exercise, not the reality of Christian experience", "Calling Jesus 'Lord' means acknowledging his authority — which necessarily implies that his commands are binding", "Obedience is not optional for the Christian; it is not something added to the Christian life; it is the very substance of it"], "scripture": ["Ephesians 2:8-9", "John 3:16"]}], "summary": "A sermon on Luke 6:46-49 (the two builders), prompted in part by the departure of a formerly-professing member and offered as an occasion for self-examination. Jesus closes a difficult sermon with a piercing question: why do you call me Lord, Lord, and not do the things I say? The man who hears and does builds on the rock; the man who hears and does nothing builds without a foundation — and though he called Jesus Lord, his house could not stand. The sermon addresses the apparent tension with Pauline teaching on faith (Ephesians 2:8-9; John 3:16): faith and obedience cannot be separated in the real Christian life. Genuine faith produces obedience; calling Jesus 'Lord' means submitting to his authority. Obedience is not an optional add-on to the Christian life — it is the foundation on which the whole of life is built.", "transcript": "## Introduction\n\nWe're returning to our series in 1 Peter in two weeks. As we consider the situation of one who was formerly a brother, it would do us good to consider our own faith and obedience before the Lord and where we stand with him.\n\nLuke chapter 6, verses 46 to 49:\n\n*But why do you call me Lord, Lord, and do not do the things which I say? Whoever comes to me, and hears my sayings, and does them, I will show you whom he is like: he is like a man building a house, who dug deep and laid the foundation on the rock. And when the flood arose, the stream beat vehemently against that house, and could not shake it, for it was founded on the rock. But he who heard and did nothing is like a man who built a house on the earth without a foundation, against which the stream beat vehemently; and immediately it fell. And the ruin of that house was great.*\n\nThis is the word of our Lord.\n\nAs Jesus comes to the end of a difficult sermon — he had said hard things to his audience — he drives home the application with a pointed question and a familiar illustration. This passage appears in Matthew 7:24-27 as well, at the close of the Sermon on the Mount. Good teachers repeat themselves, and Jesus likely used this parable on multiple occasions, because this is something he wanted his people to understand.\n\n## 1. The Two Builders\n\nThe illustration is simple but searching. Two men build houses. The first man digs deep and lays his foundation on the rock. When the flood bursts against the house, it cannot be shaken — the foundation holds. The second man builds without a foundation on the earth. The flood comes and the ruin of that house is great.\n\nThe foundation here is obedience to Christ's teaching. The man who heard and did nothing had his house destroyed — even though he was calling Jesus 'Lord' (v.46). He agreed with Jesus professionally. He used the right words. He acknowledged Jesus's authority with his lips. But he did not build on what Jesus said.\n\nJesus is showing us something sobering: it is entirely possible to call him Lord and not do what he says. It is possible to be close to the kingdom, to be in the crowd, to know the right vocabulary — and build without a foundation.\n\n## 2. Obedience Is the Foundation\n\nNow, someone might raise an objection. Wait — I thought faith, not obedience, is the foundation of the Christian life. After all, we are saved by grace through faith, as Paul tells us in Ephesians 2:8-9. The one who believes in Jesus has eternal life, as John 3:16 tells us. So how can you say obedience is foundational?\n\nThe answer is that faith and obedience cannot be separated in real life. We can do theological exercises and define what faith is in the abstract. And those exercises are valuable. But in the actual Christian life, genuine faith produces obedience, and genuine obedience flows from faith. You cannot truly believe in a Lord and do whatever you like.\n\nTo call someone 'Lord' is to acknowledge their authority over you. It implies that their commands bind you. The question Jesus asks is not: why do you not believe in me? He says: why do you call me Lord, Lord — and not do what I say? The very title they use — Lord — indicts them. They are calling him what he is and then living as if he were not.\n\nObedience to Christ is not optional because it is the very foundation of the Christian life. It is not something you add once you have figured out faith. It is the substance of what it means to follow Jesus. The flood is coming — the testing that comes to every life. The only house that stands is the one built on actually doing what the Lord says.\n\nFather, let us not be those who call you Lord and do not do what you say. Build us on the rock of obedience to your Word, so that when the floods come, we are not swept away. In Jesus's name, amen.", "soundcloud_url": "https://soundcloud.com/olympiabp/04-07-24-am-building-a-house-luke-646-49-pastor-tito-lyro"};
