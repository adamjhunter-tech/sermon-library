Chief Sin: Is It Unbelief, Pride, or Idolatry?", "subpoints": ["Brakel argued the chief sin is unbelief — the Fall came through disobedient unbelief (2 Corinthians 11:3)", "Augustine and Ambrose said pride is the chief sin — Adam and Satan wanted to be equal with the Creator", "The three may be related: idolatry is the sin that gives birth to all others, with pride as the chief idol of the heart", "Pelagius thought man was good — this error dominates educational institutions and Western culture, obscuring the real problem and the gospel"], "scripture": ["Ezekiel 28:1-17", "Proverbs 16:18"]}, {"title": "The King of Tyre and the Anatomy of Pride (Ezekiel 28)", "subpoints": ["Ezekiel 28 depicts the king of Tyre engaged in ego-latria — self-worship — inflated by wealth and wisdom", "The passage also reflects Satan's fall: iniquity was found in him, his heart was lifted up because of his splendor", "Pride makes us center the whole world around ourselves — everything exists to serve us for our glory rather than God's glory and others' service", "The great warning of Deuteronomy: after abundance and blessing, the heart grows proud and forgets the God who saved them"], "scripture": ["Ezekiel 28:1-17", "Deuteronomy 8"]}, {"title": "Pride and Idolatry: The Lesson of Hosea 2", "subpoints": ["Hosea 2: the adulterous wife pursues her false lovers because they give her bread and water — she trusts they will bring life and prosperity", "God hedges up her way with thorns so she cannot find her false loves — discipline is the means of breaking pride and restoring the heart to God", "The root of idolatry is self-love: we love false gods because we believe they will bring us life; this is pure ego-latria", "When God removes the false loves through hardship, the heart comes to see that God alone was always the provider"], "scripture": ["Hosea 2:5-13"]}, {"title": "Battling Pride and the Hope of the Gospel", "subpoints": ["Pride does not just develop through thought — it forms through habits and practices of life; we must work on both thinking and practice", "The self-esteem doctrine of modern education encourages pride without scientific evidence that it actually helps people", "Paul's self-description: I am the chief of sinners — one of the most powerful men in history defined himself by grace, not accomplishment", "Christ: Philippians 2 — he emptied himself and humbled himself to death on the cross; his righteousness and humility become ours; rejoice in his perfect work, do not be destroyed by the sin in your life"], "scripture": ["Philippians 2:5-8", "Proverbs 16:18-21"]}], "summary": "Guest speaker Pastor Doug Leaman, who serves as a missionary in Brazil with the congregation's support, preaches from Proverbs 16:18-21 on the subject of pride. The sermon opens by noting that the Reformed doctrine of total depravity stands in direct opposition to the world's prevailing orthodoxy of self-esteem and positive thinking. Like a mousetrap spring under tension, the sinful heart will fall back into pride unless continuously pressed open by the Spirit, prayer, and the exercise of godliness.\n\nPastor Leaman surveys the theological debate over which sin is the chief sin — unbelief (Brakel), pride (Augustine and Ambrose), or idolatry — and suggests these may not be alternatives but rather a cluster, with pride as the chief idol of the heart. He spends significant time in Ezekiel 28, where the king of Tyre is described as engaged in ego-latria (self-worship), and where the prophet appears to look through the king to Satan's original fall — iniquity was found in him, his heart was lifted up because of his splendor. Pride, Pastor Leaman argues, is the sin of centering the entire world around oneself rather than around God's glory and others' good.\n\nThe sermon turns to Hosea 2 to connect pride with idolatry. The adulterous wife pursues her false lovers because she believes they will bring her bread and water — life and prosperity. This is precisely how all idolatry works: we love false gods because we trust they will serve our self-interest. God's response is to hedge up her way with thorns — to bring hardship that breaks the power of the false loves and drives the heart back to him. This disciplining love is how God deals with pride in the lives of his people.\n\nPastor Leaman closes by warning against multiplied consequences of pride — in marriages, families, churches, and nations — before pointing to the antidote in Philippians 2. Christ humbled himself to death on the cross; his righteousness and humility become ours by faith. The congregation is urged not to be destroyed by seeing pride in their own hearts but to rejoice in Christ's perfect work and rise up to serve him, knowing that his obedience has been credited to them.", "transcript": "If you're able to stand for a moment longer, we're going to turn to the book of Proverbs chapter 16. I'm going to read verses 18 through 21. So Proverbs chapter 16, verse 18. This is the Word of our Lord.\n\n*Pride goes before destruction and a haughty spirit before a fall. Better to be of a humble spirit with the lowly than to divide the spoil with the proud. He who heeds the word wisely will find good, and whoever trusts the Lord, happy is he. The wise in heart will be called prudent, and sweetness of the lips increases learning.*\n\nThis is the Word of our Lord. Let us pray together. Father, we pray that You empower Your servant as he opens up Your Word to us. Open our eyes and hearts to receive it. We pray in Jesus name. Amen. Please be seated.\n\nIt gives me great joy to call Pastor Doug Leaman our guest today. It is great privilege to be here with you all, to see you all again. It is always a great honor. Make sure that we thank you for your continual help, support, and prayers with us in Brazil. You are definitely our sending church and we are very grateful for your participation with us. And if you still have questions, there is a team Timothy coming up this year — well, next year actually, the beginning of next year, I believe in January. So if anyone is interested, we would love to have you down there to help us out and see what is going on as well. So thank you, Pastor Tito, for the opportunity to be here. It is a privilege once again.\n\nBrothers, Pastor Tito asked me to speak upon this issue of pride. Probably because he knows I am an expert on this issue. I think that must be the main motivation. We had prayer, so let us just get right into hearing God's Word this morning.\n\n## The Problem of Pride\n\nWe know that pride is a very big problem, a huge sin in our lives. And the Reformation Principle of Total Depravity teaches us this very clearly. They emphasized the total depravity of man. Today, sadly, the world's orthodoxy is to think more highly of yourself. I think you would all agree with that. But God alone remains perfectly good and worthy to be praised. And all of creation is fallen, and we are dependent upon him for sanctification, for salvation, for growth. To him alone be all the glory — should be our constant echo of praise to him.\n\nBecause we are born into sin, as God's Word so clearly teaches us, this sin of pride works somewhat like a spring. Now, I was setting some mousetraps down at the yard there. And to set a mousetrap, you need to spring it. And it wants to fall back into its mold. And there is a tension in it, that is why the trap works. And our nature is somewhat like that. It will fall back down into its original sinful tendencies if it is not constantly pressed open by diligence, by the work of God's Spirit, through prayer, and really exercising ourselves in godliness. If we do not do that, pride will rear its ugly head and return and manifest itself in our lives.\n\nGod's Word says the heart of man is corrupt and desperately wicked — who can know it? And so that is the actual position of mankind, though they do not want to hear that. Paul teaches us very clearly, echoing some of these verses that speak about the total depravity of man. He has a great war within himself. He says in Romans chapter 7: it is not me that does it, but sin that is within me. It is sin that is in me. This is that great evil that resides within that we must learn how to deal with. We need a biblical anthropology, a biblical view of man. We need a discipline to work against the sinful tendencies of man. We need to suspect ourselves more. We need to be more cautious of the sinful tendency that is within us.\n\nJesus says in Matthew 7, a verse that you well know, that we need to focus on our own hearts because the tendency will be to focus on the sin of others. But Jesus turns it all around and says, take the log out of your own eye before you work on the speck that is in the eyes of others. Everyone is troubled with sins — we are very good at pointing out sin in others. All of us are. We can just see it so clearly. But we are not naturally good at seeing sin in ourselves. And Jesus says that is what we need to focus on. And so it is a good topic to talk about.\n\nI know you guys have been working on this humility over the past year or so, Pastor Tito mentioned to me. But the Bible is very clear once again that the chief problem with our lives is this great battle with sin. And Genesis, way in the early parts of the Bible, Genesis 6:5: the Lord looked at the evil of man and that it had multiplied tremendously across the earth, the sinfulness of man, and that their hearts continually sought after evil things. So the problem is a heart issue.\n\n## What Is the Chief Sin?\n\nSo we have summed up quickly the Reformed view of man and our problem — total depravity. Now what would be interesting if we could seek to understand and know what of all the aspects of sin is the chief sin. Maybe the main motor of sin. What is the sin that is the catalyst to a whole bunch of other sins? Now there have been different views on that. Since sin is our great battle, we must become experts at understanding sin, knowing sin, especially in our own lives so that we can deal with it. Because if we are ignorant about our sinful human nature we are going to have a hard time battling it. We will not even realize it is a very big problem.\n\nWhen I played basketball, way back in the day, we would watch films of the opponents. Because we wanted to see their weak points, we wanted to know where to focus our energies and efforts as we played against them. And in the same sense, we should know the main enemy of our soul and focus in that area.\n\nThere was a theologian named Brakel who said that the main sin is unbelief. He thought that is what God's Word teaches. He said that the Fall of man, Adam and Eve, came upon them because of disobedient unbelief. And there is some Scripture that teaches that. The serpent tricked and deceived Eve and therefore she fell in unbelief, says 2 Corinthians 11:3. And so for him the first sin is not pride, but it is unbelief. That was his view. And it is definitely a contender for the great foundational sin.\n\nBut Augustine and Ambrose, two other great historical theologians, said that pride was the chief sin. Sin is above all else arrogance they said — pride in the soul. And that was the fundamental problem of Adam: he wanted for himself that which was not destined for him — to be equal with the Creator. It was that seduction to be seduced by divinity. I want to be like God, I want his power and his beauty and everything that he is.\n\nI do not know if we will ever be able to understand necessarily between these great theologians. And as we analyze God's Word — is the greatest sin unbelief, is it pride, or maybe it is idolatry? I think those three, you know, they kind of relate. Maybe idolatry is the sin that gives birth to all others, with pride perhaps being the chief idol of our hearts.\n\nNow there are other men throughout history, many men actually, one was Pelagius. And I know you have heard about him, but he taught a different view of man than Augustine and the Word of God. He thought man was good and that he was not born with this sinful tendency and nature to do evil. He was not born that way. Unfortunately, our educational institutions and the culture at large, even the Western world, is dominated by his thinking, not biblical thinking, not Augustinian and Pauline thinking, but by Pelagius: man is good and the problem is something else, not his heart. Please understand the profound implications of that erroneous analysis of who man is in his nature. Because if you do not know his main problem, you do not know how to help him. You do not know where to focus — obviously on the gospel. And so man has abandoned this idea that man is sinful.\n\n## The King of Tyre and the Anatomy of Pride (Ezekiel 28)\n\nSo let us look at a couple of passages that teach about pride and what we can learn from them and how to battle this great sin.\n\nOne of the first chapters I would like to look at is Ezekiel chapter 28. I am not going to read the whole chapter. It is a very interesting, somewhat complex chapter, but there are some very important things for us to see about pride in this text. The king of Tyre is here being spoken about, and his idolatrous relationship with himself. Now in Brazil, we have a really nice word — Ego Latria — self-worship, basically. It is a kind of idolatry. And he was involved with this. And you can see that in Ezekiel chapter 28.\n\nI will read a few verses, so you can see the criticism of the prophet against the king of Tyre. The Word of the Lord came to me saying, Son of man, say to the Prince of Tyre, thus says the Lord God: because your heart is lifted up, and you say, I am a god, I sit in the seat of God in the midst of the seas, yet you are a man and not a God, though you set your heart as the heart of a god.\n\nSo here is the king of Tyre, and the prophet is interesting here. It seems like we do not know the exact person who is referred to at times in this text. He is certainly referring to the king, the physical king of that time. But he is reflecting certainly upon Satan as well, as possibly Adam in his fall. And obviously Satan's fall.\n\nBehold, you are wiser than Daniel — using sarcasm here — there is no secret that can be hidden from you. With your wisdom and your understanding you have gained riches for yourself and gathered gold and silver into your treasuries. By your great wisdom and trade you have increased your riches, and your heart is lifted up because of your riches. Therefore thus says the Lord God: because you have set your heart as the heart of a god, behold, I will bring strangers against you, the most terrible of the nations, and they shall draw their swords against the beauty of your wisdom and defile your splendor.\n\nAnd then continuing on in verse 11, it says, moreover the Word of the Lord came to me saying, Son of man, take up a lamentation for the king of Tyre and say to him, thus says the Lord God. Now see if he is referring to Satan here or Adam. You were the seal of perfection, full of wisdom and perfect in beauty. You were in Eden, the garden of God; every precious stone was your covering. You were the anointed cherub who covers; I established you. You were on the holy mountain of God; you walked back and forth in the midst of fiery stones. You were perfect in your ways from the day you were created till iniquity was found in you.\n\nSeems like he is talking about Satan here, a great cherub who was so beautiful and had so many glittering qualities. Until iniquity was found in him. The Bible does not reveal to us the total mystery of how sin entered into the heart of Satan, but it explains what happened. Iniquity was found in him.\n\nAnd he continues on in verse 17: your heart was lifted up because of your beauty; you corrupted your wisdom for the sake of your splendor. I cast you to the ground; I laid you before kings, that they might gaze at you. And so judgment comes upon Satan, upon Adam, upon the human race, and upon the king of Tyre because of pride. But please see what pride does: it makes us center the whole world around ourselves. And that is maybe the sum of a proud heart — we see everything through the lens of ourselves first. And everything is out there to serve us, for our glory and our use, instead of the glory of God and service towards others.\n\nAnd so the Bible warns us in many places against pride. Remember, one of the warnings to the Israelites was: after you have eaten and you are full, after you have built beautiful homes for yourself in the land and lived in them, after you have had great vineyards and fruit and produce and you are abundantly blessed by the Lord — that your heart would become proud and you would forget the Lord your God who saved you, who took you out of the land of Egypt. You were nothing, you were slaves. And so the great tendency of the human heart is to forget our Savior and our God, and to rely on our own resources.\n\nI think American culture is one of the things that — as we talked about this morning in Sunday school, Pastor mentioned it — and you know, I love to go garage sailing here because you can get clothes for fifty cents, a dollar, brand new shoes, twice cleats. I need cleats for all seven of my boys. And there is just an amazing abundance of everything. And I took pictures and showed it to the guys in Brazil. They are like, hey man, do a shop for us as well. But the problem is that in a heart we think, as Americans possibly, as a blessed nation: it was my strength and the might of my arm that gave me these riches. And so Christians often with a second and third generation of abundance it is easy for them to forget God. And that is the constant warning of Proverbs: pride comes before destruction, pride comes before destruction.\n\n## Pride and Idolatry: The Lesson of Hosea 2\n\nI just want to go to one more passage that nails down in our consciences about pride and idolatry. I think Hosea chapter 2 is one I have studied more to understand how pride works in the human heart and how I believe God deals with pride in our hearts and lives, because he loves us.\n\nGod saved his people. He brought them out of the land of Egypt, out of slavery, out of bondage. And he marries them — he loves them. They were naked, they had nothing, they were an abandoned child screaming in blood on the streets, as Ezekiel describes. And God saw Israel, his people, in their sinfulness, the ugliness and lostness and death of that situation. And he saves them, makes them beautiful, cleanses them, and marries them. And then what do they do?\n\nBring charges against your mother, bring charges. For she is not my wife nor am I her husband. Let her put away her harlotries from her sight and her adulteries from between her breasts, lest I strip her naked and expose her as in the day she was born, and make her like a wilderness and set her like a dry land and slay her with thirst. So God raises up this complaint against his bride who has prostituted herself and gone after many other lovers and forgotten God.\n\nIn verse 5: for their mother has played the harlot; she who conceived them has behaved shamefully. For she said, I will go after my lovers, who give me my bread and my water, my wool and my linen, my oil and my drink. My lovers, they provide for me. I trust in them. I believe in them. I believe that they bring me abundance, life, bread, riches, shalom, peace. I get prosperity from them and I love them therefore.\n\nTherefore behold, I will hedge up your way with thorns and wall her in, so that she cannot find her paths. She will chase her lovers but not overtake them, not find them. Then she will say, I will go and return to my first husband, for then it was better for me than now.\n\nSo God is interested in breaking our false loves, the things we trust in. And the reason we trust them — what is the connection with pride here? Why is it that we trust in those things? Well the text says they give me my bread. It is really in the end all about self-love. Why does she love those false loves? Because she expects and believes that they will bring her life, good things. It is all about me. Ego-worship. Self-worship. And that is why pride in connection with idolatry — pride is possibly the chief idol, because we worship and love other things because we trust that they will bring us life.\n\nThis is very practical. This goes into every area of life. I have talked a lot about my passion with basketball — believing that sports would bring me comfort and fame and the applause of people. So we can do that with many things. Maybe it is through grades: through academic success I will find life. Maybe it is through cars, esteem in work because people respect and honor me. We have all sorts of ways to seek these things. And she sought them. She believed in them. She thought all these things would really help her in life. And so she loved them.\n\nBut God says: when that happens, when I shut those things up, when I bring hardship, she will then open her eyes and see that no, those things really do not bring her life. They are just mirages. They are false lovers. They really cannot comfort her life and bring what she is seeking — peace of soul and true love. They cannot bring that to her. And then she will say, I will go and return to my first husband.\n\nSo if God brings difficult times into your life, it is most likely to have all things work together for good. It is God's hand of grace being extended and saying, son, trust in me. Stop trusting in that. You are just stressed out because you did not get that thing that you wanted — that fame, that success. Abandon that and come to me and then you will see where the true fountain of joy is.\n\nAnd he goes on in verse 8: for she did not know that it was I who gave her grain, new wine, and oil and multiplied her silver and gold, which they prepared for Baal. I was the one who was giving that and she was giving the credit to her false lovers. But it was me who was sustaining her life. Therefore I will return and take away my grain in its time and my new wine in its season, I will take back my wool and my linen given to cover her nakedness. And so he does all this to win her heart back. And so discipline came to this adulterous wife, but it was all because of love.\n\nSo we see how God often works in a heart through hard times to help break us from our pride. So let us learn that we need to forsake false loves, because it will bring the discipline of God. It does not really bring the prosperity, the shalom, the peace and joy, the fruit of the Spirit, which we are actually seeking. There are fruits of the Spirit, but we seek them with false gods, idols, false lovers, adultery in the heart.\n\n## Battling Pride and the Hope of the Gospel\n\nSo what kinds of difficulties might God bring into our lives? There are a lot of tools he has to use. Maybe it is relationship difficulties, maybe it is poverty, maybe it is hardships of all sorts. When your life is just messed up within a bandaid of self-pleasure — see, when you seek God in the first place, if these troubles do not at least relax a bit in your life, remember that God is the strength of our lives.\n\nPlease see once again, trying to show you two texts that talk and speak to us about how pride is connected with idolatry. And today in the evangelical world, even, we have made worship all about what feels good to us. Often we are the center. The sound has to feel cool. It is all about man. It is humanistic often. And so we need to remember this word about pride, even in the way we worship.\n\nSome things to remember about pride and trying to bring this to a conclusion. Usually I think a lot about pride. How many of you have really meditated on it — except if you are going to speak on it? But pride does not just come as we think, okay, I am going to go after fame. Pride can be developed often through our practices, through our habits of life, even possibly more so than our thought world. Of course we need to work on both those aspects of our lives — our practice and our thinking.\n\nBasically, the selfish and proud heart seeks its identity in the creature. It seeks it in what the creature can offer to it — our identity. And we just were not made to be satisfied by this world and by the creature. God made us for himself. It says Augustine, right — and our hearts will only find rest when we seek it in him. So please do not seek your identity in the things of this world. Because when the things of this world disappoint, you are going to have problems. You are going to have a sickness in your thinking and your life.\n\nAnd good pastors and good leaders in the home really want to work on this issue because it brings so much trouble to God's people. Imagine pride dominating a whole land once again. We often talk about it in an isolated sense — my battle with pride. But multiply that by the millions of people in this nation. And basically what you have then is a revolutionary spirit: a whole multitude of people saying, down with the old ways, down with tradition, away with biblical authority, we will do it our way. We will make a new man, a new society, because God's ways are not enough for us. Now we are developed, I think therefore I am, we are great thinkers and we have created planes, and therefore we can create a new society. And if you do not follow us, who knows, maybe your life can be put away. It is a very dangerous thing when pride rules a nation and we forget God. And all of this starts really with a proud self-focused mentality.\n\nSo the pulpits of the land need to be speaking about these issues of the heart, or the people will not be informed and other ideologies will sweep into the land and start directing the vision of the people. And so let us fight against this sin for various reasons, even for God's blessing upon our nation.\n\nWe have seen various exhortations against pride from the Bible. So fathers, do this in your home, help your family fight pride. Pastors, I know that you are doing that here. Some devastating consequences of pride: a world of sin flows out of pride. And so if we want our marriages to have success, we need to battle pride. Imagine what a world of sin springs forth from pride in all these different areas of life.\n\nThe inefficiency of pride: when everyone is clamoring for their own way and first place, for their glory, for their honor. They detract from others. And so the purpose of the church, the whole work of the gospel, is bogged down because we are all caring about who will receive the credit for it.\n\nSo beware also of the great enticers toward pride in our culture in our day, which is mentioned: self-esteem doctrine. In the old days, pride was seen as a great sin. And today it is actually encouraged, even though there is no scientific proof that self-esteem actually helps people. This doctrine is nonetheless taught in pretty much all of our institutions today. And proud people love the doctrine of self-esteem because it allows them to feel good about being proud. But Paul had a very different vision of himself. He said, I am the chief of sinners, I need to be saved by grace. One of the most powerful men in human history — that is how he saw himself.\n\n## The Gospel Answer: The Humility of Christ\n\nAnd obviously we conclude with the great example of Christ. He said to take up your cross and follow him. And the big part of taking the cross is dying to self. It is dying to self-worship. And it is following God. It is loving God and loving others. In Jesus, he is the one who did that.\n\nSo though we have talked a lot about the sin of pride and hopefully you have reflected upon that in this brief moment, and you have been made aware of and reminded of the great danger of pride — and hopefully as Elder Nick prayed for us, the Word of God would speak to our own hearts — do not leave destroyed and discouraged because you see pride in your own heart. We have not talked about the various manifestations of pride. Pastor Tito would probably do that, or will do that. But leave with the gospel of Christ and in this example.\n\nClose with these words. Having the same mentality as Christ, Jesus who was in the form of God did not think that it was something to grasp onto to be God, but he emptied himself of all that and became a man. He humiliated himself and became obedient until death, the death of the cross. And for this reason, because of his great humility, he saves sinners. He actively obeys the Father. And so his righteousness, his obedience, his humility, becomes our humility. And the Father sees us as in Christ.\n\nSo Christian, rejoice in your Savior's perfect work. Do not be destroyed because of the sin in your life. But rejoice in Christ and be encouraged and strengthened to do battle today and tomorrow — in your marriage and in your families and in your society — for the glory of God. Amen.\n\nFather in heaven, we praise You for Your Word that teaches us about the greatest of dangers. You have warned us in so many ways — the passage in Hosea we saw today and the passage of Ezekiel that talks about the idolatrous pride of worshiping ourselves. Lord, continually we pray that we could put it off, we could fight it, we could take it off, and we could put on Christ's likeness, humility, in our relationships and in our thinking and our words. And forgive us where we fail this. And we thank You for the righteousness of Christ, his blessed work on our behalf. We praise You that You see us in Christ. And for that reason, Lord, we want to get up today and tomorrow and serve You and follow You and give our lives as a living sacrifice to the one who has given all for us. We praise You and thank You in Jesus name, Amen."};
