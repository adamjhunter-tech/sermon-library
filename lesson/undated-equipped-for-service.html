// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-equipped-for-service", "title": "Equipped for Service", "speaker": "Elder Scott Hollander", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["Equipped for Service - Elder Scott Hollander - Judges 3_12-31.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/equipped-for-service-elder-scott-hollander-judges-312-31", "tags": [{"tag": "salvation", "source": "detected"}, {"tag": "suffering", "source": "detected"}, {"tag": "courage", "source": "detected"}, {"tag": "repentance", "source": "detected"}, {"tag": "providence", "source": "detected"}, {"tag": "spiritual gifts", "source": "detected"}, {"tag": "service", "source": "detected"}], "scripture_references": [{"reference": "Judges 3:12-31", "type": "quoted", "source": "detected"}, {"reference": "Romans 3:9-10", "type": "quoted", "source": "detected"}, {"reference": "Romans 3:22-23", "type": "referenced", "source": "detected"}, {"reference": "Romans 5:8", "type": "referenced", "source": "detected"}, {"reference": "Ephesians 2:1-5", "type": "quoted", "source": "detected"}, {"reference": "Deuteronomy 8:5", "type": "referenced", "source": "detected"}, {"reference": "Proverbs 3:11-12", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 12:5-8", "type": "referenced", "source": "detected"}, {"reference": "Matthew 18:15-20", "type": "referenced", "source": "detected"}, {"reference": "Luke 19:10", "type": "referenced", "source": "detected"}, {"reference": "1 Corinthians 1:27", "type": "quoted", "source": "detected"}, {"reference": "1 Corinthians 12:12-31", "type": "referenced", "source": "detected"}, {"reference": "2 Corinthians 12:9", "type": "quoted", "source": "detected"}, {"reference": "Ephesians 6:10-18", "type": "referenced", "source": "detected"}], "outline": [{"title": "Man's Need for a Savior (Judges 3:12-15)", "subpoints": ["The sin cycle in Judges: Israel sins, God disciplines, the people suffer and repent, God raises a deliverer", "The Israelites were slaves to their own devices and prone to idolatry, just as we are today", "Romans 3:9 and 3:22-23: all have sinned and fall short of the glory of God -- Jews and Gentiles alike", "Even as believers, when we sin we face the disciplining hand of God as a loving Father (Hebrews 12:5-8)", "The goal of discipline is always repentance and reconciliation, as Matthew 18:15-20 describes"], "scripture": ["Judges 3:12-15", "Romans 3:9-10", "Hebrews 12:5-8", "Ephesians 2:1-5"]}, {"title": "God Equips His Servants: He Desires Your Weaknesses (Judges 3:15-26)", "subpoints": ["God raised up Ehud, identified by his tribe and by his left-handedness -- viewed as a handicap in that culture", "The name Ehud comes from the tribe of Benjamin, meaning 'son of the right hand' -- ironic for a left-handed man", "Courts never searched a man's right leg, so Ehud's left-handedness made him ideally suited to conceal his weapon", "1 Corinthians 1:27: God has chosen the weak things of the world to put to shame the mighty", "Moses also had a weakness -- poor speech -- yet God used him; when God calls, he equips"], "scripture": ["Judges 3:15-26", "1 Corinthians 1:27", "2 Corinthians 12:9"]}, {"title": "God Equips His Servants: He Desires Your Courage (Judges 3:16-26)", "subpoints": ["Ehud presented the tribute, escorted his assistants to safety, then returned alone for his secret mission", "He courageously approached Eglon with the ambiguous message: 'I have a secret thing from God for you'", "The name Eglon (little calf/rotund) and the imagery of the fat-swallowing sword are all literary irony", "Ehud rallied the troops of Israel and led them in decisive battle, bringing 80 years of peace", "It takes great courage to share the gospel, call out sin, and stand for Christ in a hostile world"], "scripture": ["Judges 3:16-26"]}, {"title": "God Equips His Servants: He Desires Your Willingness (Judges 3:31)", "subpoints": ["Shamgar killed 600 Philistines with an ox goad -- a farming tool, not a weapon", "He used what was available to him; he was likely a farmer pressed into service against the Philistines", "The song of Deborah (Judges 5:8) confirms there was not even one shield or spear among 40,000 in Israel", "God desires willingness to obey with whatever resources are at hand -- we each have a role in the body of Christ", "If nothing else, we can always pray -- and prayer is the armor of God that enables all other service"], "scripture": ["Judges 3:31", "1 Corinthians 12:12-31", "Ephesians 6:10-18"]}], "summary": "Elder Scott Hollander preaches from Judges 3:12-31, focusing on two main points: man's need for a Savior, and God's equipping of his servants for that saving work. The sermon opens by walking through the passage's narrative: Israel falls into the sin cycle described throughout Judges -- they sin, God disciplines them through enemies, they cry out in repentance, God raises a deliverer. The Moabites oppress Israel for 18 years under King Eglon before God raises up Ehud. Ehud assassinates Eglon and leads Israel to a decisive military victory, bringing 80 years of peace. The brief concluding verse introduces Shamgar, who killed 600 Philistines with an ox goad.\n\nThe first main point establishes that Israel's behavior is a mirror of human nature in general. Paul in Romans 3 says all -- Jews and Gentiles alike -- are under sin. We are no different from the Israelites in our need for a Savior. Ephesians 2:1-5 describes our natural condition as dead in trespasses and sins, but God who is rich in mercy made us alive together with Christ. Even as believers we face the disciplining hand of God when we sin, and that discipline is always intended to restore us to repentance.\n\nThe second main point -- God's equipping of his servants -- is developed through three applications drawn from the characters of Ehud and Shamgar. First, God desires your weaknesses for his purposes. Ehud was left-handed, which the Hebrew describes as literally \"restricted in his right hand\" -- an odd characteristic for a man from the tribe of Benjamin (\"son of the right hand\"). Yet this handicap was precisely what allowed him to conceal a weapon where no guard would look. 1 Corinthians 1:27 confirms that God regularly chooses the weak to shame the mighty. Second, God desires your courage. Ehud proceeded through multiple points of no return, culminating in the assassination of a foreign king in his private chamber. The courage to serve Christ -- to share the gospel, confront sin, and suffer for him -- is the same kind of courage needed. Third, God desires your willingness. Shamgar had no sword; he used an ox goad. Whatever you have in hand, use it for the Lord. The sermon closes with a call to repentance for any still in a cycle of unrepentant sin, and an encouragement to every believer to serve in whatever capacity God has equipped and placed them.", "transcript": "## Scripture Reading: Judges 3:12-31\n\nIf you are able, please remain standing. Our Scripture reading for this morning is found in Judges 3, verses 12 through 31. Judges 3, beginning at verse 12.\n\n*And the children of Israel again did evil in the sight of the Lord. So the Lord strengthened Eglon, king of Moab, against Israel, because they had done evil in the sight of the Lord. Then he gathered to himself the people of Ammon and Amalek, went and defeated Israel, and took possession of the city of Palms. So the children of Israel served Eglon, king of Moab, eighteen years. But when the children of Israel cried out to the Lord, the Lord raised up a deliverer for them: Ehud, the son of Gera, the Benjaminite, a left-handed man. By him the children of Israel sent tribute to Eglon, king of Moab. Now Ehud made himself a dagger (it was double-edged and a cubit in length) and fastened it under his clothes on his right thigh. So he brought the tribute to Eglon, king of Moab. (Now Eglon was a very fat man.) And when he had finished presenting the tribute, he sent away the people who had carried the tribute. But he himself turned back from the stone images that were at Gilgal, and said, \"I have a secret message for you, O king.\" He said, \"Keep silence,\" and all who attended him went out from him. So Ehud came to him (now he was sitting upstairs in his cool private chamber). Then Ehud said, \"I have a message from God for you.\" So he arose from his seat. Then Ehud reached with his left hand, took the dagger from his right thigh, and thrust it into his belly. Even the hilt went in after the blade, and the fat closed over the blade, for he did not draw the dagger out of his belly; and his entrails came out. Then Ehud went out through the porch and shut the doors of the upper room behind him and locked them. When he had gone out, Eglon's servants came to look, and to their surprise, the doors of the upper room were locked. So they said, \"He is probably attending to his needs in the cool chamber.\" So they waited till they were embarrassed, and still he had not opened the doors of the upper room. Therefore they took the key and opened them. And there was their master, fallen dead on the floor. But Ehud had escaped while they delayed, and passed beyond the stone images and escaped to Seirah. And it happened, when he arrived, that he blew the trumpet in the mountains of Ephraim, and the children of Israel went down with him from the mountains, and he led them. Then he said to them, \"Follow me, for the Lord has delivered your enemies the Moabites into your hand.\" So they went down after him, seized the fords of the Jordan leading to Moab, and did not allow anyone to cross over. And at that time they killed about ten thousand men of Moab, all stout men of valor; not a man escaped. So Moab was subdued that day under the hand of Israel. And the land had rest for eighty years. After him was Shamgar the son of Anath, who killed six hundred men of the Philistines with an ox goad; and he also delivered Israel.*\n\nThus ends our reading of God's word. Let us look to the Lord in prayer.\n\n*Again, our Father and our God, we ask that you would bless the preaching of your word. I ask that my words would not be a distraction and that your word would not return void. We ask this in Christ's name. Amen.*\n\nYou may be seated.\n\n## Introduction\n\nThis morning I want us to consider two distinct points from this portion of Judges 3. First, to reflect upon our own need for a Savior -- God raised up Jesus Christ as our Savior from the effects of our sin and rebellion. Initially when God equips his people for service, he readily uses our handicaps, our giftedness, and whatever resources we have available. Furthermore, this text compels us to translate our courage into action because of our faith in Yahweh.\n\nIn this passage we will see one of the sin cycles of the Israelites during the period of the Judges: a state of sin followed by God's hand of discipline, the people feeling the effects of their sin and its consequences, followed by their humility and repentance before God, and then ultimately God's positive response to send them a Savior, a deliverer.\n\nWe must be cautioned, however, from believing that we are any different today in our own need for a Savior. Additionally in this passage we will see the character and actions of two men whom God raised up to be a temporary and a type of Savior for his people.\n\n## Main Point 1: Man's Need for a Savior (Verses 12-15)\n\nThe children of Israel again did evil in the sight of the Lord. So the Lord strengthened Eglon, king of Moab, against Israel, because they had done evil in the sight of the Lord.\n\nIn the Israelites' cycle of sin, we first observe: **the Israelites sin against God.** One of the themes of Judges comes from the repeated phrase throughout the book: \"In those days there was no king in Israel. Everyone did what was right in his own eyes.\" This is exemplified in this text. There was no moral political leader to unify the nation, so they behaved tribally and failed to rally behind faith in their one true God Yahweh. They were slaves to their own devices and prone to idolatry.\n\n**God disciplines his people.** The Old Testament consistently demonstrates that God would discipline and shepherd his people when they sin -- both intentionally and unwittingly. God would not allow his people to wallow in their sins, so he would bring them to task. In this case he raised up the Moabites, with whom the Israelites had continuous drama. The Moabites came from the descendants of Lot, so they were kin. But the Israelites were ill-treated by them consistently.\n\n**The people suffered the consequences of their sin** (verse 14). Being defeated by the Moabite alliance, the people of Israel were compelled to pay an annual tribute to the king of Moab, who set up a palace in the city of Palms -- likely the old city of Jericho. The servitude and payments of tribute must have been harsh enough to eventually compel the people to turn to God for relief.\n\n**The people were drawn to repentance and humility before God.** After 18 years, they finally cried out to the living God Yahweh. Again, the text is unclear as to what extent their repentance took shape, but they at least directed their prayers to Yahweh. There were likely all forms of immorality corrupting the people of Israel. However, it seems evident from the surrounding context that idolatry was likely the primary problem.\n\n**God responded and raised up a Savior.** The text tells us that Yahweh heard their pleas, indicated by his response to raise up a deliverer for them.\n\nIf one were to read through the book of Exodus and into Judges, one might be quick to conclude that these folks never seem to learn their lesson. They continually doubted God and turned to idols, immorality, complaining, and other acts of unfaithfulness. The problem is that somehow we believe we are different. We think that we would have acted differently, or that we are acting differently now -- and I would argue that we are no different.\n\nIf you are in this room today and have never turned to Jesus Christ in faith for repentance and reconciliation, then you are still at enmity with God. You are an enemy of God in rebellion against him. Paul summarizes it twice in Romans 3. In Romans 3:9 he asks, \"Are we better than they? Not at all. For we have previously charged both Jews and Greeks that they are all under sin.\" And in verse 22-23: \"For there is no difference; for all have sinned and fall short of the glory of God.\"\n\nIn our original state, all of us are sinners, all of us in need of repentance and reconciliation to God. We too require a Savior. Christ is that Savior. Romans 5:8: \"God demonstrates his own love toward us in that while we were still sinners Christ died for us.\" And Ephesians 2:1-5: \"And you he made alive who were dead in trespasses and sins... but God, who is rich in mercy, because of his great love with which he loved us, even when we were dead in our trespasses, made us alive together with Christ. By grace you have been saved.\"\n\nFurthermore, when we sin -- if we are followers of Christ -- we justly face the disciplining hand of God. Deuteronomy 8:5: \"You should know in your heart that as a man chastens his son, so the Lord your God chastens you.\" Proverbs 3: \"My son, do not despise the chastening of the Lord, nor detest his correction; for whom the Lord loves he corrects, just as a father the son in whom he delights.\" And Hebrews 12 expounds this: \"Whom the Lord loves he chastens, and he scourges every son whom he receives.\"\n\nEven as believers, when we sin, we are called to repentance. Luke records Peter's sermon in Acts 3:19: \"Repent therefore and be converted, that your sins may be blotted out, so that times of refreshing may come from the presence of the Lord.\" This culture of repentance is both for the unconverted and for the church. Matthew 18:15-20 tells us the intent of confronting sin in a brother or sister is always repentance and reconciliation.\n\n## Main Point 2: God's Equipping of His Servants\n\nThis leads us to our second main point. God's equipping of his servants.\n\n### Application 1: God Desires Your Weaknesses for His Purposes (Verses 15-26)\n\nIn verse 15, Ehud is identified by his tribe -- a common moniker -- but also by his trait of being left-handed. This foreshadows a key point, but it is also full of irony. As the passage describes, Ehud is about to make a left-handed tribute indeed.\n\nIn one of Charles Schulz's Peanuts cartoons, Linus is chomping on a peanut butter and jelly sandwich. He notices his hands and exclaims, \"Hands are fascinating things. I like my hands. I think I have nice hands. My hands seem to have a lot of character. These are hands which may someday do marvelous works. They may build mighty bridges or heal the sick or hit home runs or write soul-stirring novels. These are hands which may someday change the course of destiny!\" Lucy looks down at them and matter-of-factly observes: \"They've got jelly on them.\"\n\nEhud did not have jelly on his hands, but as a left-handed man, the Israelites would have viewed his left-handedness as a handicap. The Hebrew records it as literally \"impeded or bound or restricted of his right hand.\" The irony is further palpable since he is described as a Benjaminite, which is literally translated \"son of the right hand\" -- essentially, Yahweh has selected from the sons of the right hand a handicapped man, because his right hand did not function as his dominant hand.\n\nBut common is as common does, and the norm in Israel was a lot of idolatry. So the author demonstrates that God raised up an uncommon man for a well-suited, uncommon mission. Because of Ehud's handicap, he was strong and capable in his left hand -- which made him a threat. Courts would never search a man on his right leg because all men carried their sword on their left hip. So Ehud crafted himself a dagger about 15 inches long that he could strap to his right leg without suspicion.\n\nThe irony digs even deeper in Hebrew. What we read in English as a \"double-edged dagger\" can be translated literally as a \"two-mouthed sword.\" In Semitic idioms, swords are described as having mouths and eating their prey. The target for this sword was a man so fat he must have had two mouths to get that big. Thus this small sword would make short work of the large mouth-eater.\n\nThroughout Scripture, God demonstrates that he prefers to use the weaknesses of mankind to fulfill his purposes. 1 Corinthians 1:27: \"God has chosen the foolish things of the world to put to shame the wise, and God has chosen the weak things of the world to put to shame the things which are mighty.\"\n\nMoses also had a weakness -- at the burning bush he claimed, \"O my Lord, I am not eloquent... I am slow of speech and slow of tongue\" (Exodus 4:10). But God told him, \"Who has made man's mouth? Or who makes the mute, the deaf, the seeing, or the blind? Have not I, the Lord?\" The lesson: Yahweh will equip his servants for the purpose for which he calls them.\n\nBeliever, when God calls you to service, consider the opportunity -- not your weakness. As Paul recorded in 2 Corinthians 12:9: \"My grace is sufficient for you, for my strength is made perfect in weakness.\" To which Paul responds: \"Therefore most gladly I will rather boast in my infirmities, that the power of Christ may rest upon me.\"\n\nGod does prepare his servants for their service. Moses had both royal and wilderness training that would prepare him for his task. Joshua shadowed Moses for 40 years in the wilderness and extended personal time in the presence of Yahweh in the tent of meeting. The New Testament demonstrates in several passages that we are all different members in the one body of Christ (1 Corinthians 12:12-31), each fulfilling critical functions for the equipping of the whole body. Consider your giftedness and apply it to service.\n\n### Application 2: God Desires Your Courage for His Purposes (Verses 16-26)\n\nThe setting of Ehud's mission was the presentation of the annual tribute to King Eglon. At any point Ehud could have abandoned his cause. Rather, he presented the tribute and escorted his assistants back to safety before returning for his secret mission alone with the king.\n\nUpon his return, he told the foolish king that he had a secret message for him. And prior, the imprudent king would call for silence and dismiss the whole court, including his bodyguards. To further set up Eglon for his downfall, Ehud told the king that indeed this message was from God, evoking the positive response of the king rising from his seat.\n\nHerein lies further irony. Ehud used the common term for deity -- Elohim -- which could be rightly translated as the title for the one true God Yahweh, or the plural form for deities in general. Eglon was not a follower of Yahweh, so it was appropriate that Ehud used a purposefully ambiguous term to elicit a positive response. Additionally, the word translated \"message\" has a broad scope of meaning in Hebrew -- it includes both \"word\" or \"message\" but also \"thing\" or \"object.\" Ehud ambiguously advised Eglon that he had a secret thing from God for him -- to wit, a hidden sword strapped to his right thigh.\n\nWithout further hesitation, Ehud courageously drew his sword, charged the fat defenseless king, and plunged the sword deep into the obese man's belly. Because of the swiftness of the blow and the girth of the king, his fat belly quickly swallowed up the two-mouthed sword.\n\nEhud's courage is further demonstrated in his action to rally the troops of Israel and lead them in combat against the confused Moabites. God used the courage of Ehud to slay the king and defeat the Moabite forces to bring a complete victory for the Israelites -- peace for 80 years.\n\nAlthough Ehud is a type of savior who brought a temporary victory and rest to his people, Jesus is the ultimate fulfillment -- bringing perfect peace and victory to the people of God. But God also wants to employ the courage of his people to fulfill the works he has prepared for them from before the foundation of the world. It takes great courage to share the gospel in a stark world, to call out sin and urge others to repentance -- but this is the mission to which we are called.\n\n### Application 3: God Desires Your Willingness for His Purposes (Verse 31)\n\n\"After him was Shamgar the son of Anath, who killed six hundred men of the Philistines with an ox goad; and he also delivered Israel.\"\n\nWe know little about Shamgar, but we can assert that he willingly stood up on account of God's mission. Whereas Ehud was confronting the Moabites in the eastern half of Israel, generally speaking, the threat of the Philistines was from the west, toward the Mediterranean Sea.\n\nFrom the text we may infer that Shamgar was likely a farmer because of his tool of choice. An ox goad is as it sounds -- a farming implement used to prod and direct a large ox wherever you wanted it to go. It would have been a long staff of hardwood, perhaps eight feet long, with an iron tip.\n\nShamgar was resigned to using what he had available. The Song of Deborah in Judges 5 is the only other place Shamgar is mentioned in the Bible. In Judges 5:8, the song states there was not even one shield or spear among 40,000 men in Israel. Hundreds of years later, Jonathan and his armor-bearer faced similar odds in 1 Samuel 13-14. There was no blacksmith throughout the land of Israel, for the Philistines controlled metalworking.\n\nShambar had faith in Yahweh because God raised him up to defend and deliver his people. Furthermore, he was courageous -- for no matter how you calculate the math, for one man to kill 600 takes strength and endurance. The accolades of David's mighty men in 2 Samuel 23 demonstrate that victory against great odds was not out of the question, even if uncommon.\n\nBelieve, just as God desires to use your weaknesses and your courage, he desires your willingness to obey with action. Take whatever resources you have readily available and serve Yahweh. Take account of your weaknesses and your training, muster your courage in faith in Yahweh, and meet the task head on. We are all members of the body of Christ and we each have a role to play. Serve where you feel gifted -- but serve.\n\nConsider also the resources we have available. We have the ability and the responsibility to daily put on the armor of God (Ephesians 6:10-18). And as Paul concludes that passage: pray for one another with all prayer and supplication. If you can do nothing else, you can always pray.\n\n## Closing\n\nWe observe the cycle of Israel's sin from the opening verses: the effect, God's response, their repentance. The Israelites sinned against God. God disciplined his people. The people suffered the consequences of their sin. The people were drawn to repentance and humility before God. And God raised up a Savior. We are no different. We are all indeed in need of a Savior.\n\nGod raises up and enables his servants. And in doing so, it is a call to arms for us. God desires your weaknesses for his purposes. God desires your courage for his purposes. And God desires your willingness for his purposes.\n\nIf you are currently in a cycle of unrepentant sin, I pray that today you would humbly seek repentance from God and turn from your sins. If you have never bowed the knee to Jesus, I pray that today would be the day of salvation for you. Jesus Christ is the perfect Savior that God raised up to deliver us from the slavery of our sin and the righteous wrath and judgment of God because of our sin. Today is the day of salvation -- do not delay.\n\nFinally, take courage, brothers and sisters: God desires to use you to serve as a member in the body of Christ in the spread of the gospel and in the nurture and admonition of the saints.\n\nLet us pray.\n\n*Our Heavenly Father, we ask that you would enable us, strengthen us. Give us courage to use our weaknesses and our giftedness for you. We ask that we would follow hard after you and that we would seek to serve well as members in your body. We ask this in Christ's name. Amen.*"};
