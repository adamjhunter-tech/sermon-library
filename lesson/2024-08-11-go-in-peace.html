other times facing the presence of God", "God instructs the priest among all his duties to take time to remind God's people that God blesses them"], "scripture": ["Numbers 6:22-27", "Deuteronomy 21:5"]}, {"title": "The Abundance of God's Blessing", "subpoints": ["God blesses not with a little bit but with himself — there is no greater blessing", "2 Corinthians 9:8: God is able to make all grace abound toward you, that you always, having all sufficiency in all things, may have an abundance for every good work", "The greatest blessing is not ease, wealth, or praise — it is the grace to do every good work", "The blessing of growing in holiness, of sin becoming more sinful to you — this is God's presence in your life"], "scripture": ["2 Corinthians 9:8"]}, {"title": "The Three Dimensions of the Blessing", "subpoints": ["\"The Lord bless you and keep you\" — God's keeping, protective care over his people", "\"The Lord make his face shine upon you and be gracious to you\" — God's favor and grace, undeserved", "\"The Lord lift up his countenance upon you and give you peace\" — shalom: comprehensive well-being, wholeness, reconciliation with God"], "scripture": ["Numbers 6:24-26"]}, {"title": "Application: Being Sent with God's Blessing", "subpoints": ["As the Hoy family goes to serve the Lord in Australia, they go with this blessing — not in the name of the church but in the name of God", "The blessing is not dependent on circumstances but on who God is: Yahweh, the God who always is", "The church too is blessed in this same way as we continue in the mission together"], "scripture": []}], "summary": "Preaching for the first time in 25 years of ministry from the book of Numbers, Pastor Lyro delivers the Aaronic benediction (Numbers 6:22-27) as a farewell message for the Hoy family, who are leaving to serve the Lord with a church plant in Australia. He establishes that while Aaron and his priestly sons speak the words, it is God himself who blesses — the three-fold repetition of the divine name Yahweh in verses 24-26 making unmistakably clear that the source of every blessing is the Lord. The sermon draws out that the Aaronic benediction became the template for Paul's apostolic greetings and that God explicitly commands the priest, amid all his duties, to remind the people of God's blessing upon them. The three strophes of the benediction are unpacked — God's protecting keeping, his gracious shining face, and his gift of peace — with the note that God never blesses meagerly: 2 Corinthians 9:8 describes a grace that is all-sufficient for every good work. The congregation is called to recognize that the presence of God in their lives — growth in holiness, deepening hatred of sin — is itself the greatest blessing, and that the Hoys depart not on the basis of the church's commendation alone but bearing the very name of the Lord.", "transcript": "## Scripture Reading: Numbers 6:22-27\n\nAmen. If you're able, would you remain standing for the reading of God's Word, reading out of Numbers chapter six? I'll surprise you when I say I was surprised when preparing this sermon to realize this is the first time in 25 years of ministry that I'm preaching from the book of Numbers. Numbers chapter six, starting at verse 22, reading through verse 27. This is the word of our Lord.\n\nAnd the Lord spoke to Moses, saying, Speak to Aaron and his sons, saying, This is the way you shall bless the children of Israel. Say to them: The Lord bless you and keep you; the Lord make his face shine upon you and be gracious to you; the Lord lift up his countenance upon you and give you peace. So they shall put my name on the children of Israel, and I will bless them. This is the word of our Lord.\n\n## A Farewell Service\n\nIn God's good providence, the Hoy family have decided that they can serve the Lord better by becoming part of a church plant in Australia, where they have moved to. And we want to say farewell to them today as they leave us. We are thankful for the years that the Lord had them stay with us. We are thankful for Andrew's ministry to us as an elder. We are thankful for being able to see Eve and Mary and Kozy grow up to this point. We are thankful for being able to welcome Leland and Edmund and Florence into this world. And we are thankful for Katie's ministry to the women of the church.\n\nWe want to send them off with the Lord's blessing. And this passage expresses well what we desire for the Hoys — and not only for the Hoys but for all of us.\n\n## Context of the Aaronic Benediction\n\nAs you look at this chapter, you see that nestled between the very precise and demanding requirements for the Nazirite (verses 1-21, if you'd like to read them later) and the very generous giving of the leaders of Israel to the work of the Lord in chapter 7, we find what has become known as the Aaronic benediction. It's called that because Aaron and his sons as high priests were to pronounce that blessing upon the people. The word benediction just means \"a good saying\" or \"saying good\" — which boils down to pronouncing a blessing upon people.\n\nThe Scriptures are filled with pronouncements of blessings, because the Scriptures are the words of the God who blesses us. We can think of the Beatitudes, for example, which just means \"blessed\" — a list of the ways that the Lord blesses those who follow him. We can think of the apostolic benediction at the end of 2 Corinthians 13:14, which is what we use most Sundays: the grace of the Lord Jesus Christ, the love of God the Father, and the fellowship of the Spirit be with you all. And we can think of the Aaronic benediction here, which became the basis for the greetings that the apostles used in their letters. For example, Paul in Romans 1:7 bases his greeting to the Roman church on this passage when he says, to all who are in Rome, beloved of God, called to be saints: grace to you and peace from God our Father and the Lord Jesus Christ.\n\n## The One Who Blesses\n\nThe first thing I want us to see is the one who blesses. Look at the passage again. The Lord spoke to Moses, saying, Speak to Aaron and his sons, saying, this is the way you shall bless the children of Israel. So here is Aaron and his sons — all high priests from that moment on — you're going to bless the people, these are going to be the formal words you speak to them.\n\nBut I want you to see that it's not Aaron or his sons who bless the people, even though they're there saying the words. Look at verses 24-26: The Lord bless you and keep you; the Lord make his face shine upon you and be gracious to you; the Lord lift up his countenance upon you and give you peace. So as Aaron stands before the people, he's not saying, I bless you. It is God who is speaking to his people through the priest. It is God who blesses his people. It is the Lord and the Lord only who blesses his people.\n\nNotice how God's name is mentioned three times in the beginning of each blessing — in verses 24, 25, and 26. We make a big deal of the \"thrice holy\" in Isaiah 6 and Revelation 4, where the angels are saying, holy, holy, holy, the Lord God Almighty. But here again we have the thrice name of God mentioned: Lord, Lord, Lord. The Holy Spirit did not want to leave any doubt as to whom the source of every blessing is. It is Yahweh, the Lord God, who blesses his people. It is Yahweh the Lord God who blesses us even as we follow him in Jesus Christ.\n\nIn the midst of all the duties given to the high priest — sacrifices, intercession for the people, judging the people — God instructs the high priest that he must take the time to remind God's people that God blesses them. Notice that's not so much a call for blessing as a reminder that God blesses them. The Lord blesses you and keeps you; the Lord makes his face shine upon you. He's stating things that God does for them, in the shape of blessing. And as the Hoys go on, we want them to be blessed in the name of the Lord — not in our name, not because of who we are, but because of who God is: their God, our God.\n\n## The Abundance of God's Blessing\n\nBrothers and sisters, it is the Lord God who blesses us, and he makes sure that we know that his blessings are abundant. God doesn't bless us with a little bit. He blesses us with himself, and there's no greater blessing.\n\nBut pastor, if you knew my life, you'd know I don't live a blessed life. Is God with you? Is Christ — Emmanuel, God with us — is the Spirit of God dwelling in you? What blessing have you not received? What is it in this world that can compare to the presence of God Almighty in your life? Who has redeemed you, who brought you to faith in Jesus Christ, now walks with you all the way to heaven, and one day you will see him as he is, for you will be like him?\n\nMatthew Henry, the old Puritan commentator, says: though the priest of himself could do no more than beg a blessing, yet being an intercessor by office, and doing that in his name who commands the blessing, the prayer carried with it a promise, and he pronounced it as one having authority.\n\nWith his hands lifted up and his face raised to the people during the blessing — the blessing was the only time that the priest would face the people; every other time in the tabernacle and temple worship, the priest would be facing the presence of God, interceding for the people — at that moment he would turn and face the people, face the people as with the face of God as it were, raise his hands as if laying his hands on the heads of the people, and bless them. And their blessing was God's blessing of them.\n\nAnd God blesses us abundantly. In 2 Corinthians 9:8, the apostle says — listen for the superlatives, listen for all the \"all\" — God is able to make all grace abound toward you, that you, always having all sufficiency in all things, may have an abundance for every good work. Did you follow Paul here? The greatest blessing that you have in your life is not a well-paying job, not an inheritance, not ease of life, not everybody around you liking you. The greatest blessing is the grace that he gives you — the grace for every good work.\n\nAm I not blessed? Are you growing in Jesus Christ? Are you growing in holiness? Is sin becoming more sinful to you? Are you becoming more like Christ? Yes — that's the blessing of the presence of God in your life.\n\n## The Three Dimensions of the Blessing\n\nWho is this God who blesses us? The Holy Spirit tells us that he is Yahweh — the God who always is. And as we unpack the three strophes of the blessing, we see three dimensions of that blessing.\n\nFirst: the Lord bless you and keep you. God's protective, preserving care over his people — keeping them in his grace, keeping them from falling away, keeping them safe under his sovereign hand.\n\nSecond: the Lord make his face shine upon you and be gracious to you. God's favor turned toward you — his face shining, his grace given freely. This is undeserved. It is not because of who we are but because of who he is — a God who is gracious.\n\nThird: the Lord lift up his countenance upon you and give you peace. Shalom — comprehensive well-being, wholeness in every dimension, the restoration of the relationship between God and his people. This is the peace that passes understanding, the peace that Christ himself is.\n\n## Conclusion: Go in the Name of the Lord\n\nAnd so as the Hoy family goes, they go with this blessing — not in the name of this congregation only, but in the name of the Lord. Not because of our commendation but because of his name placed upon them. And the same blessing rests on every one of us here who trust in the Lord Jesus Christ. Whatever deep waters any of us are going through, the Lord is right there. Whatever the Hoys will face in Australia, whatever we will face here — the Lord bless you and keep you; the Lord make his face shine upon you and be gracious to you; the Lord lift up his countenance upon you and give you peace. Let us pray together.\n\nLord our God, we thank you that you have given us your Word. We pray that your Spirit attend to the preaching of this portion of your Word and that you be exalted in our hearts. We pray for the Hoys — bless them in the name of the Lord. We pray that even as we continue here and they begin their new chapter, your name rests upon all of us. In Jesus' name. Amen."};
