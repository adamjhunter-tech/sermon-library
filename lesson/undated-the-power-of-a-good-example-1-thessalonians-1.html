// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-the-power-of-a-good-example-1-thessalonians-1", "title": "The Power of a Good Example", "speaker": "Dr. John Battle", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["The Power of a Good Example - GUEST SPEAKER_ Dr. John Battle - 1 Thessalonians 1.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/the-power-of-a-good-example-guest-speaker-dr-john-battle-1-thessalonians-1", "tags": [{"tag": "imitation of Christ", "source": "detected"}, {"tag": "evangelism", "source": "detected"}, {"tag": "faith", "source": "detected"}, {"tag": "love", "source": "detected"}, {"tag": "hope", "source": "detected"}, {"tag": "church", "source": "detected"}, {"tag": "gospel", "source": "detected"}], "scripture_references": [{"reference": "1 Thessalonians 1", "type": "quoted", "source": "detected"}], "outline": ["Introduction by guest speaker Dr. John Battle", "1 Thessalonians 1: the Thessalonian church as an example to all Macedonia and Achaia", "Their faith, love, and hope in the Lord Jesus Christ (v.3)", "How the gospel came in power and in the Holy Spirit (v.5)", "They turned from idols to serve the living and true God (v.9)", "The power of a good example in spreading the gospel"], "summary": "A guest sermon by Dr. John Battle on 1 Thessalonians 1, exploring the power of the Thessalonian church as a living example of the gospel. Their faith, love, and hope—along with their turning from idols to the living God—made them a model that rang out through Macedonia and Achaia. The gospel came not in word only but in power, in the Holy Spirit, and in full conviction.", "transcript": "## A Chain of Examples\n\nAn example is something you follow. Paul mentions in 1 Thessalonians 1 that a chain of examples leads back to the Lord Jesus Christ himself. In verse 6: *\"You became followers of us and of the Lord, so that you became examples to all in Macedonia and Achaia.\"* The Lord provides the anchor — if you are an example of what Christ is, those who follow you will be following a good example.\n\nThe structure Paul gives us is this: Christ is the source, the apostles followed Christ, the Thessalonians followed the apostles and the Lord, and they in turn became examples to others. This morning we consider this chain in four areas: faith, life, patience, and zeal.\n\n## Follow the Example of Other Christians\n\nPaul says in verse 6, *\"You became followers of us.\"* This means following other Christians in the areas where they provide a genuinely good example — not their quirks or easy habits, but the things that require discipline, sacrifice, practice, and wisdom. The book of Hebrews says: *\"Remember those who rule over you... whose faith follow, considering the outcome of their conduct\"* (Hebrews 13:7).\n\n**In faith:** Paul says in verse 6 that the Thessalonians received the word. Those who speak the word of God faithfully — whose words are seasoned with truth and encourage others toward Christ — those are the ones to follow. Augustine, in his writings against his opponents, repeatedly appealed to the faithful teachers who had gone before him. The novelty of an opponent's doctrine was itself a mark against it.\n\n**In life:** Paul writes in verse 5: *\"Our gospel did not come to you in word only, but also in power and in the Holy Spirit and in much assurance, as you know what kind of men we were among you for your sake.\"* Our lives must back up what we say. Look for those whose daily conduct shows the virtues of Christianity — in their speech, their treatment of others, their home life.\n\n**In patience:** Verse 6 says the Thessalonians received the word *\"in much affliction.\"* Jesus described some who hear the word with joy but have no root, so that when persecution comes they fall away. Look instead for those who are faithful under pressure — people who give their testimony even when it costs them something. The church has always said that the blood of the martyrs was the seed of the church.\n\n**In zeal:** Verse 6 says they received the word *\"with joy of the Holy Spirit.\"* Seek out those who love the things of God and are genuinely happy when doing God's will. Follow that example.\n\n## Follow the Example of Christ\n\nPaul says we are to follow *\"us and of the Lord\"* — meaning Christ himself is the anchor of the chain.\n\n**Christ as example of faith:** Hebrews 12:2 says:\n\n> *\"Looking unto Jesus, the author and finisher of our faith, who for the joy that was set before Him endured the cross, despising the shame, and has sat down at the right hand of the throne of God.\"* (Hebrews 12:2)\n\nChrist endured because he had faith in what would come after — the joy set before him. Many martyrs throughout history could only have endured by that same faith that glorification awaited them.\n\n**Christ as example of life:** Hebrews 2:17 tells us Christ *\"had to be made like His brethren, that He might be a merciful and faithful High Priest.\"* And Hebrews 4:15:\n\n> *\"We do not have a High Priest who cannot sympathize with our weaknesses, but was in all points tempted as we are, yet without sin.\"* (Hebrews 4:15)\n\nHe endured temptation and resisted it. We can come to him for help because he has been through greater things than we face.\n\n**Christ as example of patience:** 1 Peter 2:21-24:\n\n> *\"Christ also suffered for us, leaving us an example, that you should follow His steps: who committed no sin, nor was deceit found in His mouth; who, when He was reviled, did not revile in return; when He suffered, He did not threaten, but committed Himself to Him who judges righteously.\"* (1 Peter 2:21-23)\n\n**Christ as example of zeal:** Hebrews 10:5-7 quotes the Psalm Christ fulfills:\n\n> *\"Sacrifice and offering You did not desire, but a body You have prepared for Me... Behold, I have come to do Your will, O God.\"* (Hebrews 10:5-7)\n\nThe prophet Isaiah said *\"Here am I, send me\"* — but this passage in Hebrews shows us something greater: the eternal Son coming in the flesh, saying *\"I have come to do Your will, O God.\"*\n\n## Be a Good Example for Others\n\nPaul says in verse 7: *\"You became examples to all in Macedonia and Achaia who believe.\"* People were following the Thessalonians without them fully realizing it. That is both encouraging and sobering.\n\n**Example in faith:** Verse 8 says *\"from you the word of the Lord has sounded forth.\"* The testimony of these Christians spread far beyond Macedonia and Achaia. When we speak, the question to ask is: am I giving what God would approve? Is what I am saying compatible with his word?\n\n**Example in life:** Verse 3 commends their *\"work of faith, labor of love, and patience of hope.\"* The things we do casually — the music we listen to, the way we treat people — are observed by others. Like the detective Columbo, people are always investigating.\n\n**Example in patience:** Verse 6 says they received the word *\"in much affliction.\"* The patience of hope meant they were steadfast even when it cost them something.\n\n**Example in zeal:** Verse 8 shows the Thessalonians' active testimony spread throughout the region. Getting the word out takes effort.\n\n## Unconscious Influence\n\nAs we close, consider the famous sermon on \"unconscious influence\" drawn from John 20. When Mary Magdalene reported the empty tomb, Peter and John ran to it. John arrived first but waited at the entrance. Then Peter, characteristically, rushed straight in. Verse 8: *\"Then the other disciple, who came to the tomb first, went in also; and he saw and believed.\"*\n\nWhy did John go in? Because Peter went first. Peter had no intention of setting an example for John — he was simply thinking about finding the Lord. But because he went in, John followed, and John believed.\n\nAs we live our lives day to day, we do things because of our faith, and we often do not realize the influence we have on those around us. May that influence be a good one. May we be examples to all those not only in our own county but to the end of the earth — as the Thessalonians were to Macedonia and Achaia."};
