vens — the heaven of heavens where God dwells with angels; the visible sky/space heavens are created on Day 2 (v.8). Both are finite, not eternal"], "scripture": ["Genesis 1:1"]}, {"title": "2. Twelve Attributes of God from Genesis 1:1", "subpoints": ["(1) God is one — 'In the beginning, God' — only one God; also simple (not composite, not made of parts, therefore uncreated)", "(2) God is spirit — he existed before matter and energy; 'God is a spirit' (John 4:24)", "(3) God is eternal — he existed before the beginning; no beginning, no end", "(4) God is infinite — he has no limits; he created a finite world, so he must be infinite (Psalm 145:3)", "(5) God is unchangeable — before creation nothing could change him; after creation he controls it, so nothing can change him; 'the Father of lights, with whom there is no shadow of change' (James 1:17)", "(6) God is self-existent — before the beginning, nothing existed but God; his existence derives from himself (the aseity of God); 'I AM WHO I AM' (Exodus 3)", "(7) God is life — he has life in himself; we derive life from things outside us; 'In him we live and move and have our being' (Acts 17:28)", "(8) God is immortal — nothing existed to take his life from him before or after creation", "(9) God is creator — bara: he creates; no creature creates in this sense", "(10) God is omnipotent — creating everything ex nihilo requires all power", "(11) God is omniscient — he did not grow in wisdom as he created; his knowledge is complete and whole from eternity", "(12) God is sovereign — if he is powerful enough to make everything, he is powerful enough to control everything he made"], "scripture": ["Genesis 1:1", "John 4:24", "Acts 17:28"]}, {"title": "3. Liturgical and Practical Application", "subpoints": ["Genesis 1:1 is the first call to worship in the Bible — just as Neil Armstrong worshipped when he saw the heavens and earth from space", "Psalm 121:2: 'My help comes from the LORD, who made heaven and earth'; Psalm 124:8: 'Our help is in the name of the LORD, who made heaven and earth' — this was Calvin's standard call to worship for the Reformed church", "God can help us with anything because he made everything — his attributes as creator guarantee his ability to sustain, comfort, and govern his creatures", "Dr. Gibson's personal testimony: when his daughter Laela was stillborn at nine months (2019), it was Genesis 1 that gave him comfort — after darkness comes light, after evening comes morning; a sovereign creator who made everything can be trusted in everything", "The children's book *The Moon Is Always Round* grew from a conversation with his young son Ben — 'the moon is always round even when you can't see all of it; God is always good even when you can't see him being good in everything'"], "scripture": ["Psalm 121:2", "Psalm 124:8"]}], "summary": "A Sunday school lesson by guest speaker Dr. Jonathan Gibson (Associate Professor of Old Testament, Westminster Theological Seminary), focusing solely on Genesis 1:1. Three frameworks are applied: the verse is liturgical (a call to worship, as when Neil Armstrong quoted it from orbit), theological (12 attributes of God are deduced from the single verse: one, spirit, eternal, infinite, unchangeable, self-existent, living, immortal, creator, omnipotent, omniscient, sovereign), and practical (God can help us with anything because he made everything). The Hebrew word bara (to create) is explained: God is its only subject in the entire OT, and in Genesis 1:1, ex nihilo creation is required because before the beginning only God existed. The heavens of verse 1 are the invisible heavens where God dwells; the visible sky is created on Day 2. The lesson closes with Dr. Gibson's testimony: when his daughter Laela was stillborn, Genesis 1 was a source of profound comfort — the sovereign creator who controls light and darkness is trustworthy even in grief. His children's book *The Moon Is Always Round* grew from a conversation with his young son Ben about God's unchanging goodness.", "transcript": "## Introduction\n\nThank you for having me. I was asked last night if I'd take the Sunday school this morning — so if it's really bad, you can blame Pastor Tito.\n\nI thought I would stay on the theme of the Genesis Prologue, since I've just been working through that material. We'll focus on chapter 1, verse 1 — the very first verse of the Bible.\n\nYou may not even need to open your Bible for this one: *In the beginning, God created the heavens and the earth.*\n\nIn 1969, as Apollo 11 was circling the moon, waiting to land, Neil Armstrong radioed back to NASA on live television and quoted that verse as he looked out at the earth and the expanse of space. What a verse to choose. What a moment.\n\nThree things I want you to take away. Genesis 1:1 is *liturgical* — it is the first call to worship in the Bible. It is liturgical because it is *theological* — it teaches us things about God. And it is *practical* — it is useful for your day-to-day life.\n\n## 1. The Hebrew Word Bara\n\nThe word translated 'created' is the Hebrew bara. It is used 40 times in the Bible. One remarkable thing about it: God is always and only its subject. No human being ever bara. This is a God-action.\n\nBara does not always mean creation out of nothing — ex nihilo, as the Latin phrase goes. It's used in Genesis 1:27 three times for the creation of humanity, but Genesis 2:7 tells us God formed man from the dust of the earth, and the woman from Adam's rib. So bara doesn't always mean ex nihilo.\n\nBut in Genesis 1:1, the context requires it. In the beginning, there was only God. Nothing else existed. So when God creates the heavens and the earth, he creates them from nothing.\n\nAnd what does he create? The heavens and the earth. This is what scholars call a merism — two polar opposites with everything in between. A to Z and everything in between. The heavens and the earth means everything.\n\nBut which heavens? The heavens in verse 1 are not the blue sky above us or the space in which the sun and moon are placed. Those are created on Day 2 (v.8). The heavens of verse 1 are the invisible heavens — the heaven of heavens where God himself dwells with the angels. Both the visible and the invisible heavens are finite — even the invisible heaven of heavens has a limit, for it was created.\n\n## 2. Twelve Things Genesis 1:1 Teaches Us About God\n\nWonderful things in the Bible I see — and every one of these can be deduced from this single verse.\n\n**One: God is one.** 'In the beginning, God' — one God. He is also simple — not composed of parts. Whatever is made up of parts was created. God is not made of parts. He is simple, uncreated, one.\n\n**Two: God is spirit.** He existed before the material universe. He is not made of matter or energy. 'God is a spirit' (John 4:24).\n\n**Three: God is eternal.** He existed before the beginning. He has no beginning and no end.\n\n**Four: God is infinite.** He has no limits. The world he created is finite. For an infinite God to create a finite world is consistent; the reverse is not.\n\n**Five: God is unchangeable.** Before creation, nothing existed to change him. After creation, he controls what he made, so nothing in it can change him. 'The Father of lights, with whom there is no shadow of change' (James 1:17).\n\n**Six: God is self-existent.** Before the beginning, there was nothing but God. His existence derives from himself — the aseity of God. When Moses asked his name, God said: 'I AM WHO I AM.' His name is Being itself. He is from himself.\n\n**Seven: God is life.** He had life in himself before creation existed. We derive life from outside ourselves — from the air, food, water, our birth. God derives life from nothing outside himself. 'In him we live and move and have our being' (Acts 17:28).\n\n**Eight: God is immortal.** Before creation, nothing could take his life. After creation, he controls it. Nothing can take his life.\n\n**Nine: God is creator.** Bara — only God creates in this sense.\n\n**Ten: God is omnipotent.** To create everything out of nothing — the heavens and the earth, the visible and invisible — requires all power.\n\n**Eleven: God is omniscient.** He did not look up a manual on how to create a universe. He did not grow in wisdom as he worked. His knowledge is complete and whole from eternity.\n\n**Twelve: God is sovereign.** If he was powerful and wise enough to make everything, he is powerful and wise enough to control everything he made.\n\nThat is a call to worship. That is why Genesis 1:1 is liturgical — because it is theological. The opening verse of the Bible announces the kind of God we worship.\n\n## 3. Practical Application\n\nGenesis 1:1 is also practical. It trains us to live rightly — and here is how.\n\nPsalm 121:2: *My help comes from the LORD, who made heaven and earth.* Psalm 124:8 — Calvin's standard call to worship for the Reformed church: *Our help is in the name of the LORD, who made heaven and earth.*\n\nGod can help us with anything because he made everything. That's the simple logic. Whatever you face — large or small — the God who created ex nihilo is not overwhelmed.\n\nWhen my daughter Laela died, stillborn at nine months in 2019, I found comfort in a surprising place: Genesis 1. Not the passages you might expect — Genesis 1. Because the God who controls light and darkness, who brings morning after evening, who is sovereign over everything he made — that God is trustworthy. If God is not in control of this world, then something or someone else took my daughter from me. But he is in control. And if he is sovereign, then after darkness comes light. After evening comes morning. After tears comes joy.\n\nI had been teaching my young son Ben to look for the moon at night. 'What shape is the moon tonight, Ben?' 'It looks like a banana.' 'A half-moon.' 'A shriveled orange.' 'What shape is the moon always, Ben?' He learned to say: 'The moon is always round — even when you can't see all of it.' And what does that mean? 'God is always good — even when you can't see him being good in everything.'\n\nThe night I drove Ben home from the hospital after Laela's birth, he asked from the back seat: 'Daddy, will Mommy ever grow a baby who wakes up?' And eventually: 'Why isn't Laela coming home?' I said: 'Ben, do you remember what I taught you about the moon? What shape is the moon always?' He said: 'The moon is always round.' I said: 'Today feels like we can't see the moon at all. But the moon is always round. God is always good, even when we can't see all of it.'\n\nWhen I got outside the house that night, I looked up. There was a half moon. It captured the day perfectly — we had held Laela, seen her beauty, had the four of us together. But half was missing. She was gone. The moon was always round, even when we couldn't see all of it.\n\nOut of that came a little book called *The Moon Is Always Round* — Laela's ministry, as our minister said at her funeral: 'Laela the evangelist.' She being dead yet speaks.\n\nGenesis 1:1 is practical. When you encounter a problem — small or large — remember: your God made everything. He can help you with anything. That is the comfort of the Creator.\n\nShall we pray. Father, you are the great Creator God — one, spirit, eternal, infinite, unchangeable, self-existent, living, immortal, omnipotent, omniscient, sovereign over all things visible and invisible. We praise you for that. And we ask you to help us turn to you in times of need, knowing that you can help us with anything because you made everything. In Jesus's name, amen.", "soundcloud_url": "https://soundcloud.com/user-732503870/04-14-24-the-genesis-prologue-genesis-1_1-guest-speaker-pastor-jonathan-gibson"};
