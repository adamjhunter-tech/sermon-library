<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "2024-05-19-union-with-christ-equals-enemies", "title": "Union with Christ = Enemies", "speaker": "Pastor Tito Lyro", "date": "2024-05-19", "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["05-19-24 -PM- Union with Christ = Enemies - John 15_18-27 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/5-19-24-person-and-work-of-chist-part-6-elder-scott-hollander", "tags": [{"tag": "persecution", "source": "detected"}, {"tag": "union with Christ", "source": "detected"}, {"tag": "faithfulness", "source": "detected"}, {"tag": "cultural engagement", "source": "detected"}, {"tag": "suffering", "source": "detected"}, {"tag": "witnessing", "source": "detected"}], "scripture_references": [{"reference": "John 15:18-27", "type": "quoted", "source": "detected"}, {"reference": "Matthew 5:10-12", "type": "quoted", "source": "detected"}, {"reference": "1 Timothy 3:12", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 10:32-34", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Dark Side of the Christian Life", "subpoints": ["The upper room discourse (John 13-17) celebrates the Christian life: fruitfulness, brotherly love, the Holy Spirit's empowering", "But now the tone changes: union with Christ will provoke the world's hatred", "The sun is setting on Christianity's favored position in Western culture — we are moving into a negative world where criticism of Christianity is considered a virtue", "Persecution is nothing new — from the crucifixion of Christ by the religious establishment to William Tyndale burned for translating the Bible"], "scripture": ["John 15:18-27"]}, {"title": "The Promise: The World Will Hate You Because It Hated Me First", "subpoints": ["Verse 18: \"If the world hates you, you know that it hated Me before it hated you\"", "Verse 19: Because we are not of the world but chosen out of the world, the world hates us", "Verse 20: A servant is not greater than his master — if they persecuted Christ, they will persecute His people", "Verse 21: The world does this \"for My name's sake\" — the hatred is fundamentally a hatred of God, not just of Christians", "Verses 22-23: He who hates Christ hates the Father — there is an anti-God spirit at the root of the world's opposition"], "scripture": ["John 15:18-23"]}, {"title": "The Theological Root: Why the World Hates Christians", "subpoints": ["The Lord is not describing merely sociological reasons for enmity — He is describing theological hatred", "The world hates Christians not primarily for what Christians do, but because of who Christians are associated with", "\"They can smell Christ on us\" — it is our union with Jesus that is the real problem", "The more closely we are identified with Christ in word and deed, the more of the hatred directed at Him will fall on us", "This hatred goes deeper than not liking people who point out faults — there is an anti-God, anti-Christ spirit controlling the heart of the unregenerate"], "scripture": ["John 15:21", "John 15:22-23"]}, {"title": "A Warning: You Cannot Have Both Christ's Love and the World's Love", "subpoints": ["Christians imagine they can be loyal to God and have the world's approval — that is impossible", "They blame the church's failures for the world's rejection: \"too negative, too judgmental\" — sometimes true, but not the ultimate reason", "Even loving, well-prepared, zealous Christians are hated by the world", "The world's hatred of Christ's people is as certain as His own prediction: \"They hated Me without a cause\" (Psalm 69:4)", "Freedom in this truth: we are released from the quid-pro-quo mentality; we can serve without worrying about repayment because we know the world will hate us regardless"], "scripture": ["John 15:25", "Psalm 69:4"]}, {"title": "The Reward: Great Is Your Reward in Heaven", "subpoints": ["Jesus forewarned us — that is an act of great kindness, so we are not surprised", "Being counted worthy to suffer for Christ's sake means you are visibly united to Him", "Matthew 5:10-12: \"Blessed are you when they revile and persecute you... for great is your reward in heaven\"", "God gives us the grace to suffer in the hands of the world and then blesses us for the grace He gave us to suffer", "Our goal is not the world's approval but the glory of Christ — pursue excellence in all things but do not expect the world's applause"], "scripture": ["Matthew 5:10-12"]}], "summary": "In this Sunday evening sermon on John 15:18-27, Pastor Tito Lyro addresses the dark side of union with Christ: the inevitability of the world's hatred. In the upper room discourse, the Lord has been warmly describing the blessings of the Christian life — fruitfulness, brotherly love, the Holy Spirit's empowering. But now the tone shifts as Jesus prepares His disciples for the world's hostility. Union with Christ creates enemies, and this is not a peripheral feature of the Christian life but a central one.\n\nPastor Lyro traces the history of Christian persecution — from the crucifixion of Christ by the very religious establishment that should have recognized Him, to the martyrdom of Stephen, to synods of Christians demanding the execution of John Hus and Jerome, to William Tyndale burned for translating the Bible, to contemporary Christians having their children taken for not affirming gender ideology. The world has always hated the church, and when the world gets into the church, it is the church herself that becomes the persecutor. The sun, he argues, is setting on Christianity's favored position in Western culture — the fashionable elites of our day now consider it a virtue to destroy Christianity.\n\nThe theological root of the world's hatred is not sociological — it is theological. The world hates Christians not primarily because of what Christians do, but because of who Christians are united to. With the power of their sinful nature, the world \"can smell Christ on us.\" It is our visible association with Jesus that is the real, lasting obstacle. Verses 22-23 make this explicit: he who hates Christ hates the Father also — there is an anti-God spirit at the root of all opposition to the church.\n\nThe sermon closes with a clarifying warning and a word of freedom. Christians cannot have both Christ's love and the world's approval — those two are mutually exclusive. This is actually liberating, because it releases believers from the quid-pro-quo mentality and frees them to serve without worrying about receiving anything back. The reward is not from the world but from Christ Himself: \"Great is your reward in heaven.\"", "transcript": "## Introduction: The Dark Side of the Christian Life\n\nFor the scripture reading this afternoon, I'm turning to John chapter 15, reading verses 18 through 25, as we continue to consider the effects that our union with Christ has in the world that we live in.\n\n\"If the world hates you, you know that it hated Me before it hated you. If you were of the world, the world would love its own. Yet because you are not of the world, but I chose you out of the world, therefore the world hates you. Remember the word that I said to you, 'A servant is not greater than his master.' If they persecuted Me, they will also persecute you. If they kept My word, they will keep yours also. But all these things they will do to you for My name's sake, because they do not know Him who sent Me. If I had not come and spoken to them, they would have no sin, but now they have no excuse for their sin. He who hates Me hates My Father also. If I had not done among them the works which no one else did, they would have no sin; but now they have seen and also hated both Me and My Father. But this happened that the word might be fulfilled which is written in their law, 'They hated Me without a cause.'\"\n\nLet us pray together. Father, You would speak to us as we consider this portion of Your word. In Jesus's name. Amen.\n\nUnion with Christ brings us immeasurable and eternal benefits. In the upper room discourse — which is the portion of John that goes from chapter 13 through chapter 17 — the Lord tells us in a number of ways of the union which believers in the Lord Jesus Christ benefit from and are involved in. How we are united to one another, because we are united to Christ Himself, forming a community of love in the Church of the Lord Jesus Christ.\n\nBut when it comes to the passage we just read, the tone changes a bit. The Lord says that this Christian community will provoke the hatred of the world. As much love as there may be within the community, those outside of it will not share in this love. We will see that union with Christ creates enemies. The fact that we are united to Christ creates enemies.\n\nIn the previous paragraph, the Lord Jesus spoke warmly of the greatness of the Christian life and the blessings of it. Those of us who are in Him by a living faith live fruitful lives and bear much fruit that lasts. And we are part of a community of brotherly love and enjoy that wonderful sense of belonging to something wonderful, something eternal, something pure, something mighty. The Holy Spirit is given to us to empower us. And as a result, we do even greater works than Jesus did Himself. All that is in chapters 13, 14, and the beginning of chapter 15.\n\nBut now He prepares them for the fact that there is a dark side to all of this. Simply because we are Christians, and for the very reasons He has been discussing, many people will despise us — and some will actually try to do us harm. That's what we are considering this afternoon.\n\nNow, this promise of hatred from the world may not match our current experience. We may not be feeling that right now. We may not go around with people showing hatred toward us because Christianity has enjoyed a favored position in our culture for several centuries. But the sun is setting on that. Aaron Renn wrote a book talking about this history: Christianity went from being favored — the Western world having a favorable opinion of Christianity — to a neutral opinion — to now we're living in a negative world, where the culture has a negative opinion of Christianity, where Christianity is something to be destroyed and done away with. That's where we're living: a world that more and more the fashionable elites in our culture feel free to express their contempt for historic Christianity. It's considered a value, a virtue to criticize Christianity, to destroy Christianity, to put Christianity down.\n\nBut if active persecution isn't our future as a Christian community, we will not be the first followers of Christ to have suffered for it. From the very beginning, the world has hated the church.\n\nAnd when the world happens to be in the church — as it was in the days of our Lord Jesus Christ — it is the church herself that hates the people of God. Did you ever realize that it was the church that crucified Jesus Christ? It was the established religious organization of the first century that crucified the Lord of glory. It was the church that murdered some of the prophets of the Old Testament. It was a church that murdered the Prince of life Himself. And the church murdered Stephen — so far as we know the first martyr after Pentecost.\n\nAnd when, after the early fourth century, the church reached a favored status before the government, once again the unbelieving world came into the church. It was the church that persecuted the people of God. There was a Christian sermon preached before Thomas Cranmer was burnt at the stake. It was synods of Christians that demanded the execution of John Hus and Jerome. It was a Christian prince and a Christian church that burnt William Tyndale for his terrible crime of translating the Bible so that Christians could read it for themselves. And the last great persecution of Christians in the English-speaking world was done by Anglican and Roman Catholic authorities against Presbyterians in Scotland.\n\nIn other words, religious motives do not change the world's hatred of Christians — rather, they make it even more bitter. Christians have suffered some of the worst persecution from people who hated them in the name of Yahweh, of Allah, or even in the name of Jesus Christ Himself.\n\n## The Promise: The World Will Hate You Because It Hated Me First\n\nJesus said that this is inevitable. Whatever the gospel goes, wherever God's people are found, the hatred of the world for the followers of Christ will be found as well. And what we read here is not empty rhetoric on Jesus's part, just to get people scared. This is an actual prediction of what is happening and what's going to happen to His people. The prediction has been true since it was uttered and we can expect it to continue to be true until the Lord comes back.\n\nVerse 18: \"If the world hates you, you know that it hated Me before it hated you.\" Verse 19: \"Because you are not of the world, but I chose you out of the world, therefore the world hates you.\" The hatred is caused by our being chosen out of the world. We are not of the world and we are no longer of it.\n\nVerse 20: \"Remember the word that I said to you, 'A servant is not greater than his master.' If they persecuted Me, they will also persecute you.\" And verse 21: \"All these things they will do to you for My name's sake, because they do not know Him who sent Me.\"\n\nDo you see? The world will hate Christians for His name's sake — because of the name of Jesus. The world's hatred is fundamentally a hatred of God. The world desires to eradicate God and all messages and evidence of everything about Him. The world does not hate Christians first and foremost for what we do — they hate us because of our union, our association with Jesus Christ.\n\n## The Theological Root: Why the World Hates Christians\n\nIn some ways, it is not difficult to understand why the world hates Christians. Just think of what Christians believe and say to the world. We claim that we know God, the maker of all things. We claim that those who do not believe as we do do not know God, no matter what they claim. We say that everyone who is not a Christian must be converted, must be completely changed from the inside out. If they don't, they are going to hell, to suffer forever under the wrath of God. We condemn a great many things that the world loves. We stick together as a community. So it is not hard to see why the world will not love Christianity.\n\nBut — and this is an important point — the Lord is not talking about sociological reasons for the enmity of the world toward believers. He is talking about the theological hatred. The world hates Christians not because of what Christians do, but because of who Christians serve. The world hates God Himself.\n\nWith the power of their sinful nature, they can smell Christ on us. And that is why the Lord Jesus in verse 21 says that the world will hate Christians for His name's sake. It is our union with Jesus that is the real problem — the lasting obstacle that cannot be surmounted, that will always separate us from the world and the world from us. So long as we are with Jesus, we will suffer the world's hatred. And the more closely we are identified with Him by our words and our deeds, the more of that hatred of Jesus will fall upon us.\n\nVerses 22 and 23 make this even more explicit: \"He who hates Me hates My Father also.\" This hatred goes much deeper than simply not liking people who point out your faults or tell you that you must be born again. There is an anti-God and anti-Christ spirit controlling the heart, the mind, and the life of the non-Christian person. This is what we must understand about the hatred of the world for us — it is really a hatred of God, a hatred of Christ, that is falling on us by virtue of our union with Christ. We are standing in and for Jesus in this world. And the world's hatred of Him is falling on us because we are united with Him.\n\nSo the response of people to us, for good or for ill, depends finally not on who we are but on who Jesus is in their view. Somebody who loves Jesus is going to love Jesus's people. Somebody who does not love Jesus is going to hate His people as well.\n\nIt is this fact that explains why Christians through the ages have considered persecution a badge of honor. Because when you are counted worthy to suffer for the sake of Christ, it means that you are visibly united to Him. That is something to be grateful for at the deepest level — because as Paul tells Timothy, all who desire to live godly in Christ Jesus will suffer persecution.\n\n## A Warning: You Cannot Have Both Christ's Love and the World's Love\n\nLet me show you a warning about a great danger. Christians imagine that somehow they can be both loyal to God and to the world — on the world's good side. That's not a possibility. They think that somehow they have found a way to be a faithful Christian and still have a world that thinks well of them. They think they can surmount the world's opposition and make even the unbeliever a friend of the Christian church and the Christian faith. That is not possible, brothers and sisters.\n\nPeople who think this way often like to talk about the church's failures: \"The only reason the world doesn't like the church is because the church failed. The reason the world hasn't believed is that the church has been too negative, too judgmental, too harsh, not loving enough, too focused on sin.\" Now, to be sure, there is often truth in these charges — sometimes a great deal of truth. But we also know many Christians and churches who are hated by the world but still make a thoughtful, zealous, and loving effort to reach the world. And moreover, we have observed ourselves failing to adorn the gospel in all these ways and others. We have been tactless, underprepared, angry. We have undermined our words with our examples, or we have simply been uninterested in the dying world around us. For that, shame on us. We don't want the world hating us for the wrong reasons.\n\nJesus said Himself: \"They hated Me without a cause.\" And if we are His faithful disciples, that should be true of us as well. The world should hate us without a cause. But let us never imagine that we can have Christ's love and the world's love at the same time. That is impossible.\n\nAnd you know what? There is a lot of freedom in that thought. Because we often operate on a quid pro quo situation — if we do these things, then we will receive these things back. Jesus says: you are not going to get anything back from the world. So that frees us to just serve. We don't have to worry about how we are going to be repaid. They are going to hate us — so it frees us to serve without worrying about what we get back. It helps us to serve selflessly, because we are not doing something to gain something from them.\n\nThe reality is that the world will hate us because they hated Jesus. They hated Him without a cause — because He told them the truth, because He bore witness to them that what they were and did was evil, because they feared Him as the Holy One of God. And the more we live in Him and the more we are like Him, the more they will hate us as well.\n\n## The Reward: Great Is Your Reward in Heaven\n\nAnd how kind of Christ to not leave us to find this out on our own. He told us in His word and then sent His Spirit to apply that word to us today. How kind of Him to forewarn us. And on top of that, to bless us for it. He gives us the grace to suffer in the hands of the world, and then He blesses us for the grace He gave us to suffer in the hands of the world.\n\nTo the point that in the Sermon on the Mount — another sermon of Jesus in Matthew chapter 5 — He says: \"Blessed are you when they revile and persecute you and say all kinds of evil against you falsely for My sake. Rejoice and be exceedingly glad, for great is your reward in heaven. For so they persecuted the prophets who were before you.\"\n\nSome of you might leave here thinking: \"Oh, Pastor, Jesus is saying that we shouldn't pursue great things in this life, that we shouldn't be the best engineer, the best mom, the best dad, the best writer.\" No — be all that. Christ calls you to do everything for His glory. But don't expect that by doing that, somehow you're going to gain the approval of the world. Because if you're doing that Christianly, the world is going to hate you, because the world hates your Savior. And there is great glory in that — because the One the world hates has saved us, and He will come back for us, and forever we will be with Him in paradise.\n\nLet us pray together. Father, thank you that You are a God who ministers to those who are hated by the world because of Christ. Give us the strength to believe in what we say and to go forward with life knowing that the world is going to hate us, but You love us. You love us to the point that You gave Your Son while we were still sinners to die for us. And He is coming back for us. We thank You, Father, that we have eternity with You, even if we have to suffer the temporary afflictions of this life. We pray these things in Jesus's name. Amen."};
