<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-the-helmet-of-salvation-ephesians-6-14-20", "title": "The Helmet of Salvation", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["The Helmet of Salvation - Pastor Tito Lyro - Ephesians 6_14-20.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/the-helmet-of-salvation-pastor-tito-lyro-ephesians-614-20", "tags": [{"tag": "armor of God", "source": "detected"}, {"tag": "salvation", "source": "detected"}, {"tag": "spiritual warfare", "source": "detected"}, {"tag": "identity in Christ", "source": "detected"}, {"tag": "sanctification", "source": "detected"}, {"tag": "glorification", "source": "detected"}, {"tag": "hope", "source": "detected"}], "scripture_references": [{"reference": "Ephesians 6:14-20", "type": "quoted", "source": "detected"}, {"reference": "1 Thessalonians 5:8", "type": "quoted", "source": "detected"}, {"reference": "Romans 8:23-24", "type": "quoted", "source": "detected"}, {"reference": "Ephesians 2:8", "type": "quoted", "source": "detected"}, {"reference": "1 Corinthians 10:13", "type": "quoted", "source": "detected"}, {"reference": "Titus 2:11-14", "type": "quoted", "source": "detected"}, {"reference": "Philippians 3:7-11", "type": "quoted", "source": "detected"}], "outline": ["Introduction: The Armor of God as necessary equipment for spiritual warfare", "Review of previous armor pieces: belt of truth, breastplate of righteousness, shoes of the gospel, shield of faith", "The helmet of salvation: all aspects from regeneration to glorification", "Five ways the helmet of salvation helps us stand against the devil", "1. Identity stays rooted in Christ, not in race, gender, politics, or vocation", "2. We fight with hope, knowing Christ has defeated Satan", "3. We have purpose in life through our salvation", "4. We treasure what we should treasure and maintain clarity of focus", "5. We keep our priorities straight, counting all things loss for Christ"], "summary": "Pastor Tito Lyro expounds on the helmet of salvation from Ephesians 6, showing that salvation encompasses the full scope of the Christian life from justification through glorification. He presents five practical ways that keeping our salvation in mind equips believers to stand against the devil, beginning with the foundation of finding one’s identity in Christ alone rather than in ethnicity, gender, politics, or vocation. The sermon concludes with an appeal to the gospel as the only ground of hope in the cosmic war every Christian is engaged in.", "transcript": "## Scripture Reading — Ephesians 6:14–20\n\n> *\"Stand therefore, having girded your waist with truth, having put on the breastplate of righteousness, and having shod your feet with the preparation of the gospel of peace; above all, taking the shield of faith with which you will be able to quench all the fiery darts of the wicked one. And take the helmet of salvation, and the sword of the Spirit, which is the word of God; praying always with all prayer and supplication in the Spirit, being watchful to this end with all perseverance and supplication for all the saints — and for me, that utterance may be given to me, that I may open my mouth boldly to make known the mystery of the gospel, for which I am an ambassador in chains; that in it I may speak boldly, as I ought to speak.\"*\n\n## The Whole Armor of God\n\nWe are not strolling through life. We are in the middle of a massive cosmic war against the most powerful enemy — one who is not interested in taking prisoners, and who does not care whether he survives as long as he takes you down. That is the reality of the life you are living right now.\n\nBut our God is merciful and good. He has given us everything we need not only to fight the war of life, but to thrive in it. This passage describes God's goodness in equipping us.\n\nWe have been working through the armor piece by piece:\n\n- **The belt of truth** — embracing the objective truth of God and speaking truthfully in love. If we do not fight for truth, we will not survive. Our children and grandchildren will not survive.\n- **The breastplate of righteousness** — trusting that our standing before God has nothing to do with any good in us, but only with the work of Jesus Christ counted as ours by faith. Satan is the accuser of the brethren. The only way to stand against him is to stand in Christ's righteousness, not our own.\n- **The shoes of the gospel of peace** — appropriating the gospel by believing it, and propagating it by proclaiming it.\n- **The shield of faith** — knowing the whole teaching of the Scriptures. Satan constantly hurls attacks; we stand by knowing what God says.\n\nNow we come to **the helmet of salvation**.\n\n## Salvation Is More Than a Moment\n\nWe tend to think of salvation very narrowly — as the moment we came to faith in Jesus Christ, after which we go to heaven when we die. This is one element of salvation, which theologians call justification. But this is not all the Bible means by salvation.\n\nThe Bible uses salvation language for the entire Christian life — from regeneration to glorification.\n\n- **We were saved** — past tense. Romans 8:23–24: \"We were saved in this hope.\"\n- **We are in the state of having been saved** — Ephesians 2:8: \"For by grace you have been saved through faith.\" The original Greek carries the sense of *having been saved and remaining in that state*.\n- **We are being saved** — 1 Corinthians 1:18: \"For the message of the cross is foolishness to those who are perishing, but to us who are being saved it is the power of God.\"\n- **We will be saved** — Romans 5:9–10: \"Much more then, having now been justified by his blood, we shall be saved from wrath through him.\"\n\nThe helmet of salvation is all of this together: we stand in Christ from beginning to end. Paul uses the same image in 1 Thessalonians 5:8: \"Put on as a helmet the hope of salvation\" — the hope of salvation being the return of Christ and the resurrection of the body.\n\n## Five Ways the Helmet of Salvation Helps Us Fight\n\n### 1. Our Identity Is in Christ\n\nThe devil will say all kinds of things about who you are. But if your identity is in Christ — if you think of yourself first and foremost as a saint, as one who stands in Christ — those attacks become ineffective.\n\nWe are saints who sin, not sinners who occasionally do good. Every time in the New Testament the word \"sinner\" is used, it describes someone who has *not* come to faith in Jesus Christ. We still sin — all of us — but if we think of ourselves as sinners we will simply keep sinning. If we think of ourselves as saints whose sin is contrary to what we are in Christ, we will be motivated by grace to fight it.\n\nSatan is happy if we find our ultimate identity anywhere except Christ — in our ethnicity, our gender, our social class, our vocation, our political affiliation, our family of origin. These things are real and not without importance. But none of them can bear the weight of ultimate identity. Only Christ can.\n\n### 2. We Fight with Hope\n\nWe are not fighting a losing battle. Christ has defeated Satan on the cross and in the resurrection. He is coming back to vindicate his people. Even in the most desperate moments, we have real and true hope.\n\n> *\"No temptation has overtaken you except what is common to man; and God is faithful, who will not allow you to be tempted beyond what you are able, but with the temptation will also make the way of escape, that you may be able to bear it.\"* (1 Corinthians 10:13)\n\nThe promise is not that the struggle will be removed, but that you will be able to bear it. Even at the bottom of the pit, in the darkest moment of affliction, Christ is still our Savior and our Victor.\n\n### 3. We Have Purpose\n\nThe helmet of salvation reminds us that we are going somewhere and doing something that matters.\n\n> *\"For the grace of God that brings salvation has appeared to all men, teaching us that, denying ungodliness and worldly lusts, we should live soberly, righteously, and godly in the present age, looking for the blessed hope and glorious appearing of our great God and Savior Jesus Christ.\"* (Titus 2:11–13)\n\nWe are pilgrims and sojourners. Pilgrims do not carry a lot of luggage. This is not our best life yet — this life is a tent, a campsite, a way station. Everything in this world — reputation, status, job, possessions — can be held with an open hand. We are going somewhere. We have a purpose.\n\n### 4. We Treasure What We Should Treasure\n\n> *\"Do not lay up for yourselves treasures on earth... but lay up for yourselves treasures in heaven... For where your treasure is, there your heart will be also.\"* (Matthew 6:19–21)\n\nClarity about Christ focuses us. David spent a year hiding his sin after the affair with Bathsheba and the murder of Uriah. The prophet Nathan came to him and said, in effect: \"You are the man.\" When David received that clarity — painful as it was — he was able to say in Psalm 32:7: \"You are my hiding place; you shall preserve me from trouble; you shall surround me with songs of deliverance.\"\n\nThe gospel gives us that clarity. The helmet of salvation keeps Christ in view and helps us focus on what truly matters.\n\n### 5. Our Priorities Stay Straight\n\n> *\"But what things were gain to me, these I have counted loss for Christ. Yet indeed I also count all things loss for the excellence of the knowledge of Christ Jesus my Lord... that I may gain Christ and be found in him, not having my own righteousness, which is from the law, but that which is through faith in Christ.\"* (Philippians 3:7–9)\n\nWe get easily distracted with less important things. True believers in Christ are the fruitful soil — not soil where the affairs of life choke the gospel. The helmet of salvation keeps our priorities oriented around Christ.\n\n## The Gospel\n\nJesus Christ, God the Son, was born of a woman, lived a perfect life on behalf of his people, died on the cross bearing the infinite weight of God's wrath for their sins, and rose from the dead on the third day, securing new life for all his people. Those who believe this — faith in him and nothing else — will not perish but will have everlasting life in fellowship with God.\n\nWithout a firm belief in what Christ has accomplished in his life, death, and resurrection, there is no hope of a relationship with God and no hope of eternal life.\n\n**That is the helmet we put on. That is what makes us fit to fight the war of life.**"};
