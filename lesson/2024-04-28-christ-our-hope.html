window.LESSON_DATA = {"id": "2024-04-28-christ-our-hope", "title": "Christ Our Hope", "speaker": "Pastor Tito Lyro", "date": "2024-04-28", "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["04-28-24 -PM- Christ Our Hope - Luke 7_11-17 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/04-28-24-pm-christ-our-hope-luke-7_11-17-pastor-tito-lyro", "tags": [{"tag": "hope", "source": "detected"}, {"tag": "resurrection", "source": "detected"}, {"tag": "compassion", "source": "detected"}, {"tag": "grace", "source": "detected"}, {"tag": "Word of God", "source": "detected"}, {"tag": "suffering", "source": "detected"}, {"tag": "evangelism", "source": "detected"}], "scripture_references": [{"reference": "Luke 7:11-17", "type": "quoted", "source": "detected"}, {"reference": "Ephesians 2:4-9", "type": "quoted", "source": "detected"}, {"reference": "Hebrews 4:12", "type": "referenced", "source": "detected"}, {"reference": "Matthew 5:14-16", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: A World That Needs Hope and Power", "subpoints": ["There is a broken heart in every pew — 19th-century preacher Joseph Parker", "The gospel offers true hope and real power for a hurting, dying world", "Luke records three resurrection miracles; this is the unique account of the widow of Nain's son"], "scripture": ["Luke 7:11-17"]}, {"title": "The Life-Giving Word of Christ Is a Message of Hope in a World of Despair", "subpoints": ["Two crowds meet at the gate of Nain: one following Jesus (lively, hopeful), one following a coffin (grieving, hopeless)", "Wherever Christ is absent there is despair in the face of death; wherever He is present there is hope", "Hope through His compassion: Jesus felt deeply for the widow — He is not a stoic Savior but our sympathetic High Priest", "Hope through His grace: the widow did nothing to merit the miracle — salvation is entirely of grace, not of works", "Hope through His word: Christ spoke to the dead young man and he arose — the same powerful word is in the Scriptures today"], "scripture": ["Luke 7:13-14", "Ephesians 2:4-9", "Hebrews 4:12"]}, {"title": "The Life-Giving Word of Christ Is a Message of Power in a Dying World", "subpoints": ["Jesus spoke to the dead man and he sat up and began to speak — the power of the life-giving word of Christ", "God works extraordinarily through ordinary means — preaching, sacraments, fellowship, prayer", "Powerful effects on the man himself: unmistakable difference between spiritual death and spiritual life", "Powerful effects on the mother: tears of grief turned to tears of joy — God gives back what is good", "Ripple effects on observers: fear and glorifying God — \"God has visited His people\"", "Ripple effects on the wider region: one conversion can change the world (William Carey and Polly)"], "scripture": ["Luke 7:15-17"]}, {"title": "Conclusion: We Are Called to Cut Holes in the Darkness", "subpoints": ["The story of the Bible man who smoked Matthew, Mark, Luke — and met Christ at John 3:16", "Robert Louis Stevenson watching a lamplighter: \"I am watching a man cut holes in the darkness\"", "As we live in the hope and power of the word of Christ, we are lights cutting holes in the darkness of this world"], "scripture": []}], "summary": "In this Sunday evening sermon from Luke 7:11-17, Pastor Tito Lyro preaches from the account of Jesus raising the widow of Nain's son. He frames the entire passage with the claim that the life-giving word of Christ is both a message of hope for a world of despair and a message of power for a world that is dying. Working through the passage carefully, he shows how two crowds converge at the city gate: a lively crowd following Jesus and a grieving crowd following a coffin. The contrast illustrates the fundamental truth that wherever Christ is absent there is despair, and wherever He is present there is hope, regardless of circumstances.\n\nHope shines through in three distinct ways. First, through His compassion — the Greek word Luke uses is rooted in the word for \"bowels,\" indicating feelings from deep inside. Jesus does not merely offer intellectual sympathy; He feels deeply for suffering people, and He continues to do so now as our sympathetic High Priest in the heavenly places. Second, through His grace — the widow did nothing to merit the miracle; there was no faith, no expectation, no preparation on her part. This is the heart of the gospel: even when we were dead in our transgressions, God made us alive together with Christ. Third, through His word — Christ spoke to the dead young man and he arose. That same powerful, living, active word is in the Scriptures we hold today, able to raise dead sinners to new life.\n\nThe second half of the sermon focuses on power: the power of the word of Christ demonstrated in dramatic fashion as the dead man sat up and began to speak. Pastor Lyro draws out the ripple effects — on the man himself (spiritual life leaves no doubt), on the mother (fellowship restored, joy returned), on the observers (fear and praise), and on the entire region. He illustrates with the story of William Carey and his paralyzed sister Polly whose prayers fueled the modern missionary movement, and closes with Robert Louis Stevenson's childhood image of watching a lamplighter \"cut holes in the darkness\" — a picture of what the word of Christ does through His people.", "transcript": "## Introduction: A World That Needs Hope and Power\n\nFor the scripture reading this afternoon, we're going to again turn to the Gospel of Luke chapter 7. We will not read the whole chapter — just two paragraphs. Luke 7, starting at verse 11.\n\n\"Now it happened the day after that He went to a city called Nain, and many of His disciples went with Him and a large crowd. And when He came near the gate of the city, behold, a dead man was being carried out. The only son of his mother, and she was a widow. And a large crowd from the city was with her. When the Lord saw her, He had compassion on her and said to her, 'Do not weep.' Then He came and touched the open coffin, and those who carried him stood still. And He said, 'Young man, I say to you, arise.' So he who was dead sat up and began to speak, and He presented him to his mother. Then fear came upon all, and they glorified God, saying, 'A great prophet has risen up among us,' and 'God has visited His people.' And this report about Him went throughout all Judea and all the surrounding region.\"\n\nThis is the Word of our Lord. Let us pray together. Lord and God, we do pray that you would open our eyes to see our great hope in the Lord Jesus Christ. We pray that you be present with us as we consider you. In Jesus's name. Amen.\n\nIt is not news, and yet at the same time, we hear each day in the news that we live in a hurting world. In the personal realm, we all know families that are breaking apart and parents who are heartbroken over their rebellious children. Many even in the church struggle with severe personal problems. So hurt is everywhere. Nineteenth-century English pastor Joseph Parker said, \"Preach to the suffering and you will never lack a congregation. There is a broken heart in every pew.\" And that's the truth.\n\nIn such a world, there is a desperate need for a message of true hope to overcome the despair, and of real power to overcome our weaknesses. The gospel of Jesus Christ offers exactly what we need — that true hope and that real power that this hurting world needs. And this is graphically portrayed in this particular account, the historic account of Jesus raising this man back to life.\n\nThere are three accounts of Jesus raising somebody from the dead to life. One is Jairus's daughter — found in Matthew, Mark, and Luke. The other one is Lazarus — found only in the Gospel of John. And the third one is this one right here, found only in the Gospel of Luke, in which He raises the dead son of the widow. This account is saying something beyond the actual facts of the matter. It shows us that the life-giving word of Christ is a message of hope and power in a world of despair and weakness. That's the outline for this message.\n\n## The Life-Giving Word of Christ Is a Message of Hope in a World of Despair\n\nNote how Luke paints the scene here. There are two crowds that come together in the scene. The one crowd coming out of Nain — grieving and hopeless, likely hired professional mourners wailing loudly, the grieving mother wearing torn clothes, walking probably in the arms of a confidant in front of the open stretcher bearing the body of her son. And then the other crowd coming from the opposite direction, following Jesus the Messiah who was performing great miracles. Their lively chatter and bright faces would have shown this crowd had hope because they were with Jesus.\n\nYou have a sharp contrast: the crowd testifying to death, and the crowd following Jesus. Brothers and sisters, wherever the Lord Jesus is absent, there is despair in the face of death. But wherever He is present, there is hope, regardless of the circumstances that we find ourselves in.\n\nThe hope that Christ gives shines through in three ways in the passage.\n\n**Hope through His compassion.** In verse 13, Luke tells us that the Lord had compassion on this widow. The word here for compassion is related to the word for \"bowels\" and describes feelings that come from deep inside. In other words, it was not just intellectual sympathy that Jesus had for this woman. Jesus felt deeply for this hurting woman. Brothers and sisters, whenever the Lord Jesus confronts human sorrow and need, He feels compassion. He did that when He was upon the earth, and He does that now as our sympathetic High Priest in the heavenly places. He is not a stoic Savior who just sits there passionless. He sympathizes with our struggles. And this kind of compassion brings us hope. Here He is tenderly saying to this woman, \"Look to me — I can do something about the cause of your grief. I'm here to comfort you and to give you hope.\"\n\n**Hope through His grace.** This woman did nothing to merit this miracle. We don't know who she is or where she goes after this. She did not even ask the Lord to do it. The Lord just did it. There is no trace of faith or expectation on her part, and there was nothing in the dead young man to merit the miracle. This miracle came totally from Christ's great compassion and love — all of grace. And the God of the gospel is all of grace. Not at all of what we can do. The message of grace brings hope. As Paul says in Ephesians 2: even when we were dead in our transgressions, Christ — God made us alive together with Christ, that He might show the surpassing riches of His grace in kindness toward us in Christ Jesus.\n\n**Hope through His word.** Each time He raised the dead in the Gospels, He did it the same way: by speaking to the dead person and calling them back to life. Simply as that. There is great power in Christ's word. He spoke the universe into existence through His word. We have in the Scriptures, brothers and sisters, that same powerful word — living and active and sharper than any two-edged sword, able to judge the thoughts and intentions of the heart. The power of God's word gives us great hope because He is able to bring change to a hopeless situation through His word.\n\nI came across this story about a man named Gaylord who was the general secretary of the Bible Society of Zimbabwe. He found a man and offered to sell him a New Testament. The man said he wouldn't and Gaylord ended up giving it to him. The man said, \"I'm going to use the paper in your testament to make cigarettes and smoke them.\" And Gaylord said, \"How about if you read each page before you smoke it?\" And fifteen years later, at a conference, someone from the audience stands up: \"This is the guy who fifteen years ago gave me a Bible. I smoked Matthew and I smoked Mark and I smoked Luke, but when I got to John 3:16, I could no longer smoke it.\" And he came to know the Lord — because of the power of the Word of Christ that brings great hope.\n\n## The Life-Giving Word of Christ Is a Message of Power in a Dying World\n\nLook at verse 13 and 14. When the Lord saw her, He had compassion on her and said, \"Do not weep.\" Then He came and touched the open coffin and those who carried him stood still. And He said, \"Young man, I say to you, arise.\" So he who was dead sat up and began to speak, and He presented him to his mother.\n\nCan you imagine the faces of the people carrying that open stretcher, when the young man who had been laying there just sits up and starts talking immediately? But look at the power of Christ. He spoke to the man and he came back to life.\n\nWe are a plain, ordinary means-of-grace church. We believe that God works through the ordinary means — the preaching of the Word, the sacraments, the fellowship of the brethren, and prayer. But sometimes we think the ordinary doesn't work. That's not what we believe. We believe that God works extraordinarily through the ordinary means. And we need to believe that there is power in the life-giving word of Christ.\n\nWhen Jesus spoke His life-giving word, the dead man came alive, sat up, and began to speak. Even so today, there are powerful effects when Christ speaks His life-giving word to the hearts of those dead in their sin. When you share the Word of God with somebody, do you do that believing that that word can bring that person to life? Or are you just saying, \"Check — I went through it so I don't have to feel guilty this month\"? Do you actually believe that that word is going to bring salvation to that person?\n\nThere are powerful effects on the man himself. He was transformed from dead to living. There is an unmistakable difference between a dead person and a live one. Those who are truly born of God have many vital signs that reveal He has given new life to them.\n\nThere are powerful effects on the mother. In verse 15: \"So he who was dead sat up and began to speak, and He presented him to his mother.\" There was an emotional reunion. Her tears of grief and sorrow were changed to tears of joy. The fellowship that had ended with his death was restored by his life. It must have given the Lord Jesus great joy to present this young man alive to his mother. Life was back. That is what our Savior does for us — the Psalm says that God is good and He does good.\n\nAnd there were ripple effects on the observers. Verse 16: \"Then fear came upon all, and they glorified God, saying, 'A great prophet has risen up among us,' and 'God has visited His people.'\" While their estimate of Christ as a great prophet was not as high as it should have been, they recognized that the hand of God was at work through Jesus.\n\nAnd then there were ripple effects on others who heard it in verse 17 — this report went throughout all Judea and all the surrounding regions. Brothers and sisters, who can tell the ripple effects of the conversion of one soul? There was this English man who only had a third-grade education and he tried to be a cobbler — a cobbler's apprentice — but he was so bad that he got fired. He wanted to go to missions but no mission board accepted him because he was uneducated. You know how we refer to him today? The father of the modern missionary movement — William Carey. And William Carey himself said that the most important thing in his life was his sister Polly, a tetraplegic woman who spent her days in bed praying for his ministry in Africa and India. An insignificant invalid transformed by the word of Christ — her prayers caused William to be the kind of missionary that he was.\n\n## Conclusion: We Are Called to Cut Holes in the Darkness\n\nAt age twelve, Robert Louis Stevenson was looking out into the dark from his upstairs window, watching a man light the street lanterns — back in the day when they were gas-powered, someone would have to go when it got dark and literally light every street light. His governess came into the room and asked what he was doing. He said: \"I am watching a man cut holes in the darkness.\"\n\nThat describes what Christ through His word does — cuts holes in the darkness of this hopeless, hurting world with the good news that He came to raise dead sinners to new life. And every time we grab hold of that and live it out in our lives, we are the lights that are cutting holes in the darkness as we shine forth the power and the hope of the word of Christ in us.\n\nLet us pray together. Father in heaven, thank you that you are a good God and that your word is hopeful and powerful and that it dwells in us. Thank you for the comfort that we find in it — the encouragement — and help us to reflect that light and that power into this world. We ask in Jesus's name. Amen."};
