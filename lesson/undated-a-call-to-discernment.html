window.LESSON_DATA = {"id": "undated-a-call-to-discernment", "title": "A Call to Discernment", "speaker": "Pastor Tito Lyro", "date": null, "session": "PM", "series": "A Call to Discernment", "series_part": 1, "parts": 1, "source_files": ["A Call to Discernment - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/a-call-to-discernment-pastor-tito-lyro", "tags": [{"tag": "discernment", "source": "detected"}, {"tag": "wisdom", "source": "detected"}, {"tag": "sanctification", "source": "detected"}, {"tag": "cultural engagement", "source": "detected"}, {"tag": "sin", "source": "detected"}], "scripture_references": [{"reference": "1 Kings 3:6-9", "type": "quoted", "source": "detected"}, {"reference": "1 Kings 3:11-12", "type": "quoted", "source": "detected"}, {"reference": "Hebrews 5:11-14", "type": "quoted", "source": "detected"}, {"reference": "Romans 1:28-32", "type": "quoted", "source": "detected"}, {"reference": "Proverbs 9:10", "type": "referenced", "source": "detected"}, {"reference": "Matthew 13", "type": "referenced", "source": "detected"}, {"reference": "Mark 8", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: Solomon's Prayer for Discernment", "subpoints": ["Solomon was an unlikely heir who approached God with humility", "He prayed not simply for wisdom but for a hearing heart", "God valued and honored the request for discernment", "Working definition: spiritual discernment is the skill of thinking biblically about life"], "scripture": ["1 Kings 3:6-9", "1 Kings 3:11-12"]}, {"title": "The Curses of Lacking Discernment", "subpoints": ["Lack of discernment is proof of spiritual immaturity — becoming dull of hearing", "Lack of discernment leads to backsliding — regressing from solid food to milk", "Lack of discernment is ultimately proof of spiritual death", "Undiscernment appears alongside murder, hatred, and covetousness in Romans 1"], "scripture": ["Hebrews 5:11-14", "Romans 1:28-32"]}, {"title": "The Blessings of Being Discerning", "subpoints": ["Discernment is proof of spiritual life — fearing the Lord is the beginning of wisdom", "Discernment is proof of spiritual growth — Jesus valued it in His disciples", "Discernment is proof of spiritual maturity — solid food belongs to those of full age", "Growing Christians distinguish between good and evil by the exercise of their senses"], "scripture": ["Hebrews 5:14", "Proverbs 9:10"]}, {"title": "Discernment and the Christian Worldview", "subpoints": ["Spiritual discernment is a filter through which we see all of life", "Satan promised knowledge of good and evil falsely; God gives it truly through His Word", "Undiscernment is not merely ignorance but active rebellion against God", "Lack of discernment in a church body reflects corporate backsliding"], "scripture": []}, {"title": "Call to Action: Pursue Discernment", "subpoints": ["Healthy Christians are necessarily discerning Christians", "Growth in discernment is tied to the Scriptures — being in the Word", "The body of Christ helps individuals grow corporately in discernment", "Future lessons will build a worldview foundation for discerning daily life"], "scripture": ["Ephesians 4"]}], "summary": "In this opening Sunday evening lesson of a new series on spiritual discernment, Pastor Tito Lyro begins with Solomon's prayer in 1 Kings 3, where the young king asks not merely for wisdom but for a \"hearing heart\" that can discern between good and evil. Solomon's request illustrates that discernment is more than knowledge — it is a Spirit-given attunement to God's voice. The working definition offered for the series is: spiritual discernment is the skill of thinking biblically about life, or having a Christian worldview through which all of life is evaluated.\n\nThe first part of the lesson examines the serious consequences of lacking discernment. Drawing from Hebrews 5:11-14, Pastor Lyro argues that undiscernment is proof first of spiritual immaturity (becoming \"dull of hearing\"), then of backsliding (regressing from solid food to milk), and ultimately of spiritual death. He notes that Romans 1:31 places an \"undiscerning mind\" in the same list as murder, hatred, and other grave sins — showing that failing to think biblically is not a minor weakness but a direct offense against God.\n\nThe second part turns to the blessings of discernment. Those who fear the Lord and know Him possess the foundation for discernment, and growing Christians progressively exercise their senses to distinguish good from evil. Pastor Lyro closes by announcing that the coming weeks will develop a full worldview foundation and show practically how to apply biblical discernment to every area of life. The series is motivated by the conviction that healthy, living, maturing Christians are necessarily discerning Christians.", "transcript": "## Introduction\n\nWe're starting a new series tonight. It's interesting that I thought about what I was going to do, and then I just shot a message to the elders to see if they had suggestions, and at least one of them suggested the exact thing that I had chosen — with different words but about the same thing. We're going to start a series tonight on discernment — biblical, spiritual discernment. I'll just provide a little bit of a working definition tonight; in two weeks from tonight on the third lesson, Lord willing, we're going to have a more extended definition of what spiritual discernment is. But that's the goal for the next few weeks: for us to be talking about spiritual discernment.\n\n## Scripture Reading: 1 Kings 3:6-9\n\nAnd we'll start tonight by turning to 1 Kings chapter 3, verses 6 through 9. So here's the word of our Lord:\n\n\"And Solomon said, You have shown great mercy to your servant David my father, because he walked before you in truth and righteousness and uprightness of heart with you. You have continued this great kindness for him, and you have given him a son to sit on his throne as it is this day. Now, Lord my God, you have made your servant king instead of my father David, but I am a little child. I do not know how to go out or come in. And your servant is in the midst of your people whom you have chosen, a great people too numerous to be numbered or counted. Therefore, give to your servant an understanding heart to judge your people, that I may discern between good and evil. For who is able to judge this great people of yours?\"\n\n## Solomon's Prayer for a Hearing Heart\n\nI can't even imagine what was going through Solomon's mind when David picked him to be the heir. He was not the likely heir — there were older children. And yet Solomon is the next guy to be king of Israel. And we see in our passage tonight that Solomon approached the office of King and approached God Himself with great humility. Though he was already a grown man, he prayed to God saying he's like a child. He's not experienced in judging the people, and he needs the Lord's blessing and wisdom and discernment to fulfill his office. He demonstrates here that he is dependent upon his Father — not David, but God as his Heavenly Father.\n\nHere in 1 Kings 3, God appears to him in a dream and asks, \"What shall I give you?\" We are commonly taught that Solomon asked for wisdom, and then God gave him all kinds of great wisdom. But if you pay attention to the words, Solomon doesn't ask for wisdom. He asks for something else. He understands that he's inadequate for the role. He understands that he needs God's help, and he asks for discernment. We find that specifically in verse 9 where he asks the Lord for discernment, and then in verses 11-12, God answers his prayer.\n\nIn verse 9, Solomon prays, \"Give to your servant an understanding heart to judge your people, that I may discern between good and evil.\" The word \"understanding\" is actually the Hebrew word for \"hearing.\" Solomon is asking for a hearing heart — a heart attuned to God, a heart that hears from God so that he can discern between good and evil. And this teaches us that God values discernment and honors those who seek after it.\n\nWorking definition for tonight: **spiritual discernment is the skill of thinking biblically about life.** In essence, it's having a Christian worldview through which you see all of life.\n\n## The Curses of Lacking Discernment\n\nI want to spend part of our time looking at the curse — the bad side, the bad things about not having discernment. Then we'll talk about the good things about pursuing discernment. Three things on one side, three on the other — six things total.\n\n### 1. Lack of Discernment Is Proof of Spiritual Immaturity\n\nTurn to Hebrews chapter 5, verses 11 through 14. The author says: \"Of whom we have much to say, and hard to explain, since you have become dull of hearing. For though by this time you ought to be teachers, you need someone to teach you again the first principles of the oracles of God; and you have come to need milk and not solid food. For everyone who partakes only of milk is unskilled in the word of righteousness, for he is a babe. But solid food belongs to those who are of full age, that is, those who by reason of use have their senses exercised to discern both good and evil.\"\n\nHere the author of Hebrews tells us that lack of discernment is proof of spiritual immaturity. There is much knowledge he would like to impart to them, but unfortunately they have become dull of hearing. Notice that he cannot explain these things not because the truths are too complicated, but because the people have become dull of hearing. They are not hearing the Word of God anymore. These people originally were not recent converts — they should be at the point where they are able to teach others, and yet they cannot.\n\nWe live in an age where many consider spiritual immaturity a mark of authenticity — where people associate doubt with humility and assurance with pride. But lack of discernment is not a virtue. It is a sign of immaturity in the faith.\n\n### 2. Lack of Discernment Is Proof of Backsliding\n\nLook at verses 12 and 13: \"For though by this time you ought to be teachers, you need someone to teach you again the first principles of the oracles of God; and you have come to need milk and not solid food. For everyone who partakes only of milk is unskilled in the word of righteousness, for he is a babe.\"\n\nBacksliding is to have your faith diminish rather than increase. The people the Holy Spirit wrote this letter to should have been moving forward from milk to solid food, but instead they were moving backwards. Think of a shark: if it stops swimming, it dies. If we stop growing in the Lord, we grow backward.\n\n### 3. Lack of Discernment Is Proof of Spiritual Death\n\nThose who have professed faith in Christ cannot backslide indefinitely. Sooner or later it becomes clear whether they were truly believers at all. Look at Romans 1:28-32: \"Even as they did not like to retain God in their knowledge, God gave them over to a debased mind, to do those things which are not fitting: being filled with all unrighteousness, sexual immorality, wickedness, covetousness, maliciousness... undiscerning, untrustworthy, unloving, unforgiving, unmerciful...\"\n\nNotice that Paul places an \"undiscerning mind\" right in the midst of murder, envy, hatred, and boasting. Being undiscerning is not just a minor weakness — it is to sin against God. As man turns from God, the Lord gives him over to an undiscerning mind. Lack of discernment is to sin against God.\n\n## The Blessings of Being Discerning\n\nNow, the fear of the Lord is not the best long-term motivator — love is. So where are the blessings of being discerning?\n\n### 1. Discernment Is Proof of Spiritual Life\n\nIn Proverbs 9:10, Solomon says, \"The fear of the Lord is the beginning of wisdom, and the knowledge of the Holy One is understanding.\" To know God is to possess discernment. Those who fear the Lord, those who know God, must be discerning because God Himself is the very source of discernment. Where there is discernment, there is spiritual life.\n\n### 2. Discernment Is Proof of Spiritual Growth\n\nJesus continually emphasized discernment during His ministry, sometimes scolding those who did not have it. After feeding the five thousand, the disciples worried about having no bread for the crossing. Jesus rebuked them: \"Can't you discern? I just fed thousands of people — do you think I would let you starve?\" Yet in Matthew 13, He praised the disciples for being spiritually discerning, asking why they could understand His parables when the general public could not. Discernment is a mark of spiritual growth.\n\n### 3. Discernment Is Proof of Spiritual Maturity\n\nBack to Hebrews 5:14: \"But solid food belongs to those who are of full age, that is, those who by reason of use have their senses exercised to discern both good and evil.\" Discernment is proof of spiritual maturity. There are no mature Christians who are undiscerning — the Bible makes that clear.\n\n## Conclusion\n\nSpiritual discernment is a necessary quality that we must grow in as believers in Jesus Christ. Healthy Christians — those who are alive, growing, and mature — are necessarily those who seek to honor God by discerning between what is good and what is evil. Over the next several weeks, we are going to talk about what it means to be spiritually discerning: laying out a worldview foundation and then showing how to look at the world through that foundation, grounded in the Scriptures.\n\nLet's close in prayer. Father, thank you for your word. Thank you that we can grow through it. We pray that as we consider discernment through these next few weeks, we will grow in it, that we will become more discerning, that we will know how to look at life biblically and differentiate between what is good and what is evil. We pray for your blessing tonight for us in Jesus' name. Amen."};
