<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "2025-06-08-blessings-in-the-curses", "title": "Blessings in the Curses", "speaker": "Pastor Tito Lyro", "date": "2025-06-08", "session": "AM", "series": "Hosea", "series_part": null, "parts": 1, "source_files": ["06-08-2025 -AM- Blessings in the Curses - Hosea 9 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/06-08-2025-am-blessings-in-the", "tags": [{"tag": "judgment", "source": "detected"}, {"tag": "covenant", "source": "detected"}, {"tag": "grace", "source": "detected"}, {"tag": "Israel", "source": "detected"}, {"tag": "children", "source": "detected"}], "scripture_references": [{"reference": "Hosea 9:1-17", "type": "quoted", "source": "detected"}, {"reference": "2 Corinthians 9:8", "type": "quoted", "source": "detected"}, {"reference": "Romans 8:31-39", "type": "referenced", "source": "detected"}, {"reference": "2 Peter 1:2-11", "type": "referenced", "source": "detected"}, {"reference": "Ephesians 2:11-22", "type": "quoted", "source": "detected"}, {"reference": "Galatians 3:26-29", "type": "referenced", "source": "detected"}, {"reference": "Ephesians 1", "type": "referenced", "source": "detected"}, {"reference": "Isaiah 43:1-2", "type": "quoted", "source": "detected"}, {"reference": "Psalm 127:3", "type": "referenced", "source": "detected"}, {"reference": "Joshua 24", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: Israel's Sin and Impending Judgment", "subpoints": ["Israel had been unfaithful to God—worshiping the true God falsely and worshiping false gods", "God's judgment comes through Assyria: separation from the land, from God's presence, and from means of worship", "The prophet's message is delivered after 733 BC when Assyria has already taken much of Israel's territory", "The people rejoice in their sins and mock the prophet as a fool (Hosea 9:7)"], "scripture": ["Hosea 9:1-9"]}, {"title": "Curse 1: Lack of Provision—and the Blessing of Abundant Grace", "subpoints": ["Hosea 9:2: the threshing floor and wine press shall not feed them—Israel trusted false gods for provision", "God says: the earth is mine; whatever the false gods promise, I will withhold", "In Christ: 2 Corinthians 9:8—God makes all grace abound so that we always have all sufficiency in all things", "Romans 8:31-32: he who did not spare his own Son, how shall he not freely give us all things?"], "scripture": ["Hosea 9:2", "2 Corinthians 9:8", "Romans 8:31-32"]}, {"title": "Curse 2: Strangers in a Strange Land—and the Blessing of Coming Home", "subpoints": ["Hosea 9:3: they shall not dwell in the Lord's land; Ephraim shall return to Egypt and eat unclean things in Assyria", "To be a foreigner to Israel was to be without the Messiah, without covenant, without hope, and without God", "Ephesians 2:11-13: Gentiles were once far off, but are brought near by the blood of Christ", "In Christ: we are no longer aliens from the commonwealth of Israel but full citizens, heirs of the covenants of promise"], "scripture": ["Hosea 9:3", "Ephesians 2:11-22"]}, {"title": "Curse 3: Not Accepted by God—and the Blessing of Acceptance in Christ", "subpoints": ["Hosea 9:4: their sacrifices shall not be pleasing to God; their worship will be defiled", "The ordinances God appointed as means of fellowship will have no effect—God will not receive them", "Ephesians 1: we have been accepted by God in the Beloved—as long as Christ is accepted, we are accepted", "Christ is the same yesterday, today, and forever—he will always be accepted, so we will always be accepted"], "scripture": ["Hosea 9:4-6", "Ephesians 1"]}, {"title": "Curse 4: Barrenness—and the Blessing of Children as a Gift", "subpoints": ["Hosea 9:11-14, 16: Ephraim's glory shall fly away like a bird—no birth, no pregnancy, no conception", "The Baals were fertility gods; Israel worshiped them but God, the true giver of life, will curse them with barrenness", "The Assyrians historically fulfilled this by killing unborn children during conquest", "In Christ: children are a heritage from the Lord, a blessing; the church is healthy where men sing and children are present"], "scripture": ["Hosea 9:11-16", "Psalm 127:3"]}, {"title": "Application: Choose the Blessings Over the Curses", "subpoints": ["We deserve the same curses as Israel—we are as unfaithful—yet through Christ we receive blessings instead", "Isaiah 43:1-2: God promises to be with us through deep waters and unquenchable fires", "The choice is like Joshua 24: will you serve the false gods of the land or the Lord God Almighty?", "For me and my house we will serve the Lord—come to Christ and receive the blessings of the new covenant"], "scripture": ["Isaiah 43:1-2", "Joshua 24"]}], "summary": "Preaching from Hosea 9, Pastor Lyro works through one of the darkest chapters in the book, refusing to skip the difficult material on the grounds of 2 Timothy 3:16: every passage of Scripture is God-breathed and profitable. The chapter was delivered by Hosea after 733 BC, when Assyria had already begun occupying Israel's territory. The people rejoice in their sins, call the prophet a fool, and remain willfully blind to the impending catastrophe.\n\nPastor Lyro identifies four divine curses that are coming upon Israel: lack of provision, becoming strangers in a foreign land, not being accepted by God in worship, and barrenness. But the sermon's governing argument is that in each curse, believers in Christ today can see its opposite blessing—because through the Lord Jesus Christ we receive what Israel forfeited through unfaithfulness.\n\nThe curse of lack of provision contrasts with 2 Corinthians 9:8 and Romans 8:31-32: God makes all grace abound toward us and freely gives us all things with Christ. The curse of becoming strangers in a foreign land contrasts with Ephesians 2:11-22: those who were once far off are brought near by the blood of Christ and made citizens of the commonwealth of Israel, heirs of the covenants of promise. The curse of not being accepted by God contrasts with Ephesians 1: we have been accepted in the Beloved, and since Christ is always accepted, we will always be accepted. The curse of barrenness contrasts with Psalm 127: children are a heritage from the Lord, a sign of the continuation of God's work on earth.\n\nThe sermon closes with a Joshua 24 appeal: having surveyed the curses that come from unfaithfulness and the blessings that come from faith in Christ, the congregation is invited to make its choice. As for me and my house, we will serve the Lord.", "transcript": "## Scripture Reading: Hosea 9:1-17\n\nPray, we remain standing and turn to Hosea chapter 9. Hosea chapter 9, starting in verse 1. This is the Word of our Lord.\n\nDo not rejoice, O Israel, with joy like other peoples. For you have played the harlot against your God. You have made love for hire on every threshing floor. The threshing floor and the wine press shall not feed them, and the new wine shall fail in her. They shall not dwell in the Lord's land, but Ephraim shall return to Egypt, and shall eat unclean things in Assyria. They shall not offer wine offerings to the Lord, nor shall their sacrifices be pleasing to him. It shall be like bread of mourners to them; all who eat it shall be defiled. For their bread shall be for their own life. It shall not come into the house of the Lord. What will you do in the appointed day, and in the day of the feast of the Lord? For indeed they are gone because of destruction. Egypt shall gather them up, Memphis shall bury them. Nettles shall possess their valuables of silver; thorns shall be in their tents. The days of punishment have come; the days of recompense have come. Israel knows. The prophet is a fool, the spiritual man is insane because of the greatness of your iniquity and great enmity. The watchman of Ephraim is with my God, but the prophet is a fowler's snare in all his ways, enmity in the house of his God. They are deeply corrupted as in the days of Gibeah. He will remember their iniquity; he will punish their sins.\n\nI found Israel like grapes in the wilderness; I saw your fathers as the firstfruits of the fig tree in its first season. But they went to Baal Peor and separated themselves to that shame; they became an abomination like the thing they loved. As for Ephraim, their glory shall fly away like a bird—no birth, no pregnancy, and no conception. Though they bring up their children, yet I will bereave them to the last man. Yes, woe to them when I depart from them! Just as I saw Ephraim like Tyre, planted in a pleasant place, so Ephraim will bring out his children to the murderer. Give them, O Lord—what will you give? Give them a miscarrying womb and dry breasts. All their wickedness is in Gilgal, for there I hated them. Because of the evil of their deeds I will drive them from my house; I will love them no more. All their princes are rebellious. Ephraim is stricken, their root is dried up. They shall bear no fruit. Were they to bear children, I would kill the darlings of their womb. My God will cast them away because they did not obey him, and they shall be wanderers among the nations.\n\nThis is the Word of our Lord. Let us pray. Father in heaven, thank you that you are a God who speaks about all things. Thank you that you are a God who is just and clear and open about what you think concerning rebellion. We pray that your Spirit speak to us this morning, for asking Jesus' name. Amen. Please be seated.\n\n## Introduction\n\nIt is so tempting to skip passages like this one. The things like, \"I will kill the darlings of their womb.\"—that's God speaking, or the prophet praying to God. \"Give them a miscarrying womb and dry breasts.\" God saying that as a punishment on Israel, they will take their children to the murderer. It would be so easy to just skip. Go somewhere else. Go to chapter 10. Or skip chapter 10 too because it's not much better. And just go to chapter 11 where God calls Israel his child.\n\nThe temptation is great. Yet that passage in 2 Timothy 3:16-17 keeps sounding in my head: all Scripture—literally every Scripture, not just all Scriptures as a whole, but every passage of Scripture—is God-breathed and profitable for instruction, for rebuke, that the man of God may be fully equipped for every good work. So we can read and preach on chapter 9 of Hosea and expect that we are going to be equipped by God through his Spirit to do the things he calls us to do.\n\n## Background: Israel's Situation in Hosea 9\n\nAs you know, Hosea delivered his message over a period of 60 years, from somewhere around 760 BC to about 700 BC. The original audience was the Northern Kingdom, whose capital was Samaria. The biggest tribe of the Northern Kingdom was Ephraim, which is why the prophet sometimes uses the word Ephraim to mean the entirety of the people of the Northern Kingdom.\n\nWe have seen so far that Israel had been unfaithful to God—like a wife who betrays her husband with many lovers. Israel broke the covenant God made with her through Moses by doing two things: worshiping the true God falsely (Jeroboam set up two golden calves saying \"here you can worship the true God\"), and worshiping false gods. As a result of this unfaithfulness, God is going to judge her by the hand of the Assyrian Empire.\n\nBy the time Hosea delivers the message of chapter 9, somewhere after 733 BC, Assyria had already taken much of the territory around Samaria. It's become clear that Assyria is not the ally Israel thought they were. And yet the people of God continue to stop their ears, not listening to what God is saying through the prophets. Instead they rejoice in their sins—that's how the chapter begins: \"Do not rejoice, O Israel, with joy like other peoples.\"—and they call the prophet a fool in verses 7 and 8.\n\nGod has finally decided to pour his displeasure upon them. The prophet says: the days of punishment have come, the days of recompense have come.\n\nAnd brothers and sisters, it's important that we see that God had very good reasons to judge Israel. He's not doing this at a whim. He's been long-suffering toward Israel. Israel had engaged in spiritual and physical prostitution—verse 1. Israel had practiced homosexuality—verse 9 references \"the days of Gibeah,\" which refers to Judges 19. They turned away from God's grace—verse 10 says God found Israel like grapes in the wilderness, like the first fruits of the fig tree. But they went to Baal Peor and separated themselves to shame.\n\n## The Four Curses—and the Blessings in Christ\n\nThe chapter describes divine judgment coming upon Israel. But I want us to see that though we tend to be as unfaithful as Israel was in their time, through the Lord Jesus Christ we are blessed instead of cursed. We deserve these same curses because we are as unfaithful as Israel was. And yet through Jesus, God blesses us instead.\n\n### Curse 1: Lack of Provision\n\nGod is going to curse Israel with a lack of provision. Look at verse 2: the threshing floor and the wine press shall not feed them, and the new wine shall fail in her. God had provided Israel with a land flowing with milk and honey. But they turned to the gods of the land, thinking the gods of the land would provide for them. God says, okay, that's what I do—go to them, trust them to provide. Oh, but there's one problem: the earth is mine and all that is in it. So whatever the false gods promise, if it's on earth it's mine and you can't have it.\n\nAnd in the blessing—what we see in the curse of lack of provision because of disobedience is actually the blessing of the abundant provision of grace through faith in Jesus Christ. Listen to 2 Corinthians 9:8: God is able to make all grace—not just some grace but all grace—abound toward you, that you always having all sufficiency in all things may have an abundance for every good work. God is not promising high income or even necessarily food for tomorrow. But he promises you're going to have everything you need to obey him. That's the grace of God upon you.\n\nListen to Romans chapter 8 starting at verse 31: what then shall we say to these things? If God is for us, who can be against us? He who did not spare his own Son but delivered him up for us all, how shall he not with him also freely give us all things?\n\nSecond Peter 1:2-3: grace and peace be multiplied—not just added but multiplied—to you in the knowledge of God and of Jesus Christ. As his divine power has given to us all things that pertain to life and godliness through the knowledge of him who called us by glory and virtue, by which have been given to us exceedingly great and precious promises.\n\nGod says, I'll never leave you nor forsake you. I'll be your God and you will be my people. Nothing will separate you from my love. In the curse of lack of provision, we see the blessing of the abundant provision of grace in Jesus Christ.\n\n### Curse 2: Strangers in a Strange Land\n\nGod is going to curse Israel with being strangers in a foreign land. Verse 3: they shall not dwell in the Lord's land; Ephraim shall return to Egypt and shall eat unclean things in Assyria. God had brought them out of slavery into a land where they would experience his presence. But Israel despised God's presence. So God is going to take them to a place where they will be strangers in a strange land, unable to worship.\n\nTo be a foreigner to Israel meant being separated from the Messiah. It meant being aliens from the commonwealth of Israel. It meant being strangers to the covenants of promise. It meant having no hope and being without God in the world.\n\nBut I want you to turn to Ephesians 2, starting at verse 11: therefore remember that you, once Gentiles in the flesh—who are called the uncircumcision by those called the circumcision made in the flesh by hands—that at that time you were without Christ, being aliens from the commonwealth of Israel and strangers from the covenants of promise, having no hope and without God in the world. But now in Christ Jesus you who once were far off have been brought near by the blood of Christ.\n\nFor he himself is our peace, who has made both one and has broken down the middle wall of separation, having abolished in his flesh the enmity, that is the law of commandments contained in ordinances, so as to create in himself one new man from the two, thus making peace, and that he might reconcile them both to God in one body through the cross.\n\nBrothers and sisters, you were indeed once strangers to Israel. But through the blood of Christ you are no longer strangers in a strange land. You are brought into Israel. You are full citizens of Israel with all the rights and benefits and duties of being that— not that skinny land in Palestine, but the Israel of God, the Church of the firstborn, the number of those who have had their hearts circumcised by the Spirit of God.\n\nThrough Jesus Christ you are brought near to Israel and become a citizen. The Apostle Paul says elsewhere: for you are all sons of God through faith in Christ Jesus. For as many of you as were baptized into Christ have put on Christ. There is neither Jew nor Greek, there is neither slave nor free, there is neither male nor female, for you are all one in Christ Jesus. And if you are Christ's, then you are Abraham's seed and heirs according to the promise.\n\nIn the curse of being a stranger in a strange land, we see the blessing of coming home to Jesus.\n\n### Curse 3: Not Accepted by God\n\nBack in Hosea chapter 9, verses 4 through 6, the prophet says: they shall not offer wine offerings to the Lord, nor shall their sacrifices be pleasing to him. The very ordinances that God had appointed as a means for them to fellowship and experience God will not have any effect because they will not be accepted by God.\n\nBut brothers and sisters, in Christ you and I will never have to fear that we will not be accepted by God. Paul says in Ephesians 1 that we have been accepted by God in the Beloved. That is: as long as Christ is accepted by God, you are accepted by God. The Bible also tells us that Christ is the same yesterday, today, and forever, which means he's always going to be accepted by God. So in the curse of rejection, we see the blessing of being accepted by God because of Christ.\n\n### Curse 4: Barrenness\n\nLastly, God is going to curse Israel with barrenness, or lack of children. Verses 11 through 14 and verse 16 as well. The Baals of the land were fertility gods throughout Israel—worshiping the Baals supposedly brought you more children. God says that he is the giver of life and that children are his gifts. So Israel will experience barrenness and the elimination of children, which the Assyrians fulfilled by slashing pregnant women open to kill the babies. There are records of the Assyrians doing this—a fulfillment of this prophecy.\n\nIn the blessing—I want us to see in the curse of barrenness the truth that children are a blessing from the Lord. The Bible is clear that children are a blessing from the Lord. Psalm 127:3 says that children are a heritage from the Lord, the fruit of the womb a reward. Children are a sign of a new generation of Christians. As I look back at how parents train their children—sometimes it doesn't feel like they're blessings, but the Bible says they are a blessing from the Lord.\n\nPeople have heard it said many times that if you want to know if a church is healthy you look for two sounds: one is men singing—that's a major sign of the health of a church—and the second is the noise of children in worship. We've got the second. We have to work on the first one a little bit, the men singing part.\n\nEven if you don't have children of your own present with you, you have the children of the church to be a blessing to you every Lord's Day. And brothers and sisters, in the culture that puts down the idea of having children, the Church of Jesus Christ must see children for what they are: a blessing from the Lord, if raised in the nurture and admonition of the Lord Jesus Christ.\n\n## Conclusion\n\nGod provides all the grace that we need for all good works. He brings us into his people so that we're not strangers in a strange land. In Christ we are accepted by God. In Christ, children are a blessing from the Lord.\n\nSo let's do this—what are you going to choose? Are you going to go with the curses of God that come from rebellion against him? Or are you going to go with the blessings that come from faith in Christ Jesus?\n\nI feel like Joshua here in Joshua 24. He says: you decide. You want the gods of the land, or do you want the Lord God Almighty? But for me and my family, we will serve the Lord. And I hope that's your choice as well.\n\nLet us pray together. Glorious God, we thank you that you are a God who brings blessings even out of curses. Help us to cling to Christ and to hope in your promises, in Jesus' name, amen."};
