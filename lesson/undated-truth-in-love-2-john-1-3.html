<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-truth-in-love-2-john-1-3", "title": "Truth in Love", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": "2-3 John", "series_part": null, "parts": 1, "source_files": ["Truth in Love __ 2 John 1-3 (Pastor Tito Lyro).txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/truth-in-love-2-john-1-3-pastor-tito-lyro", "tags": [{"tag": "truth", "source": "detected"}, {"tag": "love", "source": "detected"}, {"tag": "fellowship", "source": "detected"}, {"tag": "elders", "source": "detected"}, {"tag": "obedience", "source": "detected"}, {"tag": "grace", "source": "detected"}], "scripture_references": [{"reference": "2 John 1-3", "type": "quoted", "source": "detected"}], "outline": ["Introduction: The opening of 2 John", "The elder to the elect lady and her children", "Loving one another in truth", "Grace, mercy, and peace from God the Father and Christ", "The truth that abides in us and will be with us forever", "Walking according to the commandment of love", "Conclusion: Christian community grounded in truth and love"], "summary": "Pastor Tito Lyro preaches from 2 John 1-3 on the greeting of the elder to the elect lady. He explores the inseparable connection between truth and love in Christian fellowship, showing that true Christian community is grounded in the truth that abides and expressed through the commandment of love.", "transcript": "## Introduction: Two Parallel Series\n\nToday we are starting two three-part parallel series. I picked two short books so that it would work. In the morning we are going to go through 2 John. This morning we are going to look at verses 1 through 3. The next-to-last Sunday of September, we will consider the greetings at the bottom. And then we are going to consider 3 John, the next book over, with the same structure.\n\nWhat I wanted to do this morning is introduce both books and then consider verses 1 through 3 of 2 John that we just read. There are some things that both 2 John and 3 John have in common. The most obvious is that they are both letters. These two little books are arguably the most letter-like of all the epistles of the New Testament — their format follows exactly the pattern of first-century letter writing. Look at verses 1 through 3 of 2 John: we have the sender (called \"the elder\"), we have the receiver (\"to the elect lady and her children\"), and in verse 3 there is a greeting. We find the same pattern in 3 John 1.\n\n## Who Wrote These Letters?\n\nIn both letters, the author identifies himself as \"the elder.\" That tells us at least one thing about the author: he was a man, because the word *elder* is written in the masculine. It is beyond any doubt that whoever wrote 1 John also wrote 2 John and 3 John. You can see it by comparing vocabulary, grammatical style, and the subjects addressed. The internal evidence tells us that one person wrote all three letters.\n\nBut the name \"John\" shows up nowhere in the letter itself. The title at the top is not original — it is part of our Bible to help us identify what we are reading. Scholars also believe that whoever wrote 1 John also wrote the Gospel of John. One thing we know is that the fourth Gospel and 1 John were written by someone who personally witnessed the ministry of Jesus Christ. 1 John 1:1 opens with vivid verbs of eyewitness testimony:\n\n> *\"That which was from the beginning, which we have heard, which we have seen with our eyes, which we have looked upon and our hands have touched.\"* (1 John 1:1)\n\nAll the senses were involved — this is eyewitness testimony. Very early in the post-apostolic period we learn that this eyewitness is the apostle John, the youngest of the apostles.\n\nIt is fair to ask: why did John call himself \"the elder\" instead of just saying \"John\"? I think there are three possible reasons. The first and most obvious is that he was older — probably in his mid- to late seventies when he writes. But though this is true, it does not account for the article: he calls himself *the* elder, not merely *an older person*, which suggests a title rather than an age comparison.\n\nAnother possibility is that he called himself the elder because he was the last living apostle. The problem with that interpretation is that Peter, when there were other apostles still living, also calls himself \"the elder\" in 1 Peter 5. So that does not seem to be the explanation.\n\nThe most plausible explanation has to do with church government. The government of the church had shifted by divine appointment from being governed by apostles to being governed by elders — transitioning from apostolic government to Presbyterian government, somewhere around Acts 15. So when John writes as \"the elder,\" he is not saying the church should hear him because he is an old man. He is saying the church should listen because he speaks from a position of authority.\n\nBoth 2 John and 3 John deal with teachers in the church. In 2 John, John deals with false teachers who were denying that Jesus was the Christ, the Son of God — a continuation of the main theme of 1 John. In 3 John, he deals with the opposite problem: self-righteous leadership in the church that refused to offer hospitality to faithful traveling evangelists. In one letter, false teachers are being welcomed; in the other, faithful teachers are not being supported.\n\n## Who Was 2 John Written To?\n\nWhen studying a book of the Bible, one of the first questions to ask is: to whom was this written? That helps us understand the original message.\n\nLook at verse 1: \"The elder to the elect lady and her children.\" The recipients are clearly stated. The question is — who is this \"elect lady\"?\n\nTwo viable interpretations have been offered. The first is that this is a woman of whom John was very fond, and the letter was written to her personally. Some even suggest that \"elect\" is not a title but a proper name, so that her name would be Electa. But that creates its own difficulty with verse 13, which refers to \"your elect sister.\"\n\nThe second, and I believe more plausible, interpretation is that \"the elect lady\" is a poetic, feminine way to refer to a local church. Notice that in the letter itself John uses plural pronouns — he addresses \"the elect lady\" and then uses plural verbs and pronouns, which would be inconsistent if he meant one individual woman. He also expects the \"elect lady\" to exercise authority in the church, which is consistent with other parts of the New Testament. And throughout Scripture the church is often referred to as the bride of Christ, as a woman. John refers to believers as \"children,\" as he does here; the church, according to Paul, is analogous to a family.\n\nSo it is best to interpret \"the elect lady\" as a reference to a local church — most likely the church in Ephesus, since the false teaching John addresses is a continuation of what he addressed in 1 John, and in Acts 20 Paul warned the elders of Ephesus that wolves in sheep's clothing would come and devour them.\n\n## Truth and Love Go Together\n\nNow that we have a better understanding of who wrote this letter and its original audience, we are ready to learn from it in its proper context.\n\nThe first thing 2 John 1–3 teaches us is that in the Bible, truth and love always go together. Look at verse 1:\n\n> *\"The elder to the elect lady and her children, whom I love in truth, and not only I, but also all those who have known the truth.\"* (2 John 1)\n\nOne of Paul's mottos is \"truth in love.\" In Ephesians 4 we are instructed to speak the truth in love, that we might all grow into the fullness of Christ. Here John inverts the terms and speaks of love *in* truth. Truth without love can be used to hurt and destroy; truth in love always builds up. And love that is not anchored in truth is no love at all. Love is only real love when it is exercised in the context of what is true.\n\nThere is immense pressure on us — from our culture and society — to define love as the affirmation of the self and all that the self desires. Yet the kind of love we are supposed to practice is love in truth. We have to be careful that we do not fall into the trap of thinking that if we do not accept everything that everyone desires, we are being unloving. We are people of love — love in truth.\n\nPaul defines this kind of love in 1 Corinthians 13:\n\n> *\"Love suffers long and is kind; love does not envy; love does not parade itself, is not puffed up; does not behave rudely, does not seek its own, is not provoked, thinks no evil; does not rejoice in iniquity, but rejoices in the truth.\"* (1 Corinthians 13:4–6)\n\nJohn and Paul are saying the same thing: we are people who love in truth. Leave truth out and you do not have love anymore.\n\nNotice the opening verses of 1 Corinthians 13: \"Though I speak with the tongues of men and of angels, but have not love, I have become sounding brass or a clanging cymbal.\" And: \"Though I have the gift of prophecy, and understand all mysteries and all knowledge, and though I have faith so that I could remove mountains, but have not love, I am nothing.\" And: \"Though I bestow all my goods to feed the poor, and though I give my body to be burned, but have not love, it profits me nothing.\" It does not matter how great a martyr you are — if you do not love, it counts for nothing. Love is what gives validity to all these other things. But it is a particular kind of love: love in truth.\n\n## United by the Truth\n\nNotice also that John says we are united by the truth. \"Not only I, but also all those who have known the truth\" — we are all united by the truth, and ultimately that truth is Jesus Christ himself.\n\n> *\"I am the way, the truth, and the life.\"* (John 14:6)\n\n> *\"Sanctify them by your truth. Your word is truth.\"* (John 17:17)\n\nWe are unified by truth, by Jesus and his Word. We love in this way because the truth lives in us — and will be with us forever. Jesus promised in John 8: \"You shall know the truth, and the truth shall set you free\" — and that truth abides with you forever. We love each other because we are united in Christ. Apart from Christ, no one can love with the kind of love the Bible talks about.\n\n## Love in Truth Produces Grace, Mercy, and Peace\n\nLoving in truth results in grace, mercy, and peace. Look at verse 3:\n\n> *\"Grace, mercy, and peace will be with you from God the Father and from the Lord Jesus Christ, the Son of the Father, in truth and love.\"* (2 John 3)\n\nNotice that John does not wish grace, mercy, and peace upon them. He does not say \"may grace, mercy, and peace *be* with you.\" He says they *will be* with you. He promises it. It is not a wish but a declaration of what is true.\n\nGrace, mercy, and peace are three things that can only be manifested in community, in relationship. We are full of grace because the grace of God is with us. We are merciful because we experience the mercy of God in Christ. We are peacemakers because we are at peace with God. And this is most evident when we love one another in truth.\n\n## Love in Truth Acknowledges Who Jesus Is\n\nFinally, loving in truth means acknowledging who Jesus is. Look at verse 3 again: grace, mercy, and peace come from the Father through the Son — they come \"in truth and in love,\" if we embrace the Son as he truly is. Here John introduces the issue he will tackle in the rest of the letter: Jesus Christ, the Son of God, and God the Son.\n\nWe who know Jesus live at the intersection of truth and love — right there on the corner of truth and love. Truth without love often shows itself in harshness and self-righteousness. Love without truth degenerates into a blind acceptance of whatever one wants to do. Truth and love together show themselves in an unwavering commitment to what God says in his Word, and a genuine care for the people around us — especially other Christians — expressed in kindness, forgiveness, and self-denial. And all this comes from the Father and the Son.\n\n## Conclusion\n\nSo how is it with you? Are you loving in truth? Do you love the Church of Jesus Christ? That is a simple test. Do you love the people in the Church of Jesus Christ? If you do, then you are loving in truth. If you do not, you may even want to ask whether you love Jesus at all — because the Church of Jesus is his body. You cannot love the head without loving the body. As John says in 1 John, if you say that you love God and yet hate your brother in the church, you are lying, because you cannot love what you cannot see if you cannot even love what you see right here.\n\nMay God, through the Lord Jesus Christ, give us grace to love each other in the truth of the gospel and in the truth of the Word of God."};
