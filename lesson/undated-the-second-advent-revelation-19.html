// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-the-second-advent-revelation-19", "title": "The Second Advent", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["The Second Advent - Pastor Tito Lyro - Revelation 19_1-16.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/the-second-advent-pastor-tito-lyro-revelation-191-16", "tags": [{"tag": "second coming", "source": "detected"}, {"tag": "eschatology", "source": "detected"}, {"tag": "Advent", "source": "detected"}], "scripture_references": [{"reference": "Revelation 19:1-16", "type": "quoted", "source": "detected"}], "outline": ["Introduction: Finishing the Advent series with the Second Advent", "Revelation 19:1-16 and the heavenly celebration", "The Hallelujah chorus of heaven", "The wedding supper of the Lamb", "Christ returning as King of kings and Lord of lords", "The significance of the Second Advent for the church", "Conclusion: Living in anticipation of Christ's return"], "summary": "Pastor Tito Lyro concludes the Advent series with a sermon on the Second Advent of Christ from Revelation 19:1-16. He preaches that while the passage may seem unrelated to Advent, it has everything to do with it as it portrays Christ's glorious return as King of kings and Lord of lords.", "transcript": "## The Nativity and the Second Advent\n\nRevelation 19 concludes our Advent series — which may seem like an unusual choice until you realize that it has everything to do with the Advent: the *second* Advent of the Lord Jesus Christ.\n\nWe have been looking at songs of the Advent season. We began with Mary's song when she visited Elizabeth, then Zechariah's song at the birth of John the Baptist, then the song of the angels at our Lord's birth. Today we consider the songs of the powers in heaven — songs that are very different from our usual Christmas carols.\n\n> *\"Hallelujah! Salvation and glory and honor and power belong to the Lord our God! For true and righteous are His judgments.\"* (Revelation 19:1-2)\n\nWe have sterilized our Christmas songs. We are content to sing things we could sing to a girlfriend. The church has also sterilized the Christmas story — we think of a neat little scene with a baby, gentle shepherds, three kings who aren't even there, and an idyllic angelic glow. That is as far from the truth as it can be.\n\nWhy did Jesus come? Christ was born to die. That was his mission. One of the songs we did not cover in this series is Simeon's — and one of the things Simeon says to Mary is that her heart will be pierced with a sword, because of the suffering of her son. We often leave people around us asking: what is the big deal about the birth of a baby in a dusty, forsaken part of the world?\n\nThe angel's message to the shepherds was clear: *\"For there is born to you this day in the city of David a Savior, who is Christ the Lord.\"* The point of the nativity is that God became human, dwelt among us, and came with a mission: to grow up and obey every aspect of God's law perfectly, so that that active obedience could be credited to those he represented. To die the death of a sinner — not for his own sin, but as a ransom. To come back to life, and to be crowned King of heaven and earth. And finally, to come again bodily to receive his bride and judge the world.\n\nIt is about this final part of the mission that Revelation 19 speaks.\n\n## He First Came as a Baby; He Returns as a Conquering King\n\n> *\"His eyes were like a flame of fire, and on His head were many crowns.\"* (Revelation 19:12)\n\nA king who wears many crowns is a king who has conquered all other kings and taken their crowns. In 2 Samuel, when David was about to enter a conquered city, Joab sent word: \"You need to come and take the crown — otherwise it will be attributed to me.\" The conquering king wears the crowns of all the kings he has defeated. Our Lord is described here as wearing many crowns.\n\nHe first came as the Lamb of God — John the Baptist saw him on the shore of the Jordan and said: *\"Behold! The Lamb of God who takes away the sin of the world!\"* When he returns, he comes as the Lion of Judah. The book of Revelation makes this connection explicitly in chapter 5, where heaven weeps because no one can open the scroll — until one of the elders says, \"The Lion of Judah can open it.\" And John looks — and sees a Lamb, as though slain. Our Savior who first came as a Lamb is coming back as the Lion of Judah, with all power and glory.\n\nThere are only three descriptions of Jesus' physical appearance in the Bible. Isaiah 53 says he was unremarkable — average, unrecognizable in a crowd. The other two are in Revelation: chapter 1 and chapter 19. In neither of those does he bear any resemblance to the softened, blonde, feminized image so common in popular religious art. We see a fierce king coming as the Lion of Judah.\n\nHe first came to be despised and rejected; he is coming back as the Lord God Almighty:\n\n> *\"Hallelujah! For the Lord God Omnipotent reigns!\"* (Revelation 19:6)\n\nHe first came to save; he is coming back to judge:\n\n> *\"Now out of His mouth goes a sharp sword, that with it He should strike the nations. And He Himself will rule them with a rod of iron. He Himself treads the winepress of the fierceness and wrath of Almighty God.\"* (Revelation 19:15)\n\nThe ESV puts it vividly: he will tread \"the winepress of the fury of the wrath of God the Almighty.\" When Christ returns, there is no more salvation — only judgment. And those who will face the wrath of God are not only the visibly wicked. They include every \"nice Uncle Joe\" and \"friendly neighbor Bob\" who never believed in Jesus Christ. Our Lord may come tomorrow. Is there a sense of urgency in us for the unbelieving people in our lives?\n\n## He Is Coming Wearing Many Crowns\n\nHe wears **the crown of heaven**:\n\n> *\"We see Jesus, who was made a little lower than the angels, for the suffering of death crowned with glory and honor.\"* (Hebrews 2:9)\n\nHe wears **the crown of earth**:\n\n> *\"He Himself will rule them with a rod of iron.\"* (Revelation 19:15)\n\nAnd Revelation 11:15: *\"The kingdoms of this world have become the kingdoms of our Lord and of His Christ, and He shall reign forever and ever!\"* We think of powerful political leaders and imagine they are the ones who rule the course of history. Proverbs says the hearts of kings are in the hand of God, and he turns them as easily as he turns water — there is no resistance.\n\nHe wears **the crown of heaven's armies**:\n\n> *\"The armies in heaven, clothed in fine linen, white and clean, followed Him on white horses.\"* (Revelation 19:14)\n\nGod's favorite title for himself in the Old Testament is *Yahweh Sabaoth* — the Lord of Armies. In Revelation 19 it is the Lord Jesus himself who leads those armies.\n\nHe wears **the crown of the church**:\n\n> *\"Let us be glad and rejoice and give Him glory, for the marriage of the Lamb has come, and His wife has made herself ready.\"* (Revelation 19:7)\n\nOur Lord rules over his church. His return is described as a marriage feast. He is our husband. Joel 2:15-16 prophesied: *\"Let the bridegroom go out from his chamber, and the bride from her dressing room.\"* Revelation 19 is the fulfillment of Joel 2, when the marriage of the Son and his church will be consummated.\n\nThe Apostle John marvels at such love: *\"Behold what manner of love the Father has bestowed on us, that we should be called children of God!\"* And in 1 John 3:2: *\"When He is revealed, we shall be like Him, for we shall see Him as He is.\"*\n\n## How Should We Respond?\n\nThe saints in heaven show us the response:\n\n**Great joy.** Verse 6: *\"Hallelujah! For the Lord God Omnipotent reigns! Let us be glad and rejoice and give Him glory!\"* The fact that Christ reigns should produce joy in our hearts — not because circumstances in our lives are going well, but because *he reigns*.\n\n**Fear, reverence, and awe.** Verse 5: *\"Praise our God, all you His servants and those who fear Him, both small and great!\"* We are the blessed ones of God — not because of how life is going, but because we are called to the marriage supper of the Lamb.\n\n**The yoke of Christ.** Jesus tells us directly what our response should be: take his yoke upon us. We are yoked to Christ; the reins of our lives are in his hands. This means the reins of our marriages, our singleness, our relationships, our worship, our work — all of life in submission to the King of Kings and Lord of Lords.\n\n> *\"Come to Me, all you who labor and are heavy laden, and I will give you rest. Take My yoke upon you and learn from Me, for I am gentle and lowly in heart, and you will find rest for your souls. For My yoke is easy and My burden is light.\"* (Matthew 11:28-30)\n\nEvery knee will bow at his coming — Paul makes that clear in Philippians 2. If you bow now, by faith, you bow the knee willingly to the gentle and lowly Savior. If you wait for his coming, you will bow on the sheer pressure of his wrath, and be a slave of that wrath forever.\n\nThis is the fullness of the nativity story. God the Son became flesh and dwelt among us. He lived among us a perfect life of obedience on behalf of his people. He died a sinner's death so that his people could have life. He came back to life and reigns over the world through his church. And he is coming again — as King of Kings and Lord of Lords — for his church and to judge the world. Praise be to God for the fullness of the nativity story."};
