<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "2025-03-16-endure-through-suffering", "title": "Endure Through Suffering", "speaker": "Pastor Jon Rees", "date": "2025-03-16", "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["3-16-25 -AM- Endure Through Suffering - 1 Timothy 1-8-18 - Guest Speaker-Pastor Jon Rees.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/3-16-25-am-endure-through", "tags": [{"tag": "suffering", "source": "detected"}, {"tag": "gospel", "source": "detected"}, {"tag": "sin", "source": "detected"}, {"tag": "perseverance", "source": "detected"}, {"tag": "grace", "source": "detected"}, {"tag": "friendship", "source": "detected"}, {"tag": "boldness", "source": "detected"}], "scripture_references": [{"reference": "2 Timothy 1:8-18", "type": "quoted", "source": "detected"}, {"reference": "2 Timothy 1:7", "type": "referenced", "source": "detected"}, {"reference": "Titus 3:5", "type": "quoted", "source": "detected"}, {"reference": "2 Corinthians 11:24-28", "type": "quoted", "source": "detected"}], "outline": [{"title": "Introduction: The Reality of Gospel Suffering", "subpoints": ["Paul's catalog of sufferings in 2 Corinthians 11 illustrates the real cost of proclaiming Christ", "Second Timothy is likely Paul's last letter, written from a damp Roman dungeon", "The theme of 2 Timothy is 'endure'—Paul writes to Timothy, his protege in Ephesus", "If you proclaim the gospel of Jesus Christ boldly, you will suffer—Scripture makes this abundantly clear"], "scripture": ["2 Corinthians 11:24-28", "2 Timothy 1:8-18"]}, {"title": "Necessity 1: Share in Suffering for the Gospel", "subpoints": ["Paul's command to Timothy: do not be ashamed of Christ's testimony or of Paul's imprisonment", "Ephesus was a modern city with competing ideas; proclaiming Christ there was socially costly", "The temptation to soften Jesus' hard sayings or to stay silent is real for every believer", "It is easier to be bold in a pulpit than across a coffee shop table from someone hostile to Christianity"], "scripture": ["2 Timothy 1:8"]}, {"title": "The Motivation: Remember the Gospel of Grace", "subpoints": ["Paul motivates Timothy not through law but through grace at three stages", "Grace of justification: from eternity past God chose and declared us holy, not because of our works", "Grace of sanctification: the Holy Spirit works in believers to make them more like Christ", "Grace of glorification: immortality points to the day when we will be with Jesus, free from sin's presence"], "scripture": ["2 Timothy 1:9-10", "Titus 3:5"]}, {"title": "Necessity 2: Guard the Entrusted Gospel", "subpoints": ["Paul is suffering in prison, yet unashamed, because he knows whom he has believed", "God will guard the gospel even when its heralds are in chains", "We are called to follow sound words with faith and love and to stand firm with conviction", "Guarding secondary and tertiary issues at the expense of the primary gospel is a common church failure"], "scripture": ["2 Timothy 1:11-14"]}, {"title": "The Reality: The Gospel Has Both Enemies and Partners", "subpoints": ["Some will turn away—Paul is crushed that 'all who are in Asia' turned from him", "When someone we love deeply turns from the faith and betrays us, the pain is devastating", "Onesiphorus is the counter-example: he sought Paul out in prison, was not ashamed of Paul's chains", "We need partners in faith who remind us of the gospel, join in suffering, stand with us, and guard what is entrusted"], "scripture": ["2 Timothy 1:15-18"]}, {"title": "Application: Endure for God's Glory and Others' Good", "subpoints": ["Suffering will come if you are faithful to proclaim the good news of Jesus Christ", "Encourage the partners in your life who have helped you persevere—tell them this week", "The gospel has been entrusted to us; there is no Plan B—the church is God's Plan A", "All of this endurance is for God's glory, our ultimate good, and the good of those around us"], "scripture": []}], "summary": "Guest speaker Pastor Jon Rees preaches from 2 Timothy 1:8-18 on the subject of enduring through suffering. He opens with Paul's catalog of afflictions in 2 Corinthians 11 to establish that the suffering he describes is not theoretical—Paul writes from a Roman prison, likely a dungeon, as he composes what is probably his last letter. His entire message to Timothy and to the church is a single word: endure.\n\nPastor Rees identifies two necessities for enduring through suffering. The first is to share in suffering for the gospel. Timothy pastored the church Paul had planted at Ephesus, a cosmopolitan city hostile to Christian distinctives. The temptation to stay silent, minimize hard sayings, or disassociate from imprisoned fellow-believers was real. Paul does not motivate Timothy through law but through grace—specifically the three-stage grace of justification, sanctification, and glorification. Because God has been lavish in grace toward us from before time began and will bring us safely to glory, we can bear the cost of gospel proclamation.\n\nThe second necessity is to guard the entrusted gospel. Paul, though in prison, is unashamed because he knows in whom he has believed and trusts that God will protect the gospel even when its heralds are in chains. The church is called to follow sound words with conviction and love, keeping the primary message—the life, death, and resurrection of Jesus—at the center rather than fighting over secondary issues.\n\nThe sermon concludes with the reality that the gospel has both enemies and partners. Paul's pain at the defection of those in Asia is palpable, but his focus quickly turns to Onesiphorus, who searched relentlessly for Paul in prison and was not ashamed of his chains. This is the kind of partner every believer needs: someone who reminds us of the gospel, joins in its suffering, guards what has been entrusted, and refuses to leave us alone.", "transcript": "## Scripture Reading: 2 Timothy 1:8-18\n\nIf you're able to remain standing for the reading of God's Word, we're going to be reading 2 Timothy chapter 1 verses 8 through 18. This is the Word of our Lord.\n\nTherefore do not be ashamed of the testimony of our Lord, nor of me his prisoner, but share with me in the sufferings of the gospel according to the power of God, who has saved us and called us with a holy calling, not according to our works, but according to his own purpose and grace, which was given to us in Christ Jesus before time began, but has now been revealed by the appearing of our Savior Jesus Christ, who has abolished death and brought life and immortality to light through the gospel, to which I was appointed a preacher and an apostle and a teacher of the Gentiles. For this reason I also suffer these things. Nevertheless, I am not ashamed. For I know whom I have believed and am persuaded that he is able to keep what I have committed to him until that day. Hold fast the pattern of sound words which you have heard from me in faith and love which are in Christ Jesus. That good thing which was committed to you, keep by the Holy Spirit who dwells in us. This you know, that all those in Asia have turned away from me, among whom are Phygelus and Hermogenes. The Lord grant mercy to the household of Onesiphorus, for he often refreshed me and was not ashamed of my chain. But when he arrived in Rome, he sought me out very zealously and found me. The Lord grant to him that he may find mercy from the Lord in that day, and you know very well how many ways he ministered to me at Ephesus.\n\nThis is the Word of our Lord. Let us pray. Father, we do pray that your spirit fall upon your servant this morning. We pray that you would open our hearts and our ears and our minds to hear directly from you, for asking Jesus' name. Amen. Please be seated.\n\n## Introduction\n\nFive times I received at the hands of the Jews the forty lashes minus one. Three times I was beaten with rods. Once I was stoned. Three times I was shipwrecked. A night and a day I was adrift at sea. On frequent journeys, in dangers from rivers, dangers from robbers, danger from my own people, danger from Gentiles, danger in the city, danger in the wilderness, danger at sea, danger from false brothers. In toil and hardship, through many sleepless nights, in hunger and thirst, without food, in cold and exposure. And apart from other things, there is the daily pressure on me of my anxiety for all the churches.\n\nHow's your day going?\n\nSuffering. There's suffering that we are all going to experience in this life because this world is full of sin. But there's a different suffering from the suffering of falls and cancer and death. That is the suffering because of the proclamation of the gospel of Jesus Christ.\n\nThe one who is writing this letter, Paul, this is probably his last letter. He is sitting in a prison that is most likely a dungeon that is damp, musty, has little light. He is chained and most likely cold. And it's in this context that he's writing to his protege Timothy. He is telling Timothy throughout this letter: endure. The theme of 2 Timothy is endure.\n\nPaul is writing to this young pastor who is pastoring a church in Ephesus, the church that he planted. He spent much time there. And he is telling Timothy throughout this letter to endure. And particularly in these verses, 8 to 18, to endure through suffering.\n\nYou're going to suffer. Scripture makes it abundantly clear, not just here but throughout Scripture, that if you proclaim the gospel of Jesus Christ boldly, you will suffer. And knowing that truth, Paul encourages Timothy in this section with two necessities and one reality.\n\n## Necessity 1: Share in Suffering for the Gospel\n\nThe first necessity of enduring through suffering is that we are to share in suffering for the gospel. The call for all of us is to share in suffering for the gospel. You will endure through suffering when you share in the suffering that comes with sharing the gospel.\n\nSo how does Paul lay this out? He first says to Timothy, don't be ashamed. It seems a little odd to say to a pastor, don't be ashamed. Why would he say this? Well, Ephesus was what would be considered at that time a modern city, with lots of idols, a lot of competing ideas for the gospel. It would be intimidating for anyone living in that city at that time to live contrary to the ways of the city. And the pastor is required not only to live that way, but to proclaim a different way.\n\nMaybe the temptation for Timothy would be to not talk about Jesus quite so much. Maybe the temptation would be to minimize some of the harder sayings of Jesus. Don't talk about \"deny yourself, take up your cross and follow me.\" Just say that God loves all people, we'll talk about that a little bit more.\n\nJesus' testimony about himself and what he declared did not provide wiggle room, which really is not comfortable if you just want a smooth, comfortable life. The prevailing culture in Ephesus was a love of sin. And it would make it difficult not to be ashamed when the message of Jesus is the opposite of loving sin. Does the culture of Ephesus sound at all similar to our culture?\n\nHere's a little secret about pastors: it is far, far, far easier to be bold right here in a pulpit proclaiming the gospel to an audience that is generally in favor of what I'm saying, than it is sitting in a coffee shop across from somebody who is hostile to Christianity.\n\nIn addition, Paul tells Timothy not to be ashamed of him because of his imprisonment. Those in Ephesus knew that Paul was imprisoned, and they were probably saying: if you're with that guy, notice where this takes you. Your little system of belief takes you into prison.\n\nIf you know someone who is suffering persecution because they are taking a stand for Jesus, the question we have to wrestle with is: will I back them up, or am I going to back away?\n\nPaul then says, share in suffering for the gospel by your own power? No. He says, by the power of God. We see in verse 7 that the Spirit gives us a spirit of power, and one of the workings of that power is to be able to suffer for the gospel.\n\n## The Motivation: Remember the Gospel\n\nLook at verse 9 and 10: who saved us and called us to a holy calling not because of our works, but because of his own purpose and grace, which he gave us in Christ Jesus before the ages began, and which now has been manifested through the appearing of our Savior Christ Jesus, who abolished death and brought life and immortality to light through the gospel.\n\nHow does he motivate Timothy to live out these commands? He motivates Timothy by saying: remember the gospel. You can share in the suffering of the gospel by remembering the gospel. The motivation to share in the suffering is not law. It's grace. And these are three stages of grace we see in these verses.\n\nFirst, God saves us by grace—grace from eternity past. God determined to set his affections on some of those deserving eternal damnation and call them to himself. This is his doing. He saves. It's his purpose and it is the showing of his grace.\n\nThe next grace we see is the grace of sanctification. Those in Christ are called to holy living. God through the Holy Spirit enters us when he saves us and works in us to make us holy, more like Jesus. He gives us enabling grace to say no to sin and yes to Christ.\n\nAnd finally, there is the grace of glorification. The word immortality in verse 10 points us to the day when we will be with Jesus forever in the new heavens and the new earth, when there will no longer be sin. Justification: God saves us from the penalty of sin. Sanctification: God is saving us from the power of sin. Glorification: God will save us from the presence of sin.\n\nYou are chosen by grace. You are kept by grace. You will see the Savior one day by grace. Paul's argument is: don't be ashamed of Jesus or me. He says, share in suffering—and you will be able to do this when you remember the grace of Jesus.\n\n## Necessity 2: Guard the Entrusted Gospel\n\nThe second necessity to endure through suffering is that we do this while guarding the entrusted gospel. That's verses 11 to 14.\n\nPaul is in prison and continuing forward in the good news. When he calls Timothy not to be ashamed, he bolsters Timothy by saying, I'm not ashamed. Even though I'm suffering immensely. Why? Because he knows in whom he believes. And not only does he know him, but because of God's character and strength, God will guard this gospel that has been entrusted to Paul, even in prison.\n\nWe can suffer and not be ashamed because God will make sure that the gospel keeps going forth. His suffering is not in vain. Timothy, church—you, as you are sitting in general comfort—follow Paul's sound words in the faith and love that are in Christ Jesus. Keep going in what you've heard. Don't give up. Follow it with conviction and with love.\n\nPaul ends this section with the command: guard the good deposit entrusted to you. God who is sovereign and good will guard it. Follow it with confidence and with love, and stand firm.\n\nThe gospel is primary. The gospel is essential. It's the life, death, and resurrection of Jesus. But what we see many times in the church is that we get more fired up fighting and guarding secondary and tertiary issues, which ends up getting our eyes off the primary issue, which is the gospel. The deposit that we are to guard and to proclaim has been entrusted to us. There is no Plan B. God's Plan A is to entrust his good news to his church.\n\n## The Reality: Enemies and Partners\n\nOne of the certainties of life in the church is that at some point you will see someone turn away from the church, from Jesus. Somebody that we thought had full vigor and desires for Christ and the gospel, turns away. That is painful. But what is really painful is when someone turns away from Jesus and also betrays you in the process.\n\nPaul is obviously pained over this: all who are in Asia turned away from me. We don't know anything else about Phygelus and Hermogenes, but for them to be named means they were at one time really, really close to Paul. Paul was a lover. He loved people. C.S. Lewis says it so well: to love at all is to be vulnerable. Paul gave himself to others, and thus when they turned away, he hurt.\n\nBut notice he doesn't linger. He quickly moves on. There are also great partners in the gospel. There are three verses in this last section on partnership compared to one verse about the turncoat. That's a good reminder for us: dwell more on those who are partners than those who have turned away.\n\nOnesiphorus often refreshed Paul even in prison. He was not ashamed of Paul's chains—drawing back an example of the command of verse 8, not to be ashamed. And Onesiphorus searched earnestly for Paul. He didn't give up. He wouldn't stop.\n\nWhat a faithful partner who mercifully helped Paul endure through suffering. Don't we need partners in the faith who will help us remain faithful and pursue Jesus? Who will not be ashamed of us, who will remind us of the gospel that we need, who will join in suffering with us for Jesus, who will guard what is entrusted to us?\n\nIf there is somebody in your life who fulfills those qualities—who loves you, who bolsters you, who encourages you, who stands with you—maybe this week tell them: thank you for how you have helped me persevere in the midst of suffering for the gospel.\n\n## Closing\n\nSo church: endure through suffering. Suffering will come if you are faithful to proclaim the good news of Jesus. Paul wants Timothy. He wants all of us to endure through this suffering. And we do all of this for God's glory, for our ultimate good, and for the good of those around us.\n\nFather, we thank you so much for this morning and for this time in your Word. I pray that as you, through your spirit, help us to apply it as we go from here. Father, I pray that your Word would be a swift word, that it would pass from our ears and into our hearts, that it would move from our hearts and into our lips and into the conversations around us, that as the rain does not return empty, so neither may your Word, but that it would accomplish that for which it is given. We pray these things in the precious name of Jesus. Amen."};
