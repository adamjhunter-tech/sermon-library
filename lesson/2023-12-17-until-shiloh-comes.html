window.LESSON_DATA = {"id": "2023-12-17-until-shiloh-comes", "title": "Until Shiloh Comes", "speaker": "Pastor Tito Lyro", "date": "2023-12-17", "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["12-17-23 -AM- Until Shiloh Comes - Genesis 49-8-12 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/12-17-23-am-until-shiloh-comes-genesis-49-8-12-pastor-tito-lyro", "tags": [{"tag": "Old Testament prophecy", "source": "detected"}, {"tag": "incarnation", "source": "detected"}, {"tag": "election", "source": "detected"}, {"tag": "Advent", "source": "detected"}, {"tag": "resurrection", "source": "detected"}, {"tag": "peace", "source": "detected"}], "scripture_references": [{"reference": "Genesis 49:8-12", "type": "quoted", "source": "detected"}, {"reference": "Genesis 3:15", "type": "referenced", "source": "detected"}, {"reference": "Galatians 4:4", "type": "quoted", "source": "detected"}, {"reference": "John 6:38", "type": "quoted", "source": "detected"}, {"reference": "Romans 5:1", "type": "quoted", "source": "detected"}, {"reference": "Revelation 21:3", "type": "quoted", "source": "detected"}], "outline": [{"title": "Introduction: The Early Expectation of a Savior", "subpoints": ["Since Genesis 3:15, the people of God have been looking for a Savior", "Genesis 49:8-12, spoken 1800 years before Christ, is a prophecy of the coming King", "Three things to see: Shiloh as a title for Jesus, Shiloh's task, and Shiloh's triumph"], "scripture": ["Genesis 3:15", "Genesis 49:8-12"]}, {"title": "Shiloh Is a Title for the Lord Jesus Christ", "subpoints": ["Shiloh means a messenger sent on a mission with a message — the word behind 'apostle'", "Jesus was sent by the Father with a message (Galatians 4:4; John 6:38)", "Jesus is not only the messenger but the Message — the Word of God", "Shiloh also means peacemaker — Jesus is the Prince of Peace who brings peace between man and God (Romans 5:1)", "Shiloh implies deliverer/Savior — Jesus = Yahweh Saves"], "scripture": ["Galatians 4:4", "John 6:38", "Romans 5:1"]}, {"title": "Shiloh's Task: Gathering a People unto Obedience", "subpoints": ["\"To him shall be the obedience of the people\" — Shiloh gathers people unto obedience", "Jesus was always gathering: shepherds at birth, disciples, crowds during ministry, people today", "God has elected a multitude that cannot be numbered — greater than the stars of heaven", "Everyone will bow the knee to Christ — the elect from grace, others from the weight of His wrath"], "scripture": ["Genesis 49:10"]}, {"title": "Shiloh's Triumph", "subpoints": ["More Christians are alive today than all Christians combined who lived before", "Christ came to conquer Satan — and did so at the cross, making a public spectacle of him", "Christ is conquering us daily through sanctification", "The final triumph: the tabernacle of God with men — eternal dwelling together (Revelation 21:3)"], "scripture": ["Revelation 21:3"]}, {"title": "Conclusion: Has Shiloh Come to You Personally?", "subpoints": ["The whole sermon rested on one little sentence uttered by a dying man thousands of years ago", "Shiloh has come — He is Jesus, whose birth we celebrate this month", "The question: Has Shiloh come to you personally in the form of salvation?"], "scripture": []}], "summary": "In this Advent morning sermon, Pastor Lyro explores Genesis 49:8-12 — the deathbed blessing of Jacob over his son Judah — as a messianic prophecy pointing to the Lord Jesus Christ. The key word is \"Shiloh\" in verse 10, a term that scholars translate as messenger, peacemaker, and deliverer. Pastor Lyro demonstrates that each of these meanings finds its perfect fulfillment in Jesus. As the One sent with a message, Jesus is both the messenger and the message itself — the Word made flesh. As peacemaker, He accomplished what we most need: peace between man and God, declared in Romans 5:1. As deliverer/Savior, He is Yahweh Saves, the One Jacob had wrestled with at Bethel. The sermon then turns to Shiloh's task — gathering a people unto obedience. Jesus gathered the shepherds at His birth, called disciples, ministered to crowds, and continues today to draw the elect of God to Himself, a multitude that no one can number. Every knee will bow to Him, either from the grace of God or from the weight of His wrath. Finally, the sermon considers Shiloh's triumph: Christ came to conquer the world, and He is doing so; He conquered Satan at the cross; He is daily conquering sin in His people; and there is a day coming when all of God's people will be gathered together forever in the new heavens and new earth. The sermon closes with the personal challenge: Has Shiloh come to you personally in the form of salvation?", "transcript": "## Introduction: The Early Expectation of a Savior\n\nSince the first Sunday of December, we have been following an Advent series in all the services. We saw that the God-man came to save His people — the only being who was fully God and fully man. Jesus Christ is the perfect Savior of mankind. He saved us, and by doing so He adopted us into a family spread over all the earth. He came to rescue the hearts of men whose thoughts were only evil continually in His sight — as we saw from Genesis 6 last Sunday afternoon.\n\nThis morning, I want us to look at Genesis 49:8-12, especially verse 10, as a prophecy concerning the coming of the Lord Jesus Christ. As early as Genesis 3:15, when God spoke to the serpent and said that from the seed of the woman one was going to come who would crush the serpent's head, the people of God have been looking for a Savior. In this passage, spoken 1,800 years before the birth of Christ by an old man on his deathbed blessing his sons, we see a foretaste of the prophecy of the coming of our Savior.\n\nI want us to see three things concerning Jesus — or about Shiloh, as verse 10 calls Him. First, Shiloh is indeed a title for the Lord Jesus Christ. Second, this title and what Shiloh does points to the task of the Lord Jesus Christ. Third, this passage shows the triumph of the Lord Jesus Christ at the end of all times.\n\n## Shiloh Is a Title for the Lord Jesus Christ\n\nIf you look again at verse 10: \"The scepter shall not depart from Judah, nor a lawgiver from between his feet, until Shiloh comes, and to him shall be the obedience of the people.\"\n\nShiloh refers to a messenger — someone sent on a mission with a message. That's exactly who Jesus is. Remember what Paul says in Galatians 4:4: \"God sent forth His Son\" — the word for sending is *apostello*, sending with a message. That's the word we get \"apostle\" from — sent with a message. And Jesus testifies that He was sent into the world on a mission. He says in John 6:38: \"For I have come down from heaven, not to do My own will, but the will of Him who sent Me.\"\n\nBut there is more: Jesus was not only the messenger from God, but also the message itself. He is called the Word — He is both the messenger and the message.\n\nThe word Shiloh can also mean peacemaker. And Isaiah clearly portrays our Savior as the Prince of Peace. When Jesus was born, the angel said, \"Glory to God in the highest, and on earth peace, goodwill toward men.\" This is a very good title for Jesus, for He is the one who brings peace between men and God. In Romans 5:1 the Apostle says: \"Therefore, having been justified by faith, we have peace with God through our Lord Jesus Christ.\" Shiloh has come, brothers and sisters, and He has brought peace between you and God.\n\nIf you are an unbeliever here, do not buy the idea that God loves you as you are. He is angry with you because you have sinned against Him. Under the condemnation of God and worthy of His wrath, you need Shiloh — Jesus — to take upon Himself the wrath that is due to you. Through Him, God loves you. But apart from Christ, you are liable to eternal death and the wrath of God.\n\nThe word Shiloh also implies that this messenger, this peacemaker, is a deliverer or a Savior. The angel from the Lord instructed Joseph and Mary to call him \"Yahweh Saves\" — Jesus. That is the One that Jacob was looking forward to, the One that Jacob wrestled with at Bethel and said, \"I will not let you go until you bless me.\"\n\n## Shiloh's Task: Gathering a People unto Obedience\n\nShiloh also points to the task of Jesus. Look at how Jacob describes it in verse 10: \"Until Shiloh comes, and to him shall be the obedience of the people.\" What Shiloh is going to do is gather people unto obedience — there is a gathering aspect here.\n\nWhen you look at Jesus's life, we notice that He was always gathering people. He gathered the shepherds at His birth. He gathered the disciples together and formed the foundation of the Apostolic Church. He gathered many crowds during His ministry. He is gathering many people into His kingdom today. And Jesus said: \"If I am lifted up, I will draw all peoples to Myself.\"\n\nBrothers and sisters, we believe in election. We believe that God, before the foundation of the world, appointed a group to be saved. We believe that Jesus Christ died for those people — and only those people. But that group is a multitude that cannot be counted. There are more elect people than the grains of sand on the beach, more people going to heaven than the particles of dust on the earth. As we get a glimpse into heaven, John says that he saw multitudes that could not be numbered — and on top of that, other multitudes that could not be numbered.\n\nOur Lord Jesus is gathering to Himself a people unto obedience. And He is doing that to the point that one day all nations will be gathered to Him. Everyone is going to bow the knee to Jesus Christ — the vast majority from the grace of Jesus Christ, but others will bow their knees under the sheer weight of His wrath.\n\n## Shiloh's Triumph\n\nLastly, Shiloh points to the triumph of Jesus. The little Christ child born in a manger came to conquer. He came to conquer the world — there are more Christians living today than all Christians who lived before this time added together in history. There are places where Christ had never been heard — they are now worshiping the Lord Jesus. He is conquering the world, and eventually He will fully conquer it in the new heavens and new earth.\n\nThe little Christ child born in a manger came to conquer Satan. He did that at the cross, making a public spectacle of Satan, nailing to the cross the curse of the law that we no longer have to bear. And that little Christ child who grew up, lived a perfect life, and died for the sins of His people is conquering us even today. As Paul says in 2 Corinthians 3:18, \"from glory to glory you are becoming more like the Lord Jesus Christ.\"\n\nThere is a day coming when all of God's people will be gathered together for all eternity as a sign of His last triumph. As the book of Revelation 21:3 says: \"Behold, the tabernacle of God is with men, and He will dwell with them, and they shall be His people. God Himself will be with them and be their God.\" The very promise made to Jacob's grandfather Abraham: \"I'll be your God and you'll be My people\" — that is the promise of eternity, when all people are gathered to Jesus Christ.\n\n## Conclusion\n\nThis whole sermon, short as it may have been, was based on one little sentence uttered by a dying man thousands of years ago. Yet the message it conveys is still as current today as it was when Jacob uttered it to Judah. Shiloh has come. He is Jesus, whose birth we are celebrating this month.\n\nMy prayer for you today is that Shiloh has indeed come to you personally in the form of salvation — accomplished by Christ and applied to you by the power of the Holy Spirit.\n\nFather in heaven, thank you that you are a glorious God who speaks to Your people. We pray that in the simple message of the gospel, You cause us who are believers to grow in You, and that You save the unbeliever. We pray that indeed we would see Jesus — Shiloh — who has come, as our Savior, our Lord, the One who is leading us to glory. We pray in His name. Amen."};
