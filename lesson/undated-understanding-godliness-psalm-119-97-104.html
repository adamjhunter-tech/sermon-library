// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-understanding-godliness-psalm-119-97-104", "title": "Understanding Godliness", "speaker": "Elder Andrew Hoy", "date": null, "session": "AM", "series": "Psalm 119", "series_part": null, "parts": 1, "source_files": ["Understanding Godliness - Psalm 119_97-104 - Elder Andrew Hoy.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/understanding-godliness-psalm-11997-104-elder-andrew-hoy", "tags": [{"tag": "godliness", "source": "detected"}, {"tag": "wisdom", "source": "detected"}, {"tag": "Word of God", "source": "detected"}, {"tag": "meditation", "source": "detected"}, {"tag": "obedience", "source": "detected"}], "scripture_references": [{"reference": "Psalm 119:97-104", "type": "quoted", "source": "detected"}], "outline": ["Introduction: The mem section of Psalm 119", "Oh, how I love Your law! Meditation all the day", "God's Word making the psalmist wiser than his enemies", "More understanding than teachers and the ancient", "Keeping God's precepts and restraining from evil", "How sweet are God's words to the taste", "Conclusion: The Word of God as the source of true understanding and godliness"], "summary": "Elder Andrew Hoy preaches from the mem section of Psalm 119 (verses 97-104), where the psalmist declares his love for God's law and the wisdom it provides. He shows that meditation on God's Word produces more understanding than enemies, teachers, and the ancients — the foundation of true godliness.", "transcript": "## Introduction: Engaging God's Word with the Whole Person\n\nA couple of weeks ago I asked my students in the logic class the following question: try to imagine a person who is purely rational — what would that person be like? One of my older students got closest to what I was after: \"No one would like him.\" We have all encountered this kind of person, either in real life or in fiction — someone so rational about everything that they miss an entirely different dimension of their humanity, the more emotional side.\n\nWhat I was trying to help my students see is this: while it is a good thing to be rational, and to make decisions on a rational basis, we cannot ignore the other aspects of who we are as humans. Our goal should be to be well-rounded people — rational, but not at the expense of the rest of our being.\n\nAs we consider Psalm 119, verses 97 through 104 this afternoon, I think it will soon become evident that the truly righteous person engages God's Word with the whole of their being — with their mind, their emotions, and their will.\n\n## The Cycle: Love, Understanding, and Obedience\n\nAs I studied and meditated on this Psalm, I began to see a moving circle — a cyclical relationship between love, understanding, and obedience. The Psalm opens with a statement of love for God's Word:\n\n> *\"Oh, how I love your law! It is my meditation all the day.\"* (Psalm 119:97)\n\nBut then the rest of the Psalm is dominated by the theme of understanding. Look at the pattern:\n\n- Verse 98: \"You, through your commandments, make me wiser than my enemies.\"\n- Verse 99: \"I have more understanding than all my teachers.\"\n- Verse 100: \"I understand more than the ancients.\"\n- Verse 102: \"You yourself have taught me.\"\n- Verse 104: \"Through your precepts I get understanding.\"\n\nWhat we see is this: **loving God's Word leads to understanding it. Understanding it leads to obeying it. And obeying it leads to loving it more.** And on the cycle goes.\n\n## Love Leads to Understanding\n\nThe Psalm begins with love — and I see this as the beginning of understanding. The connection is made explicit in verse 97 itself: \"Oh, how I love your law — **it is my meditation all the day.**\" The one who loves God's Word meditates on it, and the one who meditates on it understands it.\n\nWe all understand this natural relationship. Think of someone who loves baseball — they can tell you statistics and details that seem incomprehensible to someone who does not share that love. People who take delight in something — cooking, history, mechanics, computers — know a great deal about it by the very nature of that love. So the one who loves God's Word spends time with it, meditates on it, and comes to know and understand it.\n\nCalvin offers this pointed comment in his commentary on this passage: \"Not contented with a simple affirmation, the prophet exclaims by way of interrogation that he was inflamed with incredible love to the law of God. And then as proof of this, he adds that he was continually engaged in meditating upon it. If any person boasts that he loves the divine law and yet neglects the study of it and applies his mind to other things, he betrays the grossest hypocrisy. For the love of the law, and especially such an ardent love of it as the prophet here expresses, always produces continual meditation upon it.\"\n\nCalvin is right. But I also want to speak to those who may feel burdened by this. There is a common temptation in life to be drawn away from the things we love. If you are here today and you have drifted in your study of God's Word — perhaps your daily reading feels like little more than checking a box — here is an encouragement: take some time this week to return to the passages that have been especially meaningful to you. Think of promises you have clung to in dark moments, passages where God's wisdom breathed life into your situation, words that rebuked you and kept you from falling. Remember how God's Word has been sweet to you. I pray that in doing so, your hearts would be rekindled with love for God's law, and that you would be able to proclaim with the Psalmist: \"Oh, how I love your law! It is my meditation all the day.\"\n\n## Understanding Leads to Obedience\n\nThe man who truly understands God's Word, we see in this Psalm, is also a man who obeys it. Understanding and obedience are interlaced throughout the passage:\n\n- Verse 100: \"I keep your precepts.\"\n- Verse 101: \"I have restrained my feet from every evil way, **that I may keep your word.**\"\n- Verse 102: \"I have not departed from your judgments.\"\n- Verse 104: \"Through your precepts I get understanding; therefore **I hate every false way.**\"\n\nThis is a natural connection for the Psalmist. But I think there is something that can seem jarring at first reading — something that struck me not just on the first reading, but on the fifth or tenth. The Psalmist appears, at first glance, to be an arrogant man. He claims to be wiser than his enemies (verse 98), wiser than his teachers (verse 99), and wiser even than the ancients (verse 100). And on top of that, verses 99 through 102 all begin with \"I, I, I, I.\" Is this an example of what not to be, smuggled into the middle of this glorious song?\n\nI think the context absolutely requires the opposite conclusion. The whole of Psalm 119 is a portrait of a righteous man who loves God's law and walks in his ways. This is not arrogance. So what is really going on?\n\nFirst, this man **acknowledges that he is under God's law.** Every single verse in this passage makes some reference to God's Word. And this is the essence of humility — to recognize oneself as being under God's Word and authority. C. S. Lewis captures the opposite perfectly in *The Magician's Nephew*, when Uncle Andrew explains why rules do not apply to him: \"Men like me who possess hidden wisdom are freed from common rules.\" And Jadis later echoes this with even fewer words: \"What would be wrong for you or for any of the common people is not wrong for the great queen such as I.\" That is not the Psalmist. The Psalmist is quite the opposite — a man who recognizes that he stands under God's law.\n\nSecond, this man **acknowledges God as the source of all his understanding.** Though he claims to be wiser than his enemies, his teachers, and his elders, he claims none of that credit for himself. In verse 98 he says, \"**You**, through your commandments, make me wiser.\" In verse 102, \"**You yourself** have taught me.\" All the \"I\" talk ultimately points not to himself but back to the God who has done such a wondrous work in his life. The apostle Paul demonstrates the same kind of humility — listing his achievements in Philippians 3, yet counting them all as loss for the sake of knowing Christ; saying \"Imitate me\" in 1 Corinthians 11:1, not to boast but to point others toward Christ.\n\n## Obedience Leads to Greater Love\n\nThe cycle completes itself in verse 104. We begin with \"Oh, how I **love** your law\" (verse 97) and end with \"Therefore I **hate** every false way\" (verse 104). Hatred of what is false is the flip side of love for what is true — if you truly love something, you will naturally hate what opposes it.\n\nAnd what comes right before that expression of hating all false ways? \"Through your precepts I get understanding.\" Understanding leads to obedience, and obedience — as one experiences the goodness of God's ways — leads to a greater love.\n\nI had a mentor, early in my Christian life, who told me that the Christian walk gets harder and harder with time. I remember being devastated by that statement, because things were already quite rough for me. I do not think he was entirely wrong — there is increased responsibility and increased trials as we grow in maturity. But I think he also missed something serious. Because as time goes on, we experience more of God's goodness, more of his faithfulness, more of the wonder of his ways. And the more we experience his faithfulness, the easier — in at least one sense — things become. It becomes harder and harder to imagine living life any other way.\n\nI hope we can all relate to some aspect of this cycle — of God's love growing in our hearts because we have seen and experienced the goodness of his ways.\n\n## Conclusion\n\nIf this has been discouraging — if you cannot relate to the Psalmist right now, if your love for God's law is not where it should be — please do not stay away from God's Word. Attend to it, whether you feel it or not. There are seasons in the Christian life. And pray. Ask the Holy Spirit to work in your heart in the way described here. Jesus says in Luke 11 to ask, seek, and knock — and he tells us to ask especially for the Holy Spirit. God is faithful. His Spirit will work in you.\n\nMy prayer for all of us today is that we, like the Psalmist, would be able to proudly and joyfully proclaim: \"Oh, how I love your law!\" — and that this love would bear its fruit: understanding, obedience, and a deeper love still."};
