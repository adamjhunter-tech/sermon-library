<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-giving-as-the-essence-of-motherhood", "title": "Giving as the Essence of Motherhood", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["Giving as the Essence of Motherhood - Pastor Tito Lyro - Acts 20_32-38.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/giving-as-the-essence-of-motherhood-pastor-tito-lyro-acts-2032-38", "tags": [{"tag": "motherhood", "source": "detected"}, {"tag": "generosity", "source": "detected"}, {"tag": "service", "source": "detected"}, {"tag": "grace", "source": "detected"}, {"tag": "parenting", "source": "detected"}, {"tag": "gospel", "source": "detected"}], "scripture_references": [{"reference": "Acts 20:32-38", "type": "quoted", "source": "detected"}, {"reference": "Acts 20:20-21", "type": "referenced", "source": "detected"}, {"reference": "Acts 20:25", "type": "quoted", "source": "detected"}, {"reference": "Philippians 3:7-11", "type": "quoted", "source": "detected"}, {"reference": "Revelation 22", "type": "referenced", "source": "detected"}, {"reference": "Genesis 32", "type": "referenced", "source": "detected"}, {"reference": "Deuteronomy 6", "type": "referenced", "source": "detected"}, {"reference": "Acts 20:27", "type": "quoted", "source": "detected"}, {"reference": "Acts 20:36", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Full Spectrum of Motherhood", "subpoints": ["This Mother’s Day passage is Paul’s farewell address to the Ephesian elders—the only Acts sermon addressed to believers", "Amy Young’s blog post recognizes every category of motherhood: birth mothers, those who lost children, infertile women, foster mothers, spiritual mothers, grieving mothers, and more", "Every one of these categories is represented in this congregation", "The overarching lens: “It is more blessed to give than to receive” (Acts 20:35, quoting Jesus)"], "scripture": ["Acts 20:32-38"]}, {"title": "Paul’s Benediction: Serving Is the Blessing", "subpoints": ["Paul commends the Ephesian elders to God and to the Word of His grace (Acts 20:32)", "He believed he was going to die and chose to focus on giving, not receiving", "The blessing in verse 32 includes the calling to serve—service itself is a gift from God", "The essence of motherhood is serving and giving; babies demand everything and give nothing back initially"], "scripture": ["Acts 20:32", "Acts 20:35"]}, {"title": "Serving as Blessing: Theology of Christian Giving", "subpoints": ["We tend to think serving leads to blessing, but Paul frames service as the blessing itself", "This reframes every hard moment of parenting as a blessing from the Lord to be received, not merely endured", "Serving others is a characteristic of eternity: Revelation 22 describes heaven as serving Christ forever", "To find serving natural, you must know the grace of God—putting others first is not natural for the sinful heart"], "scripture": ["Revelation 22", "Acts 20:33-35"]}, {"title": "The Grace That Frees Mothers to Give", "subpoints": ["The Word of His grace builds us up and gives us an inheritance (Acts 20:32)", "Serving others is not natural—our sinful nature is self-focused from conception", "Mothers who find their worth in their children’s behavior and achievement will be miserable", "A mother’s worth is in Jesus Christ alone—He is the one who redeemed her"], "scripture": ["Acts 20:32", "Philippians 3:7-11"]}, {"title": "Practical Exhortations to Mothers (and All Christians)", "subpoints": ["Be more in love with Jesus than with your children", "Want your children to believe: no such thing as hands-off parenting when it comes to faith", "Rely on the grace of God by being on your knees—intercede like Jacob (Genesis 32) for your children", "Make both the little moments and the big moments about the grace of God (Acts 20:20)", "Do the hard work of speaking what is profitable to your children—the whole counsel of God (Acts 20:27)"], "scripture": ["Acts 20:20", "Acts 20:27", "Genesis 32"]}, {"title": "A Word to the Children", "subpoints": ["Children must not make themselves the center of their mother’s life", "Your parents had a family before you came and will have one after you leave", "Making your mother’s life about you is an act of selfishness that undermines her Christ-centered calling", "The greatest thing you can do is honor her Christ-centered vision for your family"], "scripture": []}], "summary": "In this Mother's Day sermon, Pastor Tito Lyro opens an unusual text: Paul's farewell address to the Ephesian elders on the beach at Miletus, the only sermon in Acts addressed to believers (Acts 20:32-38). He begins by reading Amy Young's extended blog post recognizing the full spectrum of motherhood—birth mothers, those who have lost children, infertile women, foster and spiritual mothers, those with estranged children, and more—and observes that every one of those categories is represented in this congregation. The passage applies not just to biological mothers but to every Christian, because the central principle—that it is more blessed to give than to receive—describes the essence of all Christian service.\n\nThe sermon's theological center is Paul's unusual framing in verse 32: the benediction he pronounces over the elders includes the call to serve. Service is not merely a means to receive blessing; service itself is the blessing. This reframes every demanding season of parenting—sleepless nights, endless diapers, countless discipline moments—as gifts from the Lord to be received, not just hardships to be endured. The pastor notes that Revelation 22 describes eternity as serving Christ forever, so those who dislike serving now may not enjoy heaven either.\n\nThe sermon is frank about the grace required: putting others before ourselves is not natural for sinful people. Our default is to see other people, including our children, as means for getting what we want. When parents measure their worth by how their children perform, they will be miserable when the children fail and only conditionally joyful when they succeed. A mother's worth is in Jesus Christ alone—not in her children's behavior or achievement. Drawing on Philippians 3:7-11, the pastor argues that the mother most consumed with Christ rather than her children will paradoxically be the best mother.\n\nThe sermon closes with five practical exhortations: love Jesus more than your children; actively want them to believe the gospel (there is no hands-off parenting in matters of faith); intercede for them persistently in prayer like Jacob wrestling with God; make the ten thousand little moments of daily life about the grace of God; and speak hard but necessary truths to your children, not crowding out that time with sports and activities. A direct challenge is issued to the children in the room: do not dare to make yourselves the center of your mother's life.", "transcript": "## Scripture Reading: Acts 20:32-38\n\nIf you're able, you remain standing. We're going to be reading out of Acts chapter 20. We're going to read verses 32 through 38.\n\n*So now, brethren, I commend you to God and to the word of His grace, which is able to build you up and give you an inheritance among all those who are sanctified. I have coveted no one's silver or gold or apparel. Yes, you yourselves know that these hands have provided for my necessities and for those who were with me. I have shown you in every way, by laboring like this, that you must support the weak. And remember the words of the Lord Jesus, that He said, \"It is more blessed to give than to receive.\" And when he had said these things, he knelt down and prayed with them all. Then they all wept freely and fell on Paul's neck and kissed him, sorrowing most of all for the words which he spoke that they would see his face no more. And they accompanied him to the ship.*\n\nThis is the word of our Lord. Let us pray together.\n\n*Glorious God, we pray that He will speak to us this morning. Open our eyes for us to see glorious things concerning You. We're asking in Jesus' name. Amen.*\n\nPlease be seated.\n\n## Introduction: An Unusual Mother's Day Text\n\nWe have a Mother's Day sermon from a passage that is primarily addressed to elders. Paul is addressing the elders from the nearby church in Ephesus. He's on the way to Jerusalem and firmly believes that he is on the way to die. He wants to talk to the Ephesian elders one more time—this is the church he spent the most time with in his adult Christian life. He doesn't want to go into town because he fears that if he does, they'll try to keep him from continuing his journey to Jerusalem. He invites them to come to Miletus, a coastal city, to talk with them. We have this picture of Paul addressing the Ephesian elders on this beach as he thinks he's going to die as a result of going to Jerusalem.\n\nIf you stop for a moment, you see that it is not that strange of a text for a Mother's Day sermon. This is the only sermon in the book of Acts in which Paul is preaching to believers. Every other sermon in Acts, he's preaching to unbelievers. In this one, he's specifically addressing the church of the Lord Jesus Christ.\n\n## The Full Spectrum of Motherhood\n\nA few years ago, someone posted a blog post by a woman called Amy Young regarding Mother's Day. Amy Young is not a mother. And in that entry, she made a helpful suggestion to pastors. She encourages us to recognize the whole spectrum of motherhood. This is what she says—I want to read it because it will be the lens through which we develop the rest of our time here:\n\n\"To those who gave birth this year to their first child, we celebrate you. To those who lost a child this year, we mourn with you. To those who are in the trenches with little ones every day and wear the badge of food stains, we appreciate you. To those who experienced loss through miscarriage, failed adoptions or running away, we mourn with you. To those who walk the hard path of infertility, fraught with pokes and prods and tears and disappointment, we walk with you. Forgive us when we say foolish things—we don't mean to make this harder than it is. To those who are foster moms, mentor moms, and spiritual moms, we need you. To those who have warm and close relationships with your children, we celebrate with you. To those who have disappointment, heartache and distance with your children, we sit with you. To those who lost their mothers this year, we grieve with you. To those who experienced abuse at the hands of your own mother, we acknowledge your experience. To those who lived through driving tests, medical tests, and the overall testing of motherhood, we are better for having you in our midst. To those who are single and long to be married and mother your own children, we are thankful for you. To those who are step-parents, we walk with you on these complex paths. To those who envisioned lavishing love on grandchildren, yet that dream is not to be—we grieve with you. To those who have emptiness in the upcoming year, we grieve and rejoice with you. To those who placed children up for adoption, we commend you for your selflessness, and we remember how you hold that child in your heart. And to those who are pregnant with new life, both expected and surprising, we anticipate with you.\"\n\nShe concludes by saying: \"This Mother's Day, we walk with you. Mothering is not for the faint of heart, and we have real warriors in our midst.\"\n\nWhy read this long introduction? Because I don't think we realize that in this small congregation we have examples of every one of these categories. We forget the spectrum of motherhood.\n\n## \"It Is More Blessed to Give Than to Receive\"\n\nAs we think of all these kinds of mothers, I want to focus on verse 35 of Acts 20, where Paul quotes the Lord Jesus and says, \"It is more blessed to give than to receive.\"\n\nAlthough Paul lived for several more years after this encounter with the Ephesian elders, he was confident that this was going to be the last time he was going to see them. He was convinced that he was on his way to die in Jerusalem, and that these words were the last words he was going to speak to them. Look at verse 25: \"And indeed, now I know that you all, among whom I have gone preaching the kingdom of God, will see my face no more.\" And verse 37: \"Then they all wept freely and fell on Paul's neck and kissed him, sorrowing most of all for the words which he spoke that they would see his face no more.\"\n\nThinking that you are going to die tends to sober you up. It tends to make you focus on what is most important. And Paul, thinking that this is the last time he is going to see the closest people to him in his Christian life, says: the Lord tells you it is more blessed to give than to receive.\n\nSo let's think of motherhood—and really of all of Christianity—in those terms. The essence of motherhood is serving, isn't it? It's giving. If you are a parent, remember those early days when the baby comes home from the hospital. All they are is little crying, poopy machines and they do nothing for you. All that you are doing is giving to them and giving to them and giving to them. And as they grow older there is more giving back, but that giving never stops from the side of a mother.\n\nI want you to see that Paul's statement in verse 35 is couched in a blessing in verse 32: \"So now, brethren, I commend you to God and to the word of His grace which is able to build you up and give you an inheritance among all those who are sanctified.\" Paul ends his instructions with a benediction, a blessing. To commend someone is to set before, to place before, in the presence of the Lord and of His grace as described in His Word.\n\n## Serving Is the Blessing\n\nWe tend to think that we serve in order to be blessed—that serving is the means and a blessing will come as a result. But here Paul challenges that way of thinking. He includes serving in the blessing he bestows on the Ephesian elders. He says your blessing is that you're going to serve.\n\nThat's not how we usually think of service. A mother who is giving, a mother who is serving—that in and of itself is a blessing from the Lord, even though in the midst of the diaper years it just doesn't feel like a blessing. But it is what God has given to us to experience Him.\n\nIf we think of our calling in life, including motherhood, as a blessing from the Lord, we will be better equipped to face the harder blessings. If we face the things that God calls us to do, the service we're supposed to give, as a blessing from the Lord, then when those harder blessings come our way we're going to be better able to receive them—the constant diaper changes, the constant sleeplessness. And if you have a little child and you say, \"I cannot wait till my kids grow up so I can sleep at night\"—sorry, Thomas, it's not going to happen.\n\nThe blessing of limited social life because of kids. The blessing of countless discipline moments. I remember one time one of our kids was home with Emily and I was at work, and Emily called me just in tears, desperate, because she had just disciplined that kid 17 times in a row and that child would just not obey. It's difficult to see those things as blessings from the Lord.\n\nCan you imagine the blessing of preparing a child for heaven? That's what this is. When we are training our children—and as I've said before, there is some mystical union between the child's bottom and their heart—the doing in and of itself is a blessing from the Lord. The Lord gives us grace to do that. And as Charles Hodge, the famous Princeton theologian, says: it's such an honor to be entrusted by God with children, to prepare them for heaven. The preparation itself is a blessing.\n\nAs interesting here that Paul encourages us to give, to serve without thought of reward—look at verse 33: \"I have coveted no one's silver or gold or apparel.\" For Paul, the ability to serve was the reward. And serving others is a characteristic of eternity. In Revelation 22, when talking about forever, heaven is described as serving Christ forever. So if you dislike serving now, you're not going to like heaven either—because that's what we're going to be doing forever.\n\n## The Grace That Makes This Possible\n\nHow do we do this? How do you as mothers do this? It must begin with knowing the grace of God. Notice the blessing again in verse 32: \"I commend you to God and to the word of His grace which is able to build you up and give you an inheritance among all those who are sanctified.\" The Word of His grace will build you up and equip you to serve others.\n\nPutting another before ourselves is not natural. It's not something we can do by nature, because we all have a sinful nature. Our natural inclination is to look after ourselves, to see other people—including our kids—as means for us to get what we want. You know that you've never had to teach your kids to be selfish. They know that from conception. The baby in the womb keeps the mother awake by kicking and pushing and making her uncomfortable—they are focused on themselves from the very beginning.\n\nIt's not natural to serve and to think of serving as a blessing. Apart from the grace of God, if that's where we are, we only see our kids as a means for us to get what we want. And if we take that attitude into parenting, life will be great when our kids are doing well. But when they are not doing well, life will be miserable—because that's where we find our worth, our value, and our identity.\n\nMothers, look at me for a moment. Your worth is not in your kids. It's not in their behavior. It's not in their achievements. Your worth is in Jesus Christ your Savior. And that's it. It doesn't matter if they make noise at dinner. It doesn't matter if they drop food everywhere. It doesn't matter if they embarrass you in public. Your worth is in Christ Jesus. He is your Savior. He is the one who brought you up from the miry clay, gave you a new heart, gave you faith, set you upon a rock, and gave you a new song. Your children cannot do that for you. Christ has done that.\n\nThis is only an encouragement to you if you've found the grace of God in Jesus Christ. If you're a mother here without Christ, you're hopeless, and you will try to find your worth in other things, including your kids. But though your kids are great kids, they make lousy gods, and they will not be able to deliver you.\n\nListen to how Paul viewed motherhood—I say this tongue in cheek, because this is how he views all of life. Philippians 3:7-11: \"But what things were gain to me, these I have counted loss for Christ. Yet indeed, I also count all things loss for the excellence of the knowledge of Christ Jesus my Lord, for whom I have suffered the loss of all things, and count them as rubbish, that I may gain Christ and be found in Him, not having my own righteousness, which is from the law, but that which is through faith in Christ, the righteousness which is from God by faith; that I may know Him and the power of His resurrection, and the fellowship of His sufferings, being conformed to His death.\"\n\nDoes that include your kids? Yes. As you are consumed with Christ and His grace instead of your kids, you will actually be a much better mother, because you will be a contented mother. Biblical motherhood is a grace-based giving of oneself—and then pride is gone, because you're not finding your worth in your kids.\n\n## A Word to the Children\n\nNow kids, look up for a moment. Don't you dare make yourself the center of your mother's life. If you do that, you'll be an agent of Satan in your mother's life. Don't you dare. She is not your servant. She is not here to make your life better. As a matter of fact, you're secondary in both your father's and mother's life. There was a family before you came. There will be a family after you leave. Don't dare make their lives about you.\n\n## Five Exhortations to Mothers\n\n**First**, you must be more in love with Jesus than you are with your children. As cute as your children are, they're not going to redeem you. What motivated Paul in his ministry to the Ephesians for three years was the gospel of Jesus Christ, as it says in verse 21.\n\n**Second**, you must want your children to believe. There is no such thing as hands-off parenting when it comes to faith. You must want your children to believe and follow Christ more than you want anything else for them. It doesn't matter if they go to college if they end up in hell. It doesn't matter if they can throw a ball if they end up in hell. It doesn't matter if they speak six languages and yet they don't understand the language of God through Jesus Christ and His Word.\n\n**Third**, rely on the grace of God by being on your knees. Paul ends this passage in verse 36 by kneeling with the Ephesian elders and praying for them. Intercede for your children, no matter what age they are. Some of you, your children are grandparents at this point—they're still your children. Intercede for them. Bring them before the throne of grace where Jesus sits ready to answer your prayers.\n\nBe a Jacob. Remember that incident at Bethel when God showed up to him and Jacob wrestled and said, \"I'm not going to let you go till you bless me.\" That's the sort of praying you need to pray for your children. So when you come before God—is God saying, \"She's here again? She's here all the time!\"—or is God going to say to you, \"It's been a while since you prayed for your children\"?\n\n**Fourth**, make both the little moments and the big moments about the grace of God. Look at verse 20: Paul tells the elders he kept back nothing that was helpful but proclaimed it to them and taught them publicly and from house to house. Paul ministered to the Ephesians in the big moments of the gathered services of the church and in the little moments of people's living rooms.\n\nThe ten thousand little moments of motherhood are moments when the grace of God must be present—changing diapers, running a forgotten assignment to school, helping with homework, crying over broken relationships. Those are the moments, the little moments of life where the grace of God must be present.\n\n**Fifth**, do the hard work of speaking what is profitable to your children. Look at verse 27: \"For I have not shunned to declare to you the whole counsel of God.\" Don't be afraid to say to your children what needs to be said. And don't crowd your life with stuff that is going to keep you from saying what needs to be said. Don't make your life about sports practice, instrument lessons, this lesson and that lesson, to the point where you just don't have any time to talk.\n\nBetter than speaking French is knowing the Lord Jesus Christ. Better than playing the violin is knowing the Lord Jesus Christ. Better than knowing all the emperors of the Roman Empire from Caesar to the last one is knowing the Lord Jesus Christ. Do the hard work of speaking what is profitable to your children.\n\nThe Word of God is powerful. Sharp as a double-edged sword, it will simply open what's in their hearts before their God. God can use that for their salvation.\n\n## Closing\n\nHow thankful we are for the mothers in our church. We're thankful for you. We pray the Lord's richest blessings upon every one of you and that you may find your worth in your Savior, the Lord Jesus Christ.\n\n*Father, thank you for Your Word. We thank You for the clear guidance that it gives us. Enable us to live our lives before You, be useful to You, knowing that it's the blessing to serve. Thank you that You have served us through Jesus Christ. And be blessed to serve You and others. In Jesus' name. Amen.*"};
