window.LESSON_DATA = {"id": "2024-03-29-good-friday-the-king-is-dead", "title": "Good Friday: The King Is Dead", "speaker": "Pastor Tito Lyro", "date": "2024-03-29", "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["03-29-24 - GOOD FRIDAY - The King is Dead - Luke 23_26-46 - Pastor Tito Lyro.txt"], "tags": [{"tag": "Good Friday", "source": "detected"}, {"tag": "crucifixion", "source": "detected"}, {"tag": "atonement", "source": "detected"}, {"tag": "forgiveness", "source": "detected"}, {"tag": "Christology", "source": "detected"}, {"tag": "salvation", "source": "detected"}, {"tag": "judgment", "source": "detected"}], "scripture_references": [{"reference": "Luke 23:26-46", "type": "quoted", "source": "detected"}, {"reference": "2 Corinthians 5:21", "type": "referenced", "source": "detected"}, {"reference": "Romans 16:13", "type": "referenced", "source": "detected"}, {"reference": "Mark 15:21", "type": "referenced", "source": "detected"}], "outline": [{"title": "1. Simon of Cyrene: A Reluctant Witness", "subpoints": ["Luke 23:26 — Simon of Cyrene compelled to carry the cross; Mark 15:21 identifies him as the father of Alexander and Rufus — named because readers would recognize them", "Romans 16:13: Paul greets 'Rufus, chosen in the Lord, and his mother and mine' — the very woman who was Simon's wife apparently became like a mother to Paul; the cross touched one man's family and changed them", "Simon carried the cross reluctantly; but the cross that was imposed on him led to his family's salvation", "The cross transforms the lives of all who come near it, whether they approach it willingly or are brought to it by force of circumstance"], "scripture": ["Luke 23:26", "Mark 15:21", "Romans 16:13"]}, {"title": "2. The Women Lamenting: Mourning Redirected", "subpoints": ["Luke 23:27-31 — a great multitude of women mourning and lamenting; Jesus turns to them", "He does not receive their condolence: 'Daughters of Jerusalem, do not weep for me, but weep for yourselves and for your children'", "He prophecies the desolation of Jerusalem — 'if they do these things in the green wood, what will be done in the dry?' — in the dry wood of 70 AD, far worse will come", "Jesus's concern even on the way to the cross is for others; his own suffering is not his focus"], "scripture": ["Luke 23:27-31"]}, {"title": "3. The Two Criminals: Two Responses to the Cross", "subpoints": ["Luke 23:32-43 — two criminals crucified with Jesus; one joins the crowd in mocking: 'If you are the Christ, save yourself and us'", "The other rebukes: 'Do you not even fear God, seeing you are under the same condemnation? And we indeed justly, for we receive the due reward of our deeds; but this man has done nothing wrong'", "The repentant criminal saw what only Spirit-opened eyes can see: that the man dying beside him was innocent, that he himself deserved his fate, and that this king had a kingdom to offer", "'Lord, remember me when you come into your kingdom' — and Jesus: 'Today you will be with me in Paradise'; deathbed conversion illustrating that salvation is wholly of grace, not of works or time"], "scripture": ["Luke 23:32-43"]}, {"title": "4. The Cry of Dereliction and the Three Hours of Darkness", "subpoints": ["Luke 23:44-46 — from the sixth hour to the ninth hour (noon to 3 PM), darkness covered the whole land", "Jesus bore the eternal wrath of God for his people in those three hours — the separation from the Father was his hell; 2 Corinthians 5:21: 'He made him who knew no sin to be sin for us, that we might become the righteousness of God in him'", "The 'forgive them' of verse 34 — 'Father, forgive them, for they do not know what they do'; 'them' includes us — every person who has ever sinned drove those nails", "At the end, Jesus cried with a loud voice: 'Father, into your hands I commit my spirit' — not a cry of despair but of trust; he surrendered his spirit, it was not taken from him"], "scripture": ["Luke 23:44-46", "2 Corinthians 5:21"]}, {"title": "5. The Veil Torn: Access Opened", "subpoints": ["Luke 23:45 — the veil of the temple was torn in two; the veil separated the holy place from the most holy place, accessible only to the high priest once per year", "The tearing of the veil is God's declaration that the way to his presence is now open — no more temple, no more priest, no more annual sacrifice; only Christ", "W.H. Auden quote: 'I believe in Jesus because he fulfills none of my dreams, because he is in every respect the opposite of what he would be if I could have made him according to my own wishes'; only the real Savior would be like the Jesus of the Bible", "Jesus is not the savior we would have designed — but he is exactly the savior we need"], "scripture": ["Luke 23:45"]}], "summary": "A Good Friday sermon on Luke 23:26-46. Five movements through the crucifixion narrative: (1) Simon of Cyrene — compelled to carry the cross, his family transformed; Mark identifies his sons Alexander and Rufus by name; Romans 16:13 suggests his wife became a spiritual mother to Paul; (2) the lamenting women — Jesus redirects their mourning toward themselves and their children, prophesying Jerusalem's destruction in 70 AD; (3) the two criminals — one mocking, one repenting with Spirit-opened eyes; the repentant thief saw Christ's innocence, his own guilt, and Christ's kingdom, receiving the promise of Paradise; (4) the three hours of darkness and the cry 'Father, forgive them' — Jesus bore the eternal wrath of God in those hours (2 Corinthians 5:21); the 'them' of his forgiveness includes all who have sinned; his final cry is one of trust, not despair; (5) the veil torn — declaring open access to God's presence, forever, through Christ alone. Closes with W.H. Auden's observation that Jesus fulfills none of our self-designed dreams — which is exactly why he is real and sufficient.", "transcript": "## Introduction\n\nGood Friday. The King is dead.\n\nOr so it appeared. Luke 23:26-46.\n\n*And as they led him away, they laid hold of a certain man, Simon, a Cyrenian, who was coming from the country, and on him they laid the cross that he might bear it after Jesus...*\n\nLet us look at this passage in five movements.\n\n## 1. Simon of Cyrene\n\nSimon was coming from the country — he had not planned to be there. He was compelled to carry the cross. The Roman soldiers grabbed a bystander and pressed him into service.\n\nBut Mark adds a detail that Luke leaves out: Mark 15:21 identifies Simon as 'the father of Alexander and Rufus.' Mark names those sons because his readers would recognize them. They were known in the early church.\n\nAnd then, in Romans 16:13, Paul writes: 'Greet Rufus, chosen in the Lord, and his mother and mine.' His mother and mine. Paul is calling this woman — Rufus's mother, Simon's wife — his own mother. Something happened to this family. A man compelled to carry a criminal's cross came home a different man. His family was swept into the kingdom of God. His wife became a spiritual mother to the apostle Paul.\n\nThe cross transforms everyone who comes near it — whether they approach it voluntarily or are brought to it by the force of circumstance.\n\n## 2. The Women Lamenting\n\nA great multitude followed Jesus, including women who were mourning and lamenting. This is remarkable — in a crowd cheering for his death, these women were weeping for him.\n\nJesus turned to them. And what he said might surprise you. He does not receive their sympathy. 'Daughters of Jerusalem, do not weep for me, but weep for yourselves and for your children.'\n\nHe is not focused on his own suffering. He is focused on what is coming for them. The judgment of Jerusalem — 70 AD, less than four decades away. 'If they do these things in the green wood, what will be done in the dry?' In the green wood of Christ's innocent suffering, Rome is already brutal. In the dry wood of a city that has rejected its king, it will be catastrophic.\n\nEven on the way to the cross, Jesus is thinking about others.\n\n## 3. Two Criminals\n\nTwo criminals were crucified with him — one on the right, one on the left.\n\nOne joined the mockery: 'If you are the Christ, save yourself and us.' Save yourself. Save us. Power. Rescue. Deliverance from this cross — that is what the crowd wanted from a messiah.\n\nThe other criminal rebuked him: 'Do you not even fear God, seeing you are under the same condemnation? And we indeed justly, for we receive the due reward of our deeds; but this man has done nothing wrong.' And then: 'Lord, remember me when you come into your kingdom.'\n\nThink about what this man was seeing. Two people could look at the same scene — a man being crucified between two criminals — and see two completely different things. One saw a failed revolutionary. The other, with eyes opened by the Spirit, saw: an innocent man, his own guilt, a king with a coming kingdom, and the only one who could help him.\n\nJesus said: 'Today you will be with me in Paradise.'\n\nThis is the clearest illustration in all of Scripture that salvation is entirely of grace. No works. No time to be baptized. No religious history. A dying man, guilty of his crimes, received the promise of immediate Paradise — because he saw what the Spirit enabled him to see and asked for mercy from the only one who could give it.\n\n## 4. The Three Hours of Darkness\n\nFrom the sixth hour — noon — to the ninth hour — 3 PM — darkness covered the whole land.\n\nWhat was happening in those three hours? The Bible tells us in 2 Corinthians 5:21: *He made him who knew no sin to be sin for us, that we might become the righteousness of God in him.*\n\nJesus was bearing the wrath of God for his people. The darkness was not merely meteorological — it was the darkness of divine judgment falling on the one who stood in our place. The separation from the Father — the cry that comes in Matthew and Mark, *My God, my God, why have you forsaken me?* — that was his hell. He bore it so we would not have to.\n\nAnd yet even in this — earlier in the crucifixion narrative, at the moment of the nails — Jesus prayed: 'Father, forgive them, for they do not know what they do.' Them. The soldiers. The leaders. The crowd. Us. Every person who has ever sinned drove those nails. And Jesus prayed for the forgiveness of all of them.\n\nAt the end of the three hours, he cried with a loud voice — not a weak, expiring whisper but a strong cry: 'Father, into your hands I commit my spirit.' And he breathed his last.\n\nThis was not defeat. His spirit was not taken from him. He surrendered it. He had said earlier: 'No one takes my life from me, but I lay it down of myself' (John 10:18). The King died on his own terms, at his own hour, in fulfillment of his own plan.\n\n## 5. The Veil Torn\n\nAt the moment he breathed his last, the veil of the temple was torn in two — from top to bottom.\n\nThe veil separated the holy place from the most holy place — the place of God's presence on earth. Only the high priest could enter it, once per year, on the Day of Atonement, with the blood of a sacrifice. The veil said: you do not have access. God is holy and you are not.\n\nGod tore it himself. From top to bottom — not from bottom up, as if a human had done it. God tore it. The message: the way to my presence is now open. The sacrifice has been made, once for all. There is no more need for a temple, a priest, or an annual ritual. There is only the Christ who hung on that cross and tore the veil with his death.\n\nW.H. Auden, the poet, wrote something I have never forgotten: 'I believe in Jesus because he fulfills none of my dreams, because he is in every respect the opposite of what he would be if I could have made him according to my own wishes.' The Jesus we would design would be powerful in the ways we want power, victorious in the ways we define victory. The Jesus of the Bible dies a criminal's death and tears the veil with his final breath.\n\nBut Auden's point is this: only the real savior would be like the Jesus of the Bible. A savior we invented would look like us. The savior who is real looks like the cross.\n\nHe is not the savior we would have chosen. He is the savior we need.\n\nFather, on this Good Friday, help us not to look away from the cross. Help us to see it clearly — what it cost, what it accomplished, what it opened. We thank you that the veil is torn, that the way to you is open, and that it is open forever. In the name of the one who tore it, amen.", "soundcloud_url": "https://soundcloud.com/olympiabp/03-29-24-good-friday-the-king-is-dead-luke-23_26-46-pastor-tito-lyro"};
