window.LESSON_DATA = {"id": "undated-receiving-the-word", "title": "Receiving the Word", "speaker": "Dr. John Battle", "date": null, "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["Receiving the Word - 1 Thessalonians 2_9-20 - Dr. John Battle.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/receiving-the-word-1-thessalonians-29-20-dr-john-battle", "tags": [{"tag": "Word of God", "source": "detected"}, {"tag": "authority of Scripture", "source": "detected"}, {"tag": "election", "source": "detected"}, {"tag": "thanksgiving", "source": "detected"}, {"tag": "perseverance", "source": "detected"}, {"tag": "gospel ministry", "source": "detected"}, {"tag": "faith", "source": "detected"}, {"tag": "submission", "source": "detected"}], "scripture_references": [{"reference": "1 Thessalonians 2:9-20", "source": "ai"}, {"reference": "1 Thessalonians 1:2", "source": "ai"}, {"reference": "1 Thessalonians 2:13", "source": "ai"}, {"reference": "John 15:3", "source": "ai"}], "outline": [{"title": "I. Introduction: Paul's Thanksgiving for the Thessalonians", "subpoints": ["Paul looks back with gratitude on his ministry in Thessalonica", "In verses 13-19 he shifts from what Paul did to how the Thessalonians received him", "The emphatic 'for this reason' signals the importance of what follows"], "scripture": ["1 Thessalonians 2:13", "1 Thessalonians 1:2"]}, {"title": "II. They Received the Word Officially and Responsibly", "subpoints": ["The Greek word for 'received' implies official acceptance and personal responsibility", "Like a guard accepting custody of a prisoner, they took ownership of the word", "This reception is a mark of their election by God"], "scripture": ["1 Thessalonians 2:13"]}, {"title": "III. The Word Came to Them at Great Cost", "subpoints": ["The phrase 'which you heard from us' contains Paul's years of labor, risk, and suffering", "Historical example: Benjamin Franklin's ancestors reading a hidden English Bible under Queen Mary", "Receiving the Bible was once an act of great courage and risk"], "scripture": []}, {"title": "IV. They Received the Word with Submission", "subpoints": ["They 'welcomed' the word — a word implying active submission", "Like submitting to a medical procedure, they let the word enter and take effect", "Submission to Scripture means accepting it without resistance"], "scripture": ["1 Thessalonians 2:13"]}, {"title": "V. They Received the Word with Assurance", "subpoints": ["They recognized it not as the word of men but as the word of God", "The word of God effectually works in those who believe", "Scripture purifies and produces spiritual fruit in those who receive it"], "scripture": ["1 Thessalonians 2:13"]}, {"title": "VI. Application: Receive the Word as the Thessalonians Did", "subpoints": ["Receive the word with labor, diligence, and assurance", "Give thanks that God has given us His word and that it works in us", "Labor to bring the word to others as Paul did"], "scripture": []}], "summary": "Dr. John Battle expounds 1 Thessalonians 2:13, examining how the Thessalonian believers received the word of God when Paul brought it to them. He focuses on the emphatic construction 'for this reason'—which Paul uses to arrest attention before explaining that his thanksgiving is specifically because they received the gospel not as a human message but as the very word of God. The Greek word for 'received' carries the sense of official acceptance with personal responsibility, like a guard taking legal custody of a prisoner, and their reception of the word is itself evidence of their divine election.\n\nDr. Battle enriches the exposition with a striking historical illustration from Benjamin Franklin's autobiography, in which Franklin's Puritan ancestors under the reign of Queen Mary hid an English Bible under a joint stool—kept open with leather straps—so the father could read it to the family while a child stood watch at the door. This underscores the cost and courage that once accompanied the reception of God's word. Paul's own labor in bringing the gospel to Thessalonica is similarly costly. The sermon closes with the three-fold challenge to receive Scripture with submission (welcoming it in without resistance), with assurance (trusting it as truly God's word), and with labor (working diligently to bring it to others as Paul did).", "transcript": "## Introduction\n\nSo this afternoon we're having Dr. Battle come back again and let's turn again to first Thessalonians 2. And we'll look at verses 9 through 20. First Thessalonians 2. Verses 9 through 20.\n\nFor you remember, brethren, our labor and toil. For laboring night and day that we might not be a burden to any of you. We preached to you the gospel of God. You are witnesses and God also how devoutly and justly and blamelessly we behaved ourselves among you who believe as you know how we exhorted and comforted and charged every one of you as a father does his own children. That you would walk worthy of God who called you into his own kingdom and glory. For this reason we also thank God without ceasing. Because when you received the word of God, which you heard from us, you welcomed it, not as the word of men, but as it is in truth, the word of God, which also effectively works in you who believe. For you, brethren, became imitators of the churches of God, which are in Judea, in Christ Jesus. For you also suffered the same things from your own countrymen, just as they did from the Judeans, who killed both the Lord Jesus and their own prophets and have persecuted us. And they do not please God and are contrary to all men. Forbidding us to speak to the Gentiles that they may be saved. So as always to fill up the measure of their sins, but wrath has come upon them to the uttermost. But we, brethren, having been taken away from you for a short time in presence, not in heart, endeavored more eagerly to see your face with great desire. Therefore, we wanted to come to you, even I Paul, time and again, but Satan hindered us. For what is our hope, or joy, or crown of rejoicing? Is it not even you in the presence of our Lord Jesus Christ at His coming? For you are our glory and joy.\n\nWe are blessed to the reading of His word. We look forward to Dr. Battle's message. Thank you, brother Scott. It's a pleasure to be back with you. Much more relaxed atmosphere this afternoon than this morning.\n\n## The Focus of This Afternoon's Message\n\nThis afternoon, I'd like for us to continue looking at this chapter in First Thessalonians, and especially noting verse 13, which I'll read again to you. For this reason, we also thank God without ceasing because when you received the word of God, which you heard from us, you welcomed it, not as the word of men, but as it is in truth, the word of God, which also effectually, effectively, works in you who believe.\n\nPaul talks here about how they received the word of God. We saw this morning that the apostle Paul can look back with thanksgiving at his ministry when he was there with them in Thessalonica for those brief few weeks. He said that when he was there, he ministered in a way that was glorifying to the Lord and a benefit to the people. Now in the next section of verses, he wants to remind them of how they received him — how they recognized God's gift to them in the ministry of Paul and in the gospel which he brought them.\n\nSo he wants them to look back and remember not just what Paul did, but what they did — what happened when they received him. And in these verses starting at verse 13, down through verse 19, the apostle is emphasizing their reaction to Paul's ministry.\n\n## \"For This Reason\" — An Emphatic Construction\n\nHe begins this section in verse 13 with his expression: For this reason, we also thank God without ceasing. And if you look back to First Thessalonians chapter 1, right at the very beginning, verse 2: We give thanks to God always for you all. And the terminology in verse 2 is almost identical to the terminology here in chapter 2 verse 13.\n\nIn verse 1:2, the first time that phrase is used, he gives thanks that they were chosen by God. Now here in 2:13, he says, for this reason, we give thanks. And the actual reason is given later in the verse — because when you received the word.\n\nThe word \"this\" in the New Testament normally describes something that's already been mentioned. But sometimes the word \"this\" is used and then they tell you what \"this\" is after using the word — and that's emphatic. The closest thing I can think of is what they do in the Navy when you're on shipboard: \"Now hear this, now hear this.\" What? He didn't say what it was. He just says \"hear this\" and you say, well, what? Well, he hasn't said it yet. Well, then why is he saying \"now hear this\"? It's to get your attention. It emphasizes the importance of what's going to follow.\n\nAnd that's how the word \"this\" is used in these passages when the word \"this\" is used and then it tells you what \"this\" is. He says, for this reason — and your natural reaction should be, what reason? Well, now I'm all ears. And the answer is because when you received the word of God which you heard from us, you welcomed it not as the word of men, but as it is in truth the word of God.\n\n## What It Means to \"Receive\" the Word\n\nI want to point out the word \"received.\" This is one of the very important words in the New Testament. It's not just to take something, but it's to receive it officially. It's used for prisoners. If you're a guard in the prison and here comes this other guard with a prisoner — he has this clipboard and he says, okay, here's prisoner XYZ. You sign there. Now he's your prisoner and if he escapes, it's your fault. So you're responsible. That's receiving.\n\nAnd that's the same word that's used here — you received the word of God. You accepted it officially. It is now yours. You possessed it; you took responsibility for following it. You received that word from us. And that's the thing that really shows their election.\n\n## The Word Came at Great Cost\n\nHe says, because you received the word of God which you heard from us. That little expression \"which you heard from us\" contains a lot of things in it. You have to look in the book of Acts to see how Paul got to Thessalonica. It wasn't just a casual thing. Paul dedicated his life — and so did the other men with him — to take the word to them. That word was a precious commodity. It took effort, risk, hardship, suffering, patience, and endurance.\n\nI remember reading a section from the autobiography of Benjamin Franklin. Benjamin Franklin was not especially a Christian man — he was more of a deist. But in his autobiography he tells about his family background. He says, speaking about his ancestors in England: \"This obscure family of ours was early in the Reformation... and continued Protestants through the reign of Queen Mary.\" Mary was the Queen of England in the 1550s, known as Bloody Mary, because almost 300 Protestants were burned at the stake in her short reign.\n\nHe says they were sometimes in danger of trouble on account of their zeal against Popery. They had got an English Bible — and of course under Queen Mary the English Bible was illegal. It says they had got an English Bible and they concealed it and secured it. It was fastened open with tapes under and within the cover of a joint stool. When my great-great-grandfather read it to his family, he turned up the joint stool upon his knees, turning over the leaves then under the tapes. One of the children stood at the door to give notice if he saw the apparitor approaching.\n\nWow — reading the Bible used to be quite a thing. And if you received the Bible it was an important decision and a risky one. And that's how it was in Thessalonica.\n\n## Receiving the Word with Submission and Assurance\n\nThey received it with submission. As he says, they submitted to the Scriptures in verse 13 — you welcomed it. Not as the word of man, but as it is in truth, the word of God. You submitted to the Scriptures. You go to the doctor's office — I got my flu shot yesterday and I had to hold my arm up. I had to submit to that. And to submit to the Scriptures means you just let it come into you. You accepted and received it.\n\nAnd then finally, you received it with assurance. You welcomed it not as the word of man, but as it is in truth the word of God, which also effectively works in you who believe. You trusted it for its truth and for its power. It works effectively in you. When you read and study and memorize the Scriptures, it produces spiritual fruit in you. As Jesus said, now you are pure through the word that I have spoken to you. It purifies us. It cleanses us. It makes us more spiritually minded toward the Lord.\n\n## Conclusion\n\nAs we receive the word of God, we should be like these Thessalonians. We receive it with labor and diligence — labor in those who bring it to us, and labor in receiving it. We receive it with assurance. We know it's God's word. It bears witness in our hearts as we read it. We don't fight against it. We receive it with submission.\n\nAnd when we see that happening, we can then give thanks. Give thanks to God that He's given us His word. Give thanks to God that we have received it and that it is working within us. And then like Paul and his fellow companions, we should labor to see that others receive the word.\n\nI really like our name — the Bible Presbyterian Church. Bible — it's the important one. So thank God that we've received His word and may we continue to live upon it.\n\nLet us pray. Our Father we give thanks for the privilege we have to receive the word. And we think of these people in Thessalonica that had never heard the gospel and here comes Paul for three weeks and brings them this message and your Holy Spirit worked in their hearts because they had been chosen by God and they received this word and rejoiced in it and submitted to it. Lord, we just thank you for that wonderful evidence of your grace in saving souls. And Lord, we pray that that same grace would work in us that we would receive your word and that we would then take it to others so that your people all over may receive it as well. In Christ's name we pray. Amen."};
