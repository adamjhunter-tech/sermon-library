window.LESSON_DATA = {"id": "2024-02-11-jesus-is-the-i-am", "title": "Jesus Is the I AM", "speaker": "Elder Scott Hollander", "date": "2024-02-11", "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["02-11-24 -AM- Jesus is the I AM - John 8_12-30 - Elder Scott Hollander.txt"], "tags": [{"tag": "deity of Christ", "source": "detected"}, {"tag": "attributes of God", "source": "detected"}, {"tag": "typology", "source": "detected"}], "scripture_references": [{"reference": "John 8:12-59", "type": "quoted", "source": "detected"}, {"reference": "John 8:12", "type": "quoted", "source": "detected"}, {"reference": "John 8:24", "type": "quoted", "source": "detected"}, {"reference": "John 8:28", "type": "quoted", "source": "detected"}, {"reference": "John 8:58", "type": "quoted", "source": "detected"}, {"reference": "Exodus 3:14", "type": "referenced", "source": "detected"}, {"reference": "Isaiah 43:10-11", "type": "quoted", "source": "detected"}, {"reference": "Isaiah 49:6", "type": "referenced", "source": "detected"}, {"reference": "Isaiah 60:19-20", "type": "referenced", "source": "detected"}, {"reference": "John 3:17", "type": "referenced", "source": "detected"}, {"reference": "Daniel 7", "type": "referenced", "source": "detected"}, {"reference": "Psalm 27:1", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Seven I AM Statements of Jesus in John", "subpoints": ["The seven I AM statements (John 6, 8, 10, 11, 14, 15) are titles and metaphors for how Jesus relates to His covenantal people", "In addition, John 8 contains three (or four) I AM statements where Jesus declares His deity directly", "Context: Feast of Tabernacles, temple courts — Jewish leadership increasingly hostile"], "scripture": ["John 8:12-59"]}, {"title": "1. I Am the Light of the World (John 8:12)", "subpoints": ["Setting: court of women at the Feast of Tabernacles, where large lamps were lit each night and men danced with torches", "OT allusions: pillar of fire (Exod. 13-14), Word as lamp (Ps. 119:105), Isaiah 49:6 (Messianic servant as light to the Gentiles), Isaiah 60:19-20 (Yahweh as everlasting light)", "The Pharisees objected: His testimony is that of only one witness — they missed the deeper claim", "Light is its own witness — it testifies simply by shining", "Jesus's divine testimony is sufficient — He is from above; they are from below"], "scripture": ["John 8:12", "Isaiah 49:6", "Isaiah 60:19-20"]}, {"title": "2. I Am the Testifying One (John 8:18) — The Subtle Fifth I AM", "subpoints": ["In asserting 'I am the one who testifies about Myself,' Jesus declares His own divine witness", "He has two witnesses: Himself and the Father — greater than the two required by the law", "The Pharisees did not know who Jesus was, or who His Father was — without accepting the divine revelation of Jesus, one cannot know the Father"], "scripture": ["John 8:18"]}, {"title": "3. Without Belief That Jesus Is Yahweh, You Will Die in Your Sins (John 8:24)", "subpoints": ["'For if you do not believe that I am, you will die in your sins' — no predicate follows 'I am'", "In Hebrew/Aramaic, Jesus likely said 'ehyeh' — the Exodus 3:14 self-designation of Yahweh", "Isaiah 43:10-11: 'You are My witnesses... that you may know and believe Me and understand that I am. Before Me there was no God formed, nor shall there be after Me'", "The Jews heard Jesus say 'I am' with no predicate and demanded: 'I am — what? Who are you?' — willful ignorance (Isaiah 6:9-10)"], "scripture": ["John 8:24", "Exodus 3:14", "Isaiah 43:10-11"]}, {"title": "4. The Crucifixion Will Validate the Deity of Jesus (John 8:28)", "subpoints": ["'When you lift up the Son of Man, then you will know that I am' — no predicate", "Three assertions: (1) He is the Son of Man (deity and humanity, from Daniel 7); (2) He does only what the Father commands; (3) He is I AM", "The Heidelberg Catechism: our Mediator must be true man (to pay what man owes) and true God (to bear the full weight of God's wrath in His humanity)", "God the Father validated Christ's acceptable work by raising Him from the dead", "Many appeared to believe (v.30) but subsequent dialogue reveals false, shallow faith"], "scripture": ["John 8:28", "Daniel 7"]}, {"title": "5. Jesus Is the Eternal God, Yahweh (John 8:58)", "subpoints": ["'Before Abraham was, I am' — not 'I was' but 'I am' — asserting eternal, timeless existence", "At this the Jews took up stones: they now understood exactly what He was claiming", "This is the climactic declaration of the entire chapter — and the Jews' response proved they understood it as a claim to deity"], "scripture": ["John 8:58"]}, {"title": "Application", "subpoints": ["The question is: how will you respond to Jesus's claims?", "He is Yahweh; there is no other God beside Him; there is salvation in no other", "He lived the life we could not live; He died the death we could not die — believe in Him and walk in His light"], "scripture": []}], "summary": "Elder Scott Hollander preaches through the four I AM statements of Jesus in John 8 (plus a subtle fifth), demonstrating that Jesus is explicitly claiming to be Yahweh — the eternal self-existent God of the Old Testament. Moving from 'I am the light of the world' (v.12) through the absolute I AM declarations (vv.24, 28, 58), he establishes each claim against its Old Testament background, paying particular attention to the Greek and Hebrew of Exodus 3 and Isaiah 43, and to the Heidelberg Catechism's articulation of why the Mediator must be both truly man and truly God. The climax is John 8:58 — 'Before Abraham was, I am' — which caused the Jews to take up stones immediately.", "transcript": "## Introduction: The I AM Statements of John\n\nThe book of John contains seven I AM statements — familiar titles by which Jesus describes how He relates to His covenantal people:\n\n1. **John 6**: I am the bread of life\n2. **John 8:12**: I am the light of the world\n3. **John 10**: I am the door / I am the good shepherd\n4. **John 11**: I am the resurrection and the life\n5. **John 14**: I am the way, the truth, and the life\n6. **John 15**: I am the true vine\n\nIn addition to these seven, there are three (possibly four) I AM statements in John 8 where Jesus is not using a metaphor to describe His ministry — He is directly declaring His deity. This morning we will consider all four of the I AM statements in John 8.\n\nThe context is the Feast of Tabernacles. Jesus has been teaching in the temple courts. The chief priests, the Pharisees, and various Jewish factions are present — some drawn to Jesus, others violently opposed.\n\n## 1. I Am the Light of the World (John 8:12)\n\n> \"Then Jesus spoke to them again, saying, 'I am the light of the world. He who follows Me shall not walk in darkness, but have the light of life.'\" (John 8:12)\n\nJesus was likely teaching in the court of women, where during the Feast of Tabernacles four large lamps were lit each night. Men would dance through the night carrying torches; the Levitical orchestra played. In the darkness after those lights had gone out — or perhaps with them still burning — Jesus says: *I am the light of the world.*\n\nThis declaration is steeped in Old Testament allusions. The pillar of fire that led Israel (Exodus 13-14). God's Word as a lamp and a light (Ps. 119:105). Daniel 2:22: *the light dwells with Him.* Isaiah 49:6 — the Messianic servant as *a light to the Gentiles.* Isaiah 60:19-20: *The Lord will be to you an everlasting light... Your sun shall no longer go down, nor shall your moon withdraw itself; for the Lord will be your everlasting light.*\n\nThe Pharisees dismissed the claim: His testimony is that of a single witness. They missed the deeper point. Light is its own witness — it needs only to shine to testify of itself. Jesus's divine testimony is sufficient. He is from above; they are from below. They do not know where He comes from or where He is going.\n\n## 2. I Am the Testifying One (John 8:18)\n\nThis is the subtler fifth I AM statement. In verse 18, Jesus declares: *I am the one who testifies of Myself.* Rather than a metaphor for His ministry, this is an assertion of divine self-testimony.\n\nHe has two witnesses: Himself and the Father who sent Him. The law required two witnesses; His two are divine — a greater attestation than any human testimony.\n\nThe Pharisees asked where His Father was. Jesus replied: they know neither Him nor His Father. Without accepting the divine revelation of Jesus, one cannot know the Father.\n\n## 3. Without Belief That Jesus Is Yahweh, You Will Die in Your Sins (John 8:24)\n\n> \"Therefore I said to you that you will die in your sins; for if you do not believe that I am He, you will die in your sins.\" (John 8:24)\n\nThe New King James adds the predicate *He* — but it is not there in the Greek. A more accurate translation: *For if you do not believe that I am, you will die in your sins.*\n\nThis is not an accidental omission. In the two preceding statements, Jesus supplied a predicate: *I am the light* (v.12); *I am the testifying one* (v.18). Here He gives none.\n\nJesus was likely speaking in Aramaic or Hebrew — and in Hebrew He would have said *ehyeh*, the word God used in Exodus 3:14: *I AM WHO I AM... say to the children of Israel, I AM has sent me to you.* Isaiah 43:10-11 uses the same form: *You are My witnesses, says Yahweh... that you may know and believe Me and understand that I am. Before Me there was no God formed, nor shall there be after Me. I, even I, am Yahweh, and besides Me there is no Savior.*\n\nThe Jews heard *I am* with no predicate and demanded: *Who are you?* — as if He had forgotten to finish the sentence. This was willful ignorance, exactly as Isaiah 6:9-10 prophesied: *Make the heart of this people dull, and their ears heavy, and shut their eyes.*\n\n## 4. The Crucifixion Will Validate the Deity of Jesus (John 8:28)\n\n> \"Then Jesus said to them, 'When you lift up the Son of Man, then you will know that I am He, and that I do nothing of Myself; but as My Father taught Me, I speak these things.'\" (John 8:28)\n\nThree things Jesus asserts:\n\nFirst: He is the **Son of Man** — a title of both deity and humanity from Daniel 7. As Son of Man, He is of the full essence of what makes a man. As Son of God, He is of the full essence of what God is.\n\nSecond: He does only what the Father commands. He will fulfill all righteousness (Matthew 3:15). The Heidelberg Catechism questions 14-17 clarify why this matters: our Mediator must be true man, because God will not punish any other creature for what a human is guilty of. And He must be righteous, because a sinful human cannot pay for others. And He must be true God, so that His humanity can bear the weight of God's wrath and earn for us righteousness and life.\n\nThird: He is *I am* — the climax of the verse. No predicate. *When you lift up the Son of Man, then you will know that I am.* God the Father validated this work by raising Him from the dead.\n\n## 5. Jesus Is the Eternal God, Yahweh (John 8:58)\n\n> \"Jesus said to them, 'Most assuredly, I say to you, before Abraham was, I am.'\" (John 8:58)\n\nThis is the climax of the chapter. The Jews had been debating with Jesus about His relationship to Abraham. They thought they had caught Him: *You are not yet fifty years old, and have You seen Abraham?*\n\nJesus does not say: *I was before Abraham.* He says: *Before Abraham was, I am.* The eternal present tense — timeless existence. The Jews knew exactly what He was claiming. They took up stones to kill Him on the spot — which was contrary to their own law, but they were done reasoning. He had claimed to be Yahweh.\n\n## Application\n\nWe have the benefit the Jews did not have: the complete canon of Scripture, the entire life, death, resurrection, and ascension of Jesus Christ. The evidence is unmistakable.\n\nJesus is Yahweh. There is no other God beside Him. There is salvation in no other. He lived the life we could not live — and His righteousness is applied to His people. He died the death we could not die — to reconcile us to God. All that remains is to believe in Him.\n\nIf you are in Christ: be strengthened. The One you trust is the eternal I AM. If you are not yet in Christ: do not be like those obstinate Pharisees who heard and refused. Turn to the light and live.", "soundcloud_url": "https://soundcloud.com/olympiabp/02-11-24-am-jesus-is-the-i-am-john-8_12-30-elder-scott-hollander"};
