Story of Redemption", "subpoints": ["Mark abandoned Paul and Barnabas on the first missionary journey", "Paul and Barnabas split over him; Barnabas took Mark to Cyprus", "Peter calls him \"my son\" — the Gospel of Mark likely reflects Peter's eyewitness accounts", "Paul's last letter (2 Timothy 4): \"Get Mark and bring him — he is useful to me for ministry\"", "We want not greatness but to be useful: God doesn't want perfect people but profitable servants"], "scripture": ["2 Timothy 4"]}, {"title": "Greet One Another With a Kiss of Love", "subpoints": ["Don't dismiss this as merely cultural custom", "Close physical expressions of friendship and fellowship are good for relationships", "It is much harder to be angry with someone you have just hugged", "The Bible calls us as brothers and sisters to have warm, close relationships", "We're bound together not by common interests but by redemption in Christ"], "scripture": ["1 Peter 5:14"]}, {"title": "The True Grace of God — Stand in It", "subpoints": ["Peter describes everything in the letter as \"the true grace of God in which you stand\"", "Commands, exhortations, the gospel — all are grace; the entire Christian life is one of grace", "God daily gives blessing, strength, help, forgiveness, and fellowship — all undeserved", "The theme of 1 Peter: Christians are sojourners in this life, belonging to another place and time", "We are citizens of the heavenly country transported as it were to this present world"], "scripture": ["1 Peter 5:12", "1 Peter 1:13", "1 Peter 4:7"]}, {"title": "Living as Sojourners", "subpoints": ["1 Peter 2:11-12: \"Beloved, I beg you as sojourners and pilgrims, abstain from fleshly lusts\"", "Life as a sojourner is like camping — not comfortable, not our permanent home", "Being a sojourner affects: marriage, relationships to government (church and state), work", "It produces humility — sojourners don't rely on themselves; they cast themselves on the Lord", "\"If you're living your best life now, it means you're on the way to hell\" — the believer's best life is still to come"], "scripture": ["1 Peter 2:11-12"]}, {"title": "Peace to All Who Are in Christ Jesus", "subpoints": ["Christ's peace is not the absence of conflict but wholeness in God", "It is reconciliation with God, the ability to obey by the Spirit, and freedom from condemnation (Romans 8:1)", "It is the peace of calling God Abba, Father", "Peter's final blessing: \"Peace to you all who are in Christ Jesus\""], "scripture": ["1 Peter 5:14", "Romans 8:1"]}], "summary": "This is the 36th and final sermon in a series through 1 Peter, preached on the closing verses (5:12-14). Pastor Tito Lyro notes that like all first-century letters, 1 Peter concludes with somewhat disconnected topics: the identity of the letter-bearer, greetings, a summary, and a final exhortation. The sermon works through each element. Silvanus (Silas), the letter-bearer, is celebrated as a \"faithful brother\" — a title the pastor considers the most glorious any Christian could carry. \"Babylon\" in verse 13 is identified as a veiled reference to Rome, reflecting Peter's awareness that, as Babylon oppressed Israel and sent them into exile, Rome was threatening to do the same to Christians — reinforcing the letter's theme that believers are sojourners. John Mark's mention is a redemption story: from abandoning Paul to being called \"useful for ministry\" in Paul's final letter. The command to greet with a kiss of love is taken seriously as a call to warm, physical Christian fellowship. The sermon then arrives at its main theme: Peter describes everything he has written as \"the true grace of God in which you stand\" — the whole Christian life is grace. This sets up a final exposition of the sojourner theme that has run through all of 1 Peter: believers are citizens of a heavenly country, living as pilgrims in this world, and this affects every area of life. The sermon ends with Peter's benediction: \"Peace to you all who are in Christ Jesus\" — a peace rooted in reconciliation with God, not in earthly comfort.", "transcript": "## Introduction\n\nIf we're able to remain standing for a moment longer for the reading of God's Word, we're turning for one last time in this series to 1 Peter chapter 5, reading verses 12 through 14. This will be, on purpose, a shorter sermon than usual. 1 Peter chapter 5, starting verse 12, reading through verse 14. This is the Word of our Lord.\n\n\"By Silvanus, our faithful brother as I consider him, I have written to you briefly, exhorting and testifying that this is the true grace of God in which you stand. She who is in Babylon, elect together with you, greets you; and so does Mark my son. Greet one another with a kiss of love. Peace to you all who are in Christ Jesus. Amen.\"\n\nThis is the Word of our Lord. Let us pray. Lord, I pray that you would speak clearly through your word this morning. Pray that you'd be with the words of my mouth and the meditations of my heart, that you might be glorified among your people. In Jesus, amen. Please be seated.\n\n## Miscellaneous Thoughts in a Letter's Conclusion\n\nWe have been considering 1 Peter for so long that we may even have forgotten that 1 Peter is a letter — a short letter written to a group of churches in what is today Northern Turkey. This is the 36th and hopefully last sermon on 1 Peter. If you'd like to just take a few minutes to read through this letter, it would be a wonderful thing.\n\nOur text this morning reminds us that this is indeed a letter. Here we find the typical markings of the conclusion of a letter: the identity of the letter-bearer, greetings, a bit of summary of what went on in the letter, and the final exhortation that was so common in the letters of the first century of our era.\n\nLike other letter conclusions, Peter brings up several somewhat disconnected topics that make it difficult to bring them all into a cohesive sermon. We're going to try our best. When I ran out of creativity trying to bring it all together, the first point is \"Miscellaneous Thoughts.\" You can't say these thoughts don't fit under that category, right? But eventually we're going to come to the core and the final exhortation Peter brings here — that we have to stand firm in the true grace of the Lord Jesus Christ. That's the message Peter leaves with us.\n\nNotice in verse 12 that he refers to Silvanus. This is the guy Luke calls Silas in the book of Acts — very common in the first century for people to have a longer name and a short name. Silvanus and Silas are the same person in the Bible. He was a leading figure in the first-century church. He was one of the men who, after the church gathered in Jerusalem in Acts 15, was commissioned by the collection of all the elders and Apostles to take to several churches the decree — the result of what the Apostles and elders decided for the church to follow.\n\nWhy does Peter mention him here? In verse 12, he says, \"By Silvanus, our faithful brother as I consider him, I have written to you briefly.\" There are two ways to understand this. One: Silvanus was his secretary, his amanuensis — the person to whom Peter would dictate and who would write it down, often also improving the writing quality. If Silvanus was Peter's secretary, that explains why the Greek of 1 Peter is so rich and very, very good, as opposed to what you'd expect a fisherman to be able to write. The first word of verse 12 in the original text is actually \"through\" (dia) — suggesting Peter spoke and through Silvanus it came to paper, and then to them.\n\nBut this could also be explained by Silvanus being the one who literally carried the letter from where Peter was to Northern Turkey. This makes a little bit of sense because Peter finds the need to introduce him — as if this is somebody the church is going to meet once they receive the letter. So Peter is saying, this is Silvanus, this is Silas, my faithful brother — I picked him to bring this to you.\n\nCan you imagine a more glorious title than having the Holy Spirit of God himself call you a faithful brother or faithful sister? There's no greater title that we should be aspiring to in life than to be a faithful brother or faithful sister. And we pray for all the boys we baptize today — that they will be faithful brothers, men who carry God's word to other people and deliver it faithfully.\n\n## John Mark: A Story of Redemption\n\nNotice also in verse 13 as well: \"and so does Mark my son.\" This is likely John Mark — the same person Paul and Barnabas fought over. Barnabas wanted to take his cousin John Mark along on the second missionary journey; Paul said no way, he abandoned us on the first journey. They went separate ways. Barnabas took Mark to Cyprus. Peter seems to have taken him in, and he became a very close friend to Peter — to the point of Peter calling him a son. It is likely that this Mark is the author of the Gospel of Mark, which reflects the words of Peter recounted by Mark.\n\nAnd Mark is one of the great redemption stories of the Bible — going from being a disservice to the name of Christ to being profitable for the gospel. In 2 Timothy 4, the last chapter of the last letter Paul ever wrote, probably within weeks of his death, he writes: \"Only Luke is with me. Get Mark and bring him with you, for he is useful to me for ministry.\" Paul, the man who didn't want anything to do with Mark, now says he is useful for the ministry.\n\nWe live in a society where we like hyperbole — everything's great and awesome. God doesn't necessarily care if you're great or awesome. He just wants you to be useful. Be adequate for the ministry. That's great for us.\n\n## Greet One Another With a Kiss of Love\n\nAnd then in verse 14, he refers to a kiss of love: \"Greet one another with a kiss of love.\" You know what we usually do with this passage, right? Usually we come to this and say, it must be cultural — it's not for us today. Let's not do that. Let's not dismiss this command to greet one another as simply a custom of the first century that we don't need to pay attention to.\n\nIn Brazil, church always starts late — partly because when you get there, you must greet everybody before you can sit down. You must greet everybody when you leave too. It reflects this idea that there's a closeness there. I think it's important that we recognize the benefits for relationships that come from close physical expressions of friendship and fellowship in Christ.\n\nA few years ago, we had a lecturer at the seminary. He was British, and he said he loved COVID because nobody tried to hug him. He could go the rest of his life without ever being hugged again and he'd love that. And yet, that's not how it should be our general attitude. It is much harder to get mad at someone you have just hugged or kissed. And it's much easier to feel accepted in a fellowship that gives such a warm welcome.\n\nI'm not saying that right after the benediction today you're supposed to turn to your left and right and kiss the person there. But what I'm saying is that the Bible calls us as brothers and sisters to have close relationships with one another — warm relationships — not because we share common interests, but because we are redeemed by Jesus Christ, we're part of his body, we are together, and we're going to be together forever. A bunch of people who would not likely get together otherwise are brought together by the Lord Jesus Christ and called to love one another.\n\n## The True Grace of God — Stand in It\n\nAnd that brings us to the main point of Peter's final exhortation to us, which is in verse 12. After he mentions Silvanus, Peter says: \"I have written to you briefly, exhorting and testifying that this is the true grace of God in which you stand.\"\n\n1 Peter has so much in it for faith and life, and yet it is a brief letter. Peter is not using the pastoral \"brief\" — when a pastor says \"this is going to be brief,\" you just buckle up. But Peter really means it: this is a short letter. If you count the words, it's a short letter. And yet it's so full of faith and of life — this is the 36th sermon, and it is the 36th sermon because I purposefully chose not to preach on some parts, because it could have easily been 50 sermons on this short book. God gives us so much in his word that we can spend the rest of our lives consumed by it and not exhaust what he has for us.\n\nNotice that Peter considers everything he said in this letter to be the true grace of God. All of his teaching is the grace of God. Commands, exhortations, the gospel — it is all because of God; God is gracious to us. The entire Christian life is one of grace. God's daily giving of blessing, strength, help, forgiveness, and fellowship with himself — all of it we need, none of which we deserve.\n\nIf you're here today thinking that somehow God accepts you because you're such a good little boy or girl, you're wrong. God only accepts you through Jesus Christ. It doesn't matter what you do, doesn't matter how good you are, doesn't matter how much you try — it is never good enough. And yet we have a God who gives to us undeservedly through the Lord Jesus Christ. So in chapter 1 verse 13, Peter says: \"Gird up the loins of your mind, live soberly, rest your hope fully in the grace to be brought to you at the revelation of Jesus Christ.\" That is what 1 Peter tells us: the true grace of God that we must rest fully on in the Lord Jesus Christ.\n\n## Living as Sojourners\n\nWhat did Peter exhort and testify in this letter? The main truth is that Christians are sojourners in this life — we belong to another place and to another time. Jonathan Lehman in a book describes Christians as citizens of the future time who have been transported to this time. That's just a metaphor — but we live as if we belong somewhere else and some other time. We don't belong here. We're sojourners, exiles in this land, going toward a better land.\n\n1 Peter 2:11-12: \"Beloved, I beg you as sojourners and pilgrims, abstain from fleshly lusts which war against the soul. Having your conduct honorable among the Gentiles, that when they speak against you as evildoers, they may, by your good works which they observe, glorify God in the day of visitation.\"\n\nYou all know my attitude towards camping. It can be okay for a time, but that's not what you want to do for the rest of your life. And that's the picture of a sojourner — it could be okay for a time, but you're going there. You're not super attached to the things you are seeing here, because you're going to another place. Our home is with the Lord Jesus Christ at his return, forever and ever present with him.\n\nBut the life of the sojourner is hard. It's not a comfortable life, and we expect that. Peter tells us that throughout the letter. We are not living our best life now. If you're living your best life now, it means you're on the way to hell. If you're a believer, this life right now is the closest you get to hell. But if you're an unbeliever and you don't come to Christ, this life is the closest you get to heaven. And oh, what great joy and comfort to know that this is not our best life — there's a better life to come.\n\nAnd living as a sojourner aware that suffering is a common element of the Christian life affects all of life and relationships. Peter says: you're a sojourner — that affects the way you deal with your wife and your husband. You're a sojourner — that affects the way that you relate to the government, both church and state. You're a sojourner — that affects the way you work. And it will all produce humility at the individual level. Because as sojourners, we don't rely on ourselves. We cast ourselves upon the Lord, because he cares for us.\n\nSo brothers and sisters, we are citizens of the heavenly country who have been transported as it were to this present world. We are different. We don't fit in. We suffer. And we do that in hope, because this world is not our home. We are sojourning in this life, knowing that the best is yet to come.\n\n## Peace to All Who Are in Christ Jesus\n\nWhen we understand life now as God meant it, we have peace because we are in Christ. And that's how Peter ends: \"Peace to you all who are in Christ Jesus. Amen.\" Christ is our peace — not the things of this world.\n\nPeter ends this letter with a blessing: may the peace of Christ be upon you. And the peace that comes from Christ is not necessarily the lack of conflict in life or a life of ease. Christ's peace is wholeness in God — because your sins are forgiven. It is reconciliation with God. It is the ability to obey God's word because the spirit of God is within you. The peace of God comes from knowing there is no condemnation for you who are in Christ Jesus (Romans 8:1). The peace of God coming from having been reconciled with God and from being able to call him Abba, Father. That's the peace that Peter proclaims.\n\nSo Peter says: \"Peace to you all who are in Christ Jesus.\"\n\nLet us pray together. Father, thank you for your word. We pray that your word will fall into fertile ground in our hearts, that we might grow in him. We again pray for those who don't believe in you, that they might come to faith in this glorious Christ, who saves them from their sins and from the wrath to come. In asking Jesus name, amen."};
