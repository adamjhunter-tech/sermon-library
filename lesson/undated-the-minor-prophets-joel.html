<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-the-minor-prophets-joel", "title": "The Minor Prophets: Joel", "speaker": "Pastor Tito Lyro", "date": null, "session": "PM", "series": "Minor Prophets", "series_part": null, "parts": 1, "source_files": ["The Minor Prophets - Joel - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/the-minor-prophets-joel-pastor-tito-lyro", "tags": [{"tag": "Minor Prophets", "source": "detected"}, {"tag": "second coming", "source": "detected"}, {"tag": "repentance", "source": "detected"}, {"tag": "Holy Spirit", "source": "detected"}], "scripture_references": [{"reference": "Joel", "type": "quoted", "source": "detected"}], "outline": ["Third lesson in the Minor Prophets series", "Joel: background and the locust plague", "The Day of the LORD as both threat and promise", "Call to repentance: rend your hearts not your garments (Joel 2:13)", "Promise of the Spirit poured out on all flesh (Joel 2:28-29)", "Fulfillment at Pentecost (Acts 2)"], "summary": "Third lesson in a PM series on the Minor Prophets. Pastor Tito Lyro expounds the book of Joel, focusing on the locust plague as a harbinger of the Day of the LORD, Joel's urgent call to repentance ('rend your hearts not your garments'), and the remarkable promise of the Spirit poured out on all flesh—quoted by Peter at Pentecost in Acts 2.", "transcript": "We are on our third lesson on the Minor Prophets. If you have a Bible, start trying to find Joel — it is right after Hosea and before Amos. Or you can go to the table of contents and find it that way. Nick did a great job covering Hosea last week. He really stepped into my world where he had more notes than minutes — but he did a great job of bringing things together.\n\nAs we talked about in the very first lesson on the Minor Prophets, when we had a survey of the entire Old Testament, the canonical order of the prophets in the Bible is not the historical order. It doesn't mean that Hosea comes first historically, then Joel, then Amos, and so on. But in our series we are covering them in the canonical order — the order in which they appear in the Bible. That is why we are covering Joel today.\n\n## Background on Joel\n\nJoel is one of those short books that seems surprisingly long. It is only three chapters, but it takes real time and work to read through. His name means *Yah is God* — a shortened form of the covenantal name Yahweh. He is a prophet to Judah.\n\nThe date of the book is disputed. He either prophesied at the end of the fifth century BC — the 400s, the low 400s — or in the mid-ninth century BC in the 800s. Most scholars think the 400s is more likely, and we will look at why in a moment.\n\nThere is very little about Joel the man in the book itself. The very first verse simply tells us his name is Joel and that he is the son of Pethuel. That is all we know about him personally, and that is very common among the Minor Prophets. With the Major Prophets — Isaiah, Jeremiah, Ezekiel, Daniel, and Lamentations — we find a great deal about the prophets themselves. But in the Minor Prophets it is usually just that first verse. Jonah is the exception. Most of them give us only this brief self-identification, and Joel is no different.\n\nScholars do not dispute the authorship. There is no reason to think someone else wrote it or that it was not a unified composition from the beginning. The date, however, is not specified. The book contains no reference to a reigning king, which leaves a wide range of possibilities.\n\n### Dating the Book\n\nWhy does it matter when a book of the Bible was written? Several reasons: it helps us understand the historical and cultural context, and knowing what was written around the same time helps us interpret these texts in relation to one another.\n\nHere is what we can determine. We know Joel was written after the reign of Jehoshaphat, because in chapter 3, verse 2 it says:\n\n> *\"I will also gather all nations and bring them down to the Valley of Jehoshaphat.\"*\n\nThere is already a valley named after him, so Jehoshaphat had already existed. He reigned from 873 to 848 BC. The book was written sometime after that.\n\nSome have suggested it may have been written during the reign of the boy-king Joash, who came to power at seven or eight years old — meaning someone else effectively ruled for him during that period.\n\nWe also know that Joel references captivity. Look at chapter 3, verse 1:\n\n> *\"For behold, in those days and at that time, when I bring back the captives of Judah and Jerusalem...\"*\n\nSo whenever Joel was written, some captivity had already occurred before it.\n\nFurther, in chapter 3, verse 6, it references the Greeks as a people group capable of purchasing slaves:\n\n> *\"...the people of Judah and the people of Jerusalem you have sold to the Greeks.\"*\n\nThe Greeks did not begin their migration from the islands into the mainland until around 750 BC. For them to be established as a slave-trading power, the book must date considerably after that.\n\nAnd in chapter 3, verse 4, Tyre and Sidon are still active powers — they were destroyed in 345 BC. So a range somewhere between 750 and 345 BC is our window. Not the most precise dating, but that is where we land.\n\nOne more significant clue: if you read the whole book, you will find no mention of Assyria, Babylon, Persia, Syria, or Rome — powers that dominate so many other prophetic books. The enemies listed are Tyre, Sidon, Philistia, the Greeks, the Sabeans, Egypt, and Edom. The absence of Assyria and Babylon in particular suggests the book is probably post-exilic — written after Israel returned from the Babylonian captivity, early in that period, before Haggai, Zechariah, and Malachi.\n\nAnother consistent detail: there is no mention of idolatry in the book at all. This is characteristic of the post-exilic period. The Babylonian captivity had effectively rid Israel of outward idolatry — the worship of foreign gods with statues and shrines. People still had idolatrous hearts, as all of us do. But when they came back from exile, there was no more outward, visible idol worship. Joel's silence on idolatry fits that setting.\n\n## Purpose of the Book\n\nWhy was this book written? Two key purposes:\n\n**First:** to describe how destruction may lead to repentance. Joel is filled with descriptions of judgment, but that judgment has a purpose — it is meant to drive God's people to repentance. Most of the prophets, though not all, end with a positive message. In Hosea, for example, chapters 1 through 11 are largely judgment — but the final chapters move toward reconciliation and blessing. Joel follows the same pattern. It is saturated with destruction, but that destruction has a redemptive purpose.\n\n**Second:** to prepare the way for the outpouring of the Holy Spirit and the coming of Pentecost. Joel is looking forward to the day when the Spirit would come and empower the church to disciple the nations.\n\n## The Locust Plague (Chapter 1)\n\nIn the first part of the book, Judah is devastated by a locust invasion. Joel takes an actual, historical event — a plague of locusts that destroyed the crops — and uses it to teach a deeper lesson. Look at chapter 1, verse 4:\n\n> *\"What the chewing locust left, the swarming locust has eaten; what the swarming locust left, the crawling locust has eaten; and what the crawling locust left, the consuming locust has eaten.\"*\n\nFor farming communities, this was immediately relatable. When a locust swarm descends on a crop, it does not leave until everything is consumed. Severe famine follows, because there is nothing left to sell and nothing to eat.\n\nJoel uses this catastrophe to give the people of Judah a strong prophetic warning: unless they repent wholeheartedly and immediately, enemy armies will come and destroy their land just as the locusts did. He then exhorts the priests and the people to fast, to humble themselves, and to seek forgiveness from God. If they do that, spiritual blessings will come to the nation.\n\n## The Day of the LORD and the Outpouring of the Spirit (Chapter 2)\n\nHowever, judgment is still coming. Look at chapter 2, verses 28–30 — the passage Peter quotes at Pentecost in Acts 2:\n\n> *\"And it shall come to pass afterward, that I will pour out my Spirit on all flesh; your sons and your daughters shall prophesy, your old men shall dream dreams, and your young men shall see visions. Even on the male and female servants in those days I will pour out my Spirit. And I will show wonders in the heavens and on the earth, blood and fire and columns of smoke. The sun shall be turned to darkness, and the moon to blood, before the great and awesome day of the LORD comes.\"* (Joel 2:28–30)\n\nIt is worth noting that Peter does not quote that final clause about the great and awesome day of the LORD when he preaches at Pentecost. The implication is that that day is still coming — it had not yet been fulfilled. The great day of judgment lies in the future, and Joel is preparing God's people for it.\n\nWhen the Old Testament prophets looked at the coming of the Messiah, they saw his ministry as a whole. They did not necessarily distinguish between the first coming and the second coming, between his suffering and his exaltation. They saw it as one movement. So when Joel speaks of the great and awesome day of the LORD, he is speaking of everything Christ would do — inaugurated at his first coming and consummated at his second. We live now in that in-between time, waiting for the great day of judgment Joel foretold.\n\n### A Question: \"The Day of the LORD Is at Hand\"\n\nA question worth addressing: the book of Joel says the day of the LORD is *at hand* — it sounds imminent. But Joel was likely writing in the 400s BC, and Christ did not come for another four centuries. What does \"at hand\" mean?\n\nThere is genuine debate whether \"at hand\" in prophetic literature primarily denotes nearness in time or nearness in presence — that is, the king is at hand because the King is right there. When Jesus said *\"Repent, for the kingdom of heaven is at hand,\"* some interpret that as proximity in space: the kingdom is near because the King is present.\n\nWhat we can say is that Scripture consistently maintains an imminent expectation of Christ's return — a sense that to every generation, the return of Christ is near. In the big scheme of things, if Joel is prophesying in the 400s BC, his day is far closer than it was in Abraham's time. Abraham *saw the day of Christ and rejoiced in it* (John 8:56) — from a distance of millennia. Joel is speaking of the same day from a far shorter distance.\n\nOne more note on language: the singular \"day\" in prophetic literature is often not a reference to a literal twenty-four-hour period, but to a *time* or *era* in which something will be displayed. The plural \"days\" tends to be more literal; the singular \"day\" tends to carry broader temporal significance.\n\n## Primary Takeaway: Repentance Is Crucial\n\nIf nothing else sticks from the book of Joel, let it be this: repentance is crucial.\n\nJoel calls God's people to repent. If we do not repent of our sins, we are guaranteed to be subject to God's severe judgment. The people of Joel's time were thinking, *I can trust in my own goodness. I can be a good person and the Lord will bless that.* But the point Joel makes is that we cannot trust in our own goodness or our own possessions for salvation. We can only trust in the Lord.\n\nAll of us are in need of repentance. It does not matter who we are. Even those who have been saved by the Lord are in need of ongoing repentance. The Christian life is a life of repentance. When people come for counseling and they can say in the abstract, *yes, I am a sinner* — but then cannot name a single specific sin from the last week — it usually means they do not really think of themselves as people who sin against God. I have given someone homework to identify three concrete ways they sinned against the Lord in the previous seven days — three specific things, not abstractions. And this person could not come up with three. In seven days, not one concrete sin could be named. That is a problem. It is impossible to go seven days without sinning in thought, word, deed, belief, or attitude against the Lord — unless your name is Jesus.\n\nSo if nothing else you take from Joel, take this: Joel calls you to repent. If you are not a believer, repent and turn to the Lord. If you are a follower of Jesus Christ, live a life of daily repentance. We are not called to perfection in this life — we will not reach it until death or resurrection. But we are called to repent as we seek the Lord, day after day. Let Joel, if nothing else, give you that warning and that call."};
