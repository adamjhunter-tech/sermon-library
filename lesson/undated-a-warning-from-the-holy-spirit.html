window.LESSON_DATA = {"id": "undated-a-warning-from-the-holy-spirit", "title": "A Warning from the Holy Spirit", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["A Warning from the Holy Spirit - Pastor Tito Lyro - Hebrews 3_7-19.txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/9-29-24-the-ministry-of-the-holy-spirit-part-3-pastor-tito-lyro", "tags": [{"tag": "perseverance", "source": "detected"}, {"tag": "sin", "source": "detected"}, {"tag": "typology", "source": "detected"}, {"tag": "faith", "source": "detected"}, {"tag": "gospel", "source": "detected"}, {"tag": "pilgrimage", "source": "detected"}], "scripture_references": [{"reference": "Hebrews 3:1-19", "type": "quoted", "source": "detected"}, {"reference": "Psalm 95:7-11", "type": "quoted", "source": "detected"}, {"reference": "1 Corinthians 10:1-12", "type": "quoted", "source": "detected"}, {"reference": "Luke 9:30-31", "type": "referenced", "source": "detected"}, {"reference": "1 Corinthians 5:7", "type": "referenced", "source": "detected"}, {"reference": "1 Peter 1:18-19", "type": "referenced", "source": "detected"}, {"reference": "1 Peter 2:11", "type": "referenced", "source": "detected"}, {"reference": "Romans 15:4", "type": "referenced", "source": "detected"}, {"reference": "2 Timothy 3:16-17", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 12:1", "type": "referenced", "source": "detected"}, {"reference": "Jeremiah 31", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: A Pastoral Plea", "subpoints": ["The author of Hebrews is writing as a pastor to a congregation flirting with abandoning Christ and returning to Judaism", "His burden: these beloved people are considering a decision that would ruin their lives spiritually", "The argument of the whole letter: Christ is better than anything found outside of him", "Verse 7's 'therefore' connects this warning to the g spirit is thanksgiving and contentment"], "scripture": ["Hebrews 3:7-12", "Psalm 95:7-11"]}, {"title": "Four Administrations from the Holy Spirit", "subpoints": ["First (vv. 7-12): Listen to the Spirit to avoid hardening your heart — the focus of this sermon", "Second (vv. 13-14): Listen to the Spirit in order to exhort the brethren — we need one another to complete the journey", "Third (vv. 14-15): Listen to the Spirit today — not tomorrow, not Monday, but right now in this moment", "Fourth (vv. 16-19): Listen to the Spirit in order to flee God's wrath — the consequence of unbelief is death in the wilderness"], "scripture": ["Hebrews 3:7-19"]}, {"title": "The Result of Hardness: Death in the Wilderness", "subpoints": ["Of the 603,550 men over age 20 who left Egypt, every last one died in the wilderness — approximately 90 deaths per day for 40 years", "They started well but lacked persevering faith to enter the rest — their journey was marked by graves", "Application: Are we murmuring against God or giving thanks? Are we looking toward the Promised Land or back to Egypt?", "The Spirit's urgent call: 'Today, if you hear his voice, do not harden your hearts'", "The only two allegiances are following Jesus or following yourself — there is no middle ground"], "scripture": ["Hebrews 3:16-19", "Hebrews 4:11"]}], "summary": "Preaching from Hebrews 3:7-19, Pastor Tito Lyro sets the passage within the broader argument of Hebrews: the pastor-author is writing to a congregation flirting with abandoning Christ to return to Judaism, and he pleads with them — as a father pleads with a child heading toward destruction — to consider Jesus, because Christ is better than everything they could find outside of him. The immediate passage consists of the longest continuous Old Testament quotation in the New Testament apart from the Jeremiah 31 passage in Hebrews 8, drawn from Psalm 95:7-11 about Israel's wilderness rebellion.\n\nPastor Lyro explains why this ancient Psalm applies directly to the church today using two arguments: all biblical history is the church's history (1 Corinthians 10:11; Romans 15:4), and Christians are participants in a new Exodus through the cross of Christ (Luke 9:30-31). Our baptism into Christ is the fulfillment of Israel's crossing of the Red Sea (1 Corinthians 10:1-2), and our feeding on Christ by faith fulfills Israel's nourishment with manna. This present life is our wilderness wandering — we are pilgrims and sojourners (1 Peter 2:11) journeying toward our eternal rest, and we are prone to become attached to the things of this world as if they were our final home.\n\nThe sermon focuses on the first of four administrations the Holy Spirit gives in the passage: listen to the Spirit in order to avoid hardening your heart. To harden the heart is to disobey God's voice and act according to one's own desires — and the more one does this, the easier it becomes (the seared conscience Paul describes). Israel's wilderness journey was marked from beginning to end by grumbling and complaining, and the result was catastrophic: every man over twenty who left Egypt died in the wilderness — approximately ninety deaths a day for forty years. The application is direct: the people of God today are in their own wilderness wandering, and the Spirit urges them to examine whether their hearts are hardened in grumbling or softened in thanksgiving, whether they are looking toward the Promised Land or longingly back toward Egypt.", "transcript": "## Scripture Reading: Hebrews 3:1-19\n\nFor Abel, we are going to be reading Hebrews chapter 3. Please be standing for the reading of God's Word if you are able. We are going to consider verses 7 through 19, but I will read the whole chapter.\n\n*Therefore, holy brethren, partakers of the heavenly calling, consider the Apostle and High Priest of our confession, Christ Jesus, who was faithful to Him who appointed Him, as Moses also was faithful in all His house. For this One has been counted worthy of more glory than Moses, inasmuch as He who built the house has more honor than the house. For every house is built by someone, but He who built all things is God. And Moses indeed was faithful in all His house as a servant, for a testimony of those things which would be spoken afterward, but Christ as a Son over His own house, whose house we are if we hold fast the confidence and the rejoicing of the hope firm to the end. Therefore, as the Holy Spirit says: Today, if you will hear His voice, do not harden your hearts as in the rebellion, in the day of trial in the wilderness, where your fathers tested Me, tried Me, and saw My works forty years. Therefore I was angry with that generation, and said, They always go astray in their heart, and they have not known My ways. So I swore in My wrath, They shall not enter My rest. Beware, brethren, lest there be in any of you an evil heart of unbelief in departing from the living God; but exhort one another daily, while it is called Today, lest any of you be hardened through the deceitfulness of sin. For we have become partakers of Christ if we hold the beginning of our confidence steadfast to the end, while it is said: Today, if you will hear His voice, do not harden your hearts as in the rebellion. For who, having heard, rebelled? Indeed, was it not all who came out of Egypt, led by Moses? Now with whom was He angry forty years? Was it not with those who sinned, whose corpses fell in the wilderness? And to whom did He swear that they would not enter His rest, but to those who did not obey? So we see that they could not enter in because of unbelief.*\n\nLet us pray. Father, we do pray that you meet with us through your Word. Open our hearts, open our eyes and ears to hear wonderful things concerning you from this passage. We pray in Jesus' name. Amen. Please be seated.\n\n## Introduction: A Pastoral Plea\n\nHave you ever been in a situation where someone you love very much is considering making a decision that could potentially ruin his or her life? What do you do? Naturally, you plead and beg and try to convince that loved one not to go down the path they are considering. You take whatever opportunity the Lord provides to help them make the right decision.\n\nThat is what the pastor who wrote Hebrews is doing. The whole letter is actually a sermon written to a church — we do not know exactly where it was. This pastor is writing this letter begging them not to abandon Christ. They are flirting with the decision to leave the gospel of Jesus Christ. Things are a little tough. They think they can follow God faithfully apart from Christ — they want to go back to how things were before Christ came, just as plain old Jews. And they think they can be faithful to God and do that at the same time. This pastor is pleading with them, under the inspiration of the Holy Spirit, not to do that. These people he loved deeply are thinking about ruining their lives, and he doesn't want them to do that.\n\nSo he sets out to show them that there is nothing better than Christ. Throughout the epistle to the Hebrews, that is the argument: Christ is better than anything else they could find outside of him.\n\nIn the first six verses of this chapter, the Holy Spirit urges the congregation to consider Jesus because he is the Apostle and High Priest of their confession — and because he is better than Moses. The average Jew would consider Moses one of the greatest people who ever lived, perhaps second only to Abraham. And Jesus, the Holy Spirit says, is greater than Moses. The plea of the Holy Spirit boils down to this: consider Jesus, because if you don't remain faithful to him, you are doomed.\n\nThis massive appeal continues as the Holy Spirit develops that last point. Notice the word 'therefore' at the beginning of verse 7, connecting our passage to what went before. He urges them — and us — to listen to what the Holy Spirit says to those who rebel against their God, and he does so by quoting Psalm 95:7-11. This is one of the two longest continuous Old Testament quotations in the entire New Testament, both of which appear in Hebrews.\n\n## Why Psalm 95 Applies to Us\n\nAs we read Psalm 95 for our responsive reading, it is obvious that it references the rebellion of Israel during the forty years of wilderness wandering. But how can the Holy Spirit apply it to first-century Christians? How can a passage about the wilderness wanderings help us today in the twenty-first century?\n\nThe answer is twofold. First, the entire history of redemption was written as the history of each member of the church of Jesus Christ. When we read the Bible, we are not reading someone else's story — we are reading our story. When we read about Abraham, we are not reading about someone else's ancestor; we are reading about our ancestor. Paul says in 1 Corinthians 10:11: *Now all these things happened to them as examples, and they were written for our admonition, upon whom the ends of the ages have come.* Romans 15:4: *Whatever things were written before were written for our learning, that we through the patience and comfort of the Scriptures might have hope.*\n\nSecond, and more specifically: in Christ, we are part of a new Exodus. It is not as clear in English, but the death of Christ is actually called an Exodus in Luke 9:30-31. At the transfiguration, Moses and Elijah appeared in glory and spoke of his *decease* — the Greek word there is *exodos*, his Exodus. There is a new Exodus that was about to happen through the cross. And Paul picks up this theme: Christ is our Passover sacrifice (1 Corinthians 5:7). Peter says we were redeemed with the precious blood of Christ, as a lamb without blemish and without spot — the qualifications for the Passover sacrifice (1 Peter 1:18-19).\n\nTurn to 1 Corinthians 10, which is the parallel passage to Hebrews 3. In verses 1-2, Paul says that our baptism into Christ is the fulfillment of Israel's baptism into Moses as they crossed the Red Sea. Our feeding on Christ by faith at the Lord's Table is the fulfillment of Israel's nourishment with manna and water from the rock — and Paul says that rock was Christ (v. 4). Our rest in heaven is the fulfillment of their earthly rest in Canaan.\n\nSo in 1 Corinthians 10:6-12, Paul draws the conclusion: the things that happened to Israel in the wilderness happened as examples for us, written so that we would not commit the same sins they committed — idolatry, sexual immorality, tempting Christ, complaining. Therefore, let him who thinks he stands take heed lest he fall.\n\nPeter calls us pilgrims and sojourners (1 Peter 2:11) — the very same language the Old Testament uses for Israel in the wilderness. This life is the desert. The things of this life are the things of the wilderness — the cacti and the scrub brush. We live in tents, as it were — the body is called a tent in Scripture, temporary housing before the final glorified body. Do not get too attached to the things of the desert; you have something better at journey's end.\n\n## The Wilderness, the Wandering, and the Warning\n\nBecause we are in this wilderness journey, the Holy Spirit can apply Psalm 95 to us today. Psalm 95 is clearly divided into two parts: a glorious call to worship in verses 1-7a, and a warning against disobeying God in verses 7b-11, using the wilderness rebellion as evidence that God is serious.\n\nIn the context of Psalm 95, worship of God is good and acceptable — but only if offered from a sincere and obedient heart. The Holy Spirit applies this concept to the Hebrews congregation: they thought they could still worship God sincerely if they just left Christ behind. Psalm 95 says: No, you cannot. The only way to come before God is through Jesus Christ. To try to come to God apart from Christ is not to meet a benevolent grandfather in the sky. That God does not exist. Coming to God apart from Jesus Christ means meeting your Judge, and being found guilty of everything you have done.\n\nThen the Holy Spirit gives four administrations from the passage. We will look at all four briefly, but focus on the first.\n\n## The Four Administrations\n\n**First (vv. 7-12): Listen to the Spirit to avoid hardening your heart.** This is our focus this morning. To harden the heart is to disobey the voice of God and act in accordance with one's own desires. The more you do that, the easier it gets — what Paul calls a seared conscience. Every time you act on your own desires rather than God's Word, your hearing of God's voice diminishes.\n\n**Second (vv. 13-14): Listen to the Spirit in order to exhort one another.** We need each other to get to the end of the wilderness wandering. We cannot make this journey alone.\n\n**Third (vv. 14-15): Listen to the Spirit today.** We always think we will start on Monday. We will deal with that tomorrow. We will start the diet after the next meal. The Holy Spirit says: No — obedience starts in this immediate moment. Today. Right now.\n\n**Fourth (vv. 16-19): Listen to the Spirit in order to flee God's wrath.** The result of unbelief is death in the wilderness.\n\n## The Hardened Heart in the Wilderness\n\nJust a few weeks after witnessing the mighty deliverance of God — it could have been as little as three weeks after crossing the Red Sea, after all those plagues — the people of God were complaining. They were complaining that God had failed them. We wish we could go back to Egypt. Things were better there. God has abandoned us. We do not have food. We do not have water. We miss the onions and leeks of Egypt (interesting choice of vegetables).\n\nAnd then, as they are about to cross into the Promised Land in Numbers 20, they are complaining about the same things. Psalm 95, by referencing events from both the beginning and the end of the wilderness wandering, is saying: this is representative of the entire journey. Their whole time in the wilderness was marked by grumbling and complaining against God.\n\nDo you realize that all grumbling and complaining is against God? He is the sovereign one over all things. That is what providence means — God governing all things. So how is your life marked? Are you shaking your fist at God? Perhaps not even realizing it, but constantly complaining about how things are going, about your life, about what people are doing? That was Israel in the wilderness. The opposite of grumbling and complaining is giving thanks and contentment.\n\n## The Consequence: Death in the Wilderness\n\nVerses 16-19 tell us the result of Israel's hardened hearts. The book of Numbers records a census of men twenty years old and older who left Egypt: 603,550 men. Add an equal number of women the same age, and you have over 1,200,000 people who left Egypt.\n\nEvery last one of them died in the wilderness. Every last one. Divide that number by forty years and you get approximately ninety deaths a day. The wilderness was strewn with bodies. They could trace their journey by the graves of those who died. They started well, but they did not have persevering faith to enter the rest.\n\nPeople of God, we are in our wilderness wandering right now. That is what this life is. We have been freed from the bondage of sin through the cross of Jesus Christ. We have been identified with Christ in our baptism. Now we are journeying toward our rest.\n\nHow is our heart in this journey? Is it softened by the grace of God, showing itself in obedience? Or are we murmuring and complaining as the Israelites did throughout their entire wilderness wandering? Are you looking forward to that rest so much that the trials of this life are merely a preface? Or is this life all you care about? Are you seeking to return to Egypt?\n\nThe Spirit says: *Let us therefore be diligent to enter that rest, lest anyone fall according to the same example of disobedience.*\n\nThe Church of Jesus Christ — listen to what the Spirit says, and consider Jesus in your wilderness wanderings.\n\nFather, we thank you that you are a God who reveals yourself to us in your Word. We pray that you give us persevering faith to arrive at the end of our wilderness wandering in this life, following the arms of Jesus. We thank you that the Author and Finisher of our faith is able to keep our eyes upon him as we go from here to eternity. We pray these things in his name. Amen."};
