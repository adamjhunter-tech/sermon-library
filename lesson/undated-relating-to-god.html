window.LESSON_DATA = {"id": "undated-relating-to-god", "title": "Relating to God", "speaker": "Pastor Tito Lyro", "date": null, "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["Relating to God - Psalm - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/relating-to-god-psalm-pastor-tito-lyro", "tags": [{"tag": "worship", "source": "detected"}, {"tag": "prayer", "source": "detected"}, {"tag": "fear of God", "source": "detected"}, {"tag": "trust in God", "source": "detected"}, {"tag": "obedience", "source": "detected"}, {"tag": "praise", "source": "detected"}, {"tag": "joy", "source": "detected"}, {"tag": "David", "source": "detected"}, {"tag": "lament", "source": "detected"}], "scripture_references": [{"reference": "Psalm 34", "source": "ai"}, {"reference": "1 Samuel 21:10-15", "source": "ai"}, {"reference": "Isaiah 6", "source": "ai"}, {"reference": "Revelation 4-5", "source": "ai"}, {"reference": "Psalm 84:11", "source": "ai"}, {"reference": "Hebrews 4", "source": "ai"}], "outline": [{"title": "I. Celebrate God (Psalm 34:1-3)", "subpoints": ["David's worship was voluntary — a resolved choice of the soul", "His worship was constant — at all times, not merely when he felt like it", "His worship was verbal — praise always on his lips, leaving no room for slander or gossip", "His worship was boastful — bragging about God like a parent showing off a child", "His worship was contagious — the humble hear and join; the proud cannot"], "scripture": ["Psalm 34:1-3"]}, {"title": "II. Pray to God (Psalm 34:4-7)", "subpoints": ["David sought God by crying out in need and trusting Him alone for deliverance", "Those who pursue God in prayer glow — they look to Him and are radiant", "They look to a person, Jesus Christ, not merely to abstract propositions", "God never shames those who come before Him — we can approach with boldness (Hebrews 4)"], "scripture": ["Psalm 34:4-7"]}, {"title": "III. Taste God (Psalm 34:8)", "subpoints": ["David uses the image of taste to demand whole-person engagement, not merely cognitive exercise", "There is a spiritual sweetness to the knowledge of God", "Abiding in God's presence awakens spiritual joys that are incomparably full", "The soul must bite into God and discover that He is good"], "scripture": ["Psalm 34:8"]}, {"title": "IV. Fear God (Psalm 34:9-14)", "subpoints": ["We must both enjoy God and tremble in His presence — adore and be in awe", "When God becomes just another being, we are in spiritual danger", "Passages like Isaiah 6 and Revelation 4-5 should produce awe, not dry routine", "A heart without the fear of God is in a very dangerous place"], "scripture": ["Psalm 34:9-14", "Isaiah 6"]}, {"title": "V. Obey God (Psalm 34:15-18)", "subpoints": ["God cannot take His eyes off those who love obedience and pursue purity", "He hears every prayer, notes every groan, is moved by every cry of anguish", "The Lord is especially near to those with a broken heart and contrite spirit", "The crushing spirit, though they may not feel it, is closest to God"], "scripture": ["Psalm 34:15-18"]}, {"title": "VI. Trust God (Psalm 34:19-22)", "subpoints": ["Many become bitter because God did not fulfill things He never promised", "We cannot trust God to give us worldly success or insulate us from enemies", "We can trust Him for eternal salvation, guidance, forgiveness, spiritual satisfaction, and His unfailing presence", "None who trust in Him shall be condemned"], "scripture": ["Psalm 34:19-22"]}], "summary": "Pastor Tito Lyro expounds Psalm 34, written when David feigned madness before Abimelech (1 Samuel 21), and draws out six ways believers are called to relate to God. The Psalm is introduced as normative for all believers — David as a representative Psalmist giving voice to the experience every Christian should have. The six themes appear in the order of the Psalm: celebrate, pray, taste, fear, obey, and trust.\n\nThe sermon moves through each theme with pastoral application. Celebrating God displaces gossip, slander, and complaining from our lips; praising God is contagious among the humble. Praying to God produces a visible radiance — those who look to Him are shining. Tasting God means inviting the whole person into spiritual experience, not just the intellect, because there is a sweetness to knowing God that never loses its capacity to satisfy. Fearing God is paired with enjoying Him — we must both adore Him and tremble, and losing the awe of God is a warning sign of spiritual danger. Obeying God is rewarded with His watchful and tender gaze; He cannot take His eyes off the righteous. Trusting God must be rightly aimed — He will not fulfill promises He never made, but He will unfailingly keep every promise He has given.", "transcript": "## Scripture Reading: Psalm 34\n\nTo Psalm 34. Psalm 34 is a well known psalm — this portion of it is well known, and it's one of my favorite Psalms. We get to consider it this afternoon.\n\nA Psalm of David when he pretended madness before Abimelech, who drove him away and he departed.\n\nI will bless the Lord at all times; His praise shall continually be in my mouth. My soul shall make its boast in the Lord; the humble shall hear of it and be glad. Oh magnify the Lord with me and let us exalt His name together. I sought the Lord and He heard me and delivered me from all my fears. They looked to Him and were radiant, and their faces were not ashamed. This poor man cried out and the Lord heard him and saved him out of all his troubles. The angel of the Lord encamps all around those who fear Him and delivers them. O taste and see that the Lord is good; blessed is the man who trusts in Him. O fear the Lord, you His saints, there is no want to those who fear Him. The young lions lack and suffer hunger, but those who seek the Lord shall not lack any good thing. Come, you children, listen to me; I will teach you the fear of the Lord. Who is the man who desires life and loves many days that he may see good? Keep your tongue from evil and your lips from speaking deceit. Depart from evil and do good; seek peace and pursue it. The eyes of the Lord are on the righteous and His ears are open to their cry. The face of the Lord is against those who do evil to cut off the remembrance of them from the earth. The righteous cry out and the Lord hears and delivers them out of all their troubles. The Lord is near to those who have a broken heart and saves such as have a contrite spirit. Many are the afflictions of the righteous, but the Lord delivers them out of them all. He guards all his bones, not one of them is broken. Evil shall slay the wicked and those who hate the righteous shall be condemned. The Lord redeems the soul of His servants, and none of those who trust in Him shall be condemned.\n\nThis is the word of our Lord. Let us pray together. Father in heaven, thank You for Your word. We pray that You speak to us this afternoon and help us to grow from it. In Jesus' name. Amen.\n\n## Introduction\n\nThis is a rare psalm with a title that actually tells us when and why it was written. It was written when David was in the Philistine territory and before the king there, the leader, and he pretended to be crazy in order to be let go. You can read of this episode in 1 Samuel chapter 21, verses 10 through 15.\n\nIn this psalm, David describes his experience of seeking God and relating to God. And his experience really becomes normative to the believer. A lot of things that we read in the Psalms become normative — they reflect what our experience should be as well. The Psalmist is often a representative believer, giving words to all believers at all times. That includes Psalm 34.\n\nAnd there are six things that I want to see this afternoon from Psalm 34 that will help us in relating to God. They are going to be in order of appearance, not necessarily the order of importance. They are all important because they are from the Word of God. The first thing is that as we relate to God, we should celebrate Him.\n\n## I. Celebrate Him (Verses 1-3)\n\nObserve the passion and the intensity of David's worship here in this Psalm.\n\nDavid's worship was voluntary. You should see there in verse 1 — he says, I will bless the Lord. Nobody was forcing him to do that. He voluntarily worshipped and celebrated the Lord. It was a choice, a decision of the soul, irrespective of what others may do. In essence, he says, I've determined to celebrate God. I'm resolved. My mind and spirit are fixed. My heart is engaged. I'm going to worship God.\n\nAnd his worship was not only voluntary, but also constant — again in verse 1. He says, I will bless the Lord at all times. Not just on Sunday, in all situations and circumstances, at every possible moment of every possible day, not just when one feels like it, but even when life is a mess — David says, I worship the Lord every day at all times.\n\nDavid's worship was also verbal. His praise shall continually be in my mouth — whether in speech or song. If God's praise is on our lips all the time, what place would be left for slander, for gossip, for complaining, for criticism? If the praise of the Lord is on our lips all the time, there would be no time to do these other hurtful things in our lives.\n\nDavid's worship was also boastful. My soul in verse 2 shall make its boast in the Lord. Bragging is easy for most of us. We're naturally good at bragging about ourselves, about our kids. Let's just replace ourselves and other things in our lives with God and what He's done. That's the idea behind the word Hallelujah — it's a boasting about God. Every time your kid does something significant, you want to tell everybody about it. That's the attitude that David has but for God.\n\nDavid's celebration is contagious. The humble shall hear of it and be glad. People around him are going to hear about his God and about his worship and they're going to join him. Only the humble will enjoy hearing others brag about God; the proud only want to hear about themselves.\n\nIn this celebration, David's worship is also corporate. In verse 3: Oh magnify the Lord with me and let us exalt His name together. As much as one might enjoy private praise, there is something special and empowering and encouraging in joining with others in the adoration of God.\n\n## II. Pray to God (Verses 4-7)\n\nDavid sought the Lord by crying out to Him in need, trusting Him alone for deliverance from fear and salvation from trouble.\n\nNow I'm going to ask you: how does one know if a person is pursuing God in prayer? According to the Psalm, they glow. That's what verse 5 says. They looked to Him and were radiant, and their faces were not ashamed. There's a glow about the person who pursues God in prayer. It's not a sourness, it's not a standoffishness — it's a glow that demonstrates that there is the presence of God.\n\nThey looked to Him — they looked to God, they looked to Jesus — and were radiant. Not just an idea or abstract propositions or speculative theories about what He's like. They settled for nothing less than the intimacy of spiritual eye contact. They looked to a person, and that person was the Lord Jesus Christ.\n\nThe result is that they are never ashamed. God will never belittle or demean you for coming to Him. The author of Hebrews says that we can come with confidence and with boldness before His throne. God will never embarrass those who seek Him.\n\n## III. Enjoy God / Taste Him (Verse 8)\n\nO taste and see that the Lord is good; blessed is the man who trusts in Him.\n\nWhy taste? Why did David use this idea of taste? Why didn't David exhort us to think or remember or some other purely cognitive exercise? Because He wants us to be completely satisfied with Him — not just cognitively but the whole person. The imagery of tasting makes the point that experiencing God is pleasant and enriching to the soul. There is a spiritual sweetness to the knowledge of God. God is delicious. God is delectable. Jesus is delectable. It is as we savor the flavor of His glory and splendor that He is most honored and exalted.\n\nThis isn't to say that those who taste and see the Lord is good will be insulated from pain and persecution. But abiding in His presence awakens spiritual joys that are incomparably full and spiritual pleasures that never lose their capacity to enthrall and satisfy. The soul must invite and taste — take a bite of God and see that He is good.\n\n## IV. Fear God (Verses 9-14)\n\nInteresting: first David tells us to taste God and savor His goodness, then turns around in the next section and commands us to fear Him. And this is true — we must both enjoy God and tremble in His presence. We must rejoice and revere God at all times. We must both adore Him and fall on our knees in awe of His power and authority and holiness.\n\nWhen we lose the awe of God, we are in trouble. When God becomes just another being out there for us, we are in trouble. We must always be in awe of Him. Have you ever found yourself reading a passage like Isaiah 6, or the vision of Revelation 4 and 5, and there is nothing there? It feels dry and there is no awe. That is a very dangerous place to be. God is always so much greater, so much other than us, that nothing about Him is common.\n\n## V. Obey God (Verses 15-18)\n\nThe eyes of the Lord are on the righteous and His ears are open to their cry. The face of the Lord is against those who do evil.\n\nHave you ever heard the song by Frankie Valli, \"Can't Take My Eyes Off of You\"? Well, according to verses 15 and 16, God can't take His eyes off those who love obedience and are passionate about purity. He gazes on them with tenderness and warmth and loving affection, watching every move they make. His ears listen to every prayer, take note of every groan, are moved by every cry of anguish. Others may ignore you, but God won't — He cannot take His eyes off the righteous.\n\nAnd don't overlook the remarkable statement of verse 18: the Lord is near to those who have a broken heart and saves such as have a contrite spirit. The broken-hearted more than others are convinced that God is distant and remote and uninvolved. But it is the crushing spirit to whom the Lord is the closest, even if they don't feel that. God is near to them in their misery, quick and able to save and comfort and console them.\n\n## VI. Trust God (Verses 19-22)\n\nThe Lord redeems the soul of His servants and none of those who trust in Him shall be condemned.\n\nMany are bitter because God didn't seem to come through for them when they needed Him most. Someone told me recently that they don't believe in God anymore because they prayed about something and He never answered them the way they wanted. They laid hold of Him in their need and came up empty, they say. But God appears not to deliver the goods only because we trust Him for things He never promised.\n\nGod is not going to fulfill things He never promised. And it is not trusting God to demand that He do things our way according to our timetable, for our praise, and then turn around and get upset with Him because He didn't do the things He never promised to do.\n\nSo what can you and I trust God for? You can trust Him to provide you with eternal salvation for your soul, guidance and wisdom, forgiveness, spiritual satisfaction, joys that are full and abundant, pleasures that never end. You can trust Him never to leave you or forsake you. You can trust Him to be good and gracious and tenderhearted and kind. You can trust Him to orchestrate every event — even the evil ones — to work together for your ultimate spiritual good in conforming you to the image of Jesus Christ.\n\n## Conclusion\n\nHere you have Psalm 34 teaching us how to relate to God. We relate to Him by celebrating Him, by praying to Him, by tasting Him, by fearing Him, by obeying Him, by trusting in Him.\n\nLet us pray together. God, thank You for Your word. Help us to be in great awe of You. We pray that our hearts will not grow cold and we will not lose that great fear and reverence that we have for You. We thank You that You are a God who is worthy of our praise and adoration and fear. We pray that You would help us to live according to that truth. We pray in Jesus' name. Amen."};
