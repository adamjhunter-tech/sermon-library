window.LESSON_DATA = {"id": "undated-the-conscience-1-john-3-18-24", "title": "The Conscience", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": "1 John", "series_part": null, "parts": 1, "source_files": ["The Conscience - Pastor Tito Lyro - 1 John 3_18-24.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/the-conscience-part-2-pastor-tito-lyro-1-corinthians-8", "tags": [{"tag": "conscience", "source": "detected"}, {"tag": "assurance", "source": "detected"}, {"tag": "heart", "source": "detected"}, {"tag": "obedience", "source": "detected"}, {"tag": "brotherly love", "source": "detected"}], "scripture_references": [{"reference": "1 John 3:18-24", "type": "quoted", "source": "detected"}], "outline": ["God desires His people to know they are secure in His hands", "Love not in word only but in deed and truth (v.18)", "Assuring our hearts before God (v.19)", "If our heart does not condemn us, we have confidence toward God (v.21)", "Receiving answers to prayer through obedience (v.22)", "God’s commandment: believe in Christ and love one another (v.23)", "Abiding in God through the Spirit He has given (v.24)"], "summary": "Exposition of 1 John 3:18-24 on the Christian’s conscience and assurance. God desires His regenerate people to know they are secure in His hands, and John provides the test: love not in word only but in deed and truth. A clear conscience before God (not condemning us) gives confidence in prayer. The section closes with the double commandment of faith in Christ and love for one another as the marks of the one who abides in God.", "transcript": "## Introduction: The Question of Assurance\n\nGod desires that His people — those who have been born again and come to faith in Jesus Christ — know that they are secure in His hands. God wants His people to know that nothing can separate them from His love in Jesus Christ, and that they will persevere to the end.\n\nThroughout 1 John, the Apostle has been showing the church what true assurance of faith is built on. True assurance is built on three things: what you believe concerning Jesus Christ, whether you are following God’s commands, and whether you are loving the people of God in the church. That is why in 1 John 2:3, John says he is writing so that we may *know that we know* Christ.\n\nBut John is a pastor who has been in ministry for almost seventy years by the time he writes this letter. He knows that some in the church will hear what he says about assurance and feel unduly condemned. They will analyze themselves beyond what is needed and feel guilty when they should be fully assured. So he writes this passage — 1 John 3:18–24 — to address the conscience of those who are unnecessarily burdened.\n\nIn verses 19–21, John uses the word *heart* to represent specifically what we call the **conscience** — the whole standing for the part. Today we will consider what the conscience is, so that we can appreciate what John says in these verses.\n\n## What Is the Conscience?\n\nThe postmodern world sees the conscience as a defect — something that robs people of their self-esteem and should be eliminated. This idea traces back to Freud, whose goal was to liberate the *id* — the desires of the self — from the restraints of the *superego* (the conscience). Though Freudian terminology has largely fallen out of fashion, the underlying idea persists: guilt feelings are nearly always harmful, and we should do whatever we can to eliminate them.\n\nBut in actuality, **the ability to sense our own guilt is a tremendous gift from God**. God designed it into the very framework of the human soul. The conscience is the soul’s automatic warning system.\n\nIn 1984, an Avianca Airlines jet crashed into a mountainside in Spain. When investigators found the black box, they heard something horrifying: several minutes before impact, a synthesized computer voice had been repeating, *“Pull up, pull up, pull up.”* The pilot, believing the system was mistaken, reportedly said, *“Shut up, gringo,”* and turned it off. Two minutes later, everyone on board was dead. That is a parable of how we treat the warning messages of our conscience.\n\n## The Conscience Defined\n\nThe conscience is the **innate, from-birth ability to sense right and wrong**, and everyone possesses it:\n\n> *“For when Gentiles, who do not have the law, by nature do the things in the law, these, although not having the law, are a law to themselves, who show the work of the law written in their hearts, their conscience also bearing witness, and between themselves their thoughts accusing or else excusing them.”* (Romans 2:14–15)\n\nThe conscience is not a social construct built by the culture we grow up in. It is innate — even Gentiles who never heard the law of God have a conscience, because God put it in their hearts.\n\nThe conscience **intrigues us to do what we believe is right** and **restrains us from doing what we believe is wrong**. When we violate it, it condemns us with shame, anguish, regret, anxiety, and fear. When we follow it, it commends us with joy, serenity, and well-being.\n\nThe Hebrew word for *conscience* is *leb* — the same word as *heart* — because in the Hebrew mind the conscience is so intertwined with human nature that one word was sufficient for both.\n\nRichard Sibbes, a seventeenth-century Puritan pastor, described the conscience as a court in the counsel of the human heart, with several functions:\n- The **secretary** that records what we have done in exact detail (Jeremiah 17:1).\n- The **accuser** that lodges a complaint when we are guilty, and the **defender** that sides with us in our innocence (Romans 2:15).\n- The **witness** that gives testimony for or against us (2 Corinthians 1:12).\n- The **judge** that condemns or vindicates us (1 John 3:20–21).\n- The **executioner** that smites us with grief when guilt is discovered — as when David was troubled because he cut the corner of Saul’s robe (1 Samuel 24:5).\n\nSibbes even compared the punishment of an outraged conscience to a flash of hell — because in hell, every person will be constantly accused of all they have done against God.\n\n## The Conscience Can Be Silenced or Corrupted\n\nIt is possible to virtually nullify the conscience through repeated abuse. As Paul describes in Romans 1, when humanity persistently resists God and goes against conscience, depravity deepens — until at the lowest level, people not only do evil but *applaud* those who do it (Romans 1:32). Paul also says in Titus 1:15 that to those who are defiled and unbelieving, *“even their mind and conscience are defiled.”* And in 1 Timothy 4:2 he warns of those whose conscience has been *“seared with a hot iron”* — still functioning, but what is inside can no longer come out.\n\nOnce the conscience is silenced, you are flying blind and in greater danger than ever.\n\nYet the most silenced conscience will not remain silent forever. On judgment day, every person’s conscience will side with God, the righteous judge.\n\n## The Conscience Is Not Infallible\n\nThe conscience is not the source of moral revelation. It is not designed to teach us what is right and wrong. It is designed to hold us accountable to the highest standards of right and wrong we already know and believe to be true.\n\nThis means our conscience may hold us to wrong standards if we believe wrong things. **The conscience can be reprogrammed.** The world knows this — that is why it forces ungodly ideas upon children at earlier and earlier ages, to reprogram the conscience so that what is good is called evil and what is evil is called good.\n\nWe may need to protect our children from public school. But we cannot abandon public schools altogether, because the next generation we want to bring to Christ is attending them. If an entire generation’s conscience is reprogrammed against the truth of Scripture, it becomes harder for them to hear the gospel.\n\n## How Is the Conscience Cleansed?\n\nThe primary way the conscience is cleansed is **by the blood of Christ in our salvation**:\n\n> *“Let us draw near with a true heart in full assurance of faith, having our hearts sprinkled from an evil conscience and our bodies washed with pure water.”* (Hebrews 10:22)\n\n> *“How much more shall the blood of Christ, who through the eternal Spirit offered Himself without spot to God, cleanse your conscience from dead works to serve the living God?”* (Hebrews 9:14)\n\nGod designed the conscience to drive us to Himself in Christ Jesus. That is the only way it can be truly cleansed. Christ’s sacrifice accomplished what the blood of bulls and goats could never accomplish. Our sins are imputed to Him; His righteousness is imputed to us.\n\nSo when our conscience mercilessly condemns us, the blood of Christ cries out for forgiveness. As John writes elsewhere:\n\n> *“If we confess our sins, He is faithful and just to forgive us our sins and to cleanse us from all unrighteousness.”* (1 John 1:9)\n\n> *“If anyone sins, we have an Advocate with the Father, Jesus Christ the righteous.”* (1 John 2:1)\n\n## Conclusion\n\nBrothers and sisters, God in His great love has given us a warning system designed to point us to Christ. That system has been corrupted by sin and sometimes goes off when it should not. Yet even in its corrupted state, it points us to Christ.\n\nIf your conscience is convicting you of something — anything — do not ignore it. Take it seriously and run to Christ. Even if you are feeling bad about the wrong thing, run to Christ. It is His blood that cleanses the conscience."};
