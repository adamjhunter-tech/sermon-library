window.LESSON_DATA = {"id": "undated-self-control-galatians", "title": "Self-Control", "speaker": "Pastor Tito Lyro", "date": null, "session": "SS", "series": null, "series_part": null, "parts": 1, "source_files": ["Self-Control - Galatians 5_16-23 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/self-control-galatians-516-23-pastor-tito-lyro", "tags": [{"tag": "self-control", "source": "detected"}, {"tag": "fruit of the Spirit", "source": "detected"}, {"tag": "sanctification", "source": "detected"}, {"tag": "sin", "source": "detected"}, {"tag": "heart", "source": "detected"}, {"tag": "Holy Spirit", "source": "detected"}, {"tag": "theology", "source": "detected"}, {"tag": "greed", "source": "detected"}, {"tag": "idolatry", "source": "detected"}], "scripture_references": [{"reference": "Galatians 5:13", "source": "ai"}, {"reference": "Galatians 5:16-24", "source": "ai"}, {"reference": "Proverbs 4:23", "source": "ai"}, {"reference": "Proverbs 19:15", "source": "ai"}, {"reference": "2 Peter 1:5-9", "source": "ai"}, {"reference": "2 Timothy 3:1-5", "source": "ai"}, {"reference": "Genesis 3", "source": "ai"}, {"reference": "Genesis 4", "source": "ai"}, {"reference": "Genesis 6:5", "source": "ai"}, {"reference": "2 Samuel 11", "source": "ai"}, {"reference": "1 Kings 11", "source": "ai"}, {"reference": "Ecclesiastes 2:10", "source": "ai"}, {"reference": "Matthew 12:35", "source": "ai"}, {"reference": "Ezekiel 36:26-27", "source": "ai"}, {"reference": "Colossians 3", "source": "ai"}, {"reference": "Romans 13:14", "source": "ai"}, {"reference": "Titus 1", "source": "ai"}, {"reference": "1 Corinthians 9:27", "source": "ai"}], "outline": [{"title": "I. Biblical Theology of Self-Control: The Pervasiveness of Its Lack", "subpoints": ["Eve could not control herself from the fruit (Genesis 3); Cain killed his brother from uncontrolled anger (Genesis 4)", "The flood generation: God saw that every intention of man's heart was evil continually — a total lack of self-control (Genesis 6:5)", "The period of the judges: everyone did what was right in his own eyes", "David could not take his eyes off Bathsheba — leading to adultery and murder (2 Samuel 11)", "Solomon multiplied wives in violation of Deuteronomy 17 — lack of self-control ended in idolatry (1 Kings 11)", "The entire monarchy period plagued by self-control failures; Ecclesiastes 2:10 summarizes", "Ed Welch: lack of self-control is related to greed expressing itself; in the Old Testament it expresses as idolatry, which is always worship of self"], "scripture": ["Genesis 3", "Genesis 4", "Genesis 6:5", "2 Samuel 11", "1 Kings 11", "Ecclesiastes 2:10"]}, {"title": "II. Self-Control in the New Testament and Its Root", "subpoints": ["In the NT, idolatry recedes as the main expression; sinful desires and lusts take the dominant role", "The lists of sins in Paul's epistles are always manifestations of an unchecked heart", "Self-control is a fruit of the Spirit — a result of walking in the Spirit (Galatians 5:16-24)", "Peter connects self-control to faith — only a regenerated heart can exercise biblical self-control (2 Peter 1)", "Paul makes self-control essential for church officers (Titus 1)", "Self-control is rooted in the heart — growth starts with evaluating and protecting the heart", "2 Timothy 3:1-5: lack of self-control is the result of being a lover of self rather than a lover of God"], "scripture": ["Galatians 5:16-24", "2 Peter 1:5-9", "Titus 1", "2 Timothy 3:1-5"]}, {"title": "III. Guarding the Heart: Proverbs 4:23", "subpoints": ["Above all else, guard your heart, for out of it spring the issues of life", "The heart is the ethical center of the person — the center of morality driving actions", "Three ways to guard the heart (Charles Bridges): guard it like a spring that is the only source of water for a city; look inward so nothing evil comes out; know what is in your heart"], "scripture": ["Proverbs 4:23"]}, {"title": "IV. Sloth as Lack of Self-Control: Proverbs 19:15", "subpoints": ["Laziness casts one into a deep sleep; an idle person will suffer hunger", "The ancient Greek translation (LXX) translated the Hebrew word group for laziness with the Greek word for lack of self-control", "Sloth and laziness are therefore expressions of lack of self-control"], "scripture": ["Proverbs 19:15"]}, {"title": "V. Walking by the Spirit: Galatians 5:13-24", "subpoints": ["Freedom in Christ is freedom to serve others, not freedom to serve self (Galatians 5:13)", "Walk by the Spirit and you will not fulfill the desires of the flesh (5:16)", "The works of the flesh are the anti-fruit of the Spirit — the opposite of walking in the Spirit", "Those characterized by the works of the flesh have no reason to think they will inherit the kingdom of God", "The fruit of the Spirit (including self-control) is singular — all must be present in the believer, perhaps in different measures", "To produce the fruit of the Spirit, do not pursue fruit directly — pursue walking in the Spirit, which is obedience to God's Word", "Growth in self-control comes from a life lived in obedience to what the Holy Spirit says in His Word"], "scripture": ["Galatians 5:13", "Galatians 5:16-24"]}, {"title": "VI. Adding Virtue to Faith: 2 Peter 1:5-9", "subpoints": ["For this very reason, giving all diligence, add to your faith virtue, knowledge, self-control, perseverance, godliness, brotherly kindness, love", "Peter describes the believer's glorious position in Christ (2 Peter 1:3-4) — then commands diligent effort", "This is not passive — it is making every effort to add these virtues, not waiting for them to appear", "Lacking these things means one has forgotten that they have been cleansed from their former sins"], "scripture": ["2 Peter 1:5-9"]}], "summary": "Pastor Tito Lyro delivers a standalone Sunday school lesson on self-control, the fruit of the Spirit he personally chose to study in depth as a school project because he recognizes it as an area of personal need. The lesson opens with a sweeping biblical theology of self-control — or rather, the lack of it — from Eve and Cain through the flood generation, the judges period, David, Solomon, and the entire monarchy era. Ed Welch's insight is introduced: lack of self-control is greed expressing itself, and in the Old Testament that greed characteristically expressed itself as idolatry, which always reduces to worship of self.\n\nThe heart of the lesson is the exposition of Galatians 5:13-24. Paul's command to walk by the Spirit is the key: walking by the Spirit produces the fruit of the Spirit (including self-control), while failing to walk by the Spirit produces the works of the flesh (the anti-fruit). The command is not to produce the fruit directly but to walk in the Spirit — which means a life of obedience to what the Holy Spirit says in His Word, not a mystical exercise. This fruit is singular, meaning all nine characteristics must be present in varying measures in every believer. The lesson also draws on Proverbs 4:23 (guard your heart, the source of all issues of life), Proverbs 19:15 (laziness as lack of self-control according to the Septuagint), 2 Peter 1:5-9 (diligently adding virtue to faith), and 2 Timothy 3:1-5 (love of self as the root of self-indulgence). The closing application notes that secular 12-step programs and cognitive behavioral therapy cannot produce biblical self-control, since that is the fruit of the Spirit and requires regeneration.", "transcript": "## Introduction\n\nSo this is not part of the discipleship series. We finished that series last week. This is supposed to be a standalone lesson. One of the things I got to do this past term in school was to work on a self-counseling project — choose an area where I thought I needed more help than others, then do a really deep dive into what the Scriptures say about it, keep track of growth, and hopefully the Lord would use that to help me grow.\n\nThe area I picked was self-control, because it is an area that I need a lot of help in. I struggle with it and want to master it in my life. And the more I studied it, the more I saw that lack of self-control is insidious — it's everywhere. We see that throughout the Bible, we see it in our culture, we see it in the church in general.\n\nSo what I wanted to do this morning is to take a brief look at the Scriptures as a whole and see what they say about self-control. Then I wanted to look at five or six individual passages as we build a way in which we can be helped by the Spirit to grow in self-control.\n\n## I. Basic Biblical Theology of Self-Control\n\nAs we look at the theme of self-control through the Scriptures as a whole — we don't find a theme of self-control so much as we find a theme of lack of self-control among God's people.\n\nGo back to the garden. Eve couldn't control herself — she realized the fruit of the tree of the knowledge of good and evil was good to the eye, pleasant to the smell, and looked like it tasted good. So she didn't practice self-control and ate of the fruit.\n\nCain didn't control himself. Once he found out that God accepted Abel but did not accept him, he let it go — and it ended up in killing his brother.\n\nThe generation upon which the flood came (Genesis 6:5): God looked and saw a people who had no restraints in their hearts, practicing wickedness every single day — that whole generation characterized by a lack of self-control that resulted in the destruction of the world.\n\nRemember the refrain of Judges? There's no king in the land, and every man did what was right in his own eyes. That indicates a general lack of self-control — people just doing whatever their hearts told them without any restraint.\n\nDavid, the man after God's own heart, lacks self-control when he can't take his eyes off Bathsheba bathing — 2 Samuel 11 — which resulted in adultery and murder. His son Solomon didn't fare much better — he didn't take heed to Deuteronomy 17's command not to multiply wives, and his lack of self-control ended up with a thousand wives in 1 Kings 11.\n\nIf you think about the entire monarchy period — from David all the way to the exile — it is marked by a lack of self-control on the part of the kings of Israel and Judah, with the exception of a handful of good kings in Judah.\n\nSo as far as lack of self-control goes, the Old Testament could be summarized by Solomon's statement in Ecclesiastes 2:10: and whatever my eyes desired, I did not keep from them. I kept my heart from no pleasure, for my heart found pleasure in all my toil. That's a good picture of the people of God in the Old Testament.\n\nYou may have heard of Ed Welch — a good author, does a lot of study on the brain. He suggests that lack of self-control is related to greed expressing itself. Along with the lack of control, you're always going to find a greedy heart — often the lack of self-control is the expression of that greedy heart.\n\nIn the Old Testament, lack of self-control expressed itself as idolatry, which if you think about it always boils down to the worship of self. So the idea of greed makes sense here.\n\nWelch also says that at the heart of idolatry is recklessness, and it's not surprising that runaway desires play a part consistently in false worship. If false worship is always trying to worship a god — or even the true God — in the way that we want to do it, not in the way that God wants to be worshiped... It's interesting that if you look at Deuteronomy 12, a chapter on worship, it covers two areas: God says, don't worship false gods, and also, don't worship Me, the true God, falsely, according to your own devices.\n\nWhen you come to the New Testament, the theme of idolatry is less prominent. There's a shift — instead of idolatry being the main way lack of self-control is displayed, now it's lusts and sinful desires. If you examine the lists that Paul has in the New Testament, you will see that the sins listed are all results of an unchecked heart.\n\nIn Galatians 5, we're going to see that self-control is a result — a byproduct — of walking by the Spirit. And in 2 Peter 1, Peter connects self-control to faith — it flows from a regenerated heart, since faith is only present in a heart that has been changed by the Holy Spirit. An unbeliever cannot exercise biblical self-control.\n\nPaul makes clear in Titus 1 that self-control is an essential characteristic of those who would serve in the offices in the church.\n\nAs we close this overall systematic look at self-control through the Scriptures: self-control is rooted in the heart, since all the issues of life flow from the heart. Growth in self-control starts with evaluating and protecting the heart. And the Lord Jesus Christ himself is the ultimate example of self-control — His ministry is bookended by two events that show this. At the start of His ministry, after being baptized by John the Baptist, the Spirit takes Him into the wilderness, He spends 40 days without food, and when He's tempted by Satan (whose first temptation is to turn rocks into bread), Jesus exercises self-control in very difficult circumstances. And at the end of His ministry, the night before His crucifixion, He goes through several trials, is beaten, falsely accused, and could stop it at any moment — but He controls Himself to fulfill the Scriptures.\n\nAny questions about this 30,000 foot overview?\n\n## II. Proverbs 4:23 — Guard Your Heart\n\nProverbs 4:23: Keep your heart with all diligence, for out of it spring the issues of life.\n\nWhat is this passage saying? The heart controls everything a person is or does. Everything springs out of the heart. In the book of Proverbs, Solomon says the heart controls one's facial expression, one's tongue, one's mind, among other things.\n\nIf you look at the context of Proverbs 4:23, the exhortation to keep the heart precedes the exhortation to live an outwardly moral, self-controlled life. In verses 24-27, Solomon describes an outwardly moral and self-controlled life: put away from you deceitful lips, let your eyes look straight ahead, ponder the path of your feet. These are all outward demonstrations of self-control that flow from the guardian of the heart in verse 23.\n\nKeil and Delitzsch are two German Old Testament scholars who wrote a massive commentary on the Old Testament. When commenting on this passage, they emphasize the importance of guarding one's heart by translating this verse as: above all other things that are to be guarded, keep thy heart, for out of it life has its issues. Above everything else that needs to be guarded, guard your heart.\n\nThe heart is a poetic way to refer to what is at the core of a person — what a person really is. It is the ethical center, the center of morality, the place called the conscience.\n\nCharles Bridges, in his massive commentary on Proverbs, says there are at least three ways that we guard our hearts. First: guard our heart as we would guard a spring that is the only source of water for a city. If that's the only place where the water comes from, you're going to guard it. You don't want it contaminated — think of Flint, Michigan, when the water got contaminated with lead. That's the heart: if the source is poisoned, the whole city is poisoned. Second: guard the heart so that nothing evil comes out of it. Like sentinels watching the wall of a city, watching for enemies coming in — but also looking inward to make sure enemies are not coming out. Third: guard the heart by watching it — knowing what is in your heart.\n\n## III. Proverbs 19:15 — Sloth as Lack of Self-Control\n\nProverbs 19:15: Laziness casts one into a deep sleep, and an idle person will suffer hunger.\n\nYou might say: there's nothing about lack of self-control here. The reason I'm including this is that the ancient Greek translation of the Old Testament — the Septuagint, referred to as the LXX — translated the Hebrew word group for laziness or sloth with the Greek word group for lack of self-control. This was a translation made when people were still speaking the language, and they understood sloth and laziness to be lack of self-control. If we're lazy, if we're slothful, if we're idle, it means we're expressing a lack of self-control in our lives.\n\n## IV. Galatians 5:13 — Freedom to Serve\n\nGalatians 5:13: For you, brethren, have been called to liberty; only do not use liberty as an opportunity for the flesh, but through love serve one another.\n\nIn the argument of the letter to the Galatian churches, Paul has just finished a long section dealing with freedom from the ceremonial law. False teachers had come in teaching that salvation came through faith in Jesus Christ AND obedience to the Mosaic law — especially the ceremonial laws. Paul goes out of his way to show that salvation is solely by faith alone through Christ alone by the grace of God alone.\n\nHaving clearly demonstrated that the Mosaic covenant is fulfilled in Christ and that its demands no longer have dominion over the believer, Paul clarifies what that freedom means. This freedom — verse 13 — is not the ability to do whatever you want. It is the ability to deny self for the glory of God and the good of others. You are not freed to serve self, but freed to serve God and serve others.\n\n## V. Galatians 5:16-24 — Walking by the Spirit\n\nGalatians 5:16: I say then, walk in the Spirit and you shall not fulfill the lust of the flesh.\n\nSelf-control is described as a fruit of the Spirit — a result of the work of the Spirit in the believer. The fruit is the result, not the cause; the fruit is the byproduct of something else.\n\nThe Greek word behind self-control in verse 23 is enkrateia. According to the New Testament Theological Dictionary, this word denotes power or lordship, expressing the power and lordship one has over oneself or over something else. In the Bible, this word group is always used about one's power over oneself.\n\nNow Paul contrasts the fruit of the Spirit with the works of the flesh. The works of the flesh in verses 19-21 — adultery, fornication, uncleanness, lewdness, idolatry, sorcery, hatred, contentions, jealousies, outbursts of wrath, selfish ambitions, dissensions, heresies, envy, murders, drunkenness, revelries — are the anti-fruit of the Spirit. The exact opposite of walking in the Spirit.\n\nI want to say a related note here. The person who is growing in self-control must also be growing in love, joy, peace, patience, kindness, goodness, faithfulness, and gentleness, because the Holy Spirit refers to them as a single fruit — singular in verse 22. These things must be manifested in the life of the Christian who is walking in the Spirit.\n\nNow, how do we produce the fruit of the Spirit? The connection is not explicitly stated, but it is clear. Paul contrasts walking by the Spirit with gratifying the flesh in verse 16, saying that if you do the one you will not do the other. He connects gratifying the flesh with the works of the flesh in verses 16 and 18 — gratifying the flesh is the same as the works of the flesh. So:\n\n- If you are not walking by the Spirit → you will produce the works of the flesh.\n- If walking by the Spirit → it produces the fruit of the Spirit.\n\nSo the expectation here is not to pursue the fruit of the Spirit directly. The expectation is to walk in the Spirit. To walk by the Spirit, to live a life that is controlled by the Holy Spirit, means a life lived in obedience to what the Holy Spirit says in His word. There is very little mysticism here. It's a life of obedience to what He says in His Word, which is the word of the Holy Spirit. Growth in self-control comes from obedience to the Word of God.\n\n*[Q&A: What about someone whose life is characterized by the works of the flesh — are they saved?]*\n\nIf the movie of your life — not one scene, but the film as a whole — shows that this person is characterized by adultery, by fornication, by sorcery (and by the way, the Greek word for sorcery here is related to pharmacology — getting high to access the spirit world) — if that characterizes your life, you have no reason to think you're in the kingdom of God.\n\nNow God knows the heart and the Spirit. We don't make declarations about the heart. But we are called to make declarations about the fruit.\n\n*[Q&A: What about mortification practices — disciplining the body, fasting?]*\n\nI think mortification of the flesh is not just a Catholic tradition — it's a very much Protestant and biblical tradition. The point of Colossians 3 is to kill the flesh. Romans 13:14: put on Christ and make no provision for the flesh. Paul talks about bringing his body under control in 1 Corinthians 9:27 — not because he is sinful there, just talking about being a master of his physical existence, having his body in top shape for the fight. And he does that because of the grace of God, not in order to achieve something. We mortify the flesh not to earn favor with God but because we have been given favor with God.\n\n## VI. 2 Peter 1:5-9 — Adding Self-Control to Faith\n\nBut also for this very reason, giving all diligence, add to your faith virtue, to virtue knowledge, to knowledge self-control, to self-control perseverance, to perseverance godliness, to godliness brotherly kindness, and to brotherly kindness love. For if these things are yours and abound, you will be neither barren nor unfruitful in the knowledge of our Lord Jesus Christ. For he who lacks these things is shortsighted, even to blindness, and has forgotten that he was cleansed from his old sins.\n\nHere I want you to notice: Peter in verses 3-4 has described the glorious position of the Christian in Christ. He is in Christ, part of the inheritance of God, standing before God, belonging to God in Christ — having escaped from the corruption that is in the world because of sinful desires. That is where you are.\n\nThe cause of that — the logical result — is the word therefore in verse 5: but also for this very reason, giving all diligence. Because of who you are in Christ, because of the abundance of the grace of God in your life — work hard at adding all these virtues to your faith.\n\nThis is not passive. The Christian will work hard at growing in self-control.\n\n## VII. 2 Timothy 3:1-5 — Self-Indulgence and Love of Self\n\nBut know this, that in the last days — and in the writings of Paul, we are in the last days — perilous times will come. For men will be lovers of themselves... and then he follows with 18 characteristics completing that with \"rather than lovers of God.\"\n\nSeveral commentators, including John Stott, suggest that the 18 terms Paul lists here are all a description of being a lover of self. One of them is lack of self-control. So lack of self-control is a demonstration of an inordinate love for self.\n\nIf you struggle with excessive drinking or pornography or some other area of self-indulgence, often the thinking goes: I had a really good day, I was a really good boy today, I deserve a reward — so I'm going to do a little pornography. Or, I really had a bad day, it's dark, so I deserve some relief. That's nothing more than a rationalization of love of self — you just wanted to give yourself what you want.\n\n*[Q&A: Can we command the love of self?]*\n\nThe Bible doesn't have any process for teaching us to love ourselves. It says love your neighbor as yourself — assuming you already know what that means. You all know what it looks like to love yourself: just focus on you. The Bible says don't have to work on it — that's natural. Use that same energy to love other people instead.\n\n## Conclusion\n\nBecause self-control as defined by the Bible is a result of walking or living by the Spirit, only those who have been regenerated by the Spirit can truly have biblical self-control. Two implications:\n\nOne: secular programs that follow a 12-step model do not produce biblical self-control, because you're following a god as you conceive of him — and the god you conceive of is yourself.\n\nTwo: psychotherapy or strategies like cognitive behavioral therapy will not produce biblical self-control. I've heard someone say that CBT is like rearranging the furniture on the deck of the Titanic — it's going to look better. But you know what's happening underneath.\n\nLet's pray. Father, thank You for Your word and for the practicality of it. We pray that we all will be able to walk in the Spirit, to be obedient to Your word, that we might experience the fruit of the Spirit in our lives. We pray in Jesus' name. Amen."};
