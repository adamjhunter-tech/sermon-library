<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-what-god-requires-of-us-micah-6-1-8", "title": "What God Requires of Us", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["What God Requires of Us - Pastor Tito Lyro - Micah 6_1-8.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/what-god-requires-of-us-pastor-tito-lyro-micah-61-8", "tags": [{"tag": "justice", "source": "detected"}, {"tag": "mercy", "source": "detected"}, {"tag": "humility", "source": "detected"}, {"tag": "covenant", "source": "detected"}, {"tag": "obedience", "source": "detected"}], "scripture_references": [{"reference": "Micah 6:1-8", "type": "quoted", "source": "detected"}], "outline": ["Introduction: God's covenant lawsuit against Israel", "God's reminder of His saving acts from Egypt to Canaan", "What shall I bring before the LORD? — Israel's questions", "The answer: not burnt offerings, not rivers of oil", "What does the LORD require? — justice, mercy, and humility", "Doing justice, loving mercy, walking humbly with God", "Conclusion: The simplicity and profundity of God's requirements"], "summary": "Pastor Tito Lyro preaches from Micah 6:1-8, where God brings a covenant lawsuit against His people. After recounting His saving acts, God declares through Micah that He requires not elaborate sacrifices but the simple yet profound call: to do justice, love mercy, and walk humbly with God.", "transcript": "## Introduction: God's Patient Dealings with His People\n\nThroughout the prophets of the Old Testament, we see that God is patient with His people. God promised to be merciful to a thousand generations, and we see that unfolding in the Old Testament with His patience toward His people. And we have all experienced that in our own lives — God is patient with us. Even when He confronts His people for their sins, He does it patiently and lovingly.\n\nNow, eventually in the Old Testament we see Israel being taken captive, and we say, that was quite a judgment upon them. But remember that it followed years — centuries, actually — of God's calling them to repentance. The same will be true at the last judgment: the Lord will raise the wicked for judgment and they will be severely punished for their sins, but that will be after thousands of years of pleading with the nations to come to Him. The Lord is patient, and He deals with us even in judgment — even in confronting us with our sins — lovingly and patiently.\n\n## The Covenant Lawsuit: Setting the Scene\n\nThe people of God in Micah had been murmuring against God. They said they got the short end of the stick in the covenant God had made with them. They were complaining that God was overburdening them — that He was wearying them — and that they probably would have been better off with the gods of the nations.\n\nSo in the passage before us, God brings the facts into the picture and convenes a court to adjudicate between Himself and the people who are bringing an accusation against Him.\n\nNow, Israel had broken the covenant God had made with them. God had every right to punish them without explanation — to squash them like a bug without giving any account. And yet God comes before them and explains what is going on. The people had forgotten how God had always borne their burdens, and were complaining about the new burden on the horizon.\n\nMicah was written at about the same time as the prophecy of Isaiah — in fact the outline of Micah is essentially the same as the outline of Isaiah. We learn that the burden they are charging God with is the presence of the Assyrians just outside the northern tribes, ready to invade. The Assyrians were probably the most cruel of all the world-dominating empires in history. The people said: *God doesn't love us. Here we are, such a good people — and now the Assyrians are about to take us captive.* So God convenes this court to show them that their version of reality is not reality.\n\nThe picture here is that Micah the prophet is the bailiff — the one who organizes the proceedings, swears witnesses in, presents evidence, and so on. God is the plaintiff. The people are the defendants.\n\n## God Calls Creation as Witness (vv. 1-2)\n\n> *\"Hear now what the Lord says: 'Arise, plead your case before the mountains, and let the hills hear your voice. Hear, O you mountains, the Lord's complaint, and you strong foundations of the earth; for the Lord has a complaint against His people, and He will contend with Israel.'\"* (Micah 6:1-2)\n\nGod calls His creation as witness — specifically the mountains and the hills — because they have been present as silent observers throughout everything God has ever done toward His people. A commentator on Micah writes: the mountains are to be summoned to concur in the divine judgment, with their knowledge of generations of man's misdeeds upon which they have gazed as silent observers since time immemorial.\n\nThere is another element here. In Deuteronomy, as Israel was about to cross into the Promised Land, Levites were stationed on one hill and Levites on another, and they uttered the blessings and curses as Israel walked through the valley between them. The mountains were witnesses to God's part in the covenant and to Israel's part in the covenant. Now the mountains again witness to the trial.\n\n## God Pleads His Case (vv. 3-5)\n\n> *\"O My people, what have I done to you? And how have I wearied you? Testify against me.\"* (Micah 6:3)\n\nGod asks Israel: what wrong have I done to you? And notice — despite all the unfaithfulness of Israel, God still calls them *My people*. He does not say \"you people\" or \"you wicked ones.\" He says, *What have I done against you, My people?* Is this not encouraging? Even when we are not faithful to God, He does not abandon us and still looks upon us as His people. Even in the moments of your worst day, as far as sin is concerned, God still calls you mine.\n\nThat is the only comfort the psalmist had in Psalm 88, which is the only psalm in the Psalter that does not end with resolution — the man starts at the bottom of the pit and ends having dug a little further down. Yet he prays to the God of my salvation. *God is my God* — that consolation remains, even in the time of deepest struggle.\n\nThe word *wearied* means burdened. God is asking: How have I burdened you? What is it that I brought upon you that you are accusing Me of?\n\nIsrael was accusing God of having put so many burdens on their backs that they had to seek other gods for relief. They were literally thinking: *God is so demanding that we have to go to the gods of the nations to cope.* We look at this and think, how dare they. And yet we are often guilty of the same thing. We rebel against the authorities God has placed over us. We are discontent and depressed about the place God has put us in. We refuse to believe what God says in His holy Word. These are all ways of expressing the same thing in our hearts — that the things God calls us to do are burdens rather than blessings.\n\nAll of these are things that must be repented of. And we have far more in common with Israel in the time of Micah than we would care to acknowledge. The beauty, though, is that every time we repent of our sins and turn to Christ, God will lovingly forgive us. There is never a time when that is not true.\n\nOur God is not in the business of burdening us; He is in the business of unburdening us. That is what our Lord says in Matthew 11:28-30:\n\n> *\"Come to Me, all you who labor and are heavy laden, and I will give you rest. Take My yoke upon you and learn from Me, for I am gentle and lowly in heart, and you will find rest for your souls. For My yoke is easy and My burden is light.\"* (Matthew 11:28-30)\n\nAt the close of verse 3, God says: *Testify against Me.* Show the evidence that I have done something wrong against you. And Israel had no evidence of God's unfaithfulness to them. We too tend to forget that God bears whatever burden He gives us. We have no evidence that He has burdened us — we have every kind of evidence that whatever burden comes to our lives, He carries it for us.\n\n> *\"Humble yourselves under the mighty hand of God, that He may exalt you in due time, casting all your care upon Him, for He cares for you.\"* (1 Peter 5:6-7)\n\nWe also should be able to relate to Christian in *Pilgrim's Progress*, when that great burden fell off his back because Christ had taken it upon Himself.\n\n## God Presents His Evidence (vv. 4-5)\n\nGod brings evidence that He has never burdened Israel — quite the opposite.\n\n> *\"For I brought you up from the land of Egypt, I redeemed you from the house of bondage; and I sent before you Moses, Aaron, and Miriam. O My people, remember now what Balak king of Moab counseled, and what Balaam the son of Beor answered him... that you may know the righteousness of the Lord.\"* (Micah 6:4-5)\n\nGod freed them from slavery. He gave them godly leaders — Moses, Aaron, and Miriam — to lead them. He protected them from their enemies: Balak hired Balaam to curse Israel, and God turned that curse into blessing. And He revealed Himself to them as the righteous God.\n\nAs I read this passage, I am reminded of God's faithfulness to me. He has delivered me from my sins. He has provided godly people to lead me in my life. He has protected me against the attacks of Satan. And He has revealed Himself to me in His Word as righteous — and as righteous *in Him* through Jesus Christ.\n\n## Israel's Response: Trying to Bribe God (vv. 6-7)\n\nAs the people heard the evidence — as they heard the case God had against their claim that He had burdened them — they suddenly realized: *We made a mistake.* There is a change of speaker in verse 6. The people are speaking now. They realized that God was displeased with them and that the evidence was on His side. And yet instead of repenting and turning to God in faith, they decided to bribe Him — as if God were like the gods of the nations.\n\n> *\"With what shall I come before the Lord, and bow myself before the High God? Shall I come before Him with burnt offerings, with calves a year old? Will the Lord be pleased with thousands of rams, ten thousand rivers of oil? Shall I give my firstborn for my transgression, the fruit of my body for the sin of my soul?\"* (Micah 6:6-7)\n\nThis is the attitude of trying to bribe the Lord. First they consider calves — the most expensive and desirable offering. But maybe that is not enough. How about thousands of rams? There is escalation here: not just calves — thousands of rams! Surely God will think we are the greatest, and we can buy His favor back. Still not enough — how about ten thousand rivers of oil? And finally: how about our firstborn?\n\nIt is interesting that they think sacrificing their firstborn will gain God's favor — when the entire plan of God is for Him to give His own firstborn, His only Son, so that His people may be saved.\n\nNotice that every one of these offerings is not what God prescribed. They are trying to come up with their own way to earn God's favor, which is an impossibility anyway. A calf was not the prescribed sin offering — the standard offering was a lamb or sheep. Remember what John the Baptist says: *Behold, the Lamb of God who takes away the sin of the world!* A few drops of oil was all that God asked for in the sacrifices. And human sacrifice was an abomination to the Lord.\n\nThey are borrowing from the worship of the gods of the nations, thinking somehow that the true God will be pleased with the false worship given to false gods. And we too are tempted at times to approach God in ways that are not His ways. God is not interested in our inventions for how to approach Him. He wants to be approached the way He tells us in the Bible — simply through faith in Jesus Christ. We do not have to earn His favor, because Christ has already earned it for us. The only thing we need to bring before God is the blood of Jesus Christ, crucified and risen on our behalf.\n\nWe might find ourselves trying to buy God's favor as well. *If I come to church all the time, God won't be angry with me. If I pray long prayers, God will like me. If I suffer for the gospel's sake, God will be my friend. If I punish my body in some way, I will find favor.* All these are thousands of rams, calves, rivers of oil — we are trying to present them to the Lord as if our doing will accomplish something.\n\n> *\"But we are all like an unclean thing, and all our righteousnesses are like filthy rags; we all fade as a leaf, and our iniquities, like the wind, have taken us away.\"* (Isaiah 64:6)\n\nWe cannot do anything good enough to earn God's favor. But we do not have to. He freely gives it to us.\n\n> *\"Now hope does not disappoint, because the love of God has been poured out in our hearts by the Holy Spirit who was given to us... God demonstrates His own love toward us, in that while we were still sinners, Christ died for us.\"* (Romans 5:5, 8)\n\n## God's Answer: What He Actually Requires (v. 8)\n\nIn verse 8, there is another change of speaker. It is not God; it is not Israel. It is Micah the prophet, confronting the people.\n\n> *\"He has shown you, O man, what is good; and what does the Lord require of you but to do justly, to love mercy, and to walk humbly with your God?\"* (Micah 6:8)\n\nMicah says: *God has already shown you.* He is referring back to what God had already said in Deuteronomy. Israel was acting as if God had never given them direction. And Micah says: go back to the Word. Do not claim ignorance, people of God. God has already told you exactly what you need to do.\n\nThere could be no better teacher than God Himself to show us what we should do. And notice: it says *He has shown you, O man* — the word for man here is the inclusive Hebrew word *adam*, encompassing all humankind. God has shown every person what He requires. There is no mystery in what God requires of us. You can insert your own name here: *He has shown you, [your name], what is good.* Deep down, every person in the world knows there is no mystery.\n\nAnd notice that what God requires is called *good*. In verse 8, *what is good* and *what does the Lord require of you* are in parallel — they are synonyms. Everything God requires of us is a good thing.\n\n## The Three Requirements\n\n**To do justly.** The old Baptist pastor John Gill, writing about this passage, says: to be just is to hurt no man's person, property, or character — to give to everyone their due, and to do as you would desire to be done by. Do not defame, do not steal, do not damage what belongs to another. Give everyone their due: give praise where praise is due and offer criticism that is given in truth and love. And do nothing you would not wish done to you.\n\n**To love mercy.** The Hebrew word translated *mercy* (*hesed*) has a broad range of meaning: mercy, kindness, loving-kindness, covenant faithfulness, goodness, favor, compassion, pity. Micah says that we are not only to be merciful — we are to *love* being merciful. Mercy is to be the desire of our hearts as we deal with one another.\n\n**To walk humbly with your God.** In the Bible, to walk with someone is to live daily in that person's footsteps. God wants to have fellowship with us — He wants us to walk with Him daily, as Adam walked in the garden with God. Like Jacob, we should wrestle with God in prayer. Like Mary, we should sit at Jesus' feet and listen to Him. In worship we should have a sweet fellowship with Jesus. In devotion we should listen to His Word as we walk with our God.\n\nHumility is equivalent to selflessness — what John the Baptist meant when he said *He must increase, but I must decrease.* In humility, we know that although we are not worthy of the air we breathe, God sent His only Son to die for us. That is what humility is.\n\n## Conclusion\n\nIf you combine these four elements — justice, mercy, fellowship with God, and humility — you get two pairs. Justice and mercy equate to loving your neighbor. Fellowship with God and walking humbly with God express the idea of loving God with all your being. That is what God has called us to do: to love Him and to love our neighbors.\n\nWe like to make things complicated. But what God requires of us is not complicated. He has shown you, O man, what is good. What does the Lord require of you but to do justly, love mercy, and walk humbly with your God?\n\nIn summary: love the Lord your God and love His people as you love yourself."};
