<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-sing", "title": "Sing!", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": "Ephesians", "series_part": null, "parts": 1, "source_files": ["Sing! - Pastor Tito Lyro - Ephesians 5_15-21.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/sing-pastor-tito-lyro-ephesians-515-21", "tags": [{"tag": "worship", "source": "detected"}, {"tag": "singing", "source": "detected"}, {"tag": "Holy Spirit", "source": "detected"}, {"tag": "corporate worship", "source": "detected"}, {"tag": "sanctification", "source": "detected"}], "scripture_references": [{"reference": "Ephesians 5:15-21", "source": "ai"}, {"reference": "Colossians 3:16", "source": "ai"}, {"reference": "Psalm 137", "source": "ai"}, {"reference": "Psalm 150", "source": "ai"}, {"reference": "Exodus 15", "source": "ai"}, {"reference": "Deuteronomy 32", "source": "ai"}, {"reference": "Numbers 21", "source": "ai"}, {"reference": "Luke 1", "source": "ai"}, {"reference": "Revelation 4-5", "source": "ai"}, {"reference": "Philippians 2:6-11", "source": "ai"}, {"reference": "1 Corinthians 14:15", "source": "ai"}, {"reference": "Matthew 6:7", "source": "ai"}], "outline": [{"point": "I. What Should We Sing? Psalms, Hymns, and Spiritual Songs", "subpoints": ["A. Should the church sing only the biblical Psalter? — Arguments for exclusive psalmody examined and found unconvincing", "B. The three terms (psalms, hymns, spiritual songs) are not divisions of the Psalter but distinctions among types of song", "C. The Bible itself contains songs outside the Psalter — Moses, Miriam, Deborah, Mary, the Magnificat, Revelation's new song", "D. Should instruments be used? — Arguments against examined; the Psalter titles and the meaning of 'psalm' itself support instruments"]}, {"point": "II. Seven General Thoughts on Music and Worship", "subpoints": ["A. Worship is more than music; music is not always worship", "B. Music is truly worship when offered by a Christian, intentionally to honor God, and in faith", "C. Music heightens the impact of truth upon our hearts — it is a powerful and dangerous medium", "D. Music invites participation and expression; it helps the church express the full range of God-honoring affections"]}, {"point": "III. Four Principles for Choosing What We Sing", "subpoints": ["A. Every aspect of music must be submitted to the worship of Jesus Christ — not personal preference", "B. Music in the church serves various functions; context determines style", "C. All music activities for the individual Christian should in some sense be acts of worship", "D. Music is to be thoughtful and excellent — we offer the best possible to the Lord"]}, {"point": "IV. Eight Criteria for Evaluating Music in Worship", "subpoints": ["A. Must be biblical — the sung text must not conflict with Scripture", "B. Must be God-centered — not primarily about the singer", "C. Must be excellent — melody, harmony, rhythm, text judged by high standards", "D. Must be of the Spirit; must be in truth (genuine); must be meaningful; must be of the people (congregational); must express right affections"]}], "summary": "Returning to Ephesians 5:15-21 after a Christmas hiatus in the Ephesians series, Pastor Lyro takes up verse 19 — \"speaking to one another in psalms and hymns and spiritual songs\" — as an extended treatment of music in the worship of God. The sermon is explicitly information-driven: it addresses what the church should sing, whether instruments are appropriate, and by what criteria music in worship should be evaluated. He examines and rejects the exclusive-psalmody position, arguing that the three terms in verse 19 are not divisions of the Psalter but distinctions among types of song, and that the Bible itself records numerous songs outside the Psalter. He similarly defends the use of instruments, grounding it in the Psalter's own titles and in the Greek meaning of the word 'psalm' (to pluck).\n\nThe bulk of the sermon develops seven general thoughts on music and worship, four principles for choosing what to sing, and eight criteria for evaluating any song considered for corporate use. Throughout, Pastor Lyro stresses that music is a powerful medium that shapes the affections toward or away from truth — which is why it demands the same theological scrutiny as the pulpit. The sermon closes with a strong assertion that the category of 'Christian who does not sing' does not exist in the Bible. Singing — even singing about one's miseries, as in Psalm 13 — is intrinsic to the life of faith, and heaven itself is depicted as a place of abundant song.", "transcript": "## Scripture Reading: Ephesians 5:15-21\n\nAmen. If we're able to stand, remain standing and turn to Ephesians chapter 5. As we resume our series on Ephesians after the hiatus for our Christmas Advent series, we're going to address one last time verses 15 through 21 of chapter 5 before, Lord willing, next week moving to verses 22 through 24.\n\nSo this is the word of our Lord, Ephesians 5, starting at verse 15:\n\nSee then that you walk circumspectly, not as fools but as wise, redeeming the time, because the days are evil. Therefore do not be unwise, but understand what the will of the Lord is. And do not be drunk with wine, in which is dissipation; but be filled with the Spirit, speaking to one another in psalms and hymns and spiritual songs, singing and making melody in your heart to the Lord, giving thanks always for all things to God the Father in the name of our Lord Jesus Christ, submitting to one another in the fear of God.\n\nThis is the word of our Lord. Let's pray together. Lord our God, we pray that as we consider this portion — particularly verse 19 — that you open our eyes to see glorious things concerning you and concerning your church in it. We pray in Jesus' name. Amen. Please be seated.\n\n## Introduction\n\nIf you ask any Christian whether they want to be filled with the Spirit, the answer would certainly be yes. I have not met any Christian who would say, \"No, I'm okay, I don't want to be filled with the Spirit. Nothing for me.\" And Paul tells us here that we are filled with the Spirit when we sing to God.\n\nSinging is such a big part of the life of the church and of being a Christian that I think it warrants our lingering a little longer on verse 19 and taking the time today to consider the place of music in the worship of God — considering what good music is, and what our heart attitude toward it and in it should be. That's our goal for today: to look at music as part of the worship of God and, indirectly, as part of life in general.\n\nThis is not going to be a warm and fuzzy sermon. It's going to be an information-driven sermon — you're going to have a lot of things to take with you. I want to understand why we sing, what we should sing, and why we do things the way we do here at this church.\n\nThe corporate worship of God is one of the most important things we do — if not the most important thing we do on a weekly basis — and an important part of worshiping God together is singing. Now worshiping and singing are not the same thing. Worship is a much bigger category than singing. The church has unhealthily used the term \"worship time\" to refer to the singing part of the service — as if everything else isn't worship. Everything we do, from the call to worship to the benediction, is all worship — not just the singing part.\n\n## I. What Should We Sing?\n\nWhat should we sing when we get together to worship God? I want to answer that by first asking: should we sing only psalms from the Psalter? This issue has been hotly contested in the Reformed church for centuries.\n\nUlrich Zwingli, the great reformer — who was actually an accomplished musician — believed that no singing should happen in church because he feared music would appeal to the baser emotions and distract from God. Others have said we should only sing the biblical Psalter, seeing the command in verse 19 and the parallel passage in Colossians 3:16 as commands to sing psalms only. Those who hold this view see the three terms — \"psalms,\" \"hymns,\" and \"spiritual songs\" — as different ways to talk about different parts of the Psalter.\n\nThe problem with that interpretation is that in all of Jewish literature — both in the Old Testament and after — there is no reference to these three divisions of the Psalms. It is more likely that these words are being used to distinguish among different types of songs. The word \"psalm\" refers to the Psalms; \"hymns\" would refer to songs of praise directed to God about his attributes; and \"spiritual songs\" would be songs about God, about prayer, and so on.\n\nAnother reason why I don't believe we should only sing psalms is that the Bible itself has songs outside the Psalter. Just eight examples — not exhaustive: the songs of Moses in Exodus 15 and Deuteronomy 32; the song of Miriam in Exodus 15; the song of Israel in Numbers 21; the song of Deborah in Judges 5; the Song of Solomon as a whole book; the Magnificat in Luke 1; the Benedictus in Luke 1; and in Revelation 4 and 5, a new song is sung in heaven that won't be found in the Psalter.\n\nThere are also other parts of the New Testament written in metered form — they rhyme or follow Greek poetry and were likely sung in the church. One example is the Carmen Christi, the great hymn of Christ in Philippians 2:6-11, which was likely a song sung in the church. The pastoral epistles have those five \"faithful sayings\" that are also metered — likely little songs sung in the church.\n\nSo the Bible does not teach that we should only sing psalms. Though we should sing the psalms — it is literally the first word in verse 19 — we are not limited to them.\n\n### Instruments in Worship\n\nWhy is it that we use instruments in church? Is that just because it sounds nice, or because everybody else does it, or does the Bible teach that we should use instruments?\n\nSome Reformed theologians say that since the New Testament says nothing about instruments, we are not supposed to use them in new covenant worship. Rosaria Butterfield's denomination, for example, does not believe instruments should be used and sings only psalms. This argument is often made based on Psalm 137, where the people of God hung their harps on the willows and refused to sing in their Babylonian captivity. The argument goes that since the New Testament never records that they picked the harps up again, we shouldn't use instruments.\n\nBut there are several problems with this interpretation. It misses the context of the psalm itself, which says they will not use instruments *until* they are restored — and the Babylonian captivity ended and they were restored to Israel. Moreover, Jesus Christ, the ultimate restorer, has come. We have been taken out of captivity. There is no more reason to act as if we are in captivity. And the Psalms themselves clearly speak of instruments being used in corporate worship. Read through the titles — often they say \"to be sung on an instrument of twelve strings\" or similar. Read Psalm 150 — every other word is an instrument.\n\nOn top of that, the very word \"psalm\" (psalmos in Greek) means \"to pluck\" — as in plucking an instrument. So God gives us instruments to help us sing to him. But that's what they are: a help for congregational singing. The moment the instrument takes over and is no longer a help but a detriment to congregational singing, it has exceeded its God-given place.\n\n## II. Seven General Thoughts on Music and Worship\n\nI'm going to give you seven general thoughts, followed by four principles, followed by eight criteria. Seven plus four plus eight equals nineteen. So there are nineteen points to this sermon and we're just beginning. Buckle up.\n\n**One:** Worship is more than music. Don't think that what we do here other than singing is not worship. Worship is more than music.\n\n**Two:** Music is not always worship. We may actually be defiling God through our music.\n\n**Three:** Music can be worship. And that's our goal.\n\n**Four:** Music is truly worship when three things are true: it is being offered by a Christian (a non-Christian cannot worship God); it is offered intentionally to honor God; and it is offered in faith. Hebrews 10 says we draw near to God with a true heart and full assurance of faith — that's the only way we can come to God.\n\n**Five:** Music should be worship. That should be our desire — that all our music is worship to God.\n\n**Six:** Music heightens the impact of truth upon our hearts. Music is a powerful medium. That's why teachers put the alphabet into song. I still sing the Greek alphabet in my head when looking up words in a lexicon. The same with the Hebrew alphabet.\n\nHave you ever stopped to think about the song \"Imagine\" by John Lennon? Have you ever stopped to think how wicked that song is? And yet because the tune and poetry are so beautiful, we tend to just let it go. But it is a wicked, wicked song — imagine there will be no religion, no heaven or hell. Those are wicked thoughts. And yet that's the power of music: it causes us to let things into our minds that we would never accept otherwise.\n\n**Seven:** Music invites participation and expression. Paul says \"speaking to one another in psalms and hymns and spiritual songs.\" Music automatically invites others to participate with us. Music helps us together express our devotions and emotions. Jonathan Edwards didn't like the word \"emotions\" and used the word \"affections\" to talk about our emotions that are responses to truth. He says: \"The duty of singing praises to God seems to be given to excite and express religious affections.\" In his opinion, music exists so that we feel things and feel right things in response to the truth we are singing. We should never sing without affections.\n\n## III. Four Principles for Choosing What We Sing\n\n**Principle One:** Every aspect of music in the church must be submitted to the worship of Jesus Christ. Jesus is the head of the church — he gets to tell us everything that we do. We are not aiming at the unbeliever when we are worshiping. We are not after our own pleasure. We are after one: Jesus Christ himself tells the Samaritan woman that there is one seeker — God himself — and he seeks us to worship him according to his word.\n\n**Principle Two:** Music in the church serves various functions. What we do on Sunday morning is different from a Wednesday night, which is different from singing around a campfire at camp. All singing in church should be based on Scripture and correct theologically. But the way things are done changes according to context. We are here to worship the God of heaven, which calls for a certain reverence and dignity. That is different from singing around a campfire.\n\n**Principle Three:** Our lives are to be characterized by the continuous worship of God. All music activities for the individual Christian should in some sense be acts of worship. This principle dictates not just what we do in church but also what we listen to outside of church. Music is so powerful and so present in our lives that we absorb messages we don't even notice.\n\n**Principle Four:** Music is to be thoughtful and excellent. These qualities should pervade all areas of music in the church. Excellence is an attribute of God — Psalm 8 begins: \"O Lord, our Lord, how excellent is Your name in all the earth!\" So the songs sung to him must be excellent. We offer him the best we can and nothing less.\n\nThat's one of the reasons why we print music in the bulletin and have hymnals — even if you've never had a music theory class, after years of use you know: if the note goes up on the staff, you raise your voice; if the note is filled, you go a little faster; if it has a stem, faster still; if it's open, you slow down. We are always trying to grow in our ability to sing before the Lord.\n\n## IV. Eight Criteria for Evaluating Music in Worship\n\n**Criteria One: Must be biblical.** As our ultimate rule of faith and practice, the Word of God is our authority. Music in worship should consider the entirety of the Bible's message and genres — praise, prayer, proclamation, lament, the full range of affections. The music ministry shares similar roles and goals as the pulpit ministry. We are very careful about what's preached; we should be equally careful about what's sung.\n\n**Criteria Two: Must be God-centered.** How many times does the word \"I\" appear, referring to the singer? We should be focused on God. A useful test: can you sing this song to your spouse without changing any of the words? If so, it's not a good song of worship — it's not sufficiently God-centered.\n\n**Criteria Three: Must be excellent.** Excellence is an attribute of God. This applies to melody, harmony, rhythm, form, and text. Excellence will look different from person to person — my excellence is far less than that of the rest of my family. But we should all be working to improve. How often do we actually practice before coming to worship?\n\n**Criteria Four: Must be of the Spirit.** Without the work of the Holy Spirit, our efforts are meaningless. Jesus said: \"God is Spirit, and those who worship Him must worship in spirit and truth.\" We must be spiritually filled and always considering God in what we sing, not just singing to ourselves.\n\n**Criteria Five: Must be in truth — genuine.** The worship should refer to the actions we take, the attitudes of our hearts, and the intentions of our hearts — all aligned with biblical teaching. Are you thinking about what you're singing? Paul says in 1 Corinthians 14:15 that he wants to pray and sing with both his spirit and his mind. Don't just babble, as Matthew 6:7 warns against — mindless repetition that sounds like a Buddhist priest spinning prayer wheels.\n\n**Criteria Six: Must be meaningful.** A music offering must be intentional and purposeful. It should not be commonplace or mechanical. This is why the pastor should be the one either choosing or guiding the choice of songs — he is the main teacher of the church and has received the most theological training.\n\n**Criteria Seven: Must be of the people — congregational.** Good worship singing is done by the congregation. Notice that when the choir sings here, it's either before or after the service. Ultimately, singing is by the congregation. Paul says \"speaking to one another in psalms and hymns and spiritual songs.\"\n\n**Criteria Eight: Must express the right affections.** Is this song a response to the truth of the gospel? Will it help the people of God express that affection? The whole range of affection — from despair to great joy — should be present in our singing. Carl Trueman wrote an article with a title worth the entire article: \"What Should Miserable Christians Sing?\" Not everybody comes to church happy. But the Bible gives us words to express even those affections.\n\n## Closing\n\nPeople of God, music is important. How we do it is important. The Bible has no category for a Christian who doesn't sing. People create that category — they refuse to sing in the corporate worship of God — but that category doesn't exist in the Bible.\n\nPsalm 40, the prototypical example of conversion, starts with someone in the bottom of the miry pit. God sovereignly comes and takes that person out, puts him on the rock, and then gives him a new song. That's the description of the Christian. Heaven is portrayed as a place of abundant singing. So if you don't like singing, you probably won't like heaven very much — because singing is intrinsic to being a follower of Jesus Christ.\n\nSo let us sing. Let us sing the way God wants us to sing, so that he can be magnified in our singing — worshiping God with our singing from the heart, the heart that responds to truth and comes before him knowing that he is the God Almighty, Savior of mankind.\n\nLet us pray together. Father, thank you for giving us the gift of music. Thank you that we can enjoy it. And we pray that we would enjoy it rightly and use it rightly for your glory. We pray in Jesus' name. Amen."};
