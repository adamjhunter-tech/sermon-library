<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-give-me-understanding-psalm-119-137-144", "title": "Give Me Understanding", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["Give Me Understanding - Psalm 119_137-144 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/give-me-understanding-psalm-119137-144-pastor-tito-lyro", "tags": [{"tag": "Word of God", "source": "detected"}, {"tag": "Christian living", "source": "detected"}, {"tag": "suffering", "source": "detected"}, {"tag": "prayer", "source": "detected"}, {"tag": "faith", "source": "detected"}, {"tag": "wisdom", "source": "detected"}], "scripture_references": [{"reference": "Psalm 119:137-144", "type": "quoted", "source": "detected"}, {"reference": "Psalm 119:97", "type": "referenced", "source": "detected"}, {"reference": "Psalm 119:118", "type": "referenced", "source": "detected"}, {"reference": "Psalm 119:126", "type": "referenced", "source": "detected"}, {"reference": "Psalm 119:136", "type": "referenced", "source": "detected"}, {"reference": "Matthew 7:1-5", "type": "referenced", "source": "detected"}, {"reference": "Matthew 26:37-38", "type": "quoted", "source": "detected"}, {"reference": "Hebrews 4:14-16", "type": "quoted", "source": "detected"}, {"reference": "Genesis 37-50", "type": "referenced", "source": "detected"}, {"reference": "Psalm 18:30", "type": "referenced", "source": "detected"}, {"reference": "Job", "type": "referenced", "source": "detected"}], "outline": [{"title": "The Structure of the Tsadhe Stanza (Psalm 119:137-144)", "subpoints": ["Unlike most stanzas, the tsadhe section builds toward a climax rather than opening with a thesis", "Each verse points forward to the final plea: “Give me understanding and I shall live” (v. 144)", "Eight foundational principles for Christian life emerge from the eight verses", "The stanza culminates in a life-giving, heart-deep prayer for understanding of God’s Word"], "scripture": ["Psalm 119:137-144"]}, {"title": "Principles 1-2: God Is Who He Says He Is; His Word Is Like Himself", "subpoints": ["God is perfect in all His ways; all His attributes work together in perfect harmony (v. 137)", "We must not make God after our own image or say “my God would not do that”", "God’s Word is inseparable from God Himself: to deny Scripture is to deny God (v. 138)", "You cannot honor God without honoring His Word—all of Scripture stands or falls together"], "scripture": ["Psalm 119:137-138"]}, {"title": "Principles 3-4: God’s People Have a Passion for His Word; They Can Count on His Promises", "subpoints": ["The Psalmist’s zeal is consumed because enemies have forgotten God’s Word (v. 139)", "Christian passion for God’s Word must begin with displeasure at our own sin before protesting others’", "God’s promises are well-tried and proven—the servant loves them because they never fail (v. 140)", "The story of Joseph: 15+ years from dream to fulfillment, with everything going “wrong” in between"], "scripture": ["Psalm 119:139-140", "Genesis 37-50"]}, {"title": "Principles 5-6: God’s People Don’t Mind Being Small; God’s Word Is Unchangeably True", "subpoints": ["If you follow the Word of God, you will be held in contempt and thought of as small (v. 141)", "Temptation to forsake God’s Word for cultural approval or a meaningful role in society", "The 40+ generation must model contentment in smallness for younger believers", "God’s Word is unchangeably right and true in all respects (v. 142, briefly noted)"], "scripture": ["Psalm 119:141-142"]}, {"title": "Principles 7-8: We Are Born for Trouble; We Need Comprehension, Not Addition", "subpoints": ["Man is born to trouble as sparks fly upward (Job); verse 143 confirms this reality", "The Word of God gives hope and even delight in the midst of trouble and anguish", "Illustration: a mother who lost two children found comfort in Matthew 26:38—“Jesus gets it”", "We do not need new revelation, correction, or addition to God’s Word—we need comprehension (v. 144)"], "scripture": ["Psalm 119:143-144", "Matthew 26:37-38", "Hebrews 4:14-16"]}, {"title": "Conclusion: Give Me Understanding That I May Live", "subpoints": ["All eight principles culminate in one prayer: Lord, give me understanding of Your Word", "Preaching and teaching are important because we need to understand what is already in Scripture", "Is your driving desire to understand the Word of God? That is where life is found", "The church’s 60-year ministry has always been based on the proclamation and understanding of God’s Word"], "scripture": ["Psalm 119:144"]}], "summary": "In this expository sermon on Psalm 119:137-144, the tsadhe stanza, Pastor Tito Lyro observes that this section is structured differently from most of the psalm’s 22 stanzas. Rather than opening with a thesis and developing it across seven verses, each verse here builds upon the previous one to culminate in a single heart-deep plea: “Give me understanding and I shall live” (v. 144). Along the way, the Psalmist outlines eight foundational principles for the Christian life.\n\nThe first two principles establish the bedrock of faith: God is who He says He is (v. 137), and His Word is as righteous and trustworthy as He Himself is (v. 138). The pastor illustrates the first with a vivid example of someone claiming to follow God while rejecting what the Bible says about gender, and warns that whenever we say “my God would not do that,” we are usually substituting our own preferences for the God of Scripture. Principles three and four address God’s people: they have a passion for God’s Word that begins with honest grief over their own sin before protesting the sins of others (v. 139), and they can count on God’s promises even when—as in the story of Joseph—those promises take fifteen or more years to unfold through deeply unexpected circumstances (v. 140).\n\nPrinciple five is particularly countercultural: God’s people do not mind being held in contempt and thought of as small (v. 141). The pastor calls the congregation—especially those over forty—to model this contentment for younger believers who face mounting social pressure. Principle seven, drawn from verse 143, acknowledges that we are born for trouble in this life, and offers the profound comfort that God’s Word meets us in that trouble. A story about a mother who lost two infant children and found comfort in Matthew 26:38 (“my soul is overwhelmed with sorrow to the point of death”) illustrates how Scripture can speak directly into the deepest human pain because Jesus himself endured it.\n\nThe sermon closes with principle eight (v. 144): what we need is not new revelation, modern prophets, or additional scripture, but comprehension of the Word we already have. The plea “give me understanding” is offered as the great model prayer for every believer—and as the driving purpose of faithful preaching and teaching.", "transcript": "## Scripture Reading: Psalm 119:137-144\n\nIf you're able to remain standing and turn to Psalm 119, we are going to read the tsadhe section, verse 137 and following. So Psalm 119, verse 137 through 144. You're going to see the English word \"righteous\" or \"righteousness\" quite a bit because that word starts with the letter tsadhe throughout this particular stanza—each of these verses start with the same Hebrew letter. There are 22 stanzas in this Psalm, one for each letter of the Hebrew alphabet.\n\nSo Psalm 119, verse 137, this is the word of our Lord:\n\n*Righteous are You, O Lord, and upright are Your judgments. Your testimonies which You have commanded are righteous and very faithful. My zeal has consumed me because my enemies have forgotten Your words. Your word is very pure, therefore Your servant loves it. I am small and despised; I do not forget Your precepts. Your righteousness is an everlasting righteousness and Your law is truth. Trouble and anguish have overtaken me; yet Your commandments are my delight. The righteousness of Your testimonies is everlasting. Give me understanding and I shall live.*\n\nThis is the word of our Lord. Let us pray together.\n\n*Father, we pray that You open our eyes that we might see glorious things concerning You in this passage. In Jesus' name. Amen.*\n\nPlease be seated.\n\n## The Unusual Structure of the Tsadhe Stanza\n\nThis stanza is structured differently than a lot of the other stanzas in this Psalm. The usual structure of these stanzas—again there are 22 of them, one for each letter of the Hebrew alphabet—is that most of them follow a pattern where the first verse of the stanza gives us a thesis or statement and then the other seven verses develop that. For example, if you look at verse 97, that's the mem section. It starts with \"How I love Your law.\" And then every other verse in that stanza develops that thought, explains what loving the law means.\n\nNow the tsadhe stanza is turned upside down. Instead of having a thesis on the very first verse, each verse builds up on the previous one to culminate in the last verse: \"Give me understanding and I shall live\" (verse 144). Every one of the verses is building up to that point.\n\nAs the Psalmist builds up to this great, heart-deep plea for a life-giving understanding of the Word of God, he outlines eight foundational principles for the Christian life. So we're going to walk through these eight foundational principles that culminate with this prayer that the Lord would give us life-giving understanding of His Word that we might live for His glory.\n\n## Principle 1: God Is Who He Says He Is\n\nVerse 137: \"Righteous are You, O Lord, and upright are Your judgments.\"\n\nGod is righteous. This means that He is perfect in all His ways. If that wasn't the case, we would be in big trouble. If He were more wrath than mercy, if He were more justice than kindness, if He were more of one thing than another, we would be in trouble. But God is perfect. All His attributes work together in perfect harmony. You can't really divide those attributes of God; they all work together in simplicity in the presence of His people in the entire universe.\n\nWe take what the Bible says concerning God and accept it all as true—a true description of who God is. Whatever the Bible says about God, that's who God is. We have to be careful that we don't make God after our own image. When confronted with scriptural truths about God, especially the ones that we find hard to swallow, we may be tempted to say, \"Oh my God won't do that\" or \"My God is not like that.\" Well, if your God is something less than what the Bible describes Him to be, then he's not the God of the Bible. Because the God of the Bible is who He says He is.\n\nI remember a few years ago when the transgender bathroom controversy first broke out at the YMCA where I go swimming. I went to talk with one of the managers who I knew professed faith in Christ. I tried to lay out a biblical argument for why it was not a good idea to let people use whatever bathrooms they wanted. Her response to me was that her God wasn't the kind of God that wouldn't allow people to be who they think they are. It sounds good and sounds loving, but that's just not the God of the Bible, because God is who He says He is in the Bible.\n\nWilliam Plumer, who wrote a commentary on the Psalms and on Hebrews, says that the character of God is the foundation of all holy joy. We think that by changing God, we're going to be happier, but the character of God—allowing God to be who He says He is—is really the foundation of holy joy.\n\n## Principle 2: God's Word Is Like Himself—Righteous and Trustworthy\n\nVerse 138: \"Your testimonies which You have commanded are righteous and very faithful.\"\n\nGod is righteous and what He says is righteous as well. What He says is consistent with who He is. You can't separate God from His Word. Some people say they believe in God but that His word is not true—somehow there is a God they believe in, but somehow the word is not true. And yet you can't divorce those two, because there's no way to know the true God of the Bible apart from His word.\n\nBasic to Christianity is the idea that the Word of God is perfect and can be trusted. It's not just something nice; it's not a secondary matter. It's foundational to Christianity that God's Word is perfect and can be trusted. If you start denying any part of the Bible, you might as well be denying the whole thing, because all of it either stands together or falls together. Thomas Jefferson was well known for literally cutting out the Bible—he would gather Bibles and cut the pieces that he didn't like out. That's not Christianity; that's something else.\n\n## Principle 3: God's People Have a Passion for God's Word\n\nVerse 139: \"My zeal has consumed me because my enemies have forgotten Your words.\"\n\nIn the couple of stanzas we've seen, the Psalmist expresses great zeal for the Word of God in terms of indignation and anger toward those who break it. In verse 118 he says you reject all those who stray from your statutes; in verse 126 he says it is time for You to act, O Lord, for they have disregarded Your Word; in verse 136 he says rivers of water run down my eyes because men do not keep Your Word.\n\nThis passion for God's Word is part of the essence of Christianity. But we have to be as displeased with the breaking of God's Word in our own heart as we are when others out there break it. We're really good at being super angry and indignant about those out there who are breaking the Word of God. It is easy to get angry when other people break God's Word. But the evidence of Christian zeal for the Bible is when we are angry, or more ruthless, about our own personal sins instead of the sins of others.\n\nThat's found throughout the teaching of Jesus—in Matthew 7:1-5, where Jesus says, \"Hypocrite, first take the beam or the log out of your own eye before you can deal with the speck in somebody else's eye.\" The principle there is that the believer in Jesus Christ is always looking at his or her own sin first, repenting of that before addressing somebody else's sins.\n\n## Principle 4: God's People Can Count on God's Promises\n\nVerse 140: \"Your word is very pure, therefore Your servant loves it.\"\n\nThe ESV does a great job translating this verse. It says: \"Your promise is well-tried and Your servant loves it.\" The Psalmist says he has tested God's promises and God never let him down. The Word of God is proven—as Psalm 18:30 says, it's tested, it has withstood the test of time and circumstances. And we love it.\n\nThe promises sometimes may come about in the most unexpected ways. You may not be the best one designed to figure out how those promises are going to happen, but they always come to pass. The next person that comes to mind is Joseph in the Bible—Genesis 37 through 50.\n\nAs a teenager, Joseph is given a great dream: first, different sheaves bowing down to his sheave, then the sun and the moon and the stars bowing down to him. He calls the family together and says, \"Mom and dad, brothers, I have a dream: you're all going to bow down to me.\"\n\nThen what happens? The brothers get super upset. They put him in a hole, then sell him to a caravan of nomads as a slave. He ends up in the household of Potiphar, a high-ranking officer in Pharaoh's court. Joseph serves faithfully, is put in charge of the household, and then is falsely accused by Potiphar's wife and thrown in jail. He spends years in jail for a crime he never committed. How happened to the promise that \"I'm going to be exalted and everyone's going to bow down to me\"?\n\nBut he continued to serve the Lord faithfully in jail to the point that the jailer put him in charge of all the other prisoners. Then Pharaoh's cupbearer and baker are put in jail, they have dreams, Joseph interprets them. The cupbearer is to be restored; Joseph says, \"Remember me when you get out.\" Two years go by. No one remembers. Then Pharaoh has a dream, and the cupbearer finally remembers Joseph. Eventually Joseph—now in his early 30s, about 15+ years after the promise was given in his mid-teens—is brought before Pharaoh. And the promise? All came to pass, even in a very unexpected way.\n\nThat was true of our Lord Jesus Christ as well. He was promised a people in eternity past. He received his people—but through the miseries of the incarnation and the death of the cross. And in both examples, all the promises God made absolutely came to pass. As foundational to the Christian faith: all God's promises will come to pass, even if we can't figure out when or how.\n\n## Principle 5: God's People Don't Mind Being Small\n\nVerse 141: \"I am small and despised; I do not forget Your precepts.\"\n\nThis is our current reality. If you follow the Word of God, you will be held in contempt and thought of as small. That's hard—that's a guarantee. We have passed the time in our culture when Christians have any significant say in what goes on. Nobody cares about us. As a matter of fact, being a Christian is something that is looked on with contempt.\n\nI was visiting with family—those who have moved to Georgia. And she was saying that in a lot of ways she preferred here because here it's clear nobody likes Christians, and nobody pretends to be a Christian, because there is no cultural benefit to it.\n\nThe temptation that we face is to forsake the Word of God for approval or to forsake the Word of God for a meaningful role in society. Our culture does not approve of what this book says. So if we are people of the book, we're going to be despised, held in contempt, thought of as small and inconsequential.\n\nGrowing up, older people—if you're 40-plus, are we okay with being small? Are you okay with being held in contempt? Because we need to lead and model that. We need to be like the man who got five talents: the Lord at the end said, \"You were faithful to me in the small things—enter into the rest prepared for you before the foundation of the world.\" So 40-plus, are we willing to lead the church of Jesus Christ in being small and despised?\n\nOur Lord was despised. That was one of His characteristics in this life. He was despised, and because of that our Father highly exalted Him. Do we want to be exalted by the Father or by our neighbor, by our society, by our classmates?\n\n## Principle 7: We Are Born for Trouble, But God's Word Can See Us Through\n\nVerse 143: \"Trouble and anguish have overtaken me; yet Your commandments are my delight.\"\n\nJob says, \"Yet man is born to trouble as the sparks fly upward.\" Have you ever been by a campfire and your burning wood and the sparks come out—they always go upward. That's as certain as trouble in our lives: we're born to trouble.\n\nBut when trouble and anguish find us, there's something in the Word of God that gives us hope and even delight as we're going through that trouble and that anguish.\n\nThis week I was listening to a podcast in which one of the speakers was talking about when two of her kids died. Both kids had a rare genetic disease and they both died at six months of age—a boy and a girl. The second pregnancy happened even though the husband had gotten a vasectomy. She spoke of the time of darkness and tremendous pain that she went through. I don't think there is a worse pain in this life than to lose a child.\n\nEventually, as she came across Matthew 26 in her daily Bible reading, she read verses 37-38 about the account of Gethsemane: \"He took with Him Peter and the two sons of Zebedee, and He began to be sorrowful and deeply distressed. Then He said to them, 'My soul is exceedingly sorrowful, even to death. Stay here and watch with Me.'\"\n\nThis lady wrote on the margin of her Bible: \"Jesus gets it.\" That is exactly how she felt. My soul is overwhelmed with sorrow to the point of death. Jesus felt that way as well.\n\nSo when she came to Hebrews 4 in her Bible reading, it made all the sense in the world: \"For we do not have a High Priest who cannot sympathize with our weaknesses, but was in all points tempted as we are, yet without sin. Let us therefore come boldly to the throne of grace, that we may obtain mercy and find grace to help in time of need.\"\n\nThe Word of God got her through the hardest, deepest, darkest pain she had ever experienced—because she knew her Savior had experienced it as well.\n\n## Principle 8: We Need Comprehension, Not Addition\n\nVerse 144: \"The righteousness of Your testimonies is everlasting. Give me understanding and I shall live.\"\n\nWe don't need new revelations from God. We don't need to hear from God in a way that's not in the Bible. We don't need to add writings to the Bible that are not already there. We don't need another testament, like the Mormons say. We don't need modern prophets as some claim to be. We need to understand the Word of God that we have in the Bible.\n\nThat's why preaching and teaching are so important. That's why we practice here. That's been the testimony of this church for 60 years now—a ministry always based on the proclamation and understanding of the Word of God. We need to understand what is in the Bible. That's why we pray that the Lord would open our eyes to see what is in His Word—not something new that's not there.\n\n## Conclusion\n\nHere are eight foundational basic principles for Christianity from this passage:\n1. God is who He says He is.\n2. God's Word is like Himself—it is righteous and trustworthy.\n3. God's people have a passion for God's Word.\n4. God's people can count on His promises.\n5. God's people don't mind being held in contempt and being thought of as small.\n6. God's Word is unchangeably right and true in all respects.\n7. We are born for trouble in this life, but God's Word can see us through.\n8. We don't need an addition or correction to God's Word—what we need is comprehension of God's Word.\n\nAnd all this leads the Psalmist to cry out: \"Give me understanding that I may live.\"\n\nAre you where the Psalmist was? Is your driving desire to understand the Word of God, because it is in it that we find life?\n\n*Father, thank you for Your Word. We pray that You would bless it to our hearts. We pray that You write it deeply in the tablets of our hearts that we might live and practice it. In Jesus' name. Amen.*"};
