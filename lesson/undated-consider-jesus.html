// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-consider-jesus", "title": "Consider Jesus", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": "Hebrews", "series_part": 1, "parts": 1, "source_files": ["Consider Jesus - Pastor Tito Lyro - Hebrews 3_1-6.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/consider-jesus-pastor-tito-lyro-hebrews-31-6", "tags": [{"tag": "Christology", "source": "detected"}, {"tag": "perseverance", "source": "detected"}, {"tag": "high priest", "source": "detected"}, {"tag": "apostle", "source": "detected"}, {"tag": "calling", "source": "detected"}, {"tag": "assurance", "source": "detected"}], "scripture_references": [{"reference": "Hebrews 3:1-6", "type": "quoted", "source": "detected"}, {"reference": "Hebrews 2:1", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 12:3", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 10:23", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 10:26-31", "type": "referenced", "source": "detected"}, {"reference": "John 3:17", "type": "quoted", "source": "detected"}, {"reference": "John 3:34", "type": "referenced", "source": "detected"}, {"reference": "John 5:36-38", "type": "referenced", "source": "detected"}, {"reference": "John 17:1-8", "type": "referenced", "source": "detected"}, {"reference": "John 6:37", "type": "referenced", "source": "detected"}, {"reference": "1 Corinthians 12:3", "type": "referenced", "source": "detected"}, {"reference": "1 John 3:1", "type": "referenced", "source": "detected"}], "outline": [{"title": "The Command to Consider Jesus", "subpoints": ["To consider means to direct the whole mind to an object with full immersion and understanding", "The imperative tense indicates the Hebrews had stopped considering Jesus and must start again", "This is at least the third such exhortation in Hebrews; five severe warnings accompany it", "It is easy to forget Jesus even in service, making the doing the focus rather than the reason"], "scripture": ["Hebrews 3:1", "Hebrews 2:1", "Hebrews 12:3"]}, {"title": "Consider Jesus Because of Your Holy Calling", "subpoints": ["Believers are holy brethren, set apart into God's family through adoption in Christ", "The heavenly calling marks believers as citizens of an eternal realm beyond earthly conditions", "Matthew Henry describes this calling as bringing heaven into the soul and preparing it for eternity", "To abandon Christ is to abandon the infinite fellowship and the very reason for one's existence as a Christian"], "scripture": ["Hebrews 3:1", "1 John 3:1"]}, {"title": "Consider Jesus Because He Is Our Apostle and High Priest", "subpoints": ["An apostle is sent with a message bearing witness to God's glory; Jesus was sent by the Father with a message", "Jesus is not only the messenger but also the message, making him greater than any apostle", "Our confession is three words: Jesus is Lord, made possible only by the Holy Spirit", "As High Priest, Christ offered his own blood in the heavenly sanctuary, giving believers access to God"], "scripture": ["Hebrews 3:1", "John 3:17", "John 17:3", "1 Corinthians 12:3"]}, {"title": "Consider Jesus Because He Is Greater Than Moses", "subpoints": ["Moses was Israel's greatest hero, speaking directly with God, yet Christ is counted worthy of more glory", "Both Moses and Jesus were faithful to the one who appointed them, but in vastly different capacities", "Moses was a servant in God's house; Jesus is the Son who built and owns the entire household", "The household of God spans both testaments; Moses himself belongs to Christ's unified church"], "scripture": ["Hebrews 3:2-6"]}, {"title": "Consider Jesus Because Failure to Do So Leads to Ruin", "subpoints": ["We are God's household only if we hold fast confidence and rejoicing in hope to the end", "Holding fast the confession means refusing to be ashamed of the gospel under persecution", "The rejoicing of hope rests on God's own unchangeable sworn word", "God preserves his people to the end precisely by causing them to keep considering Jesus"], "scripture": ["Hebrews 3:6", "Hebrews 10:23", "John 6:37"]}], "summary": "In this sermon on Hebrews 3:1-6, Pastor Tito Lyro unfolds the central command of the passage: \"Consider Jesus.\" He situates the letter in its historical context, explaining that Jewish believers under severe social and economic persecution were tempted to abandon Christ and return to pre-Christian Judaism. The Spirit's answer is not a list of coping strategies but a single imperative: fix your entire mind on Jesus. To \"consider\" is not a casual glance but a full immersion of the mind, to ponder and grasp Christ until he dominates one's thinking. The tense of the verb signals that these believers had stopped doing this and must begin again.\n\nPastor Lyro works through four reasons the Spirit gives for this command. First, believers have been set apart as a holy brotherhood with a heavenly calling, which makes abandoning Christ an abandonment of their very identity and the fellowship of the infinite God. Second, Jesus is uniquely the Apostle and High Priest of our confession. As the one sent by the Father, he is not merely the messenger but the message itself; as High Priest he offered his own blood in the heavenly sanctuary once for all. Third, Christ is greater than Moses in every respect: where Moses was a faithful servant in God's household, Christ is the Son who built and owns it, and even Moses belongs to the one unified household under Christ.\n\nThe fourth and most urgent reason is the most sobering: those who fail to consider Jesus are in mortal danger. The conditional clause of verse 6 - \"whose house we are if we hold fast\" - describes how God keeps his elect. God preserves his people to the end by causing them to persevere in faith; and the means of that perseverance is precisely the ongoing, deliberate consideration of Jesus. The sermon closes with a direct appeal to the congregation to keep Christ always in view, since the way to hear \"well done\" at the end is to consider him every moment of the journey.", "transcript": "## Scripture Reading: Hebrews 3:1-6\n\nIf we are able to remain standing, would you turn to Hebrews chapter 3? The book of Hebrews chapter 3, going to read verses 1 through 6 of the general epistle to the Hebrews.\n\n*Therefore, holy brethren, partakers of the heavenly calling, consider the apostle and high priest of our confession, Christ Jesus, who was faithful to him who appointed him as Moses also was faithful in all his house. For this one has been counted worthy of more glory than Moses, inasmuch as he who built the house has more honor than the house. For every house is built by someone, but he who built all things is God. And Moses indeed was faithful in all his house as a servant, for a testimony of those things which would be spoken afterward, but Christ as a son over his own house, whose house we are, if we hold fast the confidence and the rejoicing of the hope firm to the end.*\n\nThis is the Word of our Lord. Let us pray together.\n\n*Father, we pray to bless this passage to our hearts, open our eyes to see glorious things concerning you in this passage. In Jesus' name. Amen.*\n\nPlease be seated.\n\n## Introduction: The Book of Hebrews\n\nHebrews is called a general epistle. The term \"general epistles\" governs this group of epistles that do not have a church indicated in the introduction or somewhere in the body. So they are called \"general\" or \"Catholic epistles\" because they are considered to be for the church at large.\n\nAs we read Hebrews, we know that the author seems to have intended it for a particular congregation of mostly Jewish believers -- ethnic Jews who had come to Christ. The general epistle to the Hebrews is a book of better. This congregation was considering returning to a pre-Christ Judaism because of the harsh persecution it was experiencing everywhere in society -- in the synagogue, in their businesses. And they were thinking, \"We have had enough. Can we just go back to how things were before we became Christians? Can we just worship God the way we did before? Things were a little easier then.\"\n\nSo the Holy Spirit inspired the human author to show them how Christ is better than what they had before, even though they are suffering persecution. Christ was better than what they had before -- the life now, even though it is difficult, is better than the life without Christ.\n\nTo make that point, the author of Hebrews says that Christ is better than the Old Testament prophets because he has a better message. Christ is better than the angels because he is God himself. Christ is better than the high priest because he became just like one of us yet without sin. And now, in our passage, the author makes the point that Christ is better than the most prestigious Old Testament saint -- Moses himself.\n\n## The Command: Consider Jesus\n\nThe main thing the author commands them to do is to consider Jesus in verse 1: \"Therefore, holy brethren, partakers of the heavenly calling, consider the apostle and high priest of our confession, Christ Jesus.\"\n\nIt is a command -- an imperative -- to consider Jesus. To consider means to direct one's whole mind to an object. To have your mind consumed with that thing. It means to immerse oneself in an object and therefore to apprehend it in its whole compass, because you have your mind examining that particular thing so fully that you are dominated by it and you understand all sides of that thing. It means to ponder, to come to know, to grasp, to understand.\n\nAnd that is what the Holy Spirit is telling the Hebrews -- and through them, us -- to do: to consider Jesus. The tense of the verb tells us that the Holy Spirit wants them to start considering Jesus. They had stopped. It seems like these Christians were not paying much attention to Jesus.\n\nThis is already the second time in chapter 3 that the author commands them to consider Jesus. Look at verse 1 of chapter 2: \"Therefore we must give the more earnest heed to the things we have heard, lest we drift away.\" And the Holy Spirit will at least one more time direct them to consider Jesus -- in chapter 12, verse 3, which says we run that race by \"considering Jesus, who is the author and finisher of our faith.\"\n\nOn top of that, there are five very strong warnings about the result of not considering Jesus. And yet, despite all these warnings, it is so easy to forget Jesus. Even in the church. Even as we try to serve him, sometimes the doing becomes the focus rather than the reason for what we are doing.\n\n## Four Reasons to Consider Jesus\n\nThe Holy Spirit in this passage gives us four reasons why they and we should consider Jesus.\n\n### 1. Consider Jesus Because You Have Been Set Apart and Called\n\nLook at verse 1 again. Notice how he addresses the believers: \"holy brethren, partakers of the heavenly calling.\" Two descriptions: holy brethren, and called ones.\n\nYou and I, through faith in Jesus Christ, have been separated, set apart to be in the family of God. We were adopted and will share in all the privileges of being sons and daughters of God. We are children of the King. We are part of a holy brotherhood.\n\nThat is why the Apostle John says in 1 John 3:1, \"Behold, what manner of love the Father has bestowed upon us, that we may be called children of God.\" Consider the one who guaranteed your adoption -- that is Jesus Christ. We have been set apart with the specific purpose of being with Jesus.\n\nNot only that, we have also been called with a heavenly calling -- a heaven-ward calling. One commentator says this calling marks them out as citizens of a realm not circumscribed by the conditions of earthly life. They are set apart by God for himself, made members of his family, and called to share in his eternal rest. To abandon Christianity is to abandon all of that.\n\nMatthew Henry describes this calling as \"the calling which brings down heaven into the souls of men, raises them up to heavenly temper and conversation, and prepares them to live forever with God in heaven.\"\n\n### 2. Consider Jesus Because He Is the Apostle and High Priest of Our Confession\n\nLook at verse 1: \"Consider the apostle and high priest of our confession, Christ Jesus.\"\n\nWe understand that Jesus is the High Priest. Jesus went into the holiest place in the heavenly sanctuary, and with his own blood he made propitiation for our sins, so that the Father can be appeased and we can have access to him.\n\nBut Jesus as an apostle is not a concept we are used to thinking about. What is an apostle? An apostle is one who is sent with a message and is a witness of God's glory. Jesus himself says in John 3:17, \"For God did not send his Son into the world to condemn the world, but that the world through him might be saved.\" In John 5:36-38, \"The very works that I do bear witness of me, that the Father has sent me.\" And in John 17, Jesus prays, \"I have glorified you on earth. I have finished the work which you have given me to do.\"\n\nSo Jesus is the apostle of our faith. Not only is Jesus the messenger, but he is also the message -- which makes him even greater than an apostle in the whole scheme of things.\n\nNow, what is our confession? The Christian confession, in Greek and in English, consists of three words: Jesus is Lord. That is it. As Paul says in 1 Corinthians 12:3, no one can say that Jesus is Lord except by the Holy Spirit.\n\n### 3. Consider Jesus Because He Is Better Than Moses\n\nThe Jews held Moses in very high regard -- even above Abraham, though they called Abraham their father. Moses was their superhero as far as humans go. Moses talked to God directly. He was in the cleft of the rock, and his face was glowing because he was in the presence of God's glory.\n\nBut Jesus is greater than Moses. The similarities first: both were faithful to the one who appointed them; both were involved in the care of the household of God. But the differences are what make Jesus greater. Moses was appointed by the covenant at Sinai; Jesus was appointed by a better covenant. Moses was a servant in God's house; Jesus is the Son who built and owns the house. Moses spoke about things to come; Jesus was the one of whom Moses spoke.\n\nThe house that is built by God, served by Moses, and owned by the Son is the people of God -- the church. This household includes Moses and all the Old Testament saints; every one of us who are in Christ is part of that household. Christ is the builder of his church that encompasses all times.\n\n### 4. Consider Jesus Because Those Who Do Not Are in Danger\n\nLook at the end of verse 6: \"whose house we are if we hold fast the confidence and the rejoicing of the hope firm to the end.\"\n\nWe are part of God's family if we hold fast our boldness in the gospel -- that we are not ashamed of the gospel of Jesus Christ. We are part of God's family if we hold fast to the rejoicing of our hope. God is true to his promises -- that is our hope.\n\nThe Scripture teaches that those who come to Christ will in no way be cast out. The Lord says in John 6:37, \"All that the Father gives me will come to me, and I will in no wise cast them out.\" They will be preserved to the end. And the way they will be preserved to the end -- the way they will persevere to the end -- is by considering Jesus.\n\nHebrews 10:23 says, \"Hold fast the confession of our hope without wavering, for he who promised is faithful.\"\n\nSo the way for you and me to arrive at the end and hear from our Lord's mouth \"well done, my good and faithful servant\" is by considering Jesus every moment of our lives.\n\n## Closing\n\nLet me ask: are you going to consider Jesus? You must -- if you want to arrive at the end as a member of this holy brotherhood, the family of God.\n\nLet us pray together.\n\n*Father in heaven, thank you for your word. We pray that indeed you keep Jesus always before us, that we might consider him in every way, in every time, in every situation. We ask in Jesus' name. Amen.*"};
