<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "2023-10-22-christian-unity-is-good-and-pleasant", "title": "Christian Unity Is Good and Pleasant. Why?", "speaker": "Pastor Renan de Olivera", "date": "2023-10-22", "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["10-22-23 -AM- Christian Unity is Good and Pleasant. Why - GUEST SPEAKER Pastor Renan de Olivera.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/10-22-23-am-christian-unity-is-good-and-pleasant-why-guest-speaker-pastor-renan-de-olivera", "tags": [{"tag": "unity", "source": "detected"}, {"tag": "worship", "source": "detected"}, {"tag": "church", "source": "detected"}, {"tag": "fellowship", "source": "detected"}], "scripture_references": [{"reference": "Psalm 133", "type": "quoted", "source": "detected"}, {"reference": "1 Corinthians 12", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: Greeting and the Reality of Incomplete Fellowship", "subpoints": ["Guest speaker Pastor Renan de Olivera brings greetings from the Second Presbyterian Church of Odeia, Brazil, which has a special fellowship with this congregation and a church in Videlas Santana, Bahia", "Even among his closest pastor-friends, true fellowship as described in Psalm 133 is not fully possible because they do not dwell together daily; only with his elders and congregation can he fully live it out", "The text: Psalm 133 — a Song of Ascent — sung by pilgrims traveling from the furthest places to be together in one space in Jerusalem"], "scripture": ["Psalm 133"]}, {"title": "What \"Good\" and \"Pleasant\" Mean in the Psalm", "subpoints": ["\"Good\" (Heb. *tov*) in verse 1 means precious — the same word used in verse 2 for the precious anointing oil; the value is not monetary but spiritual, the value of being together and united in Jesus Christ", "\"Pleasant\" is related to harmony — like a beautiful, well-proportioned architectural space; when people who otherwise have differing preferences are united by worship, there is a symmetry and beauty that makes life together harmonious", "Even in a cramped Jerusalem full of pilgrims needing bathrooms and sleeping space, even with disagreements — the Psalm says it was good and pleasant; the spiritual event made it possible to tolerate one another's weaknesses"], "scripture": ["Psalm 133:1-2"]}, {"title": "Two Images of Unity: The Anointing Oil and the Dew of Hermon", "subpoints": ["Image 1 — The anointing oil of Aaron: the oil ran from the head down the beard all the way to the collar of the high priest's vestment; on the breastplate were 12 stones, one for each tribe; when the oil anointed the high priest, it anointed the entire people he represented", "The high priest was the mediator for the whole people — every person needed the high priest; this provision for unity is spiritual", "Image 2 — The dew of Hermon descending upon Mount Zion: Hermon is in the north (modern Lebanon); the dew travels south to the arid region of Jerusalem, providing material provision for the land", "The dew enabled grain and animals to grow, which enabled the sacrifices of worship; thus material and spiritual provision are inseparably linked", "Without the dew, there is no grain; without grain, no sacrifice; without sacrifice, no worship; without worship, no spiritual life — every person in the community is necessary, from the farmer to the shearer to the high priest; no one can say to another, \"You are not important to the body\" (cf. 1 Corinthians 12)"], "scripture": ["Psalm 133:2-3", "1 Corinthians 12"]}, {"title": "Three Reasons Why Unity Is Good and Pleasant", "subpoints": ["Reason 1 — Because united in Christ we have a mediator: there is only one body of Christ, one mediator, the Lord Jesus Christ; we cannot say even to a Baptist that they are from a different church — we are one church, and it is important to be united as one visible body because we have only one mediator", "Reason 2 — Because unity proves that God is among us: when we maintain love and unity, it shows that the spiritual dew of Hermon is upon us, that the Holy Spirit promotes this love and unity among us, and that we know God", "Reason 3 — Because God ordains His blessing only upon the place where His people are united: verse 3b — \"There the Lord commanded the blessing — life forevermore\"; God ordains His blessing upon that particular place where His people are gathered; even in disagreements, conflicts, and fights, if we are united in Christ, the Lord ordains His blessing upon that body"], "scripture": ["Psalm 133:3"]}, {"title": "Conclusion: The Sin of Breaking the Unity of God's People", "subpoints": ["Christians need each other; the attitude of self-sufficiency and not wanting anyone's help is not sufficient for a Christian — we were not made to live without one another", "God says, \"I will destroy that person\" who speaks against the unity of His people; breaking the unity of God's people is one of the few sins the Bible says is punished by exclusion from communion", "The church is the new Jerusalem: in the New Testament, all the blessings given to physical Jerusalem now belong to those who are part of the church of Christ; we are united by the Spirit to Christ, and in His kingdom there is peace and prosperity"], "scripture": ["Psalm 133"]}], "summary": "Guest speaker Pastor Renan de Olivera, pastor of the Second Presbyterian Church of Odeia, Brazil, preaches from Psalm 133 on why Christian unity is described as both good and pleasant. Preaching through translation, Pastor de Olivera argues that the Psalm's two images — the anointing oil descending from Aaron's head to the hem of his garment, and the dew of Hermon descending upon Mount Zion — illustrate that Christian unity is simultaneously spiritual and material, priestly and providential. The anointing oil represented the entire people of Israel through their one mediator; the dew of Hermon provided material sustenance (grain, animals) that made possible the sacrifices of worship, so that no member of the community could claim to be unimportant to the whole.\n\nPastor de Olivera offers three reasons why unity is good and pleasant: (1) because united in Christ we have one mediator, the Lord Jesus Christ, without whom there is no access to God; (2) because when we maintain love and unity, it shows the Holy Spirit is at work among us and proves that God is in our midst; and (3) because God ordains His blessing only upon the place where His people are gathered and united — even through disagreements, conflicts, and the need for forgiveness, the Lord commands His blessing upon that body. He closes by warning that the sin of breaking the unity of God's people is one of the few sins the Bible says is punished by exclusion from communion, and that the church — as the new Jerusalem — is the place where all the blessings of covenant life now flow to those united in Christ.", "transcript": "## Scripture Reading — Psalm 133\n\nA Song of Ascents, of David. Behold, how good and how pleasant it is for brethren to dwell together in unity! It is like the precious oil upon the head, running down on the beard, the beard of Aaron, running down on the edge of his garments. It is like the dew of Hermon, descending upon the mountains of Zion; for there the Lord commanded the blessing — life forevermore.\n\nLet us pray. Father, may you work through your servant this morning as he preaches your Word to us. We ask in Jesus' name. Amen.\n\n*[Pastor Tito Lyro provides introduction:]*\n\nPastor de Olivera is the pastor of the Second Presbyterian Church in Odeia. He has served there for ten years. We are very happy to have him preach to us. I will translate for him. I will use the same pronouns as he uses, so when I say \"I\" that is him, so that we do not have to keep saying \"he said.\" Hopefully that will go a little more smoothly.\n\n## Introduction\n\nGood morning, brothers. I bring greetings from our church. I am very happy to be here with you. I am very happy to be here with my wife. What I am going to preach here today has to do exactly with this happiness. It is good and pleasant to have Christian unity. But why?\n\nWe are at the Second Presbyterian Church of Odeia. We have a very great story for you and for your pastor. I have great love for you and for your pastor. We also love another church in Videlas Santana, in the state of Bahia, and their pastor Roberto. These two churches — this one and the church in Videlas Santana — are two churches with whom we have a very special fellowship. This happened because of the pastors of the Institute of Church Planting, Tito and Roberto. I consider them my two best friends. But this communion, this fellowship, is not complete. Because there is one thing missing we need to mention to complete this fellowship that is mentioned in verse 1 — where it says that for the brothers living together is good and pleasant.\n\nI say they are my best friends, but the elders of my church, who have healthy mothers and parents, do not have to live completely in this case. Unfortunately, I cannot live out what Psalm 133 says completely with them, because we are far apart. But with my elders, I can. With my congregation, I can.\n\nI will give you an example in a negative way. When Abraham and Lot had a dispute, one of the things that was said was that they could not remain in the same land. They could not live together in that space. We are called to the opposite of that. We are called to be together, to be in the same space, to be in the same place. To be together, to actually be next to each other, is a duty of the Christian.\n\nI remember that Psalm 133, being a Song of Ascent, was sung by people as they came from the furthest places in Israel to be together in one space in Jerusalem. And in that tiny, tight city, with the enormous number of people coming, it was good and pleasant.\n\n## What \"Good\" and \"Pleasant\" Mean\n\nThe word *good* here in Psalm 133 means precious — something that has a lot of value, but not in a monetary way. Look at verse 2 — the anointing oil is described with the same word translated *precious* there. So what is *good* here is *precious* — the value of being together, being united in Jesus Christ. Not monetary value but spiritual value.\n\nAnd the word *pleasant* is related to the idea of harmony — like a beautiful, well-proportioned architectural space. Imagine you are taking a walk through a neighborhood and you come to a place where the houses are harmonious, symmetrical, with beautiful walls. That place is pleasant because it has symmetry, beauty. That is the idea of pleasant here — harmony.\n\nNow imagine thousands of people living in this place, needing bathrooms, needing a place to sleep, needing all the necessities of life. And the Psalm says it was good and pleasant. Because it was a spiritual event. And because of the spiritual event, they were able to tolerate each other's weaknesses, tolerate each other's smells. Even when there were disagreements, even when children ran around everywhere — the Psalmist says it was good and pleasant. Everyone was singing. And it was good and grateful to see them.\n\nHow is it good and pleasant to live together as brethren? I told you in the beginning — I love Tito and I love Roberto. But I spent 10 or 15 years apart from them. I only spend 10 or 15 days near them. My elders and the members of our church live constantly with me. They eat with me. We fight with each other. I have disagreements with my congregation. They do not always do as I lead them to. But we stay together, united. And that is good and pleasant.\n\n## Two Images: The Anointing Oil and the Dew of Hermon\n\nThe Psalm gives us two examples to symbolize this idea of being united together and it being good and pleasant.\n\n**Image 1 — The anointing oil.** The union among the people is like that precious oil used to anoint the high priest, that goes down the head, down the beard, all the way to the collar of the cloak. The reason the Psalmist uses the high priest as the example is because every single Israelite, without any exception, needed the high priest as their mediator. So when the whole people was in Jerusalem, the people were whole. When the high priest was anointed in the ceremony of the high priest, the entire population was anointed. And on the collar of the vestment, there was a breastplate with 12 stones — each stone representing one of the 12 tribes. When the oil was poured, it ran all the way down to the breastplate and anointed all the stones, one representing each tribe in the totality of the people. The provision for the people through the anointing of the high priest was spiritual.\n\n**Image 2 — The dew of Hermon.** He talks about the dew that comes from Hermon. Hermon is in the north — in today's Lebanon — and this dew comes down from the north into the arid region of Jerusalem. This tells us there is material provision for the people of the land. All the people benefited from the dew coming from the north.\n\nNow remember that the high priest stayed in Jerusalem in the south, where the temple was. But would there be a high priest without the dew from Hermon coming and blessing the arid desert land? All the worship of the old covenant — without any exception — required grain and animals for sacrifice. The dew from Hermon helped the grain to grow, helped the animals to grow, so that they could actually worship God with those things. And as the high priest fulfilled his office and ministered to the people and the people grew in the Lord, the Lord would bring more dew from Hermon to cause more grain to grow, to cause more animals to prosper, so they could worship God more.\n\nSo the farmer could not be thought of as unnecessary. The one who sheared the sheep was not unnecessary either. And neither, to a greater degree, was the high priest. As the Apostle Paul says, everyone is important in the body. Everyone with their gifts and their roles is important to the body. Everyone promotes the growth of the body. Because the Lord Jesus Christ gave gifts to the church. And the nail cannot say to the hair that the hair is not important, and vice versa. Even the little finger of the hand — the little finger cannot say to the big finger that it is not important to the body.\n\nI want you to know that this is how each one complements the other in their service to God. And all of this is to promote the interests of the kingdom. Together, the body of Christ promotes and puts forward each other's interests. Those who are self-centered and do not want to help anyone — those are people who do not lead each other, do not serve each other. And in the church there are people who are so self-centered that they do not want anybody to help them either. That attitude is not sufficient for a Christian. We need each other. We need God in our lives.\n\nAnd any person who speaks against that — God says, \"I will destroy that person.\" It is so important to God, and it should be so important to us, that this sin of breaking the unity of God's people is one of the few sins that the Bible says is punished by being excluded from communion. We need each other very much.\n\n## Three Reasons Why Unity Is Good and Pleasant\n\nAnd as I said in the beginning, why is it so good and pleasant to be united together? I am going to answer that right now.\n\n**First, because united in Christ we have a mediator.** There are not two bodies of Christ. There is one body of Christ. You cannot say even to the Baptists that they are from a different church. We are one church. It is very important to be united as one body, as the visible church of God, because we only have one mediator — and that is the Lord Jesus Christ.\n\n**Second, because unity proves that God is among us.** If we keep our unity in love with one another, that proves that God is in our midst. It shows that the spiritual dew of Hermon is upon us — that the anointing of the Holy Spirit is upon us — because the Holy Spirit promotes this love and this unity among us.\n\n**Third, because the Lord ordains His blessing upon the place where there is a gathered, united people of God.** The text says: \"There the Lord commanded the blessing — life forevermore.\" There, in that place, in that particular place where God's people are gathered — the Lord ordains His blessing and life forever. Imagine if you are in conflict with a brother or sister in Christ. In that conflict, in that disagreement, in that fight — is there life and blessing? He says, yes, there is. Why? Because if you were not united in Christ, you would not tolerate these fights. You would not endure these disagreements that eventually will be resolved through repentance and forgiveness and reconciliation.\n\nThe same is true with marriage. There are many conflicts in marriage. We are different from one another. We disagree. But when we reconcile — even in those disagreements — that is proof that we are united spiritually. You know that your spouse may disagree with you again tomorrow about another issue. You have already noticed this pattern. And yet you keep the marriage. That shows a kind of unity that goes beyond the disagreements. And in the same way, we see that in the church. God ordains His blessing even in our differences, because we are united in having one spiritual Father.\n\nAnd so I answer this: where the poor are, where God's people are — with all the disagreements, with all the fights — that is the place where the Lord ordains His blessing upon that body. They eat together. They worship together. They have one single mediator, the Lord Jesus Christ. With that, we have the assurance that God is going to work in our lives.\n\n## Conclusion: The Church as the New Jerusalem\n\nThe rule, the order, the arrangement of the cult — everything that favors our union — is found within the worship of God. If you want this church to be united, you must be present together. You are already leaving the Jerusalem that this congregation is. It is a great gift that we are so full of. And it should be like this.\n\nClearly, Jerusalem is not the most important place on this paper anymore. Jerusalem no longer holds the rule. But if the church is now the new Jerusalem — if the church now is the new Jerusalem of God — then all those who are in the church of Christ are the ones who receive all the benefits that came through the union, which is the church. In the same way that in the Old Testament it was those coming to the physical Jerusalem who received the blessing, today it is those who are part of the church of Christ who receive these blessings of peace and unity.\n\nAs soon as we are in Christ, we are a new creature. We are one in Christ by the Spirit. And Christ, with all in our hearts, makes us the church. And in His kingdom there is peace and prosperity — unto the glory of God the Father.\n\nAmen.\n\nFather in heaven, thank you for your word. Thank you that you are faithful to the new Jerusalem, the Israel of God, the Church of Jesus Christ. Enable us to grow and to rejoice in that, that we might be united around that. We pray in Jesus' name. Amen."};
