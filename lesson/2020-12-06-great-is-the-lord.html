window.LESSON_DATA = {"id": "2020-12-06-great-is-the-lord", "title": "Great Is the Lord", "speaker": "Pastor Tito Lyro", "date": "2020-12-06", "session": "AM", "series": "Advent", "series_part": 1, "parts": 1, "source_files": ["Great is the Lord - Pastor Tito Lyro - Luke 1_39-56.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/great-is-the-lord-pastor-tito-lyro-luke-139-56", "tags": [{"tag": "Advent", "source": "detected"}, {"tag": "humility", "source": "detected"}, {"tag": "grace", "source": "detected"}, {"tag": "sovereignty of God", "source": "detected"}, {"tag": "despair", "source": "detected"}, {"tag": "Word of God", "source": "detected"}], "scripture_references": [{"reference": "Luke 1:39-56", "type": "quoted", "source": "detected"}, {"reference": "Luke 1:26-38", "type": "referenced", "source": "detected"}, {"reference": "1 Samuel 2:1-10", "type": "referenced", "source": "detected"}, {"reference": "1 Peter 5:5-7", "type": "referenced", "source": "detected"}, {"reference": "Matthew 1:18-24", "type": "referenced", "source": "detected"}, {"reference": "Luke 2:35", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: Mary's Upside-Down World", "subpoints": ["The angel Gabriel announced to Mary, a teenage girl from Nazareth, that she would bear the Son of God — the one humanity had waited for since Genesis 3:15", "Her life was immediately disrupted: Joseph planned to quietly divorce her; she would have to raise the very Son of God", "Mary visited Elizabeth, her older cousin, who was pregnant with John the Baptist; the unborn John leaped at Mary's greeting — the first person to recognize Jesus as Lord was an unborn child", "Against all human expectation, Mary responds not with despair but with a song of praise: the Magnificat"], "scripture": ["Luke 1:26-45"]}, {"title": "1. Mary Rejoices in the Grace of God", "subpoints": ["Mary will be called blessed by all generations not because of who she is, but because of who God is (vv. 47-49): 'he who is mighty has done great things for me'", "There was nothing in Mary that merited God's choice — she was a poor girl from the backwater of Galilee, a maidservant (female slave)", "This parallels our own salvation: God chose us in spite of what he saw in us, not because of it — and nothing can separate us from his love (Romans 8)", "God lifts the lowly and brings down the proud (vv. 51-53): Jesus himself is gentle and lowly in heart and identifies with the humble"], "scripture": ["Luke 1:47-53", "1 Peter 5:5"]}, {"title": "2. Mary Rejoices in the Power of God", "subpoints": ["God did not choose the humble because he was powerless to choose anyone else; he chose the weak to display his power (cf. Gideon's 300)", "God is omnipotent and omnipresent — he fills all places at all times; no political summit or natural disaster falls outside his sovereign rule", "Mary did not despair because she recognized that the all-powerful God was turning her life upside down — and that is cause for praise, not fear"], "scripture": ["Luke 1:49, 51-52"]}, {"title": "3. Mary Rejoices in the Holiness of God", "subpoints": ["Verse 49: 'holy is his name' — a holy God will only do what is right; difficult providences come from a holy hand", "Humility helps us recognize we deserve nothing but judgment; anything other than hell is the mercy of God — this is the antidote to seasonal despair", "A holy God will not lead us into anything that is not ultimately good for us"], "scripture": ["Luke 1:49"]}, {"title": "4. Mary Rejoices in the Mercy of God", "subpoints": ["Verse 50: 'his mercy is on those who fear him from generation to generation' — every breath is an act of divine mercy", "Mary knew her Bible: the Magnificat contains more than 12 Old Testament references; her song is structured after Hannah's prayer in 1 Samuel 2:1-10", "Saturating ourselves in Scripture is how we navigate life when it is turned upside down — Mary learned this as a poor girl in Nazareth and applied it in her most desperate moment", "Implication for parents: if Scripture was critical for the woman who raised the sinless Son of God, how much more for those raising sinful children"], "scripture": ["Luke 1:50", "1 Samuel 2:1-10"]}, {"title": "5. Mary Rejoices in the Faithfulness of God", "subpoints": ["Verses 54-55: 'he has helped his servant Israel in remembrance of his mercy, as he spoke to our fathers, to Abraham and to his seed forever'", "The birth of Jesus is the fulfillment of the Abrahamic covenant — the seed promised since Eden and confirmed to Abraham has finally come", "The same God who was faithful to Abraham is faithful to his church today; the deeper our joy in this, the more restful our hearts in every trial"], "scripture": ["Luke 1:54-55"]}], "summary": "This is the first sermon in a four-part Advent series preached in December 2020 — a year the congregation described as feeling like it lasted five years and never truly began. Pastor Lyro preaches on the Magnificat (Luke 1:39-56), Mary's song of praise sung during her visit to Elizabeth. Against the backdrop of her chaotic circumstances — an unplanned divine pregnancy, a fiance ready to divorce her, and the impossible weight of raising the Son of God — Mary chose to magnify the Lord rather than spiral into despair. The sermon centers on five reasons Mary could rejoice even when her life was turned upside down: the grace, power, holiness, mercy, and faithfulness of God.\n\nThe pastor draws attention to the remarkable detail that the first person to recognize Jesus as Lord was John the Baptist, still unborn in Elizabeth's womb — a pointed observation about the personhood of the unborn. He contrasts Mary's humility with the pride that often underlies seasonal depression: at the height of our godliness we deserve nothing but judgment, and anything short of that is divine mercy. He also highlights Mary's saturation in Scripture — the Magnificat is a mosaic of Old Testament allusions — as the model for Christian parenting and for navigating every upended season of life.\n\nThe sermon closes by noting that hope and joy in the Advent season are not about managing emotions differently from a depressed person; both the joyful and the despairing must navigate life the same way — by looking to Christ and his Word. The series continues with Zechariah's song (the Benedictus), then the angels' song in Luke 2, and finally Revelation 19 on the second Advent.", "transcript": "## Scripture Reading: Luke 1:39-56\n\n*Now Mary arose in those days and went into the hill country with haste, to a city of Judah, and entered the house of Zacharias and greeted Elizabeth. And it happened, when Elizabeth heard the greeting of Mary, that the babe leaped in her womb; and Elizabeth was filled with the Holy Spirit. Then she spoke out with a loud voice and said, \"Blessed are you among women, and blessed is the fruit of your womb! But why is this granted to me, that the mother of my Lord should come to me? For indeed, as soon as the voice of your greeting sounded in my ears, the babe leaped in my womb for joy. Blessed is she who believed, for there will be a fulfillment of those things which were told her from the Lord.\"*\n\n*And Mary said: \"My soul magnifies the Lord, and my spirit has rejoiced in God my Savior. For He has regarded the lowly state of His maidservant; for behold, henceforth all generations will call me blessed. For He who is mighty has done great things for me, and holy is His name. And His mercy is on those who fear Him from generation to generation. He has shown strength with His arm; He has scattered the proud in the imagination of their hearts. He has put down the mighty from their thrones, and exalted the lowly. He has filled the hungry with good things, and the rich He has sent away empty. He has helped His servant Israel, in remembrance of His mercy, as He spoke to our fathers, to Abraham and to his seed forever.\"*\n\n*And Mary remained with her about three months, and returned to her house.*\n\n## Introduction\n\nIt is hard to believe that this is the first Sunday of December. This feels like the year that never began — we were waiting for it to begin in March, and then it didn't. Then in spring, and then it didn't. And now it is December and it still hasn't quite begun. At the same time, it feels like the year that began five years ago. 2020 has proved Einstein's theory of relativity — that time passes at different speeds depending on the frame of reference. And this year has moved differently than any other year of our lives.\n\nIt is the first Sunday of December, and as is our custom every two or three years, we are going to go through an Advent series. This year we are going to do it straightforwardly — three messages from Luke. Today, Mary's Song. Next week, Lord willing, Zechariah's Song. Then on the 20th, the angels' song in Luke 2. And then we will end, Lord willing, with Revelation 19 — the song of the saints in heaven around the marriage feast of the Lamb — as we consider the second Advent of Christ. The word Advent simply means coming. We celebrate the first coming, but we should be looking forward to the second.\n\nAs we think about the Advent season: most people love this time of year. Some watch *Elf* every single day in December. There is an increased level of despair and loneliness for some — and it is going to be greater this year because of the isolation many have experienced. The way we navigate this season — whether at the heights of excitement or at the bottom of the pit of despair — is the same. We navigate it by looking to Christ and his Word. And that brings us to the first Advent passage.\n\n## Mary's Life Turned Upside Down\n\nCan you imagine how Mary's life was upended all of a sudden? She is a young woman, somewhere in her teens, on an otherwise uneventful day when the angel Gabriel shows up and says: you are going to bear the Son of God. The one humanity has been waiting for since Adam and Eve were kicked out of the garden. The seed of the woman who will crush the serpent's head. The one Israel has been eagerly waiting for since Abraham, since Eve — when Eve had Cain she said, *this is the one*. And proved wrong. And with Abel. And finally got somewhat right with Seth. And every generation of Israel has been eagerly waiting for the one who would sit on the throne of David.\n\nAnd the angel comes to Mary and says: you are it.\n\nAnd not only are you going to bear this child — you are going to raise him. Can you imagine being tasked with raising the Son of God, upon whom the salvation of the world depends? And she will have to tell her family she is pregnant, and that the father is the Holy Spirit. Joseph was ready to end the engagement when he heard she was pregnant (Matthew 1). The angel had to appear to him and say: no, she is telling the truth.\n\nThat is where we find Mary.\n\nAnd knowing all that — knowing her life is about to end as she knew it — look at what Mary does: *My soul magnifies the Lord, and my spirit has rejoiced in God my Savior.*\n\n## The Magnificat: A Mosaic of the Old Testament\n\nThis song is called the Magnificat — from the very first word in the Latin, which in English is the third word: *magnifies*. Her soul is making God great. In a time when Mary could have plunged into despair, when the weight of the world was on her shoulders in very real ways, she chose to focus on the greatness of God.\n\nNotice something remarkable in the first stanza. I want you to notice, somewhat off the beaten path of this sermon, that the very first person in the entire world to recognize Jesus as Lord was a baby in the womb. Elizabeth says: *the babe leaped in my womb for joy* when she heard Mary's greeting. The argument around abortion has changed — it is no longer that the thing in the womb is not human (science has proven that false). The argument now is that it is not a *person*. Peter Singer at Princeton argues a human does not become a person until age eight. And yet the first person to recognize Jesus as Lord was an unborn child. That must be said.\n\nShe is able to sing this song because her God is great. Let me trace five things Mary rejoices in.\n\n## 1. The Grace of God (vv. 47-53)\n\nMary will be called blessed by all generations — not because of who she is, but because of who God is. Look at verse 49: *he who is mighty has done great things for me.* The song is not about herself. It is about her God.\n\nMary thought of herself as a sinner in need of a Savior — she says so in verse 47: *my spirit has rejoiced in God my Savior.* She did not consider herself perfect or sinless. She is, in fact, a living refutation of the Roman Catholic doctrine of the Immaculate Conception — which claims Mary was conceived sinlessly by the Holy Spirit. Mary says: I need a Savior.\n\nThere is nothing in Mary that should have caused God to choose her. She was from a poor family. She lived in Nazareth — Galilee's equivalent of Appalachia. *Can anything good come out of Nazareth?* She was the most unlikely candidate to be the mother of the King of all creation — and she knew it. She is going to be called blessed by all generations because she is the maidservant, the female slave of God. That is the paradox of grace.\n\nThis parallels our own salvation. There is absolutely nothing in us that caused God to look at us with favor. God chose us in spite of what he saw in us. And the other side of that coin is deeply comforting: if nothing in us caused God to choose us, nothing in us can cause him to abandon us. Your standing before God has nothing to do with you and everything to do with Jesus Christ, who stands before the Father every moment of every day, saying: *this one is mine.*\n\nHe lifts up the lowly and brings down the proud (vv. 51-53). Jesus himself says: *come to me... for I am gentle and lowly in heart.* Our Savior identifies with the humble. If you are a proud person — that is not what God calls you to be. Humble yourself before him and he will lift you up.\n\n## 2. The Power of God (vv. 49, 51-52)\n\nGod does not choose the humble because he is powerless to choose anyone else. He chooses the weak to demonstrate his power. Remember Gideon: God started with thousands, sent home the cowards, then sent home those who drank from the river lying down, and ended with 300 men. Then the strategy was flashlights and clay pots. Why? So that when the hundreds of thousands of Midianites fled, no one could say: *Gideon did that.* God did that.\n\nWhy does God choose the lowly? Why does he choose you? Why does he choose me? *God chose the weak things of the world to confound the wise.* Not many strong, not many noble, not many wise are called. He chooses the weak to show that the power is his.\n\nMary found great joy in this — that the all-powerful God was the one turning her life upside down and changing everything about her. She was not at the mercy of chaos. She was in the hands of omnipotence.\n\n## 3. The Holiness of God (v. 49)\n\n*Holy is his name.* We might not think of holiness as comfort in difficult times, but a holy God will only do what is right. The difficult providences of our lives come from a holy hand. God will not lead us into anything that is not ultimately good. That is deeply comforting.\n\nHumility will help us with this. At the end of the day — and this is important for you to realize — we truly and honestly deserve nothing other than the pains of hell forever. That is what you deserve and what I deserve. Anything different from that is the mercy of God being demonstrated to us. If you really want what you deserve, it is hell forever. Do you want what you deserve? Is that what this season should be about? Humility will take the edge off depression and despair. We are not getting what we deserve — we are getting mercy.\n\n## 4. The Mercy of God (v. 50)\n\n*His mercy is on those who fear him from generation to generation.* Every breath we take is the mercy of God — we do not deserve that breath. And even when life is upside down, his mercy is present with us.\n\nMary knew her Bible. In this short song, there are more Old Testament references than there are verses — at least 12. The whole song is structured after Hannah's prayer in 1 Samuel 2:1-10. Mary memorized the Bible at the synagogue, meditated on it throughout the week, was saturated with it. And it was in the synagogue, in the home, through her parents — because she did not have a personal Bible to carry around. She learned those great scrolls by hearing and repetition.\n\nThis is significant because of what Simeon would later tell her: a sword will pierce your soul. Her son would die before she did. She would suffer much because of his suffering. And yet she was able to rejoice when her life was turned upside down — because she knew her Bible. She knew God was good. She knew God was faithful.\n\nThe point for parents: if it was important for the mother of the *perfect* Son of God to be saturated with Scripture, how much more is it for parents raising sinful children? Go on memory-making vacations. Have an awesome Christmas. But if you are serious about your children walking with the Lord, immerse yourselves in Scripture. There is no greater gift you can give them.\n\n## 5. The Faithfulness of God (vv. 54-55)\n\n*He has helped his servant Israel, in remembrance of his mercy, as he spoke to our fathers, to Abraham and to his seed forever.*\n\nThe birth of Jesus is the fulfillment of what God promised to Abraham — the seed through whom all nations would be blessed. It is the fulfillment of what God said to Eve: the seed of the woman who will crush the serpent's head. Hundreds of years of waiting, and now the child is on the way. God remembered his promise. God did what he said he would do.\n\nA Dutch commentator comparing Mary's song with Elizabeth's earlier words writes: *Mary's hymn brings a spirit of greater calm. The deeper the joy, the more restful is the heart.* This is the testimony we close with. When the life is turned upside down, when you don't know where to put one foot in front of the other, go deeper into the joy — not into your circumstances, not into your fears — but into the grace, power, holiness, mercy, and faithfulness of God. That is where Mary went. And it was there she found the song.\n\nMay God enable us to magnify him like Mary did during this Advent season. Let us pray.\n\n*Father, thank you that you are a good God to us, and that you have shown us what it is to believe in Christ. We pray that we can find great joy in that. We pray in Jesus' name. Amen.*"};
