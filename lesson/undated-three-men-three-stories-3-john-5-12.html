<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-three-men-three-stories-3-john-5-12", "title": "Three Men, Three Stories", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": "2-3 John", "series_part": null, "parts": 1, "source_files": ["Three Men, Three Stories __ 3 John 5-12 (Pastor Tito Lyro).txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/three-men-three-stories-3-john-5-12-pastor-tito-lyro", "tags": [{"tag": "hospitality", "source": "detected"}, {"tag": "truth", "source": "detected"}, {"tag": "church leadership", "source": "detected"}], "scripture_references": [{"reference": "3 John 5-12", "type": "quoted", "source": "detected"}], "outline": ["Introduction: Reading 3 John 5-12", "Gaius: a faithful man who walks in truth and shows hospitality", "Diotrephes: the proud man who loves preeminence and rejects authority", "Demetrius: a man of good testimony from all and from truth itself", "Three contrasting examples of Christian character", "The marks of true and false leadership in the church", "Conclusion: Walking in truth as the standard for Christian life"], "summary": "Pastor Tito Lyro preaches from 3 John 5-12, presenting three contrasting characters: Gaius the faithful and hospitable, Diotrephes the proud who loves preeminence, and Demetrius who has a good testimony. These three stories illustrate the marks of genuine and false Christian character in the church.", "transcript": "## Introduction\n\nIf you look at the bulletin you are going to see the amazingly creative outline for this afternoon's sermon. The outline has three parts: Gaius, Diotrephes, and Demetrius — very creative, very unique, very original. We are going to do this because John organizes his letter around these three men. Gaius is a faithful member of the church. Diotrephes is an unfaithful member of the church. And Demetrius — the more I have studied it — is an itinerant teacher, not a member of the local church as I said last time. He is one of these traveling teachers who has not been accepted by Diotrephes. We will structure our sermon in the same way.\n\n## Part One: Gaius — Faithful Service to the Local Church and Beyond\n\nFirst, we are going to learn from Gaius in verses 5 through 8. What we learn there is that Gaius faithfully served the local church and beyond.\n\nIn verse 5, John says:\n\n> *\"Beloved, you do faithfully whatever you do for the brethren and for strangers.\"*\n\n\"For the brethren\" refers to the local church; \"for strangers\" refers to Christians beyond the local church — not strange people, but fellow believers who are not members of the local congregation. This teaches us that to be faithful we need to be faithful to our local church, but also beyond it: to presbyteries, to missions, to seminary. We should be investing ourselves in all areas of the church, starting locally and then extending outward.\n\nJohn tells us that Gaius had a reputation of love for the church and for the expansion of the kingdom of God. In verse 6, John says:\n\n> *\"Who have borne witness of your love before the church. If you send them forward on their journey in a manner worthy of God, you will do well.\"*\n\nSome of the itinerant teachers who had stopped by the church where Gaius was a member told John about Gaius's faithful conduct toward them in the gospel. Gaius was sending them forward — making provision for them to do their work — making sure that these men who were going to preach the gospel in places where Jesus' name had not been heard had the means to do so. It could be as simple as housing them overnight, providing food for the road, or giving a few coins to pay their fare to get to the next place.\n\nThis is important because these itinerant teachers went out purely out of faithfulness to Christ. John says in verse 7:\n\n> *\"Because they went forth for His name's sake, taking nothing from the Gentiles.\"*\n\nThese missionaries were not receiving support from outside the church. They were relying on the body of Christ to help them get where they needed to go. By the time we reach the New Testament epistles, the word \"Gentile\" referred to someone who did not have faith in the Lord Jesus Christ — because Paul tells us that when we come to faith in Jesus, we are grafted into Israel and become spiritual children of Abraham.\n\nSo the point is that the church was sponsoring the gospel — and it is our job as a church to sponsor the spreading of the gospel. We are to be funding missions, funding church plants, giving money, and going to the mission field. I think of David Platt, who served as head of the IMB, the Southern Baptist foreign missions board. He sometimes pushed back on short-term missions — the two-week trip here and there. That sounds odd, but what the Lord often calls people to is to go somewhere, set down roots, and proclaim the gospel. Plant a church. Be willing to stay.\n\nIn the first century, one of the ways the church provided for missions was by hosting traveling evangelists. This is actually what is meant by the elder qualification of being \"given to hospitality.\" It does not mean the elder simply has to have people over for dinner. The word is literally \"lover of strangers\" — which in context referred to those preaching the gospel across the region. One of the qualifications of the elder is that he loves those who preach the gospel and does whatever he can to make sure they can continue to do so.\n\nThat is what we are all called to do. Those of us who do not go to the mission field are to be fellow workers with those who go. In this context, it means hosting missionaries, providing for them financially, praying for them, staying interested in their work, and knowing what is going on so we can intercede faithfully. It might also mean going on a short-term mission so you can experience the work firsthand and be a blessing — and a blessing to yourself — through it. Gaius teaches us that it is the calling of the church to spread the gospel and to support those who are spreading it, in whatever way we can.\n\n## Part Two: Diotrephes — Pride Destroys Missions\n\nBut Gaius is not the only one in that church. There is another man by the name of Diotrephes, in verses 9 through 11. John says in verse 9:\n\n> *\"I wrote to the church, but Diotrephes, who loves to have the preeminence among them, does not receive us.\"*\n\nIt is possible that the letter John refers to here is actually 2 John — the one right before this — that he wrote to the church, and that Diotrephes did not allow it to be read. That is why John has to write to Gaius privately — to let him know: look, I already sent a letter and it is not getting through. Can you make sure it does?\n\nDiotrephes was the anti-Gaius, the opposite of Gaius. He did not want the focus to be on the itinerant teachers. He did not want them to have any glory or place in the church. He did not want to help them plant other churches. He did not want to use the resources of the local church for anything beyond himself. He wants all the glory, and he does not want anyone to have authority over him. To always seek to be without authority over you is a dangerous thing.\n\nDiotrephes, in order to be first, lies about others. John says in verse 10:\n\n> *\"Therefore, if I come, I will call to mind his deeds which he does, prating against us with malicious words.\"*\n\nHe goes around lying about people so that others think he is the greatest. And he does not welcome missionaries into his own home, and uses his influence in the church to keep other members from hosting them — even excommunicating those who do, as verse 10 says: \"He himself does not receive the brethren, and forbids those who wish to, putting them out of the church.\"\n\nWhat we see here, brothers and sisters, is that pride destroys missions.\n\nSome of you have not met our oldest daughter, Tini. For four years she was a missionary in Lebanon. It was a thriving work. Lots of good being done in the city of Tyre, just ten miles north of the Israeli border. Sometimes she would call us and we could tell from her voice something was wrong. Where are you? \"We are in the basement, in the bunker, because the missiles are falling near our neighborhood.\" That was the kind of situation she was in — a thriving ministry, people coming to the Lord — and yet because of the pride of a Diotrephes figure, the whole thing fell apart. All the good that was going on, in the midst of the capital of Hezbollah, people coming to Christ — but one man thought it was all about him. Brothers and sisters, pride destroys missions.\n\nWe have seen that even in our own denominational history, where leaders put their own interests ahead of missionaries. Missionaries went months without being paid on the field because leaders had pet projects they preferred to fund. I have heard stories of missionaries in Brazil in the 1970s going six months without a paycheck while people back home were giving faithfully to support them — and yet the mission director thought the money would be better used for some other project he had. Pride destroys missions. Humility builds the church, and that is something we have to cultivate in our midst.\n\nBrothers and sisters, what Diotrephes is doing is evil. John calls it that in verse 11:\n\n> *\"Beloved, do not imitate what is evil, but what is good. He who does good is of God, but he who does evil has not seen God.\"*\n\nThe evil pointed to is the pride and arrogance of Diotrephes — his desire to be first, instead of seeing the kingdom of God grow through the preaching of the gospel.\n\nWe may not do precisely the same thing, but we often get upset when the attention of others is not on us. Children who won't let adults talk with one another because they want attention — that is the same principle. Adults who turn every conversation into something about themselves — same principle. When we show no interest in each other and all we want to do is talk about ourselves — that is the Diotrephes principle. A love to be first, a love to be known, a love to be praised. Maybe not the same intensity, but the same kind of thing, and John says that is evil. It is a potential sign of not having seen God — a lack of genuine faith.\n\nRemember, if you can't remember anything else in the Bible, remember two things: love God, love others. There is no third. There is no focus on self. Diotrephes turned that upside down and focused on himself. He loved a god, but a god of his own making — and that god was named self. We have to be careful that we are not doing that, and that in our effort to see the gospel go out, we are loving God and loving others.\n\n## Part Three: Demetrius — A Good Testimony\n\nThat brings us to Demetrius. In verse 12, John says:\n\n> *\"Demetrius has a good testimony from all, and from the truth itself. And we also bear witness, and you know that our testimony is true.\"*\n\nCan you imagine if that were said about you? \"[Your name] has a good testimony from all\" — not only from all, but from the truth itself. This is a follower of Jesus Christ.\n\nDemetrius is probably a missionary who was not received by Diotrephes and who was slandered by him. And yet John says the testimony of the church is that this man is glorifying God. He has a good testimony. Everyone knows Demetrius is a good man. The facts themselves show it. John testifies to it. Gaius knows it too — and knows that what Diotrephes is saying about Demetrius is false. The preponderance of evidence points to a man of genuine character. Why? Because he is selflessly proclaiming the Word of God in places where it has not been proclaimed.\n\nSadly, what happens to Demetrius is often how those who proclaim the gospel are treated — not only by the world, but by the church itself. Instead of being recognized for their service, they are put down, slandered, persecuted. But we should not expect it to be any other way, because this is exactly what happened to our Savior. Our Lord Himself was mistreated by the world and by the religious leaders of His time. He said, \"If they hated me, they will also hate you as you follow me.\"\n\nBut Demetrius has a good testimony. That is what we are looking for. That is what we want to hear from the Lord: \"Well done. You have a good testimony in your life.\" Not for any recognition now, not for any preeminence now, but for that ultimate word from the Lord.\n\n## Conclusion\n\nThese three men tell three different stories. Two of them — Gaius and Demetrius — are worthy of our imitation. Diotrephes is to be avoided like the plague, because there is no place for arrogance and pride in the church of the Lord Jesus Christ."};
