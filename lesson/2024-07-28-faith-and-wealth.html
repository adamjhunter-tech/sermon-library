window.LESSON_DATA = {"id": "2024-07-28-faith-and-wealth", "title": "Faith and Wealth", "speaker": "Pastor Tito Lyro", "date": "2024-07-28", "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["7-28-24 -PM- Faith and Wealth - James 5_1-6 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/7-28-24-pm-faith-and-wealth-james-5_1-6-pastor-tito-lyro", "tags": [{"tag": "stewardship", "source": "detected"}, {"tag": "idolatry", "source": "detected"}, {"tag": "judgment", "source": "detected"}, {"tag": "generosity", "source": "detected"}, {"tag": "justice", "source": "detected"}, {"tag": "discipleship", "source": "detected"}], "scripture_references": [{"reference": "James 5:1-8", "type": "quoted", "source": "detected"}, {"reference": "1 Timothy 6", "type": "referenced", "source": "detected"}, {"reference": "Matthew 6:19-21", "type": "referenced", "source": "detected"}, {"reference": "Matthew 19:24", "type": "referenced", "source": "detected"}, {"reference": "1 Corinthians 6:9-11", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Tension Between Faith and Wealth", "subpoints": ["Three wrong extremes: monasticism (wealth = sin), liberal egalitarianism (wealth = evil), prosperity gospel (wealth = the only blessing)", "The Bible does not condemn wealth — it is amoral; our hearts are the problem", "1 Timothy 6: it is the love of money — not money itself — that is the root of all kinds of evil"], "scripture": ["1 Timothy 6"]}, {"title": "The Problem: Hoarding Earthly Treasure", "subpoints": ["James 5:1-3 — the ungodly rich have stored up moth-eaten and corroded treasure for the last days", "Their idle, unused treasure will be a witness against them on the day of judgment", "Similarity with Matthew 6:19-21 — do not lay up treasures on earth where moth and rust destroy", "The parable of the sheep and goats: not using resources for Christ is a witness against the unbeliever", "James uses inspired sarcasm: \"You think this is treasure? Wait until the judgment day.\""], "scripture": ["James 5:1-3", "Matthew 6:19-21"]}, {"title": "The Problem: Theft of Wages", "subpoints": ["James 5:4 — wages kept back by fraud from workers cry out to the Lord of Sabbath (Yahweh Sabaoth)", "The Lord of Heaven's armies will vindicate the cry of the oppressed", "Corollary: a Christian employer does not need government oversight to practice just labor laws — righteousness requires it"], "scripture": ["James 5:4"]}, {"title": "The Problem: Living as If the Poor Do Not Exist", "subpoints": ["James 5:5-6 — they have lived in pleasure and luxury, fattening their hearts as in a day of slaughter", "They condemned and murdered the just — the oppressed Christians who patiently endured", "Quick heart-check: our attitude toward tithing reveals where our treasure truly is", "Malachi: withholding tithes is robbing God"], "scripture": ["James 5:5-6"]}, {"title": "The Response of Faith: Patience and Patient Waiting", "subpoints": ["James 5:7-8 — but you, brethren (contrast with the ungodly), be patient until the coming of the Lord", "The relief James offers is not material but eschatological: the Lord is coming", "The promise of the Bible is not that God will deal with evil now, but that he will deal with all evil at Christ's coming", "Every day God delays is a day of grace for the wicked to repent"], "scripture": ["James 5:7-8"]}, {"title": "Conclusion: Where Is Your Treasure?", "subpoints": ["What fills in the blank: \"I cannot live without ___\" — that is your treasure", "Are we content with Christ alone, or would we be fine if all went well even without him?", "C.S. Lewis: He who has all the wealth in the world and not Jesus has nothing more than the one who has only Jesus"], "scripture": []}], "summary": "In the evening companion to the morning message on patience, Pastor Lyro examines James 5:1-6, where James condemns the ungodly rich in the congregation. He begins by addressing the three distorted perspectives on wealth in Christian history — monasticism's equation of poverty with godliness, the prosperity gospel's elevation of wealth as the primary blessing, and modern egalitarianism's suspicion of wealth itself — and establishes that the Bible treats wealth as morally neutral while caring deeply about how it is acquired and used. The sermon walks through three indictments James levels: the ungodly rich have hoarded corroded, moth-eaten treasure that will testify against them on the day of judgment; they have withheld wages by fraud from their workers, whose cries have reached the Lord of Sabbath; and they have lived in self-indulgent luxury as though the poor around them did not exist. A corollary is drawn that a Christian employer should practice just labor without government compulsion. The sermon then turns to James's sharp contrast — addressing the oppressed believers as \"brethren\" — calling them to patient waiting, not because material relief is promised but because the Lord is coming to right every wrong. The message closes with a searching personal question: where is your treasure? The test is what we find indispensable to our joy.", "transcript": "## Introduction: The Tension Between Faith and Wealth\n\nWe're going to continue in the book of James this afternoon, in chapter five, considering the first six verses of that chapter. As you turn there, let me say this: there is usually a tension between the Christian faith and wealth. Often though, this tension is exaggerated to the point where having wealth is equated to sin. We see that in the rise of monasticism — that's in the history of the church — where living in a monastery, being separated from wealth with a vow of poverty, was seen as being more godly than having material wealth in this world.\n\nThis attitude towards wealth is not only present in historical Christianity. If you think about the current liberal attitude that permeates America, where somehow the wealthy people are the bad people and they have to disappear in order for things to be good, it underlies this idea that somehow wealth is bad and poverty or equality is good. On the other hand, the prosperity gospel comes along teaching that wealth and health are the only blessings that matter. Often the proponents of the prosperity gospel prey on poor and ignorant folks — and that's why the prosperity gospel is so popular in the developing world. The thing is, the only ones who actually experience the prosperity of the prosperity gospel are the pastors preaching that gospel, not the people in the pews.\n\n## The Biblical View of Wealth\n\nNow, I hope this is going to make a little more sense as we read our passage.\n\nJames 5:1-6: Come now, you rich, weep and howl for your miseries that are coming upon you. Your riches are corrupted and your garments are moth-eaten. Your gold and silver are corroded, and their corrosion will be a witness against you, and will eat your flesh like fire. You have heaped up treasure in the last days. Indeed, the wages of the laborers who mowed your fields, which you kept back by fraud, cry out. And the cries of the reapers have reached the ears of the Lord of Sabbath. You have lived on the earth in pleasure and luxury. You have fattened your hearts as in a day of slaughter. You have condemned, you have murdered the just. He does not resist you.\n\nNotice that the Bible does not condemn wealth. Sometimes it's seen as a blessing, sometimes as a curse in the Scriptures. And that is the case because wealth is never really the problem. Our hearts are the problem. A person may be filthy rich and relate to his wealth in a godly way, and somebody may be poor and have a sinful relationship with wealth. More than wealth itself, the Bible and God are concerned about how one gets and maintains that wealth — and that is what James is addressing here.\n\nThe Apostle Paul tells us in 1 Timothy 6 that it's not money that's the root of all kinds of evil, but the love of money. And somebody can have that love whether they have money or not. The love of money does not imply that you have to have that money. Anyone, no matter how rich or how poor, can be suffering from the sin of wealth being an idol of their heart. Jesus also implies that wealth can encourage self-reliance that hardens the unbelieving heart even further from the Lord. Remember the story of the rich young ruler, after which Jesus says that it is easier for a camel to go through the eye of a needle than for a rich man to enter heaven — but with God, all things are possible.\n\n## Indictment One: Hoarding Treasure\n\nHere Paul — rather, James — addresses the ungodly rich in the congregation. The rich in these verses have put their hearts into building up earthly treasures for the sake of earthly living. See that in verses 1-3. And notice the similarity with what our Lord said in the Sermon on the Mount: Do not lay up for yourselves treasures on earth, where moth and rust destroy and where thieves break in and steal. But lay up for yourselves treasures in heaven, where neither moth nor rust destroys and where thieves do not break in and steal. For where your treasure is, there your heart will be also (Matthew 6:19-21).\n\nWhen you read James 5, you want to say — you're not doing that. You have gathered treasures where the moths are eating. You have gathered treasures which are going to corrode. You have gathered treasures that have everything to do with this life and nothing with the life to come. And you can see that Jesus is concerned with what we treasure, because whatever that is, that's where our allegiance will be.\n\nAs we look at James 5:1-3, we see that the very treasures that they worked so hard to acquire will be witnesses against them on the day of judgment. In verse 3, he says, you have heaped up treasure in the last days. And what is that treasure? The things they've gathered will be a witness against them and will eat their flesh like fire. I think James here is using inspired sarcasm: you've gathered treasure — well, you'll see on the judgment day what kind of treasure this is. Your treasure is going to be testifying against you.\n\nNotice that the things will witness against them by their lack of use. These treasures are moth-eaten and corroded, which means these people have amassed all this wealth and are not using it. It's simply hoarding wealth on the back of other people — and that's going to bring judgment upon them.\n\n## Indictment Two: Theft of Wages\n\nThe problem here is that the ungodly rich built their wealth by stealing wages from their employees. In verse 4, James says, the wages of the laborers who mowed your fields, which you kept back by fraud, cry out. And the cries of the reapers have reached the ears of the Lord of Sabbath.\n\nYahweh Sabaoth is one of the favorite titles of God in the Old Testament, especially in the prophets, and especially in Malachi. It speaks of being Yahweh the God of Heaven's Army — he is in control of all of Heaven's armies. And those are the armies, as it were, that are going to judge those who misuse their wealth. These employers will not have a union to deal with. They're going to deal with Jesus Christ himself in their labor practices. They will have to give account to the Lord of Heaven's Army, who is going to vindicate the cry of the oppressed.\n\nA corollary from what James says here about the ungodly rich employers is that the Christian employer should not need government oversight in order to practice just labor laws. He just does it, because that's what righteousness implies.\n\n## Indictment Three: Living as Though the Poor Do Not Exist\n\nIn verses 5-6: You have lived on the earth in pleasure and luxury. You have fattened your hearts as in a day of slaughter. You have condemned, you have murdered the just. They lived as if the poor did not exist — as if the needy in front of them in the church did not exist. They are living their best life now, for sure. They lied in order to keep the wages of their employees back, and by their actions, they are murdering the poor. That's how it's described here.\n\nAnd to add to their condemnation, the oppressed Christians who are being oppressed didn't even complain about it. They were taking it in patience, waiting for the Lord's vindication.\n\nA quick way to check our hearts to see if we have the same attitude as the ungodly rich: check your giving. What is our attitude toward tithing? Do we do it begrudgingly? Do we do it at all? Do we count it to the penny so that it's only exactly 10% and nothing more? The prophet Malachi says that when we don't tithe, we're robbing God from what is due. So what's our attitude toward tithing? That can tell us something about what we think of wealth and what we think about using it to serve the Lord.\n\n## The Response of Faith: Patient Waiting\n\nThe attitude of the ungodly in verses 1-6 is contrasted with the attitude of faith in verses 7-8, where James says: therefore, be patient, brethren, until the coming of the Lord. See how the farmer waits for the precious fruit of the earth, waiting patiently for it until it receives the early and latter rain. You also be patient. Establish your heart, for the coming of the Lord is at hand.\n\nNotice — James does not consider the people he was talking to in verses 1-6 as brethren. But in verse 7, he turns and says, now, you brethren. There is a sharp contrast. You brethren — be patient, even with those ungodly people who have been cheating you.\n\nJames condemns the oppressor, but when he turns to the oppressed, he tells them to be patient. Because the Lord of Heaven's Army has heard their cry and will vindicate them. And notice that the relief that James offers is not that the wages are going to be paid. It's not that they are going to have some material blessings. The relief that he offers is that the Lord is coming. Be patient. Be strengthened. The Lord is coming. He's going to take care of all this.\n\nThis is really the promise of the Bible, brothers and sisters. The promise of the Bible is that God will deal with all evils at the coming of Jesus Christ. It doesn't promise to deal with all evil now, but it does promise to deal with all evil at the coming of Jesus Christ. And James considers that as sufficient encouragement for the Christian.\n\nAnd that's also the answer to this question: if there is a God and he is good, why doesn't he deal with all the wickedness in the world now? The answer is that he has dealt with our evil at the cross of Jesus. The wickedness of our heart. And he will also deal with all evil at the coming of Jesus, judging those who never believed. Why doesn't God do anything about evil? He is. He has done. He will do. But every day that he doesn't deal with the wicked is a day of grace for the wicked to come to know him.\n\n## Conclusion: Where Is Your Treasure?\n\nThis passage causes us to ask ourselves: where is our treasure? What is it that you are treasuring in your life? What fills in the blank: I cannot live without ___ ? I need ___ in order to have joy. Whatever that is, that is your treasure. Are we content with Christ, or would we be just fine if all went well in this life even if Christ wasn't part of it? Would we be just fine if every physical ailment disappeared, every relational issue was solved, every need met — even if that meant that Christ was not part of our lives? If we're fine with that, then we're not treasuring Christ.\n\nC.S. Lewis says this in a way that sticks: he who has all the wealth in the world and not Jesus has nothing more than the one who only has Jesus in his life. Do you believe that? If you do, then your treasure is in heaven, and Jesus is going to look you face to face and say, well done, my good and faithful servant. Let us pray together. Father, I have not thought well enough of your Word. Help us to treasure Christ above all things, that our treasure may be in heaven. In Jesus' name. Amen."};
