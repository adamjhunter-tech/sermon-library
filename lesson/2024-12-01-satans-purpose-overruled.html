lan; Satan had a plan; God has a plan"], "scripture": ["1 Thessalonians 2:17-3:3"]}, {"title": "1. Paul Had a Plan", "subpoints": ["Verse 17: though taken away in presence, Paul was still with them in heart — greatly desiring to see them; missionaries separated from the people they love can feel this deeply, as Paul did before the age of Zoom and modern communication", "Verse 20: Paul lived for these people — they were his glory and joy; most people seek glory for themselves (the Olympic podium), but Paul says you are our glory; the Christian attitude is to rejoice in the good of others", "Verse 18: Paul made plans at least twice to return to Thessalonica — both while in Athens and possibly on the way to Corinth — but was hindered; we should make plans and let God direct their outcomes: \"You cannot turn a truck unless it is moving\"", "God guides us when we are moving, even if he buffers us this way and that way by forces bigger than ourselves"], "scripture": ["1 Thessalonians 2:17-20"]}, {"title": "2. Satan Had a Plan", "subpoints": ["Verse 18: \"Satan hindered us\" — the same evil men who drove Paul out of Thessalonica (v.17 \"taken away\") were Satan's instruments", "Satan uses evil men to hinder the gospel; in Revelation 12-13 Satan is portrayed as the dragon with seven crowns on seven heads, representing the seven kingdoms of history — Egypt, Assyria, Babylon, Persia, Greece, Rome, and one to come — Satan currently holds crowns over these kingdoms; do not put trust in political leaders", "Psalm 118:8 (middle verse of the Bible): do not put your trust in princes; kings and princes have Satan as a controlling influence", "Satan desires to destroy souls — keeping people from salvation; 2 Thessalonians 2:9: the coming of the lawless one is according to the working of Satan with all power, signs, and lying wonders, with unrighteous deception, among those who did not receive the love of the truth", "Satan also makes the lives of Christians miserable — Paul's thorn in the flesh was a messenger of Satan; Satan's ultimate desire is to exalt himself and defeat God (Revelation 19: the final gathering of armies against Christ)"], "scripture": ["1 Thessalonians 2:18", "2 Thessalonians 2:9", "Psalm 118:8"]}, {"title": "3. God Has a Plan — And It Prevails", "subpoints": ["God's purpose: to glorify himself through defeating Satan and through delivering, saving, and glorifying his people — and this purpose will prevail", "Verses 19-20: Paul says you will be revealed in glory at the coming of Christ — you will be our joy, our crown of rejoicing; when Christ comes, Satan will be utterly defeated and God's people glorified", "God overrules Satan's plans in daily providence: Timothy was sent to Thessalonica instead of Paul — God wanted that; as a result the church received what they needed, Timothy grew as a leader, and we have 1 and 2 Thessalonians in our Bibles", "David and Bathsheba: Satan seemed to have a great victory; but God had Nathan confront David, David repented and wrote Psalms 32 and 51 — now examples of God's mercy and justification by faith quoted in Romans 3 and 4", "The crossing of Samuel and Chronicles regarding David numbering the people: Satan moved David; God moved David — both are true; God's sovereignty encompasses Satan's plan and uses it for a higher purpose; those who sin do so willingly and are judged for it", "The ultimate example: the cross itself — what the forces of evil gathered to do was according to the determined counsel and purpose of God; that is how salvation has come to us; so our faith is not in what we can do but in God who overrules Satan"], "scripture": ["1 Thessalonians 2:19-20", "Psalm 32", "Psalm 51"]}], "summary": "Pastor John Battle, preaching in Pastor Lyro's absence, continues his series in 1 Thessalonians with 1 Thessalonians 2:17-3:3. The sermon takes a simple but powerful three-point outline: Paul had a plan, Satan had a plan, and God has a plan. Paul's plan — to return to the beloved church he had been driven out of after only three weeks — was thwarted on at least two occasions. Yet Paul's heart was always with them; they were his glory and his joy. Satan's plan was to use evil men and circumstances to hinder the gospel and make the lives of believers miserable, driven by his ultimate aim to exalt himself and defeat God. The sermon develops the biblical portrait of Satan as the one who currently holds controlling influence over the kingdoms of this world, warning against putting trust in political leaders. Yet the central and comforting point is that God has a plan — and it always prevails. Paul's inability to return resulted in Timothy being sent, the Thessalonians receiving what they needed, Timothy developing as a leader, and the church receiving 1 and 2 Thessalonians. David's sin with Bathsheba appeared a great victory for Satan, but God used it to produce Psalms 32 and 51, which became foundational examples of justification by faith. The cross itself — the seeming ultimate triumph of evil — was according to the determined counsel and purpose of God. Our confidence is not in ourselves but in the Lord who overrules all.", "transcript": "## Introduction\n\nWell, Pastor Tito has gone today, so Dr. Battle — they are all yours.\n\nThank you, brother. I hope you all can see me. This pulpit is so big that not only can you not see me very well, but I cannot see the Bible. There — that is better.\n\nIt is a pleasure to be with you once again and to share God's word. I have started a series in the book of 1 Thessalonians, and this will be the longest series I have ever preached if I ever finish it — longest in terms of time, not in terms of how many sermons.\n\n1 Thessalonians is likely Paul's first surviving epistle. He founded the church in Thessalonica during approximately three weeks, then was driven out of town by evil men — what the King James calls \"certain lewd fellows of the baser sort\" — hired to start a mob and cause Paul and his companions to flee. Timothy and Silas were with him; his friend Luke had stayed behind in Philippi.\n\nPaul was first taken to Athens; he sent Timothy and Silas back north. Then he moved on to Corinth where he stayed a year and a half. The two men came back to him in Corinth with good news of the church's faith and love — and that is when he wrote this letter.\n\nIn this passage, starting at 2:17, Paul is defending the fact that he was not there with them and giving them instruction in his absence. Some in Thessalonica likely felt he should have come back and faced the music.\n\nSimple three-point outline, applied by the golden hammer: Paul had a plan. Satan had a plan. God has a plan.\n\n## 1. Paul Had a Plan\n\nVerse 17: *But we, brethren, having been taken away from you for a short time in presence, not in heart, endeavored more eagerly to see your face with great desire.*\n\nIn his heart Paul was still with them. If you have ever left someone behind whom you love — family, friends, a church family — you know this feeling. You wish you could see what they were doing right now. Missionaries used to come back every four years; we would see them with their little flag and their slides. Now missionaries can share immediately over Zoom — wonderful. But the apostle could not do that. When he left, he did not know how they were doing. And that bothered him greatly.\n\nVerse 20: *you are our glory and joy.* Most people who seek glory want it for themselves. The Olympic athlete works a whole lifetime toward that moment of standing on the number-one podium — the anthem plays, and there they are in their glory. But Paul says: no, you are our glory. My greatest glory is to look at that podium and see you up there. That is the wonderful Christian attitude toward one another — we rejoice in the good of others.\n\nPaul made plans, at verse 18: *even I, Paul, time and again, but Satan hindered us.* He made plans on at least two occasions to return. Maybe in Athens, maybe on the way to Corinth. But something happened; he was not able to go.\n\nSomeone once told me: you cannot turn a truck unless it is moving — and God guides us if we are moving. By the way, I just read you cannot buy an F-250 in a couple of years in Washington State. Anyway. God wants us to be moving, and then he can direct us this way or that way. We should make plans — recognizing that our plans are subject to the will of God.\n\n## 2. Satan Had a Plan\n\nVerse 18: *Satan hindered us.* How? Verse 17 says they were \"taken away\" — by those same evil men who had driven Paul out of Thessalonica. Satan uses evil men to hinder the gospel.\n\nIn our church in Tacoma I have been going through the book of Revelation in Sunday school. You get to the middle of Revelation and there is the vision of the dragon with seven heads and seven crowns. Later the chapter tells us that dragon is Satan. Those seven heads seem to represent seven kingdoms of history: Egypt, Assyria, Babylon, Persia, Greece, Rome, and one yet to come — parallel to the book of Daniel. It is interesting: there is a crown on every one of those heads. Satan controls — under God's sovereignty, of course — those kingdoms and their rulers.\n\nSo I am glad our prayer this morning mentioned praying for political leaders. But we need to realize our faith is not in our political leaders. Psalm 118:8 — the middle verse of the Bible in the King James — \"It is better to trust in the Lord than to put confidence in princes.\" Why? Because princes have Satan as a controlling influence currently.\n\nSatan's desires: to destroy souls — keeping people from salvation. 2 Thessalonians 2:9: *the coming of the lawless one is according to the working of Satan with all power, signs, and lying wonders, with all unrighteous deception among those who perish because they did not receive the love of the truth.* To make Christian lives miserable: Paul had the thorn in the flesh, which he calls a messenger of Satan to buffet him. And Satan's ultimate desire is to exalt himself and defeat God — which is why in Revelation 19, when Christ appears in majesty for the final judgment, the leader on earth gathers his army to fight against him. What a hopeless battle. But he hates him so much he still wants to fight.\n\n## 3. God Has a Plan — And It Prevails\n\nBut that is not the last point. God has a plan. God's desire is to glorify himself through defeating Satan and delivering, saving, and glorifying his people. And God's desire will prevail.\n\nVerses 19-20: *For what is our hope, or joy, or crown of rejoicing? Is it not even you in the presence of our Lord Jesus Christ at his coming?* When Christ comes back, Paul says, you will be revealed in glory. Satan will be utterly defeated. God's people will be lifted up and vindicated. Christ will be glorified.\n\nAnd God's continuing providence and grace even now, before Christ returns — how wonderful it is to see the power of God at work overcoming Satan on a daily basis.\n\nIn this particular case in Thessalonica, God overruled Satan's actions in several ways. First: Timothy was sent up instead of Paul — and that was what God wanted. The people needed Timothy at that time. Young Timothy grew as a leader. And as a result of Paul not being able to go, we have 1 and 2 Thessalonians in our Bibles. If Paul had gone back, he would not have had to write these letters. What a blessing that little book is.\n\nDavid and Bathsheba: it seemed like Satan had a great victory. David sinned, covered it up, committed adultery and murder and hypocrisy and lying for a year. But God stepped in — Nathan the prophet confronted David. David by God's grace did not double down; he confessed his sin and repented. He wrote Psalms 32 and 51. Has God used those psalms in your life? Paul in Romans 3 and 4 looks back to David writing \"Blessed is the man to whom the Lord will not impute sin\" — David would not have written those words if he had not fallen into sin. Satan's work was overturned.\n\nThere is an interesting pair of verses at the end of David's life: 2 Samuel says God moved David to number the people; Chronicles says Satan moved David. Both are true. Satan had his plan; God had a greater plan that included Satan's plan. God in his sovereignty wanted this discipline of Israel to happen. Those who do sinful actions do so willingly and will be judged for what they did. But God's higher purpose was accomplished.\n\nThe ultimate example: the Lord Jesus Christ himself. Satan attacked Jesus on multiple occasions — tried to tempt him to sin, and finally the forces of evil gathered together and put Jesus to death on the cross. But as Peter says in Acts: what they did was according to the determined set counsel and purpose of God. Because that is how salvation has come to us.\n\nSo we have plans. Satan has plans. But God's plan prevails. Our confidence is not in ourselves — in ourselves we cannot overpower Satan. But God can. And our faith is in him to keep us in his grace and to bless our ministry and work, even when we are opposed by Satan on a personal level and in our ministries."};
