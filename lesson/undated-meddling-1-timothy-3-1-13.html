<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-meddling-1-timothy-3-1-13", "title": "Meddling", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["Meddling __ 1 Timothy 3_1-13 (Pastor Tito Lyro).txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/morning-sermon-113025", "tags": [{"tag": "church government", "source": "detected"}, {"tag": "elders", "source": "detected"}, {"tag": "deacons", "source": "detected"}, {"tag": "manhood and womanhood", "source": "detected"}, {"tag": "family", "source": "detected"}, {"tag": "Bible Presbyterian Church", "source": "detected"}], "scripture_references": [{"reference": "1 Timothy 3:1-13", "type": "quoted", "source": "detected"}, {"reference": "Acts 20:17", "type": "referenced", "source": "detected"}, {"reference": "Acts 20:28", "type": "referenced", "source": "detected"}, {"reference": "1 Peter 5:1-2", "type": "referenced", "source": "detected"}, {"reference": "Matthew 20:25-28", "type": "referenced", "source": "detected"}, {"reference": "Acts 6", "type": "referenced", "source": "detected"}, {"reference": "1 Timothy 2:12", "type": "referenced", "source": "detected"}], "outline": [{"title": "A Faithful Saying: The Office of Bishop Is a Good Work", "subpoints": ["Paul flags this as a 'faithful saying' — a summary teaching drilled into the early church", "The word 'bishop' (overseer) is the same office as elder or pastor — emphasizing function", "The desire is not for preeminence but for the good work of serving Christ's church", "We know the desire is humble when the man is already serving whether or not he has a title"], "scripture": ["1 Timothy 3:1", "Acts 20:17", "Acts 20:28", "Matthew 20:25-28"]}, {"title": "Meddling with Men: These Qualifications Describe Godly Manhood", "subpoints": ["The qualifications for elder and deacon are not for super-spiritual men — they describe godly manhood", "The office of overseer and deacon is only for men — grounded in creation and the fall, not culture", "God created men and women equally glorious but with complementary roles for mutual flourishing", "Men who don't meet these qualifications should repent and pursue godly manhood, not simply decline the office"], "scripture": ["1 Timothy 3:1-7", "1 Timothy 2:12"]}, {"title": "Key Qualifications: Blameless, Able to Teach, Husband of One Wife, Godly Father", "subpoints": ["Blameless and having good testimony in society — not perfection but a reputation that commands respect", "Husband of one wife — a one-woman man in heart and mind, not just legally", "Rules his house well — children who obey with dignity, not through fear but through his wisdom and love", "\"If a man does not know how to rule his own house, how will he take care of the church of God?\""], "scripture": ["1 Timothy 3:2-5", "1 Timothy 3:12"]}, {"title": "The Deaconate: A Noble and Essential Office", "subpoints": ["The deacon's qualifications mirror the elder's with four major differences, including a proving period", "Verse 11 refers to the deacon's wife — a trustworthy helper in her husband's office", "When the first deacons were ordained, the Word spread and disciples multiplied greatly (Acts 6)", "The deaconate is the sancho for the health of the church — not a junior elder but an essential ministry"], "scripture": ["1 Timothy 3:8-13", "Acts 6"]}, {"title": "The Ordination of Jim Connerly as Deacon", "subpoints": ["The session recommended, interviewed, and approved Jim Connerly as a deacon candidate", "Jim served as a deacon intern for six months per the requirement of 1 Timothy 3:10", "The congregation affirmed Jim's ordination with near-unanimous vote", "The congregation covenants to honor, encourage, and obey the deacon in the Lord"], "scripture": ["1 Timothy 3:10"]}], "summary": "This sermon on 1 Timothy 3:1-13, titled 'Meddling,' is preached in preparation for the ordination of Jim Connerly as a deacon of the Bible Presbyterian Church. Pastor Lyro introduces it by announcing his intention to meddle — not just preach — both in his own life and in the lives of the congregation. He acknowledges that in preparing this sermon, the Spirit brought him great conviction about how he himself has fallen short of the mark God has set for undershepherds.\n\nThe sermon begins with the 'faithful saying' of verse 1: that if a man desires the position of a bishop, he desires a good work. Pastor Lyro explains that the word 'bishop' is another term for elder or pastor — one who looks upon, an overseer — and that 'desire' here is an earnest yearning for service, not for rank. The desire is humble when the man is already serving whether or not he holds a title, and when it is accompanied by fear and trembling at the weight of the office.\n\nThe heart of the 'meddling' is directed at every man in the congregation: these qualifications describe godly manhood, not a super-spiritual elite. Men who do not meet these qualifications should repent and pursue godly manhood. Pastor Lyro affirms the scriptural teaching that the offices of elder and deacon are only for men, grounding this not in culture but in the doctrine of creation and the fall (1 Timothy 2:12). He addresses the wives of potential elders and deacons — their support or resistance directly affects their husband's qualification for office. He also looks children in the eye and tells them that their rebellion against godly parents may be robbing the church of its leadership.\n\nThe deaconate is described as the sancho — the anchor — for the health of the church, not an afterthought or junior elder position. When the first deacons were ordained in Acts 6, the Word spread and disciples multiplied. The sermon closes with the actual ordination service for Jim Connerly, including his vows before the congregation and the laying on of hands by the elders.", "transcript": "## Scripture Reading: 1 Timothy 3:1-13\n\nIf you're able, would you remain standing in a moment longer for the reading of God's Word? This morning we're turning to the book of 1 Timothy, chapter 3. The first epistle of Paul to Timothy, chapter 3 — we're going to read verses 1 through 13. People of God, this is the Word of your Lord:\n\n\"This is a faithful saying: If a man desires the position of a bishop, he desires a good work. A bishop then must be blameless, the husband of one wife, temperate, sober-minded, of good behavior, hospitable, able to teach; not given to wine, not violent, not greedy for money, but gentle, not quarrelsome, not covetous; one who rules his own house well, having his children in submission with all reverence (for if a man does not know how to rule his own house, how will he take care of the church of God?); not a novice, lest being puffed up with pride he fall into the same condemnation as the devil. Moreover he must have a good testimony among those who are outside, lest he fall into reproach and the snare of the devil.\n\n\"Likewise deacons must be reverent, not double-tongued, not given to much wine, not greedy for money, holding the mystery of the faith with a pure conscience. But let these also first be tested; and then let them serve as deacons, being found blameless. Likewise, their wives must be reverent, not slanderers, temperate, faithful in all things. Let deacons be the husbands of one wife, ruling their children and their own houses well. For those who have served well as deacons obtain for themselves a good standing and great boldness in the faith which is in Christ Jesus.\"\n\nThis is the Word of our Lord. Let us pray together. Glorious God, we thank You for Your Word. We pray that it would have a powerful effect in our hearts. We pray that Your Spirit would wield it, and it would lay our hearts open before You. Thank You for it, even as we consider Your Word. We pray in Jesus' name. Amen. Please be seated.\n\n## Introduction: I Want to Meddle\n\nThis morning we prepare for a time of supreme importance in the life of our church. And as we do that, I want to meddle. I don't want to just preach — I want to meddle. MEDLE.\n\nThere used to be an elder in one of our churches — a retired Gunny Sergeant with the U.S. Marines. He spoke like a Gunny Sergeant — no microphone needed. And I was preaching at his church once, and jokingly, in the middle of the sermon, he yells from the back: \"Pastor, you're starting to meddle now!\" That's what I want to do today. I want to meddle in my own life. As I prepared this sermon this past week and the week before, the Spirit brought me great conviction of how short I have fallen of the mark that God has set for His undershepherds.\n\nBut I also want to meddle with your life. Men — I want to metal with your life. I want you to hear the call of Paul that he issues here for every man. This is not just for Jim Connerly. This is a call for every man.\n\nWomen — I want to meddle with your life. I want you to hear what God calls men to do, and I want you to rejoice in that call instead of feeling like life is not fair.\n\nI pray that my meddling today would be the Holy Spirit's meddling in our lives.\n\n## A Faithful Saying: The Office Is a Good Work\n\nNotice that Paul starts by saying this is a faithful saying. By the time Paul wrote the pastoral epistles — 1 and 2 Timothy and Titus — the church had formulated some summary oral teachings that were true but had not yet been preserved in writing. These sayings were used in catechizing the church, much like we use the catechism today. Paul records at least five of these sayings and flags them with this expression: \"faithful saying.\"\n\nAnd one of the sayings drilled into the church was: \"If a man desires the position of a bishop, he desires a good work.\" It's interesting that if we were coming up with the doctrines most important to the faith, that's probably not the one we would drill into people and have kids repeat in Sunday school. But that's what Paul and the early church said was something we should have ingrained in our minds.\n\nThis applies to the office of the elder, but also to the office of the deacon — because in verse 8, Paul says \"likewise.\"\n\nI want us to look at three particular words in that saying. The word \"desires,\" the word \"bishop,\" and the word \"good.\"\n\nWe tend to think of a bishop as a man in a white robe with a pointy hat governing a diocese. But that's not what the Bible means by bishop. The word *bishop* simply means one who looks upon, or an overseer. The Bible teaches that the position of bishop is the very same office as elder and shepherd — what we call pastor today. In Acts 20:17, Paul calls for the elders of the church in Ephesus. Then in verse 28, he says: \"Take heed to yourselves and to all the flock among which the Holy Spirit has made you overseers, to shepherd the church of God.\" Elders who are made overseers in order to shepherd and pastor the church. Peter does the same in 1 Peter 5: \"The elders who are among you I exhort... shepherd the flock of God which is among you, serving as overseers.\"\n\nSo the term bishop is another term for elder or for pastor, emphasizing the function of the office. And from now on you should address Elder Anderson always as Bishop Anderson — and if you want to provide a pointy hat for him, he will even wear it for church.\n\nNow, the word \"desire\" appears twice in verse 1. But each is a translation of a different Greek word. The first carries the meaning of aspiring to, striving for. The second word is the one often translated \"lust\" — desires with intensity. So: he who aspires for the office of elder desires with intensity a good work.\n\nDoes it bother you that Paul says this is a good thing? If a man desires the position of a bishop, he desires a good work. Shouldn't we encourage men to be humble instead of desire for preeminence?\n\nThe problem was with how I was reading it. Notice: this is not a desire for the office. What does the man desire? A good *work*. This is not a desire for preeminence but to serve. This is not a desire for ranking but for work — much like our Savior says in Matthew 20:25-28: \"You know that the rulers of the Gentiles lord it over them... Yet it shall not be so among you. But whoever desires to become great among you, let him be your servant. Whoever desires to be first among you, let him be your slave — just as the Son of Man did not come to be served but to serve.\"\n\nThis is a noble desire to serve Jesus Christ by serving His church. We know that this is a humble desire when the man is already serving — when he's going to serve whether he has a title attached to his name or not. We know this is a humble desire when it's accompanied by fear and trembling — not a happy, sloppy \"yeah, I want to be an elder, that would be so cool!\"\n\nThe word \"good\" — *kalos* in Greek — means beautiful, excellent, noble. The work of the overseer and the work of the deacon is a beautiful work, an excellent work. It is not to be marred by men who seek preeminence because they don't see the beauty of it. And the congregation needs to see the work of the deacons and the elders and say: \"This is a noble work that they are doing on my behalf. How thankful I am that God has given us men who are able to do that.\"\n\n## Meddling with Men: Godly Manhood\n\nNow let me start meddling. Meddling number one: every man in the church should be ready to be an elder or a deacon. Because these qualifications — these qualities presented here — are qualities of godly manhood. Not of super-spiritual men, but of godly manhood. So if these characteristics don't describe you, men — repent. Repent from not being a godly man, turn to God for the grace of godly manhood, and start being a godly man.\n\nThe church needs us to be men so that it can be led into green pastures where the wolves will not succeed in attacking it. Our wives need us to be men so that there is no confusion for them and they can flourish in their womanhood. Our sons need us to be men so that they know what real biblical godly masculinity looks like. Our daughters need us to be men so that they know what a godly husband should look like.\n\nA little more meddling: the position of an overseer and of a deacon is only for men. Women are not called to these offices. There is a general desire today to make this part of the Bible tied to the culture of Paul's time in order to eliminate role differences between men and women. The problem with that interpretation is that Paul did not see this teaching as being limited to a particular culture. He grounds it in the doctrine of creation and the fall: \"I do not permit a woman to teach or to have authority over men... For Adam was formed first, then Eve; and Adam was not deceived, but the woman being deceived, fell into transgression\" (1 Timothy 2:12-14). It's not a cultural thing. It is a creational and theological thing.\n\nGod did not organize things this way because He is a cosmic male chauvinist who wants to abuse women. You're being deceived by Satan if you see it that way. He organized things for your good. God created two equally glorious beings — men and women — with the same standing before God, equally the crown jewel of creation. But He created them with differences so they could complement each other. And if either one abandons their role, the unit is incomplete. Math explains everything: how do you call two complementary angles put together? A right angle. It tells you what you should do. Two complements form a right angle.\n\n## Key Qualifications\n\nI know you're starting to get nervous because there are 16 qualifications and we haven't looked at them yet. We're not going to look at all of them, but we're going to hit some highlights.\n\nThe one who desires the office of elder or deacon must be **blameless and have a good testimony in society** (vv. 2, 7, 10). This doesn't mean perfection — that's impossible. No man is ever perfect except the Lord Jesus Christ. It does mean that if charges are brought against him, people will say: \"No, there's no way that's the case.\" And if people outside the church find out he's a Christian, their response is: \"Oh, that makes sense now.\"\n\nHe must be the **husband of one wife** (vv. 2, 12) — literally a one-woman man. Not just married to one woman, but his heart, mind, and desire are for that one woman. It doesn't mean an elder or deacon must be married, but it assumes he will be.\n\nHe must be **wise, temperate, sober-minded**, not a new convert, walking in the Spirit and the Word so that he can think and act accordingly.\n\nHe must be **humble** (vv. 7, 10), **hospitable**, **not greedy**, **gentle**, **not quarrelsome**, not puffed up — because if they are, the devil will have a field day with them.\n\nIn verses 4-5 and 12 we learn that he must be a **godly father and husband**. He is to manage his family well — aware of what is going on in the family, active in directing the family, serving the family. And this is demonstrated in his children: they have a reverence for their father, and that submission is done with dignity — not through threatening and yelling.\n\nWilliam Hendriksen, commenting on this, says: \"This submission must be done in such a way that the father's firmness makes it advisable for a child to obey, that his wisdom makes it natural for a child to obey, and that his love makes it a pleasure for a child to obey.\"\n\nAnd if a man can't manage his family well, he can't manage the church. From the lesser to the greater.\n\nKids — look up for a second. All of you who live at home. Do you realize that when you rebel against your parents, despite their godly efforts to raise you, you may be robbing the church of its leadership — all because of your selfishness? You're robbing the church of Jesus Christ in your rebellion.\n\nWives — this is a word for you as well. You too play an important part in your husband being qualified. If you refuse to submit to God's teaching concerning your role as wife, you are disqualifying the man and therefore robbing the church of Jesus Christ.\n\n## The Deaconate: A Noble Office\n\nIf you look at verses 8 through 13, you notice that virtually all the qualifications listed for elders also apply to deacons, with four major differences: there's no requirement for the deacon to be able to teach (though they can — see Philip and Stephen); there is an explicit proving period in verse 10; verse 11 addresses the deacon's wife (not a deaconess, as the context and the return to the term \"deacon\" in verse 12 make clear); and in verse 13, there is an explicit reward mentioned for those who serve well as deacons.\n\nThe deacon's wife must be a trustworthy person who can help her husband in his office.\n\nBrothers and sisters, the office of the deacon is the sancho — the anchor — for the health of the church. It's not the office of the junior elder. It's not an afterthought. It's essential. When the first deacons were ordained and chosen — Acts 6 — this is what happened immediately after: \"Then the word of God spread, and the number of the disciples multiplied greatly in Jerusalem, and a great many of the priests were obedient to the faith.\" Through the ministry of service of the deacons, the gospel went forth more freely. And even the most hardened opponents came to faith in Christ — the very priests, who denied that the Old Testament as a whole was the Word of God.\n\nThese offices of elder and deacon are given to the church for her good and for her prosperity. A church will be healthy if men are faithfully executing these offices.\n\n## The Ordination of Jim Connerly\n\nWe praise the Lord for providing such men to our church. We praise the Lord for providing Jim to our church. Jim was recommended to the session as a candidate for the diaconate. The session interviewed him and inquired of his desire to be a deacon. We interviewed Chris as well as to what she thought about her husband being a deacon — receiving an affirmative answer from her. We also interviewed Jim concerning his views, his theological positions, and his understanding of the Westminster Standards. After that, we appointed him to serve as a deacon intern in keeping with 1 Timothy 3:10, where he served for about six months. We talked to Jim again — Jim is still going to do this. We talked to Chris — she said yes. You interviewed him. You were able to ask whatever questions you wanted. A month was given for any feedback from you. Then a congregational meeting was held in which the vote was 65 to 1 abstention — which means the church has affirmed its desire to have him serve as deacon.\n\nI'm going to invite Jim to come forward at this time.\n\n*[Jim Connerly comes forward for ordination.]*\n\nThe government presents Jim with several questions — promises, an oath of office. An oath is a promise you make to the people of God in the presence of God, calling God as your witness that these things are true and that you will endeavor to do them.\n\nFirst question, Jim: Do you believe the Scriptures of the Old and New Testaments to be the Word of God, the only infallible rule of faith and practice?\n\n*[I do.]*\n\nDo you sincerely receive and adopt the Confession of Faith and Catechisms of this church as containing the system of doctrine taught in Holy Scripture?\n\n*[I do.]*\n\nDo you approve of the government and discipline of the Bible Presbyterian Church?\n\n*[I do.]*\n\nDo you accept the office of Deacon in this congregation and promise faithfully to perform all duties thereof?\n\n*[I do.]*\n\nDo you promise to study the purity, peace, and unity of the church?\n\n*[I do.]*\n\nIf you are a member of this church, would you stand? *[Members stand.]*\n\nDo you, the members of this church, acknowledge and receive this brother as Deacon, and do you promise to yield him all that honor, encouragement, and obedience in the Lord to which his office according to the Word of God and the constitution of this church entitles him? If you are agreed with this, please raise your right hand. *[Members raise hands.]*\n\nThank you. Please be seated.\n\n*[The elders lay hands on Jim, setting him apart to the office of Deacon.]*\n\nFather, we pray that You lay aside this man, Your servant, to serve this congregation — Your church — as a Deacon, a servant of Jesus Christ. We pray that You give him grace and strength to fulfill the promises he has just made. We pray to bless him and give him great joy in serving Christ in this office. We set him apart in the name of the Father, the Son, and the Holy Spirit.\n\nHaving been duly ordained, Jim, we welcome you to the diaconate of the Bible Presbyterian Church.\n\nBrothers and sisters, I introduce to you your Deacon, Jim Connerly."};
