window.LESSON_DATA = {"id": "2025-06-08-an-effective-servant-of-christ", "title": "An Effective Servant of Christ", "speaker": "Pastor Tito Lyro", "date": "2025-06-08", "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["06-08-2025 -PM- An Effective Servant of Christ - Luke 7_1-10 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/06-08-2025-pm-an-effective", "tags": [{"tag": "faith", "source": "detected"}, {"tag": "service", "source": "detected"}, {"tag": "humility", "source": "detected"}, {"tag": "vocation", "source": "detected"}, {"tag": "evangelism", "source": "detected"}], "scripture_references": [{"reference": "Luke 7:1-10", "type": "quoted", "source": "detected"}, {"reference": "Psalm 19:123", "type": "referenced", "source": "detected"}, {"reference": "Romans 10", "type": "referenced", "source": "detected"}, {"reference": "Matthew 15", "type": "referenced", "source": "detected"}, {"reference": "Mark 7", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Centurion as a Model", "subpoints": ["Two Gentiles are the only ones Jesus commends for great faith", "The centurion served Christ while remaining in his secular vocation", "Every lawful calling can be done before the face of God for His glory", "The Reformation recovered the idea that every calling is sacred"], "scripture": ["Luke 7:1-10"]}, {"title": "An Effective Servant Needs an Exalted View of Jesus", "subpoints": ["The centurion understood Christ's authority over all creation", "He knew Jesus only needed to speak a word to heal his servant", "Christ's healing power is a picture of His power to save sinners", "Faith comes by hearing the Word concerning Christ", "We must direct others to the Word so God may open their eyes"], "scripture": ["Luke 7:7", "Romans 10"]}, {"title": "An Effective Servant Needs a Lowly View of Himself", "subpoints": ["The centurion called himself unworthy despite being honored by the Jews", "True humility stems from seeing our insufficiency and Christ's all-sufficiency", "False humility says 'I can do nothing' and stops there", "True Christian humility says 'I can do all things through Christ who strengthens me'", "George Mueller exemplified total dependence on God"], "scripture": ["Luke 7:6-7"]}, {"title": "An Effective Servant Needs a Caring View of Others", "subpoints": ["The centurion showed compassion for his slave, contrary to cultural norms", "Power and rank had not diminished his concern for the lowly", "No person is too hopeless for God to regenerate", "God can transform the most unlikely people for His glory", "Hudson Taylor: all God's giants have been weak men who relied on God"], "scripture": ["Luke 7:2-3"]}, {"title": "Conclusion: Qualities of an Effective Servant", "subpoints": ["Exalted view of Christ as sovereign Lord — trust Him for the impossible", "Low view of self — unworthy but Christ is gracious and all-sufficient", "Caring view of others — compassion for those who are helpless", "God does great things through weak servants who reckon on Him"], "scripture": []}], "summary": "In this Sunday evening sermon on Luke 7:1-10, Pastor Tito Lyro examines the Roman centurion whose servant Jesus healed as a model of effective Christian service. The centurion is notable because he is one of only two individuals whom Jesus commends for \"great faith,\" and he demonstrates this faith while remaining fully in his secular vocation — illustrating the Reformation principle that every lawful calling is sacred and can be performed before the face of God.\n\nPastor Lyro identifies three essential qualities for effective Christian service drawn from the centurion's example. First, an effective servant must hold an exalted view of Jesus, trusting that Christ's mere word is sufficient to accomplish what is impossible for man. The centurion understood spiritual authority and believed that salvation belongs to the Savior, not the sinner. Second, an effective servant must maintain a lowly view of himself — not a paralyzing false humility, but a grace-driven acknowledgment of personal insufficiency coupled with confidence in Christ's all-sufficiency.\n\nThird, the centurion's compassion for his dying slave — a person whom first-century society regarded as property — demonstrates the caring view of others that marks effective service. Pastor Lyro argues that no person is beyond the reach of God's regenerating power, and servants of Christ must never write off the apparently hopeless. The sermon closes with the reminder from missionary Hudson Taylor: \"All God's giants have been weak men who did great things for God, because they reckoned on God being with them.\"", "transcript": "## Scripture Reading: Luke 7:1-10\n\nIf we're able to remain standing for the reading of God's Word, we're turning to the Gospel of Luke 7, reading in verses 1 through 10. The Gospel of Luke 7, verses 1 through 10. And this is the Word of our Lord.\n\nNow when he concluded all his saints in the hearing of the people, he entered Capernaum, a certain centurion's servant who was dear to him was sick and ready to die. So when he heard about Jesus, he sent elders of the Jews to him, pleading with him to come and heal his servant. And when they came to Jesus, they begged him earnestly, saying that the one for whom he should do this was deserving. For he loves our nation and has built us a synagogue. Then Jesus went with them and when he was already not far from the house, the centurion sent his friends to him, saying to him, Lord, do not trouble yourself. For I am not worthy that you should enter under my roof. Therefore I did not even think myself worthy to come to you. Say the Word and my servant will be healed. For I am also a man placed under authority having soldiers under me. And I say to one go and he goes and to another come and he comes and to my servant do this and he does it. When Jesus heard these things he marveled at him and turned around and said to the crowd that followed him, I say to you I have not found such great faith not even in Israel. And those who were sent returning to the house found the servant well who had been sick.\n\nThis is the Word of our Lord, let us pray. Glorious God, we pray that you speak to us this afternoon for us in Jesus' name. Amen. Please be seated.\n\n## Introduction: The Centurion as a Model\n\nThere are only two times in the Gospel where Christ commends great faith. One is the Syrophoenician Woman in Mark and Matthew chapter 15 and the other one is this centurion that we just read about. It is interesting that among all God's people of the time, the only two that Jesus says have great faith are people who are not part of the visible church of the Lord Jesus Christ at the time. And I think the Lord has a message here for us that these two are both Gentiles. One is a man, the other one is a woman, and I think what the message is that the faith that pleases God is not exclusive — reserved only for the religious crowd. Many and all can be called by God. Any and all can lay hold of God by faith.\n\nBut I want to first look at this centurion because this centurion is a model of effective Christian service. Though he was a man in authority over at least 100 soldiers — that's why the name centurion was based on the Latin word for 100 — he became a servant to his own servant by calling Jesus to heal him. It is interesting that every centurion mentioned in the New Testament is mentioned in a favorable light. Which, when you think about it, is countercultural because the Jewish people were under occupation, and the centurions would have been the face of the occupying force, yet the New Testament sees them in a favorable light.\n\nThe first thing I want to say we learn from this centurion is that this man shows us that we can and must serve Christ in any secular job. He doesn't stop being a centurion to serve Christ. He continues to be a centurion under the Roman army and yet he serves Christ in that position. And you and I can serve Christ in any lawful vocation.\n\n[The pastor then invited members of the congregation to share their vocations — programming, nursing, freight train driving, homemaking, medical reception, travel coordination, and others — to illustrate that every calling can be done to the glory of God.]\n\nThe Reformation brought a great thing back into the church — the idea that every calling is sacred. There is no division between the secular and the sacred. Every calling can be done before the face of God for His glory. The centurion lived in Capernaum, which Jesus later rebuked in chapter 10 for lack of faith. But this centurion was not affected by the town's unbelief. He kept on serving Christ in the midst of great unbelief.\n\nAnd he possesses three qualifications that every servant of Christ must seek to develop in his or her life. An effective servant of Christ needs an exalted view of Jesus, a lowly view of himself, and a caring view of others. We see all three things with this centurion.\n\n## An Effective Servant Needs an Exalted View of Jesus\n\nWe can see in verse 7 that an effective servant of Christ needs an exalted view of Jesus. In verse 7 it says, \"Therefore I did not even think myself worthy to come to you. But say the word and my servant will be healed.\" This statement is actually part of the Roman Catholic liturgy. Every Mass includes the congregation saying: \"Lord, I am not worthy that you come into my home, but say one word and I will be saved.\" And that communicates a high view of Christ.\n\nThe centurion understood the principle of authority. He knew what it meant to speak and to have his word obeyed. He knew that his servant's desperate condition was beyond the realm of his authority. He needed to go to the one in authority over all creation. He even knew that Jesus did not need to come and physically lay hands on his servant. He knew that the Lord of all creation who spoke the universe into existence simply had to speak the word and the servant would be healed.\n\nThe miracles in the Bible picture something else. They are signs pointing to spiritual truths. And what we see here is that Christ's power of healing this dying servant is a picture of His power to save those who are perishing in their sin. The message of the Bible is clear: the power of salvation lies with the Savior, not with the sinner.\n\nSo the effective servant believes in an exalted Lord who is mighty to save those who cannot do anything to save themselves. He or she knows that salvation is from the Lord, that God saves sinners, and He does that through the words of servants. Where did the centurion get his faith? Faith is a gift of God, but it also comes by hearing, and hearing by the word concerning Christ. Somebody had told him about Jesus — and that's what made him an effective servant for Jesus Christ.\n\nIf we want to be more effective servants of Christ, we need to ask God to show us through His word a more exalted view of the Lord Jesus. Whatever picture of Jesus you have, you must get it from the Word of God. We read the Bible for ourselves to find Jesus. We hear the Bible preached every opportunity we have to find Jesus. And we need to direct others into the Word because it is through the Word that people know Christ.\n\n## An Effective Servant Needs a Lowly View of Himself\n\nSecondly, an effective servant of Christ needs a lowly view of himself. A high view of Christ, a low view of yourself. In verse 4, the Jewish delegation that came to Jesus tells him this is a great man — he built us a synagogue. But then in verses 6 and 7, the centurion himself says of himself that he is unworthy both for Christ to come under his roof and for him to come in person to Jesus.\n\nIsn't it often the case that the man whom the world views as worthy views himself as unworthy because he knows his own heart? This man had all kinds of reasons to boast. He was a man of great faith. He was a good man who was loved by the Jewish people. He was a generous man who had built the synagogue. He was a compassionate man toward his slave. He could even boast about his humility. But he was humble, and God values a humble servant.\n\nHow do we grow in humility? True humility stems from seeing our insufficiency and Christ's all-sufficiency. The centurion's servant was about to die — he was helpless to deal with the irreversible illness. He knew he was insufficient to do anything about the servant's life. But he knew that Christ was all-sufficient. And what a picture of the human race this is — powerless to deal with the ravages of sin and its ultimate result, spiritual death.\n\nFalse humility says, \"I can do nothing,\" and then stops there. True Christian humility says, \"I can do nothing. But I can do all things through Christ who strengthens me\" — and then cries out to Him. One of George Mueller's biographers said this about him: \"Nothing is more marked in George Mueller to the very day of his death than this — that he so looked to God and leaned on God that he felt himself to be nothing and God everything.\" That's humility. And that's what grace is all about.\n\nChristianity is the only religion where God only accepts you if you come knowing that you don't deserve anything. In every other religion you must first become something before you can be accepted by the deity. In our religion, you have to first know that you are worth nothing before God takes you up. So to be effective servants of Christ, we need a lowly view of ourselves — unworthy servants who trust in His grace.\n\n## An Effective Servant Needs a Caring View of Others\n\nAnd then the last point: an effective servant of Christ needs a caring view of others. A high view of Christ, low view of self, caring view of others. The centurion's compassion is seen in his attitude toward this slave. Think about this: it is the first century. Slaves in those days were commonly regarded as property to be used and discarded at will. The centurion is a man of rank and power. He could easily have said, \"Okay, this one is going to die — just get the next one.\" But the centurion's position and power had not gone to his head. He had concern for this one whom society would normally have despised. And of course, the Lord Jesus did not regard this slave as too unimportant to heal.\n\nAll too often we tend to look at people from a human perspective and think, \"This person is hopeless. Why bother ministering to them? Nothing can be done here.\" When we do that, we forget that regeneration is the bringing to life of a dead being. So it doesn't matter how dead you are spiritually — God can regenerate the worst person you know. It takes no more effort from God to regenerate one person than another. And sometimes we look at somebody and think, \"Man, this person would make a great Christian, I wish they would be saved.\" And other times we think someone is too far gone. But in both cases, the Lord can take the most unlikely people from our point of view and do great things with them for the glory of His grace.\n\nHudson Taylor, the great missionary to China who started what became known as the Inland China Mission, used to say: \"All God's giants have been weak men who did great things for God, because they reckoned on God being with them.\" May that same powerful God do great things through us as we trust Him in our weaknesses, that we might be effective servants for Christ as this centurion was.\n\n## Closing Prayer\n\nLet's pray together. Father in heaven, thank you for your word. Enable us to grow in our effectiveness in serving you. Help us to have a great view of Christ, a lowly view of ourselves, and a great compassion for those around us. We are asking in Jesus' name, amen."};
