window.LESSON_DATA = {"id": "undated-incredible-riches-to-abject-poverty", "title": "Incredible Riches to Abject Poverty", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["Incredible Riches to Abject Poverty - Pastor Tito Lyro - 2 Corinthians 8_9.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/incredible-riches-to-abject-poverty-pastor-tito-lyro-2-corinthians-89", "tags": [{"tag": "Christmas", "source": "detected"}, {"tag": "incarnation", "source": "detected"}, {"tag": "grace", "source": "detected"}, {"tag": "contentment", "source": "detected"}, {"tag": "glorification", "source": "detected"}, {"tag": "humility", "source": "detected"}, {"tag": "generosity", "source": "detected"}], "scripture_references": [{"reference": "2 Corinthians 8:9", "type": "quoted", "source": "detected"}, {"reference": "Matthew 1:18-25", "type": "quoted", "source": "detected"}, {"reference": "Philippians 2:5-11", "type": "quoted", "source": "detected"}, {"reference": "John 1:1-14", "type": "referenced", "source": "detected"}, {"reference": "Colossians 1:15-17", "type": "referenced", "source": "detected"}, {"reference": "John 17:5", "type": "referenced", "source": "detected"}, {"reference": "Psalm 50", "type": "referenced", "source": "detected"}, {"reference": "Isaiah 6", "type": "referenced", "source": "detected"}, {"reference": "1 Peter 3:18", "type": "referenced", "source": "detected"}, {"reference": "Mark 10:45", "type": "referenced", "source": "detected"}, {"reference": "2 Corinthians 5:21", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Greatest Event in History", "subpoints": ["The Christmas season celebrates the greatest event in the history of the universe — so obvious that even the unbelieving world feels compelled to celebrate", "The celebration is meaningless without understanding why Christ's birth matters — not to make life better or remove all struggle, but to save his people from their sins (Matthew 1:21)", "The text: 2 Corinthians 8:9 — Paul draws on the incarnation not to teach about Christmas but to motivate the Corinthians to generosity; the incarnation permeates everything Christian", "Main question: what does it mean that he who was rich became poor, that we through his poverty might become rich?"], "scripture": ["Matthew 1:18-25", "2 Corinthians 8:9"]}, {"title": "1. The Riches of the Son of God Before the Incarnation", "subpoints": ["Rich in existence: God the Son pre-existed eternally — John 1:1: 'In the beginning was the Word, and the Word was with God, and the Word was God'; John 17:5: glory shared with the Father before the world was", "Rich in possessions: Psalm 50 — 'the cattle on a thousand hills are mine'; every last thing in the universe belongs to the Son; Colossians 1:15-17: all things created by him and for him", "Rich in power: he who sustains the universe by the word of his power; nothing exists apart from his creative act; he created all things visible and invisible", "Rich in honor: Isaiah 6 — what Isaiah saw on the throne was the glory of Jesus (John 12:41); all the most powerful angelic beings surrounding the throne saying 'Holy, holy, holy'; John 17:5: he prayed for the glory he had before creation", "Rich in love: the Trinity — Father, Son, and Holy Spirit — in perfect unity, perfect love, completely satisfied in their relationship; God did not create because he was lonely; he created from abundance"], "scripture": ["John 1:1-14", "Psalm 50", "Colossians 1:15-17", "Isaiah 6", "John 17:5"]}, {"title": "2. The Poverty of the Incarnation", "subpoints": ["The infinite God became a baby — he who sustains the universe by the word of his power became dependent on Mary for sustenance; he who created all things was carried by his earthly parents", "He left the courts of heaven for a cattle stall and was laid in a feeding trough; from infancy he was persecuted; as a refugee he fled to Egypt as a baby", "He who owned the cattle on a thousand hills became dependent on the charity of others for food and drink; foxes had holes and birds had nests, but he had nowhere to lay his head", "He who was waited upon by the most powerful angels became the servant's servant, washing his disciples' feet — including Judas's feet", "He who was honored by all angelic beings was spit upon and despised; he who was loved by the Father cried from the cross: 'My God, my God, why have you forsaken me?'"], "scripture": ["Philippians 2:5-8", "Matthew 1:18-25", "Mark 10:45"]}, {"title": "3. The Reason for His Poverty — For Our Sakes", "subpoints": ["Mark 10:45: 'Even the Son of Man did not come to be served but to serve, and to give his life a ransom for many' — he became poor for our sakes", "What happened to him is what should have happened to us — he took the penalty we deserved; 1 Peter 3:18: 'The just for the unjust, that he might bring us to God'", "2 Corinthians 5:21: 'He made him who knew no sin to be sin for us, that we might become the righteousness of God in him' — the great exchange", "Don't think only of his birth at Christmas — follow him all the way: to Gethsemane, to the governor's palace, to the cross, to the tomb, to the resurrection"], "scripture": ["Mark 10:45", "1 Peter 3:18", "2 Corinthians 5:21"]}, {"title": "4. The Riches We Receive Through His Poverty", "subpoints": ["Not silver or gold or precious metals but something far more precious — eternal life; John 6:54: 'Whoever eats my flesh and drinks my blood has eternal life and I will raise him up at the last day'", "John 17:3: 'This is eternal life, that they may know you, the only true God, and Jesus Christ whom you have sent' — eternal life is knowing God", "God in Christ calls us to himself and adopts us as his children, giving us an inheritance — heaven itself and eternal life in the presence of his glory", "Every knee will bow to Jesus — those in this life bowing under the weight of his grace; those who refused in this life bowing under the weight of his wrath; but no knee will remain straight"], "scripture": ["John 6:54", "John 17:3", "Philippians 2:9-11"]}], "summary": "Preaching at Christmas from 2 Corinthians 8:9 — 'For you know the grace of our Lord Jesus Christ, that though he was rich, yet for your sakes he became poor, that you through his poverty might become rich' — Pastor Tito Lyro expounds the incarnation of the Son of God. Paul wrote this verse not as a Christmas text but as a motivation for generosity; yet the incarnation permeates everything Christian, so the argument from Christ's condescension flows naturally.\n\nThe sermon first catalogues the riches Christ possessed before the incarnation: rich in eternal existence (John 1:1; John 17:5), in possessions (all things were created by him and for him, Colossians 1:15-17), in power (he sustains the universe by the word of his power), in honor (the angelic hosts of Isaiah 6 worshiped him), and in the love of the Trinitarian life. Then, in stark contrast, the sermon traces the depths of his poverty: from the manger to the flight to Egypt, from dependence on others for food to homelessness, from washing his betrayer's feet to the abandonment of the cross.\n\nThe reason for this descent is stated plainly — for our sakes. What happened to him is what should have happened to us. He took the penalty we deserved, becoming sin so that we might become the righteousness of God in him (2 Corinthians 5:21). The riches we receive in return are not material but eternal — adoption as children of God, the knowledge of God himself (John 17:3), and resurrection at the last day. The sermon closes with the vision of every knee bowing: those saved bowing under the weight of his grace, those who refused bowing under the weight of his wrath, but no knee remaining unbowed.", "transcript": "## Introduction: Why Christ's Birth Matters\n\nWould you believe you may stand in for a longer reading of God's Word? We are actually going to turn to Matthew chapter 1. Matthew 1, verses 18 through 25:\n\n*Now the birth of Jesus Christ was as follows: After his mother Mary was betrothed to Joseph, before they came together, she was found with child of the Holy Spirit. Then Joseph her husband, being a just man, and not wanting to make her a public example, was minded to put her away secretly. But while he thought about these things, behold, an angel of the Lord appeared to him in a dream, saying, 'Joseph, son of David, do not be afraid to take to you Mary your wife, for that which is conceived in her is of the Holy Spirit. And she will bring forth a Son, and you shall call His name Jesus, for He will save His people from their sins.' So all this was done that it might be fulfilled which was spoken by the Lord through the prophet, saying: 'Behold, the virgin shall be with child, and bear a Son, and they shall call His name Immanuel,' which is translated, 'God with us.' Then Joseph, being aroused from sleep, did as the angel of the Lord commanded him and took to him his wife, and did not know her till she had brought forth her firstborn Son. And he called His name Jesus.*\n\nThe Christmas season is a great time of the year. All this celebration, all this excitement, is meaningless if we do not know why Christ's birth was so important. And that is what we are going to consider this morning.\n\nChrist was born into a broken world — a world marked by sin, to a people utterly corrupted by sin who do not want anything to do with him. When we understand the brokenness and limitation of the human condition, we can really understand what Paul said concerning Christ in 2 Corinthians 8:9: 'For you know the grace of our Lord Jesus Christ, that though he was rich, yet for your sakes he became poor, that you through his poverty might become rich.'\n\nWhen we understand what sin has done to us, and how sin separates us from God, then we become very thankful and excited about Christ's mission as reported in Matthew 1:21 by the angel to Joseph: 'He will save his people from their sins.' That is why Christ came — to save his people from their sins. He did not come to make your life better. He did not come to give you everything you want. He did not come to give you the perfect marriage. He did not come to provide for you financially. He did not come to remove every struggle of life. He came to save his people from their sins. If you trust in Christ for any other reason than that, your faith is questionable — because his mission is to save you from your sins.\n\n## 1. The Riches of the Son of God\n\nWe are going to consider 2 Corinthians 8:9. Paul is not actually talking about Christmas in this passage — he is talking about generosity. But the incarnation — the fact that God the Son took upon himself a human nature to become like us — is so important in everything Christian that it permeates everything we do. So Paul draws on the incarnation to motivate generosity.\n\nFirst, Paul says that Christ was rich. In what ways?\n\n**Rich in his existence.** He pre-existed. We tend to think of Jesus being born in Bethlehem as the beginning of the life of the Son of God — but that is not the case. God the Son has always existed in the fullness of God. The Apostle John says in John 1: 'In the beginning was the Word, and the Word was with God, and the Word was God. He was in the beginning with God, and the Word became flesh and dwelt among us, and we beheld his glory, the glory as of the only begotten of the Father, full of grace and truth.' And in John 17, Jesus prays: 'Glorify me together with yourself with the glory which I had with you before the world was.'\n\n**Rich in his possessions.** In Psalm 50 the Psalmist is dealing with the people who think that God needs their sacrifices. And God says: 'The cattle on a thousand hills are mine.' Every last thing in the universe is his. Why? Because he is rich in power — he created everything. Nothing exists that the Son did not create. Paul in Colossians 1:15-17 says: 'He is the image of the invisible God, the firstborn over all creation. For by him all things were created that are in heaven and that are on earth, visible and invisible, whether thrones or dominions or principalities or powers. All things were created through him and for him. And he is before all things, and in him all things consist.'\n\n**Rich in honor.** Isaiah 6: Isaiah has a vision in which the temple becomes a palace, the most holy place becomes the throne room, and he sees this one sitting on the throne. These amazing creatures — the seraphim — surround the throne and all they do day and night is say: 'Holy, holy, holy, Lord God Almighty.' In John 12, John tells us that what Isaiah saw there was Jesus Christ on the throne. Before he became flesh like us, all the most powerful angelic creatures honored him.\n\n**Rich in love.** The Trinity — Father, Son, and Holy Spirit — in perfect unity, in perfect love with one another, completely satisfied in their relationship. Do not believe anyone who tells you that God really needs you. God is completely happy with himself. He always has been. He did not create us because he was lonely and needed someone to play with. When we think of God that way, we are making God after our own image. God was rich in love — he had no needs — and yet he chose to create you and to love you, which goes beyond any benefit to himself.\n\n## 2. The Depths of His Poverty\n\nOut of this rich state, Jesus Christ became poor. The becoming poor is described as taking upon himself a human nature — becoming like one of us, yet without sin.\n\nYou cannot imagine what may have gone through the angels' minds in heaven when the announcement came that God the Son was going to become like one of those humans. Spurgeon says that the angels may have thought something like this: 'What? Is it true that he whose crown is adorned with stars would lay that crown aside? Is it certain that he about whose shoulders is cast the purple of the universe is going to become a man? Can it be true that he who is everlasting is one day going to be nailed to a cross?'\n\nThink about the infinite step downward that the Son of God took at the incarnation. The infinite God became a baby. He who sustains the universe by the word of his power became dependent on Mary for sustenance. He who created all things must be carried around by his earthly parents. He left the courts of heaven for a cattle stall. Upon being born, he was laid upon a feeding trough.\n\nFrom his infancy he was persecuted by men, even though he came to save. He had to flee to Egypt as a baby. He faced the miseries of growing up in a forsaken corner of the world. He who owned the cattle on a thousand hills became dependent on the charity of others for food and for drink. He looked at the foxes and saw them going to their burrows, and at the birds going to their nests, and realized that he himself had nowhere to lay his head.\n\nHe who had been waited upon by the most powerful angels became the servant's servant — girded himself with a towel and washed his disciples' feet, including the feet of the one who was about to betray him. He who was once honored by all the angelic beings is now spit upon and despised. He who was loved by the Father cried out, 'My God, my God, why have you forsaken me?'\n\nHe was rich. He became poor. Paul elaborates on that in Philippians 2:5-8: 'Let this mind be in you which was also in Christ Jesus, who, being in the form of God, did not consider it robbery to be equal with God, but made himself of no reputation, taking the form of a bondservant, and coming in the likeness of men. And being found in appearance as a man, he humbled himself and became obedient to the point of death, even the death of the cross.'\n\nAs you go on with this Christmas season, I do not want you to just think about his birth. Think of all that his birth represents. Think of his life. Follow him up to Gethsemane with Peter, James, and John as he sheds tears and sweats as it were blood while he contemplates what is ahead of him. Go with him to the governor's palace where he was mercilessly whipped by vicious Roman soldiers. Look at his marred face as they push a crown of thorns down his brow. Consider the height of his poverty as nails are driven through his wrists and through his ankles and he hangs on the cross, shamefully naked. That is the depth of his poverty — the poverty that his birth led him to.\n\n## 3. The Reason — For Our Sakes\n\nAnd why did he do that? Jesus himself says in Mark 10:45: 'Even the Son of Man did not come to be served but to serve, and to give his life a ransom for many.' He did it for the sake of his church. And if you are a believer in Jesus Christ, he did it for you.\n\nWhat happened to him is what should have happened to us. That is why he did it — we could not do it ourselves. Peter says in 1 Peter 3:18: 'Christ also suffered once for sins, the just for the unjust, that he might bring us to God, being put to death in the flesh but made alive by the Spirit.'\n\n2 Corinthians 5:21: 'For he made him who knew no sin to be sin for us, that we might become the righteousness of God in him.' He became what we are so that we might become what he is. The great exchange.\n\nLet this thought sink in: he was rich — but for your sake he became poor. Can you say that? He was rich but for my sake he became poor. He lowered himself to become like us, died our death, bore the sentence due to our sins — so that we might say, with Paul: 'I am the chief of sinners, yet for my sake he died.'\n\n## 4. The Riches We Receive\n\nAnd through his poverty we are made rich — not with silver or gold or precious metals, but with something much more precious. We are made rich with eternal life.\n\nJesus says in John 6: 'Whoever eats my flesh and drinks my blood has eternal life and I will raise him up at the last day.' These are spiritual words — if you believe him, he will give you eternal life. And in John 17:3, Jesus says: 'This is eternal life, that they may know you, the only true God, and Jesus Christ whom you have sent.' Eternal life is knowing God. God in Christ calls us to himself and adopts us as his children and gives us an inheritance — heaven itself and eternal life in the presence of his glory. There is no greater riches than this.\n\nAnd in his poverty, God exalted the Christ our Lord. In Philippians 2:9-11: 'Therefore God also has highly exalted him and given him the name which is above every name, that at the name of Jesus every knee should bow, of those in heaven, and of those on earth, and of those under the earth, and that every tongue should confess that Jesus Christ is Lord, to the glory of God the Father.'\n\nThe one who saves you is exalted above all. He is coming again for his church. We are sojourners and pilgrims in this life, looking for that new Jerusalem that comes from above, waiting for the one who once was rich, became poor, and now is exalted again — with whom we are going to spend eternity.\n\nNotice that Paul says an innumerable multitude they cannot count according to the book of Revelation are bowing their knees to the one who once was rich and became poor for our sakes — and then was enthroned in heaven again. Some are bowing under the weight of the grace of God as God changes their hearts and enables them to believe in the Lord Jesus Christ. That is us — he graciously changed our hearts and we bow our knees to him through faith. But there will be those who refuse in this life, and their knees will be bent under the sheer weight of his wrath — because they have no one pleading for them before the Father as we have in the Lord Jesus Christ.\n\nBut at the end of the day, there will be no knee left straight. Every knee will bow to Jesus Christ — the one who was rich, and who for our sakes became poor in the incarnation and the enfleshing of the Son with a human nature, and who was then brought back to glory and now reigns over his church and is going to come back for his church and to judge the world.\n\n'For you know the grace of our Lord Jesus Christ, that though he was rich, yet for your sakes he became poor, that you through his poverty might become rich.' Is that you? If it is, rejoice. Your Savior lives and you are rich in him.\n\nFather in heaven, thank you that you are a God who is in the business of saving people. Thank you that you saved us and you united us to your Son and your Spirit. We pray that we rejoice in that, that we thank you that your Son became like one of us — lived the life we are not capable of living, a perfect life of obedience to you; died the death we deserved; was separated from you so that we do not have to be separated from you; and came back to life so that we could have newness of life. We thank you for your Son. We thank you for his mission and we thank you for his ministry. We pray that we live every moment of our lives knowing that by your grace we have been saved through Jesus Christ, and that we would be looking forward to that eternal home. We pray in Jesus' name. Amen."};
