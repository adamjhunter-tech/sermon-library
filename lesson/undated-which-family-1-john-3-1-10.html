window.LESSON_DATA = {"id": "undated-which-family-1-john-3-1-10", "title": "Which Family?", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": "1 John", "series_part": null, "parts": 1, "source_files": ["Which Family_ - Pastor Tito Lyro - 1 John 3_1-10.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/which-family-pastor-tito-lyro-1-john-31-10", "tags": [{"tag": "adoption", "source": "detected"}, {"tag": "new birth", "source": "detected"}, {"tag": "sin", "source": "detected"}, {"tag": "Satan", "source": "detected"}, {"tag": "righteousness", "source": "detected"}], "scripture_references": [{"reference": "1 John 3:1-10", "type": "quoted", "source": "detected"}], "outline": ["Introduction: 1 John 3:1-10 — the test of family identity", "Behold, what manner of love the Father has given us", "We are called children of God — and so we are", "What we shall be has not yet appeared", "Sin as lawlessness — and the Son appeared to take away sins", "Children of God vs. children of the devil", "Conclusion: Which family do you belong to?"], "summary": "Pastor Tito Lyro preaches from 1 John 3:1-10 on the question of family identity — are you a child of God or a child of the devil? John presents the new birth and its effects, showing that those born of God practice righteousness while those of the devil continue in sin, raising the urgent question: which family?", "transcript": "## Scripture Reading — 1 John 3:1–10\n\nIf you are able, please remain standing, and we are going to read verses 1 through 10 of 1 John chapter 3 as we return to our series on 1 John after a couple of months away. This is the Word of our Lord:\n\n> *\"Behold, what manner of love the Father has bestowed on us, that we should be called children of God! Therefore the world does not know us, because it did not know Him. Beloved, now we are children of God; and it has not yet been revealed what we shall be, but we know that when He is revealed, we shall be like Him, for we shall see Him as He is. And everyone who has this hope in Him purifies himself, just as He is pure. Whoever commits sin also commits lawlessness, and sin is lawlessness. And you know that He was manifested to take away our sins, and in Him there is no sin. Whoever abides in Him does not sin. Whoever sins has neither seen Him nor known Him. Little children, let no one deceive you. He who practices righteousness is righteous, just as He is righteous. He who sins is of the devil, for the devil has sinned from the beginning. For this purpose the Son of God was manifested, that He might destroy the works of the devil. Whoever has been born of God does not sin, for His seed remains in him; and he cannot sin, because he has been born of God. In this the children of God and the children of the devil are manifest: whoever does not practice righteousness is not of God, nor is he who does not love his brother.\"* (1 John 3:1–10)\n\nPlease be seated. Let us pray. Father, we pray that You would open our eyes to see wonderful things in this passage. We pray in Jesus' name. Amen.\n\n## Introduction: John Gives It to Us Straight\n\nJohn really gives it to us straight in this passage. No beating around the bush, no complicating things. It is black and white. If you belong to God, if you actually believe in Him, your life — the way you do things, the way you relate to the Scriptures, the way you relate to others — will be in submission to the Bible. That means that the faith you claim to have is actually genuine. By the time he writes this letter, the Apostle John is about eighty years old. He has no time for playing around anymore. He is not interested in small talk. He goes directly to the point: if you don't know God, then you don't believe in Him. It is that simple.\n\nJohn clearly teaches that the whole world falls under two groups, two families: either the family of God or the family of Satan. He says that clearly in verse 10 and in verse 8. And the distinguishing characteristic between the family of God and the family of Satan is how they relate to the Word of God. Do they obey God, or do they not?\n\n## Background on 1 John\n\nWe have been away from 1 John for two months — since November — with our Christmas series, a series on humility, and a couple of sermons on the Psalms. After this break, I think we need to remind ourselves of a few things about 1 John that are very important for an overall understanding of this letter. If you don't keep this background in mind, we are going to have a hard time understanding why John says things the way he does.\n\n**First**: the Apostle John wrote this letter with full apostolic authority, under the inspiration of the Holy Spirit, so that what we have in front of us is the very Word of God — infallible, authoritative, and life-giving. It is good to be reminded of that when we open our Bibles. God is speaking to us in an infallible, perfect, and powerful way every time we open the Bible. And that is what John is doing in 1 John.\n\n**Second**: the Apostle John originally wrote this letter as a concerned pastor for a church — or perhaps a group of churches — that had been influenced by bad theology. He was concerned about what they were being taught, what they were buying into. Sadly, people who had at one point been part of the church were now teaching what I would call \"damnable heresy.\" A heresy is a departure from what is right, and a damnable heresy is one that, if you believe it, leads you to hell. That is the kind of thing being taught by this group of people who had at one point been part of the church but had rebelled against the teaching of the Apostle — and at least some in the church were listening to them. That was the situation that moved John to write this letter.\n\nThe false teaching had to do with two areas.\n\n**The first** concerned the person of Christ — who Christ is. The false teachers did not like the idea that the Messiah had a physical body like ours, because they were influenced by philosophies that were prevailing at the time that taught the material world was evil and the spiritual world was good. That is not what the Bible teaches. But because they believed that, they thought, \"How can God take upon Himself what is material, what is physical? That must be bad.\" So they taught that Christ could not have had a body like ours. They got around the teaching of the Scriptures by either saying that somehow Jesus and Christ were two different entities — that the divine Christ came upon the human Jesus at some point and left Him later — or that Jesus Christ was just an apparition, a ghost, a hologram, not really a physical person.\n\nAnd John says: that is not what the Bible teaches; that is not what Jesus was. Unless we have a whole Jesus Christ who is both fully man and fully God, we do not have a Savior at all. If you leave out either side, you have no Savior and no hope, because you have to stand before God on your own with no one to plead for you. The modern struggle is no longer so much with the fact that Jesus was fully human — the modern struggle tends to be with the fact that Jesus is fully God. That tends to be the attack of theological liberals and also the attack of cults in our day. But John's teaching extends to both: either you have the whole Christ, fully man and fully God, or you have no Savior at all.\n\nAnything less than what the Bible teaches concerning Christ will not deal with your sins. Christ needed to be fully human in order to live as one of us and do the very things that Adam, the first man, failed to do — obeying God's law perfectly as a man, and thereby securing that obedience for us. When you believe in Jesus Christ, God the Father sees you in light of the obedience of Christ, and says: because My Son as a human obeyed Me perfectly, I will count you as perfect in My sight. But Christ also needed to be human to die the death that you and I as sinners deserved — separation from the Father. A sacrifice must be of the same kind as the one being sacrificed for. He had to be one of us to die for us. But He also needed to be God, because only God can bear the infinite wrath of God in a finite amount of time. Christ paid for the sins of His people on the cross — an infinite payment. In order to pay for infinity in a limited amount of time, you have to be infinite yourself. Take away either the divine part or the human part, and you don't have a Savior that works.\n\nIf you are not clear on why the Bible teaches that Jesus Christ must be fully man and fully God, come and talk to me afterward. Don't leave here today without understanding why that is necessary.\n\n**The second** teaching that concerned John had to do with the Christian's response to his or her own faith. What happens after you believe in Jesus Christ? What do you do with that? How do you live it out? The false teachers thought there was no place for obedience in the life of the Christian. Just believe in Jesus and live however you want — you don't have to obey God. They taught that as long as a person held onto a special kind of knowledge — which only these false teachers had, available for a small payment — what you did in life didn't matter; sin didn't matter. And this special knowledge was only available through these teachers and was not found anywhere else in the Bible.\n\nIf someone says something like that to you today, beware. If someone claims they have found something new in the Bible, or that God told them something that is not in the Bible, run. Run fast away from that person, because he is about to lie to you.\n\nJohn, under the inspiration of the Holy Spirit, says there is no secret knowledge outside of the Scriptures, and that obedience to the Word of God is the identifying characteristic of the Christian. We are people who follow Christ, people who obey Christ.\n\nThese two teachings — the denial of Christ's full humanity and the denial of the need for obedience — are the basic elements of the earliest Christian heresy, something called Gnosticism. Not that the name matters enormously, but you will hear that word thrown around. These two themes, Christ and obedience, dominate the entire letter, and John weaves them together repeatedly to the point that he says the same things in different ways several times — which makes it a nightmare to try to outline 1 John. Early in our series, Jacob Norton said, \"Pastor, it seems like you're preaching the same sermon every week.\" Because that is what John is doing — repeating himself, because this is such an important thing.\n\n## John's Three Tests\n\nSo what John tells us is that instead of looking for some elusive secret knowledge in order to know whether you are a Christian, John provides three objective tests that are not secret at all and are not new either. You find them throughout the epistle, and throughout the New Testament.\n\n1. Do you believe all that the Bible teaches concerning Christ? Do you believe in the whole Christ? If yes, that is a sign your faith is genuine.\n2. Do you obey God by obeying what He tells you in His Word? This obedience is not a perfect obedience. It is a repentant obedience that turns away from sin and turns to God through Jesus Christ — a growing obedience, a willful obedience. Do you intentionally seek to obey God through His Word? That is a sign of genuine faith.\n3. Do you love your brothers and sisters in Christ? That too is a sign of genuine faith.\n\nDon't go looking for a secret. Don't go looking for the new snake oil of religion. Do you believe in the whole Christ? Do you obey His Word? Do you love His people? If you can say yes to all these things, your faith is genuine.\n\nOur passage includes all three of these elements, but it focuses especially on the Christian's response of obedience to the gospel. John opens the chapter with Christ and His work on our behalf in verses 1 and 2, then moves to how we respond in obedience in verses 3 through 10a — and that obedience will show itself in love for the brethren in the last part of verse 10.\n\n## To Which Family Do You Belong?\n\nNow, with these things fresh in our minds, we are ready to consider the most important question this passage puts before us: **To which family do you belong? God's or Satan's?**\n\n### We Obey Christ Because He Has Brought Us Into His Family\n\nWhy do we as believers obey Christ according to this passage? We obey Christ because Christ brought us to spiritual life in His first coming and will bring us to perfect physical life in His second coming. Look at verses 1 and 2:\n\n> *\"Behold, what manner of love the Father has bestowed on us, that we should be called children of God!\"* (1 John 3:1–2)\n\nThrough Jesus Christ, we have been adopted as children of God. If you believe in Jesus Christ as your Savior for the forgiveness of your sins, the Father says, \"This is My child.\" That is the kind of love the Father has given to us — the kind that brings us into His family and gives us all the rights of the sons of God, as Paul says in Galatians 3:\n\n> *\"For you are all sons of God through faith in Christ Jesus.\"* (Galatians 3:26)\n\nWe have a new life as part of the new family. We have been recreated. We are no longer just Smith or Jones — we are Christians. All of this is by the grace of God through faith in Christ alone and nothing else.\n\nBut what Christ is doing for us doesn't stop in the here and now. We will be raised physically to be like Him — holy and eternal. So Christ has delivered us spiritually, and He is going to deliver us physically as well. And because of that, because we have this great hope of the resurrection, we are motivated to obey God in verses 3 through 10. The hope of the resurrection, the fact that we are children of God and that Christ is coming back for us, pushes us to live holy lives now.\n\nLook at verse 3:\n\n> *\"And everyone who has this hope in Him purifies himself, just as He is pure.\"* (1 John 3:3)\n\nTo live a pure life is to live a life of obedience to the Lord. Notice that another motivation is the very character of Christ. You are a child of God, a brother or sister of Christ — He is your Lord and Savior — and He Himself is pure, holy. We are united to Him, so we too live a pure life. That is one of the reasons for the test of obedience. If you believe in Christ, you become like Him — there is no option. The Spirit of God dwells in you and you become like Him. So if there is nothing of Him in you, there is no reason to think your faith is genuine. Not physically, mind you — someone tried to argue before the service today that beards are normative for Christians because Abraham, Isaac, and Jacob wore them. That is not what I mean. To be like Christ is not about how we look physically. Do we resemble Him in love? In meekness? In kindness and compassion, in patience, in self-control? If there is nothing of that in our lives, how can we be in Him? How can He be in us?\n\n### What Sin Is\n\nJohn helps us understand what sin is, so that we can avoid it. Look at verse 4:\n\n> *\"Whoever commits sin also commits lawlessness, and sin is lawlessness.\"* (1 John 3:4)\n\nSin is lawlessness — rebellion against God by transgressing God's law. And the law of God is not just the thinking of men, but the whole of the Bible. To use the answer to question 14 of our Westminster Shorter Catechism: sin is any want of conformity unto, or transgression of, the law of God. Sin is objectively defined. Sin is lack of submission to what God says in His Word. Sin is not what *I* think is sin. Sin is not what *you* think is sin. Sin is not what society thinks is sin. Sin is lack of submission to the Word of God. Calvin says that sin arises from a contempt of God. Thomas Boston says that sin is simply the desire to have my own way.\n\nThis is important: sin is objectively defined. The Bible tells us what sin is. This is actually the most difficult question we ask during the membership interview process — perhaps because of the way people think about it. We ask, \"How do you know what sin is?\" And we see the blood drain from people's faces — except for those who have been memorizing the catechism. All we are looking for is that the person knows that the *Bible* tells us what sin is, not the elders, not the world, not our own opinions.\n\n### Why John Insists on Purity: Christ Has Taken Away Sin's Power\n\nWhy is John so insistent on our purity? Because Jesus Christ has taken away both the guilt and the power of sin over us. Look at verse 5:\n\n> *\"And you know that He was manifested to take away our sins, and in Him there is no sin.\"* (1 John 3:5)\n\nPaul says in Romans 6:\n\n> *\"For sin shall not have dominion over you.\"* (Romans 6:14)\n\nChrist has taken the power of sin over us. United to Christ, we are no longer bound to that. We have been freed from the dominion of sin. Calvin says: \"They who cease not to sin render void the benefits derived from Christ, since He came to destroy the reigning power of sin.\"\n\nThis verse is important for this passage because without it, the rest of the passage might leave a self-righteous, moralistic taste in the reader's mouth. This verse reminds us that everything John is saying is only true because of what Christ has done for us. The only reason we can obey God is because Christ obeyed God before us and redeemed us, giving us a new heart in which the love of God is written — a heart now able to say \"I'll follow You,\" a heart that believes and is dominated by the Spirit of God.\n\nSince Christ has taken away the power of sin, it is inconsistent for one who is united to Him to live as if still under sin's dominion. And that is why John says in the second half of verse 8:\n\n> *\"For this purpose the Son of God was manifested, that He might destroy the works of the devil.\"* (1 John 3:8b)\n\nSo because of our union with Christ, our lives are marked by obedience, not by constant sinning.\n\n### Verse 6: Not Sinless Perfection, But Pattern of Life\n\nLook at verse 6:\n\n> *\"Whoever abides in Him does not sin. Whoever sins has neither seen Him nor known Him.\"* (1 John 3:6)\n\nDoes that shock you? The New King James says \"whoever abides in Him does not sin.\" Now, if you are alive and have a pulse, you know that you sin. And if you say you don't sin, you are a liar and the truth of God is not in you — that's what John says in chapter 1, verses 8–10. So what is John saying here?\n\nJohn is not teaching that the believer can become morally perfect in this life — the idea of sinless perfection. He has already said in chapter 1 that anyone who claims not to sin at all is a liar. John is referring to patterns of life, not to individual occasions of sin. He is referring to what some have called the \"film\" of your life — the movie, not the snapshot of a particular moment. Is your life marked by sin or by obedience? If you were to play the movie of your life here, would it be a life characterized by Christ's presence, or by His absence? The tense of the verbs in the original language requires this interpretation. John goes out of his way to state every verb in a tense that indicates continued and repeated action. Are you *repeatedly* marked by sin, or *repeatedly* marked by obedience? F.F. Bruce, the great New Testament scholar of the mid-1900s, said: fellowship with the sinless One and indulgence in sin are a contradiction in terms.\n\nSo when John says in verse 6, \"whoever abides in Him does not sin\" — he means that whoever is in Christ is not marked by *continual* sin in his or her life, not that they have reached absolute perfection.\n\n### Verse 7: Tenderness and the Test of Righteousness\n\nNotice John's tenderness and love as he addresses this idea of obedience. Look at verse 7:\n\n> *\"Little children, let no one deceive you. He who practices righteousness is righteous, just as He is righteous.\"* (1 John 3:7)\n\nHe addresses them as \"little children\" — his favorite title for the church. He is not writing these things because he wants to control them or make them conform to a rigid set of rules. He is writing because he loves them, and God has preserved these words for us because He loves us and knows what is best for us. When the Bible says \"don't sin,\" it is not just trying to impose rules that make your life miserable. God is not trying to limit us in any way. He is trying to free us to be what we have been created and recreated to be.\n\nThat is why John says: obey Christ, because that is who you are. You are the type of person who obeys Christ. And there is no plainer way to say it than verse 7: the righteous person does what is right because Christ, who is righteous, does what is right. The word \"righteous\" can seem mysterious, but it just means doing what is right. There is no mismatch between the inner person and what he or she does. If God has declared someone righteous because of Christ, they are going to do what is right. There is no contradiction between the heart and the actions.\n\nBut we can easily deceive ourselves about this. The Gnostic teachers insisted that the righteous were the enlightened ones who received secret knowledge from these special teachers. John says it is far simpler than that: the righteous person is the one who does what is right, as defined by the law of God. Sin is the transgression of the law of God, so what is right is also defined by the law of God. Doing is the best test of being.\n\n### Verse 8–9: A Life of Sin Belongs to the Devil's Family\n\nJohn continues in verse 8:\n\n> *\"He who sins is of the devil, for the devil has sinned from the beginning. For this purpose the Son of God was manifested, that He might destroy the works of the devil.\"* (1 John 3:8)\n\nHere again, John is talking about the *continual* practice of sin. The devil has sinned from the beginning — sin is the defining characteristic of Satan — and because of that, those who are Christ's are not going to live that way.\n\nAnd the Christian, in verse 9, plainly cannot continue to live a life characterized by sin, because the Spirit lives in him:\n\n> *\"Whoever has been born of God does not sin, for His seed remains in him; and he cannot sin, because he has been born of God.\"* (1 John 3:9)\n\nThe Spirit of God is in him. This is the New Covenant promise: God said He would give His people a new heart and put His Spirit within them so that they can follow Him. That is what is happening in us as we follow Christ. The Christian can backslide and live in sin for a period, but he will never be able to continue in that sin forever. He may even find himself in the despair and grip of sin — and then come out of it. But the movie of his life will not ultimately be characterized by the works of Satan. Paul says the same thing in Philippians 1:6:\n\n> *\"He who has begun a good work in you will complete it until the day of Jesus Christ.\"* (Philippians 1:6)\n\nGod is not going to leave it unfinished.\n\n### The Question of Verse 10\n\nSo to which family do you belong? That is the question of verse 10:\n\n> *\"In this the children of God and the children of the devil are manifest: whoever does not practice righteousness is not of God, nor is he who does not love his brother.\"* (1 John 3:10)\n\nThe family of God obeys Him. The family of Satan does not.\n\n## Why Is Obedience So Hard If It Is So Simple?\n\nLet me close with four answers to that question. Are we agreed that sometimes it is really hard to obey God? If you say \"nope, always super easy,\" then either you are the second coming of Jesus Christ or you have no idea what it is to follow Christ. So why is it so hard to obey God if it is so simple?\n\n**Answer 1: Simple is not the same as easy.** Just because something is simple doesn't mean it is easy for us to do.\n\n**Answer 2: We have bought into the idea that we can't help but sin.** We have accepted the notion that sin is just what we are and what we are going to do. That is not Christianity. There is certainly a struggle that can be very great at times, but the struggle does not have to result in defeat. And how we think of ourselves matters. If we think of ourselves as people who cannot do anything but sin, that is what we are going to do. But if we think of ourselves as people who struggle with sin, yet for whom Christ has removed the dominion of sin — then that struggle does not have to end in defeat. Remember: the struggle is not sin. The struggle is actually the opposite — if you are struggling with it, that means you are not giving into it. Paul tells us in Romans 8:12–14:\n\n> *\"Therefore, brethren, we are debtors — not to the flesh, to live according to the flesh. For if you live according to the flesh you will die; but if by the Spirit you put to death the deeds of the body, you will live. For as many as are led by the Spirit of God, these are sons of God.\"* (Romans 8:12–14)\n\n**Answer 3: We have allowed the doctrine of justification to swallow up the doctrine of sanctification.** Justification is the doctrine that teaches that by faith in Christ we are declared righteous before God because of the work and death of Christ — not because of anything in us. God doesn't accept us because we are such good people. We are sinners apart from Christ; because of Him, He declares us perfect — not because of ourselves. But we have allowed justification, where we are completely passive, to crowd out sanctification. Having been justified, we work hard as the Spirit of God works in us. As Paul says in Philippians 2:12–13:\n\n> *\"Work out your own salvation with fear and trembling; for it is God who works in you both to will and to do for His good pleasure.\"* (Philippians 2:12–13)\n\nWe work *because* God is working in us.\n\n**Answer 4: We have bought into a false notion of grace.** I was once counseling someone who was struggling in her marriage. I was trying to help her from the Scriptures to love her husband. She told me: \"I don't have to do loving acts toward my husband, because I don't feel like I love him. To do loving acts toward him would be hypocritical. I have to wait for God to give me the grace to *feel* like I love him before I can behave as if I love him.\" That is a lie from the pit of hell. We have bought into the false notion that God's grace is something we passively receive — and then if we don't feel it, we don't have to obey. Our feeling becomes the deciding factor in obedience, not the grace of God. How many times does Christ have to die for the grace of heaven to be available to you? Does He have to die again in order for you to find the grace to obey Him? The death of the God-man on the cross is not enough?\n\nAnd finally, this is difficult because **we don't avail ourselves of the means that God has given us to receive His grace and grow in obedience.** The reading and especially the preaching of the Word of God is not considered as powerful as God has appointed it to be. We need to be glad to read the Bible. We need to be glad to be in church every time the Word is preached. When we are struggling with sin, we don't approach the Lord's Supper with the seriousness and faith to be fed by it. Prayer is not a commitment we are willing to keep. We don't cultivate the fellowship of the saints in public worship. We try to live as islands and then wonder why we are struggling with sin. God has given these ordinary means to give us grace to grow.\n\nThe solution is to go back to John's simplicity: faith in Christ and obedience to His Word. That is it."};
