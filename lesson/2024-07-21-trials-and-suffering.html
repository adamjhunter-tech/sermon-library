window.LESSON_DATA = {"id": "2024-07-21-trials-and-suffering", "title": "Trials and Suffering", "speaker": "Pastor Tito Lyro", "date": "2024-07-21", "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["7-21-24 -PM- Trials and Suffering - 2 Corinthians 5_19-20 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/7-21-24-pm-trials-and-suffering-2-corinthians-5_19-20-pastor-tito-lyro", "tags": [{"tag": "suffering", "source": "detected"}, {"tag": "obedience", "source": "detected"}, {"tag": "discipline", "source": "detected"}, {"tag": "faith", "source": "detected"}, {"tag": "patience", "source": "detected"}, {"tag": "providence", "source": "detected"}], "scripture_references": [{"reference": "2 Corinthians 5:9-10", "type": "quoted", "source": "detected"}, {"reference": "Romans 8:28-29", "type": "quoted", "source": "detected"}, {"reference": "1 Corinthians 11:30", "type": "referenced", "source": "detected"}, {"reference": "2 Kings 5", "type": "referenced", "source": "detected"}, {"reference": "Psalm 119:67", "type": "quoted", "source": "detected"}, {"reference": "Hebrews 12:5-11", "type": "referenced", "source": "detected"}, {"reference": "John 15", "type": "referenced", "source": "detected"}, {"reference": "2 Corinthians 1:3-4", "type": "referenced", "source": "detected"}, {"reference": "2 Corinthians 4:7", "type": "referenced", "source": "detected"}, {"reference": "2 Corinthians 12", "type": "referenced", "source": "detected"}, {"reference": "1 Peter 1:6-7", "type": "referenced", "source": "detected"}, {"reference": "Philippians 1", "type": "referenced", "source": "detected"}, {"reference": "James 1:2-4", "type": "referenced", "source": "detected"}, {"reference": "John 9", "type": "referenced", "source": "detected"}, {"reference": "Psalm 119:71", "type": "quoted", "source": "detected"}, {"reference": "John 17:20-21", "type": "referenced", "source": "detected"}, {"reference": "1 Corinthians 10:13", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 10:24-25", "type": "referenced", "source": "detected"}, {"reference": "Romans 12:1-2", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Other Side of the Coin", "subpoints": ["This morning: God's response to our suffering — he sympathizes through Christ", "This afternoon: Our biblical response in trials and suffering", "Overview: 15 reasons God allows trials, and the resources God provides"], "scripture": []}, {"title": "First Response: Please Christ in Suffering", "subpoints": ["2 Corinthians 5:9 — our aim is to please him whether alive or dead", "2 Corinthians 5:10 — we will appear before the judgment seat of Christ", "Romans 8:28-29 — the 'good' of trials is conformity to Christ's image"], "scripture": ["2 Corinthians 5:9-10", "Romans 8:28-29"]}, {"title": "Fifteen Reasons God Allows Trials and Suffering", "subpoints": ["1. Unconfessed sin (1 Corinthians 11:30; Gehazi in 2 Kings 5)", "2. Discipline — not punishment, but a means to shape us (Psalm 119:67; Hebrews 12:5-11)", "3. To increase our usefulness — pruning for more fruit (John 15; 2 Corinthians 1:3-4)", "4. To remind us this is not heaven — we live in a fallen world", "5. To show us the effect of others' sins on us", "6. To reap what we sow (Galatians 6:7-8)", "7. To reveal our weaknesses and cause dependence on God (2 Corinthians 12)", "8. To expose misplaced hope — idols of self, circumstances, or possessions", "9. To enlarge appreciation of God's sufficiency (2 Corinthians 4:7)", "10. To test and strengthen faith (1 Peter 1:6-7)", "11. To create opportunities to witness for Christ (Philippians 1)", "12. To develop Christlike character (James 1:2-4)", "13. To cause us to recognize our need for the body of Christ", "14. To bring glory to God — he is more glorified in your suffering (John 9)", "15. To drive us to God's Word (Psalm 119:71)"], "scripture": ["1 Corinthians 11:30", "Psalm 119:67", "Hebrews 12:5-11", "2 Corinthians 4:7", "1 Peter 1:6-7", "James 1:2-4", "Psalm 119:71"]}, {"title": "Resources God Provides for Suffering", "subpoints": ["The Father's providential will — good, perfect, and acceptable (Romans 12:2)", "Christ's intercession on our behalf (John 17:20-21; Hebrews 4)", "The indwelling Holy Spirit who equips us", "Grace that is always sufficient — no temptation is too great (1 Corinthians 10:13)", "The body of Christ — spurring one another to love (Hebrews 10:24-25)", "The brevity of earthly life compared to the weight of eternal glory"], "scripture": ["Romans 12:2", "John 17:20-21", "1 Corinthians 10:13", "Hebrews 10:24-25"]}], "summary": "In this companion sermon to the morning message, Pastor Lyro turns from God's response to our suffering to our biblical response to trials. He begins by anchoring the believer's primary obligation in affliction: to please Christ at all times, knowing that every response — whether in life or death — will be reviewed at the judgment seat of Christ (2 Corinthians 5:9-10). He surveys fifteen reasons Scripture gives for why God allows trials in his people's lives, ranging from unconfessed sin and divine discipline to opportunities to witness, to glorifying God, and to driving believers back to God's Word. Throughout, he cautions against the pastoral error of Job's friends — assuming unconfessed sin is the only explanation — while affirming that God always has purposeful reasons for suffering, even when they remain hidden. The sermon then surveys the rich resources God supplies: his sovereign providential care, Christ's ongoing intercession, the indwelling Spirit, sufficient grace, the community of the church, and the perspective of eternity. Pastor Lyro concludes that God never merely commands believers to respond rightly in suffering and leaves them to manage alone — through Christ he furnishes everything needed to suffer well, for his glory.", "transcript": "## Introduction\n\nThis afternoon's sermon is going to be the other side of the coin of this morning's sermon. This morning we saw what was God's response to our suffering — that he is able to sympathize and walk with us because he has experienced suffering in the person of his Son, the Lord Jesus Christ. This afternoon I wanted to consider our biblical response in trials and suffering.\n\nWhat is it that the Bible teaches us that we are to do in responding to trials and sufferings? In some ways it may be for you a little frustrating because we are going to cover a lot of ground in the Scriptures by only mentioning it. I am not necessarily turning to it but just summarizing it. But I think this is going to be a profitable exercise as we think about that.\n\n## First Response: Please Christ in Suffering\n\nThe first thing that we need to think about when responding to trials and sufferings as God's children is that we must be responsible, no matter how we feel, to always please Christ, since we will also give an account to him. So one of the things to give you is that we must please Christ in our suffering. 2 Corinthians chapter 5 verse 9, the apostle says, whether we are at home or away, we make it our aim to please him. And if you look in context, the \"home or away\" refers to being either alive or dead. So these are the only two times in our lives where our aim has to be to please God — when we are alive and when we are dead.\n\nThen Paul gives a reason why in verse 10, 2 Corinthians 5:10: For we must all appear before the judgment seat of Christ, so that each one may receive what is due for what he has done in body, whether good or evil. And as we respond to suffering in our lives, don't just pray to hang in there or just get through the trial or the suffering. But ask God to help you grow in the midst of the difficulty, to be more like Jesus Christ. We all know Romans 8:28 by heart, where it says that all things work together for good for those who love God, who are called according to his purpose. But we forget to look at verse 29, that describes what that good is. The good that trials are working in our lives is to conform us to the image of Jesus Christ. So yes, in the suffering, pray for relief, pray the Lord takes it away, but also focus on how God is going to grow you and help you to grow in the midst of suffering.\n\n## Fifteen Reasons God Allows Trials and Suffering\n\nAnd there are 15 possible reasons why God allows trials and sufferings. This doesn't mean that they all happen at the same time. But the Scriptures speak of 15 reasons why trials and suffering come to our lives.\n\nOne is unconfessed sin. We see that in 1 Corinthians 11:30, where Paul says that there are some who came to the table with unconfessed sin and they experienced judgment. You remember the story of Gehazi in 2 Kings chapter 5. Naaman comes from Syria, is healed by dipping himself seven times in the Jordan River. He's super excited, as you'd expect him to be. He's been healed from leprosy. His life's been restored. He lies to Elisha, takes what he can from Naaman, and then — the leprosy of Naaman clings to him as judgment for unconfessed sin. So a reason for suffering in our lives is unconfessed sin, though we have to be careful, because even as we're trying to minister to people, we don't want to be Job's friends, who think that the only reason for suffering in our lives is unconfessed sin. It's a reason, and needs to be explored, but it's not the only reason why somebody might be suffering.\n\nSuffering also comes to our lives as a form of discipline that God brings to us. Now, God does not punish his people. Punishment is an end in and of itself. God disciplines because that's a means to something else. Sometimes suffering comes to our lives in order to discipline us, to shape us, to guide us, to help us be what God is calling us to be. In Psalm 119, verse 67, the Psalmist says, before I was afflicted, I went astray, but now I keep your word. It was the affliction that drove the Psalmist to the Word of God. That's the whole point of Hebrews 12:5-11, where the Holy Spirit says, if sinful parents are right to discipline their children, how much more your heavenly Father will discipline you.\n\nThirdly, trial and suffering comes to our lives sometimes because God wants to increase our usefulness. Remember, in John 15, Jesus says that he is the vine and we are the branches. Sometimes the branches need to be pruned — not just cut off, but shaped so that more fruit can be produced. And that's what suffering does for us as well. And 2 Corinthians chapter 1, verses 3 and 4, Paul says that God is a God of all comfort, who comforts us in our suffering, so that in turn we can comfort others with the comfort we ourselves have received from God.\n\n4. Suffering comes into our lives to help us realize that this isn't heaven and we live in a fallen world. Sometimes we can get too comfortable in this life. Genesis 3 tells us that we live in a world marked by sin, cursed as a result of sin. Romans 8 tells us that the whole creation is groaning for that day of the final redemption of all things.\n\n5. Sometimes God brings suffering to our lives to show us that other people's sins have an effect on us — to help us remember that other people's actions affect other people.\n\n6. He brings suffering to our lives to reap what we sow. Sometimes we make sinful choices and the suffering comes as a result, as Galatians 6:7-8 tells us.\n\n7. Suffering sometimes comes to teach us about our own weaknesses and causes us to depend on God. A clear place we see this is in 2 Corinthians 12, where Paul is given this thorn in the flesh. And God says, not going to remove that; I'm just going to give you grace so that you can go forward in humility. So Paul learns from that and says, in my weakness I am made strong by the grace of God.\n\n8. He brings suffering to us sometimes to help us realize that we have placed our hope somewhere else or have spread it out between God and self, circumstances, other people, or possessions. Suffering comes sometimes to help us focus on God and God alone, because our hope is to be squarely fixed upon God alone and his promises.\n\n9. God sometimes brings suffering to our lives in order to enlarge our appreciation of his sufficiency. In 2 Corinthians 4:7 Paul says, we have this treasure in earthen vessels, that the excellence of the power may be of God and not of us. Earthen vessels — jars of clay. These are our bodies. Jars of clay break easily and are not that special. And suffering comes to break our jars and to help us understand that our sufficiency is not in ourselves.\n\n10. Sometimes suffering comes to test and strengthen our faith. We see that in 1 Peter 1:6-7, that as our faith is tried in the fiery trials of life, it is strengthened.\n\n11. You love suffering — it comes to create opportunities to witness for Christ. In Philippians chapter 1, Paul says that he is in jail — that is the suffering for him — but that being in jail allowed him to witness to the Praetorian guard, that special forces of the Roman Empire, and even reached into Caesar's household.\n\n12. Suffering sometimes is given to us to develop Christlike character. James 1:2 and following are some of the hardest verses in the Bible, where the Holy Spirit tells us to count it all joy when we go into trials — not because of the trial itself, but because of what the trial can produce in us: Christlike character.\n\n13. Sometimes suffering comes to us to cause us to recognize our need of one another in the body of Christ — to truly weep with those who weep, and to practice the \"one another\" commands we find in the Scriptures.\n\n14. Suffering always comes to bring glory to God. No matter what trial you are going through, it comes to bring glory to God. Remember the story in John chapter 9, where Jesus heals a blind man. The disciples ask, who sinned? And Jesus answers, neither him nor his parents. He is blind in order that God may be glorified. That's why he was suffering.\n\n15. And suffering comes because it drives us to God's Word. In Psalm 119:71 says, it is good for me that I have been afflicted, that I may learn your statutes. You don't often hear reports of people growing closer to Christ in times of ease. It is usually the time of struggles and suffering where people draw closest to the Lord through his Word.\n\n## Resources God Provides\n\nNot only does God expect us to respond in a certain way, but he also gives us resources to respond the way he wants. The Father, providentially, is carrying out his decree in our lives. And his will is good, perfect, and acceptable. So whatever is going on in our lives is coming from the hand of the God who said that his will for us is good, perfect, and acceptable, as Romans 12 says.\n\nAnd as we're going through it, Christ is praying on our behalf. You see that in John 17:20-21, where Jesus says, I am not praying only for these, but for those who may believe through their word. So brothers and sisters, Jesus prayed for you. Not only that, as we saw in Hebrews 4, he is praying for you at this very moment. Whatever you are going through, Jesus Christ is interceding for you. And you have his Holy Spirit dwelling in you, who equips you. You have his grace, which is sufficient. He always promises victory — not necessarily deliverance from suffering, but his grace is sufficient. And there is no temptation that is too powerful, even in your suffering, that you cannot overcome through Jesus Christ, as 1 Corinthians 10:13 teaches.\n\nAnd the other resource that God has given you to go through times of suffering is the church, the body of Christ. In Hebrews 10:24-25, we are called to spur one another on to love and good works, not giving up meeting together. The body of Christ is that resource even in times of suffering.\n\nAnother thing that helps us move through suffering is the fact that our earthly life is short compared to eternity in heaven. The things we're going through here, as severe as they are, are nothing more than light and momentary afflictions compared to the weight of glory that is to come. Heaven is our home, and it is a sure place. That's where we're going. And the Lord Jesus Christ is coming — and you're going to see him and be like him.\n\nSo Jesus the Lord expects us to react in a certain way, but even then he gives us all the resources that we need to respond in that way. That's just another display, another evidence of his goodness, that he gives us what we need in order to respond the way that he wants us to respond. He doesn't leave us to do it alone — through Christ, he strengthens us to the very things that he calls us to do. So let us suffer well, for the glory of God. Let us pray together. Father, thank you for your Word. We thank you that you direct us in how we respond to suffering. Help us to suffer well for your glory. In Jesus' name. Amen."};
