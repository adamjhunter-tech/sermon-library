<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-the-god-of-all-comfort-isaiah-40-1-11", "title": "The God of All Comfort", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["The God of All Comfort - Pastor Tito Lyro - Isaiah 40_1-11.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/the-god-of-all-comfort-pastor-tito-lyro-isaiah-401-11", "tags": [{"tag": "comfort", "source": "detected"}, {"tag": "attributes of God", "source": "detected"}, {"tag": "atonement", "source": "detected"}, {"tag": "Isaiah", "source": "detected"}, {"tag": "gospel", "source": "detected"}], "scripture_references": [{"reference": "Isaiah 40:1-11", "type": "quoted", "source": "detected"}], "outline": ["Isaiah 40 in context: the hinge from doom to comfort at chapter 39", "The Babylonian captivity prophesied as ultimate chastisement (Isaiah 39:5-7)", "Isaiah moves 200 years forward to the end of captivity and beyond", "The prophet's commission: speak comfort tenderly to Jerusalem (vv.1-2)", "Her warfare ended, her iniquity pardoned — atonement through Christ (v.2)", "Voice 1 — the Herald of the Lord: prepare the way (vv.3-5) — fulfilled in John the Baptist", "Voice 2 — the fragility of flesh versus the enduring Word of God (vv.6-8)", "Voice 3 — Zion proclaims: Behold your God (vv.9-11)", "God the shepherd-king: strong arm and tender care for the lambs (v.11)"], "summary": "Expository sermon on Isaiah 40:1-11, placing it in the full context of Isaiah's shift from judgment (chapters 1-39) to comfort (chapters 40-66). The comfort God announces is grounded in precise atonement — his mercy is matched exactly to every sinner's need through the Lord Jesus Christ. Three voices unfold the good news: the Herald (John the Baptist) who prepared the way; the voice that reminds us of life's fragility against the enduring Word; and Zion, called to proclaim 'Behold your God.' The sermon closes with an urgent call to men to take up the ministry of the Word.", "transcript": "Comfort is important for all of us in life. Just a couple of weeks ago, my wife and I bought a new car to replace the one that had been totaled. And at the top of our list of criteria, it was not necessarily the make, it was not necessarily the looks — it was comfort. As we get older, that becomes more and more important. And comfort is something we seek not only in the physical world, but also in the emotional and spiritual world. We want our fears to be dispelled, our anxieties to be taken away, and our pain and suffering removed. We want uncertainties turned to assurances, and we ache for our country that is moving further and further from the Word of God. Where do we find such comfort? Where do we go to be comforted? The only way, the only place, the only person in whom we will find the comfort our souls are seeking is in God — but not just any god. In God as he is revealed to us in the Scriptures.\n\n## Isaiah 40 in Context\n\nAs we begin, it is important that we place Isaiah 40 in its context. If you have ever read through Isaiah, you have noticed that there is a great change right at chapter 39 — a hinge where the prophecy shifts. In chapters 1 through 38, most of the content is filled with doom and gloom. There are sporadic rays of sunshine: the holy, holy, holy of chapter 6; the child born to us in chapter 9; the shoot from the branch of Jesse in chapter 11. But the prevailing tone of chapters 1 through 38 is judgment — against this nation and that nation, and against the people of God.\n\nIf you have a Bible, turn to chapter 13 and look at the headings. Chapter 13 is a proclamation against Babylon, then Babylon is destroyed in chapter 14. Chapter 15 brings a proclamation against Moab, which is destroyed in chapters 15 and 16. Chapter 17 is against Syria and Israel. Chapter 18 is against Ethiopia. Then Egypt. Then the whole earth falls in chapter 24. And then, if that were not enough, Israel falls after that. God knows what he is doing — he knows that people need a breath of fresh air — so chapters 25 and 26 are glorious songs of deliverance. But the prevailing feeling of chapters 1 through 38 is doom and gloom.\n\nBut then you get to chapter 40, and from there through chapter 66, we have a message of victory, deliverance, and peace to the people of God. One well-known Isaiah scholar by the name of Alec Motyer called this section the Gospel of Isaiah. The contrast is so great between chapters 40 through 66 and chapters 1 through 38 that several scholars have argued that the same person could not have written both. But if you let Isaiah speak for himself, you see that there is a clear logic to this major shift at chapter 39.\n\nIsaiah 39 concludes the judgment portion of the book with a prophecy of the Babylonian captivity. Look at verses 5 through 7:\n\n> *\"Then Isaiah said to Hezekiah, 'Hear the word of the Lord of hosts: Behold, the days are coming when all that is in your house, and what your fathers have accumulated until this day, shall be carried to Babylon; nothing shall be left,' says the Lord. 'And they shall take away some of your sons who will descend from you, whom you will beget; and they shall be eunuchs in the palace of the king of Babylon.'\"* (Isaiah 39:5–7)\n\nYou know what Hezekiah had done. Hezekiah had welcomed the Babylonian delegation into the palace and showed them all the treasures of Israel. He brought them through the treasury to show them all the gold, all the weapons — as if to say, look what I have. And Isaiah comes to him and says, what are you doing? These are the very people who are going to take you captive. And in these verses Isaiah prophesies the Babylonian captivity almost a hundred years before it happened.\n\nI always find Hezekiah's reaction interesting. Look at verse 8: *\"So Hezekiah said to Isaiah, 'The word of the Lord which you have spoken is good!' For he said, 'At least there will be peace and truth in my days.'\"* Great — it is not going to happen during my lifetime, so I am fine. He did not even worry about what was coming.\n\nThe Babylonian captivity was the ultimate chastisement in the Old Testament for the rebellion of God's people against God. There are two epoch-making events in the Old Testament. When speaking of redemption, the Old Testament always refers to the Exodus. When speaking of chastisement and punishment, it always refers to the Babylonian captivity. And that major event is what chapter 39 describes.\n\nWhen we come to chapter 40, Isaiah moves us about two hundred years into the future — not to the Babylonian captivity anymore, but to the end of it. The people of God are about to be liberated and will be able to return to the land. Yet Isaiah wants to make sure that is not their ultimate comfort. Their ultimate comfort is not found in being restored to the land, not in being restored as a nation, not even in political and physical freedom. The ultimate consolation is found in God.\n\n## The Structure of Isaiah 40\n\nOur plan over these next Sundays is to work through the chapter. In verses 1 through 11, the good news of comfort is announced. In verses 12 through 26, the God who is going to comfort is described — the great attributes of God are set before the people. Look at how the chapter puts it:\n\n> *\"Who has measured the waters in the hollow of his hand, measured heaven with a span and calculated the dust of the earth in a measure, weighed the mountains in scales and the hills in a balance?\"* (Isaiah 40:12)\n\nThis is the God who is going to comfort you, people of God. And then in verses 27 through 31, the comfort itself is finally disclosed:\n\n> *\"Why do you say, O Jacob, and speak, O Israel: 'My way is hidden from the Lord, and my just claim is passed over by my God'? Have you not known? Have you not heard? The everlasting God, the Lord, the Creator of the ends of the earth, neither faints nor is weary. His understanding is unsearchable. He gives power to the weak, and to those who have no might he increases strength. Even the youths shall faint and be weary, and the young men shall utterly fall, but those who wait on the Lord shall renew their strength; they shall mount up with wings like eagles, they shall run and not be weary, they shall walk and not faint.\"* (Isaiah 40:27–31)\n\nThe comfort is this: God has not forgotten you. Even if you think he is far from you, he is the one in whom you will find your strength.\n\nSo let us take verses 1 through 11 today.\n\n## The Prophet's Commission: Speak Comfort Tenderly (vv.1-2)\n\nLook at verses 1 and 2:\n\n> *\"Comfort, yes, comfort my people, says your God. Speak comfort to Jerusalem, and cry out to her, that her warfare is ended, that her iniquity is pardoned; for she has received from the Lord's hand double for all her sins.\"* (Isaiah 40:1–2)\n\nThe goal of the prophet's preaching is to speak a word of comfort to the people of God. He is to assure them of God's love and silence their fears as he proclaims the Word. And he is to do so with a particular attitude. Look at verse 2 — the word rendered *comfort* or *tenderly* in that verse: in the original Hebrew it literally says, *speak to the heart of Jerusalem.* Speak to the heart.\n\nHow many of us forget this note of tenderness when we speak to one another about our problems? We may be full of love and genuine concern for our brothers and sisters. But when we open our mouths, the word that comes out is stern, or harsh, or cold. *Speak to the heart of Jerusalem.* That is a word for every sermon, every conversation in the church of Jesus Christ. Speak to the heart.\n\nNotice also the message the prophet is to bring. Verse 2: her warfare is ended, her iniquity is pardoned, she has received from the Lord's hand double for her sins. God moves from the consequences — the afflictions that have come upon them — back to their causes, and announces that he has addressed not only the consequences but the root cause behind them. The war they were fighting was against God himself — the war of rebellion — and it has ended, because sin has been forgiven.\n\nWe read that she has received *double* for her sins, and that sounds unjust. But the Hebrew word rendered *double* really means something corresponding to something else — a mirror image, an exact equivalent. The idea is not twice as much, but the precise match. It means the Lord has provided an atonement that corresponds precisely to her need. The blessing, the comfort, is this: the sin of God's people has been dealt with in exactly the way it needed to be dealt with — by the Lord Jesus Christ. Our sins have been atoned.\n\nNow, *atonement* is not a word we use every day. It was actually coined by John Wycliffe when he translated the Bible into English, because there was no English word to represent the concept. He simply combined the words *at* and *one* — to be at one. God and his people have been brought together. They have been reconciled. And that has happened through the blood of the cross of the Lord Jesus Christ. That is the comfort Isaiah is to pronounce upon the people.\n\nOur message of comfort is that God's great mercy is always suited to our need. His grace fits your sin. It corresponds to it perfectly. You can never come to God with sin so severe, so filthy, so complicated by constant repetition and entanglement, that you force him to throw up his hands and say, I do not know how to deal with that. God will never say, this is beyond me — my grace was not designed for that. That will never happen, because God has matched your sin with his mercy in the sacrifice of the Lord Jesus Christ. Where sin abounded, grace abounded much more.\n\nThere is a hymn that puts it this way: *What love could remember no wrongs we have done — omniscient, all-knowing, he counts not their sum. Thrown into a sea without bottom or shore; our sins, they are many; his mercy is more.* Be confident, people of God. Your sins have been covered by the blood of Jesus Christ.\n\n## Three Voices\n\nThere are three voices in verses 3 through 11 that explain the good news of comfort further, and each answers a question: How has atonement been made? How have God and man been brought together? How can God really rescue me?\n\n### Voice One: The Herald of the Lord (vv.3-5)\n\n> *\"The voice of one crying in the wilderness: 'Prepare the way of the Lord; make straight in the desert a highway for our God. Every valley shall be exalted and every mountain and hill brought low; the crooked places shall be made straight and the rough places smooth; the glory of the Lord shall be revealed, and all flesh shall see it together; for the mouth of the Lord has spoken.'\"* (Isaiah 40:3–5)\n\nWhat major work of English literature has made these verses so familiar? Handel's *Messiah.* In the ancient world, when a king was going to visit a city, a highway would be prepared between the capital and that city — cleared of all impediments so that the king could move swiftly and directly. That is the image here. A straight highway through the desert is to be built for the coming of our Lord. The valleys raised up, the mountains flattened, the rough places made smooth — because God himself is coming to visit his people and nothing can stop him.\n\nWe know whose voice this is. Matthew 3:3 quotes Isaiah 40:3–5 and says explicitly that these words were fulfilled in the preaching ministry of John the Baptist. He is the forerunner who prepared the way of the Lord in the wilderness. This means that the God who is coming in Isaiah 40, in whom the glory of the Lord shall be revealed, through whom comfort comes to the hearts of sinners — precisely matched to our need — is none other than the Lord Jesus Christ himself. Church of Jesus Christ, Isaiah 40 is about your Savior.\n\n### Voice Two: The Fragility of Flesh and the Enduring Word (vv.6-8)\n\n> *\"The voice said, 'Cry out!' And he said, 'What shall I cry?' 'All flesh is grass, and all its loveliness is like the flower of the field. The grass withers, the flower fades, because the breath of the Lord blows upon it; surely the people are grass. The grass withers, the flower fades, but the word of our God stands forever.'\"* (Isaiah 40:6–8)\n\nThis voice reminds Isaiah of the fragility of life. We think we are invincible, that nothing can stop us, that we are going to live forever. Jonathan Edwards had that classic description of the sinner dangled over the fires of hell by a spider web. Life is as fragile as that. We do not know what is next. We do not know if we will make it through the end of the day. Life is like grass — green and strong today, brown after just a couple of days of sun.\n\nIt is into this fragile and changing life that the Lord brings comfort. The comfort that offers pardon and atonement for sin, that comes through the Lord Jesus Christ, is ours through the Word of the Lord that endures forever. God does not change his mind. He does not renegotiate the terms of his offer to us in Jesus Christ. His word is sure and his offer is dependable. You can take him at his word. His promises of mercy are not subject to the changes of life. You can trust them completely.\n\n### Voice Three: Zion Proclaims — Behold Your God (vv.9-11)\n\n> *\"O Zion, you who bring good tidings, get up into the high mountain; O Jerusalem, you who bring good tidings, lift up your voice with strength, lift it up, be not afraid; say to the cities of Judah, 'Behold your God!' Behold, the Lord God shall come with a strong hand, and his arm shall rule for him; behold, his reward is with him, and his work before him. He will feed his flock like a shepherd; he will gather the lambs with his arm and carry them in his bosom, and gently lead those who are with young.\"* (Isaiah 40:9–11)\n\nIt is the task of Zion — the people of God — to proclaim the Word of God. That is your task, it is my task: to proclaim the Word of God. And what are we to say? Verse 9: *Say to the cities of Judah, behold your God.* We are to point people to the living God himself. And notice this is not first of all directed to outsiders — Zion is saying this to Judah. This must mark the way we relate to one another. We turn to each other and point one another to the God of the Bible. Our relationships must cause us to see Christ better. As Paul says, whatever we say must be seasoned with grace, so that those who hear us are closer to Christ for having heard us.\n\nIs your life pointing people to behold your God? Or are you turning the people in your life away from God?\n\nAnd the church needs people telling her: *behold your God.* That is the lifeline of the church — hearing of their God, being pointed to see his face in the face of Christ.\n\nI am turning 48 in August. I am not going to last forever. I do not know what the Lord has for me. Who is going to take this place? Who among you, when God says *whom shall I send?*, will answer with Isaiah, *here I am, send me*? Who is going to speak the Word of God to his church? Are you going to be the one God uses to say, behold your God? The church is in a difficult state today. This last year has revealed that the church has too easily retreated to the margins. We need men willing to give themselves to say, behold your God. Ideally, our next pastor is already in this sanctuary — someone who can grow in grace and knowledge of Christ in the church, who knows this congregation from the inside. Is that you? Is God calling you? Are you willing to do the hard work to get yourself to the place where you can stand before the people of God and say, behold your God? No one is beyond that call. God spoke through a donkey; he can speak through you.\n\nNotice the three *beholds* in verses 9 through 10. *Behold your God* in verse 9. *Behold, the Lord God* in verse 10. *Behold, his reward is with him* in verse 10. Isaiah is grabbing the people of God and pointing them to where he wants them to look: here. Here is God.\n\nWhere will you find comfort — lasting, stable, secure comfort? Isaiah says: in your God. Not ultimately in the results of any election. Not in the vaccine. Not in material prosperity. Not in personal vitality. Our hope is in the Lord Jesus Christ. Isaiah says, *behold your God.* We must fill our gaze with God.\n\nAnd notice in verses 10 and 11 — which really serve as an introduction to what we will see next time — that God is both a just judge and ruler and a tender shepherd at the same time. The mighty arm that rules and judges is the same mighty arm that carries the lambs in his bosom. People of God, behold your God — the shepherd-king who leaves the ninety-nine and goes after the lost one. That is you. That is me.\n\nThe good shepherd calls his sheep by name. They follow him. He lays his life down for the sheep. Isaiah says, fix your eyes on this one — this great and glorious God who has come. In him, atonement for sin has been made. God has matched his mercy precisely to your need. People of God, behold your God. His name is Jesus of Nazareth."};
