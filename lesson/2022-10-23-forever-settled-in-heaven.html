window.LESSON_DATA = {"id": "2022-10-23-forever-settled-in-heaven", "title": "Forever Settled in Heaven", "speaker": "Pastor Tito Lyro", "date": "2022-10-23", "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["10 - 23 - 22 - Forever Settled In Heaven - Psal, 119 89 - 96 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/10-23-22-forever-settled-in-heaven-psal-119-89-96-pastor-tito-lyro", "tags": [{"tag": "Word of God", "source": "detected"}, {"tag": "covenant", "source": "detected"}, {"tag": "faithfulness of God", "source": "detected"}, {"tag": "suffering", "source": "detected"}, {"tag": "hope", "source": "detected"}, {"tag": "sufficiency of Scripture", "source": "detected"}], "scripture_references": [{"reference": "Psalm 119:89-96", "type": "quoted", "source": "detected"}, {"reference": "Isaiah 40:6-8", "type": "quoted", "source": "detected"}, {"reference": "Isaiah 41:8-13", "type": "quoted", "source": "detected"}, {"reference": "Isaiah 43:1-3", "type": "referenced", "source": "detected"}, {"reference": "Genesis 9:11-17", "type": "referenced", "source": "detected"}, {"reference": "Ephesians 2:11-13", "type": "quoted", "source": "detected"}, {"reference": "Galatians 3:29", "type": "referenced", "source": "detected"}, {"reference": "2 Timothy 2:13", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 1:1-2", "type": "referenced", "source": "detected"}, {"reference": "John 6:68", "type": "referenced", "source": "detected"}, {"reference": "Matthew 24:35", "type": "referenced", "source": "detected"}, {"reference": "Isaiah 55:10-11", "type": "quoted", "source": "detected"}, {"reference": "2 Peter 1:3", "type": "referenced", "source": "detected"}, {"reference": "Genesis 17:7", "type": "referenced", "source": "detected"}, {"reference": "Exodus 34:6-7", "type": "referenced", "source": "detected"}], "outline": [{"title": "The Word of God Is Settled Forever in Heaven (v. 89)", "subpoints": ["The Hebrew word for 'settled' means to stand firm and not change", "God's word, spoken through human mouths, accomplishes exactly what God intends", "Isaiah 55 confirms that God's word does not return void", "The New Testament writers regarded their writings as on par with the Old Testament", "God was not obligated to reveal Himself to us, yet He did so by covenant grace"], "scripture": ["Psalm 119:89", "Isaiah 55:10-11", "Matthew 24:35"]}, {"title": "The Faithfulness of God Endures to All Generations (vv. 90-91)", "subpoints": ["God's faithfulness is rooted in His covenant with Abraham and renewed under Moses", "The orderliness of creation itself testifies to God's faithfulness", "The Noahic covenant promises regularity of seasons as a sign of God's restraint", "Faithfulness is God's own attribute, independent of our faithfulness to Him", "Even when His people are unfaithful, God remains faithful because He cannot deny Himself"], "scripture": ["Psalm 119:90-91", "Genesis 9:11-17", "2 Timothy 2:13", "Genesis 17:7"]}, {"title": "The Word of God Is Sufficient for Every Issue of Life (v. 96)", "subpoints": ["The ESV renders v. 96 as 'I have seen a limit to all perfection'—everything else is limited", "God's commandment is 'exceedingly broad'—it covers every question of faith and practice", "Peter confirms that God has given us everything needed for godliness and life", "The church errs when it turns to secular wisdom for answers the Bible already provides", "Questions of identity, marriage, and child-rearing are addressed by the settled Word"], "scripture": ["Psalm 119:96", "2 Peter 1:3"]}, {"title": "The Settled Word Gives Hope in Affliction (vv. 92-95)", "subpoints": ["The psalmist was under threat of persecution yet did not despair because of God's Word", "He delights in the law nine times in Psalm 119, most often in the context of affliction", "The psalmist had a fraction of Scripture yet found it sufficient to sustain him", "Isaiah 40 answers the prophet's question about comfort: 'The word of our God stands forever'", "Isaiah 41-43 applies God's covenant promises to all who are in Christ, including Gentiles"], "scripture": ["Psalm 119:92-95", "Isaiah 40:6-8", "Isaiah 41:8-13", "Ephesians 2:11-13"]}, {"title": "The Settled Word Gives Life (vv. 93-94)", "subpoints": ["The psalmist acknowledges that eternal life is found in the precepts of God", "Peter's answer to Jesus captures the truth: 'You have the words of life'", "The covenant promise—'I will be your God and you will be my people'—runs from Genesis to Revelation", "Jesus is named Emmanuel because God with us is the central promise of the Bible", "The Word settled in heaven is given to us as the means of eternal life"], "scripture": ["Psalm 119:93-94", "John 6:68", "Hebrews 1:1-2"]}, {"title": "Practical Application: What Will You Do with This Word?", "subpoints": ["The Word of God is not merely information—it is the very words of life", "True believers delight in and submit to the whole counsel of God", "Boredom with or indifference to the preaching of God's Word is a spiritual danger sign", "The Spirit of God works through the means of the Word to rule over our lives", "The question is not whether the Word is sufficient, but whether we will yield to it"], "scripture": ["Psalm 119:89-96"]}], "summary": "Pastor Tito Lyro preaches from Psalm 119:89-96 on the theme that God's Word is forever settled in heaven—unchanging, reliable, and sufficient for every aspect of human life. The sermon opens by grounding the psalmist's confidence in God's intertrinitarian covenant with Himself, from which flows the central promise of Scripture: 'I will be your God and you will be My people.' Because the Word is the expression of that covenant, it shares in God's own unchangeableness.\n\nThe pastor traces the implications of the Word being settled forever through three major themes in the passage: (1) God's faithfulness endures to all generations—even the regularity of creation, guaranteed by the Noahic covenant, testifies to this; (2) the Word is sufficient for every issue of life and faith, addressing questions of identity, marriage, and child-rearing that the contemporary church unwisely seeks to answer by turning to secular sources; and (3) the settled Word gives hope in the midst of affliction. The psalmist's nine-fold delight in the law is set against a backdrop of persecution, illustrating that the Word sustains God's people precisely when circumstances are most difficult.\n\nDrawing on Isaiah 40-43, Pastor Lyro shows that God's answer to the prophet's cry for something to comfort the people is the proclamation that His Word stands forever. The great promises of Isaiah 41-43—'Fear not, I am with you, I am your God'—belong equally to Gentile believers who have been incorporated into the Israel of God through Christ (Ephesians 2:11-13; Galatians 3:29).\n\nThe sermon closes with a pointed application: the Word has been given to us by God's covenant grace—we were not owed a revelation—and the only proper response is to submit to it wholly, delight in it deeply, and allow it to rule our lives through the Spirit. The listener is asked plainly: 'What are you going to do with this Word?'", "transcript": "## Reading: Psalm 119:89-96\n\nIf you're able, please remain standing as we read the word of the Lord, reading the Lamed portion of Psalm 119, that's verse 89 through 96. The letter Lamed also stands for the preposition 'to,' so a lot of these verses just start with the word 'to.'\n\nThis is the word of our Lord. Psalm 119 verse 89:\n\n*Forever, O Lord, Your word is settled in heaven. Your faithfulness endures to all generations. You establish the earth and it abides. They continue this day according to Your ordinances, for all are Your servants. Unless Your law had been my delight, I would then have perished in my affliction. I will never forget Your precepts, for by them You have given me life. I am Yours. Save me, for I have sought Your precepts. The wicked wait for me to destroy me, but I will consider Your testimonies. I have seen the consummation of all perfection, but Your commandment is exceedingly broad.*\n\nThis is the word of our Lord. Let us pray.\n\nFather in heaven, thank You for Your word. We pray that as we consider Your faithfulness to us, that You'd open our hearts to see indeed that You are a faithful God who promised to be our God and that we would be Your people. We pray these things in Jesus' name. Amen. Please be seated.\n\n## The Central Theme of Scripture: God's Covenant Faithfulness\n\nThe more I read the Psalm and the more I read the Scriptures as a whole, the more it becomes apparent to me how God's people in the Bible—those that are offering, humbly speaking, the words that we're reading today and the words that we read from Genesis 1 to Revelation 22—clung to God's covenantal promises to them. God's essential, central covenantal promise was what carried them through life. Their hope and their help weren't the things of this life. They didn't put their confidence in the powers of this age.\n\nThey would even sing together as they ascended at least once a year the holy hill of Zion, coming from every part of the world to worship the Lord in one of the three pilgrim feasts. They would ascend the hill, singing Psalm 124, and that Psalm finishes with these words: *Our help is in the name of the Lord who made heaven and earth.* That was the central theme—that is the central theme of the Bible—that our help is in the Lord, not in anything else.\n\nThe thought that the Father, the Son, and the Holy Spirit, in eternity past before there was even an inkling of creation, entered into a covenant of mutual love with one another, promising to themselves that they would give to themselves a people—a people who would come from every language group, from every ethnic group, a multitude that could not be numbered—those are the promises that the people of God held on to dearly throughout the Scriptures.\n\nThis intertrinitarian covenant really encouraged our ancient brothers and sisters, as we see in this Psalm, and encouraged them in the most difficult situations in life. The promise that is the center of every covenant in the Bible, culminating with the new covenant in the blood of the Lord Jesus Christ—the promise that ties all the New Testament together and gives hope to the people of God of all times—is the promise that God who is Father, Son, and Holy Spirit will be your God and you will be His people. That's why the Lord Jesus is, one of His names is Emmanuel, which means 'God with us,' because that is the central promise of the Bible—that God is with His people.\n\nThis Psalm was born, as many of the Psalms, out of suffering in the life of the psalmist, and suffering that he was able to endure because he could stand on the promise that God was his God and he body and soul belonged to God. In verse 94 he says, *I am Yours.* He knew that he was God's, and he was able to go through the suffering and the afflictions because he knew that God was his God and that he belonged to God. And because God entered into this covenant with Himself in eternity past, His word is settled for all generations—and this is a great hope for the believer—that the word of God is forever settled in heaven, that the promises of God don't change even when we change.\n\n## God's Faithfulness Is Not Conditional on Ours\n\nThe hymn we sang right before this morning's sermon is \"Great Is Thy Faithfulness.\" It was a great hymn and it's true in what it says, but it doesn't 100% embody the entire truth of God's faithfulness, because it ends by saying, *Morning by morning new mercies I see; all I have needed Thy hand hath provided; great is Thy faithfulness, Lord, unto me.* That's true, but that is a related truth to the ultimate truth that God's faithfulness is great to us because of *Him*, not because of us. Because if God's faithfulness depended on us, if God's faithfulness depended on how faithful we are to Him, it would have been gone already, because we all fail, we all fail God, we all are unfaithful.\n\nAnd if you're here right now and you hear these words and you think that's not true of me, then you do not know the gospel of Jesus Christ. You're not a believer in Jesus Christ. Because if you know who God is and you know who you are according to the Scriptures, and if you know that you cannot abide by God's word perfectly—that's what He demands of you—if you think that you're always faithful to the word of God, you have not come to salvation in Jesus Christ. And as we talk about the faithfulness of God, independent of your faithfulness, my prayer is that God would change your heart and that you might come to know Him as the ultimate fulfiller of all faithfulness, independent of you.\n\nThe Apostle Paul tells Titus, on the island of Crete, even when his people are unfaithful—even when God's people are unfaithful—He remains faithful, for He cannot deny Himself. And we see that in the word that has been forever settled in heaven.\n\n## The Word Settled in Heaven (v. 89)\n\nLook at verse 89: *Forever, O Lord, Your word is settled in heaven.* The word of God has been settled from all eternity and unto all eternity. To be settled means to stand firm, to not change. And while the psalmist is saying here that the word of God is sure, it can be counted upon, the Lord Himself said that when He said, *Heaven and earth will pass away, but My words will by no means pass away.*\n\nThe word that is established forever in heaven goes forth from God through the mouths of these people and accomplishes exactly what God has for it to accomplish. So through the prophet Isaiah, God says: *For as the rain comes down and the snow from heaven, and do not return there but water the earth and make it bring forth and bud, that it may give seed to the sower and bread to the eater, so shall My word be that goes forth from My mouth; it shall not return to Me void, but it shall accomplish what I please, and it shall prosper in the thing for which I sent it* (Isaiah 55:10-11).\n\nThe word of God has been settled in heaven, yet God in His mercy saw fit through the mouths of His people to give us His word—so that it's not just settled in heaven and we don't know about it, but it is given to us in a way that we can understand. And then He equips and gifts His church with teachers who are also able to explain the word so that we can grow in it.\n\nYou know that God did not owe us a revealing of Himself to us? We still would owe obedience to Him even if He had never revealed Himself to us, because we are created things and God transcends this creation—yet He saw fit by His covenant grace to reveal Himself to us in His word. The word, the promise, had been settled in heaven forever, and in history it came to be ours.\n\n## God's Faithfulness Endures to All Generations (vv. 90-91)\n\nLook at verses 90 and 91: *Your faithfulness endures to all generations; You establish the earth and it abides; they continue this day according to Your ordinances, for all are Your servants.*\n\nHere again we find a reference to God's covenant with Himself and with His people. 'God's faithfulness endures to all generations'—the beginning of verse 90 tells us that. That's a reference back to the covenant with Abraham, when God says, *I will establish My covenant between Me and you and your descendants after you in their generations for an everlasting covenant, to be God to you and to your descendants after you.* And then He reiterates that again when He enters into covenant with Israel under Moses, where Moses asks, *Lord, show me Your goodness,* and that's how the Lord reveals His goodness to Moses, by saying: *The Lord, the Lord God, merciful and gracious, longsuffering, abounding in goodness and truth, keeping mercy for thousands* [of generations].\n\nThe central promise of the word is that God is your God and that you are His people. And even creation says that the consistency of creation is evidence of God's faithfulness to His people. Because God created everything, everything reflects His faithfulness. That's why the atheist scientist has a hard time getting around the order of creation. If their theory were true, everything should result in a very unordered creation—yet creation is orderly. Day and night, seasons, everything happens as a testimony of the faithfulness of God.\n\nThis is a result of—remember what covenant in the Bible tells us?—because of that promise, things would be regular in this life. After Noah builds an ark and offers burnt offerings, *the Lord said in His heart, 'I will never again curse the ground for man's sake, although the imagination of man's heart is evil from his youth... while the earth remains, seedtime and harvest, cold and heat, winter and summer, and day and night shall not cease'* (Genesis 8:21-22). And then: *'This is the sign of the covenant which I have made between Me and you and every living creature... I have set My rainbow in the cloud'* (Genesis 9:12-13).\n\nThis constant order, this regularity in creation, is another testimony of that covenant that God made with Himself, displayed in His faithfulness to us—that He's not going to destroy us even though we deserve this retribution. Notice that the flood hasn't happened again not because we've learned our lesson, but because God chose to spare us, being longsuffering toward us so that we might come to repentance in the Lord Jesus Christ.\n\n## The Word Is Exceedingly Broad (v. 96)\n\nThe established, enduring, settled word has no limits. It tells us all that we are to believe concerning God, grace, ourselves, and the world, and addresses all the issues of life. Look at verse 96: *I have seen the consummation of all perfection, but Your commandment is exceedingly broad.*\n\nThe New King James version kind of confuses the matter a little bit here in its translation—*I have seen the consummation of all perfection*—which kind of gives the idea that the psalmist has a vision about the future and saw the end of all perfection. But that's not what the Hebrew here means. The ESV brings more clarity to this verse when it says, *I have seen a limit to all perfection.* The things that seem to be perfect in our sight—there's a limit to them. They're not really perfect as we think they are, and they are not all-sufficient as we might think they are. Everything is limited. But the word of God extends beyond all—it is broad, it is sufficient, it covers everything.\n\nPeter tells us that much in 2 Peter chapter 1—that God has given us in His divine power everything that we need for godliness and life. The psalmist is telling us that the word of God is sufficient for every issue of faith and practice because God Himself is sufficient. It is complete. It is broad. It is boundless. And we don't have to look for the answers of life in other places.\n\nHow sad it is that even the Church of Jesus Christ is looking at the secular world for answers that the Bible gives us? Why we're here? Who are we? Are we men or are we women? How do we conduct marriage? How do we raise our children? These are life and faith questions, and yet we're going somewhere else than the word that has been settled forever in heaven—the result of God's covenant with Himself, given to us to be sufficient and broad over all things. And yet the Church of Jesus Christ is saying, 'No, it's not enough for me. I need the wisdom of men in order to fulfill the designs of God.' How silly and foolish that is.\n\n## The Word Settled Forever Gives Hope (vv. 92-95)\n\nThere are some practical results of this word being settled in heaven. The first thing we see is that the word that is settled forever, because it is a revelation of God's covenant with Himself and with us, gives us hope. Look at verse 92: *Unless Your law had been my delight, I would then have perished in my affliction.*\n\nAs it is with most stanzas in the Psalm, the psalmist is suffering persecution because of his obedience to the word of God. He describes the wicked as waiting for him so that they can destroy him in verse 95. And yet he is not in despair, because the word of God and the promises of God give him hope. Nine times in the Psalm the psalmist tells us that he delights in the law of God, and most of the delighting is done in the context of affliction. He doesn't say, 'Life is great, so I'm delighting in Your word'—but the word of God, the promises of God, has gotten him through the times of affliction.\n\nSeveral of you have asked me how much of the Bible this psalmist had. Well, it's hard to tell. This is likely a post-exilic Psalm, which means it was written somewhere around Nehemiah's time—after Israel was brought back from the Babylonian captivity. So they could have had the Pentateuch, Judges, Ruth, Samuel, Kings, Isaiah, Jeremiah, Daniel, Lamentations, some of the Psalms. That's what he had. That's what got him through the tough times in life. That's the hope he had.\n\nBrothers and sisters, we have so much more than the psalmist ever had. We have the entire revelation of God. The Holy Spirit through the author of Hebrews said: *God, who at various times and in various ways spoke in time past to the fathers by the prophets, has in these last days spoken to us by His Son* (Hebrews 1:1-2). God has spoken to us in Jesus Christ—He is the ultimate revelation, He is the Word, the final Word, and He completed God's Word to us.\n\n## The Word Settled Forever Gives Life (vv. 93-94)\n\nThis is also a comfort drawn from Isaiah 40-43. One of the possible books this psalmist had. In Isaiah 40, God calls the prophet to comfort His people—but how? When the prophet asks God what he should say to the people in order to bring comfort, God tells him to proclaim that God's Word is settled in heaven: *The grass withers, the flower fades, but the word of our God stands forever* (Isaiah 40:8). And then Isaiah 41 continues: *But you, Israel, are My servant, Jacob whom I have chosen... Fear not, for I am with you; be not dismayed, for I am your God. I will strengthen you, yes, I will help you, I will uphold you with My righteous right hand.*\n\nYou may be thinking, 'This is all well and good for Israel—but I'm a Gentile.' The answer is this: these promises are yours because in Christ you have been brought into the Israel of God, made a true Israelite according to the promise. Paul says in Ephesians 2:11-13: *Remember that you, once Gentiles in the flesh... were without Christ, being aliens from the commonwealth of Israel and strangers from the covenants of promise, having no hope and without God in the world. But now in Christ Jesus you who once were far off have been brought near by the blood of Christ.* And in Galatians 3:29: *If you are Christ's, then you are Abraham's seed and heirs according to the promise.*\n\nBecause the word is forever settled, we have life—we see that in verses 93 and 94: *I will never forget Your precepts, for by them You have given me life. I am Yours; save me, for I have sought Your precepts.* The psalmist acknowledges that eternal life is found in the word of God. The apostles acknowledged the same thing. Remember in John 6, Jesus' second year of ministry is ending. He has been popular—crowds were following Him—and then He says, 'Unless you eat of My flesh and drink of My blood, you cannot be My disciple.' The crowd left. Even some of the closest disciples walked away. Then He turns to the twelve—and Peter says: *Lord, to whom shall we go? You have the words of life.*\n\nThe settled word of God, forever settled in heaven, are the words of life—the very words of Jesus, from Genesis 1 to Revelation 22. So the word of God is forever settled in heaven as the result of God's covenant with Himself. That word, above all earthly powers, has been committed to us in the Bible.\n\n## What Will You Do with This Word?\n\nAnd God, because of His covenant faithfulness, has given this word of life to us. What are you going to do about that? What are you doing with that word? Is that word ruling your life? Are you submitting yourself to all that this word says? Or are you ultimately and utterly bored, even by the preaching of the very word of life? What are you going to do with this word—a word forever settled in heaven, revealed to you by the kindness of God from Genesis 1 to Revelation 22?\n\nLet us pray together. Father in heaven, thank You for Your word. We thank You that You settled it in eternity past and remain true in eternity future. We thank You for Your compassionate kindness and mercy to us in revealing it to us in Your word in the Bible. We pray that it will make it our own and that Your Spirit will rule our lives through it. For us in Jesus' name. Amen."};
