window.LESSON_DATA = {"id": "2023-02-26-philip-and-the-ethiopian-eunuch", "title": "Philip and the Ethiopian Eunuch", "speaker": "Pastor Chad Van Dixhoorn", "date": "2023-02-26", "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["02-26-23 -AM - Sermon.txt"], "tags": [{"tag": "evangelism", "source": "detected"}, {"tag": "gospel", "source": "detected"}, {"tag": "sovereignty of God", "source": "detected"}, {"tag": "atonement", "source": "detected"}], "scripture_references": [{"reference": "Acts 8:26-40", "type": "quoted", "source": "detected"}, {"reference": "Isaiah 53:7-8", "type": "quoted", "source": "detected"}, {"reference": "Isaiah 53:3-5", "type": "referenced", "source": "detected"}, {"reference": "Genesis 22", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 11:8", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: Philip's Obedience Without Explanation", "subpoints": ["An angel of the Lord told Philip to go south toward Gaza — a desert road — with no explanation of why", "Philip obeyed immediately: 'he arose and went' — like Abraham leaving without knowing where he was going (Heb. 11:8; Gen. 22)", "God's sovereign plan often requires obedient steps before the purpose is revealed", "Philip was already in the midst of a revival in Samaria — leaving for an unknown desert road was a significant sacrifice"], "scripture": ["Acts 8:26-27", "Hebrews 11:8"]}, {"title": "1. God's Sovereign Preparation of the Encounter", "subpoints": ["Old Testament knowledge had reached Africa through diaspora Jews — Ethiopian had access to the Hebrew Scriptures", "The man was a high official under Queen Candace of Ethiopia — likely a eunuch castrated as a boy, which would have barred him from the temple assembly (Deut. 23:1)", "He had traveled to Jerusalem to worship — a man seeking God despite being excluded from the inner courts", "Five preparations: OT Scripture in Africa, a scroll actually purchased, the man reading it during travel, a humble heart willing to ask, commitment to biblical authority"], "scripture": ["Acts 8:27-28"]}, {"title": "2. Philip Preached Christ from Isaiah 53", "subpoints": ["The Ethiopian was reading Isaiah 53:7-8: 'He was led as a sheep to the slaughter; and as a lamb before its shearer is silent, so he opened not his mouth'", "'Do you understand what you are reading?' 'How can I, unless someone guides me?' — the need for a teacher, for preaching, for the Word explained", "Philip 'began at this Scripture and preached Jesus to him' — the entire gospel from Isaiah 53: despised, rejected, man of sorrows, wounded for our transgressions, crushed for our iniquities", "Isaiah 53 is the gospel before the gospel — the suffering servant who bears the sins of many"], "scripture": ["Acts 8:29-35", "Isaiah 53:7-8", "Isaiah 53:3-5"]}, {"title": "3. Two Religions: Managing Sin vs. Confessing Sin", "subpoints": ["The Reformation insight: there are ultimately only two religions — those that manage/excuse sin, and those that confess sin and look to a Substitute", "The Ethiopian eunuch was excluded from temple worship by his condition — he could not earn his way in; he needed someone to bear his exclusion", "Isaiah 53 describes exactly that Substitute: 'he was wounded for our transgressions, he was crushed for our iniquities; the chastisement for our peace was upon him'", "The gospel of a Substitute who bears what we deserve is the only answer to genuine guilt"], "scripture": ["Isaiah 53:3-5"]}, {"title": "4. Baptism and the Ethiopian's Joy", "subpoints": ["They came to water; the Ethiopian asked: 'What hinders me from being baptized?' — an immediate desire for the outward sign of inward grace", "Both Philip and the eunuch went down into the water (Acts 8:38) — baptism as public identification with Christ's death and resurrection", "The eunuch went on his way rejoicing — the gospel produces joy; salvation is good news", "Likely planted the church in Ethiopia — the gospel going to the ends of the earth through one conversation on a desert road"], "scripture": ["Acts 8:36-39"]}], "summary": "Guest preacher Pastor Chad Vendix Horn (OPC, Philadelphia Presbytery) preaches on Acts 8:26-40 — the encounter between Philip and the Ethiopian eunuch on the desert road to Gaza. The sermon traces God's sovereign preparation of the encounter through five providential arrangements, Philip's obedient response without explanation (like Abraham), the theological significance of the Ethiopian's situation (a eunuch excluded from the temple assembly, reading Isaiah 53 about a suffering Servant who bears exclusion and shame), Philip's preaching of Christ from Isaiah 53, and the Ethiopian's baptism and joy. The Reformation insight about two religions — managing sin versus confessing it and looking to a Substitute — anchors the application.", "transcript": "## Introduction: Philip's Obedience\n\nActs 8 finds Philip in the middle of a remarkable revival in Samaria. The gospel is spreading, people are believing, there is joy in the city. And then an angel of the Lord appears to Philip and tells him to go south toward Gaza — a desert road — with no explanation of why.\n\nPhilip's response is simple: *he arose and went.* No questions asked, no timeline requested, no purpose revealed. He left a successful ministry for an unknown desert road because God told him to.\n\nThe writer to the Hebrews describes Abraham: *he went out, not knowing where he was going* (Heb. 11:8). Philip's obedience has the same quality. He did not need to know why. He needed to know who was asking.\n\nGod's sovereign purposes often work this way. The step of obedience comes before the purpose is revealed. Philip would not have known, setting out for that desert road, that he was about to carry the gospel to the continent of Africa. He only knew he was supposed to go.\n\n## God's Sovereign Preparation\n\nThe man Philip encounters is not accidental. Everything about him has been sovereignly arranged.\n\nHe is a high official in the court of Queen Candace of Ethiopia — a man of significant power and responsibility. He has traveled to Jerusalem to worship. And he is reading the scroll of Isaiah in his chariot.\n\nHow did he have a scroll of Isaiah? Diaspora Jews — Jewish communities scattered throughout the Mediterranean and beyond — had taken the Hebrew Scriptures with them. Through centuries of this dispersion, knowledge of the God of Israel had spread across the ancient world, including into Africa. This man had access to the Word of God.\n\nHe was also, almost certainly, a eunuch — the text uses that word explicitly. In the ancient world, men of high rank in the courts of female monarchs were often castrated as boys. This was not a choice; it was something done to him. And under the Mosaic law (Deuteronomy 23:1), a man in his condition was excluded from the full assembly of God's people. He could go to the outer courts. He could observe. But there was a barrier.\n\nAnd yet here he is, having traveled all the way to Jerusalem to worship. Excluded, and still seeking. Barred from the inner courts, and still reading the scroll of Isaiah.\n\nThe Spirit tells Philip: *Go near and overtake this chariot.* Five things God has arranged: the Hebrew Scriptures have reached Africa; this man has a scroll; he is actually reading it; he has a humble heart willing to ask for help; and he is committed to whatever authority the text carries. This is what sovereign grace looks like in action.\n\n## Preaching Christ from Isaiah 53\n\nPhilip runs up to the chariot. He hears the man reading aloud — as was common in the ancient world — and recognizes the passage: Isaiah 53:7-8.\n\n*He was led as a sheep to the slaughter; and as a lamb before its shearer is silent, so he opened not his mouth. In his humiliation his justice was taken away. And who will declare his generation? For his life is taken from the earth.*\n\nPhilip asks: *Do you understand what you are reading?* The answer is honest and humble: *How can I, unless someone guides me?*\n\nThis is the necessity of preaching. The Word does not interpret itself in isolation for everyone. God raises up teachers, preachers, evangelists — Philip is all three in this moment — who open the Scripture and explain what it means. The man had the text. He needed the teacher.\n\nPhilip *began at this Scripture and preached Jesus to him.* He started where the man already was — in Isaiah 53 — and preached the gospel from that text.\n\nIsaiah 53 is the gospel before the gospel. It describes a servant who is despised and rejected, a man of sorrows acquainted with grief. Who is wounded for our transgressions, crushed for our iniquities. Upon whom the chastisement for our peace was placed, by whose stripes we are healed. Led as a lamb to the slaughter, in silence. This is Jesus Christ — crucified, bearing the sins of his people, silent before his accusers, poured out unto death.\n\nFor this Ethiopian, excluded from the temple by his condition, the message of Isaiah 53 was personally pointed. Here was a Servant who bore exclusion, shame, and suffering — not for his own sins but for others'. Here was the answer to his situation: not a temple that would let him in but a Servant who would bear his exclusion and give him access to God.\n\n## Two Religions\n\nMartin Luther observed, in the course of the Reformation, that there are ultimately only two religions in the world. Not Christianity and Buddhism and Islam and Hinduism as four separate things — but two fundamental approaches to the human problem.\n\nThe first religion is management: you manage your sin, you manage your guilt, you perform enough righteousness to outweigh your failures. Every religion except biblical Christianity falls into this category — and so does the version of Christianity that has been corrupted by works-righteousness.\n\nThe second religion is confession: you confess that your sin is real and your guilt is genuine, and you look to a Substitute who bears what you deserve. This is the gospel of Isaiah 53. *He was wounded for our transgressions. He was crushed for our iniquities.* Not ours managing. His bearing.\n\nThe Ethiopian eunuch could not manage his way into God's presence. His condition excluded him. He needed someone to bear his exclusion. Philip opened Isaiah 53 and showed him that someone already had.\n\n## Baptism and Joy\n\nThey came to some water. And the Ethiopian asked the most natural question in the world: *See, here is water. What hinders me from being baptized?*\n\nPhilip commanded the chariot to stop. They both went down into the water — both Philip and the eunuch — and Philip baptized him.\n\nThen the Spirit of the Lord caught Philip away. And the eunuch *went on his way rejoicing.*\n\nThat is the mark of genuine salvation. Not performance. Not anxiety. Joy. The gospel produces joy because it is, in fact, good news.\n\nChurch historians and Ethiopian Christian tradition both suggest that this man planted the church in Ethiopia — that the gospel went from this desert road conversation to one of the oldest continuing Christian communities in the world. One encounter on an empty road, one man reading a scroll, one preacher who ran up to a chariot: and the gospel reached a continent.\n\nThat is what God does with ordinary obedience.\n\nFather, thank you for your sovereignty over every encounter, every conversation, every desert road. Thank you for the gospel of Isaiah 53 — that there is a Servant who bore our transgressions and by whose wounds we are healed. Make us people who run toward the chariots — who open the Scripture and preach Jesus. In his name, amen.", "soundcloud_url": "https://soundcloud.com/olympiabp/02-26-23-am-sermon"};
