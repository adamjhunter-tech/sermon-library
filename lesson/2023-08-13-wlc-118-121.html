 "Anger is always expressed in relationship — ultimately directed against God as the one who ordains all circumstances"], "scripture": ["James 1:19-20"]}, {"title": "Seven Truths About Anger", "subpoints": ["Truth 1: Anger is not necessarily sinful — God is angry; Jesus was angry (Mark 3:5) — but human anger is rarely righteous", "Truth 2: All anger seems righteous in the moment — anger is always a response to perceived injustice", "Truth 3: Anger is a heart issue — from within, out of the heart (Mark 7:21-22); Matthew 5 connects murder to anger", "Truth 4: Anger has a physical component — affects the body (e.g., countenance falling, as with Cain in Genesis 4)", "Truth 5: Anger is dangerous and disruptive — Ecclesiastes 7:9; \"anger rests in the bosom of fools\"", "Anger is murderous by nature (Matthew 5); an angry person is like a city without walls (Proverbs 25:28)", "Ephesians 4: unresolved anger gives a foothold to the devil"], "scripture": ["Mark 3:5", "Mark 7:21-22", "Matthew 5", "Ecclesiastes 7:9", "Proverbs 25:28", "Ephesians 4"]}, {"title": "Four Sinful Ways People Deal With Anger", "subpoints": ["Venting: expressing anger freely, hoping to release it — unbiblical (Proverbs 12:18; Proverbs 29:11)", "Displacement: redirecting anger at a substitute rather than the real source", "Internalizing: keeping anger inside — the Bible forbids hating a brother in your heart (Leviticus 19:17-18)", "Denial: claiming not to be angry, or using substitute words (frustrated, annoyed, upset)"], "scripture": ["Proverbs 12:18", "Proverbs 29:11", "Leviticus 19:17-18"]}, {"title": "The Biblical Response to Anger", "subpoints": ["Vengeance belongs to God (Romans 12:19) — the \"put off\" of anger", "Love is the \"put on\" (Romans 12) — heap coals of fire, turn the enemy into non-enemy", "Repentance: confessing anger as a heart sin before God — not venting about the person, but focusing on your own heart condition", "Jay Adams's diagnostic categories (to be covered in a future lesson)", "Ephesians 4: replace anger with kindness, tenderness, and compassion"], "scripture": ["Romans 12:19", "Ephesians 4"]}], "summary": "Note: This file is labeled \"WLC 118-121\" but its actual content is a Wednesday night study by Pastor Tito Lyro on the topic of anger. It does not contain the WLC 118-121 Sunday school lesson. The lesson appears to be drawn from research Pastor Lyro was conducting for his Master's thesis on anger and its effects in relationships.\n\nThe lesson opens with James 1:19-20 — be swift to hear, slow to speak, slow to wrath — as the central text. Pastor Lyro observes that the wrath of man never produces the righteousness of God, making anger an inherently counterproductive response for the Christian. He then develops seven truths about anger: it is not necessarily sinful (God and Jesus experienced it), but human anger is almost always mixed with sin; it always seems righteous to the one experiencing it because it is always a response to perceived injustice; it is a heart issue rather than something that happens to us; it has a physical component; it is dangerous and disruptive; it is murderous in nature; and those given to anger are perpetually exposed to chaos.\n\nThe lesson also surveys four common but ineffective ways people handle anger — venting, displacement, internalization, and denial — showing that each fails because it treats anger as something external to be managed rather than as a heart condition to be repented of. The biblical alternative is to put off anger and put on love, confessing the sin before God with focus on one's own heart rather than the other party's wrongs, and being restored to peace through repentance and the grace of Christ.", "transcript": "## Note on This File\n\nThis transcript file is labeled \"08-13-23 - WLC 118-121 - Mr. Isaiah Couch\" but the actual content is a Wednesday night teaching by Pastor Tito Lyro on the subject of anger. It does not contain a WLC Sunday school lesson. The following is a transcription of the actual content.\n\n## Introduction\n\nI've been using a book to guide me in developing our Wednesday night series. I took it home last night to work on it and forgot it at home. So tonight's lesson is not based on that book — it'll be a standalone lesson.\n\nI'm also trying to finish my thesis for my master's degree at The Master's University. Three weeks ago, after six months of research, my program director told me I couldn't write on my original topic. I submitted a new proposal with a full bibliography in three days. Once I got done being angry at him, I decided I was going to write on anger and its effects in relationships. So for the next few months, whenever I need something to talk about, guess what it's going to be — anger. That's what I'm studying and writing on. Tonight we'll explore the first couple of points of my thesis and see if it's going well.\n\n## Central Text: James 1:19-20\n\nTurn to James chapter 1. \"So then, my beloved brethren, let every man be swift to hear, slow to speak, slow to wrath; for the wrath of man does not produce the righteousness of God.\" The word \"man\" used twice here is the generic Greek word for humans — this applies to men and women alike.\n\nLet's begin with verse 20: \"The wrath of man does not produce the righteousness of God.\" Our anger will never produce what God wants to develop in our lives. We sometimes get angry as a motivator — to get things done, to get people to comply. And yet as Christians we all want God's revealed will to be what happens in our lives. Anger will never produce that. If human wrath will not produce the righteousness of God, then anger is something we exercise hoping for a good outcome while Scripture promises us it will never produce one. Godliness is never the result of anger.\n\nVerse 19 tells us instead to listen. Being swift to hear is an active process. We are to be slow to speak, slow to anger, but quick to listen — to understand what is actually going on.\n\nAnger is always expressed in relationship. There is always an object. Even if you're angry at your car today, who appointed that circumstance? God did. All anger is at least directed at God. So all anger is at minimum anger at God, and usually also anger at people around us.\n\n## Seven Truths About Anger\n\n**Truth 1: Anger is not necessarily sinful.** God is angry — David Powlison has written that God is the angriest being who exists. His anger is either manifested on the cross for the believer, or in hell. God is infinitely, eternally, and perfectly angry — yet without sin. The Lord Jesus Christ was angry: in Mark 3:5, \"When he had looked around at them with anger, being grieved by the hardness of their hearts, he said...\" So righteous anger exists. Having said that, in 49 years, I don't think I've ever been purely righteously angry. Our righteous anger has a way of turning into sinful anger very quickly. Unless your name is Jesus, it's safest to assume there is some measure of sinfulness in your anger.\n\n**Truth 2: All anger seems righteous in the moment.** When you're angry, you think you're right to be angry. Anger is always a response to perceived injustice — real or perceived. In James 4, we see that we get angry because we ask and don't receive; we feel we've been treated unjustly. Anger always demands vengeance, demands making things even. God says, \"Vengeance is mine\" (Romans 12:19). So if vengeance is his, we must put off seeking vengeance. The put-on is love — heap coals of fire on their heads (Romans 12). By loving your enemy, they cease to be your enemy. That's how it works.\n\n**Truth 3: Anger is a heart issue.** Jesus says in Mark 7:21-22: \"From within, out of the heart of man, proceed evil thoughts, adulteries, fornications, murders, thefts, covetousness, wickedness, deceit, lewdness, an evil eye, blasphemy, pride, foolishness.\" You might say, \"I don't see anger there.\" But Matthew 5 connects murder to anger — murder begins in the heart, and murdering in the heart is anger. Anger comes from the heart. It's not something that happens to us, not something imposed on us from outside. No one can make us angry — anger is an expression of our heart. This means no one has the power to make us angry; it's something we generate.\n\n**Truth 4: Anger has a physical component.** We are both inner and outer persons — soul and body — and they interact. The angry countenance falling (as with Cain — God asks, \"Why has your countenance fallen?\") is a physical display of anger.\n\n**Truth 5: Anger is dangerous and disruptive.** Ecclesiastes 7:9 says, \"Do not hasten in your spirit to be angry, for anger rests in the bosom of fools.\" When we are angry, we behave like fools. Proverbs 25:28: \"Whoever has no rule over his own spirit is like a city broken down, without walls.\" A city without walls in the ancient world is defenseless — constantly overwhelmed by enemies. That's what anger does. Ephesians 4 says that when we don't deal with anger properly, we give a foothold to the devil.\n\n## Four Sinful Ways People Deal With Anger\n\nMost people try to manage anger rather than deal with it biblically. Here are four common approaches — all inadequate:\n\n**1. Venting.** Going to a counselor simply to describe what the other person did to you and release steam — not for the purpose of repentance or resolution. Proverbs 12:18 says, \"There is one who speaks like the piercings of a sword.\" Proverbs 29:11: \"A fool vents all his feelings.\" Venting doesn't work because anger is not something that sits inside us waiting to be expelled. If it were, venting would cure it. But anger is a heart condition. Venting focuses on what the other person did to you. Confession focuses on your own heart. There's a crucial difference.\n\n**2. Displacement.** Getting angry at a substitute. You're still giving anger expression, just in a more socially acceptable form — punching a wall, running furiously, picking on someone else. This allows the anger to continue while avoiding direct confrontation. Social acceptability doesn't mean righteousness.\n\n**3. Internalizing.** Keeping anger inside — stuffed down, not displayed. But the Scripture says in Leviticus 19:17-18 (the passage Jesus quotes in Matthew 22 as the Great Commandment), \"You shall not hate your brother in your heart.\" If you're still angry but just not showing it, you're hating your brother in your heart. That's a violation of the command to love.\n\n**4. Denial.** Either claiming outright not to be angry (\"I'm not angry\") or substituting softer words: frustrated, annoyed, ticked off, upset. Different words for the same thing. We deny the sin of anger by renaming it.\n\nNone of these deal with the actual problem — the heart condition — and therefore none of them produce the righteousness of God.\n\nNext time I forget my book, we'll look at Jay Adams's eight diagnostic categories that help us determine whether our anger is sinful. And we'll look at the biblical approach: putting off anger, putting on love and kindness, and dealing with anger through repentance.\n\n*Closing prayer.*"};
