window.LESSON_DATA = {"id": "2024-10-20-patience-with-one-another", "title": "Patience with One Another", "speaker": "Pastor Tito Lyro", "date": "2024-10-20", "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["10-20-24 -PM- Patience with One Another - James 5_8-11 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/10-20-24-pm-patience-with-one-another-james-5_8-11-pastor-tito-lyro", "tags": [{"tag": "patience", "source": "detected"}, {"tag": "sin", "source": "detected"}, {"tag": "judgment", "source": "detected"}, {"tag": "community", "source": "detected"}, {"tag": "prophets", "source": "detected"}], "scripture_references": [{"reference": "James 5:8-11", "type": "quoted", "source": "detected"}, {"reference": "Mark 7:34", "type": "referenced", "source": "detected"}, {"reference": "Romans 8:23", "type": "referenced", "source": "detected"}, {"reference": "2 Corinthians 5:2-4", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 13:17", "type": "referenced", "source": "detected"}, {"reference": "Philippians 2", "type": "referenced", "source": "detected"}, {"reference": "Romans 12:19", "type": "referenced", "source": "detected"}, {"reference": "1 Thessalonians 5:14-15", "type": "quoted", "source": "detected"}, {"reference": "1 Timothy 6:11", "type": "referenced", "source": "detected"}, {"reference": "Ephesians 4:1-3", "type": "referenced", "source": "detected"}, {"reference": "Romans 5:3-4", "type": "referenced", "source": "detected"}, {"reference": "Romans 15", "type": "referenced", "source": "detected"}, {"reference": "Job 1", "type": "referenced", "source": "detected"}], "outline": [{"title": "The Task: Do Not Grumble", "subpoints": ["James turns from oppression by employers to relationships within the church", "The Greek word for grumble (stenagmos) appears six times in the NT: sighing, groaning, frustration", "Grumbling includes eye-rolling, sighing, sarcastic comments — things we often treat as trivial", "Even when someone has genuinely sinned against us, grumbling is not the right response"], "scripture": ["James 5:9", "Mark 7:34", "Romans 8:23", "2 Corinthians 5:2-4", "Philippians 2"]}, {"title": "The Encouragement: The Judge Is at the Door", "subpoints": ["Jesus stands at the door ready to judge those who grumble against one another", "Our grumblings are not trivial — they receive Christ's immediate attention as judge", "We are impatient because we think wrongs go unchecked, but Christ is near"], "scripture": ["James 5:9"]}, {"title": "The Examples: Prophets and Job", "subpoints": ["The prophets were called to preach to people who would not listen, yet they persevered without grumbling", "Jeremiah: told to do difficult symbolic acts; Isaiah: called to preach to unresponsive hearers", "Job: became cranky but persevered — 'Naked I came... blessed be the name of the Lord'", "These examples show that not grumbling is doable by God's grace"], "scripture": ["James 5:10-11", "Job 1"]}, {"title": "The Solution: Be Patient", "subpoints": ["Patience (makrothumia) is always exercised in the context of difficult situations", "Patience is the opposite of retaliation (1 Thessalonians 5:14-15)", "Patience is an attribute of God and is to be pursued by the man of God (1 Timothy 6:11)", "We can only be patient if we are convinced that God has everything under control"], "scripture": ["1 Thessalonians 5:14-15", "Romans 15", "1 Timothy 6:11", "Ephesians 4:1-3", "Romans 5:3-4"]}], "summary": "In the afternoon sermon, Pastor Tito Lyro returns to James 5:8-11 to examine the specific call to not grumble against one another in the church. He draws on the morning's treatment of patience as a fruit of the Spirit, focusing now on its opposite: the groan of frustration with fellow believers — the eye-rolls, the sighs, the sarcastic comments, the grudges. Through word study he shows that the Greek for grumbling captures a very ordinary, everyday frustration, not just extreme offense. James' warning is sobering: Jesus stands at the door as judge, ready to judge the church precisely for this sin, treating it as far from trivial. Pastor Lyro then offers examples from the prophets and from Job to show that enduring without grumbling is not only commanded but demonstrated as possible. The sermon closes with patience as the solution — not passive resignation but the active trust in a God who is sovereign, who will vindicate His people, and who invites us to pursue what is good rather than seek retaliation.", "transcript": "## Scripture Reading: James 5:8-11\n\nFor our scripture reading this afternoon, let us turn to the book of James the fifth chapter. James 5, starting at verse 8. This is the word of our Lord:\n\n\"You also be patient, establish your hearts, for the coming of the Lord is at hand. Do not grumble against one another, brethren, lest you be condemned. Behold, the Judge is standing at the door. My brethren, take the prophets who spoke in the name of the Lord as an example of suffering and patience. Indeed, we count them blessed who endure. You have heard of the perseverance of Job and seen the end intended by the Lord — that the Lord is very compassionate and merciful.\"\n\n## Introduction\n\nYears ago we used a VBS curriculum called Upward Bound and one of them had a song that went something like this: \"Humbly grateful or grumbly hateful — what's your attitude?\" This is exactly the question that James asks us this afternoon.\n\nJames attaches the idea of grumbling or complaining to the lack of patience. In the previous verses, James encouraged Christians who were being oppressed by rich employers to be patient because the Lord was going to vindicate them. In this passage though, James is turning to the church and relationships within the church — telling us to be patient with one another instead of grumbling.\n\n## The Task: Do Not Grumble\n\nThe word grumble is only used six times in the whole of the New Testament. In Mark 7:34, it is translated \"sighed.\" In Romans 8:23, Paul says \"we groan within ourselves\" — that is the same word. In 2 Corinthians 5:2 and 4, \"we groan, earnestly desiring.\" In Hebrews 13:17, elders should serve \"with joy and not with grief.\" So what James is addressing is the frustration with one another that so easily takes over us.\n\nThe groan when someone takes your pew. The murmuring under your breath when someone retells a story you've already heard. The rolling of the eyes when someone makes a suggestion you think is dumb. The sarcastic comment designed to put somebody back in their place. That's the kind of grumbling that is not supposed to take place.\n\nThis grumbling seems to be the result of being mistreated by other Christians because of your stand for the Bible. If that is the case, James is saying something similar to what Paul says in Romans 12 — that instead of grumbling, we love. That is how enemies are transformed into friends.\n\nThe word here in verse 9 would also include the idea of holding a grudge against someone who has actually done something wrong to you. Even when somebody actually sins against you, James says, don't grumble. Arguing from the greater to the lesser: if this is true concerning real wrongs, how much more is it true about the little things of life? Think about your frustrations with brothers and sisters in church or in your family — when in the big scheme of things, they're not very big. And yet we let those things dictate our relationships.\n\nPhilippians 2 tells us that a Christian never murmurs or complains.\n\n## The Encouragement: The Judge Is at the Door\n\nVerse 9: \"Do not grumble against one another, brethren, lest you be condemned. Behold, the Judge is standing at the door.\"\n\nJesus is standing at the door, ready to come in and judge those who grumble instead of being patient with one another. James is saying that grumbling against the brethren is something that Jesus really cares about. Of all the things that James could say Jesus will judge the church for, that is the one he chooses — Jesus is right there waiting to judge the church for that.\n\n## The Examples: Prophets and Job\n\nIn verses 10 and 11, James gives examples of patience — of not grumbling. He lists real people that could be verified by the recipients of the letter.\n\nHas anyone read through the book of Jeremiah? God asked Jeremiah to cook his dinner with human dung, lay on his side for a year, walk all the way from Jerusalem to the Euphrates to bury a belt and then walk back to dig it up. Yet Jeremiah patiently did what God called him to do.\n\nRemember the call of Isaiah in chapter 6? After the glorious vision, God gives Isaiah his charge: you will spend your whole life proclaiming my word and no one will listen, because I will cause them not to listen. And Isaiah now spends the rest of his life preaching that word patiently, receiving attacks, not being recognized. So it is doable. It is doable not to grumble.\n\nThen James gives us the example of Job. Job got cranky after a while — he got cranky with his friends and with God. But he persevered. He patiently waited for the Lord to speak and to vindicate him. His classic statement in Job 1, while he had sackcloth and ashes and was scraping the pus off his boils: \"Naked I came into the world, naked I shall leave. Blessed be the name of the Lord.\" At the end, Job was vindicated by the Lord Himself — and we too shall be vindicated, as Romans 12:19 tells us.\n\n## The Solution: Be Patient\n\nThe solution to not grumbling, according to James, is to be patient. Both words he uses for patience carry the meaning that patience is always exercised in the context of difficult situations. You are not called to be patient when things are easy.\n\nWe saw this morning that patience is a characteristic of love, that it is produced by tribulations and results in hope (Romans 5:3-4). The God of patience is described in Romans 15 — He gives us patience so that we can glorify Him together.\n\nPatience is the opposite of retaliation. In 1 Thessalonians 5:14-15: \"Be patient with all. See that no one renders evil for evil to anyone, but always pursue what is good, both for yourselves and for all.\"\n\nPatience is to be pursued by the man of God. In 1 Timothy 6:11, Paul says: \"You, man of God, flee these things and pursue righteousness, godliness, faith, love, patience, and gentleness.\"\n\nWe will only be able to be patient with one another instead of frustrated if we are convinced that God has everything under control. What you believe concerning God will dictate whether you are going to live a life of patience. And we can only trust in the Lord in daily life like this if we are walking in the Spirit and in obedience to what God says in His Word, believing what He says, doing what He commands us to do. As we do that, all these fruit will grow in our hearts.\n\nLet us pray. Father, thank you that you are the God of patience. We thank you that you are patient with us. Help us to be patient with one another, for we ask in Jesus' name. Amen."};
