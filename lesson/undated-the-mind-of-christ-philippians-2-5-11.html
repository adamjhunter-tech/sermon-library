<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-the-mind-of-christ-philippians-2-5-11", "title": "The Mind of Christ", "speaker": "Elder Andrew Hoy", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["The Mind of Christ - Elder Andrew Hoy - Philippians 2_5-11.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/the-aroma-of-christ-2", "tags": [{"tag": "humility", "source": "detected"}, {"tag": "incarnation", "source": "detected"}, {"tag": "Christology", "source": "detected"}, {"tag": "lordship of Christ", "source": "detected"}, {"tag": "imitation of Christ", "source": "detected"}], "scripture_references": [{"reference": "Philippians 2:5-11", "type": "quoted", "source": "detected"}], "outline": ["Let this mind be in you which was also in Christ Jesus (v.5)", "Christ, being in the form of God, did not count equality with God a thing to be grasped (v.6)", "He made Himself of no reputation, taking the form of a servant (v.7)", "Humbled Himself to death, even death on a cross (v.8)", "Therefore God highly exalted Him (v.9)", "Every knee shall bow and tongue confess: Jesus Christ is Lord (vv.10-11)"], "summary": "An AM sermon on the Christ Hymn of Philippians 2:5-11, delivered by Elder Andrew Hoy. The mind of Christ is the supreme standard for Christian humility and self-giving. The eternal Son willingly laid aside His divine prerogatives, took the form of a servant, and humbled Himself to the cross—and therefore God exalted Him above every name. Believers are called to have this same servant mind in their relationships with one another.", "transcript": "Christmas was my favorite day of the year as a child. I would guess that was the case for many of you — if not still your favorite day. I remember as a child at the end of every Christmas day thinking to myself: only one more year until it comes again.\n\nMy family had a tradition I don't meet many people who share. A week after Christmas — just one family of cousins, my grandparents, and my own family — we would all tediously open one present at a time, and it took several hours. And yet it was done without any complaint. Christmas was a day of an abundance of gifts and giving.\n\nWhether your experience of Christmas was like mine or not, I know that for many it is a day of delighting in good food, in gifts and the giving of gifts, in seeing the smiles on the faces of loved ones, in the joy of being together with family. And yet as an adult my feelings about the day are a bit more conflicted. The problem is not any one of those things — the gifts, the food, the smiles, the family, the friends. These are all good things to delight in, all good gifts from God to whom belongs all the glory. The only way we can truly enjoy those things is when we know the One who gives them.\n\nAnd yet for many of us — myself included — there is always a temptation to delight more in the gifts than in the Giver. There is a temptation to make an idol of the day and all the good things that come with it. I open with these comments not to be a killjoy, not to say just remember the reason for the season and forget everything else. But I do hope that today, as we look at these words from the Apostle Paul, we can remember that the greatest delight in this life is Jesus Christ and what he has given.\n\n## The Text: A Feast of Biblical Truth\n\nThe text before us is a genuine feast of biblical truth. Not all biblical passages can be feasted on in the same way — some are the culinary equivalent of kale. But what we have in Philippians 2:5–11 is the biblical equivalent of a steak and lobster feast. It is rich, full, nourishing, and delightful. These are the truths I have had the delight of meditating on this week. People of God, feast as we consider these words.\n\nOur verses come from Paul's letter to the saints at Philippi. The Philippians were generally strong Christians — faithful, filled with a love for God. They were not dabbling in the works-based heresy troubling the Galatians, nor caught up in the rampant hedonism Paul had to rebuke in Corinth. And yet despite their relative strength, divisions were creeping in. People were at conflict with one another, arguing, and putting their own needs above the needs of their brothers and sisters in Christ.\n\nRight at the heart of the letter, Paul exhorts them:\n\n> *\"Let this mind be in you which was also in Christ Jesus.\"* (Philippians 2:5)\n\nThe message of the text is simple: Christians are called to imitate the humility of Jesus. Yet while the exhortation is simple, it rests on heavy, significant, and deep theological truths — all of which I will try to pack into this sermon.\n\nTo understand what it means to have the mind of Christ, we need to understand who Jesus is — his two natures. We also need to understand what Jesus gave up in his incarnation, which theologians call his state of humiliation. And we need to understand to what end he did this — what he gained, which theologians call his state of exaltation.\n\n## The Two Natures of Christ\n\n### His Full Divinity\n\nBeginning with his full divinity: we read in verse 6 that he was *\"in the form of God.\"* Before we can look at how this passage teaches the full divinity of Jesus, we have to recognize that there are critics and unbelievers who would use this verse to say: *see, it says he is in the form of God, not that he is God.* I am sure this is the kind of thinking that Arius would have used when spreading his message that Jesus was not fully God but was a created being. This heresy has echoed through the ages — in various forms, whether through the Docetists, the Socinians, liberal Protestantism, or the cults of today like the Jehovah's Witnesses. There are those who claim to believe God's Word and yet claim Jesus is less than fully God.\n\nFortunately, God has not left us without witness. We are going to stick right here in this one text, and I would encourage you all to find a single passage that overwhelmingly testifies to the full deity of Jesus — master it, and use it in conversations with those who doubt.\n\nFirst, verse 6 says he was in the form of God. One of the commentaries I consulted says that *form* here means *the true and exact nature of something, possessing all its characteristics and qualities.* Therefore, having the form of God is roughly equivalent to having equality with God — which is then clarified by the very next phrase: *he did not count it robbery to be equal with God.* There is no being that has the right to claim equality with God — and yet the Apostle Paul implies that Jesus had the right to do so. By implication, Jesus had to be divine himself.\n\nFurthermore, we have to think of the Bible as a whole. We know overwhelmingly from the Old Testament that there is only one God. The first commandment: *you shall have no other gods before me.* The Shema: *Hear, O Israel, the Lord our God, the Lord is one.* Passages in Isaiah 45 where God himself says: *there is none besides me, I am the Lord and there is no other.* For there to be a being who had the right to claim equality with God, that being must himself be God.\n\nThere is more in verse 10: *at the name of Jesus every knee should bow and every tongue confess that Jesus Christ is Lord.* There is an allusion here to Isaiah 45:23, which reads — with God clearly as the reference — *\"to me every knee shall bow, every tongue shall swear allegiance.\"* Paul takes the language of Isaiah where God occupies that place and puts Jesus in that same place as God the Father, showing an equality between them.\n\nFurthermore, this passage ends with the declaration that *Jesus Christ is Lord.* While this is not the LORD of all capitals referring to the divine name, it is still a divine title — because Jesus is not merely *a* lord but *the* Lord over all lords, a title that belongs to God alone.\n\nMore could be said. Other passages to look up at other times: John 1:1–14; Hebrews 1; Colossians 1.\n\n### His Full Humanity\n\nScripture also testifies overwhelmingly to his full humanity. In verses 7–8 we read: *\"coming in the likeness of men... being found in appearance as a man.\"* A clear statement of his humanity. Yet these are the kinds of passages his detractors love to quote: *in the likeness of man* doesn't say *he was man*; *in appearance as a man*, not as a man. These phrases could be misread to say Jesus was God-like but not fully human — echoing the ancient heresies.\n\nDocetism said Jesus was more or less a ghost — his physical humanity was just an illusion. Apollinarianism said Jesus had a physical body, but his divine nature was the animating force — so he wasn't truly united in the full sense. Unless you think those are only ancient heresies, consider that the well-known apologist William Lane Craig has been propagating a view called neo-Apollinarianism. I don't need to get into it, but I want you to know these things are still around, and even men who have claimed the name of Christ are prone to wandering into these areas.\n\nHowever, I believe this passage testifies to his full humanity through its internal logic. Paul has clearly testified that Jesus is fully God and talks about Jesus giving up so much. Yet if he didn't become fully man, the underlying logic breaks down — because what did he really give up if he remained just fully God? If he didn't take on a true human nature, how could it truly be said that he gave anything up? That undercuts the entire message Paul is making. We must necessarily affirm both his full deity and his full humanity.\n\nAs we wrap up our thoughts on the two natures: it is often taught, when the two natures of Christ are discussed, that if he was not fully human he could not bear our sins, and if he was not fully divine he could not bear our sins. That is absolutely true. But Paul also says that both natures are needed for the *example* of Christ. If he was not fully God, he didn't really have much to give up. If he was not fully man, he didn't really give much up. This presses us to consider the magnitude of what Christ gave on our behalf.\n\n## The State of Humiliation: What Did Jesus Give Up?\n\nIn his incarnation, what was it that Jesus actually gave up? There are two basic errors here.\n\nThe first is that he gave up his deity. That is known as kenosis, and those who espouse it will appeal to the language of *he emptied himself* in this passage. Jesus did not give up his divinity when he became a man. That is false and completely unscriptural.\n\nThe second error is thinking that merely becoming human was the sacrifice he made. I was talking with a friend about this, and I read something similar in the theologian Berkhof. He writes: *\"I maintain that the incarnation is not part of the humiliation of Christ, since he still has his human nature and yet is no more in a state of humiliation. But we should carefully discriminate here. While the incarnation is an act of great condescension, it was not necessarily a humiliation that the Son of God assumed a human nature. But it was an act of humiliation that he assumed flesh — that is, human nature as it is since the fall, weakened and subject to suffering and death, though in his case free from the taint of sin.\"*\n\nHere is why that distinction is important: Jesus keeps his human form for eternity. If he retains it forever, we can't call that not good. So it becomes very important that we see that what constituted his humiliation was not the human form itself, but the suffering that went along with it.\n\nIn Philippians 2:7, he was *\"in the likeness of men\"* — and we need to read that as the likeness of *fallen* men. Galatians 4:4–5 helps: *\"when the fullness of time had come, God sent forth his Son, born of woman, born under the law.\"* Born under the law — subject not just to obeying the law but to all the consequences that fallen humans face because of original sin.\n\nFurthermore, he took on the form of a *bond servant* — a slave — which seems to be equivalent to the language of fallen humanity. And in verse 8, he was *\"obedient to the point of death, even death on a cross.\"* When he went to the cross, it was him bearing the weight of our sin and paying its just penalty. Our confession says that not only his conception, birth, life, and death, but also his burial was part of his humiliation.\n\nSo the humiliation of Jesus was not setting aside his divinity, nor merely taking on human form, but taking the estate of fallen humanity — with all its miseries — while remaining without sin.\n\n## The State of Exaltation: To What End?\n\nThis raises the last question: to what end? Was this giving up virtuous in itself? Was there a greater purpose?\n\nThe verse that kept resounding in my mind as I meditated on this passage is Hebrews 12:2: *\"who for the joy that was set before him endured the cross.\"* Jesus did not humiliate himself merely as an example. He did it so that he could redeem a people to himself.\n\nAnd when he was restored to the exalted place at the right hand of God:\n\n> *\"God has highly exalted him and bestowed on him the name that is above every name, so that at the name of Jesus every knee should bow, in heaven and on earth and under the earth, and every tongue confess that Jesus Christ is Lord, to the glory of God the Father.\"* (Philippians 2:9–11)\n\nEvery knee will bow — whether those who profess him as their King and their God, or those who failed to repent and will suffer eternally under the hand of his wrath. But he came so that those he redeemed would eternally be able to enjoy and delight in fellowship with him.\n\n## Application: Having This Mind Among Ourselves\n\nAs I was wrestling with this text, I noticed something about the structure. We have six verses. The first three are about his humiliation. The last three are about his exaltation. And I wondered: is it only the first three that describe the mind we are supposed to have among ourselves? I think we are supposed to have the whole thing.\n\nBecause when we give of ourselves for the sake of others, do we do so in hopeful anticipation — in faith that God will reward those labors, that he will use them to build up his people and his kingdom? When you sacrifice real, costly things — your time, your resources, yourself — do you do so in hopeful anticipation that you serve a God who will use you mightily as his instrument?\n\nJust as Jesus, when he gave of himself, did so in hopeful anticipation that what he did would not fall flat — so you, people of God, give of yourselves in hopeful anticipation. In doing so, you can give with a true spirit of joy. Giving of yourself with no real hope that it means anything is heartening. But we serve a God who uses his people as his means to accomplish his ends. So we give of ourselves — yes — but in hopeful anticipation, having this mind among ourselves.\n\nThis applies very directly to the relational aspect Paul has in mind. It is Christmas, and Christmas brings family gatherings — including, for many of us, gatherings with people with whom there are broken relationships. With family we don't see very often, it is easy to let a conflict get swept under the carpet and just endure a day or two together, letting the resentment continue, letting the bitterness and the strife and the division go on year after year.\n\nWhat would it look like to let this mind be in you which was also in Christ Jesus? I think it means setting aside your pride — what people might think if you try to address the issues that have divided. It means setting aside bitterness, to forgive. It means setting aside your comfort — having these conversations is incredibly awkward and uncomfortable, especially when they have been put off for many years. It means setting aside your own priorities: *I don't have time, there is too much to do.*\n\nPeople of God — if he who deserves everything set aside the glory and comfort that was his due for the sake of you, how much more should you be willing to set aside your comfort, your pride, your bitterness, your priorities, for the sake of others?\n\nWe do this because it is to him that all glory belongs. Christ is glorified, and so the Father is glorified. He alone receives all glory, honor, and praise."};
