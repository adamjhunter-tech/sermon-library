<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-no-greater-gain", "title": "No Greater Gain", "speaker": "Pastor Henry Flowers", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["No Greater Gain (Pastor Henry Flowers).txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/no-greater-gain-pastor-henry", "tags": [{"tag": "justification by faith", "source": "detected"}, {"tag": "imputation", "source": "detected"}, {"tag": "Reformation", "source": "detected"}, {"tag": "law and gospel", "source": "detected"}, {"tag": "sanctification", "source": "detected"}, {"tag": "assurance", "source": "detected"}, {"tag": "faith", "source": "detected"}], "scripture_references": [{"reference": "Philippians 3:4-16", "source": "ai"}, {"reference": "Romans 5:9", "source": "ai"}, {"reference": "Isaiah 53:11", "source": "ai"}], "outline": [{"point": "I. Introduction: Knowing Christ Means Trade-Offs", "subpoints": ["A. Justification defined: God pardons sinners who trust Christ alone", "B. The doctrine was central to Paul and to Martin Luther", "C. True doctrine sanctifies affections and reorders our loves"]}, {"point": "II. Paul Lost Confidence in the Flesh (Philippians 3:4-6)", "subpoints": ["A. The Judaizers threatened Philippians with requirements beyond faith", "B. Paul's impressive religious credentials: tribe, zeal, blamelessness", "C. Meeting Christ revealed his spiritual bankruptcy; he counted all loss"]}, {"point": "III. Paul Gained the Righteousness of God Through Faith", "subpoints": ["A. To know Christ: saving faith that understands who he is and what he did", "B. To gain Christ: receiving redemption, justification, adoption, assurance", "C. To be found in Christ: united to him, safe from condemnation forever"]}, {"point": "IV. Application: Let Your Striving Cease, Rest in Justification", "subpoints": ["A. Paul and Luther both strove but found rest in justification alone", "B. Past tense counted vs. present tense count—daily renewal of faith", "C. For every look at yourself, take 10 looks at Christ (McCheyene)", "D. The Great Exchange: our sins on Christ, his righteousness on us"]}], "summary": "Guest speaker Pastor Henry Flowers expounds Philippians 3:7-9 to demonstrate that there is no greater gain in life than knowing Christ Jesus as Lord. Drawing on Paul's own testimony, he shows how Paul's impressive religious pedigree—circumcision, tribal lineage, zeal as a Pharisee—became worthless the moment he encountered the risen Christ, because all these achievements could not provide the righteousness of God that comes through faith alone. Like a man who must give up cake to gain good health, Paul had to lose confidence in the flesh to gain Christ.\n\nFlowers applies this doctrine with pastoral warmth, drawing parallels to Martin Luther's struggle with self-righteousness and morbid introspection. Both men found peace not by striving harder but by resting in the finished work of Christ—his active obedience credited to them, his passive obedience bearing their condemnation. The sermon concludes with a practical call to fight the daily urge to return to self-righteousness by meditating on the Great Exchange.", "transcript": "## Introduction: Knowing Christ Means Trade-Offs\n\nWe are going to dive squarely into God's word. In particular, we are going to look at the doctrine of justification as Paul lays it out for us in this text.\n\nJustification is a doctrine that states that a holy God would have the audacity, the power, and the grace to pardon sinners who placed their faith in the only Redeemer of God's elect, namely Jesus Christ our Lord. Justification by faith was the premier doctrine of the Protestant Reformation, championed by its leading figure, Martin Luther. This doctrine was also a key facet of the Apostle Paul's ministry. Both men passionately preached about justification, and more importantly, both were transformed by the doctrine of justification. This highlights the true purpose of the doctrine, namely to bring about change in the believer.\n\nDoctrine is practical. It may not seem like it, but it is true. Doctrine is practical. It is useful, if you will. It is the faith applied, because at bottom, biblical doctrine when properly taught and understood sanctifies our affections so that our loves are rightly ordered. In other words, what we learn determines what we love, and the doctrine of justification should cause us to love Christ more than anything.\n\nAnd that is what we have here with Paul. A man who was once so deluded by his own self-righteousness is now saying he has no righteousness apart from Christ. Those things for which Paul once lived, he has now died to, so that he may live in Christ Jesus our Lord. This change of heart came from understanding the doctrine of justification and applying it to his own life. And when we understand this doctrine, we learn why there is no greater gain than knowing Christ.\n\n## Background: Paul and the Philippians\n\nThe book of Philippians is a letter Paul wrote to the Christians in Philippi. It is part of what is known as the prison epistles because, like Ephesians, Colossians, and Philemon, it was written from prison. Why was Paul in prison? In chapter 1 verse 7 of Philippians, we learn that it was for his \"defense and confirmation of the gospel.\" This was a pattern in Paul's ministry. He was always getting himself thrown in jail for his faith. In 2 Corinthians 11:23, he states that he had been \"in prison\" many times. In Acts 24:27, we see that he was imprisoned for two years.\n\nBut Paul was never ashamed of this. In fact, he was encouraged by it, which is why he says in chapter 1 verse 20 of Philippians:\n\n> *\"As it is my eager expectation and hope that I will not be ashamed at all, but that with full courage now, as always, Christ will be honored in my body, whether by life or by death.\"* (Philippians 1:20)\n\nAs far as Paul was concerned, his life and limb were at Christ's disposal because he saw how God used his imprisonments to advance the gospel.\n\nCase in point: Paul's ministry to the Philippians began during one of his prison stints. In Acts chapter 16, we have the account of Paul and his companion Silas ministering in Philippi. It is there that Paul would evangelize Europe's first convert, Lydia of Thyatira, exercise a slave girl of her spirit of divination, and as a prisoner, baptize a jailer and his family — this jailer who was moments away from committing suicide. Paul toiled among the Philippians, and it was fruitful labor, for he had planted and established a stable church.\n\nNow, after learning that Paul had been imprisoned once again, the dear church sent him provisions, and Paul wrote this letter in response to their compassion and charity. In the middle of this letter, Paul addresses the issue of justification to convince them that the only way one can be justified before God is by receiving the righteousness of Christ through faith, and that all other measures are worthless.\n\nNow, when we talk in terms of gain and loss and worth, we are speaking in economic terms. We are addressing value, because in a world of scarcity like ours, we have to make trade-offs. We have to give up something of lesser value to gain something of greater value. Thomas Sowell, the famed economist, said that there are no solutions in life, only trade-offs. You cannot have your cake and eat it too. If you want to lose weight, you have to make a trade-off. You must determine what is more valuable to you: cake or good health. You have to lose one in order to gain the other.\n\nAnd this principle applies here too. To know Christ means you will have to lose your confidence in the flesh so that you gain the righteousness of God through faith. You cannot possess both and be justified before God.\n\nTo explain this, Paul opens up about his own life, and that is what we will look at this morning. For Paul, knowing Christ meant two things: he lost confidence in the flesh, so that he might gain the righteousness of God through faith in Christ.\n\n## I. Paul Lost Confidence in the Flesh (Philippians 3:4–6)\n\nAlthough Paul has a lot to say to the Philippians, it is not a long letter. In chapter 3 verse 1, Paul looks like he is about to wrap up, saying, \"Finally, my brothers, rejoice in the Lord. To write the same things to you is no trouble to me and is safe for you.\" But right after that, he warns them to watch out for men he calls dogs, evildoers, who mutilate the flesh.\n\nApparently the Philippians had encountered men called Judaizers, who wanted to convince them that faith in Christ alone was not enough, and that they needed to be circumcised too if they truly wanted to be justified before God. The Christians at Philippi were mostly Gentiles, and they may have believed that because they were not Jewish and had not undergone circumcision, they were somehow less valuable in God's eyes. They may have thought that they needed to add circumcision to their faith in Christ in order to be made right with God.\n\nI had a dear lady come up to me when I came in and say, \"You're from Mississippi, aren't you?\" I said, \"I sure am.\" I moved here from Mississippi about five years ago. And this issue we are dealing with — where the Philippians are not sure whether or not they are part of God's family — reminds me of an incident back when I lived in Mississippi, back at the old church in Hattiesburg.\n\nThere was a couple — a husband and a wife. The husband grew up in Mississippi while the wife was originally from Chicago. When she first met his family, they teased her by saying, \"She's not from around here.\" That's the kind of stereotypical thing people say in Mississippi: \"You ain't from around here, are you?\" Suggesting she's an outsider. Now that is fine in the beginning when they are courting, but fast forward nearly 50 years, and those same relatives still say to her, \"She's not from around here\" — despite her being married, taking his last name, raising his children and grandchildren, all in Mississippi. She is still treated like an outsider.\n\nAnd this is similar to what the Philippians were experiencing with the Judaizers. Despite their faith, this group was telling the Philippians that because they were not Jewish and had not been circumcised, they were still outsiders among God's covenant people. It is akin to saying that despite 50 years of marriage and living in Mississippi longer than she lived in Chicago, the wife can never be accepted into her husband's family.\n\nPaul tells them that this is wrong. The Jewish rites of the old covenant are dead. They do not justify us. In Christ, circumcision counts for nothing. Rather, as he says in verse 3, \"We are the circumcision\" — our worship is true because it is done by the Spirit of God, and we glory in Christ Jesus. So to go back to putting confidence in the flesh through circumcision would be a tragic loss.\n\nIndeed, to be justified before God, one must first lose confidence in the flesh. Paul is not speaking theoretically here. He is speaking from experience. At one time, he put great confidence in the flesh. He worked hard to justify himself before God by every conceivable measure. We see this in verses 4 to 6:\n\n> *\"If anyone else thinks he has reason for confidence in the flesh, I have more: circumcised on the eighth day, of the people of Israel, of the tribe of Benjamin, a Hebrew of Hebrews; as to the law, a Pharisee; as to zeal, a persecutor of the church; as to righteousness under the law, blameless.\"* (Philippians 3:4–6)\n\nSo in Paul's day, a Jew sought God's approval through his lineage and religious pedigree. Prior to Christ, Paul followed this prescription, investing his time and effort in meticulously following the Mosaic law, believing that by doing so he would earn God's favor. When he says he is a Hebrew of Hebrews, he is saying that if God required one to check every box in the Jewish standard in order to be accepted among his covenant people, Paul would be more qualified than even the Judaizers who were harassing the Philippians.\n\nFrom a young age, he had completed every religious rite, including circumcision. He was aware of his tribal lineage, belonging to the tribe of Benjamin. He was a son of a Pharisee, and as a Pharisee himself, he was an expert teacher and practitioner of the law. He was an austere, zealously religious man, maintaining an irreproachable reputation. And so devoted was he to the cause and traditions of his fathers that he led the persecution of the burgeoning rival sect of those who followed the life and teachings of the man from Nazareth.\n\nIn hindsight, it is easy to cast pre-conversion Paul as a villain, because he does that himself — he is the chief of sinners. But in reality, if we had known Paul before his conversion, we would probably have admired him. We would likely have viewed him as a worthy and devoted young man, a man of promise. He invested his time and life into performative religion to earn the wages of righteousness and acceptance from God.\n\nBut then he met Christ, and his eyes were opened. Sure, he had heard of Jesus, but he did not *know* him. That is the Greek word there — *gnosis* — he did not know him in that deep sense. He did not believe he was the Christ. Nor had he experienced his grace. But when Christ revealed himself at his conversion, Paul was humbled, becoming like Job when he saw the Lord. In Job 42:5–6, Job said:\n\n> *\"I had heard of you by the hearing of the ear, but now my eye sees you; therefore I despise myself and repent in dust and ashes.\"* (Job 42:5–6)\n\nThe sight of the risen Christ made Paul realize how spiritually bankrupt he was. He realized that the people he had persecuted had inherited something he had worked so hard to earn but never attained — the righteousness of God. And this righteousness was not wages earned through works of the law, but a gift from God received through faith. He realized that his works did not make him a son of God. In fact, all they did was mount greater condemnation upon himself. For what does it profit a man to know the whole Old Testament and never see Christ on a single page? Such was Paul's situation.\n\nSo when he realized that his works condemned him, but faith in Christ would justify him, Paul had to lose that which he had treasured most — namely, confidence in the flesh. And that is why he says in verse 7:\n\n> *\"But whatever gain I had, I counted as loss for the sake of Christ.\"* (Philippians 3:7)\n\nThis is an extraordinary trade-off: trading confidence in the flesh for faith in Christ. But as we learn from Paul's testimony, when you lose anything to gain Christ, you realize you have lost nothing at all. In fact, you learn to despise what you once had, because there is no greater gain than knowing Christ.\n\nSo Paul lost confidence in the flesh, and he wanted the Philippians to learn from his testimony and follow his example.\n\n## II. Paul Gained the Righteousness of God Through Faith (Philippians 3:7–9)\n\nNow that Paul has argued from his own life for the futility of works-righteousness, he tells them that he desires to know Christ and to gain Christ so that he may be found in Christ, possessing the righteousness of God. That is a weighty sentence, so let us break it down into three questions.\n\n### What Does It Mean to Know Christ?\n\nTo know Christ means that your mind understands who he is, what he has done, and why it is important. And it also means that your faith believes that he did it all to redeem you from sin, death, and condemnation. It means you believe the words of Isaiah 53:11:\n\n> *\"Out of the anguish of his soul he shall see and be satisfied; by his knowledge shall the righteous one, my servant, make many to be accounted righteous, and he shall bear their iniquities.\"* (Isaiah 53:11)\n\nThis kind of knowledge is called saving faith, which is a gift of God. To know Christ is to place your faith in Christ.\n\n### What Does It Mean to Gain Christ?\n\nTo gain Christ means that through this saving faith you receive Christ and all his benefits: justification, adoption, sanctification, along with all the benefits that accompany or flow from them — namely, assurance of God's love, peace of conscience, joy in the Holy Ghost, increase of grace, and most importantly, perseverance therein to the end. This is called redemption, which is a gift of God.\n\nSo to know Christ means to have saving faith in Christ. And to gain Christ means that you are redeemed through Christ by placing your faith in Christ.\n\n### What Does It Mean to Be Found in Christ?\n\nTo be found in Christ means that we are united with Christ and therefore safe from condemnation. When God gives us saving faith, we are then united to Christ — spiritually, but truly and for all eternity. The benefit Paul presents here is the righteousness of God, which is Christ's righteousness, the only righteousness God accepts. It is his record of perfection that God judges us against, and not our own. And when we receive this righteousness by faith, God declares us justified, meaning we are acquitted of all our sins, pardoned of any transgression, and counted as righteous in God's sight.\n\nTo be found in Christ is like the manslayer we read of in Numbers 35:25, who can take refuge in the city of refuge. In that case, the fugitive — though guilty — finds salvation so long as he remains in the city. While there, he is protected from the hand of the avenger of blood until the death of the high priest. However, in our case, those who find refuge in Christ shall never be moved, because the high priest is Jesus, the one who lives forever. We are forever safe from the punishment for our sins, so long as we remain in him. As Paul says in Romans 5:9:\n\n> *\"Since, therefore, we have now been justified by his blood, much more shall we be saved by him from the wrath of God.\"* (Romans 5:9)\n\nNow, could Paul have ever realized these gains — justification, pardon from sin — on his own? Could Paul have ever accomplished on his own what Christ accomplished in his stead? Could Paul have ever afforded to forfeit the righteousness of God that comes through faith in order to attain a righteousness of his own through works of the law? No, no, and no. Neither could the Philippians. And neither can we.\n\nThere is nothing better than to know Christ. This is what Paul believed. This is what Paul preached. And Paul was determined never to let his faith rest upon anything other than Christ for his righteousness. And neither should we.\n\n## III. Application: Let Your Striving Cease, Rest in Justification\n\nBrothers and sisters, the application for today's message is this: let your striving cease and rest in your justification.\n\nWhat is worrying you? Are you haunted by regret? Are you riddled with shame and guilt? Turn to Christ. Bring your cares and your sins to God in him. Preach the gospel to your soul. Have a brother, sister, elder, pastor, or deacon preach it to you. Seek counsel, and in all circumstances let your striving cease and rest in your justification.\n\nNow, what do I mean by \"let your striving cease\"? I mean refrain from fixating upon yourself — whether on your good works or your bad.\n\nLet us go back to Paul and Luther. Paul and Luther were men who strived. They fixated on their own works — Paul on his good works, Luther on his sin. And because of this, prior to knowing Christ and understanding their justification, these two men were effectively enemies of God.\n\nPaul fixated on his good works, and in an effort to approve himself before God, he went too far. He hated Christ. He hated Christ's church. And as Christ himself said to Paul, \"You have kicked against the goads\" — in other words, in his efforts to approve himself to God, he was striving against God.\n\nLuther, on the other hand, fixated on his sin. In an effort to approve himself, he became morbidly introspective and maniacally neurotic. He would spend hours in confession trying to rid his conscience of the knowledge of his sin — and of course, never getting to the bottom, always realizing that he had more to confess. He said that at that time in his life, he came to literally hate the righteousness of God, because it gave him no rest.\n\nWhat pacified these men? What changed them? What reordered their affections? Understanding the doctrine of justification. That is the effect doctrine should have: to cause us to rest.\n\nSo much of our anxiety comes from the fear that we are not worthy, that we are a hopeless mess, and that at some point God will run out of patience with us. But after all we have read, we should know that is not true if you are in Christ. In Christ, you are justified. Pardoned. Righteous. Exalted, seated with Christ in heaven — not because you deserve it, but because he chose to put you there.\n\n### The Grammar of Justification: Counted vs. Count\n\nSo let your striving cease. But as you do, let your devotion begin. I want you to observe something. Look at verse 7:\n\n> *\"But whatever gain I had, I counted as loss for the sake of Christ.\"* (Philippians 3:7)\n\nYou see the word *counted* there — with an *-ed* at the end. In English it is past tense. In the Greek, it is perfect tense, meaning it is a completed act that has happened in the past.\n\nNow look at verse 8:\n\n> *\"Indeed, I count everything as loss because of the surpassing worth of knowing Christ Jesus my Lord. For his sake I have suffered the loss of all things and count them as rubbish, in order that I may gain Christ.\"* (Philippians 3:8)\n\nIn verse 7, *counted*. But in verse 8, *count* — present tense, meaning an act that is presently and continuously happening.\n\n*Counted* was the initial point at which Paul lost confidence in the flesh and placed his faith in Christ — the point at which God declared him justified. However, *count*, in the present tense, means that every day he has to fight the urge to put confidence back in the flesh and remember that he has been justified through faith in Christ and not by the works of the law.\n\nSo for the rest of your life, you must be devoted to reminding yourself of your justification and forgetting your works. For the rest of your life, you must remind yourself that you have been declared righteous, pardoned of sin, and justified before God. To do that, you will need to actively disregard anything that would feed the delusion that there is any way to God but through faith in Christ.\n\nHow do you do that? Let your striving cease. Refrain from fixating upon yourself, and use conviction for what it was intended to do — to drive you to Christ. When you are convicted, it has a purpose. You should not be neurotic. You should not be rebelliously running from God. You should do what Robert Murray McCheyne told us to do: for every look at yourself, take ten looks at Christ.\n\nDon't fixate on your sin, but rather fixate on Christ's obedience — his active and passive obedience. Remember his active obedience: that he lived a life of perfect obedience, and that this record of righteousness has been imputed to you. Then look at his passive obedience: the act of dying on the cross and receiving the condemnation you deserve in order to satisfy the wrath of God on your behalf.\n\nThis is called the Great Exchange. God lays our sins on Christ and punishes them in him. And in Christ's obedient death, God fulfills and vindicates his righteousness and credits it to us. Our sins are on Christ. Christ's righteousness is ours.\n\nAnd how often should you devote yourself to remembering this truth? I like Pastor John Piper's answer. He says we can hardly stress too much that Christ is God's answer to our greatest problem. It is all owing to Christ. You cannot love Christ too much. You cannot think about him too much, or thank him too much, or depend upon him too much. All our forgiveness, all our justification, all our righteousness is in Christ.\n\nAnd this is the gospel — the good news that our sins are laid on Christ and his righteousness is laid on us, and that this great exchange becomes ours not by works but by faith alone. Here is the good news that lifts burdens, gives joy, and makes us strong.\n\nThere is no greater gain than to know Christ. There is no greater interest one can purchase with God than that which comes through faith in Christ. So let all your striving cease, and devote yourself to resting on the finished work of Christ that he accomplished for your justification. Amen."};
