h John the Baptist's eyes and can rejoice in Him as the Lamb that was slain'"], "scripture": ["John 1:29-34"]}, {"title": "1. Jesus Is the Lamb of God Because He Existed Before John", "subpoints": ["'After me comes a man who is preferred before me, for He was before me' — two different meanings of 'before'", "Jesus was born six months after John, yet John says He was 'before' him — because He is eternal", "The God-man: in His person, human and divine nature are united — one nature with a beginning, one nature with no beginning", "This is why He can be the Lamb of God who takes away sin: He is both truly man and truly God"], "scripture": ["John 1:30"]}, {"title": "2. Jesus Is the Lamb of God Because the Father Attested to Him at His Baptism", "subpoints": ["'I saw the Spirit descending from heaven like a dove and He remained upon Him' (v.32)", "This occurs at least 40 days before this declaration (because Jesus was tempted 40 days after His baptism)", "John 'did not know' Jesus was the Messiah until God revealed it at the baptism", "The OT connects the Spirit with the Messiah: Isaiah 11:1-2 (Spirit resting on the branch from Jesse); Isaiah 42:1 (My servant, I have put My Spirit upon him); Isaiah 61:1 (The Spirit of the Lord is upon Me)"], "scripture": ["John 1:31-33", "Isaiah 11:1-2", "Isaiah 42:1"]}, {"title": "3. Jesus Is the Lamb of God Because He Baptizes With the Holy Spirit", "subpoints": ["'This is He who baptizes with the Holy Spirit' (v.33)", "John baptizes with water; Jesus baptizes His church with the Holy Spirit — once for all", "Only God can send the Spirit upon His church — Jesus has that authority", "The new covenant promise of Ezekiel 36: God will put His Spirit within His people and cause them to walk in His statutes"], "scripture": ["John 1:33", "Ezekiel 36:26-27"]}, {"title": "4. Jesus Is the Lamb of God Because John Came to Reveal Him to Israel", "subpoints": ["'I came baptizing with water, that He should be revealed to Israel' (v.31)", "This is Jesus' formal introduction to Israel — the priests and Levites from Jerusalem were the audience", "John introduces Him as 'the Lamb of God that takes away the sin of the world' — to call Jesus a Lamb is to call Him a sacrifice", "The sacrificial system pointed to the need for atonement; those sacrifices had to be done over and over — they pointed to One who would finally and forever take away sin", "Jesus is the ram caught in the thicket (Gen 22); the Passover Lamb (1 Cor. 5:7); Isaiah 53:7 — 'He was led as a lamb to the slaughter'"], "scripture": ["John 1:31", "Isaiah 53:7", "1 Corinthians 5:7"]}, {"title": "5. The Scope: 'Who Takes Away the Sin of the World'", "subpoints": ["Not just the Jewish Messiah — the Messiah of the whole world", "This is the great emphasis of John's Gospel: Jesus came to save the world, Jews and Gentiles, every ethnicity", "Revelation 5:9 and 7:9: a great multitude from every tribe, tongue, people, and nation before the Lamb", "Two ways the Lamb takes away sin: by substitution (dying for the elect) and by judgment (casting the unrepentant into eternal punishment at His return)", "Racism and abortion are the same sin — both deny full worth to human beings whom God has made; heaven is for every color, every people"], "scripture": ["John 3:16-17", "Revelation 5:9-10", "Revelation 7:9-10"]}, {"title": "Application: Four Responses", "subpoints": ["1. If you have not believed: trust in the Lamb of God now — He will not turn away anyone who comes", "2. If you are in Christ: live in obedience, motivated by the precious blood (1 Pet. 1:13-19)", "3. Follow John's example: point people to Christ with your life and your words — behold the Lamb", "4. Rest: all your sins have been forgiven; Christ obeyed where you failed; 'Well done, good and faithful servant'"], "scripture": []}], "summary": "Pastor Tito Lyro preaches on John 1:29-34, John the Baptist's declaration that Jesus is 'the Lamb of God who takes away the sin of the world.' He offers four reasons why John called Jesus the Lamb: His pre-existence and divine nature (He was before John); the Father's attestation at His baptism through the descending Spirit; His unique authority to baptize with the Holy Spirit; and John's divine commission to reveal Him to Israel. He expounds the full weight of the Passover and Isaiah 53 imagery, emphasizes the global scope of Jesus' atonement ('the sin of the world' — every tribe and tongue), and closes with four applications: believe, live obediently, point others to Christ, and rest in His finished work.", "transcript": "## Introduction\n\nAs we move further into the first year of Jesus' public ministry, we hear from John the Baptist one last time in our series. After this occasion he will rightly fade from the narrative — the one for whom he came to prepare the way has arrived. As John himself said: *He must increase, while I must decrease.*\n\nJ.C. Ryle wrote: \"This passage contains a verse which ought to be printed in great letters in the memory of every reader of the Bible. We know nothing rightly about Christ until we see Him with John the Baptist's eyes and can rejoice in Him as the Lamb that was slain.\"\n\nThe setting: John is baptizing in the region east of the Jordan. The previous day a delegation of priests and Levites from Jerusalem had come to investigate him — to determine who he was in terms of Old Testament prophecy. They were still present when Jesus appeared the next day. John introduced Him not only as the Lamb of God but also as the one who must be revealed to Israel and the Son of God. *Do you want to know about Old Testament fulfillment? Look at this man.*\n\n## Four Reasons John Called Jesus the Lamb of God\n\n### 1. Because He Existed Before John\n\n> \"This is He of whom I said, 'After me comes a man who is preferred before me, for He was before me.'\" (John 1:30)\n\nNotice that the word 'before' appears twice — with two very different meanings. He is *preferred before me* (superior to me) — because He *was before me* (existed before me in time).\n\nJesus was born at least six months after John. He is younger. Yet John says He was before him — because this man born of Mary, with younger brothers and sisters and a mother still living, is not *only* a man. He is eternal. He existed before the foundation of the world.\n\nThis is the first reason He can be the Lamb of God who takes away sin. In His person, divine and human nature are united — one nature with a beginning (at conception in Mary's womb), one nature with no beginning whatsoever. Without His deity, His death could not bear the infinite weight of our guilt. Without His humanity, He could not die in our place.\n\n### 2. Because the Father Attested to Him at His Baptism\n\n> \"I saw the Spirit descending from heaven like a dove, and He remained upon Him.\" (John 1:32)\n\nThis declaration occurs at least forty days after Jesus' baptism — because Jesus was immediately taken into the wilderness after His baptism and tempted for forty days. John is looking back at what he witnessed.\n\nHe says he 'did not know' Jesus — not that he didn't know his cousin, but that he didn't know Jesus was the Messiah until God revealed it at the baptism. What made it unmistakable was the descent of the Spirit.\n\nThe Old Testament made the connection clear: Isaiah 11:1-2 — the Spirit resting on the coming branch from Jesse. Isaiah 42:1 — *My servant whom I uphold, My elect one in whom My soul delights: I have put My Spirit upon Him.* Isaiah 61:1 — *The Spirit of the Lord is upon Me* — the passage Jesus read in the Nazareth synagogue and applied to Himself.\n\nWhen John saw the Spirit descend and *remain* upon Jesus, it was unmistakable: *That is the Messiah. That is the Lamb of God.*\n\n### 3. Because He Baptizes With the Holy Spirit\n\n> \"He who sent me to baptize with water said to me, 'Upon whom you see the Spirit descending and remaining on Him, this is He who baptizes with the Holy Spirit.'\" (John 1:33)\n\nJohn baptizes with water. Jesus baptizes His church with the Holy Spirit — once for all. Only God can send the Spirit upon His people. This is the promise of the new covenant in Ezekiel 36: *I will put My Spirit within you and cause you to walk in My statutes.*\n\nThe fact that Jesus has this authority — to send the Spirit to regenerate and indwell His people — is evidence of who He is. And John recognized it.\n\n### 4. Because John Came to Reveal Him to Israel\n\n> \"I did not know Him; but that He should be revealed to Israel, therefore I came baptizing with water.\" (John 1:31)\n\nThis is Jesus' formal introduction to Israel. The delegation of priests and Levites — the scholars, the religious authorities — were standing right there. And John introduces Jesus as the Lamb of God.\n\nTo call Jesus a Lamb is to call Him a *sacrifice* — the one who dies for someone else. The whole sacrificial system of the Old Testament — the morning sacrifice, the evening sacrifice, the Day of Atonement, the Passover, all the offerings in Leviticus — pointed to the need for atonement. But those sacrifices could not remove sin permanently. They had to be done over and over. They *pointed forward* to the one who would finally take away sin — once, completely, forever.\n\nJesus is the ram caught in the thicket (Genesis 22). Jesus is the Passover Lamb — Paul says: *Christ, our Passover, was sacrificed for us* (1 Cor. 5:7). John 19 records that when Jesus was crucified, not one bone of His was broken — fulfilling the requirement for the Passover lamb. Isaiah 53:7: *He was led as a lamb to the slaughter... He was oppressed and afflicted, yet He opened not His mouth.*\n\n## The Scope: The Sin of the World\n\n'Behold the Lamb of God who takes away the sin of *the world*.' Not just the Jewish Messiah — the Messiah of the whole world. This is the great emphasis of John's Gospel: *God so loved the world... that the world through Him might be saved* (John 3:16-17).\n\nRevelation 5:9: He has redeemed *out of every tribe and tongue and people and nation.* Revelation 7:9: John saw *a great multitude, which no one could number, from all nations, tribes, peoples, and tongues* — standing before the Lamb.\n\nThere are no limitations to the power and reach of Jesus' atonement. And this means that racism is incompatible with the gospel. Heaven is for every color, every shape of eye, every texture of hair. If you think someone's appearance determines their worth, repent — because the Lamb died for people from every people group.\n\nThere are two ways the Lamb takes away the sin of the world. First, by *substitution* — dying in the place of His elect, bearing the judgment they deserve. Second, by *judgment* — at His return, when the Lamb comes back as the conquering warrior (Revelation 19) and casts into eternal punishment all who have not been covered by His blood. Either way, sin is removed from the new creation.\n\n## Application\n\n**First**, if you have never placed your faith in the Lamb of God, do it now. Come to Him. He will not turn away anyone who comes.\n\n**Second**, if you are in Christ, live in obedience — motivated by the precious blood of Christ (1 Peter 1:13-19). You have been purchased by the Lamb; live like it.\n\n**Third**, follow John's example. He couldn't contain himself when he saw Jesus. Point people to Christ with your life and your words: *Behold the Lamb.*\n\n**Fourth**, rest. All your sins have been paid for in full. Where you failed, Christ obeyed. The only words you will hear from your Savior as you enter eternity: *Well done, good and faithful servant* — not because of your performance, but because of His.", "soundcloud_url": "https://soundcloud.com/olympiabp/02-12-23-am-a-clear-testimony-john-1_29-34-pastor-tito-lyro"};
