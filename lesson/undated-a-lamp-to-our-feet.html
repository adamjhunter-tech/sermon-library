window.LESSON_DATA = {"id": "undated-a-lamp-to-our-feet", "title": "A Lamp to Our Feet", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["A Lamp to Our Feet - Psalm 119_105-112 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/a-lamp-to-our-feet-psalm-119105-112-pastor-tito-lyro", "tags": [{"tag": "Word of God", "source": "detected"}, {"tag": "providence", "source": "detected"}, {"tag": "Reformation", "source": "detected"}, {"tag": "obedience", "source": "detected"}, {"tag": "parenting", "source": "detected"}], "scripture_references": [{"reference": "Psalm 119:105-112", "type": "quoted", "source": "detected"}, {"reference": "Proverbs 6:20-24", "type": "quoted", "source": "detected"}, {"reference": "Proverbs 3:5-6", "type": "quoted", "source": "detected"}, {"reference": "Matthew 6:33-34", "type": "quoted", "source": "detected"}, {"reference": "John 8:12", "type": "referenced", "source": "detected"}, {"reference": "John 1:1-14", "type": "referenced", "source": "detected"}, {"reference": "1 Corinthians 2:13-16", "type": "referenced", "source": "detected"}, {"reference": "Jeremiah 23:29", "type": "referenced", "source": "detected"}, {"reference": "Psalm 16:11", "type": "quoted", "source": "detected"}, {"reference": "Philippians 4:8-9", "type": "referenced", "source": "detected"}], "outline": [{"title": "The Bible as Lamp and Light: Its Necessity", "subpoints": ["The Bible has been called many things: armory, laboratory, mine, guidebook — and here, a lamp and a light", "The Protestant Reformation recovered the Word as a lamp after the medieval church kept it hidden from the people", "Geneva's motto under Calvin: post tenebras lux — after darkness, light", "America is trending from light back to darkness; we need a modern Reformation and personal revival"], "scripture": ["Psalm 119:105-112", "Psalm 119:107"]}, {"title": "The Imagery: What a Lamp to the Feet Means", "subpoints": ["Ancient travelers carried a small clay oil lamp that illuminated only the ground immediately ahead, sometimes strapped to the ankle", "The Word does not give light for miles ahead but for the next step — God gives grace for the moment, not a script for years ahead", "Matthew 6:33-34 connects seeking the kingdom with trusting God for today rather than anxiously living tomorrow today", "This does not forbid planning but shapes it: all plans are held under 'Lord willing'"], "scripture": ["Psalm 119:105", "Matthew 6:33-34"]}, {"title": "Who Can Use This Lamp: The Role of Faith and the Spirit", "subpoints": ["The Bible only functions as a lamp and light for those who believe in Christ and have the Holy Spirit", "Jesus is the Light of the world (John 8:12) and the Word made flesh (John 1:14) — the light of Scripture shines through him", "1 Corinthians 2:13-16: the natural man does not receive the things of the Spirit of God; without the Spirit, Scripture is darkness", "Pastor Tito shares his testimony: he went from staunch evolutionist to seeing the truth of creation overnight through the Spirit's illumination"], "scripture": ["John 8:12", "John 1:1-14", "1 Corinthians 2:13-16"]}, {"title": "Parental Responsibility: Passing the Light to Children", "subpoints": ["Proverbs 6:20-24: the father gives the son the lamp of the Word; bind them on your heart, tie them around your neck", "The neck controls the head — the Word is to govern all thinking, speaking, seeing, and deciding", "Parents must ask: what matters more, Harvard or heaven? A fork or knowing Jesus Christ?", "Children in covenant families have a great privilege and responsibility — do not waste the lamp you have been given"], "scripture": ["Proverbs 6:20-24", "Proverbs 3:5-6"]}, {"title": "How the Word Guides: Practical Applications", "subpoints": ["Direct commands and prohibitions: the Ten Commandments, commands to repent, love spouse, train children — no prayer needed, just obedience", "Biblical principles drawn from systematic categories guide moral decisions on right vs. wrong, good vs. better", "The character of God (compassion, holiness, justice, mercy) shapes our decision-making through his communicable attributes", "Memorization is essential: the Psalmist hides the Word in his heart; Scripture must pop into our minds when moral decisions arise"], "scripture": ["Psalm 119:11", "Philippians 4:8-9"]}, {"title": "The Path of the Lamp is a Path of Joy", "subpoints": ["The Psalmist commits to performing God's statutes forever to the very end (v. 112)", "The path of obedience is not reluctant colonoscopy-style duty but the path of life and joy (Psalm 16:11)", "When obedience seems dark and gloomy, it is because we have grown in love with paths that lead to destruction", "God is good and does good — his Word guides us into righteousness where joy forevermore lives, because that is where Jesus lives"], "scripture": ["Psalm 119:112", "Psalm 16:11"]}], "summary": "Pastor Tito Lyro preaches from the Nun section of Psalm 119 (verses 105-112), exploring the great Reformation theme that the Word of God is a lamp to our feet and a light to our path. He opens with Thomas Guthrie's famous description of the Bible — armory, laboratory, mine, guidebook — before tracing how the Protestant Reformation recovered the Bible from the medieval church's suppression and shone it as a lamp on the path of millions. Geneva's motto under Calvin, 'post tenebras lux' (after darkness, light), captures the spirit of what Scripture does: it leads those who are walking in the dark.\n\nThe sermon's central image is the ancient traveler with a small clay oil lamp, illuminating only the ground immediately in front of him. Pastor Lyro draws from this the pastoral insight that God promises grace for the present moment, not a script for years ahead. Matthew 6:33-34 supports this: seek first the kingdom today, and do not borrow tomorrow's trouble. The Bible gives life-encompassing guidance through its principles while not mapping out specific decisions down the road. Anxiety tries to live tomorrow today; the lamp says, here is the next step.\n\nA crucial section addresses who can actually use this lamp: only those who believe in Christ and are illuminated by the Holy Spirit. The natural mind cannot receive the things of the Spirit (1 Corinthians 2). Pastor Lyro shares his own conversion — from staunch evolutionist to a man who could see nothing but God's truth in Scripture — as evidence that the Spirit's illumination, not new information, is what makes the Bible light. He then turns to Proverbs 6:20-24 to address parents directly: tying the Word around your neck means letting it govern your head. The question for every parent is not whether their child makes Harvard or learns table manners, but whether they know Jesus Christ.\n\nThe sermon closes with a practical taxonomy of how the Word guides: direct commands (no prayer needed — just obey), principles derived from Scripture, the character of God as a pattern for our own, and biblical examples God approves or disapproves. Memorization is essential. The Psalmist's commitment in verse 112 — to incline his heart to God's statutes forever to the very end — is offered as the model. And the path of obedience, Pastor Lyro insists, is not a gloomy duty but the path of joy forevermore, because that is where Jesus lives.", "transcript": "If you're able, you remain standing. And for the reading of God's Word, we're turning this morning to Psalm 119, verse 105, the Nun section of the Psalm. You can think of it, if you're going to, as at noon the sun is up in the sky and its light is everywhere. And that's how the passage starts. Psalm 119, verse 105, the Nun section.\n\n*Your Word is a lamp to my feet and a light to my path. I have sworn and confirmed that I will keep your righteous judgments. I am afflicted very much, revive me O Lord according to Your Word. Accept, I pray, the freewill offerings of my mouth O Lord, and teach me Your judgments. My life is continually in my hand, yet I do not forget Your law. The wicked have laid a snare for me, yet I have not strayed from Your precepts. Your testimonies I have taken as a heritage forever, for they are the rejoicing of my heart. I have inclined my heart to perform Your statutes forever, to the very end.*\n\nThis is the Word of our Lord. Let us pray together. Father, have we thank you for Your Word? We pray that Your Word would have its way with us today in the hands of Your Spirit as he works in us, for asking Jesus name. And we say Amen. Please be seated.\n\nThroughout the millennia, the Word of God has been called many things by friend and foe. Thomas Guthrie, who was a 19th century Scottish pastor and social worker — which often went together in the history of the world, to be a pastor and a social worker at the same time — said this concerning the Word of God. The Bible is an armory of heavenly weapons, a laboratory of infallible medicines, a mine of exhaustless wealth. It is a guidebook for every road, a chart for every sea, a medicine for every malady, and a balm for every wound. Rob us of our Bible and our sky has lost its sun. That is how he spoke of the Bible. And that is a hundred percent accurate in what he said.\n\nThe Bible refers to itself by various images. The book of James calls the Bible the mirror in which we can see ourselves. Ephesians 6 and Hebrews 4 say that the Bible is the sword of the Spirit. God himself says in Jeremiah 23:29, is not my word like a fire says the Lord and like a hammer that breaks the rock in pieces? Psalm 119 is already called the Bible a treasure and compared it to riches, to silver, to gold, and to honey. In addition to all that, today's text calls the Bible a lamp and a light.\n\nDuring the dark ages and during the medieval age, the church kept the light under a bushel — just a basket. The church kept the Bible under a basket away from the people, restricted to only the elite church leaders. Even they were very ignorant of what the Bible said. The Protestant Reformation of the 16th century recovered God's Word as a lamp and as a light that led many out of darkness and shone it as a light on the path of the feet of many others. The motto of the city of Geneva, while John Calvin was a pastor there, was post tenebras lux, which means in English, after darkness light. The spiritual darkness of the times was overcome by the lamp and light of God's Word.\n\nIf you go to Geneva, there is a wall there called the wall of the reformers and in it has several statues of Calvin and some of the larger ones and then some smaller ones, and all of them have their hands down on an open Bible, because they knew that was the Word of God. The reformers understood the truth of this first verse, verse 105, your word is a lamp to my feet and a light to my path.\n\nSadly, here in the United States, if things continue as they are, the motto of our country will prove to be after light darkness. Following the pattern of much of Western Europe, our country remains a religious country — perhaps the most religious country in the world, at least in Western civilization — but it is returning to the darkness after having so much light in the past. We can be thankful that God always has his elect from every nation and we can rejoice that in other places in the world the Spirit is working mightily. Reports come out of Asia, the reports coming out of Africa, the reports coming out of the Muslim world, the so-called 10-40 window of the global south — the Lord is working a great work there, and Christianity is moving south and moving east in the global scene.\n\nAnd we want to pray for a modern Reformation in our midst. We want to pray that the Lord would bring us truly back to the Word of God, including churches that have abandoned God's Word and their past heritage of Scripture sufficiency. The prayer of verse 107 must be our prayer: revive us, O Lord, according to Your Word. It has to be a prayer of all of us that the Lord revives us — revive us as individuals, revive us as a local church, revive us as a denomination, revive us as the Christian church as a whole so that we can know the Lord and be on fire for Him.\n\nSo let us affirm the Reformation doctrine of Scripture alone — that the Bible is sufficient for salvation and all of life and godliness. This is not something that the reformers made up. It is actually throughout the entire Bible, and specifically that is the theme of Psalm 119. Our text this morning teaches us that the Bible is the ultimate source of divine guidance. And that is what we are going to spend our time on this morning: the fact that the Bible is the ultimate source of divine guidance.\n\n## The Imagery of Lamp and Light\n\nSo being a lamp and light means that the Bible guides us. Look again with me at verse 105. Your word is a lamp to my feet and a light to my path. Our Lassus, which is a New Testament scholar who focused on studying backgrounds of the images in the Bible, he offers a good explanation for the imagery of this verse. He says that when an ancient traveler journeyed at night, he carried an oil lamp with him. As he walked along, he swung the light out back and forth in front of him so he could see the rocks and ruts directly ahead of him in the road and he could avoid them. Sometimes he actually strapped a small lamp on his ankle — that is the idea of a lamp to my feet. Not only carrying the light here, but also strapping a small lamp to his ankle. It illuminated the path before him one step at a time as he walked.\n\nThat is how God uses his Word to guide us. He does not promise a brilliant blaze of light to illuminate the road for miles ahead. He promises a lamp to our feet — light for the next step. And the Word of God is the guide to how we go about life and to life itself. This is not convenient guidance for one's career as if you get the Bible and shake it and find the answer. That is a superstitious way of thinking about guidance. But the Bible is truth for moral choices. It gives us the principles — every principle we need to make any moral choice in our lives.\n\nAnd the light of Scripture is needed to see the snares that the wicked lay in our path. Verse 110 — the Psalmist talks about the wicked having laid snares for him. Therefore he needs the light of the Word of God to be able to see those snares, those traps, those obstacles laid out before him.\n\nThe imagery of the Word of God being a light that guides those who belong to God by faith is not unique to Psalm 119. Solomon used that often in the book of Proverbs. Listen to Proverbs 6:20-24:\n\n*My son, keep your father's command and do not forsake the law of your mother. Bind them continually upon your heart, tie them around your neck. When you roam, they will lead you; when you sleep, they will keep you; and when you awake, they will speak with you. For the commandment is a lamp and the law a light; reproofs of instruction are the way of life, to keep you from the evil woman, from the flattering tongue of a seductress.*\n\nHere Solomon says that the Word of God is a light that guides us away from sexual immorality in verses 23 and 24. But notice that he also says in verse 23 through his hand that reproofs of instruction are the way of life — the Bible tells us everything that is the way of life. We go to it to figure out what is the way of life.\n\nChildren, can you look out for a second? Parents, make sure your kids are paying attention. You are in an awesome place. You are all in families who love the Lord, who are teaching you the Word of God. Don't waste that. Do what Solomon says: put them around your neck — not literally — but remember that the Word of God controls your thinking and what you do and what you say. Don't waste the fact that you have been put in this wonderful place. You know that you are in a church with all its problems — I am sure we can list 15,000 problems that our church has — but every Lord's Day, every Wednesday, you have this book opened up and explained to you. What a blessing. God is giving you his treasure for you to hold within you.\n\nAnd parents, notice Solomon's emphasis that the light of the Word, the lamp of the Word, is being given to his sons by him as a father, and he says don't waste what your mother and your father have given you. So parents, be faithful. It doesn't matter if you keep score at a ball game. It doesn't matter if your kid has good grades at school, if he does not know the Word of God and the God of the Word. Parents, what's important to you: that your kid goes to Harvard or that your kid goes to heaven? What matters to you: that your kid eats with a fork or that he knows Jesus Christ? And it might even sound funny to some of you, but this is life or death. Is the Word of God, the light, the lamp that you are using in your home to guide all of you to heaven?\n\nMom and dad, are you saying, son, daughter, mom and dad are going to heaven and you are coming with us? The Proverbs passage says, keep it close to your heart, make it yours. When it says to tie it on your heart, make the Word of God yours; have it control your thoughts, speech, and what you see and hear. Remember that when he says tie the Word of God around your neck, that is the kind of imagery of what controls your head. In general terms, your neck controls what is up here — controls where you look, controls what you say, controls what you hear, controls your brain. So let the Word of God be what controls all of that.\n\n## Three Thoughts on the Word as Light\n\nI want to bring out three thoughts about the Word of God being a light to those who follow God.\n\nOne: the imagery of a lamp to the feet and light to the path evokes the idea of walking in the dark night. Nobody needs a lamp and a light when walking in the day when the sun is out. But even with the brightest of moon on a clear night, you can see the contour of the elevation but you cannot see the details — the little rocks, the potholes — as you are walking. Even the most powerful flashlight or headlamp will provide guidance only for the path just ahead of us. Though the Bible provides life-encompassing direction in its principles, it will not give us direction for decisions we need to make years or even months or weeks down the road. God gives us grace for the moment.\n\nThe anxious person does not like hearing that, because the anxious person wants to figure out tomorrow today. The anxious person wants to have the script for life in front of him or her so that he or she can control the future and know everything about it. The Bible does not do that for us. The Bible gives us big pictures — Christ is coming back and we are going to be raised with him — but it does not tell us exactly how we are going to deal with the challenge that comes tomorrow. God gives us grace for the moment. We see this idea clearly in our Lord's words to his disciples in Matthew 6:33-34:\n\n*But seek first the kingdom of God and His righteousness, and all these things shall be added to you. Therefore do not worry about tomorrow, for tomorrow will worry about its own things. Sufficient for the day is its own trouble.*\n\nLife-encompassing guidance comes from the Bible: seek God and his righteousness instead of being anxious. This applies to every day from now till you die. And then do not try to live tomorrow today. This does not mean that we do not try to think through how decisions will affect our lives down the road. It does not mean that we do not make plans. It does mean that whatever we plan we say Lord willing, and we believe that it is the Lord who will dispose of our plans.\n\nTwo: the Word of God only functions as a lamp and light for those who believe in God through the Lord Jesus Christ and through the illumination of the Holy Spirit. If you do not believe in Jesus Christ, the Bible is a book of darkness for you. It does not shed any light in your life. Jesus clearly says that he is the light of the world in John 8:12, and the Word of God. In John 1:1-3 he is the Word and in verse 14 the Word became flesh and dwelt among us. The light of Christ shines through his Word. So if you do not believe in him for the salvation of your soul, all that you see is darkness.\n\nThe Holy Spirit enlightens our mind so that we can understand God's Word. If you do not believe in Jesus you do not have the Holy Spirit and the Bible is not a light to you. In 1 Corinthians 2:13-16, Paul says that the natural mind does not understand the things of God. Unless the Spirit is present, you are not going to understand the things of God.\n\nI remember I grew up with my dad as a neurosurgeon; science was always a big thing in our life. The scientific endeavor is very important. Academics was really the functional god of my parents. We went to the best schools and best university. That is how I ended up in the United States — part of their dedication for their kids was experiencing life in a foreign country. I came here by the Providence of God. I did not go to the school I was supposed to go to because of some problem with the visa and housing, and I ended up in Olympia, Washington, going to the community college. I promised it was a downgrade from the school I was supposed to go to. But the Lord used that. I contacted a person who was the uncle of the woman I was working for in Brazil in God's Providence. I called him up and said you can come and live with us. The only requirement is that you come to church on Sundays and participate in family devotions. Which I did. And the Lord used that to save me. I went from being a staunch evolutionist who thought that any idea of a creative God was foolishness to overnight not being able to see anything but the true version of the origin of the world in the Scriptures. It was not new information. It was not more research. It was simply the Spirit of God making the Bible a lamp and a light in my life.\n\nThirdly: because the Psalmist understands the importance of the Word of God as his guide, he commits himself to it. In verse 106 he says, I have sworn and confirmed that I will keep your righteous judgments. He commits himself, he sticks to the guidance of God's Word in the midst of afflictions — see verses 107, 109, 110. Why is that? Because he values the Word of God as an eternal heritage from the Lord. In verse 111 he says, your testimonies I have taken as a heritage forever for they are the rejoicing of my heart.\n\nSome people say that doctrine does not really matter. Some people say it is your love for God and others and that somehow that is divided from doctrine. The doctrine divides but love unites — if that is what you think, I want you to repent right now. Because you are getting your theology from Woodstock, not from the Bible. You will not see the Bible and receive the Bible as the Psalmist received it if you do not hold on to true doctrine. You will not receive the Bible as the Psalmist received it if you do not see it as the inspired, inerrant, free of mistakes, sufficient Word of God — and that is doctrine. Doctrine pushes love and love pushes doctrine in this cycle that always goes together.\n\n## How the Word Guides Us in Practice\n\nSo how does the Word of God guide us? How does this work in practice? In order for the Word of God to be light for us subjectively, we need to know it. Our personal Bible needs to get bigger — and I do not mean that you are supposed to be adding pages to the Bible you carry. What I mean is that we need to add more of the Bible to our thinking, the one that we carry with us all the time. And that cannot be done apart from studying the Bible.\n\nWhen the Apostle Paul wanted to convey to the Ephesian church what was among the greatest blessings that Christ has done for them, in Ephesians 4 he says the ascended Christ gave to his church as a gift — what? Teachers. We need to put ourselves in a place where when we are faced with a moral decision, Bible passages start popping up into our heads.\n\nThe Bible guides us through direct commands and prohibitions. The Ten Commandments — not ten suggestions, not ten principles, ten dos and don'ts. Their ramifications spread throughout all of Deuteronomy and the larger catechism. So we see that in the Ten Commandments. The Bible commands everyone everywhere to repent. You do not have to pray about whether you should repent before God — you just do it because God clearly commands you in Acts 17. The Bible clearly commands you to love your wife. The Bible clearly commands you to love your husband. The Bible clearly commands you to train your children in righteousness. The Bible clearly commands you to honor your parents. The Bible clearly commands you to abstain from sexual immorality. These are things we just do — no prayer required.\n\nBut the Bible also guides us in principles drawn from it. What the Bible teaches overall, in systematic categories, helps us make decisions. The Bible guides us through the character of God — those attributes he shares with us, the communicable attributes: compassion, holiness, justice, mercy, love, kindness, forgiveness, hatred for evil. These guide our decision-making. The Bible guides us by the examples that God approves or disapproves. And another way that the Word of God becomes light to the believer is when we memorize it. In verse 9 the Psalmist says, how can a young man cleanse his way? By taking heed according to Your word. And in verse 11, Your word I have hidden in my heart that I might not sin against You.\n\nIn counseling, almost every week there is a memory assignment. Counseling is not much more than helping you practice the things that are in the Bible. And if you do not know it, you cannot really practice.\n\n## Conclusion\n\nThe conclusion of the matter is that the Psalmist is committed to obeying what he sees and learns in the Word all the days of his life. In verse 112, I have inclined my heart to perform His statutes forever, to the very end. This is really how the Word of God works as a light. It shows us the path to the Lord, which is always a path of obedience. Remember that God is good and He does good. So the path of obedience is the good path.\n\nThis is not Puddleglum-sort of obedience that commits to doing it because it is good for us just like a colonoscopy a couple times a year is good for us. The path of obedience onto which the Bible guides us as a lamp and a light is also the path of joy. Psalm 16:11 — you will show me the path of life. In Your presence is fullness of joy. At Your right hand are pleasures forevermore.\n\nWhen the path of obedience seems dark and gloomy to us, when you hear someone like this — there they go again telling me I cannot do the things I wanted to do — when that is the case, it is because we are so in love with particular sins in our lives that our eyes have become darkened. We have grown in love with the path that leads to destruction instead of the path of life. God is good and He does good. His Word guides us into righteousness where joy forevermore lives because that is where Jesus lives. May His Word be the light and the lamp to our path. May we see the Lord Jesus as we follow Him through all the days of our lives, all the way to the end.\n\nLet us pray together. Father, thank you for Your Word. Thank you that it is a lamp to our feet and a light to our path. Help us to live according to that. Give us great faith to love Your Word. Help us to say with the soul and with us, oh how I love Your Word, how I love Your law. It is my meditation all the days of my life. Enlighten us to see You, for asking Jesus name, Amen."};
