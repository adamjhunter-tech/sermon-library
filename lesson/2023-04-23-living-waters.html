thern kingdom, removed some people, and replaced them with foreigners — creating ethnic and religious mixing (Samaritan Pentateuch, temple on Mount Gerizim)", "In the 2nd century BC the Jews destroyed the Samaritan temple; in the 1st century it was common belief that Samaritans were perpetually unclean — contact with one made a Jew unclean", "The woman is surprised Jesus speaks to her; he asks to share her vessel — something no self-respecting Jewish man would do; but Jesus rejected additions to the Word of God and refused to keep rules God never gave", "Two lessons: (1) No place for racism in the Christian faith — Jesus saw a woman who needed the gospel, not her ethnicity; (2) The church must always be reforming, examining itself in light of Scripture, not adding extra-biblical requirements"], "scripture": ["John 4:5-12"]}, {"title": "2. Who Is This Woman? (vv.6-18)", "subpoints": ["Social outcast: came alone to the well at noon (the hottest part of the day), when women normally came in groups for safety — she was avoiding or had been shunned by the other women", "Five husbands: Jesus implies (through a true-to-fact conditional) that her marital history involved sin, not just misfortune; likely why she was ostracized", "She thought Jesus needed her (she had the bucket and rope; Jesus had nothing); lesson: Jesus does not need us — 'I will build my church'; God's grace is that he uses us, not that he requires us", "Jesus presented the same gospel to Nicodemus (leading teacher of Israel) and to this social outcast equally — the gospel is for all, educated and uneducated, respected and despised"], "scripture": ["John 4:6-18", "John 3"]}, {"title": "3. Living Water: God Himself (vv.10-15)", "subpoints": ["The woman misunderstands and thinks Jesus is offering literal fresh water so she will never have to return to the well; Jesus means something far greater", "Living water = the Holy Spirit = God himself (John 7:37-39: 'rivers of living water... this he spoke concerning the Spirit'); Isaiah 44; Jeremiah 2:13: God is the fountain of living waters", "God is both the giver AND the gift: verse 10, 'the gift of God' and 'who it is who says to you' — what Jesus offers is himself; God gives himself; this is a free gift (the Greek word is the root of 'Theodore')", "Jeremiah 2:13: God's people have 'forsaken me the fountain of living waters and hewn themselves cisterns — broken cisterns that can hold no water' — stagnant water in broken cisterns vs. the living water of God himself"], "scripture": ["John 4:10-15", "John 7:37-39", "Isaiah 44", "Jeremiah 2:13"]}, {"title": "4. Application: Broken Cisterns We Build (addressed to the church)", "subpoints": ["Revelation 3:20 — addressed to the church, not unbelievers: 'I stand at the door and knock' — are we living the Christian life while keeping Jesus outside?", "Broken cisterns: bitterness (you are killing yourself, not the other person); self-pity and victim mentality instead of gratitude for forgiven sins; pornography/sexual immorality; alcohol/substances; entertainment and leisure as the source of joy; relationships as ultimate fulfillment", "The woman — not yet fully understanding — says 'Sir, give me this water that I may not thirst nor come here to draw' (v.15); she is beginning to see that Jesus offers what she cannot get anywhere else", "To believers: drink deeply of him; you will not be disappointed; you will never need to drink from any other spiritual source"], "scripture": ["Revelation 3:20", "Jeremiah 2:13"]}], "summary": "A sermon on John 4:1-26, the woman at Jacob's well. Jesus chose the Samaritan route deliberately — not merely because it was geographically convenient, but out of missional purpose; the result was the first great Gentile revival (3,000 Samaritans believed before Pentecost). The background: centuries of Jewish-Samaritan animosity rooted in the 722 BC Assyrian exile, ethnic mixing, the Samaritan Pentateuch, the rival temple on Gerizim (destroyed by the Jews in the 2nd century BC), and first-century purity beliefs. The woman was a social outcast who came alone at noon. Jesus's interaction yields two structural lessons: no racism in the faith; the church must always reform against extra-biblical additions. The central question is what 'living water' means: John 7:37-39 makes it explicit — living water is the Holy Spirit, God himself. God is both giver and gift. Jeremiah 2:13 supplies the negative contrast: God's people have forsaken the fountain of living waters and built themselves broken cisterns. The sermon closes by naming the broken cisterns Christians build — bitterness, self-pity, pornography, substances, entertainment, relationship-idolatry — and calling the church (Revelation 3:20 is addressed to the church) to open the door to the one who is knocking.", "transcript": "## Introduction\n\nLong journeys in the ancient world had to be planned around the springs and wells along the way. You traced your route so that you would hit water sources when you needed them. To be aware of this reality is important for understanding the interaction between Jesus and this woman at the well — all this talk about water, about coming to draw water, about having to come again and again, and what a burden that was.\n\n## Why Is Jesus Here? (vv.1-4)\n\nThe first question this text answers is: why is Jesus here, at this well, at this time?\n\nThe Pharisees had already tried to insert a wedge between Jesus and John the Baptist. Back in John 3:25, they came with an innocent-sounding question about purification — which was really their way of saying to John: the man you are hanging out with at the Jordan is baptizing more people than you. The intention was to drive John and Jesus apart. The enemies of what they were doing understood that their ministries were complementary, not competitive — and that to stop one they had to turn one against the other.\n\nNow at the beginning of chapter 4 we learn that Jesus's disciples are baptizing more people than John's disciples, giving the Pharisees even more ammunition. So Jesus leaves Judea and heads to Galilee. This is the transition from the first year of his public ministry (spent mostly around Jerusalem) to his second year (centered in Galilee).\n\nHe chose the route through Samaria. Verse 4: *But he needed to go through Samaria.* The need here is not geographic. He could have gone around Samaria by crossing the Jordan into Gentile territory — which is what most self-respecting Jews would do. They would rather face the possibility of touching a Gentile than have to talk to a Samaritan. But the shortest route was through Samaria, and Jesus chose it — both to get to Galilee quickly and to minister. The result: three thousand Samaritans believed here in John 4 through the witness of this woman, before Pentecost brought three thousand Jews to faith.\n\n## Jewish-Samaritan Animosity (vv.5-12)\n\nThe woman's surprise and the tension in this conversation are rooted in centuries of history. The animosity between Jews and Samaritans goes back at least ten centuries — to the division of the kingdom under Rehoboam and Jeroboam. But it intensified dramatically in 722 BC when the Assyrians conquered the northern kingdom. Their strategy was to remove part of the population and replace them with foreigners — mix the peoples so they retain no national identity and are less likely to revolt. Those foreigners married the remaining Israelites, producing a mixed people — ethnically and religiously mixed, blending the religion of the Bible with the false gods of the newcomers.\n\nIf that was not enough, in 400 BC the Samaritans rewrote the Torah to make themselves, not the Jews, the heirs of Abraham, and built a temple on Mount Gerizim. Then in the late second century BC the Jews came and destroyed that temple. So there is a very long list of reasons for the animosity.\n\nIn the first century it was commonly believed that Samaritans were perpetually unclean. Any contact with one made a Jew unclean. This became Jewish law by the second century. So you can see why the woman was surprised when Jesus spoke to her. She knew right away that he was a Jew. He asked to share her vessel to drink — something no self-respecting Jewish man would do.\n\nBut Jesus was not much interested in the extra requirements religious leaders added to God's Word. He was downright opposed to extra-biblical additions. And his conduct here teaches us two things.\n\n**First:** there is no place in the Christian faith for racial discrimination. What Jesus saw at this well was a woman who needed the gospel — not where she was born, not her ethnicity. If you have racist thoughts in your heart, repent from that. It is a serious sin that disgraces our Savior.\n\n**Second:** the church must always be reforming — always examining what we believe and do in light of God's Word so we stay faithful to it rather than adding extra-biblical beliefs and practices. The church of Jesus's day thought they needed extra laws to complement the Bible. We have a tendency to do the same — to add things as if we could come up with a better idea than the Holy Spirit had in the Scriptures.\n\n## Who Is This Woman?\n\nWe can infer that she was a social outcast among her own people. She came to the well at the sixth hour — noon, the hottest time of the day — alone, when women normally came in groups for safety. She was avoiding the other women, or had been shunned by them.\n\nThe reason was probably her marital history. In verses 16-18, Jesus tells her: *You have had five husbands, and the one you now have is not your husband.* The way Jesus says this implies that whatever the reasons for five husbands, they were not good reasons. This is likely why she had been ostracized.\n\nShe was also the kind of person who thought Jesus needed her. When he offered living water, she gestured at her bucket and rope: *You have nothing to draw with and the well is deep — are you greater than our father Jacob who gave us this well?* You need my bucket and my rope. You need me.\n\nBut brothers and sisters: Jesus does not need you. He does not need me. *I will build my church* — not somebody else. It is God's grace and mercy that he uses us, because he does not need any of us. There is no moment when we do not need him. It is in him that we live and move and have our being.\n\n## Living Water: God Himself (vv.10-15)\n\nJesus says in verse 10: *If you knew the gift of God, and who it is who says to you, 'Give me a drink,' you would have asked him, and he would have given you living water.*\n\nLiving water — water that gives life; moving water like a spring or a river, not stagnant water. The woman misunderstands and thinks of literal water: a fountain so she will never have to come to this well again.\n\nBut what is the water Jesus is offering? He tells us in verses 13-14: *Whoever drinks of this water will thirst again, but whoever drinks of the water that I shall give him will never thirst; the water I give him will become in him a fountain of water springing up into everlasting life.*\n\nJohn 7:37-39 makes it explicit. On the last day of the feast, Jesus stood and cried: *If anyone thirsts, let him come to me and drink. He who believes in me, as the Scripture has said, out of his heart will flow rivers of living water. But this he spoke concerning the Spirit.*\n\nThe living water is the Holy Spirit. God himself. FF Bruce: *The soul's deepest thirst is for God himself, who made us so that we can never be satisfied without him.*\n\nIsaiah 44, Jeremiah 2:13, Zechariah, Ezekiel — the Lord consistently speaks of himself as the one who gives water in the wilderness, who pours out his Spirit on his people. Jesus says of himself in Revelation 21: *I will give of the fountain of the water of life freely to him who thirsts.* God is both the giver and the gift.\n\nThe word *gift* in verse 10 is the root of the name Theodore — freely given, nothing in exchange. What Jesus offers is himself. He gives himself.\n\nJeremiah 2:13: *For my people have committed two evils: they have forsaken me, the fountain of living waters, and hewn themselves cisterns — broken cisterns that can hold no water.*\n\nA cistern is a container for collected water. If it is cracked, the water leaks out. And here God's people are choosing cracked cisterns over the fountain of living water.\n\n## Application: Broken Cisterns\n\nBrothers and sisters, aren't we often satisfied with far less than what Jesus offers?\n\nRevelation 3:20 — addressed to the church, not to unbelievers: *Behold, I stand at the door and knock. If anyone hears my voice and opens the door, I will come in to him and dine with him, and he with me.* Are we living the Christian life while keeping Jesus, the living water, outside the door?\n\nThe broken cisterns we build: bitterness — you are not hurting the other person; you are killing yourself spiritually, and you will end up in a pit of destruction; take the water Jesus offers instead. Self-pity, victim mentality, refusing to be thankful for forgiven sins — instead of living by faith in the Son of God. Pornography and sexual immorality instead of God's will for our sanctification. Substances — alcohol, drugs — instead of the joy of God's presence. Entertainment and leisure as the source of joy. Relationships as the ultimate source of fulfillment — instead of the fullness of joy in the presence of God.\n\nThe woman was beginning to understand. *Sir, give me this water, that I may not thirst, nor come here to draw* (v.15). She saw that Jesus had something to offer her that she could not get anywhere else.\n\nTo those who know Christ: drink deeply of him. I guarantee you will not be disappointed. You will never need to drink from any other spiritual source except the Lord Jesus."};
