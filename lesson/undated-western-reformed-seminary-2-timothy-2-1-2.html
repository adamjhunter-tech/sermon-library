<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-western-reformed-seminary-2-timothy-2-1-2", "title": "Western Reformed Seminary", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["Western Reformed Seminary (Pastor Tito Lyro).txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/western-reformed-seminary-pastor-tito-lyro", "tags": [{"tag": "Western Reformed Seminary", "source": "detected"}, {"tag": "theological education", "source": "detected"}, {"tag": "ministry", "source": "detected"}], "scripture_references": [{"reference": "2 Timothy 2:1-2", "type": "quoted", "source": "detected"}], "outline": ["Introduction: 2 Timothy 2:1-2 — committing to faithful men", "The call to be strong in grace in Christ Jesus", "Things heard from Paul: commit to faithful men who are able to teach others", "The purpose and vision of Western Reformed Seminary", "Training faithful ministers for the church", "The chain of faithful transmission of the gospel", "Conclusion: The church's investment in ministerial education"], "summary": "Pastor Tito Lyro preaches from 2 Timothy 2:1-2 in connection with Western Reformed Seminary, presenting Paul's charge to Timothy to commit what he has received to faithful men who can teach others. He connects the biblical vision of ministerial training to the work of preparing faithful preachers through seminary education.", "transcript": "## Introduction: 2 Timothy 2:1-2 — Paul's Last Words\n\nWould you turn to 2 Timothy chapter 2, verses 1 and 2. The Apostle Paul, writing to Timothy his son in the faith, says:\n\n> *\"You therefore, my son, be strong in the grace that is in Christ Jesus. And the things that you have heard from me among many witnesses, commit these to faithful men who will be able to teach others also.\"* (2 Timothy 2:1-2)\n\nA couple of times a year I am away from here visiting churches to promote the work of the seminary. I don't do that very often because of the obligations I have here and all the other responsibilities I have with the denomination. But I realized that I have never actually talked to you about the seminary in the same way that I talk about it to other churches. You are all very involved and you know something about the seminary — but today I wanted to use the Sunday School time to think theologically about the need for a seminary, and about the need for you to go to seminary — you men who have a calling to be pastors and ministers in the Church of the Lord Jesus Christ. So that is what we are doing today.\n\nIt used to be that great value was placed on the words of a dying person. Often someone would stay by their bedside around the clock, from the moment it became clear the person was dying until they died, in order to record their last words. The reason was that facing death brings a sobriety and a focus on what is really important. People are not going to be making jokes as they are dying. They are not going to be talking about trivialities. They are going to talk about what matters. There was no more time for pretense or pomp — just who the person was and what he thought was important.\n\n2 Timothy is that. 2 Timothy is Paul's last words. By the time he writes this letter, he has already appeared before Caesar for the last time to be tried. It is possible that he was beheaded just a few weeks after he wrote these words. So what we have here are the words of a dying man to his beloved son in the gospel — the last opportunity Paul has to convey what was most important to Timothy.\n\n## Paul in Prison: The Weight of the Occasion\n\nThere is added weight from the circumstances that led to the writing of this letter. Paul is in a dungeon. This is his second Roman imprisonment. In the first, he had some freedom — it was akin to house arrest. People could come and visit him. He was in a house that someone rented for him. That is not the case now. He is in a Roman dungeon. He does not even have a coat. Winter is coming, and he says to Timothy, \"Could you bring me my coat, because no one is going to provide one for me here.\"\n\nAnd in that dungeon, with the last bit of time and resources he has, Paul asks himself: What are the most important last instructions I can give to Timothy? The answer is this: *Take what you received from me and the presbytery and pass it on to the next generation.* That is exactly what he says here in 2 Timothy 2. And this is a central element of the Great Commission — to instruct those who believe in the Lord Jesus Christ. This is what Western Reformed Seminary is all about.\n\n## The Whole Counsel of God\n\nThe things Timothy heard from Paul are the whole counsel of God. Remember where Timothy is pastoring: the church in Ephesus, a church that Paul founded. And it was to the elders of the Ephesian church that Paul declared his standard practice of proclaiming the whole counsel of God. Remember when Paul met with the Ephesian elders on the shores of Miletus in Acts 20. Paul says:\n\n> *\"You know, from the first day that I came to Asia, in what manner I always lived among you, serving the Lord with all humility, with many tears and trials which happened to me by the plotting of the Jews — how I kept back nothing that was helpful, but proclaimed it to you and taught you publicly and from house to house... testifying to Jews, and also to Greeks, repentance toward God and faith toward our Lord Jesus Christ. Therefore I testify to you this day that I am innocent of the blood of all men. For I have not shunned to declare to you the whole counsel of God.\"* (Acts 20:18-20, 21, 26-27)\n\nSo what is it that Timothy received from Paul that he was supposed to pass on to the next generation? The whole counsel of God. If you look through the two epistles to Timothy, you will see that Paul covers virtually all areas of theology. Theologians use the term *locus* (plural: *loci*) for each distinct area of theological study. Paul covers all those loci in 1 and 2 Timothy — from soteriology to theology proper, to eschatology, to ethics, to sanctification.\n\nIn these verses in 2 Timothy 2, Paul is reminding Timothy that his job — and the job of the church — is to make disciples by teaching them to observe all that Christ has commanded. That is the job of the church. And this is how God passes truth on: one generation handing what is true to the next.\n\n## Generational Transmission: Psalm 78\n\nThis pattern is clearly displayed in Psalm 78. Verses 5 through 7 read:\n\n> *\"For He established a testimony in Jacob, and appointed a law in Israel, which He commanded our fathers, that they should make them known to their children; that the generation to come might know them, the children who would be born, that they may arise and declare them to their children, that they might set their hope in God, and not forget the works of God, but keep His commandments.\"* (Psalm 78:5-7)\n\nNotice how many generations are listed: fathers to children, and those children who are born, and then they declare it to their children. God appointed the transmission of his truth through one generation faithfully teaching the next — and it only takes one generation for the chain to be broken.\n\nWe see that tragedy in Judges chapter 2, verse 10 — one of the saddest verses in the Bible: \"And also that generation were gathered to their fathers. And there arose another generation after them who did not know the Lord, nor the works which He had done for Israel.\" The generation that brought Israel into the Promised Land, having witnessed all the great works of God in the wilderness, failed to pass that on. And sadly, the next generation did not know the Lord.\n\n## What \"Commit\" Means\n\nNotice that Paul in 2 Timothy 2:2 does not just tell Timothy to *expose* people to God's Word. He says to *commit* it to them. The word carries the idea of making something stand firm — like staking a tent peg into the ground. Timothy is to stake the Word of God into people so that they carry it with them, so that it becomes second nature to them. That implies rigorous training.\n\nBut notice also that this is not about everybody in the church indiscriminately. Paul says to commit it to *faithful men who will be able to teach others also*. Timothy is to pastor the whole congregation — but he is also to identify and rigorously train future pastors. The pastor will be the primary teacher of God's Word to God's flock. There are people today who think that AI can substitute for the pastor. The Bible says no. You need a man who will shepherd you — a man who is thoroughly grounded and trained in the Scriptures. A machine cannot do that for you.\n\nAnd so this man must be well trained in the Word of God and willing to be trained in all areas of theological study. Notice that all of this is done in the context of the church. The local church should be making sure that those who may be called to the pastorate in the future receive the most thorough training possible.\n\nThe desire should not be for speed; it should be for thoroughness. It seems like everyone has a need for speed — they don't want to spend time actually studying, they don't want to go through a thorough curriculum. They just want to get done. Yet Jesus himself, the ultimate teacher, chose to take three years to train people who were already well grounded in the Old Testament Scriptures. Let us get rid of the idea that expediency, speed, and convenience should mark theological training. The mark should be thoroughness.\n\nThe local church works with the presbytery to make sure that men who are considering the ministry are fully equipped. That is where Western Reformed Seminary comes in.\n\n## WRS: Mission and Purpose\n\nWe do not see the seminary as an entity existing for its own ends. We exist to serve the church and to come alongside the local church and the presbytery in training future pastors. That is why we work closely with the Great Western Presbytery, so that our students can be trained by our professors but also by men who are currently serving in local churches.\n\nI have an agenda in talking to you, and it is fair for me to disclose it. First: How can Western Reformed Seminary better serve the Bible Presbyterian Church of Olympia and its training ministry? That is why we exist — to serve you. The seminary exists to serve the local church. Our mission is to train future pastors, and particularly future Bible Presbyterian pastors. We accept students from any Protestant tradition, as long as they have the endorsement of their local church. But our goal is to train the kind of men who can serve as pastors in the Bible Presbyterian Church.\n\nMy second agenda item is to ask you for three things.\n\n### 1. Your Prayers\n\nI want your prayers for the seminary, and more broadly for the Church of the Lord Jesus Christ. Pray that the Lord of the harvest would send workers into the harvest. In Matthew 9, Jesus says the fields are white and ready for harvest — there are all kinds of people to be brought into the kingdom of God, but not very many people are willing to go and do that work. Jesus says: *pray* that the Lord would send them.\n\nIt is interesting that in the New Testament there are two things that only come out by prayer, and the same word is used both times: demons and pastors. Pastors and demons are the only things that come out by prayer — and it is much better to pray for the second than the first. Pray that the Lord of the harvest would send workers. Pray that the seminary would be able to train pastors who will plant churches all over this country. Can you imagine if we had five new planted churches in the next five years — from scratch, where people are coming to know the Lord Jesus Christ, being converted by the power of the gospel and built up in a local church? That does not happen unless men are trained to do it.\n\n### 2. Your Men\n\nI want your men. I want your sons, your fathers, your brothers, your grandfathers. There is no age limit. Western Reformed Seminary wants to help you train your next pastor, your next church planter, your next missionary.\n\nWe have an aging pastorate in the Bible Presbyterian Church. I am one of the younger men in our denomination. I am 52 and still among the younger pastors. A Reformed association of 14 different denominational bodies has over 200 pulpits — and they cannot find trained and qualified men to fill those positions. We need younger men who are serious about the gospel to hear God's calling and go into the ministry.\n\nWe need men who are willing to go through rigorous training and equip themselves for pastoral ministry. A lot of people do not want to do hard things. Seminary is hard — you have to learn things. But the hardness of seminary is nothing compared to the hardness of ministry itself. If you cannot endure and sacrifice that much, then do not come to seminary, because you are not fit for the ministry. Seminary trains you for that hardness.\n\n### 3. Your Money\n\nThings are expensive. Training people is expensive. Our professors like eating — we have to pay them so that they can have a place to live and some food to eat. We keep our budget lean, but we need to expand it. Investing in Western Reformed Seminary brings great spiritual return, because we are training men who will shepherd the Church of Christ. Every dollar you invest has multiplied effects on the Church of the Lord Jesus Christ.\n\nAnd this may sound morbid, but it is not — it is planning: think about putting Western Reformed Seminary in your will. When you die and go to be with the Lord, you cannot take your estate with you. Some of your estate could be distributed to agencies that continue to proclaim the gospel. Western Reformed Seminary is one of them.\n\n## Why Western Reformed Seminary?\n\nSo let me tell you a little about the seminary itself.\n\nOne of the main reasons to choose WRS is our Bible Presbyterian heritage and ethos. We have spent a great deal in recent years on external auditing — both through accreditation and consulting — to help us understand ourselves better and present ourselves more clearly. Three things came back to us resoundingly from outside observers:\n\nFirst, **we are a Bible-saturated school**. Other seminaries teach classes in the book of Romans, but they tend not to actually read and work through Romans — they work through what Hodge says about Romans, or what Calvin says about Romans. Our classes are Bible-saturated because we want to produce men of the Bible — not Calvin followers, not Hodge followers, not any particular theologian's followers, but men of the Book.\n\nSecond, **we have a culture of hands-on pastoral care**. We are known for shepherding people rather than immediately moving to church discipline. That is foundational to our whole seminary culture.\n\nThird, **we are a confessional school**, faithful to the Westminster Standards as adopted by our denomination. That is a compelling reason to come to Western Reformed Seminary. Whether you are Bible Presbyterian or not, the best way we can bless the church at large is by leaning into what we are. Even if you do not end up serving in the Bible Presbyterian Church, you will be blessed by being trained in this confessional context.\n\n## WRS Mission Statement\n\nAnother reason to support and come to WRS flows from our mission statement:\n\n> *WRS exists to produce spiritually grounded, knowledgeable, capable servants to shepherd and counsel the flock of Christ.*\n\nThat is what we do in our classrooms, in our hallways, around the ping pong table, in the lunch room — whatever we are doing. We uniquely equip pastors for the stormy seas of modern ministry. We train them to be anchored in the unchangeable truth of the Word of God. The only way to be truly relevant today is to be anchored on the unchangeable truth of the Word of God — not a lavalier microphone, not a trendier approach, but the Word of God.\n\nWe also train our students to be a source of hope and guidance for people navigating the cultural fog they find themselves in. We see ourselves as a beacon of light in the Pacific Northwest and the world, training leaders who are as resilient as the lighthouse that guards the coast. The waves break against it and it stands. Our graduates are those kinds of lighthouses around the world.\n\nWe require every student to take five preaching classes, because we believe in the supremacy of the Word of God in the church. And every student who graduates in the pastoral track must take four counseling classes, because the pastor must not only preach the Word of God publicly from the pulpit on the Lord's Day — though everything flows from that — he must also shepherd people privately through one-on-one pastoral ministry. We are the only Presbyterian and Reformed seminary that requires that level of counseling training from every pastoral student. We do that because we believe a true church proclaims God's Word both publicly and privately.\n\n## Location: The Pacific Northwest\n\nA third reason to support and attend WRS is that in God's good providence he placed us in the Pacific Northwest. Some people ask whether it would be better to be on the East Coast, where there is a larger population concentration, or perhaps in the Chicago area. But consider: the Pacific Northwest is one of the darkest — if not the darkest — regions spiritually in the entire country. That is a great place to be trained. It does not get any harder. Think of it as special forces training: the most intensive preparation, under supervision, in the most difficult environment — so that after training you can operate anywhere in the country. That is the benefit of our location.\n\nWe have four Bible Presbyterian churches near the seminary: our own congregation here in Olympia, Tacoma, St. Helens, and Bonner's Ferry. Students can be involved with local churches as part of their training.\n\n## Where We Are Today\n\nCurrently, we have 27 students for this school year, including our biblical counseling fundamentals students. We are accredited by ARTS — the Association of Reformed Theological Seminaries — which is itself recognized by CHEA, the Council for Higher Education Accreditation, the largest accrediting body in the world.\n\nOur faculty currently consists of seven instructors. Most of our courses are taught by John Battle and Pastor Chris Lensch, though we are transitioning — Chris is focusing increasingly on Hebrew, and other courses are being distributed among additional professors. Our board is made of ten men, all officers in the Bible Presbyterian Church. Elder Andrew Hoy of our own congregation is also a member of our board.\n\nOur pastoral training program — the Master of Divinity — can be completed in six full-time semesters and requires both Hebrew and Greek. So it can be done in three years. Some have chosen to take it more slowly, one class per semester, over a longer period.\n\nThere are two ways to take classes. The first is the **residential program** — and this is by far the best way. Nothing substitutes for being present in the school. We are in beautiful Puyallup in a very nice facility. The Lord provided this building to us out of his abundant grace. We used to rent from the Tacoma church — we had a nice facility in their upstairs. Then there was a small fire in the building, and the structure was condemned. The building was sold and the church bought their own place. We suddenly had no place to go. But God's providence made it the best thing that happened to us. We had been trying to raise money for our own building, but had only a small facility in Lakewood with no room for a library. Then we were notified that we had been named in a will. We were left close to a million dollars, and we were able to acquire our current building — free and clear. We moved into an 8,000 square foot facility with a library and classroom space. We now have one of the largest physical academic libraries in ARTS. There is no other seminary with a more well-stocked library for research.\n\nThe second option is **live-streaming**: you can join semester-long residential classes synchronously from anywhere. We have students joining from Kenya, Florida, Idaho, Texas, New Jersey, Pennsylvania, Colorado, and other states. We have invested heavily in making the digital classroom experience excellent. The limitation is that you miss the hallway conversations, the dinners with professors, the informal mentorship. That learning matters. But live-streaming is also a fully accredited program.\n\n## Degree Programs\n\nWe have two degree programs. We used to have twelve — we decided to focus on what we do best.\n\nThe first is the **Master of Divinity** — a three-year, 166-credit program. It can also be completed as a Bachelor of Divinity if you come to us with a two-year associate degree or equivalent, or as a certificate. We do not admit women to the MDiv, because the program is designed to train pastors, and the Bible teaches that women are not to be pastors.\n\nThe second is the **Master of Christian Ministry** — the state of Washington restricts certain academic title language for seminaries, so we cannot call it a Master of Arts, but it is the equivalent. It is a two-year program with a capstone project, available in biblical counseling or church ministry. The MCM is open to anyone with a recommendation from their church.\n\n## Current Courses and Upcoming Events\n\nThis semester Elder Scott Hollander is teaching Old Testament Historical Narratives — from Joshua through Esther. We are also offering Hebrew and advanced studies in the writings of John, among other courses.\n\nOur annual lecture series is coming up. This year's speaker is Jonathan Leeman — you may have read his book *Church Membership*, among others. He is an excellent speaker and will be with us April 17 and 18.\n\nWe are also going through a rebranding process — working with outside help to express who we are more clearly through a new logo, website, colors, and messaging. We hope to launch that next month. The goal is that people would say, \"I knew you were there, and that is why I came\" — rather than being surprised to learn we exist.\n\nWe want to grow to a point where we can hire a full-time president. We currently have a part-time president. We need to grow to reach that capacity, and we need to reach that capacity to continue growing. Pray for us in that.\n\n## WRS Impact\n\nWestern Reformed Seminary has an impact well beyond our size. Fourteen men serving in Bible Presbyterian pulpits today are graduates of our seminary. Several new elders are also graduates. Thirty to thirty-five others are currently serving in pastoral and ministry roles throughout the world. We have graduates serving as pastors in Canada, Brazil, England, Kenya, Singapore, Malaysia, Indonesia, the Czech Republic, and South Korea — all from our little school in the corner of the country. They are able to do that because we are anchored in the Word of God as expressed in our confessional standards, and because we train men to be beacons of light in dark places.\n\nThat is Western Reformed Seminary."};
