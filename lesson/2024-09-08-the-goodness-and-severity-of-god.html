: ["Psalm 145:9: the Lord is good to all, his tender mercies are over all his works", "Matthew 5:45: he makes the sun rise on evil and good, and sends rain on just and unjust", "The very breath you breathe is evidence of God's goodness to his creatures", "God's goodness extends especially to his people: in Nahum's context, the defeat of Israel's enemy", "Our greatest enemy is ourselves — our own sinful nature (Romans 7); the Lord saves us from ourselves", "If you're unsaved, your greatest enemy is God; repentance makes God your best friend"], "scripture": ["Psalm 145:9", "Matthew 5:45", "Romans 7"]}, {"title": "God Knows Those Who Are His", "subpoints": ["2 Timothy 2:19: \"The solid foundation of God stands, having this seal: the Lord knows those who are his\"", "Your salvation does not depend on daily devotions, prayer life, church attendance, or good works", "It depends entirely on God himself — who knows his people", "Good works are important but they are not the ground of salvation; without living faith in Christ they will be burned up"], "scripture": ["2 Timothy 2:19"]}, {"title": "The Severity of God — Verse 8", "subpoints": ["\"With an overflowing flood he will make an utter end of its place, and darkness will pursue his enemies\"", "Nineveh was the largest and most powerful city in the world — and yet it fell", "Nahum 2:13: \"Behold, I am against you\" — think about hearing that after you die in an unsaved condition", "God's wrath and vengeance are terrifying (Nahum 1:2-6): the mountains quake, the hills melt", "Mount St. Helens eruption illustration: 1500 atomic bombs worth of power — and yet compared to God, it is nothing", "The man who refused to leave Mount St. Helens despite warnings = the one who hears the gospel and does not repent"], "scripture": ["Nahum 1:8", "Nahum 2:13", "Nahum 1:2-6"]}, {"title": "God Is Patient — And His Patience Is a Gift", "subpoints": ["He is slow to anger (Nahum 1:3) — he can wait because he is all-powerful and at no disadvantage", "He will not acquit the guilty — but he waits for us to repent", "Hebrews 3:15: today, if you will hear his voice, do not harden your hearts", "His patience is also a comfort to believers struggling with sin", "If God did not wait, we would all be lost — his patience is how any of us are here"], "scripture": ["Nahum 1:3", "Hebrews 3:15"]}, {"title": "Conclusion: Walk Beside God", "subpoints": ["If God is good, we need to learn to trust him — walk beside him, not run ahead or lag behind", "Jonah ran ahead in disobedience — walked \"that way\" — and found out the hard way", "The church needs elders, deacons, a building — but we must trust God's timing, not run ahead", "For the unbeliever: be afraid. Your greatest enemy is God; repent and be reconciled today", "For the believer: rest in the fact that God is good. \"If God is for us, who can be against us?\" (Romans 8:31)"], "scripture": ["Romans 8:31"]}], "summary": "Preached by Elder Nick Anderson from the often-overlooked book of Nahum, this sermon takes Nahum 1:7-8 as its hinge text to explore the goodness and severity of God in tandem. The historical background of the sermon: Nahum prophesied against Nineveh, the capital of the brutal Assyrian Empire, sometime between 663 and 612 BC. Unlike Jonah's preaching a century earlier (when Nineveh repented), this time Nineveh did not repent, and Nahum's prophecies of destruction were precisely fulfilled when the city fell in 612 BC. The sermon is anchored in two verses: verse 7 (\"The Lord is good, a stronghold in the day of trouble, and he knows those who trust in him\") and verse 8 (\"But with an overflowing flood he will make an utter end of its place\"). The first movement explores God's goodness as loving, kind, generous, and inclined toward his creatures — grounding this in a battery of Psalms. God's goodness is expressed both in his mercy toward his people and in his justice against his enemies. God especially knows and cares for his own people — salvation rests not on our works but on his certain knowledge of those who are his (2 Timothy 2:19). The second movement describes God's severity: his wrath is terrifying and total, and a comparison with the Mount St. Helens eruption (impressive as it was) illustrates how infinitely beyond human disaster God's judgment will be. The sermon closes by drawing both together: God's patience is a gift — he is slow to anger, but not forever patient — and for the believer this is a great comfort, while the unbeliever is urged to repent today.", "transcript": "## Introduction: Nahum and Nineveh\n\nFor those able, we're just remaining standing from a moment longer for the reading of God's Word. We're going to read the first chapter of the book of the prophet Nahum. It may be one of those that you might have to look in the index or the table of contents to find. It's not one that we turn often to. Nahum is after Micah, right before Habakkuk. Nahum chapter 1, starting at verse 1.\n\n\"The burden against Nineveh. The book of the vision of Nahum the Elkoshite. God is jealous, and the Lord avenges; the Lord avenges and is furious. The Lord will take vengeance on His adversaries, and He reserves wrath for His enemies. The Lord is slow to anger and great in power, and will not at all acquit the wicked. The Lord has His way in the whirlwind and in the storm, and the clouds are the dust of His feet. He rebukes the sea and makes it dry, and dries up all the rivers. Bashan and Carmel wither, and the flower of Lebanon wilts. The mountains quake before Him, the hills melt, and the earth heaves at His presence, yes, the world and all who dwell in it. Who can stand before His indignation? And who can endure the fierceness of His anger? His fury is poured out like fire, and the rocks are thrown down by Him. The Lord is good, a stronghold in the day of trouble; and He knows those who trust in Him. But with an overflowing flood He will make an utter end of its place, and darkness will pursue His enemies.\"\n\nThis is the Word of our Lord. You may be seated.\n\nSo yes, Nahum is one of those obscure books that is difficult to find in the Bible. But I am confident by the end of the sermon that most of you will have found it. Let's pray. Our gracious God, we thank you for your goodness, we thank you for your word, we thank you for all of your word and that it all speaks to us. It all reveals something of yourself to us — something of your grace and goodness, something of your justice, of your wrath, as we will see today. Pray Lord that you would be with me, that you would help me speak only what is true. We ask this in Christ's name. Amen.\n\nI know a lot of you are probably wondering why isn't Tito up here. I want Tito to preach, and I'm right there with you. I want Tito to preach. Okay, enough joking for the moment.\n\nSo we don't really know a lot about the prophet Nahum. We know that he wrote the book of Nahum — that's not disputed among Bible-believing scholars. We know that he was an Elkoshite. But we don't really know what an Elkoshite actually was or what that actually means. Some scholars think that it's the place where he was born; others think maybe it's the place where he was prophesying. But we don't really know.\n\nThis is how the Lord works at times. He doesn't always give us everything that we want to know. It's interesting that we know that Nahum wrote this book, we know that Obadiah wrote the book by his name even though it's only 20 verses long. But we don't know who wrote the book of Hebrews — we can speculate, we can guess, we can argue about it. But the Lord teaches us to humbly accept his word even though he doesn't give us all the details all the time. So we don't know much about Nahum, but we know that what he spoke is God's word. And when we read it, we are hearing the word of God.\n\nWe do know that he prophesied somewhere between 663 and 612 BC. Scholars have disagreed on this, but based on what the Scriptures say, this is the time period that's most likely correct. Nahum's prophecy is called \"a burden against Nineveh.\" And we know Nineveh primarily because of the prophet Jonah. Jonah, much against his own will and desires, went to Nineveh and prophesied about their destruction. And because of his prophecy, the people of Nineveh actually repented. This time, the people of Nineveh are not going to repent. Nahum preaches about their destruction. And indeed that is what happened.\n\nNineveh was located in northern Iraq — just east of Seattle, as I like to say for geography buffs. It was the largest city in the Assyrian Empire at the time. In fact, some scholars say it was the largest city in the known world at the time, certainly the most powerful city in the world. However, the Assyrian Empire would soon be in decline, fraught with civil wars, internal strife, and outside pressure. Due to these conflicts and the Babylonians and the Medes also putting pressure on them, they were able to actually invade and sack the most powerful city in the world. In 612 BC, Nineveh fell after a two- to three-month campaign.\n\nSome historians believe that a flood of the Tigris River aided the campaign against it. The river rose and took out part of the wall, causing it to collapse, which enabled troops to enter the city. There is even an ancient recording of an oracle that said the only way Nineveh would ever fall is if, quote, \"the river on which it stood became its enemy.\" And that's actually what happened.\n\n## The Twofold Purpose of Nahum\n\nThe purpose of Nahum's writing here is twofold, summed up in verses 7 and 8: a warning to Nineveh of their impending destruction, and a comfort to the people of Israel who had been troubled and were actually subjects of Assyria for some time.\n\nIsrael had been invaded by the Assyrian forces during Hezekiah's reign. Sennacherib invaded, took over 46 cities of Judah, and surrounded Jerusalem. This is when Hezekiah humbled himself before God. He saw there was no human help for him. He humbled himself before the Lord and asked for his help. And the Lord helped. He sent an angel and the angel destroyed 185,000 troops overnight and forced the Assyrian army to withdraw.\n\nAs an interesting historical note — something that further confirms that the Bible really is true — Sennacherib's Prism was discovered in 1860. You can go online and look at pictures of this; it's located in the British Museum. And it describes the invasion of Judah. It details how many cities they captured. When it comes to Jerusalem, it actually just says that Sennacherib trapped Hezekiah \"like a caged bird.\" It doesn't say he destroyed the city, and it doesn't mention the destruction of his army. Why would you, if you're recording your own history, mention the details you don't want people to remember? But this prism establishes firmly that Sennacherib was a real person — scholars had actually scoffed at the idea — and confirms the historicity of the Bible.\n\n## The Goodness of God — Verse 7\n\nLet's take a look at verse 7. It says: \"The Lord is good, a stronghold in the day of trouble; and He knows those who trust in Him.\"\n\nWe see the goodness of God set forth throughout the Scriptures. It is one of his chief attributes. In Psalm 34:8, we read: \"Oh, taste and see that the Lord is good; blessed is the man who trusts in Him.\" God himself invites us to taste and see his own goodness. The goodness of God is a blessing to the man who trusts in him. And this is why we can trust God — because he is a good God. Psalm 100:5: \"For the Lord is good; his mercy is everlasting, and His truth endures to all generations.\"\n\nNote that God's goodness and mercy are joined to each other here. God's mercy is an expression of his goodness to us. And this assertion of God's goodness comes after six verses of very vivid, terrible warnings of God's pending judgment on Nineveh. Doesn't it seem like a contradiction? Six verses of judgment — and then, \"The Lord is good.\" How is this possible? How can God be full of wrath against his enemies and yet be a good God?\n\nWell, it isn't a contradiction at all. His goodness is expressed in both his mercy toward his people and in his justice toward those who rebel against him. Both of those are good and both come from a good God. His goodness is proclaimed here so that those who read these Scriptures would not be discouraged by the warnings of his coming judgment. God is good — and all those who repent will be saved.\n\nWhat does it actually mean that God is good? First, goodness is opposite to cruelty, to being unmerciful, to being harsh. God is loving, kind, generous, full of compassion. Think about this: if God were infinite, eternal, unchangeable, and all-powerful — and yet not a good God — what would that look like? We can actually look at other religions that claim a god who is all-powerful and infinite, and yet not a good god. And it is a terrifying thing to live under a god who is not good. We would live rightfully in constant terror.\n\nThankfully, our God is a good God and he cares for us. Because of God's goodness, he is inclined toward us, inclined to bless his creatures. Psalm 119:68: \"You are good and do good; teach me your statutes.\" Psalm 136:1: \"Oh, give thanks to the Lord, for He is good! For His mercy endures forever.\"\n\nPsalm 86:4-6: \"Rejoice the soul of Your servant, for to You, O Lord, I lift up my soul. For You, Lord, are good, and ready to forgive, and abundant in mercy to all those who call upon You. Give ear, O Lord, to my prayer.\" Beloved, we pray because we serve a God who is good. We are able, even in our darkest hours — whether trouble has come upon us or we've sinned in a way we know we shouldn't have — at all of those times, we can get on our knees and pray to the Lord, because he's good and he's ready to forgive.\n\nHe is not a God who sits in heaven wringing his hands, looking down on us, waiting for us to sin so he can strike us down. He loves us. That expression of love is seen in the Lord Jesus Christ. He actually desires to give us more mercy and more grace. He desires to see good for his people. We read a book several years ago called Gentle and Lowly — and if you haven't read that book, I highly recommend it. The author's point is that the only time Jesus actually describes his own heart, he says, \"I am gentle and lowly.\" That's the kind of God we serve.\n\n## God's Goodness Extends to All and Especially to His People\n\nGod's goodness extends to all his creatures. Psalm 145:9: \"The Lord is good to all, and His tender mercies are over all His works.\" Matthew 5:45: \"He makes His sun rise on the evil and on the good, and sends rain on the just and on the unjust.\" Whether you are a believer or not, the very breath that you breathe is evidence of God's goodness to his creatures. Psalm 33:5: \"The earth is full of the goodness of the Lord.\"\n\nAnd third, God's goodness extends especially and particularly to his people. In the context of Nahum, God was showing his goodness to Israel in the defeat of their enemy the Assyrians. In our day, God shows mercy by redeeming us from our great enemy, which is ourselves. We really are, as believers, our own greatest enemy. When we read through Romans 7, we get to Paul and this massive conflict — not with all these sinful people out there who won't listen to his preaching — but the great conflict is within himself. Because the greatest enemy we have is our own sinful nature. It's our own old man, who has been crucified and yet still desires to exert control over us. And the Lord saves us from ourselves, thankfully.\n\nNow if you're here today and you're unsaved, at this point your greatest enemy is God. He is your enemy. And when you read Nahum and these prophecies about the destruction of the wicked, you are in that place right now. And the only way to take care of that is repent and put your trust in Christ. Then God will be the best friend in the world that you've ever had.\n\n## God Knows Those Who Are His\n\nVerse 7 says he is a stronghold in the day of trouble and he knows those who trust in him. When the armies invaded Nineveh, the people in that city had nowhere to go. They had trusted in walls that would not withstand the enemy. In contrast, the Lord knows those who are his. 2 Timothy 2:19: \"Nevertheless the solid foundation of God stands, having this seal: 'The Lord knows those who are His.'\" Beloved, your safety does not depend on you.\n\nIt's great to be consistent in your daily devotions, and you should be. But your salvation does not depend on that. Your salvation doesn't depend on the strength or vitality of your prayer life. It does not depend on how perfect your church attendance is. It doesn't matter if you serve in all the church programs, sing in the choir, come to all the work days, volunteer for VBS, go on mission trips, visit the sick, are raising your kids right — none of that is going to save you if you do not have your trust in Christ.\n\nWe should do all of those things. But we should not depend on our good works for our salvation. The only thing our salvation depends on is God himself — and that is a wonderful thing, because if it depended on us, we would all go to hell. God knows those who are his, and that is the solid foundation we stand on. Your good works are good, and the Lord wants to see your faith working through love. He wants to see those good works — but at the end of the day, if we do not have living faith in Christ, our good works and us will be burned up.\n\n## The Severity of God — Verse 8\n\nAnd that brings me to my next point. The Lord is wrathful, and the destruction of the wicked will be thorough and complete. Look at verse 8: \"But with an overflowing flood He will make an utter end of its place, and darkness will pursue His enemies.\"\n\nThough it was the largest and most powerful city, perhaps in the world, Nineveh was not safe. The Assyrians were very rich, very strong, very prideful — and yet they were vulnerable as we all are when God is not on your side. Just as Nineveh was not safe, everyone outside of Christ is not safe. You are not safe from the coming flood of God's judgment. Just as Noah and his family took safety in the ark, so we must take safety in Christ. And if we don't, we will be destroyed.\n\nIn Nahum chapter 2 verse 13, God warns: \"Behold, I am against you.\" Think about being on the receiving end of that statement two seconds after you die. That would be a horrible thing to hear. Look at chapter 1, verse 2: \"God is jealous and the Lord avenges; the Lord avenges and is furious. The Lord will take vengeance on His adversaries, and He reserves wrath for His enemies.\" God is not a person you want to find yourself in opposition to on judgment day.\n\nThe city of Nineveh and its inhabitants found out the hard way. Remember, it was the most powerful city in the world. And yet it was weakened over time, and these armies were able to destroy the city. That is nothing compared to what God will do to his enemies.\n\nVerse 2: God demands from every person complete and total obedience to him and to him alone. He doesn't tolerate lip service. He doesn't tolerate half-hearted attempts to appease him. He greatly desires for us to worship him according to his word and in faith. He is jealous for this because he is jealous for his own glory.\n\nLook at Nahum 1:4-5: \"He rebukes the sea and makes it dry, and dries up all the rivers. Bashan and Carmel wither, and the flower of Lebanon wilts. The mountains quake before Him, the hills melt, and the earth heaves at His presence, yes, the world and all who dwell in it.\"\n\nHow many of you were alive and have memories of Mount St. Helens erupting? Mount St. Helens was the largest, and still is the largest and deadliest volcanic eruption ever recorded in North America. If you've seen pictures of it, you see the north face of that mountain just completely devastated. The blast of Mount St. Helens was the equivalent of 1,500 World War II era atomic bombs. Forests were completely leveled — they look like toothpicks on the ground. Rivers were filled with debris. The ash circled the earth, and at least 15 states had ash from that blast fall on their territory. That's a lot of power and energy. But when we compare that to God, it's almost nothing. The hills melt before God. Mount St. Helens is like nothing compared to God.\n\nGod's power demonstrated in his wrath toward his enemies will make that volcanic eruption seem like nothing. There will come a day when every single one of us will stand before God. We will either be clothed in our own filthy rags — and that will be terrifying — or we will be clothed in the righteousness of Christ.\n\nThere was a man who lived on Mount St. Helens, and scientists knew something was going on. There was a lot of seismic activity on that mountain, so they told everyone to evacuate. This man refused to leave, and he did not survive that blast. If you hear the message of the gospel and do not turn to Christ, you are that man who did not leave Mount St. Helens.\n\n## God Is Patient — And His Patience Is a Gift\n\nYet even in the midst of the warnings of this overwhelming flood in verse 8, there's this backdrop of comfort: God is slow to anger, and he knows those who are his, he is our stronghold in the day of trouble. He is able to be patient because he is all-powerful.\n\nIn war, the best time to act is when you have an advantage. Well, God always has an advantage. He's never at a disadvantage. And this is why he can wait. This is why he is patient with us — he waits for us to repent. Satan and the powers of darkness will never have any kind of advantage over God. He can execute his vengeance on enemies at any moment, destroy them suddenly and completely. And yet God waits without being unjust. Verse 3 says he will not acquit the guilty.\n\nIf God did not wait for us, if he was not patient, then we would all be lost. He could have determined that he was not going to save anyone. He could have just said, man is sinful and I'm not going to save anyone. But he found it more glorifying to himself to be patient, to work out his plan in history and to save you and I who are here today.\n\nTo the believer, his patience is a great comfort. We struggle hard against sin in this life. Hebrews 3:15 calls us to act now: \"Today, if you will hear His voice, do not harden your hearts as in the rebellion.\"\n\n## Conclusion: Walk Beside God\n\nRejoice, beloved — if your faith is in Christ, you are his and he is yours. You can rest in the fact that God is good. You can rest knowing that if God is for us, who can be against us, as Romans 8 says.\n\nIf God is good, we need to learn to trust in him. We have to walk beside him — not running ahead of him, trying to do things on our own, and not lagging behind him like Jonah did — but walking beside him. When Jonah was told to go to Nineveh, he went the other way. And Jonah found out that was a big mistake.\n\nAs a church, I'm speaking for myself here — we feel the need for more elders, more deacons, a building that would allow us to grow and do more ministry. But we need to trust him when he says no, and not run ahead of him or lag behind him. Trust that the Lord knows what he's doing with this church and every church.\n\nBut unbeliever — be afraid. If your faith is in anything other than Christ, if your faith is in yourself, or if you just don't believe there's a God — it doesn't matter, because God is against you. Nobody can help you except for God himself. And so repentance is the answer. Repent and be reconciled today, while you have a day left.\n\nLet's pray. Gracious and mighty God, you are good and you do good. We thank you, Lord, that you are merciful to your people. We thank you that you are good. We thank you, Lord, that you have given us your word that we might learn from it, that we might learn to be thankful, that we might learn to walk with you — that we would not run ahead of you, trying to do things on our own, and that we would not lag behind, but walk hand in hand with you through this life until you bring us to eternity. We pray, Lord, that you would use this word to change our hearts. We pray for anybody here today who doesn't know Christ, that they would repent and come to true faith today. And we ask this in Christ's name. Amen."};
