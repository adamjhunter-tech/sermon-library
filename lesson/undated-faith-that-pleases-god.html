clearly interceding for the disciples in the storm"], "scripture": ["Matthew 14:22-24", "John 6:15", "Mark 6"]}, {"title": "What Is True Faith? Three Essential Elements", "subpoints": ["True faith is more than knowing Jesus is the Son of God — it involves believing and committing oneself to him", "Faith requires knowing who God is: his character, his existence, and the implication of that for your own life", "Faith is always accompanied by works — James 2: show me your faith without your works, and I will show you my faith by my works", "Hebrews 11:6 summarizes: without faith it is impossible to please God, for he who comes must believe he is, and that he rewards those who diligently seek him"], "scripture": ["Hebrews 11:6", "James 2:14-26"]}, {"title": "Faith Comes from Christ's Revelation — and Steps Out", "subpoints": ["Faith comes from Christ's revelation: 'It is I' — the great I AM, identifying himself as the God of Moses", "This revelation changes Peter from terrified to bold — he steps out of the boat in faith", "Peter's faith was active: he asked permission before stepping out, tying faith and obedience together", "Hebrews 11 demonstrates that faith always issues in visible action: Abel's sacrifice, Enoch's testimony, Noah's ark, Abraham's obedience, Moses' choice to suffer with God's people"], "scripture": ["Matthew 14:26-29", "Hebrews 11:1-32"]}, {"title": "Peter's Failure: The Anatomy of Little Faith", "subpoints": ["Peter had already experienced the miraculous — walking on water — and then looked at the waves and sank", "Jesus' rebuke 'O you of little faith, why did you doubt?' is not asking the reason but the purpose — why doubt when faith had already worked?", "Little faith in Matthew refers to inconsistency: you had something so big and clear and yet chose to live according to what contradicts it", "We are all spiritual Peters: saved from God's wrath by the God who controls the universe, yet we worry about smaller things daily"], "scripture": ["Matthew 14:30-31", "Matthew 6:30", "Matthew 8:26", "Matthew 16:8"]}, {"title": "Even Little Faith Can Be Used by God", "subpoints": ["Even in his failure, Peter cried out to Jesus — not swimming by himself — and Jesus caught him", "The closest Peter ever was to Jesus was when he was sinking in little faith — Christ drew him near", "Through Peter's failure and rescue, all the disciples in the boat saw Jesus' power and love and worshiped him", "Two practical questions: What is the next step of obedience in your life? And why are you worrying when Christ has promised to be with you?"], "scripture": ["Matthew 14:31-33"]}], "summary": "This sermon is the farewell message of Mr. Steve Battistin, a Brazilian seminary student who spent four years with the congregation before embarking on the next chapter of his ministry. The occasion is introduced warmly by Pastor Tito Lyro, who commends Steve to the congregation. Steve chooses Matthew 14:22-33 — Jesus walking on water and Peter stepping out of the boat — as his text.\n\nSteve opens with careful attention to the context: Jesus has just fed over 5,000 people, and the crowds are trying to make him king by force (John 6:15). Jesus withdraws deliberately — to rest, to refuse a political kingship incompatible with his mission, and to pray. He intercedes on the mountain for at least seven hours while the disciples battle a storm strong enough to keep them in the middle of the sea for hours. Steve highlights that the disciples were not unprotected — Jesus was praying for them.\n\nThe central section develops a theology of faith from Hebrews 11. True faith involves three elements: knowing who God is and that he exists; knowing the implications of that for one's own life; and committing to diligently seek him. Faith is always visible through its fruits — James declares you can only show faith through works. The catalog of Hebrews 11 heroes demonstrates that faith's fruits range from miraculous victories (Gideon, David, Samson) to patient endurance of suffering, imprisonment, and death.\n\nWhen Jesus walks on water and says 'It is I' — ego eimi, the divine name — Peter's faith is ignited. He steps out of the boat not as a boast but in submissive desire to follow Jesus. Yet when he looks at the waves, he sinks, and Jesus rebukes him: 'O you of little faith, why did you doubt?' Steve explains that Jesus is not asking the reason for the doubt but its purpose — why choose inconsistency after experiencing such faith? We are all spiritual Peters: saved by the God who controls the universe, yet worrying daily about far smaller things. Even so, Peter's cry 'Lord, save me' in his sinking is itself an act of faith — and Jesus uses even that little faith to bring Peter closer than he had ever been, and to lead the whole boat to worship.", "transcript": "## Introduction\n\nSteve is going to be preaching to us this morning, his farewell sermon. About four years ago, we welcomed to our church a young man who came to the US to learn English — but more than that, to find himself. At that time he had recently returned to the faith. He was establishing himself back in his worship with his Lord. He was dealing with the recent passing of his mom, and we were able to be part of his life during that time. Now, four years later, he has finished seminary and is ready to embark on the next adventure of his life. We have grown to love him, and we are sad to see him go. But we are confident that the Spirit will use him. We are thankful for what the Lord has done in him and through him.\n\nOur text is Matthew 14:22–33 — Jesus walking on the water, and Peter doing the same. I want to draw some lessons about faith from the way Peter and Jesus interact with each other here.\n\n## Background: Why Jesus Sent the Disciples Ahead\n\nOnly Matthew reports that Peter also walked on the water, and there is a reason for that. Jesus has been very active in his ministry — teaching, proclaiming the gospel, healing, and doing miracles. In the verses preceding this passage, he feeds 5,000 men besides women and children out of five loaves of bread and two fish. Because of all these wonderful things, crowds are following him, and people are even trying to make him a king.\n\nSo there are three reasons Jesus dismisses the multitudes and finds a place to pray. The first is simply rest. The second is to dismiss this movement to make him king — John 6:15 says: *\"When Jesus perceived that they were about to come and take Him by force to make Him king, He departed again to the mountain by Himself alone.\"* His goal was way bigger than political influence in Galilee. It is a kingdom that is spiritual and divine. And the third reason is simply to pray.\n\nSo Jesus sends the disciples to the west side of the Sea of Galilee, and the wind is coming from the west — contrary to them. By the fourth watch of the night (3 to 6 a.m.), Jesus came to them walking on the sea. He had been praying for at least seven hours. And the fact that they were still in the middle of the sea after all that time shows how strong the storm was.\n\n## Faith Comes From Christ's Revelation\n\nThe first point of faith we see in the text is that faith comes from Christ's revelation. When the disciples see a figure walking on the sea, they are terrified — they think it is a ghost. But Jesus reveals himself to them:\n\n> *\"But immediately Jesus spoke to them, saying, 'Be of good cheer! It is I; do not be afraid.'\"* (Matthew 14:27)\n\nThe words \"It is I\" in the original language are the most common form of the divine name: \"I am.\" It is very probable that Jesus was not only speaking Greek here but using the very Hebrew words with which the Jews were so familiar — I am the God Almighty, I am the one who appeared to Moses in the burning bush. This revelation is so powerful that it changes Peter from a man terrified of the sea to one bold enough to step out of the boat and walk toward Jesus.\n\n## What Is True Faith? Three Elements\n\nTrue faith is more than merely knowing that Jesus is the Son of God and that he can save us from sins. It involves actually believing these things and committing ourselves to him. There are three elements to saving faith.\n\nFirst, knowing who God is — his character, the fact that he exists, that he is who he claims to be. But also knowing the implications of that for yourself. We are saved because we believe that Christ is what he claims to be — the Son of God — and that he has power to forgive our sins. That through his work we can find redemption with the holy God.\n\nSecond, assenting to that knowledge. Not merely knowing facts but convicting yourself that what you know is actually true and actually pertains to you.\n\nThird, trust — conviction passing into confidence. Knowing, assenting, and then embracing these things as your own. Entrusting yourself entirely to Christ. Robert Raymond put it this way: saving faith is when one cognitively, affectively, and volitionally transfers all reliance for pardon, righteousness, and cleansing away from himself and onto Christ, whom he joyfully receives and upon whom alone he rests entirely for his salvation.\n\nHebrews 11 makes this concrete. Verse 6:\n\n> *\"But without faith it is impossible to please Him, for he who comes to God must believe that He is, and that He is a rewarder of those who diligently seek Him.\"* (Hebrews 11:6)\n\nAnd the chapter then catalogs how faith played out in the lives of the saints — Abel, Enoch, Noah, Abraham, Moses — sometimes in dramatic deeds, sometimes in patient endurance of suffering. Verse 35–38 are striking: the same faith that stopped the mouths of lions and quenched the violence of fire was also the faith of those who were tortured, mocked, scourged, imprisoned, sawn in two. Faith does not guarantee comfortable outcomes — it changes the way we live through all of them.\n\n## Peter's Faith: Active and Submissive\n\nPeter's faith was active. He looks at Jesus and believes that He is the I AM, the Son of God. He understands that this has implications for his own life. And so he asks:\n\n> *\"Lord, if it is You, command me to come to You on the water.\"* (Matthew 14:28)\n\nNotice that this is not a boast. He is not walking on water to show the other disciples something. He is only concerned with keeping his eyes on Jesus and going toward him. He submits: \"command me.\" And Jesus says, \"Come.\"\n\nPeter steps out of the boat. The storm is still there — the circumstances have not changed. But no matter how afraid he was inside the boat, he steps out and faces the storm because he knows Christ is there, Christ has permitted him to come, and Christ has all that he needs to go through the storm.\n\n## Little Faith: The Danger of Looking at the Waves\n\n> *\"But when he saw that the wind was boisterous, he was afraid; and beginning to sink he cried out, saying, 'Lord, save me!'\"* (Matthew 14:30)\n\nIt is hard to understand what happened to Peter here. He had already experienced the impossible — literally walking on water. But as he walks, he looks at the waves — which were there the whole time — and he begins to sink.\n\nThis is exactly why Jesus says: \"O you of little faith, why did you doubt?\" The expression \"little faith\" appears three other times in Matthew. In Matthew 6, Jesus uses it for those who worry about food and clothing. In Matthew 8:26, he uses it when the disciples are afraid in the storm. In Matthew 16:8, he uses it when the disciples fail to understand a simple lesson. The idea in each case is inconsistency — having something so clear and large before you, and yet choosing to live according to something much smaller.\n\nIs this not what we do? We have been saved from the wrath of God. We believe that the same God who created all things and controls the entire universe has loved us enough to send his only Son to die for our sins. Our sins are forgiven in Christ. We have all of that. And then we look at something in our lives — and we sink.\n\nJesus's question \"Why did you doubt?\" is not asking what caused Peter to doubt — that was obvious. He is asking what was the point of doubting, given everything he had already seen. Matthew 6 makes the same point about worry: does worrying about tomorrow bring you anything? Is it not the case that you already have evidence that God provides?\n\n## Even Little Faith Is Used by God\n\n> *\"And immediately Jesus stretched out His hand and caught him, and said to him, 'O you of little faith, why did you doubt?' And when they got into the boat, the wind ceased.\"* (Matthew 14:31–32)\n\nEven though it was little faith, it was still faith. Peter does not try to swim by himself as he is sinking — he cries to Jesus: \"Lord, save me.\" And that is the cry we need to cry to God every time we see ourselves in sin and discontent. As we cry to him, he uses that to bring us closer to him than we have ever been before.\n\nNotice also how Jesus acts: he could have done anything — but he goes and grabs Peter and brings him close. That is what Christ our Lord does to us even when we have failed. He uses it.\n\nAnd when they got into the boat, the wind ceased — and the disciples worshiped him, saying: *\"Truly You are the Son of God\"* (Matthew 14:33). This was not only a display of Christ's transcendence but of his immanence. Not only his power as the I AM, but also his love: the same God who spoke all things into existence reached out his hand and said, \"I care for you.\" He became flesh. He lived the whole life and died for us. And he is there for you. So why do you worry? Why do you doubt?\n\n## Application\n\nFaith is always accompanied by obedience. Peter did not step out of the boat on his own initiative — he asked, he received a command, and then he obeyed. So too, every part of the Bible is a calling to do what is impossible apart from the grace of God. We are called to pick up our cross, to follow Christ, to submit to the Lord, to be zealous about the church. All these things we are able to do through faith in him.\n\nAnd if you have not yet committed yourself to Christ — today is the day of salvation. Jesus says: \"Come to Me, all you who labor and are heavy laden, and I will give you rest. My yoke is easy and My burden is light\" (Matthew 11:28–30). Understand that God has accomplished the hardest thing, the most impossible thing — he took on flesh, went to the cross, and if you call upon the name of the Lord, you will be saved."};
