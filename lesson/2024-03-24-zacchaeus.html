window.LESSON_DATA = {"id": "2024-03-24-zacchaeus", "title": "Zacchaeus", "speaker": "Pastor Tito Lyro", "date": "2024-03-24", "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["03-24-24 -PM- Zaccaeus - Luke 19_1-10 - Pastor Tito Lyro.txt"], "tags": [{"tag": "salvation", "source": "detected"}, {"tag": "grace", "source": "detected"}, {"tag": "sovereignty of God", "source": "detected"}, {"tag": "repentance", "source": "detected"}, {"tag": "stewardship", "source": "detected"}, {"tag": "Christology", "source": "detected"}], "scripture_references": [{"reference": "Luke 19:1-10", "type": "quoted", "source": "detected"}, {"reference": "Luke 18:18-27", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: Jericho and Zacchaeus", "subpoints": ["Jericho was a prosperous resort city — the preferred winter destination of Herod and the wealthy; surrounded by palm groves and balsam gardens", "Zacchaeus was a chief tax collector — not merely a tax collector but the boss over all other tax collectors in the region; explicitly described as wealthy (v.2)", "Tax collectors were despised: they worked for Rome, extorted fellow Jews, and were socially and religiously ostracized"], "scripture": ["Luke 19:1-2"]}, {"title": "1. The Particular Pursuit of Jesus", "subpoints": ["Jesus came to Jericho specifically — and came to that specific sycamore tree where Zacchaeus was perched", "The sycamore tree has low branches close to the ground — accessible for a short man; but Jesus looked up and called him by name", "Of all the people in Jericho — the crowd, the disciples, the other tax collectors — Jesus called this man", "God's love is particular: he does not love a faceless mass but specific people; he called Zacchaeus by name before Zacchaeus knew what was happening"], "scripture": ["Luke 19:3-5"]}, {"title": "2. The Evidence of Genuine Salvation", "subpoints": ["Verse 8: 'Look, Lord, I give half of my goods to the poor; and if I have taken anything from anyone by false accusation, I restore fourfold' — this is in the present tense (I am giving, I am restoring), indicating an immediate change", "The Greek construction in v.8 is a true-to-fact conditional — 'if I have taken anything from anyone' means Zacchaeus is admitting that he has; he is not merely hypothesizing", "Fourfold restitution exceeds the law's requirement for most cases — genuine repentance goes beyond the minimum", "The crowd grumbled: 'He has gone to be a guest with a man who is a sinner' — salvation overturns social expectations"], "scripture": ["Luke 19:6-8"]}, {"title": "3. Contrast with the Rich Young Ruler", "subpoints": ["Luke 18:18-27: the rich young ruler came to Jesus, kept the commandments, but when told to sell all he had and give to the poor, he went away sorrowful", "The disciples were shocked: 'Who then can be saved?' Jesus answered: 'The things which are impossible with men are possible with God'", "Zacchaeus is the answer to that question — what is impossible with men (the salvation of a wealthy tax collector) is possible with God", "One man clung to his wealth and walked away from Jesus; another abandoned his wealth and received salvation — both were called to give up everything"], "scripture": ["Luke 18:18-27", "Luke 19:9-10"]}, {"title": "4. The Summary of Luke's Gospel", "subpoints": ["Verse 10: 'For the Son of Man has come to seek and to save that which was lost' — this is the programmatic statement of Luke's entire Gospel", "Jesus came to seek — he pursued Zacchaeus, not the other way around; the initiative is always divine", "Jesus came to save — the lost are not merely found but saved; the rescue is complete", "Salvation came to 'this house' (v.9) — not merely to Zacchaeus individually but to his household; the scope of grace is wide"], "scripture": ["Luke 19:9-10"]}], "summary": "A PM sermon on Luke 19:1-10, the story of Zacchaeus. Set in the prosperous resort city of Jericho, Zacchaeus was not merely a tax collector but the chief tax collector — the boss of all other tax collectors — and explicitly wealthy. Jesus came to Jericho specifically for this man, looked up at the exact sycamore tree where he was perched, and called him by name. The sycamore's low branches made it accessible for a short man, but the point is divine particularity: of all the people in Jericho, Jesus called this one. Verse 8 uses a true-to-fact conditional in Greek, meaning Zacchaeus is admitting extortion while pledging fourfold restitution — immediate evidence of genuine conversion. The sermon draws a contrast with the rich young ruler (Luke 18): one man clung to wealth and walked away from Jesus, the other abandoned it and received salvation — fulfilling Jesus's words that 'the things which are impossible with men are possible with God.' The episode closes with the programmatic statement of Luke's Gospel: 'The Son of Man has come to seek and to save that which was lost.'", "transcript": "## Introduction: Jericho and Zacchaeus\n\nWe're in Luke 19:1-10 this evening. Luke has been building toward Jerusalem — and on the way, Jesus passes through Jericho.\n\nJericho was not an ordinary city. It was the preferred winter resort of the Herodian family and the wealthy of Judea — surrounded by palm groves, balsam gardens, and the warmth of a valley climate. It was a prosperous place. And it was in this prosperous city that a very prosperous man lived.\n\nVerse 2: *There was a man named Zacchaeus who was a chief tax collector, and he was rich.* Luke is precise with his vocabulary. He is not a tax collector — he is a *chief* tax collector. He is the boss. He runs the tax collection operation in the region. Every tax collector in the Jericho district works under him. And he is explicitly rich — Luke does not leave this ambiguous.\n\nTax collectors in the first century were despised. They worked for Rome. They taxed their own people on behalf of the occupying power. They were notorious for extortion — charging more than required and pocketing the difference. They were socially and religiously ostracized. They could not testify in a Jewish court. They were considered traitors.\n\nAnd Zacchaeus is the chief of them.\n\n## 1. The Particular Pursuit of Jesus\n\nZacchaeus wanted to see who Jesus was, but the crowd was large and he was short. So he ran ahead and climbed a sycamore tree. The sycamore — the same species planted along roadsides today in some parts of the world — has branches that begin low to the ground, making it easy to climb.\n\nJesus came to that tree. He looked up. And he called this man by name: *Zacchaeus, make haste and come down, for today I must stay at your house.*\n\nThink about what is happening. There is a crowd of people following Jesus. There are disciples. There are the people of Jericho lining the road. And Jesus looks up into a tree and addresses by name a man he has, by any human account, never met.\n\nGod's love is not a vague affection for humanity in the abstract. It is particular. It is personal. It addresses you by name. Of all the people in Jericho on that day, Jesus came for this man. He sought him out — not the other way around.\n\nAnd Zacchaeus came down and received him joyfully.\n\n## 2. The Evidence of Genuine Conversion\n\nThe crowd grumbled. 'He has gone to be a guest with a man who is a sinner.' And then in verse 8, something remarkable happens.\n\n*Zacchaeus stood and said to the Lord, 'Look, Lord, I give half of my goods to the poor; and if I have taken anything from anyone by false accusation, I restore it fourfold.'*\n\nNote the tense: *I give. I restore.* Not 'I will give someday.' Not 'I intend to think about giving.' Present tense. Immediate action.\n\nAnd note the grammar of the conditional in verse 8. In Greek, this construction — the true-to-fact conditional — means: if, and it is indeed the case. *If I have taken anything from anyone by false accusation* — Zacchaeus is not hypothesizing. He is admitting. He did take things. He is confessing it and making it right.\n\nFourfold restitution exceeds what the law required in most cases. Genuine repentance does not calculate the minimum. It gives more than required. The transformation is real and immediate.\n\n## 3. Contrast with the Rich Young Ruler\n\nLuke placed this story right after the story of the rich young ruler — and the contrast is intentional.\n\nThe rich young ruler came to Jesus, claimed to have kept all the commandments from his youth, and when Jesus told him to sell all he had and give to the poor, he went away sorrowful. He could not do it. The wealth held him.\n\nThe disciples were astonished. 'Who then can be saved?' And Jesus said: 'The things which are impossible with men are possible with God.'\n\nZacchaeus is the answer to that question. What is impossible with men — the salvation of a wealthy, extorting, Rome-serving chief tax collector — is entirely possible with God. One man clung to his wealth and walked away from Jesus. Another abandoned his wealth the moment Jesus came to him. Both encounters involved a call to give up everything. One obeyed; one did not.\n\nThe difference is not willpower. The difference is what Jesus did when he came to that sycamore tree.\n\n## 4. The Summary of Luke's Gospel\n\nVerse 9: *And Jesus said to him, 'Today salvation has come to this house, because he also is a son of Abraham.'*\n\nNot just to Zacchaeus — to this house. The grace that came to Zacchaeus reached his household. That is the scope of grace.\n\nAnd then verse 10: *For the Son of Man has come to seek and to save that which was lost.*\n\nThis is the summary statement of Luke's entire Gospel. Everything Luke has been writing — the healing of the blind, the calling of sinners, the reaching of the despised — is captured in these two words: seek and save. Jesus came to seek — the initiative belongs to him. He pursued Zacchaeus, not the other way around. And he came to save — the lost are not merely found but rescued, completely.\n\nIf you find yourself in the category of 'lost' — you are exactly who Jesus came for. He is still seeking. He has come to save.\n\nFather, thank you for a Savior who seeks the lost and saves the found. We pray that the work he began would not stop until it reaches every last sheep. In his name, amen.", "soundcloud_url": "https://soundcloud.com/olympiabp/03-24-24-pm-zaccaeus-luke-19_1-10-pastor-tito-lyro"};
