t pride masquerading as humility (\"I'm not good enough to pray\")", "Singleness of heart: verse 11 — \"Unite my heart to fear Your name\"", "By nature we have divided hearts; this divided state must be overcome", "David goes to God even for the prerequisites to pray"], "scripture": ["Psalm 86:1", "Psalm 86:11"]}, {"title": "Question 3: How Often Ought We to Pray?", "subpoints": ["Verse 3: \"Be merciful to me, O Lord, for I cry to you all day long\"", "The Psalm contains no fewer than 15 petitions", "We quickly quit praying; we must train ourselves to destroy the certainties of discouragement", "The \"certainties\": the ever, the always, the impossible that creep in when heaven seems silent", "Everyone has experienced seasons where prayer feels like hitting the ceiling"], "scripture": ["Psalm 86:3"]}, {"title": "Question 4: What Gives Us Confidence Our Prayers Will Be Heard?", "subpoints": ["The character of God Himself", "Verse 5: You, Lord, are good and ready to forgive, abundant in mercy", "Verse 10: You are great and do wonderful things; You alone are God", "Among the gods there is none like You, nor any works like Your works", "The character of God is the ground of confidence in prayer, not our worthiness"], "scripture": ["Psalm 86:5", "Psalm 86:10"]}, {"title": "Question 5: What About the Burden of Sin and Guilt?", "subpoints": ["No greater obstacle to prayer than the weight of sin and guilt", "\"I have asked forgiveness for this twenty-five times — how can I come again?\"", "Satan's accusations: \"Your sins have caused God to turn away\" — they seem reasonable", "David's answer: verse 15 — \"You, O Lord, are a God full of compassion and gracious, longsuffering and abundant in mercy and truth\"", "For every accusation of the enemy there is a corresponding remedy from the throne of grace", "Verse 16: pray for the strength to pray — even that comes from the Lord", "Nothing should keep us from coming to the throne of grace with great confidence"], "scripture": ["Psalm 86:15", "Psalm 86:16"]}], "summary": "Pastor Tito Lyro preaches from Psalm 86, a prayer of David, asking five questions of the Psalm that together build a theology of prayer. Using the illustration of a young boy whispering in his father's ear — and the cover of Sam Storms's book \"Reaching God's Ear\" — he frames the sermon around the question of why and how we should pray. Question one: why should we pray fervently? Because God is good and delights to answer (v. 5, 7), and because He commands prayer and keeps His word (Jeremiah 33:3; 2 Corinthians 12:7-9 showing Paul's thorn answered with \"My grace is sufficient\"). Question two: what is required of those who pray? Poverty of spirit — an awareness of one's destitute condition (v. 1) — and singleness of heart (v. 11). Humility is required; the excuse \"I'm not good enough to pray\" is pride masquerading as humility. Question three: how often ought we to pray? The Psalm contains fifteen petitions; David prays all day long (v. 3). We tend to quit too quickly; we must fight the certainties of discouragement. Question four: what gives us confidence? The character of God Himself — His goodness, His forgiveness, His abundance of mercy and wonderful works. Question five: what about the burden of sin and guilt? For every accusation of the enemy there is a corresponding remedy from the throne of grace. The character of God — His compassion, His patience, His abundant mercy (v. 15) — is stronger than any accusation. We may even pray for the strength to pray, since that too comes from the Lord.", "transcript": "## Scripture Reading: Psalm 86\n\nFor our scripture reading this afternoon, we're turning to Psalm 86. Psalm 86 is a prayer of David. We can't know exactly when it was written or what occasion prompted it — the title doesn't tell us. But it is a Psalm of prayer, a Psalm about reaching God's ear in prayer.\n\n\"Bow down Your ear, O LORD, hear me; for I am poor and needy. Preserve my life, for I am holy; You are my God; save Your servant who trusts in You. Be merciful to me, O Lord, for I cry to You all day long. Rejoice the soul of Your servant, for to You, O Lord, I lift up my soul. For You, Lord, are good and ready to forgive, and abundant in mercy to all those who call upon You. Give ear, O LORD, to my prayer; and attend to the voice of my supplications. In the day of my trouble I will call upon You, for You, O LORD, will answer me. Among the gods there is none like You, O Lord; nor are there any works like Your works. All nations whom You have made shall come and worship before You, O Lord, and shall glorify Your name. For You are great and do wondrous things; You alone are God. Teach me Your way, O LORD; I will walk in Your truth; unite my heart to fear Your name. I will praise You, O Lord my God, with all my heart, and I will glorify Your name forevermore. For great is Your mercy toward me, and You have delivered my soul from the depths of Sheol. O God, the proud have risen against me, and a mob of violent men have sought my life, and have not set You before them. But You, O Lord, are a God full of compassion and gracious, longsuffering and abundant in mercy and truth. Oh, turn to me and have mercy on me; give Your strength to Your servant, and save the son of Your maidservant. Show me a sign for good, that those who hate me may see it and be ashamed, because You, LORD, have helped me and comforted me.\"\n\nThis is the Word of our Lord. Let us pray together. Our Father, we pray that you attend the preaching of your word to our hearts. In Jesus' name, amen.\n\n## Introduction\n\nSam Storms is a pastor in Oklahoma City, Oklahoma. He is a prolific writer who wrote a book called \"Reaching God's Ear.\" I didn't read the book — it's no longer in print — but what attracted me to it was the cover. I judged the book by its cover. The cover shows a man with a young boy sitting on his lap, seemingly whispering something in the man's ear. It was actually a stranger's photo that had nothing to do with the cover at first. But years later, that four-year-old boy — now grown — was part of Storms's daughter's freshman class in college. So he met him and asked what he had been whispering in his father's ear. He said he never remembered what he had whispered — just that his mom had promised him McDonald's if he would whisper.\n\nBut I thought that picture — a child sitting on his father's lap and whispering in his ear — is a great illustration of the act of prayer, of our coming before our God.\n\nSo why do we pray? What motivates us to whisper in our Father's ear? Is it even worthwhile to do so? I want to explore these questions this afternoon by asking five questions of Psalm 86.\n\n## Question 1: Why Should We Pray Fervently?\n\nWhy should we pray with such intensity and persistence? You can tell this is a fervent prayer when you read carefully — the words are full of great intensity.\n\nThe answer in verse 5 is: because God is good.\n\nHave you noticed a theme in the last couple of weeks? There is a theme we find frequently in the Psalms — interesting, because the Psalms are often the voice of the pressed, the afflicted, the oppressed — and the refrain is: God is good. With all those lament Psalms (there are actually more laments than praise Psalms in the Psalter), the refrain is still: God is good.\n\nWe are repeatedly exhorted in Scripture to call upon the LORD in the day of trouble, to offer prayer to Him at a time when He may be found, to pour out our heart before Him. And yet it is striking that we have to be commanded to pray. A sick person hardly needs an exhortation to see the doctor. A hungry person hardly needs an exhortation to eat. And yet we must be told repeatedly to avail ourselves of a God who stands ready to supply our need and draw near when we call.\n\nDavid was quick to pray because he was confident that God commanded prayer because He delights in giving answers. He was assured there is power in praying. Verse 7: \"In the day of my trouble I will call upon You, for You, O LORD, will answer me.\"\n\nJeremiah 33:3: \"Call to Me and I will answer you and show you great and mighty things which you do not know.\" Psalm 91:15 says that God tells the believer: \"He shall call upon Me, and I will answer him; I will be with him in trouble; I will deliver him and honor him.\"\n\nNow, this isn't to say the answer He gives is always the one we want. He always answers — but the answer may not be what we expected. Remember the situation with Paul in 2 Corinthians 12:7-9: \"A thorn in the flesh was given to me, a messenger of Satan to buffet me. Concerning this I pleaded with the Lord three times that it might depart from me. And He said to me, 'My grace is sufficient for you, for My strength is made perfect in weakness.'\" Paul pleaded with the Lord — and the answer he received was not what he asked for. But it was what he needed. The answer He gives may not be the one we want, but it is always the answer we need.\n\nPaul then says: \"Therefore most gladly I will rather boast in my infirmities, that the power of Christ may rest upon me. Therefore I take pleasure in infirmities, in reproaches, in needs, in persecutions, in distresses, for Christ's sake. For when I am weak, then I am strong.\"\n\n## Question 2: What Is Required of Those Who Pray?\n\nIn the first place, those who pray must be poor and needy. Verse 1: \"Bow down Your ear, O LORD, hear me, for I am poor and needy.\"\n\nThat preposition \"for\" is saying: because I am poor and needy — this is why I am coming to You. So who should be praying? Those that are poor and needy. People who pray must be acutely aware of their spiritually destitute condition and their complete dependence on God for all things good. This is another way of saying: humility is required of all who seek God.\n\nI have heard the excuse: \"I can't pray to God — I am not good enough.\" That sounds very pious, very humble. But this is actually pride masquerading as humility, and it robs God of His glory — because it assumes that someone could be good enough to pray to God, worthy of receiving His answer. Of course we are not good enough. But that is precisely why we must pray, because we are not good enough. God is.\n\nBe poor and needy: recognize your spiritual distress, your lingering doubts, your anxiety, your physical weaknesses, your emotional struggles, your lack of wisdom — and bring them to the LORD. These are the very things God delights to heal and to overcome as a way of magnifying His strength and mercy.\n\nAnother prerequisite the Psalmist tells us: singleness of heart. Verse 11: \"Teach me Your way, O LORD; I will walk in Your truth; unite my heart to fear Your name.\"\n\nWe by nature have divided hearts. We are by nature divided within — at one moment trusting the LORD and at another defying His will, and sometimes simultaneously because we are complex people. Even the simplest of us are complex people — we can trust the LORD in one area of life and not in another, and our heart is divided that way.\n\nThis divided state of soul must be overcome by a unified commitment to seek God and tremble at His word. It's interesting that David says: these are my needs, and these are the things I need to come to prayer with — and yet he goes to God for those very things he needs in order to pray to God. That is what we need to do as well.\n\n## Question 3: How Often Ought We to Pray?\n\nVerse 3: \"Be merciful to me, O LORD, for I cry to You all day long.\"\n\nIf you count them out, there are no fewer than fifteen petitions in this Psalm. David keeps asking — and yet on the other hand we are very quick to quit praying.\n\nIf you ever feel like you're asking God too much — as if you have to convince Him you're not overdoing it — and yet the soul must ask God for everything here. Over fifteen petitions in this one Psalm.\n\nSo we need to train ourselves to destroy the certainties of discouragement. That is often what keeps us from praying — discouragement and the certainties of discouragement: the ever, the always, the impossible that creep into our heads when heaven seems silent. Everyone on the other side of this room has gone through periods when it felt like prayer was just hitting the ceiling and bouncing back. And yet what Psalm 91 says is true even in those times. So we persevere and keep on praying.\n\n## Question 4: What Reason Do We Have for Confidence That Our Prayers Will Be Heard?\n\nThe answer is the character of God.\n\nVerse 5: \"For You, LORD, are good and ready to forgive and abundant in mercy to all those who call upon You.\" Later in verse 5: You are forgiving, You are abundant in mercy. \"Among the gods there is none like You, O LORD, nor any works like Your works\" (v. 8). \"You are great and do wonderful things; You alone are God\" (v. 10).\n\nWhat assurance do we have that we should pray? The character of God Himself is our assurance. The character of God is the ground of confidence in prayer — not our worthiness, not our track record, not our level of sin — the character of God.\n\n## Question 5: Are Not My Sins Too Many, Too Evil, Too Frequent for God to Hear Me?\n\nI think there is no greater obstacle to prayer than the burden of sin and guilt that weighs heavily on the human heart. You've asked the LORD to forgive you for something for the tenth time, the twenty-fifth time, the thirty-fifth time — and you sin the same way again. What is the use? My burden is too great, my sins too heavy, there is no hope.\n\nAnd you add to that the accusations of the enemy, who comes to you and says: Why should you of all people pray? How could you ever hope to prevail upon God? Your sins have caused Him to turn away from your face. You are a traitor to His cause, a thankless rebel. You pray? What a joke.\n\nAnd what makes these words of Satan so powerful is that they seem so reasonable. It seems so true. And often they are true — we are exactly what Satan says we are. But this is why David is so relentless in his affirmation in verse 15:\n\n\"But You, O Lord, are a God full of compassion and gracious, longsuffering and abundant in mercy and truth.\"\n\nYou are a God who receives sinners. Remember the refrain of Psalm 107, which we considered last week: \"Oh, that men would give thanks to the LORD for His goodness and for His wonderful works to the children of men.\"\n\nFor every accusation of the enemy there is a corresponding remedy from the throne of grace. That is why we go to the throne of grace.\n\nIn the final analysis, how do we overcome the lethargy of heart, the discouragement of mind and spirit, and pray as we ought? Verse 16: \"Oh, turn to me and have mercy on me; give Your strength to Your servant.\"\n\nWe pray for the strength to pray — because even that comes from the LORD.\n\nWe must not act as if we are four-year-old children who need to be enticed and manipulated into prayer. God is ever ready — as verse 1 tells us — to bow down His ear to hear those who cry to Him for help.\n\nLet me ask you: what excuse do we still have not to pray? What should keep us from coming to the throne of grace with great confidence? The answer is nothing. Nothing should keep us from that. The Bible gives us every reason in the world to come and pray to the LORD — this God who is good and ready to forgive, abundant in mercy to all those who call upon His name. That is your God. That is the God to whom we pray.\n\nLet us pray together. Father, thank you for opening the doors of heaven through Christ. We thank you that we can come and whisper in your ear. We pray that we would take advantage of this great grace that you have given us — that we might approach you about everything and all things. In Jesus' name, amen."};
