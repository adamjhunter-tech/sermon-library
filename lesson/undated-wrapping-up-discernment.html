<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-wrapping-up-discernment", "title": "Wrapping Up Discernment", "speaker": "Pastor Tito Lyro", "date": null, "session": "PM", "series": "Discernment", "series_part": null, "parts": 1, "source_files": ["Wrapping Up Discernment - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/wrapping-up-discernment-pastor-tito-lyro", "tags": [{"tag": "discernment", "source": "detected"}, {"tag": "Christian living", "source": "detected"}, {"tag": "wisdom", "source": "detected"}], "scripture_references": [], "outline": ["Introduction: Wrapping up the Discernment series (though it may continue)", "Summary of key principles from the series", "The biblical basis for spiritual discernment", "Practical applications of discernment in daily life", "Common pitfalls in discernment to avoid", "The role of love, truth, and community in discernment", "Conclusion: Discernment as an ongoing Christian discipline"], "summary": "Pastor Tito Lyro concludes (or nearly concludes) the Wednesday evening Discernment series, noting that 'wrapping up' may extend another week. He reviews the key principles of biblical discernment learned through the series and provides practical applications for ongoing spiritual discernment in the Christian life.", "transcript": "We've come to a time where we're ready to wrap up our series on discernment — but I do want you to notice that's \"wrapping up,\" so it's a continuing thing. It may bleed into next week. The plan is actually a very short lesson for tonight, because I also included the practical portion. I told you we were going to try to figure out how to apply it, so I'll have a scenario. You can go home early or at regular time depending on how involved people get — it's up to you.\n\n## Review: The Scope of Discernment\n\nNow, we started this study because we know that people often do not see issues clearly and are easily misled because they do not think carefully. Most of us want to distance ourselves from the lunatic fringe of Christianity and of the world out there — we are on our guard against these things. We want to be walking according to the Word of the Lord, and to follow him in his path. We want his Word to be a lamp unto our feet and a light unto our path. So we study discernment.\n\nBut there is more to discernment than just figuring out what is right and wrong. It's true that discernment includes distinguishing right from wrong, but it also means distinguishing the primary from the secondary, the most important from the least important, the essential from the indifferent, the permanent from the transient. And it also means distinguishing between the good and the better, and sometimes between the better and the best.\n\nWe started with the definition that discernment is distinguishing between true and false, right and wrong — and that's completely true. But it goes beyond that as well. Sometimes we're going to be trying to distinguish between the most important and the less important, the permanent and the transient, the best and the not-as-good.\n\nCan you think of a time where you might be using discernment to decide between two good things? Sometimes marriage can be that way. Sometimes we think, \"There's this one person out there, and if I only married that one person, I'll have missed my soulmate.\" But when the Bible talks about marriage, it's much simpler than that — there are some broad categories, and then you use discernment between this or that. Getting a job, choosing what college to go to — those are areas where we're choosing between two good things, and we need to use discernment. The beauty of those times is that you're right no matter which one you choose.\n\nAnd sometimes discernment means figuring out what things are of first importance and what are of last importance. A popular way of saying that is priorities. But there are also proverbial things: choose your battles, choose what hill to die on. Those are matters of discernment as well. For example, in fellowship — what are the things that should break fellowship? That's all part of discernment.\n\nI read something this week that made all the sense in the world. I've said before that discernment is much like our physical senses. Some people have a really good sense of smell; they can tell you everything that's in the food. Some people have a really good sense of taste. But all of us have senses. Most of us have five senses. And discernment is like that — it's like a sense. We all have it, we're all supposed to have it, even though some may have a better-developed sense than others. So we are called to develop discernment, like a sixth sense — not to see dead people, but to be able to discern between what is good and what is right.\n\nThe Christian must take care to develop that sixth sense of spiritual discernment. This is why the psalmist prays in Psalm 119:66:\n\n> *\"Teach me good judgment and knowledge.\"*\n\nThe word translated \"judgment\" there is actually the Hebrew word for taste. *Give me good taste. Help me to figure out what is good.* That's the picture of actually tasting something. It is the ability to make discriminating judgments, to distinguish between and recognize the moral implications of different situations and courses of action. That's the nature of discernment. It includes the ability to weigh and assess the moral and spiritual status of individuals, groups, and even movements.\n\nSo while we're called not to use judgmentalism — not to become \"judgy\" in a bad way — our Lord still tells us that we need to figure out who is a pig. He tells us not to cast our pearls before swine. And remember, that's the same passage — Matthew 7:1 says *\"Do not judge,\"* and yet verse 6 says *\"Do not cast your pearls before swine.\"* So he's condemning a particular kind of judgment. That's what we've been talking about for the last ten weeks or so — biblical discernment.\n\n## Jesus as the Supreme Example of Discernment\n\nWe have a remarkable example of discernment in the Lord Jesus Christ. At the end of John chapter 2 we read:\n\n> *\"Jesus did not commit himself to them... because he knew all men, and had no need that anyone should testify of man, for he knew what was in man.\"*\n\nSome people think this is based on his divine omniscience — he knew all things. That's not the case. Remember, we're talking about the man Jesus Christ. The man Jesus Christ was not omniscient. To think that is a heresy. If you were living in the fourth and fifth centuries and you said that the man Jesus Christ was omniscient, you would have been kicked out of the empire — because that's a heresy.\n\nThe man Jesus Christ was not omniscient. So when it says he \"knew all men,\" it means he discerned what was in the heart of man — not because of divine omniscient knowledge, but because he was an observant person who knew how people behave. He knew the Word of God. He knew what the Word of God said about humanity. That's why he was able to do that.\n\nSo the discerning person is learning to think God's thoughts after him practically and spiritually. It means having a sense of how things look in God's eyes, and seeing them in some measure naked and open, as Hebrews 4:13 says God sees things. It's being able to see things as God sees them, as we understand that from the Word of God.\n\n## The Four Impacts of Discernment in Our Lives\n\nWhat is the impact of discernment in our lives? There are four ways discernment affects the way we live.\n\n### 1. Protection from Spiritual Deception\n\nFirst, discernment acts as a means of protection, guarding us from being deceived spiritually. It helps us keep the main thing the main thing. It protects us from being blown away by winds of teaching that make central something in the gospel or Bible that might not be central, and that push the truly central things to the periphery.\n\n### 2. An Instrument of Healing\n\nSecond, discernment also acts as an instrument of healing. When exercised in grace, there's a small number of people whose ability to diagnose the spiritual needs of others is remarkable. They seem to be able to penetrate into the heart issues someone has better than the person himself can do. This is in some ways a dangerous gift, but if used properly it can be a great help to the church of Jesus Christ.\n\n### 3. A Key to Christian Freedom\n\nThirdly, discernment functions as a key to Christian freedom. The discerning person knows how to exercise their freedom. The zealous but undiscerning Christian becomes enslaved to others, to their own uneducated conscience, to an unbiblical pattern of life. But if you're discerning, you're able to figure out what God calls you to do from the Scriptures, and you're not enslaved to any sort of do's and don'ts that might be extrabiblical.\n\nTrue discernment also enables the Christian to recognize that the exercise of freedom is not essential to the enjoyment of it. The discerning Christian knows that he is free, but that he doesn't necessarily have to exercise his freedom all the time — that it is okay to sacrifice your freedom for the sake of others. That's the point Paul makes at the beginning of Galatians 5.\n\n### 4. A Catalyst for Spiritual Development\n\nAnd then discernment serves as a catalyst for spiritual development. The more you seek discernment, the more discerning you get — and the more discerning you get, the more discernment God gives you. Proverbs 14:6 says:\n\n> *\"A scoffer seeks wisdom and does not find it, but knowledge is easy to him who understands.\"*\n\nThe word \"understands\" there is the Hebrew word for discernment.\n\n## How Do We Obtain Discernment?\n\nNow, how do we obtain biblical discernment? What is the foundational, essential prerequisite for spiritual discernment?\n\nJesus. Being saved by Jesus Christ is the most foundational, basic prerequisite for spiritual discernment. A non-believer can't have the sort of thing we're talking about here. The sad thing is that the church often looks to the unbeliever for how to live — the psychologist, the psychiatrist — to know how to love, how to submit to husbands, how to carry their marriages — when they don't have spiritual discernment.\n\nHow do we obtain such discernment? Through the Lord Jesus Christ, through the Spirit that dwells within us. That's why we all should pray as Psalm 119:125 says:\n\n> *\"I am your servant; give me understanding.\"*\n\nOnly the servants of Christ can have spiritual discernment.\n\n## Practical Application: A Case Study\n\nAll right. Now we're going to talk about how to apply discernment. I tried to construct a scenario that would help us apply some things. A lot of us — all of us — are familiar with marriage, whether we be married, or parents of the married, or witnesses to others' marriages. We've all been in the context of marriage somewhere. So I thought a good way to practice discernment would be a scenario involving marital conflict.\n\n### The Scenario: Bob and Stephanie\n\nLet's meet Bob and Stephanie — I tried to give names that nobody in the church has, so nobody thinks I'm talking about them. Bob is 33 years old, Stephanie is 32. They've been married for 10 years. They met in high school, dated in high school, went to separate colleges, then reconnected during their senior year of college, and married a few months after graduation.\n\nBob works in IT and Stephanie is an architect. Both are active members and have regularly attended for five years. Bob is very involved in the hospitality ministry. They are your friends — not the closest friends, but friends nonetheless.\n\nThey come to you wanting help. Here is what they tell you the problems are: they fight regularly over finances, Stephanie withdraws during conflict, and Bob has an issue with anger. That's all — please help.\n\nNow a little more history. You have a three-year friendship with Bob and Stephanie. You first got to know them when they started attending the church. Two years later they joined. Last Saturday after book study they asked if they could stay a little later so they could talk with you. After everyone left, you asked: so what's going on?\n\nAlmost immediately they both started opening up. Bob and Stephanie have been fighting a lot over the last two years and the fighting has been getting worse. Bob says he's holding down a very stressful job — he's the lead developer at the company, he feels overworked, and when he comes home he doesn't have much patience for Stephanie. He says: \"She doesn't care about what I want. She is always complaining about how I don't care about how long I work, about how I never listen. When I get home I need time to unwind because I've had a very stressful day. She complains that I'm not willing to help with anything. It's not true — I'm willing to help, I just need some time.\"\n\nStephanie's worried not so much about Bob's work hours but about his temper. She says: \"He's got a raging temper. I'm scared because when he gets angry he's started hitting things. He has never hit me, but I always feel like he is walking the line between anger and abuse.\" Stephanie gave up her career after they had their son. She enjoys being at home and being a mother. She has pleaded with Bob to go with her to a counselor. \"I feel distant from him. We don't talk like we used to. We fight more than we talk. Things break down and I can't deal with it anymore, so I just pull back.\"\n\nBob adds: \"We have a tight budget because it is so expensive to live here. We fight often about money. She spends too much and I wish she would be more careful.\" Stephanie disagrees and says she's careful with their money and that Bob has unrealistic expectations about what it costs to raise a child and maintain a family. Bob responds: \"She expects me to be perfect and if I'm not, she reminds me of my mistakes. She's impossible to live with.\"\n\n### Applying Discernment to the Scenario\n\nAll right. What are the possible entry points into Bob and Stephanie's life? How can you enter into their lives?\n\nWell, to begin with, they asked you for help. You don't have to kick the door to get in. But how are you going to first access them? What would you say? \"I'm glad you're here.\" You acknowledge the situation. Sometimes the door is open; sometimes you have to find the window. Sometimes — figuratively speaking — you have to kick the door down. But you have to figure out how you're going to enter into the situation.\n\nAnd notice that they're not very good at figuring out what the issue is themselves. When you ask him, she's the problem. When you ask her, he's the problem. You're going to have to help them figure it out.\n\nHow do we incarnate Christ to them? Are you going to be the Christ of Matthew 23 — *\"Woe to you, Pharisees\"*? Or are you going to be the Christ of Matthew 11 — *\"Come to me, for I am gentle and lowly in heart\"*? There's a time for each of those. Discernment will tell you which is which.\n\nWhat questions do you want to ask Bob and Stephanie?\n\n- \"What have you done about this so far?\"\n- \"Have you been praying for each other?\"\n- \"Are you both Christians — do you have a basic understanding of the gospel?\"\n- \"What do you hope to accomplish in talking to me? Do you want me to be a hammer on the other person, or are we talking about growing in Christ together?\"\n\nHaving all the cards on the table is important. And notice: Bob never addresses the anger question. He doesn't defend himself. What do we gather from that? They're talking past each other. They're each there for you to fix the other person.\n\n### Heart Issues and Biblical Change\n\nQuestions about budgets are great — but they're probably a little bit down the line, because you want to address the heart first. Out of the heart spring the issues of life. What are some of the heart issues you observe just from the scenario?\n\n- Selfishness — on both parts\n- Stubbornness — on both parts\n- Pride — on both parts\n- Anger\n- Idolatry — if Bob doesn't get his time to unwind after work, he's willing to sacrifice his relationship on the altar of that idol of relaxation\n\nThose are the issues you need to help them with first. You might want to touch on budgets to give a taste of what you can help them with. But the heart is the most important thing, because out of it spring the issues of life.\n\nAnd if you really want to help somebody, you need to have serious thoughts about the pattern of biblical change. How do people change? That's your goal in every interaction — that they change. If you can't remember anything else about change, remember this: put off and put on. That's the basic dynamic of biblical change.\n\nSo if anger is the issue — what does Bob need to put off? Anger. Now, anger is often a byproduct of something else, so you need to figure that out. But putting off is not enough — that's not complete change. What is the put-on? Patience. Love. Compassion.\n\nThere's a particular passage that speaks to this — Ephesians 4:25-26, right after that put-off and put-on dynamic passage. The opposite of anger in a relationship is actually speaking the truth in love and addressing issues as they happen. Keeping short accounts. Not letting things linger. That's the put-on.\n\n### Clarifying Responsibility\n\nIn what ways do you need to clarify responsibilities? Who is responsible for what?\n\nThey are each responsible for their own actions. That's something that needs to be clarified in a situation like this, because right now he thinks she's responsible for every problem they have, and she thinks he's responsible for every problem they have.\n\nThe husband and the wife — both people — are responsible for their own actions. We have free wills. Our wills are free from any exterior compulsion; our wills are only attached to our hearts. So whatever we do, say, and think, we are responsible for those things — not somebody else.\n\nOne of the first things that will help them is this idea that they are responsible for themselves. They can't change the other person. But by God's grace, the Spirit of God can change them.\n\nThis is not a far-fetched scenario. These are real elements, in a composite scenario. These things are present in the church all the time. And you face them if you're open to help and to exercise your discernment in helping people.\n\nSo that gives an idea of how to use discernment. You need to know the Scriptures. And in a situation like this, discernment means more than knowing right and wrong — it means knowing first and second and third. What's the most important thing for me to deal with? What's the second most important?\n\n### Closing the Counseling Session\n\nHere's how you close: express compassion. \"Bob and Stephanie, I'm so sorry you guys are going through this. I'm glad you were willing to reach out to us for help. I'd love to be an instrument in God's hand in helping you. Can we meet Monday at seven?\" And then pray for them.\n\nNever end without giving some hope. \"The beautiful thing, Bob and Stephanie, is that God addresses all these things in his Word. And if you're willing to rely on the Spirit of God, there's great hope that you're going to become the sort of man, the sort of woman, that God wants you to be.\"\n\nThey leave with some hope. And one thing you have to learn in these situations is not to be surprised. No struggle, no temptation, no trial is uncommon to men. Robert Murray M'Cheyne, a Scottish pastor in the 1800s, said of himself: \"The seed of every kind of sin dwells in my heart.\" Everybody is capable of everything. That's not a cynical position — it's a compassionate one, because it helps us understand how profoundly depraved the human heart can be, and how much we all need the grace of God."};
