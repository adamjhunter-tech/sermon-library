window.LESSON_DATA = {"id": "undated-a-fond-remembrance", "title": "A Fond Remembrance", "speaker": "Dr. John Battle", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["A Fond Remembrance - GUEST SPEAKER_ Dr. John Battle - 1 Thessalonians 1.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/a-fond-remembrance-guest-speaker-dr-john-battle-1-thessalonians-1", "tags": [{"tag": "election", "source": "detected"}, {"tag": "assurance", "source": "detected"}, {"tag": "predestination", "source": "detected"}, {"tag": "faith", "source": "detected"}, {"tag": "hope", "source": "detected"}, {"tag": "love", "source": "detected"}, {"tag": "gospel", "source": "detected"}, {"tag": "Holy Spirit", "source": "detected"}], "scripture_references": [{"reference": "1 Thessalonians 1:1-10", "type": "quoted", "source": "detected"}, {"reference": "Ephesians 1:3-14", "type": "quoted", "source": "detected"}, {"reference": "1 Corinthians 15", "type": "referenced", "source": "detected"}, {"reference": "Deuteronomy", "type": "referenced", "source": "detected"}, {"reference": "1 Corinthians 1", "type": "referenced", "source": "detected"}, {"reference": "Acts", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: How Do We Know We Are Elect?", "subpoints": ["Paul gives thanks for the Thessalonians and knows they are elect", "The source of election: God the Father chooses according to His own will, not foreseen faith", "Ephesians 1 — chosen in Christ before the foundation of the world", "God chose small and ordinary people so that glory goes to Him alone"], "scripture": ["1 Thessalonians 1:4", "Ephesians 1:3-6"]}, {"title": "Evidence of Election #1: The Gospel Came to You", "subpoints": ["If the gospel comes to you, that is evidence of election", "The true gospel is not a watered-down self-help message", "The true gospel: Christ died for our sins, was buried, rose again", "We are justified by faith in Him alone — not by any work or experience of our own"], "scripture": ["1 Thessalonians 1:5"]}, {"title": "Evidence of Election #2: The Gospel Came with Power and the Holy Spirit", "subpoints": ["The power of the Holy Spirit is evident in the changing of the heart", "God gives a heart of flesh to receive the gospel", "Faith itself is a product of the Holy Spirit — full assurance is God's gift", "The elect receive the Word with much assurance"], "scripture": ["1 Thessalonians 1:5"]}, {"title": "Evidence of Election #3: The Fruits — Work, Labor, and Patience", "subpoints": ["Work of faith — visible deeds flowing from genuine belief", "Labor of love — hard, sometimes invisible effort motivated by love for God", "Patience of hope — enduring trials because of confidence in Christ's return", "God sees and rewards both the work that succeeds and the labor that appears fruitless"], "scripture": ["1 Thessalonians 1:3", "1 Corinthians 15:58"]}, {"title": "Conclusion: Being Instruments of God's Election", "subpoints": ["God chooses His people and also chooses the means — including us as witnesses", "Paul and his companions lived as examples before the Thessalonians", "We are to be parents, fathers, and mothers to those we witness to", "May we have the joy of remembering God's work in those we have reached"], "scripture": ["1 Thessalonians 1:5", "1 Thessalonians 2"]}], "summary": "Dr. John Battle, preaching as a guest while Pastor Tito Lyro was filling another pulpit, delivered this Sunday morning sermon on 1 Thessalonians 1. Noting that Paul begins his letter with thanksgiving and a confident declaration that he knows the Thessalonians are elect of God, Dr. Battle explores the question: How do we know that we are the elect of God? He argues that election has its source entirely in the sovereign will and grace of the Father — not in any foreseen faith or merit of the creature — and that this is clearly taught in Ephesians 1:3-6, where Paul says we were chosen \"according to the good pleasure of His will.\"\n\nThe sermon identifies three categories of evidence that God has elected a person. First, the gospel has come to them — the true gospel of Christ crucified, buried, and risen, received as the power of God unto salvation. Second, the gospel came with power and in the Holy Spirit, producing full assurance — for the faith to believe is itself the gift of the Spirit, and this faith, though it may waver in difficult seasons, is the mark of a regenerate heart. Third, that faith and the Spirit's work produce visible fruit: a work of faith (outward deeds consistent with the profession), a labor of love (effort that may be invisible to others but seen by God), and a patience of hope (endurance under trial because of confidence in Christ's return).\n\nDr. Battle closes by reflecting on how God uses instruments — preachers, witnesses, parents — as means of His election. Just as Paul and his team came to Thessalonica and lived as examples of the gospel among them, we are called to bear witness to Christ in our families, neighborhoods, and workplaces, trusting that God will use us as He wills to call His people.", "transcript": "## Scripture Reading: 1 Thessalonians 1\n\nPlease remain standing for the reading of God's Word. Our text this morning is 1 Thessalonians chapter 1. This is the Word of the Lord.\n\n\"Paul, Silvanus, and Timothy, to the Church of the Thessalonians in God the Father and the Lord Jesus Christ: grace to you and peace from God our Father and the Lord Jesus Christ. We give thanks to God always for you all, making mention of you in our prayers, remembering without ceasing your work of faith, labor of love, and patience of hope in our Lord Jesus Christ, in the sight of our God and Father; knowing, beloved brethren, your election by God. For our gospel did not come to you in word only, but also in power, and in the Holy Spirit, and in much assurance, as you know what kind of men we were among you for your sake. And you became followers of us and of the Lord, having received the word in much affliction, with joy of the Holy Spirit, so that you became examples to all in Macedonia and Achaia who believe. For from you the word of the Lord has sounded forth, not only in Macedonia and Achaia, but also in every place your faith toward God has gone out, so that we do not need to say anything. For they themselves declare concerning us what manner of entry we had to you, and how you turned to God from idols to serve the living and true God, and to wait for His Son from heaven, whom He raised from the dead, even Jesus who delivers us from the wrath to come.\"\n\nThis concludes the reading of the Word. You may be seated.\n\n## Introduction\n\nPastor Tito is in Scappoose today. Pastor Prussic went to Hawaii for vacation, and Pastor Tito is filling that pulpit, and we have the privilege of hearing Dr. Battle today.\n\nThank you, Elder Hoy, and what a pleasure to be with all of you again and preach behind this tall pulpit. I feel well protected back here from anything that may come forth. It is a real privilege for pastors to be able to preach in different places. Next week I will be down in Scappoose, taking the place of brother Tito, who is taking the place of brother Prussic, who is somewhere out in the wild.\n\nWherever we may be, whatever the congregation or the pastor, we are all gathered to be Christ's — Christ is present with us. We are His people, and brothers and sisters, regardless of where we live, when you gather with Christ's people you recognize your brothers and sisters. We have a common bond in Christ, a common faith, and a common hope that binds us together much more closely than mere boundaries of geography.\n\nWell, this morning I brought my ESV to preach from, and I discovered everybody has a New King James. So I'll use the pew Bible. And thanks to Brother Hollander behind me, I have a large-print Bible — so thank you, brother.\n\n## How Do We Know We Are the Elect of God?\n\nAs we look at this passage, you may have noticed that the apostle wrote to the Thessalonians that in verse 4 he mentions their election by God. And I want to speak this morning on the election of God — and how do we know that God has elected us? The word elect means to choose or select, and we believe in the doctrine that God elects His people. He chose them before the foundation of the world — that is predestination.\n\nI recall that at a synod meeting many years ago, a group of ministers went out to distribute leaflets inviting neighbors to vacation Bible school. They came to one house where a disheveled man answered through the screen door. \"What do you want?\" They explained they were from the Bible Presbyterian Church. His response was memorable: \"Presbyterians! I know about you Presbyterians. You believe in pro-CRASTINATION.\" He didn't know his theology very well, but he sure did know Bible Presbyterians. We may practice procrastination, but our doctrine is better than that. We believe in predestination.\n\nI hope it does not happen to us as it happened with a certain presidential candidate who went to bed thinking he had won, only to wake up the next morning to discover he had not. I hope we do not think we are elect and then discover we are not. It is good to check — to make our calling and election sure.\n\n## The Source of Election\n\nIn this passage, looking especially at verses 4 and 5, we see some keys to determining if we are indeed elect.\n\n\"Knowing, beloved brethren, your election by God\" — the source is God the Father. Not something in us. Some people think God looked into the future to see what we would do, and if we did the right thing He elected us. But the Bible does not teach that at all. It is an election of grace — He chooses people by grace, which means they do not deserve it. God chooses us according to His own will, His own purpose.\n\nTurn for a moment to Ephesians 1:3. \"Blessed be the God and Father of our Lord Jesus Christ, who has blessed us with every spiritual blessing in the heavenly places in Christ, just as He chose us in Him before the foundation of the world, that we should be holy and without blame before Him in love, having predestined us to adoption as sons by Jesus Christ to Himself, according to the good pleasure of His will.\" I deliberately misread that verse — I said \"according to the goodness of our lives.\" But what does it actually say? \"According to the good pleasure of His will.\" It was His decision.\n\nBack in Deuteronomy, God said to Israel: \"I chose you not because you were the greatest of all people — you were the smallest. I chose you for My own purpose and My own glory.\" With us, God chooses ordinary people. Paul says in 1 Corinthians 1, \"Not many wise, not many noble.\" Why does He do that? So that the glory for all that is accomplished by His church goes to God. If your session were the greatest brain trust drawn from the most brilliant minds in the country, people might think the results came from human wisdom. God chooses ordinary people and gives them the gifts necessary for the offices He calls them to fill.\n\n## Evidence #1: The Gospel Came to You\n\nNow, the election of God is shown by its results, its effects. Verse 5: \"For our gospel did not come to you in word only, but also in power and in the Holy Spirit and in much assurance.\" He says: I know you are elect because of several things.\n\nThe first evidence: the gospel has come to you. If the gospel does not come to you, that is evidence you are not elect. If you hear the gospel, that is evidence God has elected you. Now, a lot of people think they have heard the gospel when they have not — because the gospel they heard is a watered-down version: \"Be good and go to heaven,\" or \"Accept Jesus into your life\" in some mystical experience that involves no repentance and no faith. That is not the true gospel.\n\nThe true gospel, as Paul summarizes it in Scripture, is: Christ came, He died for our sins, He was buried, He rose again, and we are justified by faith in Him. When we come before God at the judgment, we say: \"Christ died for me.\" Our entire hope is in Him. We cannot say, \"Here is where I signed my name on a piece of paper; here is when I walked the aisle; here is when I cried.\" We do not look at our own acts as the basis of how we get into heaven. It is what Christ has done. And that is the good news.\n\n## Evidence #2: The Gospel Came with Power and the Holy Spirit\n\nThe gospel came \"in power and in the Holy Spirit and in much assurance.\" The power of the Holy Spirit is still evident in the church today — primarily in the changing of the heart. Someone prayed this morning that God would give us a heart of flesh. That is so important.\n\nEveryone who can read can read the Bible. Some read it and say, \"That's interesting,\" and dismiss it. But some, when they hear it, say, \"Yes, that's right\" — and just accept it as true. That faith is the product of the Holy Spirit. You can bring someone intellectually to highly esteem the Scriptures. But there is another level — full assurance of the truth of Scripture — and that is the faith the Holy Spirit gives to those who are elect. If you have that faith, it is evidence that you are the elect of God.\n\nA true Christian can sometimes experience darkness and doubt — God sometimes puts us through dry periods to make us more dependent upon Him and more humble. But the Christian has that underlying confidence, and God restores that person through prayer and obedience.\n\n## Evidence #3: The Fruits — Work, Labor, and Patience\n\nPaul says when he prays for them, he remembers their work of faith, labor of love, and patience of hope (v. 3). Faith and hope and love that are genuine are visible — they produce fruit.\n\nYour **work of faith** — your faith produces deeds. You are all here today, which is evidence to me that you have faith. Now it could be that someone dragged you here against your will. But the congregation as a whole, as Paul looks at them, has faith that produces work. And the Bible says if you don't have works, your faith is dead — not real.\n\nYour **labor of love** — a mother loves her baby. When the baby cries at 2 a.m., she gets up and takes care of it. Labor is that which overcomes resistance. Sometimes you can labor greatly and not seem to accomplish very much. But God sees both our work and our labor. In 1 Corinthians 15, \"Therefore my beloved brethren, be steadfast, immovable, always abounding in the work of the Lord, knowing that your labor is not in vain in the Lord.\" Thomas Edison reportedly tried hundreds of materials before finding the right filament for the lightbulb. He said of each failure: \"It's not a failure — now I know this doesn't work.\" Every labor has a purpose in God's plan, even if we cannot see it.\n\nYour **patience of hope** — our hope is the coming of Christ, as mentioned at the end of chapter 1: \"to wait for His Son from heaven.\" Patience does not mean indifference to whether He comes soon. It means enduring the trials and difficulties because you have the hope of His coming — being faithful to Christ even under persecution, because you know in the resurrection you will have the reward from Him. Paul says: I can see your election because I can see the characters God has worked in you by His power and by the Holy Spirit.\n\n## Instruments of God's Election\n\nAt the end of verse 5, Paul mentions that someone actually came to them with the gospel: \"you know what kind of men we were among you for your sake.\" God chooses His people, but He also chooses the means by which the gospel comes to them. That is where we come in as witnesses. God commands us to bear witness to Jesus Christ — to our families, our neighbors, our workplaces.\n\nIn chapter 2, Paul says: \"We were like fathers to you. We were like mothers to you. We worked hard so that we could be with you. And we lived as examples before you.\" The way we live and the attitude we have toward those to whom we witness is vital.\n\nMay God give each of us the assurance that we are His — both by our faith and by our life. And may we then also be the instruments of God's election, bringing the gospel to others.\n\n## Closing Prayer\n\nOur Father, we thank you for the wonderful privilege it is to bear the good news of Jesus Christ. We thank you that you have brought it to us, and by your Spirit have enlightened us to receive the gospel and to trust in our Lord and to seek to serve Him. And we pray, Lord, that you would help us to be instruments of God for others, just as Paul was — that we would be able to have the joy of remembering God's work among those whom we have contacted and known. And Lord, we ask your blessing upon us now in Jesus' name. Amen."};
