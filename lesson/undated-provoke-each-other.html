window.LESSON_DATA = {"id": "undated-provoke-each-other", "title": "Provoke Each Other", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["Provoke Each Other - Pastor Tito Lyro - Hebrews 10_19-31.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/provoke-each-other-pastor-tito-lyro-hebrews-1019-31", "tags": [{"tag": "Lord's Day", "source": "detected"}, {"tag": "church", "source": "detected"}, {"tag": "preaching", "source": "detected"}, {"tag": "gospel", "source": "detected"}, {"tag": "love", "source": "detected"}, {"tag": "good works", "source": "detected"}, {"tag": "perseverance", "source": "detected"}, {"tag": "judgment", "source": "detected"}, {"tag": "Christology", "source": "detected"}, {"tag": "community", "source": "detected"}], "scripture_references": [{"reference": "Hebrews 10:19-31", "source": "ai"}, {"reference": "John 14:6", "source": "ai"}, {"reference": "Hebrews 3:1", "source": "ai"}, {"reference": "Matthew 7:3", "source": "ai"}, {"reference": "Acts 27:39", "source": "ai"}, {"reference": "Hebrews 9:27", "source": "ai"}, {"reference": "1 John 4:10", "source": "ai"}, {"reference": "1 Corinthians 13:4-8", "source": "ai"}, {"reference": "John 15:10", "source": "ai"}, {"reference": "Galatians 5:14", "source": "ai"}, {"reference": "Romans 12:1", "source": "ai"}], "outline": [{"point": "I. The Gospel That Compels Us to Act (Hebrews 10:19-21)", "subpoints": ["A. We have bold, confident access to God through the blood of Jesus Christ", "B. Jesus is our high priest interceding for us continually — not just in the past", "C. The sacrifice of Christ was accepted by God as proven by the resurrection"]}, {"point": "II. Three Gospel Actions (Hebrews 10:22-25)", "subpoints": ["A. Draw near to God with full assurance of faith (v. 22)", "B. Hold fast the confession of our hope without wavering (v. 23)", "C. Consider one another to stir up love and good works (v. 24)"]}, {"point": "III. The Task: Think Carefully About How to Stir Each Other Up", "subpoints": ["A. The word 'consider' means to observe carefully, thoughtfully, and thoroughly", "B. The word 'stir up' usually means to provoke or irritate — here used positively", "C. The love we provoke is self-giving, cross-shaped love (1 Corinthians 13; John 15:10)"]}, {"point": "IV. The Manner: Not Forsaking, But Exhorting (Hebrews 10:25)", "subpoints": ["A. Forsaking means to desert or abandon — applied here to corporate worship", "B. Ways to forsake the assembly beyond physical absence: critical spirit, unpreparedness, selfishness", "C. Exhorting means earnest, heartfelt, life-habit of urging one another to hold fast to Christ"]}, {"point": "V. The Encouragement and the Danger (Hebrews 10:25-31)", "subpoints": ["A. The day is approaching — meeting Christ at death intensifies the urgency of mutual exhortation", "B. If we abandon Christ, no other sacrifice remains for sin (v. 26-27)", "C. It is a fearful thing to fall into the hands of the living God (v. 31)"]}], "summary": "Prompted by a meeting with fellow pastors who were worn down by their congregations' unwillingness to gather, Pastor Lyro turns to Hebrews 10:19-31 to demonstrate that Christians cannot arrive at the end of the race without one another — God has appointed mutual exhortation as one of the means by which He preserves His people to glory. The passage begins with the gospel: because Christ's blood has opened the holy place and He now intercedes as our great high priest, we have bold access to the Father, and that confidence should compel us into three gospel actions — drawing near to God, holding fast our confession of hope, and thinking carefully about how to stir each other up to love and good works.\n\nThe heart of the sermon unpacks Hebrews 10:24-25, showing that the word translated 'consider' demands thorough, strategic, care-filled attention to the spiritual state of fellow believers, while the word 'stir up' — normally meaning to irritate or provoke — is here used positively to describe the energy and intentionality we should bring to encouraging one another. This happens by not forsaking the assembly (which goes beyond physical presence to include attitude and engagement) and by earnestly exhorting one another to hold fast to the confession that Jesus is Lord. The sermon closes with the sobering warning that abandoning Christ leaves no further sacrifice for sin, and that the day when every believer will meet God is approaching — making the ministry of mutual encouragement urgent and eternal in its stakes.", "transcript": "## Introduction: We Cannot Arrive at the End Without One Another\n\nThis morning I had planned to continue in Ephesians 6:17, and we will reserve that for next week, Lord willing. We should have two sermons left in our Ephesians series to tie everything together nicely.\n\nThe desire to preach this sermon arose from a monthly meeting I have with six or eight like-minded pastors. We meet on the third Thursday of each month for two hours to pray, to study together, and to think about how our different churches can work together to saturate the Olympia, Tumwater, and Lacey area with the gospel.\n\nAt this past Thursday's meeting, I was looking around the table and they just looked old. No joke — just exhausted and old. Navigating this past year has worn them down. Their testimonies were about how hard it is to convince their people that they should be together in the house of the Lord. I felt very sad for them, and also very thankful for you and for our congregation — because that has not been a major struggle for us. We have people who think differently from one another, people on exact opposite ends on several issues, and yet we have been able to stay together as a congregation. And to see these young men who now looked like old men, fewer hairs on their heads, gray heads — I do not know if it is my subjective perception, but that is how they looked — struggling to figure out what they did wrong, trying to understand why the people of God do not love the church of God. That is a sad situation.\n\nAnd that turned my thoughts: let us set Ephesians aside for a moment and look at Hebrews 10. Let us remind ourselves of the importance of gathering as the church of Jesus Christ.\n\nI want us to see here that we cannot arrive at the end without one another. In a very real way, we need each other. God's people are instruments in God's hand for the preservation of his people. God uses his own people, motivated by the gospel, as a means to preserve his people to the end. One of the instruments that God uses to cause Christians to live by faith until death is the ministry of other Christians in their lives. Every second we live, we are closer to dying. And we need each other in all those seconds so that we can arrive at the end.\n\nThe book of Hebrews speaks of a cloud of witnesses around us, cheering us on to finish the race and fall into Jesus' arms. That cloud is not only the Old Testament saints whose names we read in Hebrews 11. The cloud of witnesses includes us — those running alongside each other, the previous generation we knew who has gone before, cheering us to arrive at the end. God instituted that. God made it so that we need each other. And in that sense, we are responsible for each other's eternal well-being.\n\nProper thinking about this is of the utmost importance in a time when Christians are no longer eager to be together. Somewhere around 50% of the American population was attending church. Statistics are suggesting that when this is all said and done, only about 30% of those who were attending church before the pandemic will return. A lot of this data comes from mainline churches, and there is some cause for comfort in that. But even the evangelical world is going to face some hard realities. I believe the church will be more purified through this, that it is in part a weeding-out process. But it is sad that the church has not prepared itself to face things like this — things that seem so extraordinary in our time but that the church has faced repeatedly throughout history.\n\nI would encourage you sometime — not today, but sometime — to read Psalm 90 or thereabouts. It was a poem written by a pastor when his entire town was devastated by the plague. Every other pastor fled the town. He stayed behind, conducting 50 funerals a day, including for his own children. These people may not have had germ theory, but they understood that these things spread through being around others. And yet these people refused to abandon the brethren — because they understood there is more to life than physical survival. We are living in perhaps the only era of the church where physical well-being has become the ultimate, if not soul-determining, factor in whether the church gathers. Remember what Luther said: \"The body they may kill — but that is all that can happen.\" The worst thing that can happen to us is that we see Jesus a little sooner than we planned.\n\nI want to break this passage into seven parts — small parts, so do not be alarmed by the seven-part outline.\n\n## I. The Gospel That Compels Us (Hebrews 10:19-21)\n\nWe start with the gospel, because we must start everything with the gospel.\n\nIn verses 19-21, the Spirit describes the gospel in terms of Jesus as our High Priest who gives us access to God through his blood. There are at least two truths these verses tell us about the gospel.\n\nFirst, we have bold, confident access to God through the blood of Jesus Christ. In chapter 9, the Spirit described how Jesus came before the Father and said, \"This is for my people. I have died on the cross for my people. Father, you do not have to pour your wrath upon them anymore, because you have poured it upon me. Here is the proof: my blood shed on Calvary.\" And the Father accepted that sacrifice — as proven by raising him from the dead. If you are a believer and you want to know whether God has accepted you, look at the resurrection of Christ. That is the proof that God the Father accepts you in the Beloved.\n\nSecond, Jesus is our interceding High Priest. He opened the Holy Place. Remember that in Matthew 27, the moment Jesus died on the cross, the veil separating the Holy Place from the Most Holy Place was torn from top to bottom — signifying that you and I now have clear and free access to God through the Lord Jesus Christ, and he is our High Priest there.\n\nNotice in verses 19 and 21 the repeated word \"having\": *having* boldness, *having* a high priest. These are stated in the present tense, expressing continuity. The blood of Jesus was not effective only in the past — it continues to be effective today. Jesus was not only our priest in the past — he continues to be our priest now, interceding for us now.\n\n> *\"Therefore, brethren, having boldness to enter the Holiest by the blood of Jesus, by a new and living way which He consecrated for us, through the veil, that is, His flesh, and having a High Priest over the house of God...\"* (Hebrews 10:19-21)\n\nHis own flesh was torn so that we may have access to the Father. We have access to the very presence of God. That is why Paul says we can call him Abba — an intimate term, something like \"Daddy.\" The Puritans described prayer as crawling onto your daddy's lap. That is the picture Abba gives us of our relationship to God. And that is true because Jesus Christ is your High Priest, interceding for you, and you can come and whisper your petitions to the Father and he will listen — confidently.\n\nAs Jesus said in John 14:6:\n\n> *\"I am the way, the truth, and the life. No one comes to the Father except through Me.\"* (John 14:6)\n\n## II. The Gospel Compels Three Actions (Hebrews 10:22-25)\n\nThe confidence we have in the gospel of Jesus Christ must compel us into gospel action. In verses 22-25, the Spirit gives us three actions.\n\n**First**, approach God. Verse 22:\n\n> *\"Let us draw near with a true heart, in full assurance of faith, having our hearts sprinkled from an evil conscience and our bodies washed with pure water.\"* (Hebrews 10:22)\n\n**Second**, hold on to the hope. Verse 23:\n\n> *\"Let us hold fast the confession of our hope without wavering, for He who promised is faithful.\"* (Hebrews 10:23)\n\n**Third**, think of ways to stir each other up. This is where we will spend most of our time.\n\n## III. The Task: Consider One Another (Hebrews 10:24)\n\n> *\"And let us consider one another in order to stir up love and good works.\"* (Hebrews 10:24)\n\nThe gospel compels us to *consider* others — to think about others. The word translated \"consider\" here also means to notice, to observe carefully, to contemplate, to pay careful attention. In the New Testament, it conveys careful, thought-out, and thorough consideration.\n\nFor example, in Matthew 7:3, Jesus says, \"Why do you look at the speck in your brother's eye, but do not *consider* the plank in your own eye?\" In Acts 27:39, when Paul and the crew see land after the shipwreck, they *observe* the bay with a beach onto which they might safely run the ship — not a casual glance, but careful, precise observation of where it would be safest to land. That is the kind of consideration we are called to give one another in Hebrews 10:24.\n\nIn Hebrews 3:1, the Spirit says: \"Therefore, holy brethren, partakers of the heavenly calling, *consider* the Apostle and High Priest of our confession, Christ Jesus.\" Do you think the Spirit wants us to consider Jesus casually? No — thoughtfully, thoroughly, carefully. That is the kind of thinking we are to bring to our fellow believers: figuring out ways we can encourage them to love and good works.\n\n### The Purpose: Stir Up Love and Good Works\n\nThe Holy Spirit uses here a word for \"stir up\" that usually carries a negative connotation — it means to provoke or irritate. But here it has a positive meaning. It still carries the idea of creating pent-up energy that causes one to act.\n\nSiblings — probably not our kids, since all our kids are perfectly sanctified — but siblings often spend considerable time and creativity thinking of ways to irritate each other and provoke each other into trouble. The Holy Spirit is painting that same picture, but in the opposite direction. We are to demonstrate the same tenacity, hard work, and energy in figuring out ways to be used by God in each other's lives — to cause each other to love God and others more, and to serve God and each other more.\n\n### What Kind of Love?\n\nWhat kind of love are we supposed to be provoking one another into? It is a self-giving love that finds its ultimate pattern and paradigm in the cross of Jesus Christ. As 1 John 4:10 says:\n\n> *\"In this is love, not that we loved God, but that He loved us and sent His Son to be the propitiation for our sins.\"* (1 John 4:10)\n\nPaul defines this love in 1 Corinthians 13:\n\n> *\"Love suffers long and is kind; love does not envy; love does not parade itself, is not puffed up; does not behave rudely, does not seek its own, is not provoked, thinks no evil; does not rejoice in iniquity, but rejoices in the truth; bears all things, believes all things, hopes all things, endures all things. Love never fails.\"* (1 Corinthians 13:4-8)\n\nAnd this love, according to Jesus, results in obedience. In John 14:15, the very last night before the crucifixion, Jesus says to his disciples: \"If you love Me, keep My commandments.\" That is the kind of love we want to stir up in each other's hearts — a love that drives us to obedience.\n\nWhen the religious leaders asked Jesus what is most important, he summarized the entire Bible in two short verses: love God with everything in you, and love the people around you. When Paul was given the same question by the Galatians, he summarized it as love for neighbor:\n\n> *\"For all the law is fulfilled in one word, even in this: 'You shall love your neighbor as yourself.'\"* (Galatians 5:14)\n\nWhere is love for God in that summary? The point is: we love God by loving one another. As the Apostle John writes:\n\n> *\"If anyone says, 'I love God,' and hates his brother, he is a liar; for he who does not love his brother whom he has seen, how can he love God whom he has not seen?\"* (1 John 4:20)\n\nSo what kind of love are we to provoke each other into? The kind that loves God *by* loving the people around us, especially the people of God.\n\n### What Kind of Good Works?\n\nThe word translated \"good\" in \"good works\" also means beautiful. We are to encourage each other toward beautiful works before God — works that are nothing more than obedience to God's perfect law of liberty, as James calls it. Our confession of faith says that good works done in obedience to God's commandments are the fruit and evidences of a true and living faith.\n\n## IV. The Manner: Not Forsaking, But Exhorting (Hebrews 10:25)\n\nHow do we do this? The Spirit gives us two phrases in verse 25:\n\n> *\"...not forsaking the assembling of ourselves together, as is the manner of some, but exhorting one another, and so much the more as you see the Day approaching.\"* (Hebrews 10:25)\n\n### Not Forsaking\n\nThe word \"forsaking\" here means to abandon, to desert. It is the very same word used in 2 Timothy 4:10, where Paul says that Demas, for love of the world, *forsook* him. This forsaking of the assembly is not a reference to any casual Christian gathering. It refers specifically to the times when the people of God are gathered together to worship, to pray, to study God's Word. The Greek word translated \"assembling\" is used for the religious gatherings of God's people — it includes the main worship service and all other gathered meetings.\n\nYou simply cannot stir up love and good works in another person if you forsake the times when God's people are gathered together. You cannot do what Hebrews 10:24 describes via Instagram, Facebook, TikTok, or any other social media.\n\nSome in the Hebrew church had already begun to forsake corporate worship — verse 25 says \"as is the manner of some.\" Their gatherings were potentially dangerous. Depending on the local magistrate's attitude, Christianity was illegal, and meeting together risked imprisonment, or stoning, or beating. There was also significant social stigma attached to being associated with Christian gatherings.\n\nDo those three elements ring a bell? We think the Bible was good for when it was written but does not understand our times. But do you think our God, who created the universe, did not know this was coming? God appointed 2020. It did not happen by accident. And through it — sadly, from a human perspective — his church is being purified.\n\nNotice that the Spirit does not say these forsaking brothers had denied the faith. But they had taken a major step in that direction. It is deeply significant that the strongest warning against apostasy in the entire Bible immediately follows this exhortation not to forsake the assembling of ourselves together. The Holy Spirit has a purpose for the order in which he arranges things.\n\n**What are some ways we forsake the assembly?**\n\nThe most obvious: not being present when the church gathers. I like stating the obvious, because every week after I say that the wine is in the inner ring and grape juice in the outer ring, someone asks me which is which. So — the obvious needs saying. Absence from the gathering of the church is not the occasional illness that keeps you home. It is the deliberate neglect to attend. It is treating attendance as a matter of convenience. It is having an attitude that work, entertainment, or other things are more important than gathering with God's people on the Lord's Day. The Spirit of God tells us that this is a step toward apostasy from Christ himself.\n\nParents — I am not a prophet, and I am not a son of a prophet, but I have been a minister for over 25 years. And I say this with complete conviction: if you do not love the church, your children will not love Jesus. As plain as that. If you do not love the gathering of the body of Christ, your children will not love Christ himself.\n\nBut there are other ways we can forsake the assembly without being physically absent:\n\n- Coming with a **critical attitude**. That is forsaking the assembly in spirit.\n- Coming **unprepared** — sleeping through the service. How do you prepare for the Lord's Day? How is your Saturday evening? Your Sunday morning? Do you pray? And if you often think the sermon is poor — how much have you prayed for it to be good? Coming unprepared is a form of forsaking.\n- Standing with the hymnal or bulletin in hand, **not participating in worship**. You are not doing the work of worshiping God.\n- Coming **not believing** that God will bless you through the gathering. God says he will bless you every time you come to church. Coming without that expectation is a form of forsaking.\n- Coming with a **selfish attitude**, seeking only what you can get out of it and how you can be served. Notice that this passage says: you think of others, and let others think of you. Do not worry about yourself — others will do that.\n\n### Exhorting One Another\n\nOn the positive side, we exhort — and this is a continued exhorting, perhaps better expressed as exhorting as a manner of life. The word for exhorting carries a begging quality to it. In Romans 12:1, it is translated \"I beseech you.\" In Philippians 4:2, Paul *implores* his readers. It has an earnestness, a heartfelt depth — not a superficial concern, but genuine care.\n\nDo you really care for the people around you? If you do not, you are sinning — because Christ cares for them. Who are you? Who am I to not love someone for whom Christ died?\n\nWhat are we to be exhorting one another about? Looking at the broader context of verses 19-25, the answer is in verse 23: hold fast to the confession of our hope. The confession that Jesus Christ is Lord. When you look at the whole book of Hebrews, the confession that Jesus is Lord governs everything. So what are we supposed to exhort each other to do? To hold fast to the only confession that brings hope — that Jesus Christ is Lord.\n\nThe government is not Lord. And yes, a lot of you will say amen to that. But what you want in your heart is not Lord either. It is easy to rail against rulers who want us to do things we do not want to do. But the desires of our heart are not Lord either. Jesus Christ is Lord. More often than not, we need to be saying that to each other. Jesus is our Lord — and holding fast to that confession must shape how we serve one another.\n\nWe declare that Jesus is Lord by serving the people around us. The word for servant in Paul's letters — \"Paul, a servant of Jesus Christ\" — is the Greek word for *bondservant*, a slave. We are slaves of Jesus Christ. And we declare that Jesus is Lord by serving each other.\n\n## V. The Encouragement and the Danger (Hebrews 10:25-31)\n\n### The Day Is Approaching\n\nThe Spirit gives us an encouragement for performing this task: \"so much the more as you see the Day approaching.\"\n\nThis is the Day of reckoning — the day when the Lord Jesus will judge. From the perspective of the original readers of Hebrews, this is not primarily a declaration about the imminence of Christ's second coming. In Hebrews 9:27, the Spirit has already said it is appointed for man once to die, and after that judgment. Every second we live, we are closer to dying — closer to meeting the Lord. The exhorting of one another takes a deeper, more urgent meaning when we consider that it is a means God has appointed for us to be preserved until that day.\n\nWouldn't you be more diligent if you believed that the eternal state of your brother or sister in Christ depended on your exhorting them? In a very real sense, it does.\n\n### The Danger of Failing\n\nThe danger of failing in this task is enormous. Verses 26-27:\n\n> *\"For if we sin willfully after we have received the knowledge of the truth, there no longer remains a sacrifice for sins, but a certain fearful expectation of judgment, and fiery indignation which will devour the adversaries.\"* (Hebrews 10:26-27)\n\nIf we put Christ aside — and it starts by forsaking the assembly of ourselves together — there is no other sacrifice for sin. Verse 28 says that disregarding Moses' law brought death; verses 29-30 say that rejecting Christ and insulting the Spirit of grace will bring a much worse consequence. And verse 31:\n\n> *\"It is a fearful thing to fall into the hands of the living God.\"* (Hebrews 10:31)\n\nA Christ-less eternity is a fearful thing.\n\n## Conclusion: The Gospel and the Call\n\nJesus Christ, God in the flesh, was born of a woman, lived a perfect life on behalf of his people who could not live perfectly before God, died on the cross as punishment for the sins of his people — at which time God the Father poured on him the infinite weight of his wrath, due to every sinner — and on the third day was raised from the dead, securing new life for all his people. All of this, so that those who believe that Jesus Christ did all these things for them may not perish but have everlasting life and fellowship with God. That is the gospel.\n\nWithout firm faith in what I just described, there is no hope of fellowship with a loving God and no hope of eternal life. All that is necessary for what Christ accomplished to be applied to you is faith in him, and nothing else.\n\nAnd then this gospel compels us into action. Christ living in us and through us by the Spirit causes us to live gospel-filled lives. As we do that, we will think of ways to stir up and propel each other to love and good works — by being with each other when the church is gathered, and by exhorting one another to hold on to the confession of our hope. And that confession is this: Jesus is Lord.\", and for this morning's reading, we're going to turn Hebrews chapter 10. We're going to read
