window.LESSON_DATA = {"id": "2023-09-20-patience-in-affliction", "title": "Patience in Affliction", "speaker": "Elder Nick Anderson", "date": "2023-09-20", "session": "SS", "series": null, "series_part": null, "parts": 1, "source_files": ["9-20-23 Elder Nick Anderson.txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/9-20-23-elder-nick-anderson", "tags": [{"tag": "patience", "source": "detected"}, {"tag": "suffering", "source": "detected"}, {"tag": "affliction", "source": "detected"}, {"tag": "sanctification", "source": "detected"}, {"tag": "hope", "source": "detected"}, {"tag": "providence", "source": "detected"}, {"tag": "perseverance", "source": "detected"}], "scripture_references": [{"reference": "Hebrews 12:1", "type": "quoted", "source": "detected"}, {"reference": "Hebrews 12:2", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 12:10-11", "type": "quoted", "source": "detected"}, {"reference": "Matthew 16:24", "type": "quoted", "source": "detected"}, {"reference": "Psalm 62:1", "type": "quoted", "source": "detected"}, {"reference": "Lamentations 3:27-29", "type": "quoted", "source": "detected"}, {"reference": "Colossians 1:11", "type": "referenced", "source": "detected"}, {"reference": "1 Thess 1:6", "type": "quoted", "source": "detected"}, {"reference": "Romans 8:25", "type": "quoted", "source": "detected"}, {"reference": "1 Cor 10:13", "type": "quoted", "source": "detected"}, {"reference": "Revelation 7:14", "type": "quoted", "source": "detected"}, {"reference": "Romans 15", "type": "referenced", "source": "detected"}, {"reference": "Psalm 84:5", "type": "referenced", "source": "detected"}, {"reference": "Psalm 62:12", "type": "referenced", "source": "detected"}, {"reference": "Psalm 77:7-9", "type": "referenced", "source": "detected"}, {"reference": "Jonah 4:8", "type": "referenced", "source": "detected"}, {"reference": "Job 6:8-9", "type": "referenced", "source": "detected"}, {"reference": "Psalm 73", "type": "referenced", "s of the Holy Spirit' (1 Thess 1:6)", "4. Steadfastness/perseverance: not quitting halfway through the race (Heb 12:1)"], "scripture": ["Matt 16:24", "Ps 62:1", "Lam 3:27-29", "Col 1:11", "1 Thess 1:6", "Heb 12:1"]}, {"title": "Hope: The Fuel of Patience", "subpoints": ["Patience cannot exist without hope; there is no patience in hell because there is no hope in hell", "Hope must be for what God has actually promised — not for a specific earthly deliverance", "Four things we can hope for: (1) support in temptation (1 Cor 10:13); (2) the fruit of righteousness (Heb 12:11); (3) partaking of God's holiness (Heb 12:10); (4) the crown of life (Rev 7:14)", "Jesus is the greatest example: 'for the joy set before him he endured the cross' (Heb 12:2)"], "scripture": ["Rom 8:25", "1 Cor 10:13", "Heb 12:10-11", "Rev 7:14", "Heb 12:2"]}, {"title": "Patience Is a Gift from God, Not a Self-Generated Virtue", "subpoints": ["Worldly people can suppress emotions temporarily; that is not patience", "God is called the God of Patience (Romans 15); he grants it to his people", "In affliction, God comforts believers according to his promises — permits them to taste his grace", "We suffer primarily to be sanctified — to be made more like Christ", "Affliction equips us to help others, to be an example to believers, and to lead unbelievers to Christ"], "scripture": ["Rom 15"]}, {"title": "Manifestations of Impatience and Its Sins", "subpoints": ["Complaining as if God has forsaken us (Is 49:14; Ps 77:7-9)", "Accusing God of cruelty (Job)", "Despairing and wishing for death (Jonah 4; Job 6:8-9)", "Envying the ungodly who prosper (Ps 73)", "Sins that multiply from impatience: pride ('why me?'), doubt of God's promises, lovelessness, selfishness, stubborn hardness of heart, envy, worldliness", "Impatience makes us unfit for service; may even prolong our suffering"], "scripture": ["Is 49:14", "Ps 77:7-9", "Jonah 4:8", "Job 6:8-9", "Ps 73", "Job 9:4"]}, {"title": "Motives and Instructions for Cultivating Patience", "subpoints": ["Patience is commanded and necessary (James 1:4; Heb 10:36)", "Afflictions originate from God — the one who also loves us and chastens us for our good (Micah 7:9; Ps 39:9)", "Our afflictions are light (2 Cor 4:17), short in duration, and limited in extent — God restrained Satan's reach over Job", "Affliction is beneficial: it humbles us (1 Pet 5:6; Jer 31:18-19), causes us to pray more (Ps 119:71; Is 26:16), and sanctifies us", "Six practical instructions: be sensitive to your cross; cease loving the world; remember that suffering is the road to heaven; think on what God has promised; persevere in reading the Word; always pray for patience"], "scripture": ["James 1:4", "Heb 10:36", "1 Pet 5:6", "Micah 7:9", "Ps 119:71", "Is 53:7"]}], "summary": "Elder Nick Anderson delivers a thorough exposition of the Christian doctrine of patience in suffering, drawing primarily from Wilhelmus à Brakel's treatment in The Christian's Reasonable Service. He opens by presenting à Brakel's multi-layered definition: patience is to overcome, remain the same through, and move beyond suffering, while remaining steadfast — all of it a \"spiritual strength which the believer has in God,\" exercised willingly, with composure, joyfully, and steadfastly, sustained by hope that the outcome will be well.\n\nFour marks of true patience are developed: willingness to take up the cross (following Jesus's example in Gethsemane), composure and quietness of spirit rather than murmuring and complaining (Psalm 62:1; Lamentations 3:27-29), joyfulness in affliction (Colossians 1:11; 1 Thessalonians 1:6), and steadfast perseverance that does not quit the race (Hebrews 12:1). Hope is examined as the essential fuel that makes patience possible — specifically, hope in what God has actually promised: support in temptation, the fruit of righteousness, partaking of God's holiness, and the crown of life. Setting hope on a specific earthly deliverance is not biblical hope.\n\nThe lesson catalogues the various ways impatience manifests — from complaining that God has forsaken us (like Israel in Isaiah 49), to accusing God of cruelty (as Job did), to despairing and wishing for death (Jonah), to envying the ungodly who prosper (Psalm 73). These impatient responses multiply further sins: pride, unbelief, lovelessness, envy, and worldliness. The session closes with six practical instructions for cultivating patience: being sensitive to one's cross, ceasing to love the world, remembering that affliction is the road to heaven, meditating on God's promises, persevering in reading the Word, and always praying for patience.", "transcript": "## Introduction: Defining Patience\n\nThe book I am drawing from is called *The Christian's Reasonable Service* by Wilhelmus à Brakel, a Dutch Reformed theologian. He defines patience in a few different ways. He says: to overcome suffering is patience; to remain the same through suffering is patience; to move beyond suffering is patience; and to remain steadfast is all of these, and is part of patience. Then he gives a fuller definition: patience is the believer's spiritual strength which he has in God, whereby he in the performance of his duty willingly, with composure, joyfully, and steadfastly endures all the vicissitudes of life — great word, vicissitudes — having a hope that the outcome will be well.\n\nSo the first thing is that patience is to be strong in the Lord. It is the believer's spiritual strength which he has in God. This is not something that we have in ourselves. This means trusting in God's help — not relying on your own power, wisdom, or strength. Patience is not simply gritting your teeth and bearing through something unpleasant. Psalm 84 or 85 says, \"Blessed is the man whose strength is in you, whose heart is set on pilgrimage.\" Our strength in patience — if it is godly patience — is going to come from trusting in the Lord.\n\n## Four Marks of True Patience\n\n### 1. Willingness\n\nThe nature of patience is to endure affliction willingly, with composure, joyfully, and steadfastly. When we endure an affliction, we exercise biblical patience if — and when — we take that cross upon us with the attitude that it is being put upon us by the Lord himself. Matthew 16:24: \"If anyone desires to come after me, let him deny himself and take up his cross and follow me.\"\n\nThis is contrary to our nature. My general attitude is that I want life to be comfortable. I would not like it to be filled with trials and temptations and sufferings. But if it is the Lord's will for us to suffer, then we need to be ready to accept it willingly. This is the same attitude that Jesus had. In the Garden of Gethsemane, when Peter cut off the ear of the high priest's servant, Jesus responded: \"Put your sword into its sheath. Shall I not drink the cup which my Father has given me?\" That is the kind of attitude Jesus had toward suffering and affliction. He knew what was going to happen. He was willing to suffer for us. And so we should also be willing to suffer for his sake.\n\n### 2. Composure — Quietness of Spirit\n\nContentment without grumbling; no murmuring or discouragement in patience. Have you ever heard someone complaining and thought, \"What a very patient person they are\"? Patience is the opposite of murmuring and complaining. David endured many afflictions this way. Psalm 62:1: \"Truly my soul silently waits for God; from him comes my salvation.\" His soul did not wait restlessly, loudly, with discontentment or discouragement. It waited silently.\n\nJeremiah writes in Lamentations 3:27-29: \"It is good for a man to bear the yoke in his youth. Let him sit alone and keep silent, because God has laid it on him. Let him put his mouth in the dust; there may yet be hope.\" Silence is mentioned in both passages. This does not mean we should not pray — we are supposed to pray for all things. But we wait in such a way that perhaps the people around us do not hear us complaining about what is afflicting us.\n\n### 3. Joyfulness\n\nThis is perhaps the hardest one to wrap our heads around. But this is exactly what Paul prays for. When he prays for the church at Colossae, part of his prayer is being \"strengthened with all might, according to his glorious power, for all patience and long-suffering with joy\" — not with clenched fists and tight teeth, but patience and long-suffering with joy (Col 1:11). If we think we cannot be joyful in the midst of trials, we are arguing with what God says in his word. 1 Thessalonians 1:6: \"And you became followers of us and of the Lord, having received the word in much affliction with joy of the Holy Spirit.\" Not with no affliction — in much affliction, with joy.\n\n### 4. Steadfastness\n\nA patient person does not quit because life is hard. They do not stop halfway through the race. They finish it. The reason we are able to do this — when we have real, godly patience — is because of hope. Romans 8:25: \"But if we hope for what we do not see, we eagerly wait for it with perseverance.\" The Greek word there is *hypomonē*, translated here as perseverance, and in other places as patience or endurance. Hebrews 12:1 uses the same word: \"let us run with endurance the race that is set before us.\"\n\n## Hope: The Fuel of Patience\n\nHope is the comfort of the afflicted. Patience cannot exist without hope. There is no patience in hell because there is no hope in hell. But there is always hope this side of the grave. Hope gives fuel to patience, and without that fuel, patience dies.\n\nWe should not set our hope on a specific earthly deliverance — this job, this school, this income, the healing of this physical ailment. God did not promise those specific things in his word. He promised better things.\n\nFour things we can hope for:\n1. We will have the support we need — 1 Corinthians 10:13: \"God is faithful, who will not allow you to be tempted beyond what you are able, but with the temptation will also make the way of escape.\"\n2. Affliction will bring forth the fruit of righteousness — Hebrews 12:11: \"Now no chastening seems to be joyful for the present, but painful; nevertheless, afterward it yields the peaceable fruit of righteousness to those who have been trained by it.\"\n3. It will be to our advantage, that we may be partakers of God's holiness — Hebrews 12:10.\n4. The crown of life will be given to us as a consequence of our afflictions — Revelation 7:14.\n\nAnd then Jesus is the greatest example of this patience: \"For the joy that was set before him he endured the cross, despising the shame, and has sat down at the right hand of the throne of God\" (Heb 12:2).\n\n## Patience Is a Gift from God\n\nPatience is not something we have in and of ourselves. A worldly person may be able to grit their teeth, suppress their emotions, not complain for a while. But that does not make them patient. God is called the God of Patience in Romans 15. He is the one who grants this to his people, strengthens them when they are afflicted, and in a believer's affliction, comforts them according to his promises and permits them in the midst of suffering to taste his grace.\n\nPrimarily, we suffer so that we are sanctified and made more like Christ. A believer who is patient endures affliction not merely to make it through the difficulty, but to actually become more like the Lord Jesus Christ. The Lord does this so that we can grow in Christ, be a help to other people who are going through afflictions, be an example to believers, lead unbelievers to Christ, and thereby bring glory to God.\n\n## Manifestations of Impatience\n\nSometimes godly people can actually be impatient — shocking, I know. Can you think of a time within the last twelve minutes when you were impatient? We have all experienced impatience this week, probably today. It manifests itself in various ways:\n\nMaybe when we read the Bible and it seems dry, and we just want the Lord to speak to us and it just does not happen. Or when the kids will not listen and will not obey (not that I experienced that this week at all). Or when prayer is difficult and it feels like our prayers are not being heard. Or when we lose a job, or do not get the promotion, or have strained relationships we are tired of dealing with. Or when we are sick or physically afflicted.\n\nAll of these can cause us to become impatient with God, discouraged, unbelieving, irritable. And this manifests in several ways:\n- Complaining like Israel: \"The Lord has forsaken me, and my Lord has forgotten me\" (Is 49:14).\n- Acting like the Psalmist in Psalm 77:7-9: \"Will the Lord cast off forever? Has his mercy ceased forever? Has God forgotten to be gracious?\"\n- Accusing God like Job: \"But you have become cruel to me; with the strength of your hand you oppose me.\"\n- Falling into despair like Jonah: \"It is better for me to die than to live\" (Jonah 4:8).\n- Wishing to have never been born like Job: \"Oh, that it would please God to crush me\" (Job 6:8-9).\n- Getting jealous of unbelievers who prosper: \"These are the ungodly, who are always at ease; they increase in riches. Surely I have cleansed my heart in vain\" (Ps 73).\n\nThese all compound further sins: pride (\"why is this happening to *me*?\"), doubt of God's promises, lovelessness toward the people around us, selfishness, stubborn hardness of heart, envy, and worldliness (\"if I can't have it God's way, I'll just enjoy what I can of the world\"). On top of that, impatience makes us unfit for service and may actually bring more chastening — no one who has hardened himself against the Lord has prospered (Job 9:4).\n\n## Motives for Patience\n\n**First, do you want to serve God?** If your desire is to serve God, then you need to obey — and one of the commands is to be patient. James 1:4: \"Let patience have its perfect work, that you may be perfect and complete, lacking nothing.\" Hebrews 10:36: \"For you have need of endurance, so that after you have done the will of God, you may receive the promise.\" There is no path to heaven that is free from tribulations.\n\n**Second, who is it that brings afflictions to us?** They do not originate from yourself — you love yourself too much for that. They do not originate from man either. Remember Job? It was God. Satan was merely an instrument. Knowing that God is the one who brings trials is a good thing, because the Lord loves us and whom he loves he chastens. Micah 7:9: \"I will bear the indignation of the Lord, because I have sinned against him, until he pleads my case and executes justice for me.\" Psalm 39:9: \"I was mute; I did not open my mouth, because it was you who did it.\"\n\n**Third, affliction should never be an excuse for sin.** Paul said his affliction was light — and none of us can compare our afflictions with what Paul went through (beatings, shipwrecks, hunger, exposure). Our bodily afflictions only affect our physical body; they do not touch our soul. Our afflictions are for a short season — our life is a vapor. And the extent of your affliction has been determined by God — not one moment longer than he has ordained.\n\n**Fourth, affliction is beneficial to your soul.** It humbles us (1 Peter 5:6). It can cause us to be ashamed in a redemptive way (Jer 31:18-19: \"I was ashamed, yes, even humiliated, because I bore the reproach of my youth\"). It causes us to guard against sin and strive for holiness. Psalm 119:71: \"It is good for me that I have been afflicted, that I may learn your statutes.\" In affliction we are more likely to pray — Isaiah 26:16: \"Lord, in trouble they have visited you; they poured out a prayer when your chastening was upon them.\" À Brakel says: \"He who cannot pray ought to become a sailor or get married\" — both of which get you on your knees.\n\n**Fifth, patience is precious.** A patient person is childlike, willing to learn from the Lord — quiet, meek, self-denying, believing and hoping in what God says, loving God and the people around them. 2 Corinthians 7:6: \"Nevertheless God, who comforts the downcast, comforted us by the coming of Titus.\"\n\n**Sixth, when you fail to be patient, you actually rob the people around you** of the benefit they would have received from seeing you go through affliction with patience and waiting on the Lord.\n\n## Six Practical Instructions\n\n1. Be sensitive concerning your cross and guard against hardness when in afflictions.\n2. Cease from loving this world and the things of this world.\n3. Remember that the way to heaven is a road filled with affliction — we walk through the valley of the shadow of death, not around it.\n4. Think often on what God has promised us in his Word — not what we think we need, but what God has actually promised.\n5. Persevere in reading the Word because it is written for our patience and our comfort.\n6. Always pray for patience, because you never know when you will need it.\n\n## Closing Prayer\n\nOur gracious God, we thank you for your goodness to us. We thank you for your Word and the wonderful things you teach us in it. We thank you that you are a God who is able to help us through all of our afflictions — that you are the God who brings afflictions to us, and that you are the one who will carry us through those things. We pray, Lord, that for each one of us in the things we find difficult, the sufferings we go through, you would help us to walk through the valley of the shadow of death with hope, knowing that there is joy on the other side. We ask this all in Christ's name. Amen."};
