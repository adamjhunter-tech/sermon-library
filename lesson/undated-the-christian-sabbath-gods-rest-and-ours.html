<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-the-christian-sabbath-gods-rest-and-ours", "title": "The Christian Sabbath: God's Rest and Ours", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["The Christian Sabbath - God’s Rest and Our’s - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/the-sabbath-gods-rest-and-ours-pastor-tito-lyro", "tags": [{"tag": "Sabbath", "source": "detected"}, {"tag": "Lord's Day", "source": "detected"}, {"tag": "rest", "source": "detected"}, {"tag": "worship", "source": "detected"}, {"tag": "Fourth Commandment", "source": "detected"}], "scripture_references": [], "outline": [], "summary": "Pastor Tito Lyro preaches on the Christian Sabbath, exploring the biblical foundation of God's rest and its application to the Lord's Day rest of believers. The sermon examines the fourth commandment and what it means for Christians to observe a day of rest and worship.", "transcript": "We are studying the Sabbath day — the fourth commandment — using Chapter 21 of the Westminster Confession of Faith. We tend to look at the fourth commandment and think of it as a burden, but John tells us in 1 John that the commandments of God are not a burden for those who love Him. The Bible teaches that there is still a rest remaining for God’s people, and that this future rest is signified and celebrated in the Christian Sabbath.\n\nToday I want to focus on one technical but precious point from Hebrews 4. Some of the most precious truths God has given us take work to see in the Bible. It’s not that a truth has to be easily seen to be true — God has to have said it for it to be true, even if it is difficult to see and difficult to accept.\n\n## Hebrews 4:1–10 and the Remaining Rest\n\nHebrews 4:1–10:\n\n> *\"Therefore, since a promise remains of entering His rest, let us fear lest any of you seem to have come short of it. For indeed the gospel was preached to us as well as to them; but the word which they heard did not profit them, not being mixed with faith in those who heard it. For we who have believed do enter that rest, as He has said: ‘So I swore in My wrath, they shall not enter My rest,’ although the works were finished from the foundation of the world. For He has spoken in a certain place of the seventh day in this way: ‘And God rested on the seventh day from all His works’; and again in this place: ‘They shall not enter My rest.’ Since therefore it remains that some must enter it, and those to whom it was first preached did not enter because of disobedience, again He designates a certain day, saying in David, ‘Today,’ after such a long time, as it has been said: ‘Today, if you will hear His voice, do not harden your hearts.’ For if Joshua had given them rest, then He would not afterward have spoken of another day. There remains therefore a rest for the people of God. For he who has entered His rest has himself also ceased from his works as God did from His.\"*\n\nThe idea of rest in this passage was introduced back in chapter 3, verse 11, when the author of Hebrews quoted Psalm 95:11 — and it is repeated again in chapter 4, verse 3. This rest is always described as *God’s* rest. Look at chapter 3:11: \"So I swore in My wrath, ‘They shall not enter My rest.’\" Chapter 3:18: \"And to whom did He swear that they would not enter His rest, but to those who did not obey?\" Chapter 4:1: \"a promise remains of entering His rest.\" Chapter 4:3: \"They shall not enter My rest.\" Chapter 4:5: \"They shall not enter My rest.\" Chapter 4:11: \"Let us therefore be diligent to enter that rest.\"\n\nThis passage is filled with the idea of God’s rest. And God’s rest is identified as resting from His complete creative work. Verses 3–4: \"Although the works were finished from the foundation of the world. For He has spoken in a certain place of the seventh day in this way: ‘And God rested on the seventh day from all His works.’\"\n\nFrom the very beginning, God has called man to partake with Him in this rest. He invited man to join Him on the seventh day, resting from worldly activity so that we can contemplate what God has done — in creation, and as we will see, in redemption as well.\n\nHowever, humanity would not enter into God’s rest because of sin. Chapter 4:5 says, \"They shall not enter My rest.\" God created the seventh day, rested Himself, and invited man to join in — and humanity refused because of sin and rebellion.\n\nWalter Chantry, in his book *Call the Sabbath a Delight*, says this: \"God’s rest was complete from the beginning of the world. Man was called to enter that rest with God from the seventh day of creation; yet because of sin, rebellion, hardness of heart, and unbelief, man did not enter it and has come short of God’s rest because of the fall.\" From the very beginning, humanity has been fighting this idea of God’s rest.\n\n## The Rest That Remains\n\nDespite man’s rebellion — illustrated here by the story of Israel in the wilderness — there is still some who will enter into God’s rest. Verse 6: \"Since therefore it remains that some must enter it, and those to whom it was first preached did not enter because of disobedience.\"\n\nThe promise of rest remains. The promise land was a type, a signification, of that rest — it was supposed to be an example of it. Yet even after Joshua led the people of God into the promised land and they conquered all the land, a thousand years later David *still* says there is a rest that remains. So entering the promised land did not fulfill the fourth commandment — it did not exhaust all that God was planning in this idea of rest.\n\nEnough of all that God was planning in the idea of rest. So long after the Israelites entered Canaan, David speaks — and Canaan was not the ultimate rest promised by God.\n\nGod’s promised rest is entered by believing the gospel, as verse 3 says: \"For we who have believed do enter that rest.\" The verb form indicates a continuing action — we *are entering* that rest. It is not entering the promised land but entering into fellowship with God by faith that is the ultimate rest.\n\n## The Key Word: *Sabbatismos*\n\nAll of this leads us to verses 9 and 10, which are the basis for affirming that we have a Christian Sabbath, that the fourth commandment remains valid for us today, and that the day has shifted from the seventh day to the first day of the week.\n\nVerse 9 says: \"There remains therefore a rest for the people of God.\"\n\nNow here is where it gets technical, and it is worth the effort. The word *rest* appears twelve times between chapter 3:11 and chapter 4:11. We can rightly conclude that is the main subject of this passage.\n\nAlmost every time the English word *rest* appears in this passage, it translates the same Greek noun or verb — the word *katapausis*. There is one exception. One time the word *rest* translates a different Greek word. That is in verse 9.\n\n\"There remains therefore a rest for the people of God\" — that word *rest* in the original is a different word: *sabbatismos*.\n\nThis is the only time this noun is used in all of Greek literature up to this point. It does not appear anywhere else until the time Hebrews was written. That complicates things — normally we determine the meaning of a word by comparing its uses. When a word is used only once, how do we determine its meaning?\n\nIn God’s good providence, the noun is only used here, but the *verb* is found throughout the Old Testament. In the Greek translation of the Old Testament — the Septuagint — every time the related verb is used, it translates the Hebrew word meaning \"to keep the Sabbath.\"\n\nFor example, Leviticus 23:32: \"It shall be to you a Sabbath of solemn rest... you shall celebrate your Sabbath\" — that last phrase uses our word. Leviticus 26:34–35: \"Then the land shall enjoy its Sabbaths...\" — again our word.\n\nSo the people closest to the original language are telling us what this word means: observe the Sabbath, enjoy the Sabbath, keep the Sabbath, celebrate the Sabbath.\n\nSince every single word was inspired by the Holy Spirit, it is deeply significant that in a context where the same word had been used eleven times, the Holy Spirit suddenly changes the word in verse 9. That change tells us something: verse 9 should read, \"There remains therefore a **Sabbath observance** for the people of God.\"\n\nThis passage does not just establish that there is a new-covenant Sabbath. It also tells us what that day should be.\n\n## Who Has Entered the Rest? Christ.\n\nLook at verse 10: \"For he who has entered His rest has himself also ceased from his works as God did from His.\"\n\nIf you have a New King James or ESV, you may notice a small *h* on \"he\" — as if this refers to a believing human being. I believe that is an inaccurate interpretation. In the original Greek there are no lowercase or uppercase letters — capitalization is entirely the translator’s interpretive choice.\n\nI believe verse 10 refers to Christ entering His rest, and the context requires this. Consider: every other mention of rest in this passage is the rest of *God*. This would be the only instance where it suddenly becomes the rest of *men*. Furthermore, the one in verse 10 \"has entered\" (completed action), while verse 3 says believers \"are entering\" (continuing action). The individual in verse 10 has already entered; believers have not yet fully entered. There is also a deliberate contrast: throughout the passage the author addresses believers in the plural — \"we,\" \"they,\" \"let us\" — but verse 10 uses the singular \"he,\" suggesting this individual is distinct from the people of God.\n\nWhat kind of works done by a man could be compared to the works of God in creation? The only reasonable answer is the redemptive work of Christ.\n\nSo verse 10 is the reason for the Sabbath observance that remains: Christ has entered His rest, and because He has entered His rest and we are in the process of entering that rest, we continue to observe the Sabbath as pointing to exactly that — the completed work of God the Son in redeeming His people.\n\n## Creation and Redemption\n\nThis understanding creates a parallel between the works of creation and the works of redemption:\n\n- In the Old Testament, the people of God worked and then rested, based on the creation pattern and looking *forward* to what Christ would do.\n- In the New Covenant, the people of God first rest and then work, looking *back* to what God has done in the life, death, resurrection, and ascension of the Lord Jesus Christ.\n\nThe Sabbath has always pointed to God’s completed work, signified by rest. In the Old Covenant: God’s creative work. In the New Covenant: God’s redeeming work.\n\nThis is actually hinted at in the Fourth Commandment itself. In Exodus 20, the reason given for keeping the Sabbath is that God created all things. In Deuteronomy 5, the reason for keeping the Fourth Commandment is that God redeemed His people from slavery. Creation and redemption — both aspects remain true even today.\n\nWhen did Christ enter His rest? On the first day of the week, as He rose from the dead, conquered death, entered the holy of holies with His own blood, and atoned for the sins of His people. The apostolic church understood this and began observing the new-covenant Sabbath on the first day of the week — because that is the day Christ entered His rest. The same way the old covenant celebrated the Sabbath on the seventh day because that was the day God rested from creation, we celebrate on the first day of the week because that is the day Christ rested from His work of salvation.\n\n## Geerhardus Vos on the Shift to the First Day\n\nGeerhardus Vos, in *Biblical Theology*, puts it well:\n\n*\"In as much as the Old Covenant was still looking forward to the performance of the Messianic work, naturally the day of labor came first and the day of rest at the end of the week. We under the New Covenant look back upon the accomplished work of Christ. We therefore first celebrate the rest in principle procured by Christ — although the Sabbath also still remains a sign looking forward to the final eschatological rest. The Old Testament people of God had to typify in their life the future developments of redemption. Consequently, the precedence of labor and the consequence of rest had to find expression in their calendar. The New Testament church has no typical function to perform, but it has a great historic event to commemorate: the performance of the work of Christ by the entering of Him and of His people through Him upon the state of never-ending rest. Christ entered upon His rest so that the Jewish Sabbath, as it were, was buried in His grave. He rose again on the first day. Therefore the acknowledgment of the apostolic church is that what we do on the Lord’s Day is actually observing the Sabbath — the Christian Sabbath — because of the redemptive work of Christ.\"*\n\n## Conclusion\n\nThe Lord’s Day both looks backward — \"Do this in remembrance of Me\" — and forward — \"until He comes\" (1 Corinthians 11:26). Our faith is always both backward and forward. And that is what the Sabbath is as well.\n\nNext time we will go back to Chapter 21 of the Confession and begin talking about how we actually observe the Lord’s Day."};
