window.LESSON_DATA = {"id": "undated-a-glorious-thing", "title": "A Glorious Thing", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": "The Ephesian Church", "series_part": null, "parts": 1, "source_files": ["A Glorious Thing - Pastor Tito Lyro - Ephesians 5_22-33.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/a-glorious-thing-pastor-tito-lyro-ephesians-522-33", "tags": [{"tag": "marriage", "source": "detected"}, {"tag": "submission", "source": "detected"}, {"tag": "husband", "source": "detected"}, {"tag": "family", "source": "detected"}, {"tag": "creation", "source": "detected"}, {"tag": "sanctification", "source": "detected"}], "scripture_references": [{"reference": "Ephesians 5:22-33", "type": "quoted", "source": "detected"}, {"reference": "Colossians 3:12-19", "type": "quoted", "source": "detected"}, {"reference": "Genesis 2:15-25", "type": "referenced", "source": "detected"}, {"reference": "Genesis 3:16", "type": "referenced", "source": "detected"}, {"reference": "1 Corinthians 11", "type": "referenced", "source": "detected"}, {"reference": "Luke 2:51", "type": "referenced", "source": "detected"}, {"reference": "Romans 13:1-5", "type": "referenced", "source": "detected"}, {"reference": "James 4:7", "type": "referenced", "source": "detected"}, {"reference": "1 Peter 3", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Family as the Primary Field of Ministry", "subpoints": ["The family is the basic unit of society, the church, and government", "Colossians 3:12-17 lists Christian virtues that are to be displayed first in the family", "We tend to work harder at making a good impression outside the family than inside it", "Ephesians 5:22-6:4 is the specific application of whatever you do in word or deed in Christ"], "scripture": ["Ephesians 5:22-33", "Colossians 3:12-19"]}, {"title": "The Command: Wives, Submit to Your Own Husbands", "subpoints": ["The verb 'submit' is borrowed from verse 21 and 24 — no explicit verb in the original of v. 22", "Submission is not a culturally conditioned accommodation — Paul regularly opposed culture", "The family structure is grounded in creation, not culture (1 Corinthians 11)", "Arguments that submission no longer applies have been rejected by honest scholarship"], "scripture": ["Ephesians 5:22-24", "1 Corinthians 11"]}, {"title": "The Manner of Submission", "subpoints": ["It is a willing submission — the grammatical form indicates the wife submits herself", "It is a Christian submission — as is fitting in the Lord (Colossians 3:18)", "It is a specific submission — to her own husband, not to every man", "It is a respectful submission — she does not undermine or gossip about her husband"], "scripture": ["Ephesians 5:22-24", "Colossians 3:18"]}, {"title": "Exceptions and the Biggest Obstacle", "subpoints": ["A wife cannot submit to a husband who commands her to worship false gods, commit immorality, or lie", "A wife is not called to submit to abuse — she must seek help and protection", "The biggest obstacle to submission is not a bad husband but the wife's own sinful heart", "Genesis 3:16 — the fallen desire is to take the role God gave to the husband"], "scripture": ["Genesis 3:16", "Titus 2:5"]}, {"title": "The Dignity of the Woman", "subpoints": ["Submission says nothing about essence — only about function", "The Son submitted to the Father but was never inferior to the Father", "Both male and female are made in the image of God with equal dignity and worth", "Husbands and wives are co-heirs of the grace of God (1 Peter 3:7)"], "scripture": ["Genesis 1:27", "Ephesians 5:33", "1 Peter 3:7"]}], "summary": "In this Sunday morning sermon from the series on the Ephesian Church, Pastor Tito Lyro addresses Ephesians 5:22-33, with the stated plan to spend four Sundays in this chapter. He begins not with the mechanics of the husband-wife relationship but with Paul's larger context: the family is the primary theater in which Christian virtue is displayed. Colossians 3 places the instructions for wives, husbands, children, and parents immediately after a long catalogue of Christian virtues — love, humility, meekness, long-suffering, forgiveness — indicating that the family is where these things must first be practiced.\n\nThe sermon then takes up the command for wives to submit to their own husbands. Pastor Lyro addresses the most common objections: that Paul was just accommodating his culture (disproven by his consistent counter-cultural stance on many other issues), and that the word does not really mean submission (disproven by the word's consistent use throughout the New Testament, including in Jesus' submission to his parents and the Christian's submission to governing authorities). The command means that the wife is the submitting partner who defers to her husband — in everything, with acknowledged exceptions when the husband commands what is contrary to God's Word, and with the clear affirmation that no wife is called to submit to abuse.\n\nThe sermon ends with a careful and extended defense of the dignity of womanhood. Submission speaks only to function, not to worth. The greatest act of submission in history is the Son's submission to the Father — yet the Son was never inferior to the Father in essence. Male and female are equally made in the image of God, equally co-heirs of grace. The transgender movement actually degrades women by implying that womanhood is merely subjective feeling. God's design for women is glorious precisely because it comes from the God who only gives what is good.", "transcript": "## Scripture Reading: Ephesians 5:22-33\n\nIf you're able to remain standing a moment longer and turn to Ephesians 5, as we continue our series on the Ephesian Church. I'm planning for us to stay four Sundays on this chapter, just following the order that is in the text. So Ephesians 5, starting in verse 22. This is the word of our Lord.\n\n\"Wives, submit to your own husbands as to the Lord, for the husband is head of the wife, as also Christ is head of the church; and He is the Savior of the body. Therefore, just as the church is subject to Christ, so let the wives be to their own husbands in everything. Husbands, love your wives, just as Christ also loved the church and gave Himself for her, that He might sanctify and cleanse her with the washing of water by the word, that He might present her to Himself a glorious church, not having spot or wrinkle or any such thing, but that she should be holy and without blemish. So husbands ought to love their own wives as their own bodies; he who loves his wife loves himself. For no one ever hated his own flesh, but nourishes and cherishes it, just as the Lord does the church. For we are members of His body, of His flesh, and of His bones. 'For this reason a man shall leave his father and mother and be joined to his wife, and the two shall become one flesh.' This is a great mystery, but I speak concerning Christ and the church. Nevertheless let each one of you in particular so love his own wife as himself, and let the wife see that she respects her husband.\"\n\nThis is the word of our Lord. Let us pray together. Our Lord, we pray that He bless us as we consider your word. We pray that it will be an edifying thing for all of us. We pray in Jesus' name. Amen. Please be seated.\n\n## Overview and Plan\n\nWe are going to walk through this passage today, then two weeks from today — Elder Hoy will be preaching next Lord's Day — and then we will come back the following week and spend a little bit more time on this.\n\nWe often come to this passage and quickly jump to the roles of the husband and wife. What does it mean to submit? What does it mean to love? What does it mean to be the head? And in the eagerness to figure out the mechanics — which are very important — we sometimes skip over what Paul says concerning Christ in this passage. We will try not to do that today.\n\nWhat Paul does here is something you learn in seminary you should never do: he uses an illustration that overpowers the very teaching he is trying to make. Everything Paul says about Christ here is technically just an illustration of how things should be done. Yet it is so powerful that we will benefit from looking at it. He does something similar in Philippians 2, where he is teaching about humility toward one another and uses the glorious Carmen Christi — the hymn of Christ — as his illustration.\n\nLord willing, today we will consider verses 22-24 and the wife's role in marriage. In two weeks we will focus on the illustration of Christ's leadership to His church and see the glory of that. That will prepare us to look at what the husband is supposed to do. Then we will close this section by looking at verse 31 and what it means to be one in marriage.\n\n## The Family as the Primary Ministry Field\n\nThere is something here for everyone, whether you are a wife, a widow, or a man. Every time we open the Word of God there is something for us.\n\nIn today's society there may not be a bigger cuss word than \"submission\" in the context of marriage. The idea that anyone should submit to someone else seems un-American. Yet every relationship is based on some level of submission. Just previously in chapter 5, Paul spoke of being filled with the Spirit, and one mark of being Spirit-filled is that we \"submit to one another in the fear of God\" (v. 21).\n\nAs we prepare to look at verses 22-24, understand that the family is the place where we first display Christian virtue. We tend to think we are to display the fruit of the Spirit to the world out there. But we forget that our primary field of ministry is our own family. In Colossians 3:12-17, Paul lists the Christian virtues — tender mercies, kindness, humility, meekness, long-suffering, forgiveness, love, gratitude, singing together, doing all in the name of the Lord Jesus — and then immediately applies them to the family: wives and husbands, children and parents. The family is where these virtues are first displayed and practiced.\n\nThe family is the basic unit of society and the church — not the individual. In the Bible, the family is established in Genesis 2, the government in Genesis 9, the church in Genesis 15. Both government and church can only exist if the family exists. The family is under attack not accidentally but strategically — because if Satan destroys the family, he destroys everything built on it.\n\n## The Command: Wives, Submit\n\nThis brings us to Ephesians 5:22: \"Wives, submit to your own husbands as to the Lord.\" The original Greek actually has no verb in verse 22 — it simply says, \"The women to their own men as to the Lord.\" The verb is borrowed from verse 21 (\"submitting to one another\") and verse 24 (\"so let the wives be to their own husbands\"). The word for wife and husband in Greek are just the words for woman and man — the context makes clear it is about the married relationship, since children and parents follow immediately.\n\nThe wife in any marriage is the submitting partner. And let me say clearly: that is a glorious thing. It is glorious because God appointed it, and God does not do anything that is not good for His people.\n\nThis has not been popular throughout history and is not popular today. Many scholars argue that Paul was just conforming to his culture. But Paul regularly went against his culture. He spoke against homosexuality, which was mainstream in the first century. He spoke against drunkenness, widely accepted at the time. He spoke against the role of women as leaders in pagan cultic worship, which was the cultural norm. Paul's standard practice was to go against culture. When he says wives should submit to their husbands, he was actually being counter-cultural. And beyond that, Paul grounds the structure of the family in creation (1 Corinthians 11): \"Man is not from woman, but woman from man; nor was man created for woman but woman for man.\" This transcends culture — it will be true everywhere and every time.\n\nSome try to say that \"submit\" means something other than submission. The Message paraphrase renders Colossians 3:18 as: \"Wives, understand and support your husbands.\" But the word is used consistently throughout the New Testament to mean actual submission. Luke 2:51 says Jesus \"was subject\" to His parents — does that mean He just understood and supported them? Romans 13:1 says \"let every soul be subject to the governing authorities\" — does that mean just understand your government? James 4:7 says \"submit to God\" — does that mean just understand and support God? No. The command means the wife will defer to her husband.\n\n## The Manner of Submission\n\nBut how does this submission look?\n\n**It is a willing submission.** The grammatical form of the verb indicates the wife submits herself — it is not forced upon her. It should not be a begrudging effort but something done willingly as unto the Lord (v. 22).\n\n**It is a Christian submission.** Colossians 3:18 says, \"as is fitting in the Lord.\" A submission life is consistent with who Christ is and what He has done for her. There is, biblically speaking, no such category as an unsubmissive Christian wife. John Calvin says: \"Wives cannot obey Christ without obedience to their husbands. You cannot divorce both; you cannot have one without the other.\"\n\n**It is a specific submission.** She submits to her own husband, not to every man. She submits to civil authority as any man does. She submits to church authority as any man does. But she does not owe special submission to men in general simply because she is a woman.\n\n**It is a respectful submission.** Verse 33: \"let the wife see that she respects her husband.\" She does not gossip about him. She does not portray him in a dark light unnecessarily.\n\n## Exceptions\n\nWith every rule there will be exceptions. A wife cannot submit to her husband if he commands her to worship false gods, commit sexual immorality, lie, or commit violence. The Scriptures include abuse under the category of murder and anger — therefore a wife is not called to submit to an abusive husband. She must tell someone, call the church, call the police, and protect herself. That would be contrary to the great teachings of Scripture.\n\nBut please do not immediately look for ways your situation is the exception. If your exception requires six logical steps away from a clear biblical text to validate, you may be looking for an excuse.\n\n## The Biggest Obstacle to Submission\n\nThe biggest impediment to submission is not a bad husband — although bad husbands make it genuinely difficult. The biggest impediment is the wife's own sinful heart. Genesis 3:16 says, after the fall: \"Your desire shall be for your husband, and he shall rule over you.\" This does not mean the woman will pine after her husband more. It means her desire will be for his role — she will want to do what God gave to her husband to be and to do. She will want to take over his position. That is the natural tendency of the sinful heart in a fallen woman.\n\n## The Dignity of the Woman\n\nI want to finish by looking at the dignity of the woman, because this teaching on submission has often been used to put women down — and the Bible does not do that.\n\nThe biggest display of submission we know of is the submission of God the Son to God the Father. The most profound example of submission is the Lord Jesus Christ Himself. He came into the world in submission to the Father, yet at no time was He inferior to the Father. \"I and the Father are one.\" \"Restore the glory that we had together before the foundation of the world\" (John 17). The voluntary submission of our Savior to His Father was designed for a specific purpose, but never implied inferiority.\n\nSo the wife's submission to her husband says nothing about her essence — only about her function. Genesis 1:27: God created humanity in His image, male and female. Both bear the image of God with equal worth and dignity. Peter says husbands are to honor their wives as co-heirs of the grace of God (1 Peter 3:7). Christian woman, you are as much an heir of God as any Christian man. There is no difference in standing before God. We are equal partakers of the benefits secured by Jesus Christ.\n\nThe transgender movement is actually destroying the dignity of women, saying that if you just think you are a woman, that is enough — you are a woman. But God created women specifically, in a specific way, with great dignity. God's design for women is glorious.\n\n## Closing Prayer\n\nFather, we pray that you would enable us to take all the teaching of the Scriptures to heart, and that we will not do it begrudgingly. We pray that you give us grace to follow you faithfully in what you command us to do. In Jesus' name, amen."};
