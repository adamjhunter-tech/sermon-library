tminster", "The Belgic Confession was written almost 80 years before the Westminster Confession; De Brès drew heavily from Calvin's Institutes and the French Confession, sometimes quoting it verbatim", "Follows the historical progression of redemption in 37 articles across six areas: theology proper, anthropology, Christology, soteriology, ecclesiology, eschatology"], "scripture": []}, {"title": "3. Article 17: The Recovery of Fallen Man", "subpoints": ["'Our good God, by his marvelous wisdom and goodness, seeing that man had plunged himself into both physical and spiritual death... God set out to find him. Though man trembling all over was fleeing from him, he comforted him, promising to give him his son, born of a woman to crush the head of the serpent'", "This article corrected a dispensationalist error in the speaker's background: the gospel was not absent from the Old Testament but preached in the garden; Adam was saved the same way we are, looking forward to the promised seed", "Genesis 3:6-9: Adam heard God's voice and hid; God came to find him — not the other way around; this shows the change from creator-creature relationship to the Father-seeking-the-lost", "Augustine: 'In the Old Testament is concealed the new; in the New Testament is revealed the old'; salvation has always been by grace alone through faith alone on account of Christ alone"], "scripture": ["Genesis 3:6-9"]}, {"title": "4. Article 23: The Justification of Sinners", "subpoints": ["'Our blessedness lies in the forgiveness of our sins because of Jesus Christ... we lean and rest only on the obedience of Christ crucified, which is ours when we believe in him. That is enough to cover all our sins and make us confident'", "Justification has two aspects: negative (forgiveness — removal of guilt) and positive (imputation — the addition of Christ's righteousness); without the positive aspect, we would only be restored to Adam's state before the fall, needing to earn confirmation through perfect obedience", "Romans 5:17-19: by one man's offense death reigned; by one man's righteous act the free gift came to all; by one man's obedience many were made righteous — the two representative men: Adam and Christ", "R.C. Sproul's illustration: the prince who gives his clean clothes to the priest with dirty clothes; we stand before the great King clothed only in the imputed righteousness of Christ", "Application: know this confession; cling to its foundation — the finished work of Christ crucified — giving all glory to God and claiming nothing for ourselves"], "scripture": ["Romans 5:17-19"]}], "summary": "A Sunday school lesson by Mr. Isaiah Couch introducing the Belgic Confession through its author, historical context, and two key articles. Guido de Brès (1522-1567), born in Belgium, converted to the Reformed faith at 25 and spent 20 years preaching under persecution, writing the confession between 1559-1561 to distinguish the Reformed faith from Rome and the Anabaptists. He was executed in 1567, declaring it an honor to die for the doctrine of the Son of God. The lesson focuses on two articles: Article 17 (The Recovery of Fallen Man) — God set out to find fallen, fleeing man in the garden and promised the seed to crush the serpent, correcting a dispensationalist error that the gospel was absent from the OT; and Article 23 (Justification of Sinners) — the two-fold nature of justification: negative (forgiveness, removal of guilt) and positive (imputation of Christ's active righteousness), illustrated by Sproul's story of the prince giving his clean clothes to the guilty priest. Both aspects rest on the obedience of Christ crucified alone, received by faith.", "transcript": "## Introduction\n\nThe Belgic Confession is often relegated to the church library shelves. I want to spend our time this morning remembering — or even being introduced to — this confession. I want to reach up to that shelf, pull this old dusty book down, and when we close, rather than placing it back on that same shelf, together we would place it on our nightstands or in our living rooms to be read frequently and remembered often.\n\nThis lesson is divided into four parts: a brief summary of the author, a brief overview of its theme, examining its substance, and closing with its application.\n\n## 1. The Author: Guido de Brès\n\nGuido de Brès was born in 1522 in the city of Mons, in modern-day southern Belgium. He was raised in a nominally Christian family and did not come to renounce Roman Catholicism and embrace the Reformed faith until he was 25 years old. From 1548 to 1567, de Brès spent 20 years moving from city to city as a traveling preacher fleeing fierce persecution. During this time, he began to write. The Belgic Confession was written between 1559 and 1561 when it was published. His purpose was to show how the Reformed faith was different from both Roman Catholicism — which he called 'a heap of glorious deceivers' — and the Anabaptist sect.\n\nThen in April of 1567, after almost 20 years of ministry, de Brès was betrayed, captured, and imprisoned. During his imprisonment he had many discussions and debates with townspeople, other prisoners, and even prominent Roman Catholic authorities, defending the Reformed position.\n\nIn a letter he wrote to his congregation, de Brès recalls a conversation with the Countess. She said: 'I do not see how you can sleep or eat or drink. If I were in your place, I think I should die of fear.' De Brès responded: 'My lady, the worthy cause that I uphold and the good conscience which my God has given to me permits me to sleep, to eat, and to drink better than those who wish me harm. And as for my chains and my bonds — rather than frightening me, on the contrary, they are my delight and my glory. I count them more precious than chains of gold, and when I hear the sound of my chains, it seems that I hear the sound of sweet music in my ears. Not that this comes naturally from these bonds, but from the cause for which I am held, which is the holy Word of God.'\n\nTwo and a half months later, on May 31, 1567, the 45-year-old de Brès was sentenced to death by hanging. Before being led out, he said: 'My brothers, I am condemned to death today for the doctrine of the Son of God — praise be to him. I would never have thought that God would have given me such an honor.'\n\nDe Brès's life is one of suffering and faithfulness under fire, and it is a life that should never be forgotten.\n\n## 2. Historical Context\n\nDe Brès published the Belgic Confession in 1561 during an incredible time of confession and catechism writing — nearly 50 confessions and catechisms were written in a 20-year span. The Augsburg Confession, Calvin's Institutes, the French Confession, the Scottish Confession, the Heidelberg Catechism, the Second Helvetic Confession — and then, almost 80 years later, our Westminster Confession.\n\nDe Brès drew heavily from both Calvin's Institutes and the French Confession, sometimes quoting it verbatim. The Belgic Confession follows the historical progression of redemption in 37 articles across six foundational categories: theology proper, anthropology, Christology, soteriology, ecclesiology, and eschatology.\n\n## 3. Article 17: The Recovery of Fallen Man\n\nLet me share one of my favorite articles. Article 17, titled 'The Recovery of Fallen Man,' says this:\n\n*We believe that our good God, by his marvelous wisdom and goodness, seeing that man had plunged himself in this manner into both physical and spiritual death, and made himself completely miserable, God set out to find him. Though man trembling all over was fleeing from him, he comforted him, promising to give him his son, born of a woman to crush the head of the serpent and to make him blessed.*\n\nThis article had a foundational role at an important turning point in my life. I grew up in a non-Reformed, dispensational setting where I heard things like: 'The gospel is only in the New Testament because that's where Jesus is.' Or: 'The people of the Old Testament were saved differently.' Or: 'The God of the Old Testament is different from the God of the New Testament.'\n\nWhen the Spirit began to open my eyes to the Reformed understanding of Scripture, I saw that the gospel was not absent from the Old Testament. The gospel was preached in the garden — proclaimed and promised to Adam and Eve by a God of comfort.\n\nTo realize that the Belgic Confession declares that the God who saves us through Jesus Christ also saved Adam — that changed me. The simple difference is that Adam looked forward to the promise in its fulfillment; we look back on the promise fulfilled. But the substance of salvation is the same: by grace alone through faith alone on account of Christ alone. As Augustine famously said: 'In the Old Testament is concealed the new; in the New Testament is revealed the old.'\n\nLet's turn to Genesis 3:6-9 — the moment de Brès is describing.\n\n*When the woman saw that the tree was good for food... she took of its fruit and ate. She also gave to her husband with her, and he ate... and they hid themselves from the presence of the LORD God... Then the LORD God called to Adam and said to him, 'Where are you?'*\n\nMan was trembling all over and fleeing from God. And what did God do? He came to find him. He asked: where are you? Not because he didn't know, but because he was coming to the creature who had plunged himself into misery — and he came to comfort him and promise redemption.\n\nGod comes to man because there is no other way by which man can come back to God. Praise God that he set out to find fallen man. Praise God that he condescended — as Calvin put it, 'God lisps to us as a mother lisps to her infant child.' And he comforted Adam, promising his Son, born of a woman, to crush the head of the serpent.\n\n## 4. Article 23: The Justification of Sinners\n\nArticle 23 begins:\n\n*We believe that our blessedness lies in the forgiveness of our sins because of Jesus Christ, and that in it our righteousness before God is contained... We cling to this foundation which is firm forever, giving all glory to God, humbling ourselves and recognizing ourselves as we are, not claiming a thing for ourselves or our merits and leaning and resting only on the obedience of Christ crucified, which is ours when we believe in him. That is enough to cover all our sins and to make us confident.*\n\nTo those who say confessions are cold and heartless — this article alone should answer that claim. Because of the doctrine.\n\nI came from a background where I understood justification only in its negative aspect: Jesus died for my sins, removed them as far as the east is from the west. I had no knowledge of the positive aspect.\n\nJustification has a two-fold shape. The negative aspect: the forgiveness of sins — Christ's death removes our guilt, which is an enormous comfort. But if we had received only the negative aspect of justification, we would only be restored to Adam's condition before the fall. Adam still had to fulfill the covenant of works — perfect and personal obedience — in order to advance to confirmed, consummate life. Only through the finished work of the true and better Adam, who fulfilled the covenant of works in his perfect life and atoning death, is his righteousness positively imputed to us.\n\nRomans 5:17-19: *For if by one man's offense death reigned through the one, much more those who receive abundance of grace and of the gift of righteousness will reign in life through the one Jesus Christ... For as by one man's disobedience many were made sinners, so also by one man's obedience many were made righteous.*\n\nTwo representative men. Adam and Christ. Their actions have determined the eternal destinies of those they represent.\n\nR.C. Sproul illustrates this beautifully in his children's book *The Priest with Dirty Clothes*: a priest approaches a king with dirty clothes and cannot stand before him — until the great prince steps in and says, 'Give me your dirty clothes. I will give you my clean clothes.' Only with that exchange can the priest stand before the king.\n\nThat is us. Our guilty clothes — the evidence of our sin — exchanged for the spotless righteousness of Christ. We stand before the great King forgiven of our sins and clothed in the imputed righteousness of the Lord Jesus Christ.\n\n## Application\n\nKnow this confession. We have it at our fingertips on our phones. Most importantly, cling to its foundation. May we recognize the great comfort it speaks of — in knowing that our great and marvelous God set out to find fallen man, though he was trembling all over and fleeing from him, and he comforted him.\n\nMay we, like de Brès, cling to this foundation in both our lives and our deaths — giving all glory to God, claiming nothing for ourselves, but fully leaning and resting on the obedience of Christ crucified.\n\nLet us pray...", "soundcloud_url": "https://soundcloud.com/user-732503870/04-02-23-intro-to-the-belgic-confession-mr-isaiah-couch"};
