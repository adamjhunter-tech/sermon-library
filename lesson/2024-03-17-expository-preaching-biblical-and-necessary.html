evidence of what we need to abandon", "Profitable for (3) correction — 'standing straight again'; setting a broken bone; the Bible both knocks us flat with conviction and picks us up, dusts us off, and heads us in the right direction", "Profitable for (4) instruction in righteousness — the Titus 2:11-12 training; the put-off/put-on patterns of Ephesians 4; these four elements are the four steps of the process of change which only happens through the Word of God", "No growth in Christlikeness happens apart from the Word of God"], "scripture": ["2 Timothy 3:16-17", "Ephesians 4:20-32", "Titus 2:11-12"]}, {"title": "3. We Preach Because God Commands It", "subpoints": ["2 Timothy 4:2: 'Preach the Word!' — Paul puts Timothy under a solemn oath before the divine Judge; this is not optional", "The word for 'preach' is the word for the king's herald who reads the royal proclamation officially and publicly; the preacher is the ambassador of the King and can only say what the King tells him in his Word", "Preaching requires words — the saying attributed to Francis of Assisi ('preach the gospel; use words if necessary') is foolishness; preaching cannot happen without words", "Paul described his entire ministry as preaching: '...not to know anything among you except Jesus Christ and him crucified' (1 Corinthians 2:2)"], "scripture": ["2 Timothy 4:1-2", "1 Corinthians 1:23-2:2"]}, {"title": "4. We Preach Because It Makes the Man of God Complete", "subpoints": ["2 Timothy 3:17: 'that the man of God may be complete, thoroughly equipped for every good work' — the primary reference is to the pastor, but applies to all God's people", "The pastor deeply committed to the Word of God is fully equipped to minister; the primary skill requirement for a pastor is to know the Word and be committed to it", "Related to Ephesians 4:12: God gave pastor-teachers to the church to equip it; it is through this Word that the whole church grows toward the fullness of Christ"], "scripture": ["2 Timothy 3:17", "Ephesians 4:12"]}, {"title": "5. We Preach Because Jesus Is Coming Back and Because the Times Are Difficult", "subpoints": ["2 Timothy 4:1: the preacher is accountable to Jesus who will judge the living and dead at his appearing; the fear of man is a constant temptation — the preacher must keep his account with God in view", "2 Timothy 4:3-4: itching ears, heaping up teachers — this describes people in the pew, not the world; the congregation bears responsibility for the preaching they demand", "The more opposition to preaching and the darker the times, the more preaching needs to happen — John Stott: 'the harder the times and the deafer the people, the clearer and more persuasive the proclamation must be'", "Paul in prison could say his chains were bearable because the Word of God was not chained; God changes the world through his proclaimed Word"], "scripture": ["2 Timothy 4:1-5"]}], "summary": "Taking a break from the 1 Peter series, Pastor Tito Lyro preaches a special sermon on 2 Timothy 3:16–4:5 defending expository preaching as the center of the church's life. A brief history of preaching is traced: the simple exposition of the first 200 years, the long decline through roughly 900 years of neglect, and the recovery beginning with Zwingli's verse-by-verse preaching through Matthew in 1518 — which sparked the Protestant Reformation. Five reasons are given for expository preaching: (1) the Bible is the very words spoken by God (theopneustos — God-breathed; NT arguments from single letters; Paul's and Peter's own writings recognized as Scripture); (2) it is useful — doctrine, reproof, correction, and instruction in righteousness are the four steps of change that only happen through the Word; (3) God commands it — the herald/ambassador analogy; Paul's entire ministry was preaching Christ crucified; (4) it makes the man of God complete (Ephesians 4:12); (5) Jesus is coming to judge the preacher, and the times of ear-scratching demand greater faithfulness, not less.", "transcript": "## Introduction: A History of Preaching\n\nWe're going to turn to 2 Timothy chapter 3 — taking a break from our series in 1 Peter. We'll read verses 16 through chapter 4, verse 5.\n\n*All Scripture is given by inspiration of God and is profitable for doctrine, for reproof, for correction, for instruction in righteousness, that the man of God may be complete, thoroughly equipped for every good work. I charge you therefore before God and the Lord Jesus Christ, who will judge the living and the dead at His appearing and His kingdom: Preach the word! Be ready in season and out of season. Convince, rebuke, exhort, with all longsuffering and teaching. For the time will come when they will not endure sound doctrine, but according to their own desires, because they have itching ears, they will heap up for themselves teachers; and they will turn their ears away from the truth, and be turned aside to fables. But you be watchful in all things, endure afflictions, do the work of an evangelist, fulfill your ministry.*\n\nWe tend to think that the way things are now is the way they have always been. That is rarely the case. This is true with preaching.\n\nIn the time of the New Testament and for the first 200 years following that, Christian preaching was the simple explanation and application of the Bible. Preachers would stand before the gathered people of God and explain the Scriptures — starting at the beginning of a book and working through to the end. With the passing of time, as Christianity transitioned from a forbidden religion to the formally preferred religion of the Roman state, the simple explanation of Scripture became more of a philosophical discussion — and eventually preaching ceased to exist in the worship of the church. You can trace this even in the progression of church architecture: follow the removal of the pulpit and its replacement by the Lord's table.\n\nFor about 900 years, with some exceptions, the church neglected faithful preaching of the Word of God.\n\nUntil 1518, when a priest in Zurich, Switzerland named Zwingli decided that on the Lord's Day he would open his Bible to the beginning of Matthew and continue preaching through it Lord's Day after Lord's Day. What seems so commonplace today was revolutionary 500 years ago. That verse-by-verse preaching through the books of the Bible sparked the greatest revival in the church of Jesus Christ since the days of the Apostles — the Protestant Reformation.\n\nSome today might ask: why preaching in an age of such multimedia opportunity? Why not videos with special effects and great imagery? Why not drama or interpretive dance? And the reason, really, comes down to the Bible.\n\n## 1. We Preach Because the Bible Is the Very Words of God\n\nThroughout the Bible, the power of God is manifested primarily in the spoken word. He spoke, and creation came into existence. He spoke, and people were saved. When God wanted to convey the idea that he can bring people to life on his own, he told the prophet to speak his words to a valley of dry bones — not to make a video, not to perform a drama, but to speak. Life came through the proclaimed word.\n\nJesus Christ, when the Gospel of John names him, is called *the Word*. Not the meme. Not the video. Not the song. Not the image. Not the thought. Not the podcast. *The Word*. Jesus came at the fullness of time — Galatians 4:4 — not by accident, not because he couldn't wait for better technology. He came exactly when and how he chose, knowing every technology that would come after, and he chose to identify himself as the Word and to communicate his message through proclamation.\n\nThe disciples of Jesus disciple the nations as the church proclaims his Word. That is why our church is word-centric.\n\nNow the question might be: why preach the Bible specifically? Why verse by verse? The pastor of this passage tells us there are several reasons. First, because the Bible is the very words spoken by God.\n\n2 Timothy 3:16: *All Scripture is given by inspiration of God.* The word translated 'inspiration' is the Greek compound *theopneustos* — God-breathed. The breathing out of God is his speaking. God spoke through the writers of Scripture. Their breath was his breath. When we read Paul's words to Timothy, we are reading the very words of God. From Genesis 1 to Revelation 22, this is God speaking.\n\nNot only the concepts — the very words. In the New Testament, theological arguments are made based on a single letter of the Old Testament. Paul argues in Galatians that God said *seed* singular, not *seeds* plural — building a whole argument on that difference.\n\nWhen Paul says 'all Scripture,' he has in mind not only the Old Testament but also the apostolic teaching — what we call the New Testament. How do we know this? He uses a different term in verse 15 for the 'holy scriptures' of the Old Testament. Then in verse 16 he says 'all Scripture' — expanding the scope. And the evidence is clear: in 1 Timothy 5:18, Paul quotes from Deuteronomy 25 and then from Luke 10 and calls both 'Scripture.' In 2 Peter 3:15-16, Peter calls Paul's writings 'Scripture' alongside the rest. In 2 Thessalonians 2:13, Paul says his own words are 'the Word of God.' The entire Bible — both Testaments — is the Word of God.\n\nAnd that is why Paul could say to the Ephesian elders in Acts 20:27, with a clear conscience: *I have not shunned to declare to you the whole counsel of God.* He had done what God called him to do. He preached the Word.\n\n## 2. We Preach Because the Bible Is Useful\n\n2 Timothy 3:16: the Bible is *profitable* — useful — for four things.\n\nFor *doctrine* — teaching. The Bible imparts knowledge concerning God's revelation in Christ. Don't be afraid of the word 'doctrine' — it just means teaching. If you want to know God, this is the book to do that. The Westminster standards summarize: the main thing the Bible teaches is what we are to believe concerning God, and what God requires of us.\n\nFor *reproof* — warnings from the Scriptures about what needs to change; evidence of what we need to abandon. This is not something we want to receive, but it is something we desperately need.\n\nFor *correction* — the word means 'standing straight again'; like setting a broken bone. The Bible both knocks you flat with conviction and picks you up, dusts you off, and sets you in the right direction. What sin has broken, the Word can correct.\n\nFor *instruction in righteousness* — the training Paul describes in Titus 2:11-12: the grace of God teaches us to deny ungodliness and to live soberly, righteously, and godly in this present age. The put-off/put-on patterns of Ephesians 4: put away lying and speak truth; stop stealing and start giving; stop corrupt speech and speak what edifies.\n\nThese four things are the four steps in the process of change — and that change only happens through the Word of God. Brothers and sisters, do you want to grow to be more like Jesus Christ? It happens through the Word of God. No growth in Christlikeness occurs apart from the Word.\n\n## 3. We Preach Because God Commands It\n\nChapter 4, verse 2: *Preach the Word!*\n\nPaul puts Timothy under a solemn oath — before God and the Lord Jesus Christ who will judge the living and the dead at his appearing. This is as serious as it gets. Preach the Word.\n\nThe word 'preach' is the word for the king's herald — the official figure who unrolled the proclamation and read the king's words publicly and officially. The preacher is the ambassador of the King. He can only say what the King tells him in his Word. Preaching cannot happen without words. The saying attributed to Francis of Assisi — 'preach the gospel; use words if necessary' — is foolishness. Preaching *only* happens with words.\n\nPaul described his entire ministry as preaching. 1 Corinthians 2:2: *I determined not to know anything among you except Jesus Christ and him crucified.* That is what Paul's ministry was — a ministry of proclamation.\n\n## 4. We Preach Because It Makes the Man of God Complete\n\n2 Timothy 3:17: *that the man of God may be complete, thoroughly equipped for every good work.*\n\nThe primary reference is to the pastor, Timothy — but it applies to all of God's people. The pastor who is deeply committed to the Word of God and studies it in depth is fully equipped to minister to his congregation. The primary skill requirement for a pastor is to know the Word and be committed to it — because the preached Word equips.\n\nThis connects to Ephesians 4:12: God gave pastor-teachers to the church in order to equip it. It is through the Word that the whole church grows toward the fullness of Christ. It is through the Word that the church of Jesus Christ is equipped for every good work.\n\n## 5. We Preach Because Jesus Is Coming Back\n\n2 Timothy 4:1: the preacher is ultimately accountable to Jesus Christ, who will judge the living and the dead at his appearing. The fear of man is a constant and powerful temptation. Preachers want to be liked, praised, thought well of. It is difficult to stay faithful when approval comes by not being faithful. But Jesus is coming, and he is the only judge that matters.\n\nFor the same reason, 2 Timothy 4:3-4 describes a time when people will not endure sound doctrine — people with itching ears who heap up teachers who scratch them. Notice: this is the people in the pew, not the unbelieving world. The congregation of the Lord Jesus Christ bears responsibility for the preaching they receive. Ear-scratching preaching happens because congregations allow it and demand it.\n\nThe more difficult the times, the more faithfulness is required, not less. John Stott said: the harder the times and the deafer the people, the clearer and more persuasive the proclamation must be.\n\nAnd Paul reminds us: he could sit in prison in chains — but the Word of God was not chained. The Word is free. God changes the world through the proclaimed Word of life.\n\nFather, thank you for your Word. Thank you that it is the Word of life. We pray that we will be faithful to it, that we will be changed by it, from glory to glory, until we become more like the Lord Jesus Christ. In his name, amen.", "soundcloud_url": "https://soundcloud.com/olympiabp/03-17-24-am-expository-preaching-biblical-and-necessary-2-timothy-3_16-4_5-pastor-tito-lyro"};
