<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-praying-with-all-prayer", "title": "Praying with All Prayer", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["Praying with All Prayer - Pastor Tito Lyro - Ephesians 6_18-20.txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/lessons-from-the-school-of-prayer-4-praying-for-others", "tags": [{"tag": "prayer", "source": "detected"}, {"tag": "armor of God", "source": "detected"}, {"tag": "spiritual warfare", "source": "detected"}, {"tag": "perseverance in prayer", "source": "detected"}, {"tag": "intercession", "source": "detected"}, {"tag": "vocation", "source": "detected"}, {"tag": "boldness", "source": "detected"}, {"tag": "Lord's Prayer", "source": "detected"}], "scripture_references": [{"reference": "Ephesians 6:17-20", "source": "ai"}, {"reference": "Matthew 6:8-13", "source": "ai"}, {"reference": "John 17", "source": "ai"}, {"reference": "Philippians 1:4", "source": "ai"}, {"reference": "Romans 8:26", "source": "ai"}, {"reference": "Jude 20", "source": "ai"}, {"reference": "Philippians 4:6", "source": "ai"}, {"reference": "Matthew 26:41", "source": "ai"}, {"reference": "Luke 11:5-8", "source": "ai"}, {"reference": "Luke 18:1-8", "source": "ai"}], "outline": [{"point": "I. Prayer as the Second Offensive Weapon in the Armor of God", "subpoints": ["A. The sword of the Spirit and prayer are both offensive weapons against Satan", "B. Prayer goes along with all the other items of armor — it is the oil that lubricates them", "C. The word 'praying' in verse 18 is a participle modifying all the other commands in the passage"]}, {"point": "II. The Manner of Prayer (Ephesians 6:18)", "subpoints": ["A. Always: there is no occasion or subject for which prayer is not needed", "B. With all prayer and supplication: prayer includes praises, laments, confessions, petitions", "C. In the Spirit: true prayer is the activity of the regenerate — the Spirit brings our prayers before God (Romans 8:26)", "D. Being watchful: attentive to what is happening around us so we can pray specifically for it", "E. With all perseverance: stick to praying — people quit too early"]}, {"point": "III. The Content of Prayer (Ephesians 6:19-20)", "subpoints": ["A. Pray for the vocation of the saints — that each believer would be enabled to fulfill God's calling", "B. Paul asks for boldness to proclaim the gospel of Christ while in chains", "C. We pray for each other's boldness in every sphere: family, church, state, employment, evangelism"]}, {"point": "IV. Two Model Prayers", "subpoints": ["A. The Lord's Prayer (Matthew 6:8-13): categories for prayer — praise, alignment with God's will, daily dependence, confession, and acknowledgment of God's sovereignty", "B. The High Priestly Prayer (John 17): three concentric spheres — Jesus prays for himself (briefly), for his disciples (most extensively), and for all who will believe through their word (that's us)"]}, {"point": "V. Practical Resources and Exhortation", "subpoints": ["A. Recommended books: Taking Hold of God (Beeke), Power Through Prayer (E.M. Bounds), The Lord's Prayer (Thomas Watson), The Valley of Vision (Arthur Bennett)", "B. Use of a prayer list and prayer journal", "C. The throne room of God is always open to the believer — you have a permanent invitation"]}], "summary": "In this sermon on Ephesians 6:17-20, Pastor Tito Lyro argues that prayer is not merely a spiritual accessory but a second offensive weapon in the armor of God, alongside the sword of the Spirit. The word \"praying\" in verse 18 is a participle that modifies all the other commands in the passage — prayer is what holds the armor together and makes it effective. He examines the manner of prayer: always, with all prayer and supplication, in the Spirit, being watchful, and with all perseverance. He then draws out the content Paul specifically requests: that the saints would be enabled to fulfill their vocations and that the gospel would be boldly proclaimed in all circumstances.\n\nLyro illustrates proper prayer through two model prayers. The Lord's Prayer (Matthew 6) provides categories: adoration, alignment of will, daily dependence, confession, and acknowledgment of God's supremacy. The High Priestly Prayer (John 17) demonstrates a pattern of concentric spheres — Christ prays briefly for himself, most extensively for his disciples (the sphere closest to him), and then for all future believers. The sermon closes with recommended resources and an exhortation: the throne room of God is permanently open to the believer through Christ, and a praying man or woman cannot be overcome by Satan.", "transcript": "## Scripture Reading: Ephesians 6:17-20\n\nWhat do you mean standing for the table, we're going for one last time, week together, Ephesians 6, start on verse 17, through verse 20. Ephesians 6, start on verse 17, this is the Word of our Lord.\n\nAnd take the helmet of salvation and the sword of the Spirit which is the Word of God. Praying always with all prayer and supplication in the Spirit, being watchful to this end with all perseverance and supplication for all the saints. And for me, that utterance may be given to me, that I may open my mouth boldly to make known the mystery of the gospel, for which I am an ambassador in chains, that in it I may speak boldly as I ought to speak.\n\nThis is the Word of our Lord. Let us pray together. Lord, pray that you speak to us through your word. We pray, Father, that as the messenger of that word, that you enable me to speak what is truth and then to stand out of the way of that. We pray in Jesus' name. Amen.\n\n## Prayer as an Offensive Weapon\n\nWe have almost the whole armor of God on, so to speak, as we go through this series on the Ephesian church. We are almost ready to stand against all the schemes of Satan as we study this passage. There is only one thing left to put on.\n\nLast Sunday I said that in the whole armor of God, it only includes one offensive weapon. But as we examine this passage and as of studying this passage this week, we realize that there is actually a second offensive weapon given to us — another weapon to be used against Satan in the standing that God calls us to stand — and that is prayer.\n\nPrayer is also an offensive weapon. Real prayer is the ultimate act of faith. Where we really know our faith, where people really know what we believe, is when we are on our knees in prayer.\n\nNow we talk about praying. We say that we are going to pray for one another. But it is in the doing of it that we stand and fight Satan. Prayer goes along with all the other items. If you look at verse 18, we have the word \"praying always,\" and that word \"praying\" is a participle modifying all the other commands, all the other verbs in this passage. So prayer goes along with each of the items we have already looked at. It is what keeps the armor together. That's what makes it effective. It is the oil that lubricates the armor that allows us to fight Satan. It is another offensive weapon that will resist and attack and take away from Satan. It is the power of the strong man that ransacks the house of Satan and destroys his kingdom.\n\nMatthew Henry's commentary says this regarding the passage: we must join prayer with all these graces for our defense against these spiritual enemies, employing the help and assistance of God as the case requires. We must pray always — not as though we were to do nothing else but pray, for there are other duties of religion and of our respective stations in the world that are to be done in their place and season. But we should keep up constant times of prayer and be constant in them. We must pray upon all occasions, and as often as our own and others' necessities call to it.\n\nPraying to the Christian is as breathing to the human. You don't do it and you die. It is as simple as that.\n\n## The Manner of Prayer (Verse 18)\n\nI want to see two things in this passage today: the manner of prayer that Paul gives us, and the content of that prayer. And then we're going to look at two prayers in the Bible as models for us to follow.\n\n### Pray Always\n\nThe first thing about the manner is that we have to pray always. There's never a time when prayer is not called for. There's never a time when you think, I can just do this on my own. And there's never a subject for which prayer is not needed. There's not a subject small or great for which prayer is not needed. So we are always praying — we're in a constant state of being ready to pray.\n\n### With All Prayer and Supplication\n\nThe word \"prayer\" is the inclusive word for prayer. It includes praises, laments, confessions, petitions. And then Paul says we pray with all prayer and supplication. Supplication is the asking part. It is the asking for what is lacking. It is a response of faith — we are only going to bring supplication before God if we believe that He can answer. That He is the supplier of all things. It is also a response of humility: when we bring our requests to God, we are showing humility, knowing that on our own we can't get what we need. Paul says to the Philippians in Philippians 1:4: always in every prayer of mine making requests for you with all joy.\n\n### In the Spirit\n\nVerified 18 tells us: in the Spirit. Prayer, real prayer, is the activity of the one who has been regenerated. Only the Christian — only the one who has been born again and come to faith in Jesus Christ — can actually pray a prayer that the Lord will hear. Jude tells the church he writes to in verse 20: but you, beloved, building yourselves up on your most holy faith, praying in the Holy Spirit. And that's how we pray. The Holy Spirit brings our prayers before the Lord. Paul says in Romans 8:26: the Spirit also helps in our weakness. The Holy Spirit, as He comes with our spirit, connects us with God and brings our prayers before Him.\n\n### Being Watchful\n\nPaul continues in verse 18 that we are to pray being watchful. We're to stay awake in our prayers. This idea of being watchful includes the idea of being aware of what's going on in people's lives around us, so we can pray for them. The word used is for a guard upon a tower, watching to see if any enemy is coming to invade the city. Being watchful in our prayers means we are to pay attention to what's going on around us — in our city, our state, our country, our world — so we can pray for it. Isn't that what our Lord Jesus encouraged his disciples to do on that night in which he was betrayed? He says, watch and pray, lest you enter into temptation. The spirit indeed is willing but the flesh is weak.\n\n### With All Perseverance\n\nAnd Paul says that we pray with all perseverance. The word \"all\" is a redundant word — perseverance includes all — but Paul is emphasizing this aspect: we are to stick to praying. Praying and spanking are two things that people quit too early. God says prayer works. So we persevere in our praying. The Lord Jesus Christ Himself gave illustrations of that: if an evil judge, when you keep on knocking on his door, is going to answer you — how about your Father in heaven who loves you? If you keep on knocking on his door, do you think he is going to listen?\n\nAnd in Ephesians 6:18, Paul closes by saying that we are to pray for all saints. We are to make requests for the brethren. In order to do that, we need to know the brethren. We are to know the people that we worship Christ with and we are to pray for them. We are to bring them before the throne of grace and storm the mercy seat, bringing the names of all the saints before our God.\n\n## The Content of Prayer (Verses 19-20)\n\nIn verses 19 and 20, Paul gives us the content of the prayer that he wants us to pray. And for me, that utterance may be given to me, that I may open my mouth boldly to make known the mystery of the gospel, for which I am an ambassador in chains, that in it I may speak boldly as I ought to speak.\n\nPaul says: you pray for the vocation of the saints. That is, you pray for what the saints are called to do. Paul asks the Ephesians to pray that he would be able to fulfill his calling of proclaiming the gospel. Pray for me that I might do what God has called me to do. So he is asking Ephesians to pray for his vocation, his calling.\n\nAnd we are to pray that we and the brethren, the saints, would have grace and strength to fulfill God's calling in our lives. We are to pray that we are able to fulfill our vocation — our calling in our role in the family, in the church, in the state, in our employment. We are to look at life not as things we have to do, but as calling from God.\n\nNotice that the specific thing Paul asks is that the Ephesians pray for boldness for him to continue proclaiming the gospel while in prison. Philippians, written just a few months after Ephesians, contains a praise report: the Praetorian guard — the special forces of the Roman army — had now come to know Christ as Savior, because Paul indeed was enabled to fulfill his vocation to preach the gospel in chains, a vocation that he was able to fulfill because people like you and me were praying for him.\n\nSo we pray for boldness. We pray that all of us will be able to fulfill our vocations — and for boldness in fulfilling our vocations to proclaim the gospel of Jesus Christ, in the easy situations and the hard ones.\n\n## Two Model Prayers\n\n### The Lord's Prayer (Matthew 6:8-13)\n\nIn this manner therefore pray: Our Father in heaven, hallowed be your name. Your kingdom come, your will be done on earth as it is in heaven. Give us this day our daily bread. And forgive us our debts as we forgive our debtors. And do not lead us into temptation, but deliver us from the evil one. For yours is the kingdom and the power and the glory forever. Amen.\n\nHe starts, our Father in heaven. In verse 9 — our Father. Though it is valid to pray to the Son and to the Spirit, we should try to conform to what Jesus says and pray to the Father. Each person of the Trinity has a role in prayer — the prayers are directed to the Father because of who Jesus is and what He's done for us; that's what it means to pray in Jesus' name; and the prayers are offered to the Father through Jesus because of Jesus, through the Spirit.\n\nHe says that our prayers should include adoration: our Father in heaven, hallowed be your name, praise be your name. We praise God for whom He is, not just for what He's done for us. And as Jesus continues to teach us, He tells us that in our prayers we align our will with God's and our plans with His. Look at verse 10, your kingdom come, your will be done on earth as it is in heaven.\n\nOur prayers recognize complete dependence on God. Look at verse 11: give us this day our daily bread. We recognize: without you, we can't even live through today.\n\nIn verse 12, confession of our sins: forgive us our debts as we forgive our debtors. No forgiveness without confession. So forgive us implies confession.\n\nHe finishes by teaching us that we rely totally on God for our spiritual growth and life and acknowledge His absolute sovereignty over all things: do not lead us into temptation, but deliver us from the evil one. For yours is the kingdom and the power and the glory forever.\n\n### The High Priestly Prayer (John 17)\n\nIt always amazes me that the Lord Jesus Christ prayed for you and for me. Here is the evidence of that. On the night before He was crucified — when all kinds of things are going through his mind, when he knows he's going to be separated from his Father in just a few hours, when he knows that the eternal weight of God's wrath is going to be poured upon him — he prays for us.\n\nThis prayer is an example of form, not so much content, that we can use in our prayers. Notice in verses 1 through 5, Jesus prays for himself: Father, the hour has come, glorify your Son, that your Son also may glorify you. Jesus prays for himself and we should pray for ourselves as well. We need God's transforming work in us. But I want you to notice that the prayer for himself is the shortest portion.\n\nIn verses 6 to 19, Jesus prays for his disciples — those closest to him. He prays for those he has manifested God's name to, those who have received his words, those given to him out of the world. These would be our family and the people we are directly involved with in regular living. We can pray for them — we know their needs, their wants, their struggles. And that is the bulk of the prayer of Jesus.\n\nBut he doesn't stop there. Verses 20 and following — Jesus prays for those who are going to be saved through the testimony of the disciples: I do not pray for these alone, but also for those who will believe in me through their word. Who is that? It's you. It's me. He prayed 2,000 years ago. So Jesus prayed for us, and he continues to pray for us before the throne of God.\n\nBut I want you to notice that Jesus spent the bulk of his prayer praying for those closest to him. The idea of proximity — our neighbor is defined by proximity and affinity, those that we have direct contact with. So if you're praying for starving children in Africa but not praying for the person sitting next to you in the pew, you're not really following what Christ revealed in his prayer.\n\n## Closing Exhortation\n\nJohn Calvin's longest chapter in the Institutes of the Christian Religion is chapter 20 and the title is: Of Prayer, a Perpetual Exercise of Faith. He says: to know God as the master and store of all good things and not to go to him and ask of him — this would be of as little profit as for a man to neglect a treasure buried and hidden in the earth after it had been pointed out to him.\n\nAnother place in the same chapter: as children unburden their troubles to their parents, we go to God with our prayers.\n\nAnd: prayer is not so much for God's own sake as for ours, so that our hearts may be fired with a zealous and burning desire ever to seek, love, and serve him.\n\nDo you want to be on fire for the Lord? Pray. Get close to the cross through prayer.\n\nNow, the whole armor of God will not fit us if it's not lubricated and kept together by prayer. And Satan will not prevail against a praying man or a praying woman.\n\nLet us pray together. Father, thank you that you are a God who answers prayers. Thank you for the direction that you have given to us in your Bible. Thank you for all the details you have given us. Help us to believe in you to the point that we pray to you. In Jesus' name. Amen."};
