<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-the-risen-lamb-revelation-5", "title": "The Risen Lamb", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["The Risen Lamb - Pastor Tito Lyro - Revelation 5.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/the-risen-lamb-pastor-tito-lyro-revelation-5", "tags": [{"tag": "Christology", "source": "detected"}, {"tag": "worship", "source": "detected"}, {"tag": "redemption", "source": "detected"}], "scripture_references": [{"reference": "Revelation 5", "type": "quoted", "source": "detected"}], "outline": ["The sealed scroll and the question: who is worthy to open it? (vv.1-4)", "The Lion of Judah, the Root of David — a Lamb standing as though slain (vv.5-6)", "The Lamb takes the scroll (v.7)", "The new song: worthy is the Lamb who was slain (vv.9-10)", "Every creature in heaven, on earth, and under the earth joins the praise (vv.13-14)"], "summary": "An AM sermon on Revelation 5, the heavenly throne-room scene where the Risen Lamb is found worthy to open the sealed scroll. The Lion of Judah is revealed as a Lamb—bearing the marks of slaughter yet standing in resurrection power. The Lamb takes the scroll and the whole creation erupts in worship: ‘Worthy is the Lamb who was slain, to receive power and riches and wisdom and strength.’", "transcript": "## Scripture Reading: Revelation 5\n\n> *And I saw in the right hand of Him who sat on the throne a scroll written inside and on the back, sealed with seven seals. Then I saw a strong angel proclaiming with a loud voice, \"Who is worthy to open the scroll and to loose its seals?\" And no one in heaven or on the earth or under the earth was able to open the scroll, or to look at it. So I wept much, because no one was found worthy to open and read the scroll, or to look at it.*\n>\n> *But one of the elders said to me, \"Do not weep. Behold, the Lion of the tribe of Judah, the Root of David, has prevailed to open the scroll and to loose its seven seals.\" And I looked, and behold, in the midst of the throne and of the four living creatures, and in the midst of the elders, stood a Lamb as though it had been slain, having seven horns and seven eyes, which are the seven Spirits of God sent out into all the earth. Then He came and took the scroll out of the right hand of Him who sat on the throne.*\n>\n> *Now when He had taken the scroll, the four living creatures and the twenty-four elders fell down before the Lamb, each having a harp, and golden bowls full of incense, which are the prayers of the saints. And they sang a new song, saying: \"You are worthy to take the scroll, and to open its seals; for You were slain, and have redeemed us to God by Your blood out of every tribe and tongue and people and nation, and have made us kings and priests to our God; and we shall reign on the earth.\"*\n>\n> *Then I looked, and I heard the voice of many angels around the throne, the living creatures, and the elders; and the number of them was ten thousand times ten thousand, and thousands of thousands, saying with a loud voice: \"Worthy is the Lamb who was slain to receive power and riches and wisdom, and strength and honor and glory and blessing!\"*\n>\n> *And every creature which is in heaven and on the earth and under the earth and such as are in the sea, and all that are in them, I heard saying: \"Blessing and honor and glory and power be to Him who sits on the throne, and to the Lamb, forever and ever!\" Then the four living creatures said, \"Amen!\" And the twenty-four elders fell down and worshiped Him who lives forever and ever.* (Revelation 5:1–14)\n\nPlease be seated. In the summer of 1741, George Friedrich Handel composed what became the most famous work in the English-speaking world in the incredibly short period of 24 days. He wrote 54 pieces of music to accompany a previously written history of redemption. I'd love to say he did it out of great love for the Lord — but he actually did it because he was broke. He found this libretto — the text of what has become known as Handel's Messiah — and wrote music to accompany it, that history of redemption.\n\nHandel's Messiah is a three-movement oratorio that tells the history of redemption from the birth of Christ to His passion, including the prophecies concerning His birth, culminating with His glorification in heaven. Although in recent history Messiah has been associated with Christmas, when Handel wrote it he intended it to be performed at Easter. Another common misconception is that Messiah ends with the Hallelujah Chorus. That became famous when the Monarch of England stood during a London performance — presumably because a greater King was being sung about — and everyone stood with him. But the Hallelujah Chorus ends only the second movement. There are a whole other ten songs following it. The actual climax and great point of Handel's Messiah is the last song our choir sang this morning: that the Lamb is worthy of all glory, honor, and power — which is based on our text in Revelation chapter 5.\n\n## The Scroll in the Father's Hand (v. 1)\n\nChapter 5 gives us a glimpse into this heavenly scene in which the Lord Jesus Christ is commissioned by God the Father to unfold the history of redemption from the death and resurrection of Christ to His coming again. This is a majestic scene that takes place in the throne room and courts of heaven, where Father, Son, and Holy Spirit come together to open the scroll of human redemption.\n\nThe first thing we see in this vision is God sitting on His throne with a scroll in His hand. As will become clearer as we move through this passage, this is God the Father holding a sealed scroll. He holds it in His right hand — the hand of power, the hand of authority. No one can take it from His hand; He gives it to someone. God is holding the history of redemption in His right hand, and nobody is going to be able to take it from His hand unless He gives it to them.\n\nIn the scroll we find the history of God's redemption of His people — from the cross to the second coming of Christ. In essence, we find in the scroll the book of Revelation itself. God holds in His hand the history of salvation, and it is His alone.\n\nDo you realize that God is in control of everything, even in the midst of your greatest struggle? Brothers and sisters, our sovereign God holds the destiny of the world in the palm of His hand. The scroll contains God's unfolding plans for the future — the course of history, the consummation of the kingdom of God leading up to the end of the world, God's sovereign decrees for the future glorification of believers and the final condemnation of unbelievers. It is all in God's hand.\n\nJust the previous chapter, the hosts of heaven sing:\n\n> *\"You are worthy, O Lord, to receive glory and honor and power; for You created all things, and by Your will they exist and were created.\"* (Revelation 4:11)\n\nThat is our God — the One who controls all things, in whose hand the destiny of every last person is found. God is sovereign over all. The wind blows at His bidding and the sun shines at His command. Our God charts the course of all nations and holds the rulers of the earth in the palm of His hand.\n\nBrothers and sisters, it is good news that Vladimir Putin is not sovereign over all. It is good news that Xi Jinping is not sovereign. It is good news that no human ruler is sovereign. Jesus Christ, God the Son, the King of Kings and Lord of Lords, is in control of all things. Our God is sovereign over every one of them, and over you, and over me.\n\nOur God knows all things, creates all things, ordains all things, sustains all things, and owns all things — including you. The Creator of all things has authority over all things. He has the right to save sinners. He has the right to condemn sinners. And \"the sinner\" is not some abstract category up there — the sinner is everyone apart from the Lord Jesus Christ.\n\nBrothers and sisters, God does not need you. He does not need me. He does not need any of us in this room. He does not need the Bible Presbyterian Church. Every one of us could drop dead and turn to dust, and God would still make a great name for Himself among the nations. Praise be to God. And yet God calls you to serve Him. Why? Because He loves you. He has invited you to be involved in spreading the gospel — in your family, in your neighborhoods, and through them to the whole world, that the nations might be glad that King Jesus rules.\n\nOur sovereign God holds the destiny of the world in the palm of His hands, and that includes your destiny as well. And if you're in Christ, you don't want your destiny anywhere else but in the palm of God's hand.\n\n## The Scroll Is Sealed — No One Is Worthy (vv. 2–4)\n\nBut there is a problem. The scroll is sealed. The strong angel here functions as the King's herald, looking for the champion who will be able to receive the scroll from the King, open it, reveal its contents — and more than reveal, to execute and enforce what is written. The angel cries out: who can be God's champion who has proved himself worthy to be handed the scroll of redemption?\n\nJohn weeps, because he looks around heaven and earth and finds no creature that can open God's scroll. Verses 3–4:\n\n> *\"And no one in heaven or on the earth or under the earth was able to open the scroll, or to look at it. So I wept much, because no one was found worthy to open and read the scroll, or to look at it.\"*\n\nThis teaches us that only God Himself can open the scroll. There is nobody else in heaven or on earth that can do this. And as we will see, only the Lord Jesus Christ — who is God Himself — is worthy to open the scroll. There is no other like Him.\n\nThis also teaches us that we should not be looking to creatures to do what only God can do: namely, to redeem us from sin and spare us from the wrath to come. Self-fulfillment? That's great. Happiness? Also great. But our greatest need is redemption. Our greatest problem is sin. This passage puts your mind at rest concerning the deity of Christ: Christ is God. He is worthy to be handed over the control of all of history. He is God's champion. There is no one else like Him.\n\n## The Lion Who Is the Lamb (vv. 5–6)\n\nThen one of the elders comforts John. Verse 5:\n\n> *\"But one of the elders said to me, 'Do not weep. Behold, the Lion of the tribe of Judah, the Root of David, has prevailed to open the scroll and to loose its seven seals.'\"*\n\nThis is a reference to the Son as the Messiah who came to fulfill the promises given to David. Christ is the eternal King who sits on the throne of David and rules over Israel — the Israel of God, the church. The ESV renders verse 5 more clearly: \"Weep no more; behold, the Lion of the tribe of Judah, the Root of David, has conquered, so that He can open the scroll and its seven seals.\"\n\nThe Lion of Judah is worthy to open the scroll because He has triumphed over all His and our enemies. The Lord Jesus Christ has won — and we know He won because He is risen. He won it by doing the very thing His enemies wanted Him to do: He won it by dying, by dying on the cross and being raised from the dead. He has defeated every enemy, including death itself.\n\nAnd because He won the victory over death, He reigns. He is the King of Kings and the Lord of Lords. It is worth noting that above the cross of every prisoner condemned under Roman law was written the charge for which he was found guilty. Over Jesus' cross was written: \"The King of the Jews.\" And one of the Gospel writers tells us it was written in every common language so that every nation would know what He was charged with — and what He was charged with was exactly what He was, and is. The King.\n\nNotice that the elder encourages John by pointing him to the victorious Christ. \"Weep no more. Look at the Lion of Judah. Look at Jesus.\" That's how we encourage people. We point them to Christ. Remember the disciple Andrew? In John 12, some Gentiles came and said, \"We wish to see Jesus.\" What did Andrew do? \"Come — I'll take you to Him.\" That's what we do.\n\nThe greatest news we have — the greatest news in all the world — is that the slaughtered Lamb of God reigns as the sovereign Lord of all. He was promised centuries ago. All the way back in Genesis 49, \"The Lion of the tribe of Judah — to him shall be the obedience of the peoples.\" He is the Root of David, prophesied in Isaiah:\n\n> *\"There shall come forth a shoot from the stump of Jesse, and a branch from his roots shall bear fruit. The Spirit of the Lord shall rest upon him, and he will stand as a signal for the peoples.\"* (Isaiah 11:1–2, 10)\n\nThe Lion from the tribe of Judah and the Root of David has come, and He has conquered. Therefore the elder says: weep no more.\n\nFrom the beginning of time, throughout history, sons have come and sons have gone. All of them — the noblest, the kindest, the strongest, the greatest — all have fallen prey to sin. But then came another Son, unlike any before Him. He did not fall prey to sin. He possessed power over sin. He was not enslaved to Satan — He crushed the ancient serpent's head. He did not succumb to death — He triumphed over death. And that is why we can sing with the Apostle Paul:\n\n> *\"O Death, where is your sting? O Hades, where is your victory? The sting of death is sin, and the strength of sin is the law. But thanks be to God, who gives us the victory through our Lord Jesus Christ.\"* (1 Corinthians 15:55–57)\n\n## The Slaughtered Lamb on the Throne (v. 6)\n\nWhen John turns to see the Lion, what he sees is a Lamb. Verse 6:\n\n> *\"And I looked, and behold, in the midst of the throne and of the four living creatures, and in the midst of the elders, stood a Lamb as though it had been slain, having seven horns and seven eyes, which are the seven Spirits of God sent out into all the earth.\"*\n\nJohn expected to see the powerful and majestic Lion, the King of the jungle. Instead he sees a Lamb that looked fairly beat up — like it had been slaughtered. That is not the world's image of a champion. But it is the most glorious image a Christian can see: the slaughtered Lamb of God who came for the sins of the world.\n\nYet there was something very powerful about this Lamb. First, the Lamb was the center of attention of all the heavenly beings — the entirety of heaven was focused on Him, seated on the throne as King.\n\nAnd this Lamb had seven horns. In the Bible, the horn is a picture of strength. Seven is the number of perfection. So this Lamb had perfect strength — in other words, He was all-powerful, omnipotent. He also had seven eyes: eyes are a symbol of knowledge and wisdom, and seven eyes means perfect knowledge — omniscient. The seven Spirits of God, the perfect Spirit, was doing His bidding.\n\nAll these characteristics belong to God alone. We can only conclude that the Lamb who was slain to redeem His people is none other than God the Son, incarnate for His people.\n\n## The Lamb Receives the Scroll and Heaven Erupts in Worship (vv. 7–14)\n\nThen the Lamb received the scroll. And when the scroll was handed to the Lamb, heaven broke out in worship. Verse 8:\n\n> *\"Now when He had taken the scroll, the four living creatures and the twenty-four elders fell down before the Lamb, each having a harp, and golden bowls full of incense, which are the prayers of the saints.\"*\n\nRedemption is available for God's people. Christ reigns. And He is worthy to be worshiped. The four living creatures and the twenty-four elders fall before Him, bringing the prayers of the saints. Though the text doesn't explicitly say what prayers these are, the context strongly suggests they are the second petition of the Lord's Prayer: \"Your kingdom come.\" These are the prayers of God's people being brought before the Lamb, because He is the King. The scroll is open. People are going to be saved — a multitude that cannot be numbered.\n\nThe new song in verse 9 had never been sung before, because the Lamb had not yet been enthroned. And notice that the number of singers increases as the worship continues: in verse 9 it is the four living creatures and twenty-four elders; in verse 11, thousands upon thousands of angels; in verse 13, the entirety of creation worshiping the Lamb.\n\nThe heavenly creatures and elders recognize the worth of the Lamb:\n\n> *\"You are worthy to take the scroll and to open its seals; for You were slain, and have redeemed us to God by Your blood out of every tribe and tongue and people and nation, and have made us kings and priests to our God; and we shall reign on the earth.\"*\n\nHe is worthy because He conquered by His blood. The Lamb died for all kinds of people. And this very congregation is living proof of that. If we were to trace our genealogies, we would find almost every people group in this room. Do you want to see a glimpse of heaven? Look around — this is it. A flawed, incomplete version of it, but a real testimony that the Lamb of God was slain and came back to life.\n\nYou say, \"How can you prove He is alive?\" One of the proofs is that we are actually together in this body. People who apart from Christ would be at each other's throats are walking together, hand in hand, shoulder to shoulder, serving the Lamb. If the Lamb died for all kinds of people, can He not save the people of Olympia? Can He not save every student at the local college? Can He not save the people in our state government? Can He not save you? The answer to all these questions is: He certainly can.\n\nThe Lamb also makes those for whom He died a kingdom of priests: \"You have made us kings and priests to our God, and we shall reign on the earth.\" We are those who bring people to God, and God to people. We are the priests of this kingdom — the ones with direct access to the Most High God. We don't need anyone to stand between us and God. We have Jesus Christ. We are priests, and priests bring others to Christ as well. That is what we are called to do.\n\nThe worship of the Lamb continues in verses 11–12 with a choir of millions — ten thousand times ten thousand and thousands of thousands — ascribing infinite honor and power to the One at the center of it all. Seven attributes are named, again suggesting the perfection of the One being worshiped.\n\nThe scene ends with the entire created order — every creature in heaven, on earth, under the earth, and in the sea — worshiping both Father and Son in verses 13–14. Both are worshiped equally. Both are worshiped eternally. Both receive blessing, honor, glory, and power, because both are God: two persons of the Triune God.\n\nAnd the only thing left in this heavenly scene is for the four living creatures who stand day and night before the throne to say: **Amen.** Let it be so. Let the Lamb who was slain reign.\n\nThis Lamb is the Lord Jesus Christ — God the Son, who came in the flesh to obey the Father in life and in death. He is the One whose blood was shed on the cross on behalf of all who trust in Him. He is the One who conquered the last enemy, death itself, by being raised from the dead on the third day. This is Jesus Christ, the only Savior of humanity, who stands with the scroll of human redemption in His hand. He is the only One who can save you.\n\nAnd He is risen. Fall down before Him. Join the chorus of heaven and worship Him."};
