<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-hope-psalm-130", "title": "Hope!", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["Hope! - Pastor Tito Lyro - Psalm 130.txt"], "soundcloud_url": null, "tags": [{"tag": "hope", "source": "detected"}, {"tag": "despair", "source": "detected"}, {"tag": "sin", "source": "detected"}, {"tag": "forgiveness", "source": "detected"}, {"tag": "lament", "source": "detected"}, {"tag": "covenant faithfulness", "source": "detected"}, {"tag": "trust in God", "source": "detected"}], "scripture_references": [{"reference": "Psalm 130", "type": "quoted", "source": "detected"}, {"reference": "Psalm 51", "type": "quoted", "source": "detected"}, {"reference": "Psalm 69:1-2", "type": "quoted", "source": "detected"}, {"reference": "Psalm 40:1-3", "type": "quoted", "source": "detected"}, {"reference": "Romans 5:7-8", "type": "quoted", "source": "detected"}, {"reference": "Romans 8:26", "type": "quoted", "source": "detected"}, {"reference": "Hebrews 4", "type": "quoted", "source": "detected"}, {"reference": "Hebrews 6:13-20", "type": "quoted", "source": "detected"}, {"reference": "John 16:8", "type": "quoted", "source": "detected"}, {"reference": "Luke 15:17-24", "type": "quoted", "source": "detected"}, {"reference": "Malachi 4:2", "type": "quoted", "source": "detected"}], "outline": [{"title": "Introduction: What Kind of Psalm Is This?", "points": ["Psalm 130 is part of the Songs of Ascents (Psalms 120–134), sung by pilgrims ascending to Jerusalem", "It is also a penitential psalm, one of seven in the Bible (cf. Psalm 51 the previous week)", "Internally the psalm itself is an ascent—rising from the depths of despair to proclaiming God’s mercy", "Luther called it a Pauline psalm for its emphasis on imputation and unmerited forgiveness"]}, {"title": "The Depths of Despair (vv. 1–2)", "points": ["The psalmist is in the depths because of an awareness of sin, not merely outward suffering", "In despair, the psalmist makes a critical choice: he cries out to God rather than looking inward or to the world", "The Spirit intercedes with groanings too deep for words (Romans 8:26)—the psalmist’s cry mirrors this", "Matthew Henry: continuing to call upon God is our duty and our interest in every condition, however deplorable"]}, {"title": "The Psalmist’s Hope in God (vv. 3–6)", "points": ["The psalmist’s hope is grounded in who God is: the covenantal LORD (YHWH) who has sworn to be with his people", "God is a forgiving God who does not mark iniquities—the unmerited pardon was known even by Old Testament saints", "God’s covenant faithfulness (hesed) is the anchor of hope: he swore by his own name and will not be unfaithful (Hebrews 6:13–20)", "The parable of the prodigal son illustrates the same hope: the repentant sinner finds a running, embracing Father", "Because God forgives, the psalmist can wait—in this context, to wait for God and to hope in God are the same thing"]}, {"title": "Waiting for the Lord (vv. 5–6)", "points": ["The soul’s hope is not superficial but deep—it is the soul itself that waits and hopes in the Lord", "The watchman metaphor: one who guards the wall during the last watch, certain the sun will rise even before any light appears", "The repetition of ‘more than those who watch for the morning’ conveys that waiting can be extended and painful, yet confident", "The sun of righteousness (Malachi 4:2) is the Lord Jesus Christ—the psalmist’s hope is ultimately in his coming", "Calvin: when a man embraces the word and is assured God attends to his welfare, that assurance is the mother of patience"]}, {"title": "Testimony and Application (vv. 7–8)", "points": ["The ascent from the depths is completed when the psalmist declares God’s mercy to others (cf. Psalm 40:1–3)", "The psalmist calls Israel to hope in the LORD: with him is mercy and abundant redemption from all iniquities", "Application 1: Do you believe that seeing sin in yourself is a good thing? Awareness of sin is evidence the Holy Spirit is at work in you", "Application 2: Do you believe sin is against God personally, not merely a violation of abstract rules?", "Application 3: Do you believe sin goes to the level of motives, thoughts, and deeds—not just outward actions?", "Application 4: Can you pinpoint right now a handful of specific sins in your life? Concrete awareness of sin is the soil in which gospel hope takes root"]}], "summary": "In this sermon on Psalm 130, Pastor Tito Lyro explores the anatomy of hope for the believer who finds himself in the depths of despair. Psalm 130 is simultaneously a Song of Ascents, a lament, a penitential psalm, and what Luther called a Pauline psalm—its internal movement mirrors the very ascent it describes, rising from the pit of sin-awareness to proclaiming God’s mercy to all Israel. The psalmist’s hope is not superficial optimism but a soul-deep conviction grounded in who God is: the covenantal LORD who has sworn by his own name to be faithful, who forgives without merit, and whose hesed (covenant faithfulness) cannot be exhausted.\n\nPastor Lyro draws on the watchman metaphor of verses 5–6 to describe the nature of Christian hope: like the guard on the wall who is absolutely certain the sun will rise even before any light appears on the horizon, the believer waits for God’s deliverance with confident expectation rather than anxious doubt. That sun is none other than the Lord Jesus Christ, the sun of righteousness spoken of by Malachi. The parable of the prodigal son from Luke 15 illustrates the same arc—the son in the depths comes to himself, turns to the father, and finds not rejection but a running embrace. The previous Sunday’s sermon was on the other penitential psalm Psalm 51.\n\nThe sermon closes with four diagnostic application questions designed to help the congregation take sin seriously as the precondition for true hope. Pastor Lyro argues counterintuitively that recognizing sin in oneself is a mark of grace—evidence that the Holy Spirit is at work—and that concrete, particular awareness of one’s own sins is the very soil in which gospel hope takes root. Only those who know themselves as real sinners can appreciate God’s forgiveness and find in him the anchor they need in a broken world.", "transcript": "Today we're going to be considering Psalm 130. This is the Word of our Lord.\n\n> *\"Out of the depths I have cried to You, O Lord; Lord, hear my voice! Let Your ears be attentive to the voice of my supplications. If You, Lord, should mark iniquities, O Lord, who could stand? But there is forgiveness with You, that You may be feared. I wait for the Lord, my soul waits, and in His word I do hope. My soul waits for the Lord more than those who watch for the morning — yes, more than those who watch for the morning. O Israel, hope in the Lord; for with the Lord there is mercy, and with Him is abundant redemption. And He shall redeem Israel from all his iniquities.\"* (Psalm 130)\n\nThis is the Word of our Lord. Let us pray together. Father, we pray that as we consider this passage, You will grant us according to the riches of Your glory to be strengthened with might through Your Spirit in the inner man. We pray that Christ will dwell in our hearts through faith, that we may be rooted and grounded in love, and that we may grow in our knowledge of Your love so that we may be filled with all the fullness of You. We pray these things in Jesus' name. Amen.\n\nHope. That is the simple title I chose for this sermon. Hope — in the middle of a broken world filled with suffering, that is really what we need. Hope — that is what we need when we look at our own hearts and see the darkness of sin in them. We often find ourselves with the psalmist in the depths, and I am afraid to say it happens more often than I would like to admit. What was his hope in the depths of that dark despair? As we read the song, it becomes obvious: his hope was God, and God alone. Whoever the songwriter was, he could very well say with the sons of Korah: \"Why are you cast down, O my soul, and why are you disquieted within me? Hope in God, for I shall yet praise Him for the help of His countenance.\"\n\n## What Kind of Song Is This?\n\nThis song is part of the Great Hallel — the Psalms 113–136 — commonly associated with the Passover in Second Temple Judaism. But as we read the title, we also see that this is a Song of Ascents. There are 15 Songs of Ascents in the Psalter, likely sung by pilgrims as they ascended the hill to Jerusalem during the three great pilgrim feasts: Passover, Pentecost, and Tabernacles. What is peculiar about this particular song is that internally it is also an ascent — the song itself rises from the depths of despair to proclaiming the mercy of God.\n\nWe also see that this is a lament. There are several lament psalms in the Psalter, and this is one of them — a cry to the Lord, the experience of a believer brought low either by his own sin or by sin around him. Psalms like this help us express ourselves in moments where words don't come naturally. Carl Trueman writes: \"Read the Psalms over and over until you have the vocabulary, grammar, and syntax necessary to lay your heart before God in lamentation. If you do this, you have the resources to cope with your own times of suffering, despair, and heartbreak, and to keep worshiping and trusting through even the blackest of days. You will also develop a greater understanding of fellow Christians whose agonies of, say, bereavement, depression, or despair sometimes make it difficult for them to bounce around in ecstasy singing on a Sunday morning. And you will have more credible things to say to those shattered and broken in the world.\"\n\nThis is really what the Psalms do to us, particularly these psalms of lament. Psalm 130 is also one of the seven penitential psalms — confessions of sin, but not merely private confessions. These are individual confessions of sin shaped to become corporate confessions, corporate cries to God. And finally, Luther called this a Pauline psalm because of its emphasis on imputation and unmerited forgiveness, as we will see.\n\n## The Depths (Verses 1–2)\n\nThe psalm opens: *\"Out of the depths I have cried to You, O Lord; Lord, hear my voice! Let Your ears be attentive to the voice of my supplications.\"* The psalmist is in the depths because of an awareness of sin. We know that because of the relief he experiences when he remembers God's forgiveness in verses 3–4. His awareness may be of sin in general, or of his own sin, or of some particular sin that has driven him down into despair.\n\nAnd in the despair, the psalmist does the only thing he can do: he turns to the only One who can do something about his despair — God himself. Ed Welch writes in his book *Depression: Looking Up from the Stubborn Darkness* about this very psalm: \"While teetering on the edge of the abyss, the psalmist has a choice. He can mourn his fretful condition, or he can cry out to the Lord.\" And that is exactly what he does.\n\nHe doesn't just talk with God in the depths. He cries out to him. Paul says in Romans 8:26: \"Likewise the Spirit also helps in our weaknesses. For we do not know what we should pray for as we ought, but the Spirit Himself makes intercession for us with groanings which cannot be uttered.\" That is the impression we get about the psalmist — he is almost at the place where he doesn't even have words to say, and yet he cries out to the Lord.\n\nMatthew Henry, the old Puritan-style Presbyterian commentator, says: \"In these verses we are taught, whatever condition we are in, though ever so deplorable, to continue calling upon God. It is our duty and interest to cry unto God, for that is the likeliest way both to prevent our sinking lower and to recover us out of the horrible pit and the miry clay.\"\n\nThat is why it is so important to listen to this: if you are looking inwardly into your heart, or outwardly to the world, for deliverance, you will only sink deeper into the depths of despair. If your cry out of the depths is not to God, you will go further and further down.\n\nCharles Spurgeon: \"If men were to be judged upon any system other than that of free grace, who among us could answer for himself at the Lord's bar and hope to stand clear and accepted?\" If we are coming to anything else but God — or if we are coming to God only because we think we deserve something — we will just slip deeper into the despair.\n\nWhat does it feel like to be in these depths? Psalm 69:1–2 gives us the picture: \"Save me, O God! For the waters have come up to my neck. I sink in deep mire, where there is no standing; I have come into deep waters, where the floods overflow me.\" It is like being at the bottom of a well, very muddy, sinking into the mud. You cannot get out. The waters are coming up to your neck — you can barely breathe. That is the feeling of despair the psalmist is describing. Or perhaps being caught in the tidal flats as the tide comes in, the waves rising against you, with nothing you can do.\n\n## The Psalmist's Hope (Verses 3–6)\n\nFrom the depths of despair, the psalmist moves to hope. Verses 3–4:\n\n> *\"If You, Lord, should mark iniquities, O Lord, who could stand? But there is forgiveness with You, that You may be feared.\"*\n\nThe psalmist's hope is God himself. God is his hope because he knows who God is.\n\n**God is a covenant God.** We see this throughout the psalm in the use of \"Lord\" — where the Hebrew is printed in small capitals as LORD — the translation of God's covenantal name, the name God revealed to Moses and to Abraham when he entered into covenant to be their God and the God of their children. That is the promise God makes to us: he is going to be our God, and we are going to be his people, regardless of what we are going through.\n\n**God is a God who hears.** Verse 2: \"Let Your ears be attentive to the voice of my supplications.\" Perhaps what God said to Moses in Exodus 3 is resonating in his ears: \"I have surely seen the oppression of My people, and have heard their cry because of their taskmasters, for I know their sorrows.\" Or perhaps he is anticipating what the Holy Spirit would say through the author of Hebrews 4: that we have a sympathetic High Priest who knows what we are going through, who encourages us to come before his throne even boldly.\n\n**God is sovereign.** Look at verses 5–6, where the word \"Lord\" appears differently twice: the first is the covenantal LORD; the second is Adonai, the Almighty. The God who covenants with his people is also the Almighty God who can do the things he promised to do.\n\n**God is forgiving.** Look at verses 3–4. If God kept a record of sins — if he marked every iniquity — who could stand? Not one of us. But there is forgiveness with him. God will not count our sins against us. Whatever the soul goes through, the psalmist knows it does not come close to what he really deserves. And on top of that, God is not going to count those sins against him. Even at the height of our godliness, we always come before God as beggars who do not deserve the least of his mercies.\n\nMost people are willing to admit that everyone is a sinner. Some will even admit that they themselves are sinners. But God will not become our hope until we recognize that we are sinners *in practice* — when we own up to particular sins. It is when we concretely think of ourselves as sinners that we find great hope in God.\n\nIt is interesting to note that the Old Testament saints already knew about the unmerited pardon of God. We tend to say that Old Testament saints were saved by obeying the law and knew nothing of grace — yet right here in verses 3–4 we find that the psalmist's hope was the unmerited pardon, the unmerited forgiveness, the unmerited grace of God. This is exactly the point Paul makes in Romans 4:5–8, quoting another penitential psalm, Psalm 32, where David says something very similar to Psalm 130.\n\n**What exactly is this forgiveness?** It is God's declaration that he does not hold anything against us because Jesus took upon himself the guilt of everything we have ever done or will ever do against God. It is the declaration that nothing can separate us from the love that God has for us in Christ Jesus.\n\nThis is beautifully illustrated by the parable of the prodigal son in Luke 15. The younger son asks his father for his inheritance, goes away, lives a life of ungodliness, squanders the money, loses all his friends when the money runs out, and eventually finds himself feeding pigs — and then he comes to himself. Picking up in Luke 15:17:\n\n> *\"When he came to himself, he said, 'How many of my father's hired servants have bread enough and to spare, and I perish with hunger! I will arise and go to my father, and will say to him, \"Father, I have sinned against heaven and before you, and I am no longer worthy to be called your son. Make me like one of your hired servants.\"' And he arose and came to his father. But when he was still a great way off, his father saw him and had compassion, and ran and fell on his neck and kissed him... But the father said to his servants, 'Bring out the best robe and put it on him, and put a ring on his hand and sandals on his feet. And bring the fatted calf here and kill it, and let us eat and be merry; for this my son was dead and is alive again; he was lost and is found.'\"* (Luke 15:17–24)\n\nDo you see the hope of the son? As a repentant sinner, he hoped that God would forgive him and embrace him. That is the only hope any of us have. The son found hope in his despair when he considered his sin and God's forgiveness.\n\nTurning to God for forgiveness when you are in despair is not the advice that would naturally come to us if a depressed person came to talk with us. Often sin is the last word we want to bring into a conversation about depression. Yet it is in sin-talk and forgiveness-talk that the prodigal finds great hope — steps that form a stairway for him to get out of the depths.\n\n## Waiting for the Lord (Verses 5–6)\n\n> *\"I wait for the Lord, my soul waits, and in His word I do hope. My soul waits for the Lord more than those who watch for the morning — yes, more than those who watch for the morning.\"*\n\nThe words \"wait\" and \"hope\" mean the same thing in this context. To wait *for* is to hope *in*. Calvin says: \"When a man, embracing the Word, becomes assured of having his welfare attended to by God, this assurance will be the mother of waiting and patience.\"\n\nNotice that this is not a surface-level kind of hope — not a demeanor that people around can see and say, \"That guy is really hoping in the Lord.\" It is soul-deep hope. The psalmist compares this hope to the watchman keeping guard on the wall. The watchman during the last watch of the night fixes his eyes on the horizon in great expectation of the rising of the sun. He does not wonder if the sun is coming up. He knows it is coming, and with it the shadows where enemies could hide will be dissipated — another night without attack, and he can go home. He had done his job.\n\nThe repetition of the same words in verse 6 — \"more than those who watch for the morning\" — gives the impression that this wait can be extended. It can be painful. But the soul is convinced that the sun is coming. He is not doubting.\n\nAnd to bring the words of another psalmist into this one: the watchman was excited about the morning because joy comes with the rising of the sun, even after a difficult night of weeping — because that sun is the Lord Jesus Christ. The prophet Malachi says:\n\n> *\"But to you who fear My name the Sun of Righteousness shall arise with healing in His wings; and you shall go out and grow fat like stall-fed calves.\"* (Malachi 4:2)\n\nThe soul's hope in God is hope in God who is coming in the person of the Lord Jesus Christ.\n\n## The Testimony (Verses 7–8)\n\n> *\"O Israel, hope in the Lord; for with the Lord there is mercy, and with Him is abundant redemption. And He shall redeem Israel from all his iniquities.\"*\n\nThe ascent from the depths is completed when the psalmist declares to others the work that God in Christ has done for him. He has experienced the new song that God placed in his mouth, much like David in Psalm 40:1–3: \"I waited patiently for the Lord; and He inclined to me, and heard my cry. He also brought me up out of a horrible pit, out of the miry clay, and set my feet upon a rock, and established my steps. He has put a new song in my mouth — praise to our God; many will see it and fear, and will trust in the Lord.\" The same movement: stuck in the miry depths, then God himself brings him up as he hopes in God and establishes him on the sure foundation of a rock — that rock being the Lord Jesus Christ.\n\nThe psalmist here in Psalm 130 wants others to have the same hope. His testimony is that God's mercy and forgiveness cannot be exhausted, that God's redemption is abundant and his covenant faithfulness is unfailing. The sinner does not have to despair. This is the message for the church of Jesus Christ. Where is your hope right now? What are you trusting? What are you hoping will deliver you from whatever situation you are in? God himself redeems his church from all her iniquities.\n\n## Four Application Questions\n\nAs we close, I want to ask you four questions.\n\n**First: Do you believe that seeing sin in yourself is a good thing?** I am asking you to acknowledge that you are a sinner who currently has sinful thoughts, words, and deeds in your life. Contrary to popular belief, it is a good thing when we see sin in ourselves, for two reasons. Sin may feel natural, but we were originally created to live without it — true, unadulterated humanity is sinless. As we battle with sin, we get tastes of how we were intended to live. And when we are forgiven by God like the psalmist, we find joy and hope — which is only possible if we understand that seeing sin in our lives is a good thing. Second: when we see sin in us, it is evidence that God is close to us, because it is the Holy Spirit who convicts of sin. Jesus says in John 16:8: \"When He, the Holy Spirit, has come, He will convict the world of sin, and of righteousness, and of judgment.\" If you see sin in your life, have hope — the Holy Spirit is at work in you. Knowledge of sin is a tangible evidence of God's love for you, counterintuitive as that may be.\n\n**Second: Do you believe that sin is against God?** We do not immediately recognize that sin is conscious rebellion against God. We make all kinds of excuses. Only when the Holy Spirit shines his light on our hearts do we realize that sin is personally against God — and when that happens, we have great hope, because God is a forgiving God.\n\n**Third: Do you believe that sin touches your motives, thoughts, and deeds?** We may be able to go through a day without others seeing our sin, but it is there. It is at the level of the human heart that we find selfishness, pride, a desire to be loved rather than to love, anger, lack of forgiveness, jealousy, complaining, and all kinds of other sins. When we see that our sin goes beyond our actions and is rooted in our hearts, we have hope — because God's unfailing love is about changing hearts.\n\n**Fourth: Can you pinpoint right now a handful of sins that you see in your life?** Not vague shortcomings like \"I could be a better husband\" — and not the job interview answer: \"My greatest weakness is that I work too hard.\" I am asking you to really think about sin. Identify specific ways you presently sin against God. If you cannot do this — if you cannot recognize any sin in your life — then this psalm is meaningless to you, because you will not appreciate the forgiveness of God. If you cannot think of yourself really as a sinner in practice, you cannot appreciate God and have hope in him through his forgiveness.\n\nThe psalmist knew that his deepest problem was sin. He also knew that his God — the Triune God of the Scriptures — does not keep a record of wrongs for all those who turn to him. This psalm anticipates the cross of Christ, where God placed the just penalty for the rebellion of his creatures on his Son. As Paul says in Romans 5:7–8: \"For scarcely for a righteous man will one die; yet perhaps for a good man someone would even dare to die. But God demonstrates His own love toward us, in that while we were still sinners, Christ died for us.\"\n\nThat is where the psalmist put all his hope. That is where we must put all our hope.\n\nLet us pray. Father, we pray that You use these words proclaimed today to speak to our hearts, that we might grow in our love for You, in our hope in You, and in our hope of the blessed hope of the coming of the Lord Jesus Christ. In His name we pray. Amen."};
