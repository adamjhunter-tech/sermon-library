// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-the-true-israel-of-god-acts-1-1-8", "title": "The True Israel of God", "speaker": "Pastor Dennis Leaman", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["The True Israel of God __ Acts 1_1-8 (Pastor Dennis Leman).txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/the-true-israel-of-god-pastor", "tags": [{"tag": "Israel", "source": "detected"}, {"tag": "church", "source": "detected"}, {"tag": "kingdom of God", "source": "detected"}, {"tag": "Holy Spirit", "source": "detected"}, {"tag": "witnessing", "source": "detected"}, {"tag": "Great Commission", "source": "detected"}], "scripture_references": [{"reference": "Acts 1:1-8", "type": "quoted", "source": "detected"}], "outline": ["Introduction: Acts 1:1-8 and the post-resurrection ministry of Jesus", "The risen Christ presenting Himself alive with many proofs", "The question about restoring the kingdom to Israel", "Christ's answer: the true Israel of God is the church", "The Spirit's coming and the church's mission", "Jerusalem, Judea, Samaria, and the ends of the earth", "Conclusion: The church as the true Israel called to witness"], "summary": "Guest speaker Pastor Dennis Leman preaches from Acts 1:1-8 on the identity of the true Israel of God. When the disciples ask about restoring the kingdom to Israel, Jesus redirects them to the Spirit-empowered mission of the church as witnesses to the ends of the earth — the true Israel comprising all who believe.", "transcript": "## Will You at This Time Restore the Kingdom to Israel?\n\nActs 1:6-8 records the disciples asking the risen Christ: *\"Lord, will You at this time restore the kingdom to Israel?\"* And Jesus says, in essence: that is not for you to know. Go to Jerusalem. Wait for the Spirit. And you shall be my witnesses.\n\nI want to put to rest — not by my own authority, but by the Scriptures — the idea that the modern nation of Israel holds a special redemptive role in the purposes of God. This question is very much in the news, and it has deep roots in a theological system called dispensationalism that is dominant in much of American evangelical Christianity.\n\n## Before and After Pentecost\n\nThe first thing to notice is that the apostles themselves had a very different attitude before Pentecost than after. Jesus told them in Acts 1: go to Jerusalem and wait for the outpouring of the Spirit. After Pentecost, they never asked questions like this again.\n\nBefore Pentecost, when a Samaritan village refused to let Jesus pass through because his face was set toward Jerusalem, James and John asked: \"Lord, do you want us to command fire to come down from heaven and consume them?\" That was a pre-Pentecost response. After Pentecost, Peter would say to a lame man: \"Silver and gold I do not have, but what I do have I give you: In the name of Jesus Christ of Nazareth, rise up and walk.\"\n\nEven the inclusion of the Gentiles was a hard sell after Pentecost. Peter had to see a vision three times before he was willing to enter Cornelius's house and preach the gospel to Gentiles. When he reported back to the Jerusalem church, there was immediate controversy: \"You went in to uncircumcised men and ate with them!\" But the Spirit fell on them as on the apostles at the beginning, and Peter said: \"Who was I that I could withstand God?\"\n\nThe Lord was teaching his people: there is no difference between Jew and Gentile before him.\n\n## How Could the Apostles Still Ask That Question?\n\nGiven everything Jesus had said and done, how could the apostles still ask about restoring the kingdom to Israel? Jesus himself had given ample warning.\n\nIn Matthew 8:10-11, after praising the faith of a Roman centurion, Jesus said:\n\n> *\"I say to you that many will come from east and west, and sit down with Abraham, Isaac, and Jacob in the kingdom of heaven. But the sons of the kingdom will be cast out into outer darkness.\"* (Matthew 8:11-12)\n\nIn the parable of the wicked tenants (Matthew 21:33-41), the landowner's servants are beaten and killed, and his son is cast out of the vineyard and killed. When Jesus asks what the owner will do, they answer: *\"He will destroy those wicked men miserably, and lease his vineyard to other vinedressers who will render to him the fruit in their seasons.\"* This is a direct reference to that generation of Israel who rejected the Messiah — and judgment came in AD 70 when Jerusalem was destroyed.\n\nIn the parable of the wedding feast (Matthew 22:7): *\"But when the king heard about it, he was furious; and he sent out his armies, destroyed those murderers, and burned up their city.\"* That happened in AD 70. Prejudice dies hard. The apostles had heard all these things and yet still expected a restored earthly Jewish kingdom. They needed Pentecost to understand.\n\n## Who Is the True Israel of God?\n\nJesus knew the apostles did not yet understand who Israel is or what kind of kingdom he was inaugurating. He would send the Spirit to guide them into all truth.\n\nRomans 2:28-29 is definitive:\n\n> *\"For he is not a Jew who is one outwardly, nor is circumcision that which is outward in the flesh; but he is a Jew who is one inwardly; and circumcision is that of the heart, in the Spirit, not in the letter; whose praise is not from men but from God.\"* (Romans 2:28-29)\n\nRomans 9:6-8:\n\n> *\"They are not all Israel who are of Israel, nor are they all children because they are the seed of Abraham... Those who are the children of the flesh, these are not the children of God; but the children of the promise are counted as the seed.\"* (Romans 9:6-8)\n\nEphesians 2:11-19 tells us that Gentiles who were once *\"aliens from the commonwealth of Israel and strangers from the covenants of promise, having no hope and without God in the world\"* have now been brought near by the blood of Christ, so that God has *\"created in Himself one new man from the two, thus making peace.\"* The believing remnant of Jews and believing Gentiles together constitute one new humanity in Christ.\n\nThis is confirmed in Galatians 6:16, where Paul refers to the church — composed of both believing Jews and Gentiles — as \"the Israel of God.\"\n\nThere is an ancient promise that goes back to the days of Noah's sons — that Japheth (representing the Gentiles) would dwell in the tents of Shem (the Semites). That has come to pass. Gentiles have not replaced Israel; we have moved in so dramatically that it looks like replacement, but it is not. A believing Jew and a believing Gentile together make up the true Israel of God.\n\n## The Nation of Israel Today\n\nThe modern nation of Israel is not the Israel of God in the redemptive sense. That statement is not anti-Semitic. We pray for the Jewish people. We are deeply grateful — one Jew died for us, and the early church who brought us the gospel was Jewish. We should pray that they would come to Christ.\n\nBut to claim that the modern State of Israel holds a special covenant role apart from faith in Jesus Christ is to misread the New Testament. If the Jewish people come to Christ, they too become part of the true Israel of God — along with all believing Gentiles.\n\nThe apostles were told to wait for Pentecost so they could understand this. After Pentecost, they did not ask again about restoring the kingdom to Israel in an ethnic, national sense. Instead they went out as witnesses — in Jerusalem, in all Judea and Samaria, and to the end of the earth."};
