<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "2024-06-23-worthy-walking", "title": "Worthy Walking", "speaker": "Pastor Carl Miller", "date": "2024-06-23", "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["6-23-24 -AM- Worthy Walking - Ephesians 4_1-3 - Guest Speaker Pastor Carl Miller.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/6-23-24-am-worthy-walking-ephesians4_1-3-guest-speaker-pastor-carl-miller", "tags": [{"tag": "Christian living", "source": "detected"}, {"tag": "humility", "source": "detected"}, {"tag": "fruit of the Spirit", "source": "detected"}, {"tag": "patience", "source": "detected"}, {"tag": "unity", "source": "detected"}, {"tag": "love", "source": "detected"}, {"tag": "sanctification", "source": "detected"}], "scripture_references": [{"reference": "Ephesians 4:1-3", "type": "quoted", "source": "detected"}, {"reference": "Ephesians 2:1-2", "type": "quoted", "source": "detected"}, {"reference": "Ephesians 2:10", "type": "quoted", "source": "detected"}, {"reference": "1 Corinthians 4:18-21", "type": "quoted", "source": "detected"}, {"reference": "1 Corinthians 13:4-7", "type": "quoted", "source": "detected"}, {"reference": "1 Thessalonians 2:12", "type": "referenced", "source": "detected"}, {"reference": "1 Thessalonians 4:7", "type": "referenced", "source": "detected"}, {"reference": "Acts 20:19", "type": "referenced", "source": "detected"}, {"reference": "1 Peter 5", "type": "referenced", "source": "detected"}, {"reference": "Galatians 5", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: Doctrine Leads to Doxology and Walk", "subpoints": ["Paul's theology in Ephesians 1-3 leads to practical exhortation in ch. 4", "A Christlike identity must lead to a Christlike life"], "scripture": ["Ephesians 3:20-21"]}, {"title": "The Need for Our Walk (v. 1)", "subpoints": ["Paul urges as a prisoner of the Lord — his bonds validate his instruction", "Walk worthy of the calling with which you were called", "We were dead in sin (Eph. 2:1-2), now created for good works (Eph. 2:10)", "The call of God has been effectual in our hearts through the gospel", "We must not forget the impact of that effectual call in our daily lives"], "scripture": ["Ephesians 4:1", "Ephesians 2:1-2", "Ephesians 2:10"]}, {"title": "The Components of Our Walk (v. 2)", "subpoints": ["Lowliness / humility: humble opinion of oneself, comparing to Christ not others (Eph. 4:2a)", "Gentleness / meekness: controlled strength, fruit of the Spirit (Eph. 4:2b; Gal. 5)", "Paul's example: gentleness with Corinth — 'with the rod or in love and the spirit of gentleness?' (1 Cor. 4)", "Long-suffering / patience (makrothumia): long-tempered, steadfastness with one another (Eph. 4:2c)", "Bearing with one another in love: love as defined in 1 Corinthians 13:4-7"], "scripture": ["Ephesians 4:2", "Galatians 5", "1 Corinthians 4:18-21", "1 Corinthians 13:4-7"]}, {"title": "The Purpose of Our Walk (v. 3)", "subpoints": ["Endeavoring to keep the unity of the Spirit in the bond of peace", "Peace and unity are fragile and must be actively guarded and preserved", "Endeavoring = eagerness, diligence, zeal", "Threats from the outside and from within our own hearts", "Practical steps: guard heart and mind, guard tongue, keep short accounts, prompt reconciliation"], "scripture": ["Ephesians 4:3"]}], "summary": "Guest preacher Pastor Carl Miller, of Heritage OPC in New Braunfels, Texas, expounds Ephesians 4:1-3 under the heading of worthy walking. He frames the passage as Paul's application of the rich doctrinal foundation of Ephesians 1-3: because of every spiritual blessing in Christ, believers are called to walk in a manner worthy of that calling. Miller unpacks three facets of the passage — the need for our walk (the effectual call demands a transformed life), the components of our walk (humility, gentleness, patience, and love, showing how each quality builds on the previous), and the purpose of our walk (the preservation of the unity of the Spirit in the bond of peace). He is especially effective in illustrating gentleness as 'controlled strength' through Paul's question to Corinth — shall I come with the rod or in love and the spirit of gentleness? — and in connecting patient endurance to the compound Greek word makrothumia ('long-tempered'). The sermon closes with a practical call to examine one's heart and conduct and to go about preserving the peace and unity of the body with eagerness and diligence.", "transcript": "## Scripture Reading and Introduction\n\nIf we're able, you're maintaining for a moment longer as we read the word of the Lord out of Ephesians chapter 4, verses 1 through 3. Pastor Miller is going to be preaching on the topic of worthy walking. We're going to read through verse 6 of Ephesians 4, starting verse 1. This is the word of our Lord:\n\nI therefore, the prisoner of the Lord, beseech you to walk worthy of the calling with which you were called, with all lowliness and gentleness, with long suffering, bearing with one another in love, endeavoring to keep the unity of the Spirit in the bond of peace. There is one body and one Spirit, just as you were called in one hope of your calling. One Lord, one faith, one baptism. One God and the Father of all, who is above all and through all and in you all.\n\nThis is the word of our Lord. You may be seated. We are happy and encouraged and excited to welcome Pastor Carl Miller to our pulpit this morning. Pastor Miller is a good friend of Nick's and has become a friend of mine as well. We like making fun of people, so we have that in common.\n\nThank you. Beloved, it is good to see Christ's church full. It is good to be with you here this morning, and I bring greetings to you from your brothers and sisters, the saints at Heritage OPC in New Braunfels, Texas. It is true that I've traveled quite a distance to come here and be a part of the OPC's general assembly. But what a joy it is to do so. What a joy it is to be with fellow brothers, to take care of the business of the church, and to have fellowship with one another. And it is a joy to bring the Lord's word to you this morning.\n\nLet us pray as we pray for God's blessing on the preaching of His Word. Our gracious God and Heavenly Father, we are here hungry to receive your word. Lord, we pray that you would feed us by your Spirit. That you would be with your people, that you would open our ears to hear, our eyes to see, our hearts to understand and to receive your word as it truly is — the Word of God to us today. We pray these things in Christ's name, amen.\n\n## Introduction: Doctrine Leads to Doxology and Walk\n\nWell, beloved in Christ Jesus, the Apostle Paul would agree with the Psalmist who calls God's people in Psalm 133 to rejoice in the Lord, for praise from the upright is beautiful. And wonderfully, we know that Paul wasn't a man who only taught the saints to praise and to honor and glorify God. He also led by example. Paul himself was in the practice of doing so with open lips and with a sincere heart. As a faithful student of Christ and his Word, Paul's doctrine, his theology, led him to doxology.\n\nPaul gave all praise and honor to the one who is able — our God who has all the power, who has supreme authority, who is completely able, who has unlimited resources of grace at his disposal. There is no limit to what our God can do and achieve for his people. We can't ask him to do too much or for too many blessings, knowing that he has given us every spiritual blessing in the heavenly places in Christ. He knows what's good for us. He knows what's good for you. He knows what's good for me. He knows what our true needs are far better than we do. And so we praise and honor and glorify the God who is able to do exceedingly abundantly above all that we ask or think.\n\nAnd that's where Paul's heart was and where ours should be. And so as we stand on this foundation of truth and enriching biblical doctrine that Paul teaches us in chapters one through three of Ephesians, he then goes on to encourage and teach us about how we must live. How does this doctrine apply in the life of the Christian? Indeed, the doctrine that Paul teaches isn't designed to be just head knowledge, but rather doctrine that grounds and guides and grows us in godly living and in our walk with Christ.\n\n## The Need for Our Walk (v. 1)\n\nAnd so this morning we will see how our walk should be a natural result of our salvation in Christ. We'll consider the need for our walk in verse one, the important components of our walk in verse two, and the purpose of our walk in verse three.\n\nLook with me at Paul's words regarding the need for our walk in verse one: I therefore, the prisoner of the Lord, beseech you to walk worthy of the calling with which you were called.\n\nNow notice that similar to chapter three verse one, Paul mentions to the saints that he is a prisoner of the Lord. And why does he mention this again here? Well, Paul wasn't ashamed of his bonds. He desired to reiterate the importance of the people knowing that the pure gospel of Jesus Christ and biblical doctrine in his word was worth suffering for. And was likewise God's people should give careful attention to his instruction about faithful Christian living. Here is a suffering servant of the Lord Jesus Christ, a bond servant of his, willing to suffer in the calling that the Lord has given him in obedience to his Lord.\n\nAnd considering this importance, Paul beseeched the saints — he urged them. He in essence said, because of the great things I've taught you about Christ, because of all of these wonderful truths, please be mindful and attentive to what I'm about to say and teach you regarding how those glorious truths should be applied in your daily lives. Indeed, beloved, a Christlike identity must lead to a Christlike life.\n\nAnd what did Paul urge the saints to do? To walk worthy. Now Paul has already primed his words here with those that he said in chapter two, where he spoke of our depraved walk contrasted against our redeemed walk. Remember, in verses one and two of that chapter, Paul said, and you he made alive, who were dead in trespasses and sins, in which you once walked according to the course of this world, according to the Prince of the power of the air. And then note verse ten: for we are his workmanship, created in Christ Jesus for good works, which God prepared beforehand that we should walk in them.\n\nPaul's words here in Ephesians 4 verse 1 are really just the beginning of the meat that he puts on the bones of the walk that he spoke of in chapter two verse ten. Notice that Paul's focus isn't only that we walk, but also and specifically on the manner and the quality of our walk. We are called to walk worthy of the calling with which we have been called.\n\nAs we walk day by day as Christians, sometimes we forget the impact of that effectual call. The impact of the gospel in our lives and how that should affect us moment by moment each and every day as we desire to serve Christ and be a faithful witness in this world. Indeed, Paul desired that the saints in Thessalonica would walk worthy of God who calls you into his own kingdom and glory — 1 Thessalonians 2:12. And he went on to say in 1 Thessalonians 4:7 to the same congregation, for God did not call us to uncleanness, but to holiness.\n\nMy friends, we can't just say we're Christians and then live like the devil. Our lives, our walk, must be different. We have a glorious salvation in and through our Lord Jesus Christ who then calls us to put on display our heavenly citizenship, to show forth that we belong to Jesus, which should then be evident in how we live for him.\n\n## The Components of Our Walk (v. 2)\n\nNow you may be hearing this and thinking, well Pastor Carl, I struggle in walking worthy a lot. There are so many ups and downs, so much stumbling and falling. Well, beloved, I do too — we all do. And yet, praise God for giving us men like Paul to teach us, men like Pastor T2, men like your elders here, to remind you and to teach you and instruct you and encourage you in what you need to do and what you should be doing.\n\nBut also praise the God who is able to do exceedingly abundantly more. The God who works in us by his Spirit to pursue holiness and to live lives that give him glory. And so what should this walk look like? Well Paul starts to flesh that out for us.\n\nLook at verse two: with all lowliness and gentleness, with long suffering, bearing with one another in love.\n\nNow these four characteristics are ones that should be present in and amongst us. Notice that Paul begins with lowliness — this is having a humble opinion of oneself, having a deep sense of our moral littleness. It is humility, which is the inside-out virtue that is produced when we compare ourselves to the Lord rather than to others. In other words, it's not having a Pharisee heart. It's keeping the little Pharisee in us at bay, not being self-inflated by our own sinful egos. Paul spoke of his own journey in lowliness to the elders of Ephesus in Acts 20:19 when he said, serving the Lord with all humility with many tears and trials which happened to me by the plotting of the Jews.\n\nMany of us think of the Apostle Paul and think of his valor as a servant of the Lord, but we may not be as mindful of his struggles, his tears, his sorrows — but indeed they were there. Peter teaches us in 1 Peter 5 that God resists the proud but gives grace to the humble. My friends, we know that the struggle in walking isn't just the stumbling or falling part. It's also the endurance and the perseverance that we press forward in while serving in humility that is so hard.\n\nPaul also exhorts us to bear the fruit of gentleness. Be humble, be lowly, be gentle as well. This is one of the fruits of the Spirit in Galatians 5. Gentleness can be viewed as meekness. Another good definition of gentleness is controlled strength. Gentleness and self-control are closely related.\n\nRemember the manner in which Paul addressed the sin in Corinth. Corinth had a lot of problems. Paul in 1 Corinthians 4, beginning in verse 18, says: Now some are puffed up as though I were not coming to you. But I will come to you shortly if the Lord wills, and I will know not the word of those who are puffed up but the power. For the kingdom of God is not in word but in power. And in verse 21 he asks: What do you want? Shall I come to you with a rod, or in love and a spirit of gentleness? My friends, Paul could have come to them harshly, but Paul came to them with controlled strength — in the power of the Spirit and in gentleness as he sought to be Christlike in ministering to them.\n\nFurther, God is not arbitrary or chaotic in the use of his power. We see time and again in the Scriptures how our omnipotent God controls his power and is gentle with us. He is long-suffering with us as his people. Indeed, part of worthy walking is imitating that controlled strength.\n\nThen long-suffering is where Paul goes next. The Greek word for long-suffering, makrothumia, is an interesting word. It is made up of two words: makros, which means long, and thumos, which is passion or anger. F. F. Bruce noted in his commentary on Galatians that the word embraces steadfastness and staying power. So if in English we had an adjective 'long-tempered' as a counterpart to 'short-tempered,' then makrothumia could be called the quality of being long-tempered.\n\nNotice the connection and the flow of these four characteristics. Paul didn't just reach into a grab bag and pull out the first four. These are intentional and important — determined by God himself. See how the lowly in heart should walk in controlled strength as we deal with one another. And see how these things speak especially to when life and the church crosses over into the challenging and difficult.\n\nBut Paul then goes on to connect such patience to love. We are called to bear with one another in love. Paul is teaching us about what love should look like. And you may be very familiar with the love chapter in 1 Corinthians 13. Let's look fresh at verses 4 through 7: Love suffers long and is kind. Love does not envy, love does not parade itself, is not puffed up, does not behave rudely, does not seek its own, is not provoked, thinks no evil, does not rejoice in iniquity but rejoices in the truth. Bears all things, believes all things, hopes all things, endures all things. Love is integrally connected and should be a foundational piece in the Christian life each and every day, even as it is there for the long haul.\n\n## The Purpose of Our Walk (v. 3)\n\nPaul then went on to say that there's a purpose for such walking. Look at verse three: endeavoring to keep the unity of the Spirit in the bond of peace.\n\nSo the purpose that Paul puts forward here is the peace and unity of the church. As Christ has redeemed a people, as he has brought redeemed sinners together to serve and worship him in his body, peace and unity are two things that must be preserved and maintained in Christ's glorious bride. And such maintenance and preservation takes effort. We must never forget that. Peace and unity among sinners don't just happen — it's a work of the Spirit of God in the people of God. And this is why Paul says that such fruit must be active in our lives, for as they are present, they support this peace and unity.\n\nThis is also why Paul calls us to endeavor. There's the action — we're to endeavor in this. Endeavoring means to make haste, to have zeal, to be eager and diligent. And therefore peace and unity must be our pursuit. Beloved, we can't be lazy when it comes to peace and unity in the body of Christ — rather we're to have eagerness and diligence to keep it. And this keeping means that we are to guard and watch over it. Peace and unity are fragile. We need to remember that. There is much that would seek to threaten and dash our peace and destroy our unity. We can often have our attention drawn to threats from the outside, but don't overlook that which is inside, even within your own hearts.\n\nThus, it's so timely for Paul to call us to walk worthily. God has extended much blessing in the peace and unity of the church — in the peace and unity here at Olympia BPC. But let us be good watchmen and do the work that is needed to preserve that for the glory of Christ. And what does this look like as the rubber meets the road? Guard your heart and mind. Guard your tongue. Keep short accounts. Continue looking out for others' interests beyond your own. Be committed to prompt reconciliation, not giving Satan a foothold.\n\n## Closing\n\nAnd so as I leave you this morning, beloved, I'll leave you with this. Examine your hearts and conduct this morning. And leave this place with a biblical understanding of what worthy walking looks like. And then, preferably, endeavor with all your hearts to walk and grow in that walk by the grace of God. May humility and gentleness and patient love be abundant fruit on your trees, and a blessing to one another as well as you interact with and serve each other in these ways — to the glory of Christ our King. Amen.\n\nPraise God for his word. Let's pray together. Our gracious God and Heavenly Father, Lord, you are wonderful to us as your people. We thank you for this, your word. We thank you for your call and your commands. We thank you for your grace and your work within our hearts and amongst us together. Lord, work in people and families in your congregation. Lord, bring about by your Spirit what is pleasing in your sight, that each and every day we may walk worthily before you and with you, oh God, our King. We pray this in Christ's name. Amen."};
