window.LESSON_DATA = {"id": "undated-treasure-in-earthen-vessels-2-corinthians-4-1-12", "title": "Treasure in Earthen Vessels", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": "2 Corinthians", "series_part": null, "parts": 1, "source_files": ["Sunday Morning 031526 (Pastor Tito Lyro).txt"], "soundcloud_url": null, "tags": [{"tag": "gospel", "source": "detected"}, {"tag": "ministry", "source": "detected"}, {"tag": "suffering", "source": "detected"}, {"tag": "sovereignty of God", "source": "detected"}], "scripture_references": [{"reference": "2 Corinthians 4:1-12", "type": "quoted", "source": "detected"}], "outline": ["Introduction: Reading 2 Corinthians 4:1-12", "This ministry received by mercy — not losing heart", "Renouncing shameful hidden things; manifesting truth", "The gospel veiled only to those who are perishing", "Not preaching ourselves but Christ Jesus as Lord", "The treasure of the gospel in earthen vessels", "Hard pressed but not crushed; persecuted but not forsaken", "Conclusion: The power of God displayed through weakness"], "summary": "Pastor Tito Lyro preaches from 2 Corinthians 4:1-12 on the treasure of the gospel entrusted to earthen vessels. He expounds Paul's declaration that despite the weakness and suffering of gospel ministers, the extraordinary power belongs to God — making ministry a demonstration of grace rather than human ability.", "transcript": "## Introduction\n\nIn the ancient world, people often stored valuable things in very ordinary clay jars. These jars were cheap, common, and easily broken. There is nothing important about those jars. Archaeologists have found them all over the Mediterranean world. They are not rare, they do not command a great price. They were the ancient equivalent of a paper bag or a cardboard box — just something to store things in. The jar itself was not admired by anyone, but sometimes the contents were extremely valuable: money, legal documents, scrolls. The value was never in the jar — always in the contents.\n\nOne famous modern example of this: in 1947 a Bedouin shepherd happened to enter a cave near the Dead Sea in southern Israel and found some jars. In those jars he found scrolls — ancient biblical manuscripts that had been hidden in common, everyday jars for 2,000 years. Those manuscripts became what we know as the Dead Sea Scrolls, which advanced biblical scholarship by leaps and bounds, pushing back the date of the oldest Hebrew manuscripts from the 10th century all the way to the 2nd century BC — and proving that the Bible we have today is the same Bible they had then. The jars did not matter. The text inside the jar was priceless.\n\nThat is exactly what Paul pictures here in 2 Corinthians 4 beginning at verse 7. The gospel — the knowledge of the glory of God in the face of Jesus Christ — is the treasure. God places that treasure in fragile human containers, and He does so intentionally. He puts priceless treasure into weak vessels so that no one mistakes where the power comes from. The power is not in the jar. The power is in the gospel of Jesus Christ. God displays His power through weak, suffering servants so that the light of Christ may be seen.\n\nThere are three things I want us to see in this passage: the treasure we carry (v. 7), the pressure we endure (vv. 8-9), and the life we display (vv. 10-12).\n\n## The Treasure We Carry (v. 7)\n\n> *\"But we have this treasure in earthen vessels, that the excellence of the power may be of God and not of us.\"* (2 Corinthians 4:7)\n\nThis treasure is the light of the knowledge of the glory of God in the face of Jesus Christ that Paul already mentioned in verse 6 — the gospel revealed to us in Jesus Christ. But this is not just the bare facts of the gospel: that the Son of God became flesh, lived the perfect life God requires of us but which we cannot live, died the death of separation we deserve, rose again from the dead, ascended into heaven, and now sits at the right hand of the Father. This treasure is more than the bare facts. It is the knowledge of the glory of God in the face of Jesus Christ — there is an emotional, personal, relational dimension that goes beyond the mere facts.\n\nAnd this treasure is more precious than anything else you can imagine. When Jesus was talking about this treasure in Matthew 13:44, He said:\n\n> *\"The kingdom of heaven is like treasure hidden in a field, which a man found and hid; and for joy over it he goes and sells all that he has and buys that field.\"*\n\nAnd Paul says in Colossians 2:3 that in Christ \"are hidden all the treasures of wisdom and knowledge.\"\n\nThis great treasure — more precious than anything imaginable — is carried around in very ordinary, fragile jars of clay. When Paul uses the pronouns \"we\" and \"our\" here, he is primarily talking about himself and Timothy, as he states in chapter 1:1. Paul is teaching that the gospel is carried around in common, cheap, easily broken, easily replaced jars of clay. We call those pastors. These jars primarily refer to the minister of the new covenant, the shepherd of Christ's flock.\n\nPaul is well aware of his own fragility. He can feel death in his bones when he gets up in the morning — the beatings he took in Ephesus, the shipwreck off the coast of Cilicia, the caning he got in Antioch, having to be lowered over the wall in a basket because people wanted to attack him. He feels all of that in his body. He is also very aware that there is nothing special about him that makes his message powerful.\n\nA minister who realizes his message is powerful not because of anything in himself but because of the One he is proclaiming — you know how the Bible describes him? A jar of clay. Fragile, ordinary, disposable. And do you know what the Bible calls a minister who thinks the success of the gospel depends on his gifts? Jesus calls him a whitewashed tomb in Matthew 23. In one there is the message of life; in the other only the stench of death.\n\nNow, while the imagery of jars of clay primarily refers to the minister of the gospel, we can extend this metaphor to apply to every Christian. The power of our message is not in the beauty of the vessel — it is in the content the vessel carries. Our bodies are decaying. We are clay pots, brothers and sisters. A dime a dozen. Our bodies are inescapably moving toward death. As one commentator puts it, \"Human life is short. Its form is easily defaced, and its fabric is destructible in a second. It is an earthen jar, a cheap clay pot.\"\n\nBut our inner self is being renewed day by day, because we carry in us the light of the knowledge of the glory of God in the face of Jesus Christ. As Paul says in verse 16, \"Even though our outward man is perishing, yet the inward man is being renewed day by day.\"\n\nWhy does God do things this way — using you and me to carry the treasure of the gospel? Why use fragile, replaceable, ordinary people? Paul tells us: so that the power displayed is His power, not ours. Jars of clay display the power of God best. As another commentator says, \"Human weakness presents no barrier to the purpose of God. Indeed, God's power is made perfect in weakness. God rejoices to use the weak.\" That is us. That is not somebody else — it is you, in Christ, doing great things for His glory.\n\nThe apostle Paul says in chapter 12 that Jesus told him, \"My grace is sufficient for you, for My strength is made perfect in weakness.\" So as a side note — if you want to do great things for God, recognize your weakness, because God will not use the person who is strong in himself. He uses the weak who know that all their needs are in Christ Jesus.\n\nNow, clay pots do not call attention to themselves. The Dead Sea Scroll jars sat in those caves for 2,000 years before anyone thought to look inside them. Clay pots do not attract attention to themselves — yet people sense that there might be something in them worth having. You have the gospel of Jesus Christ. No one attributes its success to the messenger; the success belongs to the power of the gospel in the clay pot. God intentionally uses weak servants so that the glory of the gospel belongs entirely to Him.\n\nSo do not let arrogance, self-conceit, and pride get in the way of the powerful message that is in you. Do not let your life be so loud that it gets in the way of people hearing the message that is in you — the message of the gospel of Jesus Christ.\n\nRemember too that the purpose of a jar is not only to store things — it is also to pour. The purpose of the jar is to store things and to pour out what is inside: pour it out in evangelism, in discipleship, in righteous living for the glory of God.\n\nTake a moment and think: Do people get a true sense of Christ when they are around you? What are you pouring out of your jar?\n\n## The Pressure We Endure (vv. 8-9)\n\n> *\"We are hard pressed on every side, yet not crushed; we are perplexed, but not in despair; persecuted, but not forsaken; struck down, but not destroyed.\"* (2 Corinthians 4:8-9)\n\nPaul gives us four paradoxes describing Christian ministry: hard pressed but not crushed, perplexed but not in despair, persecuted but not forsaken, struck down but not destroyed. If Paul posted this as a job description, he would not get many applicants. And yet this is what gospel ministry — and gospel living — looks like.\n\nWe see the hardship in the first element of each pair, and we see the sustaining grace of God in the second. It is hard — you are hard pressed, perplexed, persecuted, struck down. But it is doable by the grace of God — you are not crushed, not in despair, not forsaken, not destroyed.\n\nPaul carries in his body all the struggles associated with ministering the gospel. In 2 Corinthians 1:8-10, he describes his trouble in Asia:\n\n> *\"We were burdened beyond measure, above strength, so that we despaired even of life... that we should not trust in ourselves but in God who raises the dead, who delivered us from so great a death, and does deliver us; in whom we trust that He will still deliver us.\"*\n\nAnd then in chapter 6, verses 3-10, he lists:\n\n> *\"In tribulations, in needs, in distresses, in stripes, in imprisonments, in tumults, in labors, in sleeplessness, in fasting... as dying, and behold we live; as chastened, and yet not killed; as sorrowful, yet always rejoicing; as poor, yet making many rich; as having nothing, and yet possessing all things.\"*\n\nAnd in the great list of chapter 11:23-28:\n\n> *\"From the Jews five times I received forty stripes minus one. Three times I was beaten with rods; once I was stoned; three times I was shipwrecked; a night and a day I have been in the deep; in journeys often, in perils of waters, in perils of robbers, in perils of my own countrymen, in perils of the Gentiles, in perils in the city, in perils in the wilderness, in perils in the sea, in perils among false brethren; in weariness and toil, in sleeplessness often, in hunger and thirst, in fastings often, in cold and nakedness — besides the other things, what comes upon me daily: my deep concern for all the churches.\"*\n\nAnd we know he was shipwrecked at least once more after writing this, and imprisoned for at least five more years.\n\nSo when Paul says \"we are hard pressed\" — that is tribulation, the verb form of the word for affliction. \"We are perplexed\" — confused, disoriented. \"We are persecuted, struck down\" — cast down, depressed. Because we are jars of clay. But we are not crushed, not in despair, not forsaken, not destroyed — because of the surpassing power of God that is in us.\n\nBrothers and sisters, gospel ministry and gospel living have their challenges. But God sustains us in and through them. He does not remove suffering; He preserves His servants through it.\n\nThe conclusion Paul arrived at is in 2 Corinthians 12:7-10: a thorn in the flesh was given to him, a messenger of Satan to buffet him. He pleaded with the Lord three times to remove it. And God said: \"My grace is sufficient for you, for My strength is made perfect in weakness.\" Paul's response: \"Therefore most gladly I will rather boast in my infirmities, that the power of Christ may rest upon me. For when I am weak, then I am strong.\"\n\n## The Life We Display (vv. 10-12)\n\n> *\"Always carrying about in the body the dying of the Lord Jesus, that the life of Jesus also may be manifested in our body. For we who live are always delivered to death for Jesus' sake, that the life of Jesus also may be manifested in our mortal flesh. So then death is working in us, but life in you.\"* (2 Corinthians 4:10-12)\n\n\"Carrying about in the body the dying of Jesus\" is Paul's way of speaking of the physical and emotional pain he has endured because of the ministry of the new covenant. The dying of Jesus — or the dying that comes from following Jesus — Paul is beaten up physically and emotionally because of the proclamation of the gospel. But in that, the life of Jesus is manifested in his body — manifested in how he conducts himself in suffering, and also in the resurrection of the righteous at the return of Christ.\n\nWhat we see here is Paul following the example of his Lord, who laid down His life for the sheep. Paul is not saving the Corinthians by dying for them — but he is laying his life down for the flock God entrusted to him. And brothers and sisters, we are jars of clay filled with Christ Himself, and if suffering or dying to self is what it takes for us to pour out Christ — praise be to God.\n\nVery few of us will be called to suffer physically for Christ or die for Christ. Most of us are called to die in a different way — we are called to die to self in the service of one another. As Paul says in Philippians 2:3-4: \"Let nothing be done through selfish ambition or conceit, but in lowliness of mind let each esteem others better than himself. Let each of you look out not only for his own interests, but also for the interests of others.\"\n\nHow is your dying going? Are you dying to self as you pour the treasure of Christ into those around you? Our Lord Himself said: \"If anyone desires to come after Me, let him deny himself, and take up his cross, and follow Me. For whoever desires to save his life will lose it, but whoever loses his life for My sake will find it.\"\n\nPaul's motivation is that his suffering and dying brought life to the Corinthians. In verse 12: \"Death is working in us, but life in you.\" He is not saying his suffering has an atoning effect — only Jesus' does. He is saying that these sufferings happened in the context of bringing the gospel to the Corinthians. They have the gospel, which is life, because Paul was willing to take it to them. Paul's dying brought their life.\n\nLet me ask you: Are people more alive in Christ because they are around you? Or are you draining their lives dry? Are people closer to Christ because they are in your life? Do they smell Christ in you? Or do they encounter the stench of self?\n\nPaul's other powerful motivation is the hope of the resurrection. Why is he willing to waste away in this life? Because he knows there is a life to come in the body. He is going to be raised to life. He is going to be like the Lord Jesus Christ. His motivation was certainly not that this was his best life now. He knew there was something better coming, and that kept him going.\n\n## Application: Four Ways to Live This Out\n\n**First, embrace your weakness instead of hiding it.** Many people feel disqualified from serving God because they feel inadequate, ordinary, broken. But that is exactly the kind of vessel God uses. We are not to wait until we have our act together, until we are stronger, until we are not broken. Embrace your weakness instead of hiding it. Our weakness is not an obstacle to God's work — it is often the stage on which His power is displayed.\n\nDo not measure your usefulness to God by the comfort you are experiencing in life. When life becomes difficult because you are following Christ, do not assume something is wrong. Hard pressed does not mean crushed. The Christian life may include pressure, but God's promise is sustaining grace in the midst of it.\n\n**Second, die to self in the small daily moments of life.** We are probably not going to be called to die physically as martyrs for Christ, but we are called to die to ourselves — and this happens in ordinary situations: choosing patience instead of anger, serving instead of demanding to be served, forgiving instead of holding grudges, putting the needs of others before our own. Every act of self-denial becomes a way of pouring the life of Christ into others.\n\n**Third, intentionally pour the treasure of the gospel into others.** Our jar is not meant only to hold something but to pour it out. Ask yourself regularly: Who am I investing in spiritually? This may look like sharing the gospel with a neighbor, discipling a younger believer, encouraging a struggling friend, or teaching your children the Word of God. God did not place the treasure of Christ in you merely for you to store it — but to pour it into the lives of others.\n\nIn Sunday school this morning we talked about a supernova — a star that, in dying, pours all its energy out into the universe. That is the Christian dying to self: everything poured into the universe, and people can clearly see it. There is another kind of dying star — called a black hole. Instead of dying to self, it implodes. It focuses on itself and drags everything around it in. And the only thing you can see from such a star is darkness.\n\nSo who are you? Are you a supernova — dying to self, and energy blasting out over all creation? Or are you a black hole — sucking everyone else dry, with nothing but darkness visible?\n\nPaul says: you are a jar of clay — replaceable, common, fragile. Yet you bear in you the greatest treasure: Jesus Christ Himself. Let us pour Him out as we go.\" Look at verse 7. But we have this treasure in earth and
