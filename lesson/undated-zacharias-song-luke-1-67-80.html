// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-zacharias-song-luke-1-67-80", "title": "Zacharias' Song", "speaker": "Pastor Chris Lensch", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["Zacharias' Song - GUEST SPEAKER_ Pastor Chris Lensch - Zacharias' Song.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/zacharias-song-guest-speaker-pastor-chris-lensch-zacharias-song", "tags": [{"tag": "John the Baptist", "source": "detected"}, {"tag": "prophecy", "source": "detected"}, {"tag": "salvation", "source": "detected"}, {"tag": "Advent", "source": "detected"}], "scripture_references": [{"reference": "Luke 1:67-80", "type": "quoted", "source": "detected"}], "outline": ["Introduction: Luke 1:67-80 — Zacharias' prophetic hymn", "Filled with the Holy Spirit, Zacharias prophesied", "Blessed is the Lord God of Israel — the Benedictus", "A Horn of Salvation raised up in the house of David", "As the holy prophets foretold from of old", "John as the prophet of the Most High going before the Lord", "The Dayspring from on high visiting us", "Conclusion: The light dawning through the Messiah"], "summary": "Guest speaker Pastor Chris Lensch preaches from Luke 1:67-80, the Benedictus — Zacharias' prophetic song at the birth of John the Baptist. Filled with the Holy Spirit, Zacharias praises God for raising up a Horn of Salvation in the house of David, and prophesies that his son John will prepare the way for the coming Messiah.", "transcript": "## Introduction: First Words\n\nWe're looking at this wonderful text in the Advent season. It's leading up to Christmas — Jesus is coming, but he's going to have a herald, and John the Baptist is that herald. This song of Zechariah begins to hint at the coming of Jesus at the end, when he says, *\"The dayspring from on high has visited us, to give light to those who sit in darkness.\"* This child, John the Baptist, is going to give the knowledge of salvation, going around preaching that the kingdom is at hand and calling people to repentance and remission of sins.\n\nOther gospels start with John the Baptist. Mark chapter 1 just says there was a voice crying in the wilderness. But if you go to the Gospel of John, it takes us way back — before Christmas, before creation itself. John 1:1 says, *\"In the beginning was the Word, and the Word was with God, and the Word was God.\"* There's a picture there of the identity of God being revealed as the Word — the God who communicates.\n\nThink about how we are blessed, made in the image of God. We're also blessed with words to communicate with one another, but especially to communicate and pray to God. In that way we reflect who God is. God has always been a communicator because God is the Triune God — Father, Son, and Spirit — the community and companionship of the persons of God communicated together from before creation.\n\nAnd the God who said *\"Let there be light\"* is a God who uses words to work. He says it, and it is so. We, made in that image, plan and put things down on paper and let things happen. The God who always had a plan in his mind — he never had to go back to the drawing board, the plan was always there — planned to bring this wonderful world into creation, and also planned out your life for you.\n\n## Zacharias' Silence and the First Words of the Story\n\nHere in Luke 1 we have a record of the first words of some important people. Zacharias' first recorded words in the Bible are not the right answer — they're not the best words that could have come out of his mouth. He was struck mute because he was doubting. It's one thing to ask, *\"How will these things come to pass?\"* — but he asked a faithless question: *\"How can I know?\"* And he was struck with muteness as a sign of his own unbelief. The angel said: \"Here's your first sign — you won't be able to talk.\"\n\nSo he came out of the sanctuary wide-eyed, and everybody was wondering why he was taking so long. Had he had a stroke? Had he seen an angel? Yes, he had. And all he could do was make signs on a tablet.\n\nBeing struck speechless carries a warning. James 1:19 says everyone should be *\"swift to hear, slow to speak, and slow to anger.\"* Zacharias should have measured his thoughts so he could measure his words. Christians must have some self-control, some control over the spirit of anger that can well up within us when someone pushes our buttons.\n\nThe sign of muteness is a sign for unbelievers. Zacharias, you didn't believe the messenger of God. And how about us — do we need a sign to believe the things God has promised in the Bible? We read the Bible, we hear it preached to us, and we nod our heads — but do we really believe it? To ask for a sign is a dangerous thing. Jesus warns about those who ask for a sign: *\"A faithless and adulterous generation seeks a sign.\"*\n\nFaith is an interesting thing. The Bible over and over calls upon us: believe, hold fast to these things that you've received, knowing from whom you believed them. These are the very words of God's servants, the apostles, the prophets. Hold on to that. Don't give up. Believe.\n\n## God Fills His People\n\nThe lessons we want to focus on in this context are two: God fills his people, and God fulfills his promises. That's the message of the song of Zechariah.\n\nGod's Spirit fills his people — they're filled to give utterance of praise. Then after the praise, Zechariah is going to go on and give a prophecy about his own son John the Baptist. Verses 76 to 80 are the prophecy. But verses 68 to 75 are the praise.\n\nElizabeth is filled. Her first recorded words are *\"Blessed\"* — in verses 42 and 45, she says *\"Blessed are you among women\"* and *\"Blessed is she who believed.\"* Blessing in this life comes from God. You have to have God in your life to see any goodness, any blessing.\n\nJohn the Baptist — we don't have his recorded words, but we do have a record that he will be filled with the Holy Spirit from his mother's womb (Luke 1:15). So are you surprised that when Mary comes to visit Elizabeth — Mary carrying the baby Jesus in her womb, Elizabeth carrying John the Baptist in her womb — that John the Baptist leaps in the womb of his mother at the coming near of Mary and Jesus? He could not have known that apart from the Holy Spirit working in him even before he was born.\n\nThe Spirit of God was knitting together the bones and the person of John the Baptist in the womb, and also filling him from that point. This tells us that preborn babies are important to God. Preborn babies can be endowed and blessed and even filled by God. Jeremiah 1 says God speaks to Jeremiah when he's an adult: *\"I knew you before you were born; I chose you before you were born to be my servant.\"* God has his eye upon every preborn child.\n\nAnd verse 80, the last verse of Luke 1, says the child grew and *\"became strong in spirit\"* — and I believe that's more than just having a good attitude. I think it's talking about the Spirit of God. He grew in the Spirit of God, as verse 15 was being fulfilled, so that the Spirit of God would fill him and direct and shape him from his mother's womb.\n\nWe wonder about our own children. Will God bless them with his Spirit? And the answer is: as we give them the Word of the Spirit, our young children can be taught songs and Bible stories. Our older children we speak to throughout the day, in the way — this is God's world, this is what God is doing. It takes Spirit-filled parents to give the word of the Spirit. Children can grow strong in the Spirit as they're given the word of the Spirit and sit under the preaching of the Word.\n\n## Zacharias' Song: The Benedictus\n\nSo Zacharias had a bad start — faithless words in the sanctuary. But God gave him a second chance. Once the baby is born and named on the eighth day, his speech returns. And what comes forth is a song — the Spirit's words, which had been building up within him for nine months while he could not speak. He's had plenty of time to think.\n\nVerse 67: *\"He was filled with the Holy Spirit and prophesied.\"* And after nine months of meditating on the words of the Spirit, he begins to weave together seven Psalms and three prophets in this hymn — almost as if it had been bubbling up within him and now pours forth like Niagara Falls.\n\nAnd do you see what he praises God for? It's not about his nine months of silence. It's not about getting his speech back. It's:\n\n> *\"Blessed is the Lord God of Israel, for he has visited and redeemed his people, and has raised up a horn of salvation for us in the house of his servant David.\"*\n\nThe promise that was made to David — that a son from the line of David would always sit upon the throne of David — is now beginning to be fulfilled. He returns the focus to God: God is working in his world. And we know that he's working because he fills his people — believers — with his Spirit. That's how God draws near: the Holy Spirit comes and works around us and within us.\n\nThen in verses 76 to 79 he prophesies about John the Baptist, building on what the Old Testament prophets had already said — Malachi 3 and Isaiah 40. But Zechariah the father puts the icing on the cake, saying: here's what it will be like for my son. He's filled with the Spirit, he praises first, and then he prophesies.\n\nWe don't have the same predictive gift of prophecy. But we do have the filling of the Spirit to have spiritual discernment. And with that discernment, and with the living Word of the Holy Spirit in the Bible, we can apply the Scripture in our own lives and in the lives of others. We are called to admonish one another — not from our own opinion, but from the Word of God: *\"Here's what the Word of the Spirit says.\"* That's what it means to be filled with the Spirit and to have spiritual discernment.\n\n## God Fulfills His Promises\n\nThe second big emphasis in this section is that God not only fills, but God fulfills — he fulfills his promises. That's right in the heart of the Benedictus.\n\n*Benedictus* is the Latin word from the Vulgate for *blessed* — the opening word of Zechariah's song in verse 68. And the fulfilling comes out when Zechariah starts mentioning, in verses 72 to 75, the mercy promised to our fathers, the holy covenant, the oath sworn to Abraham.\n\nIt took a long time to see these promises begin to unfold. But now they're starting to come to pass. And the promises are still unfolding — not all of them have come to pass yet. They're still unfolding. If they weren't, then Jesus wouldn't come back again. But we believe. We believe in the promises of God even though God may tarry.\n\nRomans 16:25 speaks of the mystery of the gospel kept secret since the world began. God deposited that secret with special people like Abraham — *\"I'm going to focus on you, focus on your family\"* — and as the river comes down the mountain it gets broader and broader until it reaches its destination. God was silent for 400 years after the last prophet of the Old Testament. And the last prophet of the Old Testament mentions John the Baptist — Malachi 3:1, Malachi 4 — *\"The messenger is coming.\"* And now God is beginning to keep that promise.\n\nGod fulfills by drawing near. *\"He has visited his people\"* (verse 68). He's come near. He's come near to us. We know that because his angels are active, because he is filling people like Zechariah.\n\nJesus at the Last Supper, in John 14, says: *\"I go to prepare a place for you\"* — there's a promise. And a few verses later: *\"Because I live, you shall live also\"* (v. 19). And just a few hours later the disciples watched Jesus die on the cross. Then just a couple of days later they watched him rise from the dead. Who can tell the future? Who can say we're going to live? Only the one who has victory over death.\n\nWe believe not merely from the disciples' testimony, but because we have the Holy Spirit to enlighten us, to fill us, and to change our lives. With those promises we respond: *Lord, I believe; help my unbelief. Quicken me by your grace and your presence. Set my affections on things above. Help me to see the invisible by faith.*\n\n## Conclusion: Redeemed and Given the Way of Peace\n\nIn Luke 2 there are two old people in the temple — Simeon and Anna. Simeon says: *\"God, you promised me that I'd be able to see the Messiah.\"* And then he breaks out singing: *\"Now let your servant depart in peace, for my eyes have seen your salvation.\"* God kept his word.\n\nTo those people, God kept his word. To David, God kept his word. To Abraham, God kept his word. God keeps his word to us. He answers our prayers as we look to him in faith and patiently wait.\n\nBlessed be the God who visits and redeems. Redeemed — you have to be redeemed when you're in trouble. Somebody has to bail you out. This prayer — the song of Zechariah — says he's redeemed us from our enemies. God is greater than those that hate us. God knows how to save us from our greatest enemy, the devil, and from the devil's tool of death.\n\nThose who walk in the valley of the shadow of death — a light has shined upon them in that gloomy valley. We've seen the light of the gospel in the face of the Lord Jesus Christ as we open the Scriptures. We've been delivered from our enemies, saved from ourselves and from this gloomy world.\n\nAnd ultimately, what else have we been redeemed from? We've been saved from God's wrath itself. Jesus shed his blood. He lived for us and died the death we deserved. He was raised from the dead to declare that salvation is for sinners. That perfect sacrifice on the cross satisfied God's perfect justice, saving us from the wrath of God himself. That's redemption. That's the knowledge of salvation.\n\nAnd as Zechariah says in verse 79, the knowledge of salvation comes with *the way of peace*.\n\nI heard of a young Christian man who made it to college with a physical disability — he had had infantile paralysis and walked on crutches. All his new classmates were curious about him. He had a smile on his face all the time. They asked him: \"You can't play football, you can't go to the college dances — why are you so happy and smiling?\"\n\nHe gave the best answer: \"You know, this disease has touched every part of my body. But it never touched my heart.\"\n\nThat's you and me. God has given us a new heart. That's the heart where the Spirit of God can come and dwell and fill us. It's not a perfect heart this side of glory, but it's a heart that longs for the way of salvation and for the return of the Lord Jesus Christ.\n\nSo let's show the joy of our salvation for the great salvation we have in Christ. Because Jesus came the first time — that tells us God keeps his promises. And we know God gives his Spirit, so we know God gives more grace. May God draw near and fill us with his very Spirit — in this season when we remember the coming of Christ, and in all our days and all our years."};
</script>
