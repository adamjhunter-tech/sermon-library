window.LESSON_DATA = {"id": "2022-01-23-cultivating-humility", "title": "Cultivating Humility", "speaker": "Pastor Tito Lyro", "date": "2022-01-23", "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["Cultivating Humility - Pastor Tito Lyro - 1 Peter 5_5-7.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/cultivating-humility-pastor-tito-lyro-1-peter-55-7", "tags": [{"tag": "humility", "source": "detected"}, {"tag": "pride", "source": "detected"}, {"tag": "sanctification", "source": "detected"}, {"tag": "spiritual disciplines", "source": "detected"}, {"tag": "community", "source": "detected"}, {"tag": "prayer", "source": "detected"}, {"tag": "encouragement", "source": "detected"}], "scripture_references": [{"reference": "1 Peter 5:5-7", "type": "quoted", "source": "detected"}, {"reference": "Isaiah 57:15", "type": "quoted", "source": "detected"}, {"reference": "Isaiah 66:2", "type": "referenced", "source": "detected"}, {"reference": "Galatians 6:14", "type": "quoted", "source": "detected"}, {"reference": "Philippians 4:8", "type": "referenced", "source": "detected"}, {"reference": "Psalm 92:1-2", "type": "referenced", "source": "detected"}, {"reference": "1 Corinthians 1:4-8", "type": "referenced", "source": "detected"}, {"reference": "Galatians 5:22-23", "type": "referenced", "source": "detected"}, {"reference": "Romans 12:1-2", "type": "referenced", "source": "detected"}, {"reference": "Ephesians 4:29", "type": "referenced", "source": "detected"}, {"reference": "Proverbs 18:21", "type": "referenced", "source": "detected"}, {"reference": "Matthew 18:15-20", "type": "referenced", "source": "detected"}], "outline": [{"title": "What Humility Is and Why It Matters to God", "subpoints": ["Pride is an excessive preoccupation with self, one's importance, achievements, or personal rights", "Humility is not self-deprecation but total and ultimate dependence on God through the Lord Jesus Christ", "God dwells with the humble spirit (Isaiah 57:15) and pours his blessings on the contrite (Isaiah 66:2)", "God resists the proud but gives grace to the humble (1 Peter 5:5)"], "scripture": ["1 Peter 5:5-7", "Isaiah 57:15", "Isaiah 66:2"]}, {"title": "Practices for Beginning the Day in Humility", "subpoints": ["Reflect on the wonder of the cross each morning -- Martin Lloyd-Jones: only the cross truly crushes pride", "Acknowledge dependence on God immediately, since sin does not sleep and will attack from the start", "Express gratitude to God, since thankfulness is soil in which pride does not easily grow", "Practice spiritual disciplines: read large portions of Scripture, meditate, pray for self and others, and worship God intentionally throughout the day", "Seize commuting or mindless time for prayer, Scripture memorization, or gospel podcasts", "Cast all anxieties on the Lord (1 Peter 5:7) -- anxiety is the attempt to be self-sufficient without God"], "scripture": ["Galatians 6:14", "1 Peter 5:7", "Philippians 4:8"]}, {"title": "Practices for Ending the Day in Humility", "subpoints": ["Psalm 92:1-2 describes the believer's day as beginning and ending with the Lord", "Review the day and assign all glory for every grace experienced to God, not to self", "Accept sleep as a gracious gift from God and resist the pride that refuses it", "Neglecting sleep by pursuing more than God designed, or by anxious worry, is an act of pride"], "scripture": ["Psalm 92:1-2"]}, {"title": "Knowing God and Seeing Grace in Others", "subpoints": ["Study the attributes of God -- the more we grasp his infinite greatness, the more we are humbled", "Study the doctrines of grace, which God designed so that no one can boast (1 Corinthians 1:18-31)", "Identify evidences of grace in others by learning the fruit of the Spirit (Galatians 5:22-23) and spiritual gifts", "Use encouraging words -- the average person speaks 25,000 words a day; humble speech builds others up"], "scripture": ["1 Corinthians 1:18-31", "Galatians 5:22-23", "Ephesians 4:29"]}, {"title": "Inviting and Pursuing Correction", "subpoints": ["Pride not only destroys but deceives -- others may clearly see our pride when we cannot", "Paul Tripp: self-perception is as accurate as a carnival mirror; we need others to see our sin", "John Owen: there is no duty we perform for God that sin does not oppose", "Pursuing correction from community is not weakness but a weapon against the lifelong war on pride"], "scripture": ["Matthew 18:15-20"]}], "summary": "Preached on January 23, 2022, as the final installment of a four-part vision series for the new year, this sermon by Pastor Tito Lyro moves from defining humility to providing concrete, practical instruction for how to grow in it. He opens by clarifying the difference between pride (excessive preoccupation with self) and humility (total dependence on God through Christ), and firmly grounds the importance of humility in God's own character: he dwells with and pours grace upon the humble, while resisting the proud (Isaiah 57:15; 1 Peter 5:5).\n\nThe practical content is structured around the arc of a day. In the morning, the believer should begin by contemplating the cross -- Martin Lloyd-Jones's observation that nothing crushes pride like gazing at the Son of God -- then acknowledge dependence on God, express gratitude, read large portions of Scripture, meditate, pray, speak about God to others, worship intentionally, and cast all anxieties on the Lord. Anxiety, Pastor Lyro argues, is itself an act of pride: it assumes God will get tomorrow wrong. Commuting time and other idle moments should be redeemed for memorization, prayer, or gospel listening.\n\nIn the evening, the believer should review the day and attribute every grace experienced to God, not to self. Accepting sleep as God's gracious gift is itself a form of humility -- refusing it by overworking, binge-watching, or lying awake in anxiety all express a prideful independence from God's designed limits.\n\nBeyond the rhythm of the day, Pastor Lyro urges his congregation to study God's attributes and the doctrines of grace, to actively identify evidences of grace in the lives of others (including spouses and children), and to deploy encouraging words -- noting that the average person speaks the equivalent of a hundred-page book every day, and that humble hearts will increasingly devote those words to building others up. The sermon closes with the most challenging exhortation: invite and pursue correction from trusted people in the community, because pride also deceives, and the war against it will not end until we see our Savior face to face.", "transcript": "## Scripture Reading: 1 Peter 5:5-7\n\nIf you are able, would you remain standing? We are going to turn in our Bible to 1 Peter chapter 5, going to read verses 5, 6 and 7 of 1 Peter chapter 5. This is the word of our Lord.\n\n*Likewise, you younger people, submit yourselves to your elders. Yes, all of you be submissive to one another, and be clothed with humility, for God resists the proud but gives grace to the humble. Therefore, humble yourselves under the mighty hand of God, that he may exalt you in due time, casting all your care upon him, for he cares for you.*\n\nThis is the Lord of all. Let us pray together.\n\n*Father, thank you for your word. We pray that your Spirit will handle it well today for your glory and for the good of your church. We pray in Jesus' name. Amen.*\n\nPlease be seated.\n\n## Introduction: Vision for 2022\n\nWe have taken a break from our 1 John series to consider an emphasis for 2022. It is January 23rd, and it feels like 2022 has been going on forever already. But it is still the beginning of the year, and it is still good to be talking about a vision for 2022.\n\nThe vision that I have for us -- and often what I consider for all of us is something that I have seen in my own heart that would be good for me, so it might even be a little selfish in that way -- is that we could benefit from growing in humility. Killing pride in our lives and growing in humility. Humbling ourselves before the Lord as a congregation and letting him exalt us.\n\nWe have seen that humility is incredibly important to God. We have seen that life and community, life and unity, flows from humble hearts -- that you cannot really have community if humility is not there. So as we look forward to 2022, we want to pursue Christian humility so that we may live in unity with one another for the glory of God.\n\n## Defining Humility and Pride\n\nLet me remind us with a couple of definitions. Start with pride. Pride is an excessive preoccupation with self and one's own importance, achievements, status, possessions, or personal rights and entitlements. That is what pride is.\n\nHumility is not as easy to define as pride. Humility is not saying that you are worse than everybody else. Self-deprecation is not the same as humility. If you are good at something, denying it does not make you more humble. Humility includes acknowledging the gifts that God has given you and using them in his service. C. S. Lewis famously defined humility as not thinking less of yourself, but thinking of yourself less -- where the \"less\" goes in that sentence makes a big difference.\n\nBut at the end of the day, I think you can encapsulate humility in this: humility is total and ultimate dependence on another -- namely, on God through the Lord Jesus Christ. That is really what humility is.\n\n## Why Humility Matters to God\n\nBefore talking about the how, I want to remind us how important humility is to the Lord. In Isaiah 57:15, Isaiah is talking about the greatness of God. And he says: \"For thus says the high and lofty one who inhabits eternity, whose name is holy -- I dwell in the high and holy place with him who has a contrite and humble spirit.\"\n\nHere we have the mighty God who created all things -- the one who is other than creation, the one who lives in holiness -- and he says: this is the one who dwells before me. The one who has a humble spirit. A similar thing in Isaiah 66:2: \"On this one will I look -- on him who is poor and of contrite spirit, and who trembles at my word.\"\n\nAnd as we read this morning in 1 Peter 5, God resists the proud but gives grace to the humble. Therefore we humble ourselves so that God can be the one to exalt us.\n\n## How to Cultivate Humility: Beginning the Day\n\nThe first thing we need to do is value humility in our own lives -- not just in thought but in practice. It is possible to admire humility while remaining proud. It is also possible to deceive ourselves into thinking we are making progress against pride while not taking any steps toward humility.\n\nAs we desire to practice humility, let me start by talking about how we begin the day.\n\n**Reflect on the work and wonder of the cross.** Paul says in Galatians 6:14, \"God forbid that I should boast except in the cross of our Lord Jesus Christ, by whom the world has been crucified to me and I to the world.\" Fill your affections with the cross of Christ. Martin Lloyd-Jones, the great independent preacher of the 20th century in London, said: \"There is only one thing I know of that crushes me to the ground and humiliates me to the dust, and that is to look at the Son of God and especially contemplate the cross.\" So begin each day contemplating the wonder of the cross.\n\n**Acknowledge your dependence and need for God.** Sin -- including pride -- is active. Sin does not sleep. So when we wake up in the morning, sin is right there, fully awake, ready to attack. So rather than be attacked by sin, we must choose to go on the offensive. Declare war on pride by speaking the truth of our need for God as soon as we get up.\n\n**Express gratitude to God.** Thankfulness is soil in which pride does not easily grow. Thankfulness points us to things outside of ourselves. It helps us not to be focused on ourselves. So recognize that whatever grace you receive from God is so much more than you are worthy of, and be thankful.\n\n**Practice spiritual disciplines.** Read the Bible -- large portions of the Bible. It takes 15 to 20 minutes a day to read four chapters, and if you do that every day, you get through the Bible in a year. We need the Bible; we need all of it. Think about what you read. Philippians 4:8 tells us to meditate on what is good, what is lovely, what is a good report. Pray -- for yourselves, for others, for anything. Prayer takes the focus off of us and acknowledges our dependence on God. Talk about God and Christ to others as you go about your day. Worship God through Christ intentionally throughout the day -- worship reminds us that God is God and we are not.\n\n**Seize your commute or other mindless time.** William Wilberforce, the 19th-century Christian statesman, used his daily mile walk to Parliament to memorize Psalm 119. On the way there he would recite it aloud; on the way back he would meditate on a particular portion. For many of us, our commutes are wasted every day by allowing ourselves to get into mental ruts that are not helpful.\n\n**Cast your cares upon the Lord.** This is active -- you are actively casting your cares on him. As 1 Peter 5:7 says, \"Cast all your anxiety upon him, for he cares for you.\" When we humble ourselves by casting our cares on the Lord, we start our day free of care, because the Lord has them. The humble are generally carefree. Where there is worry, where there is anxiety, pride is at the root of it. When we experience anxiety, the root issue is that we are trying to be self-sufficient.\n\n## How to Cultivate Humility: Ending the Day\n\nPsalm 92:1-2 is helpful here: \"It is good to give thanks to the Lord and to sing praises to your name, O Most High, to declare your loving-kindness in the morning and your faithfulness every night.\" The cycle of the believer's day is to begin with the Lord and end with the Lord.\n\n**Review your day and assign all glory for the grace you experienced to God.** Throughout each day we experience saving grace, sanctifying grace, sustaining grace, serving grace -- grace that should amaze us. We must ascribe all glory for that to the Lord. Thomas Watson said: \"When we have done anything praiseworthy, we must hide ourselves under the veil of humility and transfer the glory of all we have done to God.\"\n\n**Accept the gift of sleep.** God made everyone of us to need sleep. A Christian informed by Scripture views the cessation of work each day and the laying down to sleep each night as altogether a gift from God. To refuse to receive the gift is a sign of pride. We often neglect the gift of sleep by trying to accomplish more than what God designed for us to accomplish, or by mindlessly entertaining ourselves, or by worrying and being anxious. Anxiety is the fear that God is going to get tomorrow wrong. By staying up and worrying, we are somehow trying to fix that -- but it is pride to think that God is going to get tomorrow wrong.\n\n## Additional Ways to Cultivate Humility\n\n**Study the attributes of God.** Know who God is. R. C. Sproul said: \"The grand difference between a human being and the supreme being is precisely this: apart from God, I cannot exist; apart from me, God does exist.\" The more we are aware of this distance between us and God, the more we experience and express humility. Grab a book like *Knowing God* by J. I. Packer and read it. Read Calvin's *Institutes*. Read Thomas Watson's *Body of Divinity*.\n\n**Study the doctrines of grace.** God intentionally designed salvation so that no man can boast of it. He planned it so that boasting is absolutely excluded. Consider 1 Corinthians 1:18-31 -- the foolishness of the message preached saved not the mighty, not the brightest, but in some ways the scum of the earth, so that he who glories can only glory in the Lord.\n\n**Identify evidences of grace in other people's lives.** This means finding the positive work of God in others' lives. Familiarize yourself with the fruit of the Spirit (Galatians 5:22-23) and the lists of spiritual gifts in Romans 12, 1 Corinthians 12, Ephesians 4, and 1 Peter 4. Look for them. When we equip ourselves to see the evidence of grace in people's lives, suddenly we will see that God is at work everywhere. We need to do this in our families -- with our spouses, with our children. If we are not faithful to encourage our children, we can be sure we will eventually exasperate them.\n\n**Use words to encourage others.** The average person speaks 25,000 words a day -- that is equivalent to a hundred-page book. How many of those words reflect pride rather than gospel-motivated humility displayed in encouragement? Ephesians 4:29 says: \"Let no corrupt word proceed out of your mouth, but what is good for necessary edification, that it may impart grace to the hearers.\" It takes humility for us to be purposefully encouraging with our words, because we have to think of others in order to do that.\n\n**Invite and pursue correction.** The pursuit of humility cannot be solitary because pride not only destroys but also deceives. Others may clearly see the pride in our hearts that we are not able or willing to recognize. Paul Tripp says our self-perception is as accurate as a carnival mirror. John Owen said: \"There is no duty we perform for God that sin does not oppose.\" The people around us are a gift from God in our battle against pride.\n\n## Closing\n\nLife in community, life in unity flows out of humble hearts. Both our relationship with God and with one another is based on humble hearts. As we look forward to this new year, may we pursue Christian humility so that we may live in unity with one another for the glory of God -- that we might die to pride and live in humility.\n\nLet us pray together.\n\n*Father, thank you that you are a God who speaks to us, often through a very inadequate speaker. Pray that the truth uttered today would find fertile ground in all of our hearts, and that your Spirit who causes those seeds to grow would cause us to die to sin, to pride, and to live in humility. We ask in the name of the ultimate humble one, the Lord Jesus Christ, who humbled himself to the death of the cross on our behalf. Amen.*"};
