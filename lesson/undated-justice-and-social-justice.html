window.LESSON_DATA = {"id": "undated-justice-and-social-justice", "title": "Justice and Social Justice", "speaker": "Elder Andrew Hoy", "date": null, "session": "SS", "series": null, "series_part": null, "parts": 1, "source_files": ["Justice and Social Justice - Elder Andrew Hoy.txt"], "soundcloud_url": "https://soundcloud.com/user-732503870/justice-and-social-justice-elder-andrew-hoy", "tags": [{"tag": "justice", "source": "detected"}, {"tag": "social justice", "source": "detected"}, {"tag": "cultural engagement", "source": "detected"}, {"tag": "good works", "source": "detected"}, {"tag": "discipleship", "source": "detected"}], "scripture_references": [{"reference": "Matthew 22:37-40", "type": "quoted", "source": "detected"}, {"reference": "1 John 4:20-21", "type": "quoted", "source": "detected"}, {"reference": "John 13:34-35", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Conversation Around Justice", "subpoints": ["Justice has been debated throughout history but has become newly heated in our time", "Events like George Floyd and Trayvon Martin have intensified the conversation", "The church must engage these topics from Scripture rather than from media", "Young people in the church are especially vulnerable to destructive ideologies"], "scripture": []}, {"title": "Defining Social Justice and Its Baggage", "subpoints": ["The phrase 'social justice' has legitimate denotation but heavy connotations", "Social injustice can legitimately describe systemic, institutionalized sin", "US chattel slavery is an example of a genuine social injustice", "We must listen carefully before dismissing those who use the phrase"], "scripture": []}, {"title": "Three Red Flags of Social Justice Ideology", "subpoints": ["Red Flag 1: Equality of outcomes substituted for equality of opportunity", "Red Flag 2: Identity politics — analyzing everyone by race or social group (intersectionality, CRT)", "Red Flag 3: The oppressor/oppressed paradigm — a Marxist framework applied to social life", "Scripture does not promise equal outcomes and does not reduce persons to group identity"], "scripture": []}, {"title": "Five Exhortations Toward Justice and Good Works", "subpoints": ["Do not over-correct: being clear on the church's mission does not mean passivity toward good works", "As disciples, obeying Jesus in everything will have an impact on the world", "Consider our critics honestly — are there ways we are failing in love and generosity?", "Encourage Christians doing faithful work in politics, law, adoption, addiction ministry, and church discipline"], "scripture": ["Matthew 22:37-40", "1 John 4:20-21"]}, {"title": "The Christian's Calling: Repentance and Faithful Presence", "subpoints": ["We will never accomplish these things perfectly — we are sinners who need Christ", "The final exhortation is simply to be a Christian: repent daily and lean on Christ's mercies", "Saturate the mind with Scripture and let it transform daily conduct", "The church as salt and light will change the world as she obeys her Lord"], "scripture": []}], "summary": "Elder Andrew Hoy delivered this Sunday school lesson in response to the intense national conversation around justice and social justice. The lesson is addressed to a broadly conservative congregation while acknowledging that young people in the church are still formulating their worldview and are vulnerable to persuasive but destructive ideas. The goal is not to dismiss the topic but to engage it first and foremost from Scripture.\n\nThe first portion of the lesson examines what social justice means — distinguishing the neutral denotation (systemic injustice is a real category) from the ideological connotations the phrase carries in contemporary discourse. Three specific red flags of leftist social justice ideology are identified: the substitution of equality of outcomes for equality of opportunity, the reduction of personhood to racial or group identity (intersectionality and critical race theory), and the oppressor/oppressed paradigm borrowed from Marxism. Each is presented as unscriptural.\n\nThe lesson then pivots from critique to exhortation. Elder Hoy offers five calls to action: do not over-correct into passivity about good works; obey Jesus in everything, which will inevitably change the world around us; consider critics honestly to see if they identify any genuine failures in Christian generosity; actively encourage and come alongside Christians doing faithful work in law, politics, foster care, addiction ministry, and church discipline; and finally, recognize our own failures and repent daily, relying on the mercies of Christ. The church as salt and light, pursuing discipleship faithfully, will be a true presence for good in the world.", "transcript": "## Introduction\n\nThere is a big conversation happening in our country around the topic of justice. The conversation about justice goes back as far as we have written records — ancient philosophers discussed it, and it is a recurring theme in the great books of history. But in our time, especially in the last few years, there has been especially heated conversation around it because there are strong and differing views about what justice even is.\n\nThis has partially been spurred on by some events: the police encountering different people — George Floyd, Breonna Taylor, Trayvon Martin, Ahmaud Arbery — names that come up in the media because of their encounters with law enforcement. There is also an increasing presence of a radical leftist ideology, penetrating our schools, government agencies, and society as a whole. So there is this big conversation about justice. What is our role as the church in it?\n\nI do think that as the church — called to be salt and light in this world — we need to be a people who are informed on these issues and taking part in these conversations. Not just repeating whatever lines we hear from our favorite media outlet, whether Fox News or the Daily Wire, but making sure we are taking our cues from Scripture first and foremost. This is not to say we cannot rely on secular sources — but our duty as a church is first and foremost to be grounded in what Scripture says.\n\nWe also need to be aware of the youth of the church. As adults, many of us are not particularly drawn to or enticed by leftist ideologies. But our young people are still formulating their understanding of the world around them. I have heard too many stories recently of kids raised in good, strong Bible-based churches who were swept up in bad ideas. So we need to be a church that engages these ideas first and foremost from Scripture.\n\nThis morning I have two main goals: first, to think about justice and the phrase \"social justice\" — what the world is saying and what Scripture says. Second, for the remainder of our time, to reflect on our calling and duties as a church regarding justice and good work, with five exhortations.\n\n## Justice and Social Justice\n\nDoes the phrase \"social justice\" make you uncomfortable? I think that is a common reaction, because in our time the phrase has a lot of baggage tied to it. DeYoung and Gilbert have noted: \"We offer no definition of the phrase. That is because there really is not one. We use the term as it is commonly conceived — that is, something ambiguously connected with poverty and oppression — but we would rather not use the term at all.\"\n\nPart of the issue is separating the denotation (the literal meaning of the words) from the connotations (the extra baggage and associations). If we look at the denotation: social justice or social injustice refers to injustices that are systemically ingrained in society. Can we deny that sin impacts social institutions? Is it wrong to call the system of chattel slavery that existed in our country for so long a social injustice? But we cannot be naive enough to think there are no connotations — it is a phrase primarily associated with the left and extremist leftist ideology, even Marxism. So it is not necessarily a wrong instinct to have a red flag go up when you hear the phrase. But do not dismiss people right away — listen to what they are saying first.\n\n## Three Red Flags in Social Justice Ideology\n\nThere are three ideas commonly embedded in the leftist form of social justice ideology that I want to put on your radar. Each one could merit an entire series, so I am just giving you a snapshot.\n\nThe first is the exchange of equality of outcomes for equality of opportunity. This says it is not enough for a system to be fair to all people — to have courts that judge equally regardless of race, creed, or gender, or employers that provide equal opportunity regardless of those factors. Those who insist on equality of outcomes say that if the final results are not evenly distributed among different groups, there must be an underlying injustice. Scripture does not promise us equal outcomes. It does not even necessarily lift that up as the ideal. Now, I am not saying it is wrong to look at sociological studies that reveal inequality and ask whether there is an injustice there — but to insist that unequal outcomes necessarily mean injustice is wrong.\n\nThe second red flag is identity politics — analyzing everything and everyone in terms of race or social group. Phrases like \"white privilege\" and \"intersectionality\" fall under this banner. Critical race theory is the most popular idea here. James Lindsay offers a concise definition: critical race theory holds that the most important thing about you is your race. If you are a member of a minoritized racial group, you are a victim of a system rigged against you. If your race is privileged, you are an exploiter, whether you intend to be or not.\n\nThe third red flag is analyzing everything in terms of an oppressor/oppressed paradigm — the idea that all social ills can be analyzed in terms of the oppressed and the oppressors, with the goal being a utopian cosmic justice in which there is a perfect equality of outcomes. This is essentially the Marxist paradigm of economics applied to social situations, which is why some controversially call it cultural Marxism.\n\n## What Scripture Says About Justice\n\nThe scriptural idea of justice is equality of opportunity — a system of courts in which all people are judged equally regardless of race, creed, or gender. Leviticus 19:15:\n\n> *\"You shall do no injustice in judgment. You shall not be partial to the poor, nor honor the person of the mighty. In righteousness you shall judge your neighbor.\"* (Leviticus 19:15)\n\nThe Bible calls for impartial justice. It does not call for equal outcomes in the economic sense. Scripture both celebrates wealthy, godly people — Boaz, King David — and celebrates the righteous poor whom Jesus encountered throughout his ministry. The Bible does not promise equal economic outcomes.\n\nRecommended resources if you want to go deeper: Thaddeus J. Williams, *Confronting Injustice without Compromising Truth* — an accessible book that engages the ideas and ends each chapter with a story from a real-life person impacted by those ideas. Thomas Sowell, *The Quest for Cosmic Justice* — a more analytical book, by a non-Christian. Neil Shenvi at shenviapologetics.com has substantial essays on these topics. Podcasts: *Defining Deception* and *Just Thinking*.\n\n## Five Exhortations Toward Justice and Good Works\n\n**First: Do not overcorrect and react.** Much of our teaching has been addressing wrong ideas about the mission of the church — those who define the church's mission too broadly or overstate its role in building the kingdom. In doing this correcting, there is a temptation to focus so much on what we are not supposed to do that we fail to do what we are. DeYoung and Gilbert: \"We would be disappointed to discover a year from now that our work did anything to discourage radical love and generosity for hurting people.\" The church's mission is to make disciples — let us be clear about that and not react into some sort of passivity. We strongly support churches undertaking mercy ministries in their communities.\n\n**Second: As disciples, we are called to obey Jesus in everything he commanded.** If the mission of the church is to make disciples, and disciples are to obey Christ in all that they do, that will absolutely have an impact on the work Christians are doing in the world. We are salt and light. We are commanded to love our neighbors. We are ambassadors of Christ. As we seek to obey Jesus in all things, we will change the world — maybe not always in the way social justice advocates have in mind, but we will change it.\n\nDeYoung and Gilbert give five reasons to pursue good works: (1) to obey God whom we love; (2) because we love our neighbors; (3) to show the world God's character and work; (4) because they are the fruit of the Spirit working in us; and (5) to win a hearing for the gospel.\n\n**Third: Consider our critics.** Those who write from a social justice perspective have often looked at the church and seen her to be less than faithful — Christians more concerned with their next vacation than with their suffering neighbors, more concerned with a bigger home than with those who are homeless around them. I am not saying they are always right. But I do think we need to ask: is there some validity in their critique? Are we being faithful? Are we repenting of our materialism? Do we care for people?\n\nAt the same time, we need to remember that many Christians are doing great things that nobody knows about. Jesus told us not to parade our good works before others. So people make these judgments without knowing what these people are doing with their time during the week.\n\n**Fourth: Encourage Christians in the work they are doing.** Think about different spheres of society. Politics and law: do you know a Christian faithfully serving in that sphere? Pray for them. Encourage them. Ask how you can come alongside them. Adoption and foster care. Addiction and restoration. The church's exercise of church discipline — including in the area of sexual abuse. These are all areas where Christians are called to do faithful work. Find them. Come alongside them. Maybe you yourself are called to do that work.\n\n**Fifth: Are we falling short?** The answer has to be yes. We are sinners. None of us are doing any of this perfectly. So the final exhortation is simply to be a Christian — which means that every single day you repent of your sins and lean on the mercies of Christ. You saturate your mind with the Word of God and strive to be more faithful to it, knowing that there is nothing within yourself that could do it. But by the renewing work of the Holy Spirit, you are able to be a new creation — able to be like Christ, able to follow Christ. It is an ongoing process of repentance and faith. And even as we gather today, to receive the ordinary means of grace, may we be strengthened as disciples of Jesus — strengthened in our ability to be more like him — so that when we are out in the world, we may be a faithful presence in it, both in word and deed."};
