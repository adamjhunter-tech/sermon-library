what happens and you cannot change it", "Calvinism: a personal, loving, all-knowing God lays out the path — one who cares for us and works all things together for our good (Rom. 8:28)", "Ecclesiastes 1:15 ('what is crooked cannot be made straight') is spoken without reference to God — that is the fatalist's statement", "Ecclesiastes 7:13 reintroduces God — the same crooked things are now gifts from a Father who knows us, loves us, and is building us into what He wants us to be"], "scripture": ["Ecclesiastes 7:13", "Ecclesiastes 1:15", "Romans 8:28"]}, {"title": "Responding to Both Prosperity and Adversity (v. 14)", "subpoints": ["In days of prosperity: be joyful", "In days of adversity: consider — God has appointed both", "Every day — whether the mountains are visible or hidden by clouds — is a day to rejoice in God", "Job's question: 'Shall we receive good from God, and shall we not receive evil?'", "Martin Luther: 'Enjoy the things that are present in such a way that you do not base your confidence on them as though they were going to last forever, but reserve part of your heart for God so that you can bear the day of adversity'"], "scripture": ["Ecclesiastes 7:14"]}, {"title": "The Contradiction: The Just Perish, the Wicked Prosper (v. 15)", "subpoints": ["Solomon honestly observes what Psalm 73 and Psalm 37 also wrestle with: the righteous sometimes perish while the wicked prosper", "This is not answered for the unbeliever in this text — Solomon is addressing believers who are troubled by the observation", "The temptation: when things go wrong, to feel that we deserve better from God", "Such an attitude — 'God, you owe me' — is what God through Solomon calls foolish"], "scripture": ["Ecclesiastes 7:15", "Psalm 73", "Psalm 37"]}, {"title": "Not Self-Righteous, Not Wicked — But God-Fearing (vv. 16–18)", "subpoints": ["Being 'overly righteous' (v. 16) is not about exceeding God's standard — no one can — but about self-righteousness and demanding that God reward our with, from the beginning of Genesis through Revelation. He was also admired for his faithfulness as a pastor for twenty-five years — rarely missing his rotation in the pulpit — and most of all, for his perseverance in suffering.\n\nHis wife suffered from a chronic illness through most of their time together. They had ten children, six of whom died in infancy or shortly thereafter. One son he named Ebenezer — a testimony to God's faithfulness. He wrestled with the name, knowing another son was coming. What would he do if that child also died, and he had called the first one \"the Lord has helped us\"? He named him Ebenezer in faith. Shortly after birth, that child also sickened and died. In his memoirs he writes simply: *It pleased the Lord that he also was removed from me.* His focus was on the sovereignty and goodness of God — that this was his God, ordering these things in his life.\n\n> \"Consider the work of God, for who can make straight what He has made crooked? In the day of prosperity be joyful, but in the day of adversity consider: surely God has appointed the one as well as the other, so that man can find out nothing that will come after him. I have seen everything in my days of vanity: there is a just man who perishes in his righteousness, and there is a wicked man who prolongs life in his wickedness. Do not be overly righteous, nor be overly wise: why should you destroy yourself? Do not be overly wicked, nor be foolish: why should you die before your time? It is good that you grasp this, and also not remove your hand from the other. For he who fears God will escape them all.\" (Ecclesiastes 7:13–18)\n\n## The Command: Consider the Work of God (v. 13)\n\nSolomon has spent the first six chapters of Ecclesiastes looking at life in this world — public life, private life, financial life, work, culture, music, building — all of it examined without reference to God. His honest, truthful verdict: *This is empty.*\n\nNow, in chapter 7, he reintroduces God. He tells us: take a look at what God is doing around you. And then he invites us to consider one fact — can you change what God has put in your life? It is a rhetorical question. If God has put a crook in your life, can you straighten it out? The presumptive answer is no. Things are the way they are because God wants them to be that way.\n\nBoston put it this way: God has given to every one of us, during our lives in this world, a certain course of events by His providence. That is our *lot* — the pathway God has sovereignly ordained for us. And within that course, there will fall something that comes cross-purposes to what we might have hoped for. That is the *crook in our lot*. Sometimes our days go softly and agreeably. Other days the crook will press us, pain us, seem difficult to bear. There is no perfection on this side of heaven.\n\nSolomon is asking us not merely to see this but to examine it — and then to accept what God does. To surrender to it. And to praise God for what He brings into our lives.\n\n## Sovereignty vs. Fatalism\n\nFor some people this sounds very much like fatalism — or Islam. But there is an exceedingly different word for what the Bible teaches: *Calvinism*.\n\nFatalism says that an impersonal force generates what is going to happen and you cannot change it. That is not what the Bible teaches. The Bible teaches that there is a lot in life that God lays out for you — but the One who lays it out is hardly impersonal. He is hardly unknowing of you. He loves you, cares for you, and He works all these things together for your good and for His glory (Romans 8:28).\n\nNotice the contrast within Ecclesiastes itself. In chapter 1, verse 15 — spoken in the section where Solomon deliberately excludes God — he says: *What is crooked cannot be made straight, and what is lacking cannot be numbered.* That is fatalism: everything is determined, God is not in the picture. But here in chapter 7, verse 13, the same crooked things are placed back in God's hands. God is back in the picture. The one bringing these things into your life knows you, cares for you, and is building you into what He wants you to be.\n\n## Responding to Both Prosperity and Adversity (v. 14)\n\n> \"In the day of prosperity be joyful, but in the day of adversity consider: surely God has appointed the one as well as the other.\" (Ecclesiastes 7:14)\n\nEvery day — whether you wake up and the mountains are out in the morning light and the birds are singing, or you wake up knowing that what lies ahead is going to be hard — is a day to rejoice in God, to trust Him, to accept what He is going to bring as intended for your benefit.\n\nJob says it well, speaking to his wife: *Shall we receive good from God, and shall we not receive evil?* We rejoice in the good things God gives. But on the day of adversity, shall we not also receive the crooks in our lot? Those things that are hard to deal with and hard to live with?\n\nThe last phrase of verse 14 — that man cannot know what comes after him — simply reminds us that the future is in God's hands, not ours. You can plan and list and schedule, and God will put things on your plate that were never on it. All of it comes to us from the hands of our loving Heavenly Father.\n\nMartin Luther said: *Enjoy the things that are present in such a way that you do not base your confidence on them as though they were going to last forever. But reserve part of your heart for God so that you can bear the day of adversity.* Rejoice in what God gives — but do not put all your confidence in those gifts. Consider the work of God.\n\n## The Contradiction: The Just Perish, the Wicked Prosper (v. 15)\n\n> \"There is a just man who perishes in his righteousness, and there is a wicked man who prolongs life in his wickedness.\" (Ecclesiastes 7:15)\n\nSolomon is not the only one to observe this. Psalm 73 and Psalm 37 wrestle with the same thing. Sometimes the godly are persecuted while the unrighteous ascend to prominence. Innocent victims are cut down while those who caused it walk free.\n\nSolomon is not answering this problem for the unsaved. He is addressing believers who are troubled when they see it. And when those injustices happen, we ought to recognize that these things come from God — and that our response to them reveals what we truly believe about Him.\n\nThe danger is this: when difficulty comes, we are tempted in our hearts to feel that we deserve better from God. *I grew up in a Christian home. I've tried to do what's right. I don't deserve this.* We would never say those words in church — but there are times in our hearts when something very like that rises up. And that mindset, Solomon tells us, is the mindset of a fool.\n\n## Not Self-Righteous, Not Wicked — But God-Fearing (vv. 16–18)\n\nThis is one of the most difficult passages to interpret in all of Scripture — commentators have taken it in many directions. But I do not believe Solomon is commending a mediocre, middle-of-the-road approach to life.\n\nBeing \"overly righteous\" here is not about exceeding God's standard — which none of us can do. It is about self-righteousness: an overstrained righteousness that has lost sight of our own sinful imperfections and inclines us to argue with God about why He is not rewarding us as we think we deserve. It is the attitude of the people in the prophets who stood at the temple and said, *Lord, we are righteous — you owe us more than this.*\n\nThat attitude — *God, be fair to me; give me what I deserve* — is perilous territory. None of us wants what we truly deserve from God.\n\nThe right path, the one Solomon is pointing us toward, is the fear of God: reverential awe and trust that causes us to want to please and honor Him. Where does obedience come from? It ought to come from your communion with God and your understanding of who this great God is that you want to serve and worship. And the conclusion of the entire book, in chapter 12 verse 13, says it plainly: *Fear God and keep His commandments.* This section is leading us there.\n\n## Practical Wisdom from Thomas Boston\n\nAs we close, Boston draws out several practical ways to look at the crooks that fall in our lot.\n\nFirst, the crooks in our lives are a test — an opportunity to determine whether we are truly trusting in Christ for our salvation. The difficult things that came into Job's life were an opportunity to purify him and demonstrate his love and faith in God.\n\nSecond, the crooked things in life can turn our hearts away from this vain world and teach us to look for happiness in the life to come. Suffering has a way of preparing us for eternity — weaning us away from things that may be good in themselves but to which we have given too much of our love and attention.\n\nThird, the crooked things in life can convict us of sin. The Holy Spirit uses afflictions to show us our guilt. Think of Joseph's brothers — thrown into slavery by their own treachery. Years later, standing before Joseph without recognizing him, as their family faces famine, they find themselves saying to one another: *These things are happening because of what we did to Joseph.* God brought them to the point of acknowledgment.\n\nFourth, the crooked things in life can correct sin. Think of David — who murdered Uriah. The sword and judgment of God fell upon him, and those hardships brought him to the repentance we see in Psalms 32 and 51.\n\nWe may not always be able to figure out exactly why God has brought a particular crook into our life. But the loving God who brought it there does know why. And it is enough to rest our hearts in the fact that God is at work — even in the midst of suffering, even in times of trial — and that even though this might not be what we would have chosen for ourselves, it is good, and it is being used for His kingdom and for our growth.\n\nJames Montgomery Boice, longtime pastor of Tenth Presbyterian Church in Philadelphia, was diagnosed with aggressive cancer and told he had roughly three weeks to live. He went to put his house in order. The last time he spoke to his congregation, he told them about his diagnosis and said: *This is the crook in my lot. Let me ask you a question: if God does something in your life — if this is part of His plan for your life — would you change it? If we tried to change what God has done, it wouldn't be as good.*\n\nConsider the work of God. The crook that falls in your way is often God at work — developing in you things you need for life and for His kingdom that cannot be gotten any other way.", "summary": "Guest preacher Pastor Kevin Backus expounds Ecclesiastes 7:13–18, drawing extensively on Thomas Boston's 'The Crook in the Lot.' The sermon argues that while fatalism sees an impersonal force ordaining the difficulties of life, the Bible's teaching is that a personal, loving, all-knowing God sovereignly ordains the 'lot' — the pathway — for every believer, including its 'crooks': those painful circumstances that run cross-purposes to what we would have chosen. The proper response is to consider God's work, receive both prosperity and adversity as from His hand, avoid self-righteous demands on God, and fear Him in reverential trust — the summary of Ecclesiastes as a whole.", "soundcloud_url": "https://soundcloud.com/olympiabp/01-19-25-am-consider-the-work-of-god-ecclesiastes-7_13-18-pastor-kevin-backus"};
