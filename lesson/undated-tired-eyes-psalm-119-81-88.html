// Lesson data embedded at build time
window.LESSON_DATA = {"id": "undated-tired-eyes-psalm-119-81-88", "title": "Tired Eyes", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": "Psalm 119", "series_part": null, "parts": 1, "source_files": ["Tired Eyes - Pastor Tito Lyro - Psalm 119_81-88.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/tired-eyes-pastor-tito-lyro-psalm-11981-88", "tags": [{"tag": "affliction", "source": "detected"}, {"tag": "hope", "source": "detected"}, {"tag": "perseverance", "source": "detected"}, {"tag": "Word of God", "source": "detected"}], "scripture_references": [{"reference": "Psalm 119:81-88", "type": "quoted", "source": "detected"}], "outline": ["Introduction: The kaph section of Psalm 119", "My soul faints for Your salvation — exhaustion and longing", "Tired eyes watching for God's Word", "Persecution from the proud who dig pits", "When will God judge and vindicate?", "The plea: do not forsake Your commandments", "Conclusion: Persevering faith despite weariness"], "summary": "Pastor Tito Lyro preaches from the kaph section of Psalm 119 (verses 81-88), where the psalmist cries out in exhaustion, with soul fainting and eyes growing tired while waiting for God's salvation. Despite persecution by the proud, he clings to God's Word and pleads for preservation.", "transcript": "## Introduction\n\nHave you ever burned the midnight oil studying until your eyes were hurting? I remember finishing high school in Brazil, where the end of high school involved taking a comprehensive qualifying exam called the vestibular — not like the SAT, which still allows you to go to college. The vestibular decided whether you would actually be allowed into any college. For my area of Chemical Engineering, it consisted of a battery of tests covering math, physics, chemistry, English, world history, Brazilian history, literature, and more — several days of testing, 8 to 5, and your life depended on it. I stayed up into the wee hours of the morning studying, and what happens is the words on the page start to dance. You feel like you have sand in your eyes and things just are not working like they should.\n\nThis is really where we find the psalmist in this afternoon's passage. His eyes are tired because he has been constantly looking for comfort in the Word of God. He is doing that because he is in the midst of affliction. This is a common theme throughout Psalm 119 — the psalmist is going through affliction, and in fact, affliction gave occasion to the psalm. Affliction is what caused him to write this long acrostic poem to the Word of God and the God of the Word. And this particular stanza is written because he is being afflicted.\n\n## The Psalmist's Exhausted Hope\n\nIn verse 81, the psalmist prays for salvation:\n\n> *\"My soul faints for Your salvation, but I hope in Your word.\"* (Psalm 119:81)\n\nBut salvation here is not salvation in the sense of being justified and going to heaven. Salvation here means deliverance from affliction. The psalmist is praying that the Lord would rescue him. He is struggling with this affliction to the point of fainting with longing for God's deliverance. Some of us may be in that same place — asking for the Lord to deliver us from a particular affliction in our life for a long time, worn out with asking, and yet every ounce of our being still longs for that deliverance.\n\nBut here, even in weariness, even in fainting, even in being worn out with longing, the psalmist continues to hope in the Word of God and the God of the Word. And because his hope is in the Word of God, he looks for comfort in it. That is where his hope is. So he searches the Word for comfort, as he says in verse 82:\n\n> *\"My eyes fail from searching Your word, saying, 'When will You comfort me?'\"* (Psalm 119:82)\n\nHe searches for comfort in the Word of God to the point that his eyes grow tired of looking at it. He is so confident that God is going to comfort him through the Bible that he spends every moment he can searching for that comfort.\n\nLet me ask — is that you? Is that us? Are our eyes tired because we have spent so much time looking for comfort in the Word of God? When in the midst of affliction, do we turn to the Word of God for comfort? And when we do, do we keep at it until our eyes are tired?\n\nBrother and sister, do you look to God for your comfort? Is God your comfort? He is objectively our comfort and comforter, but is He subjectively your comfort? The Lord Jesus says the Holy Spirit will be our comforter and that He will testify of Christ. The Spirit who is God comforts us by testifying of Jesus — and that is what the Word does. Are you finding Jesus as you read the Bible? Because the great comfort we have is in Jesus Christ.\n\n## The Psalmist's Despair — and His Cry for Help\n\nAs we read this passage, we see that the psalmist is not doing well. He is like a wineskin that has been hung over a fire — blackened and shriveled. Verse 83:\n\n> *\"For I have become like a wineskin in smoke, yet I do not forget Your statutes.\"* (Psalm 119:83)\n\nOne commentator suggested this means he is being purified and the wine tastes better — but that is not the context here. This man is in despair, scorched by the flames of affliction. You can smell the smoke on him.\n\nAnd he is losing patience with the perceived delay in God's justice. Verse 84:\n\n> *\"How many are the days of Your servant? When will You execute judgment on those who persecute me?\"*\n\nHe is getting impatient with God. He is saying, \"God is taking too long to do what I want Him to do.\" Now, I am sure none of us have ever felt that way. But there are some people who feel that God is not acting as quickly as He should. Have you ever thought, \"If I were God, I would not do things this way\"? To which the proper response is: praise the Lord that you are not God. Because God is God and we are not, and He knows what He is doing.\n\nThe psalmist's enemies have almost killed him. Verse 87: \"They almost made an end of me on earth.\" He is at the brink of despair. And yet in his despair, he cries out in verse 86: \"Help me.\" He says, \"All Your commandments are faithful; they persecute me wrongfully — help me.\"\n\nIn his despair, in his struggle, in not doing well — he runs to God, not away from Him. Even though he is impatient with God, he runs to God, begging Him to be his help. This is the God who is \"a very present help in time of need\" (Psalm 46). This is our Ebenezer, our stone of help — and the psalmist goes to Him.\n\n### The Affliction Is Because of Obedience\n\nIt is clear that whatever affliction the psalmist is going through is happening because of his obedience. In verse 83 he says he is like a wineskin in smoke, but he has not forgotten God's statutes. In verse 86 he says these people are persecuting him because his faithfulness to God's commands is faithful. In the second half of verse 87, even though the enemy has almost killed him, he has not forsaken God's precepts.\n\nSo his affliction is the result of his obedience to the Word of God. Is that not against the prosperity gospel philosophy? Joel Osteen says if you believe in God you will live your best life now. But Psalm 119 says: I am in affliction, I am in the pit of despair, because I obey Your word. And I know why that is the case — because we live in a world that is against God. We fail to recognize that. We tend to think the world is our friend, or at least neutral. But we live in a world that is actively against God. Therefore, attempting to live faithfully to the Lord will result in affliction at the hands of the world.\n\nBut we can cry out, \"Help me, Lord\" — and He will always answer the cry for help from the mouth of His people, because He is faithful.\n\n## God's Covenant Faithfulness: The True Comfort\n\nGod's covenant faithfulness is the comfort of the psalmist, as he says in verse 88:\n\n> *\"Revive me according to Your lovingkindness, so that I may keep the testimony of Your mouth.\"* (Psalm 119:88)\n\nThat is our favorite word again — *hesed*, covenant faithfulness, steadfast love, lovingkindness. God's eternal covenant faithfulness assures the psalmist — and assures us — that God will get him through these afflictions. God is going to get him through his trials.\n\nIf you have met with me for any counseling, you have heard 1 Corinthians 10:13:\n\n> *\"No temptation has overtaken you except such as is common to man; but God is faithful, who will not allow you to be tempted beyond what you are able, but with the temptation will also make the way of escape, that you may be able to bear it.\"*\n\nWe do not deal with things we cannot bear. It is the garden-variety human struggle. But God is faithful — He will not allow you to be tested beyond what you can bear. So if you feel like you are about to give up, do not. God says He will not give you more than you can bear, and He will give you a way of escape so you can bear it — not escape from it, but bear it in it.\n\nWhat the psalmist wants is not a change in circumstances, not a stopping of the affliction, but a revival in his faith and commitment to God. He says, \"Your covenant faithfulness to me is what is going to revive me — regardless of whatever else is happening.\" That is what causes him to keep on going.\n\n## The Comfort of the Christian\n\nSo what is the comfort that the Christian receives from God? The greatest comfort is this: you belong to Jesus. The Heidelberg Catechism says that I, with body and soul, both in life and in death, am not my own, but belong to my faithful Savior Jesus Christ. Whatever affliction you are going through right now, you belong to Jesus. Whatever turmoil is going on, you belong to Jesus. That is your comfort in life and in death.\n\nBut there is more comfort. God forgives my sins and has defeated the devil. Are you comforted by that? The Catechism goes on to say that Jesus with His precious blood has fully satisfied for all my sins and has redeemed me from all the power of the devil.\n\nAnd there is even more comfort: having redeemed us, Christ now preserves us. The Catechism says He preserves me so that without the will of my Father in heaven, not a hair can fall from my head — and that all things must work together for my salvation. Whatever is going on in your life is designed by God so that you can arrive at the end, fall into Jesus' arms, and hear: \"Well done, good and faithful servant\" — not because of your own goodness or faith, but because Christ who ran the race before you is faithful on your behalf.\n\nAnd our comfort comes also in knowing that because He preserves us, we will arrive at the end. The Catechism also says, \"By His Holy Spirit He also assures me of eternal life and makes me heartily willing and ready, henceforth, to live unto Him.\"\n\nThis is the comfort the psalmist was looking for. He could only see it in outlines and shadows, because the full revelation of Christ was not yet there. But you and I, brothers and sisters, can see it fully — because we have the complete revelation. We belong to Jesus. That is our only comfort in life and in death. He has redeemed us. He preserves us. Therefore we can persevere to the end, and we are assured that we will see Him face to face — for we will be like Him at the resurrection of the last day.\n\nThat is our comfort. No matter what else is going on in life, that comfort is true. The faithfulness of God's covenant promises to us — to be our God and for us to be His people — now and forevermore.\" in verse 81 that he's praying for salvation. My soul faints for salvation. But salvation here is not salvation, in the sense that you get saving go to heaven. That's not the idea of being justified. Righteous before God and to have fellowship with God forever. Salvation here is in the sense of deliverance from a fliction. We can say that the Psalmist is praying that the Lord would rescue him. And he's struggling with this affliction, the point of fainting with l
