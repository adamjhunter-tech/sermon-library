roaning all day long'", "'Day and night your hand was heavy upon me; my strength was dried up as by the heat of summer' — guilt suppressed is not guilt removed", "God's discipline through an uneasy conscience is itself a mercy — it drives us back to repentance"], "scripture": ["Psalm 32:3-4"]}, {"title": "2. David Was Clear Before God: Sin Is Primarily Against God", "subpoints": ["'Against you, you only, have I sinned and done what is evil in your sight' (v.4) — David had sinned against Bathsheba, Uriah, his family, and his nation", "The statement is not a denial of horizontal sin but a declaration of its ultimate vertical character — all sin is first and most deeply an offense against God", "This is why repentance must involve God, not merely restitution to those we have wronged", "David acknowledges total sinfulness: 'in sin did my mother conceive me' (v.5) — original sin as the root of particular sins"], "scripture": ["Psalm 51:4-5"]}, {"title": "3. David Came Clean: The Thoroughness of True Repentance", "subpoints": ["'Purge me with hyssop, and I shall be clean; wash me, and I shall be whiter than snow' (v.7) — hyssop was used in the cleansing of lepers (Lev. 14) and in the Passover; David asks for the deepest ceremonial cleansing", "True repentance is specific and thorough, not vague and general — David does not ask to feel better but to be actually clean", "'Create in me a clean heart, O God, and renew a right spirit within me' (v.10) — recognizing that only God can produce true inner change", "David does not minimize or rationalize — he calls his sin what it is and brings all of it before God"], "scripture": ["Psalm 51:7-10", "Leviticus 14"]}, {"title": "4. David Wanted to Be Restored: Assurance as a Reward of Obedience", "subpoints": ["'Restore to me the joy of your salvation' (v.12) — David does not doubt his salvation but has lost the joy of it; assurance can be diminished by unrepented sin", "Assurance of salvation is not automatic; it deepens as we walk in obedience and repentance", "'A broken and contrite heart, O God, you will not despise' (v.17) — humility and brokenness are the posture God receives; he does not turn away the truly penitent", "Urging preachers to preach repentance: without genuine repentance there is no genuine conversion; a gospel that skips repentance is incomplete"], "scripture": ["Psalm 51:12", "Psalm 51:16-17"]}], "summary": "Guest preacher Pastor H. Dennis Leaman (former pastor of the congregation) preaches on Psalm 51 — David's prayer of repentance after Nathan confronted him about his sin with Bathsheba and the murder of Uriah. The sermon distinguishes attrition (sorrow at being caught) from contrition (genuine godly sorrow), and draws four observations from David's prayer: David's year of silence produced physical and spiritual deterioration (Psalm 32); sin is ultimately against God, which is why repentance must be vertical; true repentance is specific and thorough, asking not to feel better but to be genuinely cleansed; and the restoration of assurance follows genuine repentance — a broken and contrite heart God will not despise. A call to preach repentance as essential to genuine conversion closes the sermon.", "transcript": "## Introduction: A Prayer of Repentance\n\nIt's a great honor to be with you this morning. I've been asked to bring a message from Psalm 51, which is one of the great prayers of repentance in all of Scripture.\n\nThe occasion for this Psalm is given in the superscription: *A Psalm of David, when Nathan the prophet went to him, after he had gone in to Bathsheba.* This is not ancient speculation — David himself identified the occasion. He had committed adultery with Bathsheba, arranged the death of her husband Uriah, taken her as his wife, and — as far as the public record was concerned — moved on. A full year passed. Then the prophet Nathan arrived with a story about a rich man who stole a poor man's only lamb. David's anger was immediate: *The man who did this deserves to die!* And Nathan said: *You are the man.*\n\nPsalm 51 is what came out of David after that confrontation.\n\nBefore we go further, I want to establish a distinction that is essential to understanding genuine repentance: the difference between attrition and contrition.\n\nAttrition is sorrow at being caught. It sounds like repentance. It involves tears, self-reproach, a changed exterior. But its focus is on the consequences — the exposure, the shame, the loss. It says: *I'm sorry this happened.* It is not sorry for the sin; it is sorry for the outcome.\n\nContrition is genuine godly sorrow. Paul distinguishes it in 2 Corinthians 7:10: *Godly grief produces a repentance that leads to salvation without regret, whereas worldly grief produces death.* Contrition focuses not on what was lost but on the relationship that was broken — primarily the relationship with God. It says not *I'm sorry I was caught* but *I am sorry I sinned.*\n\nDavid's Psalm 51 is the model of contrition.\n\n## 1. Why Did David Wait So Long?\n\nA year. Think about what that year looked like. David went on ruling. He went on worshipping. He went on being the king. And all the while, he knew.\n\nPsalm 32 gives us a window into that year: *When I kept silent, my bones wasted away through my groaning all day long. For day and night your hand was heavy upon me; my strength was dried up as by the heat of summer.*\n\nGuilt suppressed is not guilt removed. You can refuse to name your sin, refuse to confess it, refuse to bring it before God — but it does not go away. It works underground. It drains the life out of you.\n\nGod's hand was heavy on David during that year — not in punishment but in discipline. The discomfort David felt was itself a mercy: it was God refusing to let him be comfortable in his sin. God was pressing him toward repentance.\n\nWhy do we wait so long? The same reason David did — because confession is costly. It requires giving up the cover, the narrative, the version of events we have constructed. David's cover required a dead Uriah and a quick marriage and a whole year of pretending. But the cover was costing him more than the confession would have.\n\n## 2. David Was Clear Before God\n\nVerse 4 is the verse that trips people up: *Against you, you only, have I sinned and done what is evil in your sight.*\n\nHad David sinned against Bathsheba? Yes. Against Uriah, whom he had killed? Certainly. Against his family? His nation? Of course. So how can he say *against you only*?\n\nDavid is not denying the horizontal dimension of his sin. He is making a declaration about its ultimate character. All sin is first and most deeply an offense against God. Bathsheba and Uriah were made in the image of God — sinning against them was sinning against God's image. Every sin, however horizontal in its immediate expression, has a vertical center.\n\nThis is why mere restitution is not repentance. You can repay money, make amends, restore relationships — and still not have repented, if your repentance did not involve God. David knows that the most urgent broken relationship is not with Bathsheba or Uriah's family but with the God against whom he has sinned.\n\nHe goes further in verse 5: *Behold, I was brought forth in iniquity, and in sin did my mother conceive me.* This is not an excuse — it is a diagnosis. David is not saying his mother sinned in conceiving him. He is saying that sin is not the sum of particular acts but a root condition. His adultery and murder were not anomalies in an otherwise righteous life; they were expressions of a nature that was broken from birth. The particular sin points to the deeper disease.\n\n## 3. David Came Clean\n\nVerse 7: *Purge me with hyssop, and I shall be clean; wash me, and I shall be whiter than snow.*\n\nHyssop was the ceremonial plant used in the purification of lepers (Leviticus 14) and in the original Passover. When David asks to be purged with hyssop, he is asking for the deepest ceremonial cleansing the Old Testament could imagine — not a surface rinse but a total purification.\n\nThis is what true repentance looks like. It does not ask to feel better. It does not ask for the discomfort to go away. It asks to actually be clean.\n\nVerse 10: *Create in me a clean heart, O God, and renew a right spirit within me.* The verb *create* here is the Hebrew *bara* — the same word used in Genesis 1 for creation from nothing. David is not asking God to improve his existing heart. He is asking for a new one. He knows that the problem is not behavioral but cardiac. Only God can do what needs to be done.\n\nTrue repentance is specific and thorough. David does not pray: *Forgive me for the general category of sins I may have committed in some vague and non-specific way over the past year.* He prays about real sin. He calls it what it is. He brings all of it before God.\n\nI have been in pastoral ministry for many years, and I have sat with people who were confessing sin. I can often tell within minutes whether I am hearing attrition or contrition. Attrition circles around the thing. Contrition names it.\n\n## 4. David Wanted to Be Restored\n\nVerse 12: *Restore to me the joy of your salvation.*\n\nNotice: he does not say *restore my salvation.* David does not doubt that he is God's. What he has lost is not salvation but the joy of it. And he knows why — because unrepented sin dims assurance.\n\nAssurance is not automatic. It is not a permanent possession that cannot be touched by our behavior. It deepens as we walk in obedience and repentance, and it can be clouded by sustained, unrepented sin. David spent a year without joy. He knew it was connected to the unconfessed sin.\n\nWhen confession comes, joy comes back. Not because God's love fluctuated — God's love was constant even during David's year of silence. But our experience of that love, our assurance of it, our access to the joy of it — that is affected by the state of our conscience.\n\nVerse 17: *The sacrifices of God are a broken spirit; a broken and contrite heart, O God, you will not despise.*\n\nGod does not despise the truly penitent. He does not turn away the one who comes broken. The one thing he will not receive is the performance of righteousness without the reality of humility.\n\nI want to close with a word to preachers and those who will one day preach. Preach repentance. We have too long preached a gospel of easy believing that skips the call to repentance. A gospel that does not include the call to repent is incomplete — it is not the gospel Jesus preached (*Repent, for the kingdom of heaven is at hand*), not the gospel the apostles preached (*Repent and be baptized every one of you*). A profession of faith that does not involve genuine repentance is a profession that should be examined.\n\nThe cross produces broken and contrite hearts. Preach it until it does.\n\nLet's pray. Father, thank you for Psalm 51. Thank you for the honesty of your servant David. Thank you that you do not despise a broken and contrite heart. We confess that we are often quick to rush past our sin rather than to stop and bring it before you. Grant us, by your Spirit, the gift of genuine contrition — sorrow not merely for the consequences of our sin but for the sin itself, against you. Restore to us the joy of your salvation. In Jesus' name, amen.", "soundcloud_url": "https://soundcloud.com/olympiabp/02-25-24-am-what-repentance-looks-like-psalm-51-pastor-h-dennis-leamanwav"};
