<script>
// Lesson data embedded at build time
window.LESSON_DATA = {"id": "2024-06-23-dont-worry-about-your-life", "title": "Don't Worry About Your Life", "speaker": "Pastor Carl Miller", "date": "2024-06-23", "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["6-23-24 -PM- Don't Worry About Your Life - Matthew 6_25-34 - Guest Speaker Pastor Carl Miller.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/6-23-24-pm-dont-worry-about-your-life-matthew-6_25-34-guest-speaker-pastor-carl-miller", "tags": [{"tag": "anxiety", "source": "detected"}, {"tag": "providence", "source": "detected"}, {"tag": "kingdom of God", "source": "detected"}, {"tag": "faith", "source": "detected"}, {"tag": "lordship of Christ", "source": "detected"}, {"tag": "Sermon on the Mount", "source": "detected"}], "scripture_references": [{"reference": "Matthew 6:25-34", "type": "quoted", "source": "detected"}, {"reference": "Psalm 42:11", "type": "quoted", "source": "detected"}, {"reference": "Philippians 4:6-7", "type": "quoted", "source": "detected"}, {"reference": "1 Peter 5:6-7", "type": "quoted", "source": "detected"}, {"reference": "1 Timothy 5:8", "type": "quoted", "source": "detected"}, {"reference": "Psalm 127:2", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Sermon on the Mount Context", "subpoints": ["Christ exposes worldly-mindedness and the hypocrisy of the Pharisees throughout Matthew 6", "Whole-hearted allegiance to Christ is the overarching call", "You cannot serve two masters — now applied to anxiety about provision"], "scripture": ["Matthew 6:24"]}, {"title": "Don't Worry About This Life (vv. 25-27)", "subpoints": ["'Therefore' connects to Christ's lordship over all things", "Jesus is not forbidding concern or responsibility for work and provision", "He is condemning excessive cares and destructive fear rooted in distrust", "Psalm 42:11 — David's remedy: hope in God for a disquieted heart", "Philippians 4:6-7 — Paul's remedy: prayer with thanksgiving", "1 Peter 5:6-7 — Peter's remedy: humble yourself and cast your cares on Him", "Worry cannot add a single hour to your lifespan (v. 27)"], "scripture": ["Matthew 6:25-27", "Psalm 42:11", "Philippians 4:6-7", "1 Peter 5:6-7"]}, {"title": "Much Worry, Little Faith (vv. 28-30)", "subpoints": ["Consider the lilies — they neither toil nor spin, yet clothed more beautifully than Solomon", "God provides for the grass of the field; how much more will he clothe you?", "When we worry much, we distrust his provision — 'O you of little faith'", "Little faith is not rejected — God builds our faith and our trust"], "scripture": ["Matthew 6:28-30"]}, {"title": "Seek First the Kingdom (vv. 31-34)", "subpoints": ["Such worry has its roots in the heart focused on earthly treasure — like the Gentiles", "Christians have a different relationship with God, sin, and this world", "Therefore: seek first the kingdom of God and his righteousness, and all these things will be added", "Do not worry about tomorrow — take each day with God's grace as it comes", "Trust God to provide when tomorrow comes; deal with trouble then with his help"], "scripture": ["Matthew 6:31-34"]}], "summary": "Preaching the evening service from Matthew 6:25-34 as part of the Sermon on the Mount, guest speaker Pastor Carl Miller addresses the pervasive struggle with anxiety and worry. He situates the passage within its broader context in Matthew 6: Jesus has been stripping away worldly-mindedness piece by piece, and having declared that no one can serve both God and money, he now applies that same singular allegiance to the matter of anxiety over provision. Miller draws on King David in Psalm 42, the Apostle Paul in Philippians 4, and the Apostle Peter in 1 Peter 5 to show that the scriptural remedy for a disquieted heart is always God-centered: hope in God, prayer with thanksgiving, and casting all care upon him. He makes the careful distinction that Jesus is not forbidding work or responsibility but condemning the excessive, faith-depleting fear that treats tomorrow as if God will not be there. The sermon closes with a pointed call to seek first the kingdom of God and his righteousness, to trust in the sovereign provision of a God who knows our needs better than we do, and to go to battle with worry through daily, Christ-centered dependence.", "transcript": "## Scripture Reading and Prayer\n\nIn New Braunfels, Texas at Heritage, we also have an evening service about four o'clock. And what I always know to be true is that I have to fight the lunch coma — so I know it's a universal thing, so it's okay. I will try to keep your eyes open as best as possible.\n\nLet us consider the wonderful and holy word of God this afternoon from the gospel of Matthew, chapter six. The gospel of Matthew, chapter six. Our focus text is going to be verses 25 through 34. This is Christ's Sermon on the Mount. Let us hear now the very word of God.\n\nTherefore I say to you, do not worry about your life, what you shall eat or what you will drink, nor about your body, what you will put on. Is not life more than food and the body more than clothing? Look at the birds of the air, for they neither sow nor reap nor gather into barns, yet your heavenly Father feeds them. Are you not of more value than they? Which of you by worrying can add one cubit to his stature? So why do you worry about clothing? Consider the lilies of the field, how they grow. They neither toil nor spin, and yet I say to you that even Solomon in all his glory was not arrayed like one of these. Now if God so clothes the grass of the field, which today is and tomorrow is thrown into the oven, will he not much more clothe you, O you of little faith? Therefore do not worry, saying, what shall we eat or what shall we drink or what shall we wear? For after all these things the Gentiles seek. For your heavenly Father knows that you need all these things. But seek first the kingdom of God and his righteousness, and all these things shall be added to you. Therefore do not worry about tomorrow, for tomorrow will worry about its own things. Sufficient for the day is its own trouble. Amen.\n\nThus far the reading of God's holy word. May he add his blessing to the reading of it to us. Let's go before him in prayer asking for his blessing on the preaching of it. Our gracious God and Heavenly Father, we yet again come to your word and we are thankful for giving it to us — the very revelation from you, complete truth and all that we need. O Lord, we pray that you would bless it to us by your Spirit. Open our hearts and our minds this day, that we would take great joy and comfort and encouragement in the Scriptures, that we would take great hope from that which you declare and reveal. We pray these things in Christ's name. Amen.\n\n## Introduction: The Context of Christ's Lordship\n\nWell, beloved in Christ Jesus, Jesus opens our eyes and our understanding in the Sermon on the Mount — to both know and live as those who are His lambs, not those who are around us or may have previously taught us or influenced us to play the hypocrite with worldly minds. Jesus in line us to see more and more as He pulls back the veil and exposes the heart and the hypocrisy of the Pharisees and the scribes in seeking selfish gain and glory in the matters of giving and prayer and fasting. He's touched on these things and expounded them wonderfully previously earlier in chapter 6. He has really pulled back the veil and exposed worldly-mindedness, piece after piece in this chapter.\n\nAnd as Christ calls His sheep out of and away from the world, we must not remain latched onto and desiring worldly things. Thus far, His big message about this is that Jesus calls us to give him our whole-hearted commitment, our singular focus and allegiance. He calls us as Kingdom citizens to follow the commands of the King. Our commitment is evident in what we treasure and where our treasure is stored up. If Christ has our hearts, that will be seen in where our treasure is. If the world does, that will also be made clear.\n\nAnd thus we will know by the grace of God what we need to do in what He shows us. And in addition, our focus is evident in what lamp we have, what eyes we are looking through. Do you have healthy eyes that are filling your body with Christ's light? Or do you have evil eyes that are filling you with the world's darkness — its greed and selfishness in your mind and walk? Never forget Christ's warning about such darkness: if the light that is in you is darkness, how great is that darkness.\n\nAnd though the battle within is strong, beloved, to whom is your allegiance? Who are you standing with? And who are you fighting for? Whole-hearted devotion is in view here. Christ is hitting point after point in these chapters in the Sermon on the Mount. Patterns of the heart — this is where the full exposition of the law goes to. Jesus says you can't serve two masters, you can't serve God and money, you can't serve Christ and the world. Your heart must be devoted to Christ as your Lord and Master — committed with single focus to serve Him and Him alone. That's the call for the Christian.\n\nAnd it's with this in mind that Jesus then goes on to preach about our anxieties in this life. We'll listen to his call not to worry about this life in verses 25 through 27, then much worry and little faith in verses 28 through 30, and our need to seek first the kingdom of God in verses 31 through 34.\n\n## Don't Worry About This Life (vv. 25-27)\n\nHe begins in verse 25 by saying: Therefore I say to you, do not worry about your life, what you will eat or what you will drink, nor about your body, what you will put on.\n\nBeloved, as many of you know this passage well, I would assume — how have you thought about and understood its truth and application? Has it been within the context of Christ and His Lordship? Has it been within the context of the call for a heavenly and Christ-centered focus? Jesus in his word saying 'therefore I say to you' makes an important and helpful connection here. For it's here that the Lawgiver, the sovereign of our hearts, our comforter and the lifter of our heads, who gives us joy — He comes to us and He says, don't worry about your life.\n\nAnd what does Jesus mean by this? As we seek to understand these words, we need to do so considering what Jesus is teaching and what He isn't teaching. Jesus is teaching us that we need to be free of the cares and the worry about our lives that show themselves in having disquieted and destructive distrust in our hearts. For such hearts are a sign that we are treasuring the things of the earth.\n\nNow my friends, anxiety is a struggle for many of us as it was for Christ's mountainside disciples as well. We're often tempted to worry, and that is heightened especially in things that we can't control. We worry about people, what they think, we worry about relationships and circumstances and provisions — fill in the blank, yet in many ways. Anxiety is a time-waster and sometimes distorts reality. As our minds spin, as our worries and our fears grow, our perception of reality can turn into something that it isn't.\n\nAnd so praise the Lord that Jesus doesn't leave us in the spin. He doesn't leave us there. He gives us help and remedies to not worry or to be afraid. He calls our hearts to return wholly to Him.\n\nKing David had experience with a disquieted, anxious heart, but he also knew the remedy of hope. In Psalm 42:11 he asks an important question of himself as he examines himself: Why are you cast down, O my soul? And why are you disquieted within me? Hope in God, for I shall yet praise Him, the help of my countenance and my God. This is one of my favorite verses in the Bible regarding anxiety and depression. David knew it well as he considered the disquieted heart within himself, but he also knew and challenged himself with the wonder and truth that he was a son of the living God. And he had great hope in Him as the rock of David's salvation.\n\nThe Apostle Paul taught the saints in Philippi about anxiety and the remedy of prayer, along with the blessing of divine peace, in Philippians 4:6-7: be anxious for nothing, but in everything by prayer and supplication, with thanksgiving, let your requests be made known to God. And the peace of God, which surpasses all understanding, will guard your hearts and minds through Christ Jesus.\n\nThe Apostle Peter also speaks of humility and the casting of our worries upon Christ in 1 Peter 5:6-7: therefore humble yourselves under the mighty hand of God, that He may exalt you in due time, casting all your care upon Him, for He cares for you.\n\nAll of this — God-centered, Christ-centered, knowing His sovereignty and His love for us and His care for us, His provision for us — is in view.\n\nNow, Jesus begins His instruction here in Matthew 6. He provides His disciples specific examples regarding worrying over what they would eat or drink or what they would wear. He also asks an important question in verse 25: Is not life more than food and the body more than clothing? Well indeed it is, and Christ is Lord over it all. And so again, don't worry about your life.\n\nJesus goes on to give an illustration in verse 26: Look at the birds of the air, for they neither sow nor reap nor gather into barns, and yet your heavenly Father feeds them. Are you not of more value than they?\n\nNow beloved, Jesus isn't teaching us that in His command not to worry about this life we are relieved of concern and responsibility to work and provide for ourselves and our families. No — quite the opposite is true in the whole counsel of God. Paul told Timothy in 1 Timothy 5:8 that if anyone does not provide for his own, and especially for those of his household, he has denied the faith and is worse than an unbeliever. What Jesus is condemning is excessive cares and worry — wearing ourselves out being fearful of many things, those times when we rely too much on our own thoughts and efforts rather than calling upon the Lord. Solomon speaks to this in Psalm 127:2: it is vain for you to rise up early, to sit up late, to eat the bread of sorrows, for so He gives His beloved sleep.\n\nBy His grace, my friends, God gives His people peace and sleep. And we must rest in the providence of God, knowing that we are of great value to Him. We must consider the birds of the air and trust God for our daily bread. On the one hand we shouldn't be idle and inactive, and on the other we shouldn't engage in needless fear and torment. The right path is found in the middle.\n\nJesus asks another important question in verse 27: which of you by worrying can add one cubit to his stature? Now interestingly, the Greek word for stature here refers to the whole lifespan, and the word for cubit refers to a span of time. So what's in view is: how can worrying lengthen even a moment or even an hour of your life? It can't. In the moment, we think that there is benefit from worrying, but it is vanity to give in to such a distraction. Our existence depends upon the Lord, so does the span of our life, so does everything that we have. He has ordained and numbered our days, and there is no benefit in worrying.\n\n## Much Worry, Little Faith (vv. 28-30)\n\nSo look at what he says in verses 28 through 30 as he talks about much worry but little faith. He asks again an important question: So why do you worry about clothing? Consider the lilies of the field. How they grow, they neither toil nor spin.\n\nHere Jesus asks this question and gives another helpful illustration to show the great care God provides to even the smallest of his creation — the lilies of the field that draw their nourishment from the ground and the sun and the air — in order to emphasize the greater care that he does and will provide to his people whom he deeply loves in Christ.\n\nIn verse 29 he goes on: and yet I say to you that even Solomon in all his glory was not arrayed like one of these. God's provision for the lilies is remarkable as he clothed and arrayed them in more beauty than Solomon can claim in all of his royal robes and regalia. This is a great point that he makes — seeing this should cause you to pause and ponder God's promises and provisions.\n\nWhich he then speaks to in verse 30: Now if God so clothes the grass of the field, which today is and tomorrow is thrown into the oven, will he not much more clothe you, O you of little faith? Indeed the grass withers and the flowers fade. They rise in beauty and in a short time wither and die. The clear answer is that of course God will clothe us. So consider this before you start worrying. For indeed when we have much worry we distrust his provision, and Jesus says how little is our faith. And yet though great faith is commended, remember that little faith will not be rejected. As God builds our faith, he builds our trust and he relieves our worries. Praise the Lord.\n\n## Seek First the Kingdom (vv. 31-34)\n\nAnd because this is true, Jesus says in verse 31: therefore do not worry, saying, what shall we eat and what shall we drink or what shall we wear? For after all these things the Gentiles seek.\n\nBeloved, such worry has its roots in the heart that is focused on the treasures on earth — the things that the worldly-minded, unbelieving Gentiles consume their minds and time with. This is the contrast that he's setting apart. He is pulling his mountainside disciples away from the Pharisees and their corruptions and toward Christ himself and his perfect and complete and deep truth. He's saying: don't consume yourselves with thinking or practicing like those Gentiles and unbelievers who don't know me.\n\nAs Christians now have a different relationship with God and a different relationship with sin and a different relationship with this world, we must therefore have a different encounter with worry. We must not act and live like the world. Our hearts' focus and desire is now towards our Master and his kingdom. And this is what he now says: don't worry, but seek first the kingdom of God and his righteousness, and all these things will be added to you.\n\nThis is where our eyes and our hearts need to be focused, and our feet need to be walking in step, beloved. Christians everywhere must make Christ's sovereign rule and a right relationship with Him our highest priority. Worry about God's sovereignty — it disquiets our goodness and distracts us from the peaceful reality that God will meet the needs of all those who trust and risk everything in taking up their cross and following Him.\n\nHe goes on in verse 34 to say, as he closes this pericope: do not worry about tomorrow, for tomorrow will worry about its own things. Sufficient for the day is its own trouble.\n\nSo why don't we need to worry about tomorrow? Because God will provide for us when tomorrow comes. He will give us our daily bread, and we know that tomorrow will bring some events and concerns and cares of its own. However, as you don't know what will come tomorrow, trust God and take the day as it comes. Don't torment your mind today when you don't know what tomorrow will truly bring. Tackle any trouble then with God's grace and help. He is with you, little flock. And He says, don't worry. Trust me. I am with you.\n\n## Closing\n\nAnd so in closing, I encourage you to hear the words that Jesus says to you today. May they have weight and impact your heart. Worry wastes time. It robs you of peace. It disquiets your soul. It distracts your minds and it causes you to distress your sovereign Lord. And so if you struggle with worry, may this be a new day for you. A new day as you confess Christ as King. And as you confess Him to be your Lord and Master, as you see more today of His command and His care and His valuing you and His loving provision for you, may you therefore have a right heart and in life and zeal and commitment to call upon Him in the battle — in the frequent, if not daily, war with worry. Amen.\n\nPraise God for His word. Let's pray together. Our gracious God and Heavenly Father, to you be the glory, for our flesh is weak. But in you, Lord Jesus, we have our strength, our peace, our comfort in this world and in the next, as we trust your great promises and we are heirs to such a great inheritance being united to you. O Lord, may we be valiant in the battle and the fight against worry, knowing that you are at work in us and that you have accomplished the victory, Lord Jesus. Over such things, we praise you, we trust you, we rest in you. In Christ's name we pray. Amen."};
