window.LESSON_DATA = {"id": "2025-04-20-jesus-lives", "title": "Jesus Lives", "speaker": "Pastor Tito Lyro", "date": "2025-04-20", "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["04-20-2025 - Jesus Lives - Luke 24_13-35 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/04-20-2025-jesus-lives-luke", "tags": [{"tag": "resurrection", "source": "detected"}, {"tag": "Easter", "source": "detected"}, {"tag": "hope", "source": "detected"}, {"tag": "suffering", "source": "detected"}, {"tag": "Word of God", "source": "detected"}, {"tag": "faith", "source": "detected"}, {"tag": "Messiah", "source": "detected"}], "scripture_references": [{"reference": "Luke 24:13-35", "type": "quoted", "source": "detected"}, {"reference": "Isaiah 43:1-4", "type": "quoted", "source": "detected"}, {"reference": "Romans 8:35-39", "type": "quoted", "source": "detected"}, {"reference": "Psalm 27:10", "type": "referenced", "source": "detected"}, {"reference": "1 Peter 1:6-7", "type": "quoted", "source": "detected"}, {"reference": "Genesis 3:15", "type": "referenced", "source": "detected"}, {"reference": "Exodus 12:13", "type": "referenced", "source": "detected"}, {"reference": "Psalm 110:1", "type": "referenced", "source": "detected"}, {"reference": "Psalm 118", "type": "referenced", "source": "detected"}, {"reference": "Isaiah 53", "type": "referenced", "source": "detected"}, {"reference": "1 Peter 1:3", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Easter Tragedy — The Messiah Died", "subpoints": ["Two disciples walking to Emmaus on the first Easter afternoon, discouraged and confused", "Their hopes had died with Christ: 'We were hoping that it was he who was going to redeem Israel' (v. 21)", "All Christians have at some point felt that Christ had let them down", "The irony: these men spoke of abandonment while Christ walked right beside them"], "scripture": ["Luke 24:13-24"]}, {"title": "What to Do When Suffering Makes You Feel Abandoned", "subpoints": ["Settle it now, before suffering comes: Christ will never abandon his children (Isaiah 43:1-4)", "Romans 8:35-39: nothing — not tribulation, distress, famine, nakedness, peril, or sword — can separate us from the love of God in Christ", "Psalm 27:10: when father and mother forsake, the Lord will take care of you", "Every card we are dealt in life comes from the hand of an all-wise and all-loving God (1 Peter 1:6-7)"], "scripture": ["Isaiah 43:1-4", "Romans 8:35-39", "Psalm 27:10", "1 Peter 1:6-7"]}, {"title": "The Easter Triumph — The Messiah Lives", "subpoints": ["Christ rebukes foolishness and slowness of heart (v. 25): belief that Jesus is merely a good man or prophet is foolishness", "The suffering and death of the Messiah was not a derailing of hope but proof he is the Messiah (v. 26)", "Christ taught the most glorious Sunday school lesson in history, from all of Scripture: a golden thread of gospel grace runs through the whole Old Testament (v. 27)", "At the breaking of bread, their eyes were opened and they recognized the risen Savior (vv. 28-32)", "Every time a faithful preacher opens the Scripture, Jesus is speaking to his people — hearts should burn", "Their great joy drove them seven miles back to Jerusalem to announce: Christ is risen"], "scripture": ["Luke 24:25-35", "Genesis 3:15", "Exodus 12:13", "Psalm 110:1", "Isaiah 53"]}], "summary": "An Easter Sunday morning sermon on Luke 24:13-35, the road to Emmaus. Two points are developed: the Easter tragedy and the Easter triumph. The tragedy is that the Messiah died — and the disciples experienced the death of hope. Their confusion and despair on the afternoon of the first Easter illustrate how all Christians at some point feel that Christ has let them down. But Christ was walking right beside them, having not abandoned them at all. Practical counsel is given for times of suffering: settle now that Christ never abandons his children (Isaiah 43:1-4; Romans 8:35-39); every trial comes from the hand of an all-wise and all-loving God (1 Peter 1:6-7). The triumph is that the Messiah lives — Christ rebukes foolishness and unbelief (v. 25) and shows from the entire Old Testament that the Messiah's suffering was not a derailing of hope but proof of messiahship. The golden thread of gospel grace runs through the whole Old Testament. At the breaking of bread, the disciples' eyes are opened and they return to Jerusalem at a run to announce the resurrection. The sermon closes with the application that whenever Scripture is faithfully preached, Jesus is speaking and hearts should burn within us.", "transcript": "## The Easter Tragedy: The Messiah Died\n\nThis is the account we read this morning — the bulk of Luke's account of the post-resurrection appearances. On the afternoon of that first Easter, two disciples of the wider variety (not the Eleven) are walking from Jerusalem to Emmaus, about seven miles away — perhaps a two-and-a-half or three-hour walk for people as sad as these. One is named Cleopas; the other we do not know.\n\nAs they walk they rehearse every detail of the week that had just passed. And in the intensity of their conversation, a stranger comes and starts walking with them. That stranger was Jesus himself — but they were kept from recognizing him, by the Holy Spirit (vv. 15-16). Their eyes were closed. This is a wonderful illustration of the work of God in the life of a believer: if you have seen Jesus — that is, if you have trusted him alone for the salvation of your soul — it was God who opened your eyes.\n\nJesus asks them why they are sad. Cleopas answers in verse 18: 'Are you the only stranger in Jerusalem and have you not known the things which happened these days?' He gives Jesus the opportunity to respond in verse 19: 'What things?' And they pour out the story — Jesus of Nazareth, a prophet mighty in word and deed, delivered by the chief priests to be crucified. And then come the most revealing words in verse 21: 'But we were hoping that it was he who was going to redeem Israel. Indeed, besides all this, today is the third day since these things happened.' We were hoping. But he let us down. It is the third day and nothing has happened.\n\nAll Christians have at some point in their lives felt that Christ had abandoned them. Perhaps because of a lack of a spouse, or a rebelling child, or the death of a loved one, or illness, or depression. These things and more may lead us down the path of thinking Jesus has abandoned us. But the ironic thing is that these men were in that state while Christ was standing right next to them. Had he abandoned them? No — he was right there.\n\n**What to do when suffering makes you feel abandoned.** First, we must settle in our minds and hearts that Christ will never abandon his children. Not when suffering comes — now. Isaiah 43:1-4: 'Fear not, for I have redeemed you... When you pass through the waters, I will be there with you... for you are precious in my sight.' Romans 8:35-39: 'Who shall separate us from the love of Christ? Shall tribulation or distress or persecution or famine or nakedness or peril or sword? Yet in all these things we are more than conquerors through him who loved us... nothing shall be able to separate us from the love of God which is in Christ Jesus our Lord.' Psalm 27:10: 'When my father and my mother forsake me, then the Lord will take care of me.'\n\nSecond, remember that every card we are dealt in life comes from the hand of an all-wise and all-loving God. 1 Peter 1:6-7: 'In this you greatly rejoice, though now for a little while, if need be, you are grieved by various trials, that the genuineness of your faith, being much more precious than gold that perishes, though it is tested by fire, may be found to praise, honor, and glory at the revelation of Jesus Christ.'\n\nThese promises are yours in Jesus Christ — but not apart from him.\n\n## The Easter Triumph: The Messiah Lives\n\nIn verse 25, Christ does not coddle these disciples in their unbelief. He says: 'Oh foolish ones, and slow of heart to believe in all that the prophets have spoken.' If you believe Jesus is merely a great moral teacher or prophet, Jesus calls that foolishness. That belief will do nothing for you besides give you a false sense of assurance.\n\nVerse 26: 'Ought not the Christ to have suffered these things and to enter into his glory?' The suffering and death of Christ was not a derailing of hope — it was the very proof that he is the Messiah. The problem with the Jewish religion in Jesus's day was that they only saw the glory and the victory of the Messiah in the Old Testament, and turned a blind eye to all the passages about the suffering of the Messiah.\n\nThen Jesus teaches the most glorious Sunday school lesson ever taught — starting in verse 27, from Moses and all the prophets, expounding the things concerning himself in all the scriptures. Matthew Henry said that a golden thread of gospel grace runs through the whole web of the Old Testament. Jesus proves that right here. We would love to have been there — and in a sense, brothers and sisters, we have that lesson. We have the expanded version, the director's cut: the New Testament. The new and the old go together, the new contained in the old and the old explained in the new.\n\nThey arrive at Emmaus, and Cleopas and his companion ask the stranger to stay — it is evening. They sit down to eat, and the stranger takes the lead. At that very moment, as bread is broken, the Holy Spirit opens their eyes and they see the risen Savior. Their hearts had been burning within them as Jesus taught them on the road (v. 32).\n\nAt every time a faithful preacher of God's Word stands in the pulpit and preaches faithfully, Jesus is speaking to you. By God's grace, your heart should be burning within you, because you are hearing your Savior speak.\n\nThe joy of seeing the risen Savior is so great that these disciples are no longer worried about the seven miles between them and Jerusalem. They make a beeline back — and when they reach the house, everyone starts talking at once: the Savior lives! He is back! He is alive! The unbelief becomes faith, a new beginning, life conquering death — because Christ is risen.\n\nPeter, who was there that day, writes later: 'Blessed be the God and Father of our Lord Jesus Christ, who according to his abundant mercy has begotten us again to a living hope through the resurrection of Jesus Christ from the dead.' A living hope — a living, real desire, plus expectation, plus conviction that our lives here are not in vain. A hope not based on legend or tales but on the immovable rock of Christ's resurrection."};
