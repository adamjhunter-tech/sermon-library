window.LESSON_DATA = {"id": "2023-01-29-trusting-god-gods-rule-over-the-nations", "title": "Trusting God: God's Rule Over the Nations", "speaker": "Pastor Tito Lyro", "date": "2023-01-29", "session": "Sunday School", "series": null, "series_part": null, "parts": 1, "source_files": ["01-29-23 - Trusting God - God's Rule Over the Nations - 2 Chr 20_5-12 - Pastor Tito Lyro.txt"], "tags": [{"tag": "sovereignty of God", "source": "detected"}, {"tag": "prayer", "source": "detected"}, {"tag": "government", "source": "detected"}, {"tag": "providence", "source": "detected"}, {"tag": "Christian living", "source": "detected"}], "scripture_references": [{"reference": "2 Chronicles 20:5-12", "type": "quoted", "source": "detected"}, {"reference": "1 Timothy 2:1-2", "type": "quoted", "source": "detected"}, {"reference": "Daniel 2:21", "type": "referenced", "source": "detected"}, {"reference": "Proverbs 21:1", "type": "referenced", "source": "detected"}, {"reference": "Romans 13:1", "type": "referenced", "source": "detected"}, {"reference": "Daniel 9", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: Jehoshaphat's Prayer as a Model", "subpoints": ["Context: this lesson comes from a study of Jerry Bridges, Trusting God", "2 Chronicles 20:5-12: Judah faces an overwhelming coalition of enemies", "Jehoshaphat's prayer models trusting God in impossible circumstances", "'We do not know what to do, but our eyes are on You' — the posture of dependence"], "scripture": ["2 Chronicles 20:5-12"]}, {"title": "1. God Rules Over the Nations", "subpoints": ["Daniel 2:21: God removes and establishes kings", "Proverbs 21:1: The king's heart is a stream of water in the Lord's hand", "Romans 13:1: There is no authority except that which God has established", "God determines who rules, when they rule, and how long they rule", "This is not a statement about the morality of rulers but about God's sovereign governance"], "scripture": ["Daniel 2:21", "Proverbs 21:1", "Romans 13:1"]}, {"title": "2. God Determines Military Outcomes", "subpoints": ["Jehoshaphat prays specifically about military victory — God is not absent from war", "Israel's history shows God granting and withholding military success according to His purposes", "God uses the nations and their armies as instruments of His will"], "scripture": ["2 Chronicles 20:5-12"]}, {"title": "3. God's Sovereignty Over Nations Is Usually Not Immediately Apparent", "subpoints": ["Bridges: we often cannot see God's hand at work until later", "Faith trusts the character of God when circumstances seem to contradict His rule", "Looking back: we see God's hand clearly; looking forward, we must trust"], "scripture": []}, {"title": "4. Practical Application: Pray for Those in Authority", "subpoints": ["1 Timothy 2:1-2: Paul commands prayer for kings and all in authority", "Daniel as a model: he prayed for God's sovereign purposes to be fulfilled even in exile", "Daniel 9: Daniel's prayer for national restoration — he identified with his people's sin", "Our prayer for rulers should include: their salvation, their wisdom, and their execution of justice"], "scripture": ["1 Timothy 2:1-2", "Daniel 9"]}], "summary": "In this Sunday school lesson from a study of Jerry Bridges' Trusting God, Pastor Tito Lyro examines God's rule over the nations, using Jehoshaphat's prayer in 2 Chronicles 20 as a model of dependence on God in impossible circumstances. He establishes from Daniel, Proverbs, and Romans that God sovereignly appoints and removes rulers and determines military outcomes. He notes that this sovereignty is usually not immediately visible and closes with a call to pray for those in authority, holding up Daniel as a model of intercession.", "transcript": "## Introduction: A Study in Trusting God\n\nWe have been working through Jerry Bridges' book *Trusting God: Even When Life Hurts*. Bridges is one of the most helpful writers of the twentieth century for practical Christian living, and this book in particular has been a great help to many in this congregation.\n\nToday we come to the chapter on God's rule over the nations. This is a topic that has obvious and pressing relevance — we live in a world of political turmoil, international conflict, and the constant sense that things are out of control. The Bible has a great deal to say about whether that is actually true.\n\n## Jehoshaphat's Prayer: A Model of Dependence\n\nOur anchor text is 2 Chronicles 20:5–12. Judah is facing an overwhelming coalition of enemies — Moab, Ammon, and others. Jehoshaphat has no military solution. He does what every believer should do when they have no human solution: he prays.\n\n> \"O LORD God of our fathers, are You not God in heaven, and do You not rule over all the kingdoms of the nations, and in Your hand is there not power and might, so that no one is able to withstand You?... For we have no power against this great multitude that is coming against us; nor do we know what to do, but our eyes are on You.\" (2 Chronicles 20:6, 12)\n\nNotice the structure of the prayer:\n1. He addresses God as the sovereign ruler of the nations\n2. He acknowledges Israel's own helplessness\n3. He declares dependence: *our eyes are on You*\n\nThis is the posture God calls us to. Not passive resignation, but active, expectant dependence on the One who actually holds the nations.\n\n## 1. God Rules Over the Nations\n\nThis is not a pious wish — it is a stated fact throughout Scripture.\n\n**Daniel 2:21**: \"He removes kings and raises up kings.\"\n\n**Proverbs 21:1**: \"The king's heart is in the hand of the LORD, like the rivers of water; He turns it wherever He wishes.\"\n\n**Romans 13:1**: \"There is no authority except from God, and the authorities that exist are appointed by God.\"\n\nThis does not mean every ruler is a good ruler, or that every government policy is righteous. God uses wicked rulers for His purposes as surely as He uses righteous ones. The Assyrians were the rod of His anger against Israel. Cyrus was His anointed instrument to restore the exiles. His governance is not dependent on the character of those He governs through.\n\n## 2. God Determines Military Outcomes\n\nJehoshaphat's prayer is specifically about military crisis. He is not praying about a personal problem — he is praying about armies. And God responds by routing the coalition without Judah lifting a sword.\n\nIsrael's history is a testimony to this. The walls of Jericho fell by faith. Gideon's three hundred defeated the Midianites. Sennacherib's army was destroyed by an angel in a single night. God is not uninvolved in war and its outcomes.\n\n## 3. God's Sovereignty Is Usually Not Immediately Apparent\n\nBridges makes a point worth sitting with: we rarely see God's hand at work in real time. Looking back across history — or even our own lives — we can trace His purposes. Looking forward or in the present moment, we see confusion, evil seemingly winning, the good seemingly defeated.\n\nThis is exactly where faith must operate. Faith is not the feeling that God is in control. Faith is the choice to trust that He is in control precisely when everything appears to contradict that. Jehoshaphat's enemies had not yet been routed when he prayed. He trusted before the answer came.\n\n## 4. Application: Pray for Those in Authority\n\n> \"Therefore I exhort first of all that supplications, prayers, intercessions, and giving of thanks be made for all men, for kings and all who are in authority, that we may lead a quiet and peaceable life in all godliness and reverence.\" (1 Timothy 2:1–2)\n\nPaul commands this — it is not optional. And note the context: Paul wrote this under Nero. He did not say 'pray for rulers when they are righteous.' He said pray for all who are in authority.\n\nDaniel is the great model here. Exiled to Babylon, serving a pagan king, he prayed for God's sovereign purposes to be fulfilled. In Daniel 9, he intercedes for his nation — not demanding that God vindicate Israel, but confessing Israel's sin and pleading for God's mercy according to His own character and covenant.\n\nThis should shape our prayer for our own nation: humility, confession of our own failures, and trust in God's purposes — not merely petitions for our preferred political outcomes.", "soundcloud_url": "https://soundcloud.com/user-732503870/01-29-23-trusting-god-gods-rule-over-the-nations-2-chr-20_5-12-pastor-tito-lyro"};
