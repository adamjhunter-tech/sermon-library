window.LESSON_DATA = {"id": "undated-the-temptation-of-christ-matthew-4-1-11", "title": "The Temptation of Christ", "speaker": "Pastor Chad Van Dixhoorn", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["The Temptation of Christ - GUEST SPEAKER_ Pastor Chad Van Dixhoorn - Matthew 4_1-11.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/the-temptation-of-christ-guest-speaker-pastor-chad-van-dixhoorn-matthew-41-11", "tags": [{"tag": "temptation", "source": "detected"}, {"tag": "wilderness", "source": "detected"}, {"tag": "Christology", "source": "detected"}, {"tag": "Satan", "source": "detected"}, {"tag": "obedience", "source": "detected"}, {"tag": "Word of God", "source": "detected"}], "scripture_references": [{"reference": "Matthew 4:1-11", "type": "quoted", "source": "detected"}], "outline": ["Introduction: Context following Jesus' baptism", "The Spirit leading Jesus into the wilderness", "First temptation: turning stones to bread — provision", "Second temptation: casting himself down — presumption", "Third temptation: all kingdoms of the world — power", "Jesus' responses from Scripture: 'It is written'", "The significance of Christ's victory over temptation for believers", "Conclusion: Christ as our temptation-conquering Savior"], "summary": "Guest speaker Pastor Chad Van Dixhoorn preaches from Matthew 4:1-11 on the temptation of Christ in the wilderness. Following His baptism and the Father's declaration, Jesus was led by the Spirit to face Satan's three temptations. Each time Jesus responded with Scripture, securing the victory that His people could not secure themselves.", "transcript": "## Lessons from the Temptation of Christ\n\nThe passage we have read this morning — Matthew 4:1-11 — is one of the most puzzling in the Gospel of Matthew. Satan boldly confronts the Son of God about God's provision (verses 1-4), then asks Jesus to presume upon his Father's graciousness (verses 5-7), and finally makes the ultimate perversion of priorities — suggesting that the Creator should bow to the creature (verses 8-11).\n\nOne benefit of being a visiting preacher is that you can preach on extremely challenging passages and leave the hardest questions for the regular pastor. But there is almost no limit to the lessons this account has to teach us. Bishop J.C. Ryle lists several:\n\n**First:** We have a real and mighty enemy in the devil. He is not a cartoon character. He is a deadly enemy who was not afraid to assault even the Lord Jesus himself.\n\n**Second:** If Satan was this bold with Christ, he will be even bolder with Christians. Are you ever tempted to entertain unloving thoughts about people around you? Do you have shameful memories that keep returning? Do you have dark desires that discourage you? We have an enemy, and he is often tempting us to sin, or trying to convince us that we cannot avoid it.\n\n**Third:** The whole purpose of temptation is to get us to sin against God. This is what makes sin so serious. This is why the angels rejoice when we argue in our kitchens, when we are selfish driving our cars, when we are careless about what we see on our screens. Satan wants us to sin, which is why we must band together as Christian people, pray for each other, care for each other, and encourage one another not to be led into temptation.\n\n**Fourth:** The one in whom we trust knows what it is to be tempted. Hebrews tells us that Jesus was tempted in all things like we are. He understands us. We can pour out our hearts to him. There is no need to hide anything from him.\n\n**Fifth:** There is a difference between being tempted and falling into temptation. Jesus was tempted, but he did not sin. J.C. Ryle: *\"Are we ever tempted by Satan to distrust God's care and goodness? So was Jesus. Are we ever tempted to presume on God's mercy and run into danger without warrant? So also was Jesus. Are we ever tempted to commit one great private sin for the sake of some great seeming advantage? So also was Jesus.\"* He has just the Savior that tempted people require.\n\nSatan would have us feel guilty simply because we feel temptation's pull. He whispers: *\"A better Christian wouldn't even be bothered by this.\"* But the life of our Lord reminds us of the vital distinction between being tempted and falling to temptation. Like our Lord, and with his assistance, we sometimes do what he always did — we do not fall.\n\n## The History Behind Matthew 4\n\nIt is not enough to say there are lessons to learn. There is an important history — a backdrop — that we must understand.\n\nMatthew 2 explains that the infant Jesus was rushed to Egypt to escape King Herod, fulfilling the prophecy in Hosea: \"Out of Egypt I called My Son.\" This sets the stage for Matthew 4. Just as God's chosen son Israel came up out of Egypt, so God's Son Jesus came up out of Egypt. And just as Israel was then tempted in the wilderness, so Jesus was tempted in the wilderness.\n\nThe key events of Israel's life were, as it were, compressed and compacted into the life of our Lord. Israel was in the wilderness; Jesus was in the wilderness. Israel spent forty years there; Jesus spent forty days. Israel was tempted by hunger; Jesus was confronted by an even more intense hunger. But where Israel failed — complaining, demanding miracles, preferring the immediate over the promised — Jesus resisted. He was tempted as Israel was, yet without sin, without complaint, without compromise.\n\nBut there is a third picture, from the very beginning: Adam and Eve. In the garden, Satan was front and center. Adam and Eve were tempted regarding provision — led to think God was not caring for them as well as he could. They were encouraged to presumption — assuming they could disobey God and come out fine. And ultimately they committed what may only be called devotion to a creature rather than the Creator. When Adam, God's son, chose to twist the will of his Father, he sinned, and the world plunged into sin with him.\n\nThe pattern is: Adam tested, failed, exiled. Israel tested, failed, exiled. And then in the opening pages of the New Testament — another wilderness, another Satan, another test ordered by God. And there, where every mere mortal has failed, we see one who succeeds.\n\n## Christ as Substitute\n\nWe should see in Christ's resistance to Satan an example for ourselves — Christians must not grasp for temporal kingdoms, must not grab fulfillment now, must not compromise with Satan. They are to use the Spirit's sword in their ongoing battle against the forces of evil.\n\nBut even more than seeing Jesus as an example, we must see him as our substitute. All that he did, he did in our place and for our sakes.\n\nHe came to face temptation as the last Adam, the new representative, who lived and obeyed and resisted where we have not. As our substitute, he was earning for us a righteousness we could never get for ourselves:\n\n- He fought compromise so that his steadfastness could be credited to us when we lack courage.\n- He resisted easy prestige so that his kingdom perspective could be imputed to us when we are worldly.\n- He turned to God for his provision so that his confidence could be ascribed to us when we are anxious.\n- He carefully avoided presuming on his Father's kindness so that his holiness could be counted ours when we are foolish.\n- He resisted Satan's perversion of priorities so that all who trust in Christ will be completely and permanently forgiven for every time we have given in to the world, the flesh, and the devil.\n\n## The Scripture as Our Weapon\n\nIn spite of all the supernatural elements of this passage — Satan, angels, a mountain where all the world's kingdoms are visible, the pinnacle of the temple — perhaps the most remarkable part is the most natural: Jesus quoting the Bible.\n\nAfter every assault of the devil, Jesus quotes from the book of Deuteronomy. This is remarkable because, as Matthew Henry notes, Jesus himself is the eternal Word, and could have produced the mind of God without referring to Moses. And yet Christ wanted us to learn something: who better than the incarnate Word of God to commend the written Word of God?\n\nIt was enough for Jesus that *it is written.* That was the only argument he needed.\n\nOne of the old Puritans wrote that only Scripture is strong enough to support us in the sad hours of temptation. Calvin said: \"Christ used the Scripture as his shield. Those who voluntarily throw away that armor deserve to be strangled by Satan, to whose hands they give themselves up unarmed.\"\n\nSatan wants us to read the Bible very little, or to read it very quickly, and to trust it even less. He wants to airbrush the influence of Scripture out of our lives. He knows that Bible reading, praying over the Bible, and listening to good biblical preaching are the lifegiving power of God and the most effective weapon in the Spirit's arsenal.\n\nAnd the most important thing the Bible has to say in the fight against temptation is this: Jesus Christ has already dealt Satan the death blow. There came a point in World War II when the Allied victory was secured even though fighting continued. If that is mostly true for World War II, Matthew 4 tells us it is entirely true for the Christian life.\n\nAt the end of the gallery of redemptive history, there is a final scene: Satan bound and banished, never to tempt again; the Son of God surrounded by angels; the world falling down before him; the church of Christ brought into glory; the elect from every nation, finally doing perfectly what we have only partly done — worshiping the Lord our God, and him only serving.\n\nHow do we know it is true? Because it is written."};
