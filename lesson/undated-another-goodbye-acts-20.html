window.LESSON_DATA = {"id": "undated-another-goodbye-acts-20", "title": "Another Goodbye", "speaker": "Pastor Tito Lyro", "date": null, "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["Another Goodbye - Pastor Tito Lyro - Acts 20_32-38.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/another-goodbye-pastor-tito-lyro-acts-2032-38", "tags": [{"tag": "community", "source": "detected"}, {"tag": "unity", "source": "detected"}, {"tag": "Word of God", "source": "detected"}, {"tag": "grace", "source": "detected"}, {"tag": "adoption", "source": "detected"}, {"tag": "sanctification", "source": "detected"}, {"tag": "brotherly love", "source": "detected"}], "scripture_references": [{"reference": "Acts 20:32-38", "type": "quoted", "source": "detected"}, {"reference": "Ephesians 4:1-6", "type": "quoted", "source": "detected"}, {"reference": "Ephesians 4:29-30", "type": "referenced", "source": "detected"}, {"reference": "Mark 8:6", "type": "referenced", "source": "detected"}, {"reference": "2 Timothy 3:16-17", "type": "quoted", "source": "detected"}, {"reference": "Matthew 5:16", "type": "referenced", "source": "detected"}, {"reference": "Psalm 23", "type": "referenced", "source": "detected"}, {"reference": "Psalm 119:97-98", "type": "quoted", "source": "detected"}, {"reference": "1 Corinthians 15", "type": "referenced", "source": "detected"}, {"reference": "Galatians 4", "type": "referenced", "source": "detected"}, {"reference": "Hebrews 12", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Pain and Meaning of Goodbye", "subpoints": ["Goodbyes become more difficult as we age", "Saying goodbye to dear friends who have been part of the church for nearly two decades", "Paul's farewell to the Ephesian elders in Acts 20 as a model", "They wept, fell on each other's necks — a picture of genuine Christian fellowship"], "scripture": ["Acts 20:36-38"]}, {"title": "We Say Goodbye as Brothers and Sisters", "subpoints": ["Paul addresses the Ephesians as 'brethren' — those united by faith in Christ", "We are one body, one spirit, one Lord, one faith, one baptism", "Christian brotherhood transcends geography — they leave but the union remains", "We share a common goal: the glory of God and the discipling of the nations", "We are blood-bought citizens of heaven, not merely citizens of Washington or North Carolina", "Jonathan Edwards described his marriage as an 'uncommon union' — so is the church"], "scripture": ["Ephesians 4:1-6"]}, {"title": "We Commend One Another to God", "subpoints": ["The word 'commend' means to place something before someone — to commit to another's care", "The same word is used when Christ set bread before the hungry multitude", "Paul places God before the Ephesians as his final and most important word", "Setting God before each other should mark all our relationships, not just farewells", "We point one another to God's loveliness, reflecting His glory as Moses did coming down the mountain"], "scripture": ["Acts 20:32", "Mark 8:6", "Matthew 5:16"]}, {"title": "We Commend One Another to the Word of His Grace", "subpoints": ["The Bible is centrally about God's redeeming grace in Jesus Christ", "Paul's whole ministry was characterized by declaring the whole counsel of God", "The Word builds us up, makes us straight, props us up, equips us for every good work", "Paul charged Timothy: preach the Word — God's judgment awaits, not man's", "We cannot give to others what we do not have and love ourselves", "If our hearts overflow with Scripture, it spills out when people bump into us"], "scripture": ["Acts 20:32", "Acts 20:26-27", "2 Timothy 3:16-17", "Ephesians 4:29-30", "Psalm 119:97-98"]}, {"title": "The Word Gives an Inheritance Among the Sanctified", "subpoints": ["God Himself is our first inheritance — all of history moves toward the consummation in Christ", "Our inheritance includes freedom from sin, eternal life, the new heavens and earth", "We say a Christian goodbye — committing one another to God and His Word", "Closing prayer of blessing for the departing family"], "scripture": ["Acts 20:32", "1 Corinthians 15"]}], "summary": "In this Sunday morning sermon, Pastor Tito Lyro preaches on Acts 20:32-38 as a farewell message for a family — Tonya, Sadie, Ezra, and Eli — who are leaving the congregation after nearly two decades to move to North Carolina. Drawing on Paul's emotional parting with the Ephesian elders, he reflects on what it means for Christians to say goodbye and what Paul placed before his beloved Ephesians as his final words.\n\nPastor Lyro begins by establishing that the pain of farewell is real and right — when someone leaves, a piece of us goes with them. But the Christian goodbye is different because the bond of brotherhood in Christ is not dissolved by distance. Citing Ephesians 4, he reminds the congregation that believers share one body, one Spirit, one Lord, one faith — an uncommon union, like what Jonathan Edwards described of his marriage to Sarah, that transcends geography. The departing family and those who remain are still co-laborers for the glory of God and the discipling of the nations.\n\nThe heart of the sermon is Paul's farewell word in Acts 20:32: \"I commend you to God and to the word of His grace.\" Pastor Lyro explores the word 'commend' — to place before someone, to commit to another's care — and argues that this act of setting God and His Word before one another ought to characterize all Christian relationships, not merely moments of departure. We cannot give to others what we do not have; the only way to commend God's Word to others is to be so filled with it that it overflows when people encounter us, as Psalm 119 describes.\n\nThe sermon closes with the inheritance promised through the Word to all who are sanctified: God Himself as the ultimate inheritance, along with freedom from sin, eternal life, and the new heavens and earth. The congregation then gathered to pray over the departing family, committing them to God and His grace as they begin their new chapter.", "transcript": "## Introduction: The Pain and Meaning of Goodbye\n\nPoor life is marked by goodbyes. When you're young, goodbyes are not that big a deal, but the older you get, the more it hurts. We say goodbye to friends who move away, we say goodbye to children who are starting their lives, and we say goodbye to friends who have been promoted to glory through death. Today we say goodbye to friends — dear friends who have been part of our church for close to two decades, and three children ago.\n\nNow, saying goodbye is a difficult thing. Every time someone leaves us for whatever reason, a little piece of us goes with them. So it's difficult — saying goodbye is painful, and should be that way. It should be painful. Hopefully the little piece of us that goes with those who leave will help them to be blessings wherever they go. And as Tonya and the kids move to North Carolina, we hope and pray that the little piece that they took with them from us will enable them to be a great blessing to the community that they are moving into. By the way, they're moving into a big house, so if you ever want to go visit, I'm personally inviting you to go visit them.\n\nThe Apostle Paul experienced many goodbyes, but perhaps none was more difficult than saying goodbye to his beloved Ephesian brethren. We can see how difficult it was for both the Ephesians and Paul by what Luke says in the waning verses of chapter 20. In verse 36, it says that they knelt to pray, they wept, and Luke says that they fell on each other's necks. That's the idea of throwing your arms around and having a difficult time letting go, because you know that there's no guarantee that you're going to see those people or that person ever again.\n\nSo I'd like for us to focus this morning on this goodbye, but especially on Paul's last words to the Ephesian elders in verse 32. This is really the actual farewell word that Paul gives his beloved Ephesians. Up to this point he believed that he would never be able to see them again or even write to them. Now he was wrong on this point, because he was able to at least write to them again two years or so after this. In verse 32, Paul says: \"So now, brethren, I commend you to God and to the word of His grace, which is able to build you up and give you an inheritance among all those who are sanctified.\"\n\n## We Say Goodbye as Brothers and Sisters\n\nNotice that Paul calls them brethren. A brother or a sister is someone we are united to because of our faith in and union with the Lord Jesus Christ. As Romans says, if we have been united together in the likeness of His death, so as brothers we have this strong bond. No matter where we are, we have this strong bond because of Jesus Christ — He is the head and we are His body.\n\nA brother or a sister is one whom God has brought together into one body. In Ephesians chapter 4 — that Paul wrote to these same people just a few years later — he says that we are to walk worthy of the calling with which we are called, with all lowliness and gentleness, with longsuffering, bearing with one another in love, endeavoring to keep the unity of the Spirit in the bond of peace. Why? Because there is one body, there is one Spirit, just as we were called in one hope of our calling, one Lord, one faith, one baptism, one God and Father of all who is above all and through all and in you all.\n\nSo when you say goodbye to a brother or a sister, it's painful, but they're not leaving — in the sense that we are still united with them because of the Lord Jesus Christ. We are part of the body of Christ, and that's true of all believers throughout the ages and throughout the world.\n\nA brother or a sister is someone united together with us with a common goal: the glory of God and the discipling of the nations. So as we say goodbye to Tonya, to Sadie, to Ezra, to Eli today, we are saying goodbye as we continue to do the same work together. We're going to be 3,000-plus miles apart, but both them there and us here will be discipling the nations for the glory of God. We're praying, \"Come quickly, Lord Jesus,\" because we all long to see Him face to face.\n\nA brother or a sister is a blood-bought citizen of heaven. They are going to become citizens or residents of the great state of North Carolina, and we continue to be citizens of the Communist Republic of Washington. But we're citizens of a greater place. We're citizens of heaven, of eternity together. So we say goodbye, but it's not goodbye for too long.\n\nA brother or a sister is someone we minister to and who ministers to us. We've experienced that through the years. In Hebrews 12, it says that when you're going through a discipline process, it doesn't seem pleasant at the time, but afterwards you see the fruits of it. Some of you ladies may be deeply involved in the embroidery of those squares — perhaps on discipline, having to do so many of them — but later on when you give the blanket to the expecting mother and there's great joy, and the baby uses that blanket for a long time, you remember who started that. It was Tonya. So we minister to and are ministered by the brethren.\n\nWe can see that in Paul's speech. They were together in the trenches of the gospel — shoulder to shoulder, ministering Christ to one another and to a dark and lost world. Jonathan Edwards, in his last letter to his wife Sarah just before he died from taking an experimental smallpox vaccine, said that in their marriage they had an uncommon union. That's how Edwards described his marriage to Sarah. That's true of us, brothers and sisters. We have an uncommon union — joined together by an uncommon union because Christ has brought us together.\n\nLet's be honest. If we had to pick who we would be with, perhaps we wouldn't always pick each other. The church is made of unlike people, people who perhaps would not naturally gravitate toward one another. And yet God has brought us together through an uncommon union, a union through the Lord Jesus Christ that makes us part of one another. And it is this union — this being part of one another — that allows us to serve God together and to say goodbye with pain, but also knowing that that union continues independently of geography. We are united with our brothers throughout the world.\n\n## We Commend One Another to God\n\nSo Paul calls them brethren, but then he commends them. I want to tell you, the words \"commend\" and \"command\" sound exactly the same to me, the same way \"mom\" and \"mum\" do. So again, I appeal to you. It doesn't matter. Here Paul commends them. Look at verse 32: \"So now, brethren, I commend you to God.\"\n\nThis word means to place something before someone else. It also means to trust oneself to, to commit oneself to the care of another. It is the word that Christ uses when placing bread in front of the hungry multitude of 4,000. In the book of Mark, Mark 8:6 says that Christ set the bread before them. That word \"set before\" is the same word used here as \"commend\" in our passage. What does Paul set before them as they say their goodbyes? What is this thing that Paul says, \"If this is the last time I talk to you, what is it that I want to put before you that you won't forget?\" In this case, not bread — rather the Bread of Life.\n\nLook at it again in verse 32: \"So now, brethren, I commend you to God and to the word of His grace.\" He places God before them. So Tonya and Sadie and Ezra and Eli, as you leave us, I want you to go with God. And this is not any god — this is the Father of our Lord Jesus Christ. Paul says: we are saying goodbye, and that hurts. But as we do so, I don't want to place myself before you. I want to commit you to God. See Him. Look at Him. Trust Him. Love Him.\n\nSo Tonya, Sadie, Eli, Ezra — we hope that when you think of us, that thought will remind you of God. In many ways, we want to decrease in your life, if that means that Christ will increase as you go on with your life. And the God Paul sets before the brethren is the God of all comfort, the Father of mercies, the one who did not spare His own Son for our sake.\n\nSetting God before each other is something we must do at all times, not just in times of saying goodbye. Can you imagine if our relationships at home and at church revolved around placing God before each other? We would be pointing each other to His loveliness. We would be displaying His grace, bestowed upon us by the Lord Jesus Christ. We would be reflecting His glory to one another — as Moses did when he came down from the mountain and his face shone. We would be doing what the Lord Jesus calls us to in Matthew 5:16: \"Let your light so shine before men, that they may see your good works and glorify your Father in heaven.\" All men, including the brethren.\n\n## We Commend One Another to the Word of His Grace\n\nCan you imagine if our relationships — not only when we say goodbye but every day — were marked by commending each other to the Word of God, by placing the Word of God in front of each other? We would place God before each other as a regular practice in our lives.\n\nSo he says, I commend you to God — but he doesn't stop there. Look again at verse 32: \"So now, brethren, I commend you to God and to the word of His grace.\" He places the Word of God before them. Notice how he qualifies it as the Word of His grace. Now the Bible is about a lot of things. We can go on our entire lives studying the Scriptures and still not be able to unfold everything that the Bible is about. But it is centrally about God and His grace — His redeeming grace, redeeming His people in Jesus Christ.\n\nIn Galatians chapter 4, when Paul is teaching the Galatians about what history is all about, he says that for centuries they were mastered by the law — the law was their master, leading to a particular time. But the fullness of time, the greatness of time, the time that all of history was pointing to, was the time when Jesus came: born of a woman as we are, lived a life of perfection, died a death that we deserved, came back to life, so that we could have life. That is what the Bible is centrally about.\n\nI want you to notice that placing God's Word before the brethren marked Paul's entire Christian life, not just times of saying goodbye. His whole life was about setting the Word of God in front of people. Look at what it says in verses 26 and 27: \"Therefore I testify to you this day that I am innocent of the blood of all men, for I have not shunned to declare to you the whole counsel of God.\" And later it says that for three years, day and night, with tears in his eyes, he put the Word of God before them.\n\nPaul places the Word of God before them because it is that Word that builds them up. Look again at verse 32: \"I commend you to God and to the word of His grace, which is able to build you up\" — to edify, to make straight, to prop you up, to make you do or be what God has designed you to be.\n\nAs little as four years after Acts chapter 20, Paul writes to young Timothy. In 2 Timothy chapter 3, Timothy seemed to be struggling with a fear of man — timid, worried about what people in the church were saying. And Paul says: \"All Scripture is given by inspiration of God, and is profitable for doctrine, for reproof, for correction, for instruction in righteousness, that the man of God may be complete, thoroughly equipped for every good work. This is what you have, Timothy. That's what I'm setting before you — this Word.\"\n\nThen Paul says: \"I charge you therefore, despite your timidity, despite the fear of man, I charge you before God and the Lord Jesus Christ, who will judge the living and the dead at His appearing and His kingdom\" — notice what Paul is doing: Timothy, you are afraid of men, but guess who is going to judge all people? Not man. It's God. And based on that, Paul says: \"Preach the Word; be ready in season and out of season; convince, rebuke, exhort, with all longsuffering and teaching.\"\n\nSo Paul says to the Ephesians: I commend you to the Word of God that builds you up. But this is not something that only happens in preaching. It happens in everyday life. Ephesians 4:29-30 tells us that we are to put off everything that corrupts our speech, so that the words that come from our mouths are tenderhearted, causing each other to be built up in the grace of the Lord Jesus Christ.\n\nBrothers and sisters, we cannot place before others what we don't have. If you have not made the Word of God your own, you don't have it to give to others. And we cannot really place before others what we don't love. So appropriate yourselves of the Bible. Love the Scriptures, that you might be able to put them before the people.\n\nWouldn't it be great, brothers and sisters, if we grabbed hold of this place — if we were so filled with the Bible that we didn't have to think about it when we interact with people? Not necessarily quoting chapter and verse, but our speech being so filled with the Word we love that it just spills out.\n\nPsalm 23 talks about our cup running over with the grace of God. The image of a cup running over: our main line that comes into our basement is leaking — there's a little drip. Every time we close the main line to do work on the house, for days afterwards there's a little drip, drip. We have to put a bucket under it. If we're not careful, that bucket — and I use the term \"bucket\" very loosely — gets too full, and what's inside comes out and spills everywhere. If the cup of our heart is filled to the brim with the Word of God, guess what happens when people bump into us? The Word of God comes out. Guess what overflows? The Word of God.\n\nPsalm 119:97-98 says: \"Oh, how I love your law! It is my meditation all the day. You, through your commandments, make me wiser than my enemies, for they are ever with me.\" Is that a description of us? Is the Word of God so placed before us that we love it, meditate on it, and are made wise by it?\n\n## The Word Gives an Inheritance Among the Sanctified\n\nPaul places the Word of God before the brethren because in it we find out about our inheritance. As those who have been set apart by God for His own purpose and glory, look at verse 32: \"I commend you to God and to the word of His grace, which is able to build you up and give you an inheritance among all those who are sanctified.\"\n\nIt is God who gives us an inheritance — not the Word in isolation, but God's existence is so tied with His Word that here Paul says the Word of God gives us an inheritance. What is our inheritance? First of all, God Himself. If you've ever followed 1 Corinthians 15 — such a long chapter that we tend to get lost in the 58 verses — there's a passage in the middle that says everything is moving toward the consummation, which Jesus Christ will fulfill when He delivers all things to the Father. That's the inheritance: God Himself. But there's more: freedom from sin, eternal life, the ability to see Jesus and have fellowship with Him as He is, and with each other — the new heavens and the earth, the kingdom of God in Christ. These are all things that come from God as our inheritance.\n\nSo we say goodbye to Tonya, to Sadie, to Ezra, to Eli. But we say a Christian goodbye. We say goodbye by committing them to God and His Word. But we also do that to each other — to all of us who stay behind. Let us live lives that are always committing each other, placing God, placing His Word before each other, that we might grow into the fullness of Christ as He designed us to be — spurring, steering, irritating each other onto love and good works, as Hebrews urges us.\n\nSo Paul says: \"Brethren, I commend you to God, and to the word of His grace, which is able to build you up and give you an inheritance among all those who are sanctified.\"\n\n## Closing Prayer for the Departing Family\n\nTonya, Sadie, Eli, Ezra — would you come forward so we can pray for you? If the elders would join us — and would the congregation join us in prayer for this family?\n\nFather in heaven, we thank you for Tonya, for Sadie, for Eli, for Ezra. We pray to bless them as they move to North Carolina. We pray for safe travel. We pray above all that they would find great community as they go to North Carolina — we pray that the church they are going to would surround them with love. We pray that you would continue to build them up in the most holy faith. We pray that they would experience your presence with them. We pray that you would comfort them as they also hurt when they leave, as we hurt when they leave. We pray to comfort us as well. We thank you for them. Though they are never going to be replaced — they are not replaced — we do pray that you bring others to the church, not to replace but to continue to minister with us here as we give them to North Carolina. Thank you for them, and bless them. We pray in Jesus' name. Amen."};
