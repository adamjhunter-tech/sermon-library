window.LESSON_DATA = {"id": "2021-06-20-have-you-not-heard", "title": "Have You Not Heard?", "speaker": "Pastor Tito Lyro", "date": "2021-06-20", "session": "AM", "series": null, "series_part": null, "parts": 1, "source_files": ["Have You Not Heard_ - Pastor Tito Lyro - Isaiah 40_12-26.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/have-you-not-heard-pastor-tito-lyro-isaiah-4012-26", "tags": [{"tag": "sovereignty of God", "source": "detected"}, {"tag": "comfort", "source": "detected"}, {"tag": "idolatry", "source": "detected"}, {"tag": "attributes of God", "source": "detected"}, {"tag": "missions", "source": "detected"}], "scripture_references": [{"reference": "Isaiah 40:12-26", "type": "quoted", "source": "detected"}, {"reference": "Isaiah 40:1-11", "type": "referenced", "source": "detected"}, {"reference": "Psalm 19:1-3", "type": "referenced", "source": "detected"}, {"reference": "Psalm 2:4", "type": "referenced", "source": "detected"}, {"reference": "Psalm 20:7", "type": "referenced", "source": "detected"}, {"reference": "Romans 11:33", "type": "referenced", "source": "detected"}], "outline": [{"title": "Introduction: The Context and Purpose of Isaiah 40", "subpoints": ["Isaiah 40 opens with the double proclamation of comfort — God will comfort his people because their sins have been covered through the perfect atonement provided by him", "Chapter 39 prophesied the Babylonian captivity (about 100 years away); Isaiah 40 fast-forwards to the end of that captivity, placing Israel at the point of release to return to Palestine", "The comfort is not in the deliverance from Babylon or the return to the land — the comfort is in God himself", "Verses 1-11 announce the comfort; verses 12-26 describe who the comforting God is; verses 27-31 deliver the comfort"], "scripture": ["Isaiah 40:1-11"]}, {"title": "1. Our God of Comfort Is Independent from Creation", "subpoints": ["Verses 21-22: 'it is he who sits above the circle of the earth and its inhabitants are like grasshoppers; who stretches out the heavens like a curtain'", "God is not part of creation — he transcends it; he does not need the universe or its creatures to be who he is", "God does not need you — and yet out of love and according to his blessed will, he chose to lower himself to save you; that makes the gospel even more remarkable", "He is omnipresent: present everywhere with all his attributes at the same time without fail; God's love is here, his justice is here, his omnipotence is here — not parceled out"], "scripture": ["Isaiah 40:21-22"]}, {"title": "2. Our God of Comfort Is Immense", "subpoints": ["Verse 12: 'who has measured the waters in the hollow of his hand, measured heaven with a span and calculated the dust of the earth in a measure'", "These are literary figures for God's immensity — not claiming God has a literal body; he is infinite; there is no place in creation where God is not", "Verses 15-16: 'the nations are as a drop in a bucket and are counted as the small dust on the scales' — the most powerful nations do not even register on the balance", "An atomic scale in a vacuum kept from even a speck of dust — that is how little the nations tip the scale compared to God; political summits that claim to shape the world are less than that"], "scripture": ["Isaiah 40:12", "Isaiah 40:15-16"]}, {"title": "3. Our God of Comfort Is All-Wise and Untroubled", "subpoints": ["Verse 14: 'with whom did he take counsel, and who instructed him, and taught him in the path of justice?'", "God is not figuring things out as events unfold; he knows everything necessarily and immediately; nothing catches him by surprise", "Romans 11:33: 'Oh, the depth of the riches both of the wisdom and knowledge of God! How unsearchable are his judgments and his ways past finding out!'", "He is undisturbed by political turmoil of any kind — Psalm 2:4: 'He who sits in the heavens shall laugh; the Lord shall hold them in derision'", "Two major summits 'this past week' (NATO and US-Russia) were touted as changing everything — but our hope is in the Lord, not in presidents or generals or NATO alliances"], "scripture": ["Isaiah 40:14", "Romans 11:33", "Psalm 2:4"]}, {"title": "4. Our God of Comfort Is Incomparable — The Folly of Idolatry", "subpoints": ["Verses 18-20: God mocks the very idea of making an idol — 'to whom then will you liken God, or what likeness will you compare to him?'", "The idol-maker: a core of wood overlaid with beaten gold or silver, secured by chains so it will not tip over; if you are too poor for that, find wood that will not rot and a craftsman who can make the base level", "Remember 1 Samuel 5: Dagon always fell on its face before the ark; the idol that needed to be chained down before the ark of the living God", "The warning for us: we may not make statues, but we make God in our own image — a God who happens to be unbothered by our own sins, bothered only by others' sins; that is idolatry too", "The God of the Bible cannot be easily tamed; there are no chains to hold him; he will not be made according to our preferences"], "scripture": ["Isaiah 40:18-20"]}, {"title": "5. Our God of Comfort Is Sovereign", "subpoints": ["Verses 21-26: repeated rhetorical questions — 'have you not known? Have you not heard?' — these are not new revelations; the people of God have always been supposed to know this", "He brings princes to nothing and makes judges of the earth useless — 'scarcely shall they be planted, scarcely shall they be sown... when he will also blow on them and they will wither'", "Verse 26: he calls the hosts of heaven by number and by name — by the greatness of his might and the strength of his power, not one is missing", "Psalm 20:7: 'some trust in chariots and some in horses, but we will remember the name of the LORD our God' — the midterm elections are not where our hope lies", "William Cowper's hymn: 'God moves in a mysterious way... behind a frowning providence he hides a smiling face'"], "scripture": ["Isaiah 40:21-26", "Psalm 20:7"]}, {"title": "Conclusion: Behold Your God", "subpoints": ["This infinite, wise, immense, incomparable, sovereign God joined himself in the person of his Son to human nature in all its frailties — so that in Christ we might be redeemed", "Isaiah 40:9: 'O Zion, you who bring good tidings... say to the cities of Judah, Behold your God!'", "The ultimate comfort in a weary land is this: sin forgiven, and stores of grace to sustain you — no matter what storms surround you", "Look to this God. Behold him in his matchless wisdom. Behold him in his sovereign providence. Behold him supremely in the Lord Jesus Christ coming to be God to you and Savior"], "scripture": ["Isaiah 40:9-11"]}], "summary": "Preached the week of the NATO summit and the Biden-Putin summit of June 2021 — both touted as the most consequential meetings of the decade — Pastor Lyro opens Isaiah 40:12-26, the middle section of one of the Bible's great chapters of comfort. The passage stands between the announcement of comfort (vv. 1-11) and the delivery of comfort (vv. 27-31). Its purpose is to describe the kind of God who will comfort: a God independent from creation, immense beyond measure, all-wise and undisturbed, incomparable to any idol, and absolutely sovereign.\n\nThe sermon walks through each of these attributes with care. On immensity: the nations — and their great summits — are like dust on an atomic scale before God. On wisdom: God is not improvising as history unfolds; nothing surprises him. On idolatry: the ancient idol-maker chaining his carved image to a stand so it would not tip is funny — but we do the same thing when we remake God in our own image to accommodate our preferences. On sovereignty: he brings princes to nothing with a breath, calls every star by name, and not one is missing.\n\nThe sermon is a pastoral call to keep eternal perspective during a week when the political world seemed to hang on two diplomatic summits. The application is direct: some trust in chariots and some in horses, but we will remember the name of the Lord our God. Midterm elections, drought cycles, hurricane seasons — none of it falls outside his sovereign rule. The sermon closes by pointing to the incarnation as the supreme act of this sovereign God: the infinite, independent, immense, all-wise God joined himself to human nature in Christ — and that is where we behold him most clearly.", "transcript": "## Scripture Reading: Isaiah 40:12-26\n\n*Who has measured the waters in the hollow of His hand, measured heaven with a span and calculated the dust of the earth in a measure? Weighed the mountains in scales and the hills in a balance? Who has directed the Spirit of the LORD, or as His counselor has taught Him? With whom did He take counsel, and who instructed Him, and taught Him in the path of justice? Who taught Him knowledge, and showed Him the way of understanding? Behold, the nations are as a drop in a bucket, and are counted as the small dust on the scales; look, He lifts up the isles as a very little thing. And Lebanon is not sufficient to burn, nor its beasts sufficient for a burnt offering. All nations before Him are as nothing, and they are counted by Him less than nothing and worthless. To whom then will you liken God? Or what likeness will you compare to Him? The workman molds an image, the goldsmith overspreads it with gold, and the silversmith casts silver chains. Whoever is too impoverished for such a contribution chooses a tree that will not rot; he seeks for himself a skillful workman to prepare a carved image that will not totter. Have you not known? Have you not heard? Has it not been told you from the beginning? Have you not understood from the foundations of the earth? It is He who sits above the circle of the earth, and its inhabitants are like grasshoppers, who stretches out the heavens like a curtain, and spreads them out like a tent to dwell in. He brings the princes to nothing; He makes the judges of the earth useless. Scarcely shall they be planted, scarcely shall they be sown, scarcely shall their stock take root in the earth, when He will also blow on them, and they will wither, and the whirlwind will take them away like stubble. \"To whom then will you liken Me, or to whom shall I be equal?\" says the Holy One. Lift up your eyes on high, and see who has created these things, who brings out their host by number; He calls them all by name, by the greatness of His might and the strength of His power; not one is missing.*\n\n## Introduction: The Purpose of Isaiah 40\n\nWe all want to be comforted. That is our innate desire — from the great tragedies of death of a loved one or perhaps the greatest tragedy of all for a believing parent, the going astray of a child, to the little boo-boos of a cut finger. We want to be comforted by the Lord. We want to know that everything is going to be okay.\n\nAnd that is the point of Isaiah 40. The chapter begins with a double proclamation of comfort — and the assurance that our sins are covered. The comfort is not described in detail until we get to the very last portion of the chapter, verses 27 through 31. But in the verses that we read this morning, God describes who he is — and that is important, because we are not going to embrace the comfort if we do not believe in the right God of the Bible.\n\nIsaiah is fast-forwarding about 200 years into the future. He prophesied the Babylonian captivity in chapter 39. Now, in chapter 40, he places the people at the end of that captivity — at the moment when they are about to be released and return to Palestine. A time of great euphoria. And he reminds them: your comfort is not in the deliverance from Babylon. Your comfort is not in the ability to go back to the Promised Land. Your comfort is in God himself.\n\nSo in verses 1-11 God announces: I am going to comfort you. In verses 12-26 God tells us who he is. And in verses 27-31 God delivers that comfort. We are looking at the middle section today.\n\n## 1. Our God of Comfort Is Independent from Creation\n\nVerses 21-22: *Have you not known? Have you not heard? Has it not been told you from the beginning? Have you not understood from the foundations of the earth? It is he who sits above the circle of the earth, and its inhabitants are like grasshoppers, who stretches out the heavens like a curtain and spreads them out like a tent to dwell in.*\n\nGod is independent from his creation. The theological word is that he transcends creation. He does not need the universe. He does not need you. He can do whatever he wants without you.\n\nAnd yet, being independent of creation, he chose to send his Son so that you can be part of his kingdom. Out of love and according to his glorious and blessed will, he chose to save you — to lower himself, to condescend — so that you could be his.\n\nHe is omnipresent: present everywhere with all his attributes at the same time without fail. We tend to think of God's presence as distributed — his love is here, his justice is over there, his power is somewhere else. No. God is present everywhere with all his attributes simultaneously.\n\n## 2. Our God of Comfort Is Immense\n\nVerse 12: *Who has measured the waters in the hollow of his hand, measured heaven with a span and calculated the dust of the earth in a measure?*\n\nGod is not literally a giant with a hand large enough to hold the oceans. Isaiah is using literary figures to tell us that God is immense — infinite. There is no place in creation where God is not.\n\nVerses 15-16: *Behold, the nations are as a drop in a bucket, and are counted as the small dust on the scales. Look, he lifts up the isles as a very little thing, and Lebanon is not sufficient to burn, nor its beasts sufficient for a burnt offering.*\n\nWhen I worked in an organic chemistry lab in Brazil, one of the most prized possessions was an atomic scale kept in a vacuum cage — because even a speck of dust would alter the balance. And yet even then we had difficulty measuring really small amounts. That is the picture God is painting: the most powerful nations of the world, with all their summits and declarations — they do not even tip the scale. You put all the nations on one side and all their power and influence — and still no movement on God's side of the scale.\n\nThis past week there were two great summits that were touted as the greatest meetings of the decade. NATO leadership met with President Biden and the other heads of state. Supposedly going to change the world. And then the US-Russia summit on the 16th — supposedly going to determine the direction of all things. These summits are touted as the most important meetings of the decade, and yet God sits above the circle of the earth, and the nations are as a drop in a bucket.\n\n## 3. Our God of Comfort Is All-Wise\n\nVerse 14: *With whom did he take counsel? And who instructed him, and taught him in the path of justice? Who taught him knowledge, and showed him the way of understanding?*\n\nPeople of God: God is not figuring things out as events unfold. He is not saying, \"Oh, I can't believe my elder decided to move to Georgia — now I have to change my plans.\" He knows everything necessarily and immediately. Everything is present with God. Nothing catches him by surprise.\n\nThat is why the apostle Paul breaks out into doxology in Romans 11:33: *Oh, the depth of the riches both of the wisdom and knowledge of God! How unsearchable are his judgments and his ways past finding out!*\n\nWe think that we can plan and scheme our way to the best possible life. But God is the only all-wise one. When we truly link with his ways — when we give our lives to him and let him be in charge — that is when we are living our best lives, now and forever.\n\nHe is also untroubled. The nations are raging and plotting against him, as Psalm 2 says — *the kings of the earth set themselves and the rulers take counsel together against the LORD and against his Anointed.* What does God do? *He who sits in the heavens shall laugh; the Lord shall hold them in derision.* God is not anxious about the G7 meeting. He is not anxious about NATO.\n\nSome trust in chariots and some in horses, as Psalm 20 says. But we will remember the name of the LORD our God.\n\n## 4. Our God of Comfort Is Incomparable — The Folly of Idolatry\n\nVerses 18-20: *To whom then will you liken God? Or what likeness will you compare to him? The workman molds an image, the goldsmith overspreads it with gold, and the silversmith casts silver chains. Whoever is too impoverished for such a contribution chooses a tree that will not rot; he seeks for himself a skillful workman to prepare a carved image that will not totter.*\n\nGod is using sarcasm here. He is mocking the very idea of idolatry. In the ancient Near East, a wealthy person would have an idol made of a wooden core, then overlaid with beaten gold or silver, with chains of silver to fix it to your altar so it would not tip. If you are too poor for silver and gold, find a piece of wood that will not rot — find a good craftsman who can level the base so it does not wobble or fall forward.\n\nRemember 1 Samuel 5: the Philistines took the ark of the covenant and placed it in the temple of Dagon. And every morning the idol had fallen on its face before the ark. The idol, chained down, kept falling before the living God.\n\nBut before we feel too superior to ancient people — let us look at our own hearts. We are often tempted to remake God in our own image, conveniently accommodating our preferences and tastes. The god we come up with tends to be bothered by other people's sins but not by our own. The god we make never really cares about our pet sins. That is the same idolatry — just without the wood and gold.\n\nRemember, as the elder mentioned in Sunday school, that the idea of God's sovereignty in salvation — that from eternity past he chose an elect people to be his and sovereignly saves them — is something a person can reject by saying, \"My god would never do that.\" When you say that, you have already admitted the problem: you have made a god according to your own preferences rather than worshiping the God as revealed in the Bible.\n\n## 5. Our God of Comfort Is Sovereign\n\nVerses 21-26: *Have you not known? Have you not heard? Has it not been told you from the beginning?* — rhetorical questions that imply: these are not new revelations. The people of God have always been supposed to know this.\n\n*He brings the princes to nothing; he makes the judges of the earth useless. Scarcely shall they be planted, scarcely shall they be sown... when he will also blow on them, and they will wither, and the whirlwind will take them away like stubble.*\n\nThe judges of the earth, the Supreme Court justices — they are the true rulers in our constitutional structure; they are the ones who determine what is and is not the law. And yet before God they are like grass. He blows on them and they are gone.\n\nVerses 25-26: *\"To whom then will you liken me? Or to whom shall I be equal?\" says the Holy One. Lift up your eyes on high, and see who has created these things, who brings out their host by number; he calls them all by name, by the greatness of his might and the strength of his power; not one is missing.*\n\nHe calls every star by name. By the greatness of his might — not one is missing. The whole created order owes its existence and preservation to his word and power.\n\nGod has not abdicated his throne. This is supposed to be a terrible year for hurricanes and drought. The west will have the worst drought in recorded history; the east will face the worst hurricane season in memory. We are heading into midterm elections and everyone is putting their hope on who wins the House or Senate. But people of God — let the electorate do what it will. Let the forces of nature bombard our coastlines. Let disease grip our nation. But let us not forget that our Lord rules, and none of that is happening outside his sovereign providence.\n\nWilliam Cowper wrote in his great hymn, *\"God moves in a mysterious way his wonders to perform... Deep in unfathomable mines of never-failing skill he treasures up his bright designs and works his sovereign will. Judge not the Lord by feeble sense, but trust him for his grace; behind a frowning providence he hides a smiling face.\"* That is our sovereign God.\n\n## Conclusion: Behold Your God\n\nThis God — infinite in wisdom, independent of creation, immense, incomparable, sovereign — joined himself in the person of his Son to human nature in all its frailties and weaknesses and limitations, so that in Christ we might be redeemed.\n\nBrothers and sisters: behold your God. This is the God of the Bible. Maybe you have taken your eyes from him lately. Maybe life has gotten complicated and your eyes have been fixed on the fears and anxieties that life in this world brings. Behold your God. Behold him in his matchless wisdom. Behold him in his sovereign providence. And behold him supremely in the Lord Jesus Christ — coming for you to be God to you and Savior.\n\nHere is the comfort in a weary land: sin forgiven, and stores of grace to sustain you and to keep you, no matter what storms surround you. People of God, behold your God. Come and find comfort in him in these troubled days.\n\n*Father in heaven, thank you that you have opened our eyes through your Spirit. We pray that we would hold on to the vision of God that your Word gives us, and that we would follow you with our whole hearts. And we pray that if there are those whose eyes are closed to you, you would open them, that they might see the glory of Christ and be saved even today. In Jesus' name, amen.*"};
