window.LESSON_DATA = {"id": "2024-10-27-kindness-is-better-than-bitterness", "title": "Kindness Is Better than Bitterness", "speaker": "Pastor Tito Lyro", "date": "2024-10-27", "session": "PM", "series": null, "series_part": null, "parts": 1, "source_files": ["10-27-24 -PM-Kindness is Better than Bitterness - Ephesians 4_31-32 - Pastor Tito Lyro.txt"], "soundcloud_url": "https://soundcloud.com/olympiabp/10-27-24-pm-kindness-is-better-than-bitterness-ephesians-4_31-32-pastor-tito-lyro-102724-156-pm-leveled", "tags": [{"tag": "kindness", "source": "detected"}, {"tag": "bitterness", "source": "detected"}, {"tag": "forgiveness", "source": "detected"}, {"tag": "speech", "source": "detected"}, {"tag": "anger", "source": "detected"}, {"tag": "gospel", "source": "detected"}, {"tag": "sanctification", "source": "detected"}], "scripture_references": [{"reference": "Ephesians 4:31-32", "type": "quoted", "source": "detected"}, {"reference": "Proverbs 18:21", "type": "quoted", "source": "detected"}, {"reference": "James 3:5-6", "type": "quoted", "source": "detected"}, {"reference": "Matthew 18:21-34", "type": "referenced", "source": "detected"}, {"reference": "Ephesians 4:20-32", "type": "referenced", "source": "detected"}], "outline": [{"title": "The Point: Kindness Is Demonstrated in Forgiveness", "subpoints": ["Kindness is often expressed in words — the tongue has power of death and life (Proverbs 18:21)", "James 3:5-6: the tongue is a fire, a world of iniquity", "The pattern of Ephesians 4: put off the old self, renew the mind, put on the new self"], "scripture": ["Ephesians 4:31-32", "Proverbs 18:21", "James 3:5-6"]}, {"title": "What Must Be Put Off: Five Sins of Verse 31", "subpoints": ["Every bitterness — specific bitterness against specific people; carried wrongs that manifest as anger", "Every wrath/rage — flying off the handle; anger ultimately against God's providence", "Every anger — hostile opposition to what God desires for our lives; always calls for retribution", "Clamoring/brawling — a contentious spirit always ready to argue; explosive reactions", "Evil speaking/slander — blasphemy toward people; defaming character; malice as refusal to forgive"], "scripture": ["Ephesians 4:31"]}, {"title": "Why We Struggle: The Root Issue", "subpoints": ["These sins come from a heart that either has not known forgiveness or has not let forgiveness govern behavior", "The unforgiving servant parable: our debt forgiven by God is infinitely larger than any debt owed us", "Having been forgiven so much, should we not forgive as well?"], "scripture": ["Matthew 18:21-34"]}, {"title": "What Must Be Put On: Kindness, Compassion, Forgiveness", "subpoints": ["Kindness is the opposite of malice — the spirit-imported goodness of heart", "Tenderness/compassion: deep awareness of others' needs with desire to relieve them; requires seeing people", "Forgiveness: a compassionate person freely forgives because they know how much they have been forgiven", "We do all this because we have been forgiven through Jesus Christ"], "scripture": ["Ephesians 4:32"]}, {"title": "The Gospel Never Stops", "subpoints": ["Sanctification is not moving away from the gospel to something else — it is moving deeper into the gospel", "It is the forgiveness in Christ that propels us to forgive others and be kind to others", "We are not justified by faith and then sanctified by something else — it is still God's free grace"], "scripture": []}], "summary": "In the evening sermon, Pastor Tito Lyro takes two verses from Ephesians 4:31-32 to show that kindness is better than bitterness, and that the two are a direct put-off/put-on pair in Paul's argument. He starts by establishing the power of words as a window into the heart (Proverbs 18:21; James 3:5-6) and then works through the five sins of verse 31 — bitterness, wrath, anger, clamoring, and evil speaking/slander — noting that Paul uses the word \"every\" before each, calling for repentance not in the abstract but regarding specific bitterness toward specific people. The root cause for all five is identified as a heart that has not allowed God's forgiveness to govern its behavior. Drawing on the parable of the unforgiving servant, Pastor Lyro argues that since God has forgiven us a debt infinitely larger than any debt owed to us, we have no grounds for withholding forgiveness. The put-on side — kindness, compassion, forgiveness — is then traced to the character of God: kindness is the opposite of malice and seeks the good of others, compassion requires actually seeing and knowing people, and forgiveness flows naturally from one who has tasted forgiveness themselves. The sermon closes with the critical point that sanctification is not a move away from the gospel but a deeper immersion into it — the same grace that justified us continues to transform us.", "transcript": "## Scripture Reading: Ephesians 4:31-32\n\nFor our scripture reading this afternoon, we return to Ephesians 4. We are going to read just two verses — Ephesians 4 verses 31 and 32. This is the Word of our Lord:\n\n\"Let all bitterness, wrath, anger, clamor, and evil speaking be put away from you, with all malice. And be kind to one another, tenderhearted, forgiving one another, even as God in Christ forgave you.\"\n\nThis is the Word of our Lord. Let us pray together. Father, thank you for your Word. Thank you for your kindness to us in telling us who you are and what you require of us in your Word. We pray that you open our eyes and our hearts to see glorious things concerning you and concerning your law. In this passage, shape us to be like Christ. In Jesus' name. Amen.\n\n## Introduction\n\nWhen we think of kindness, we often think of words. And that is the case because words matter — they are a window into the heart. In a very real sense, talk is not cheap. In Proverbs 18:21, the Holy Spirit says: \"Death and life are in the power of the tongue.\"\n\nListen to how James describes the tongue's power in James 3:5-6: \"Even so, the tongue is a little member and boasts great things. See how great a forest a little fire kindles! And the tongue is a fire, a world of iniquity. The tongue is so set among our members that it defiles the whole body, and sets on fire the course of nature; and it is set on fire by hell.\"\n\nIn our passage, Paul addresses the sins of the tongue and the power of words. The context is Ephesians 4:20 and following, where he exhorts the church to put off the attitudes, thoughts, and behaviors that are characteristic of a person who has not been born again, and to put on what is characteristic of the person who has been regenerated by the Holy Spirit.\n\nThe point we must get is this: **kindness is better than bitterness.** The put-off is bitterness with all that entails; the put-on is kindness.\n\n## What Must Be Put Off\n\nLook at verse 32 first — the Apostle tells us there that kindness is demonstrated in forgiveness. He says: \"be kind to one another, tenderhearted, forgiving one another\" — tender-heartedness and forgiveness are two elements that describe kindness here.\n\nNow notice that when Paul says \"let all bitterness\" in verse 31, the word \"all\" really means \"every\" — every bitterness, every wrath, every anger. This is important because we tend to deal with bitterness in the abstract. Paul doesn't want us to deal with it in the abstract. It is every specific bitterness against specific people that we are to put off. Bitterness is only toward people — not things or events. It is a condition of the heart that has people as its object.\n\nSo why do so many of us struggle with bitterness, anger, clamor, wrath, and evil speaking? And why must all these things be put away?\n\nLet me work through each in verse 31:\n\n**Bitterness** — according to William Hendriksen, it is \"the disposition of the person with a tongue sharp as an arrow and keen as a razor, who resents his neighbor and needles him, ever ready to fly off the handle with a reply that bites or stings.\" Bitterness is the carrying with us of wrongs committed against us that will usually come out in the form of anger toward the people around us — who may not even be the ones who sinned against us.\n\n**Wrath (rage)** — this would be the word we use today for road rage, spousal rage. It also carries the idea of a quick temper — flying off the handle — and must be put away and replaced with kindness.\n\n**Anger** — a spirit of being hostile toward things that God desires for our lives. Simple anger is always against God, because God is the one who ordains all that comes to pass. Anger will always call for retribution or revenge — and that has to be put away.\n\n**Clamoring/brawling** — having a contentious spirit; the contrarian who is always ready to argue and dispute. Also the explosive reaction of the person who has completely lost his temper and begins to yell at others.\n\n**Evil speaking/slander** — Paul uses the word blasphemy (blasphemia) here. We think of blasphemy only against God, but this is the idea of slandering people — defaming character or character assassination. And with all of this, **malice** — the attitude that wishes or does harm to others, including a refusal to forgive, and is allied to cynicism.\n\n## Why We Struggle: Forgiveness Is the Root\n\nThe sins of verse 31 come from a heart that either has not known forgiveness, or has not let what it means to be forgiven govern what they do. That is the answer to both questions: why we struggle with these sins, and why they must be put away.\n\nRemember the parable of the unforgiving servant (Matthew 18:21-34)? The man is forgiven a colossal debt — and then turns and throws a fellow servant into prison for a much smaller one. Compared to what God has done for His people, our forgiveness of others is nothing by comparison. That is something that has to govern our thinking as we relate to people.\n\nHaving been forgiven so much, should we not forgive as well? The motivation for putting away bitterness and replacing it with kindness is the forgiveness we have experienced from God.\n\n## What Must Be Put On\n\nWe put on kindness, compassion, and forgiveness — because we have been forgiven. Kindness is the opposite of malice. If malice is an evil inclination of the heart to hurt others, kindness seeks the good of others — the spirit-imparted goodness of heart.\n\nTo kindness, Paul here adds **compassion** (tenderness of heart). Compassion is not only a deeper awareness of the needs of others but also a desire to do something to relieve them. You cannot be compassionate if you do not see people. If you do not know what is going on in people's lives, you cannot be compassionate at all.\n\nA compassionate person will freely forgive, because they know how much they have been forgiven by God.\n\nSo the Holy Spirit exhorts us to live according to our identity in Jesus Christ. To put off bitterness and the other things and to put on kindness. He is not telling us to do something contrary to who we are — because we have been changed. He is telling us to act according to the grace of God that He has placed in our hearts.\n\n## The Gospel Never Stops\n\nDo you see how much of living life is based on the free gospel of Jesus Christ? The gospel is not something that we begin with and then move on to something else. It is something that we continue to press deeper and further into — because it is that forgiveness in Christ that propels us to forgive others. It is that forgiveness in Christ that propels us to be kind and compassionate to others.\n\nWe are not just saved by faith in Christ, then sanctified by something else. It is still the grace of God. Sanctification is a work of God's free grace. We move further and further into the gospel.\n\nPaul exhorts us through the Spirit: put away bitterness and all the things that go with it, and put on kindness — because that is what Christ has made you to be: a kind people.\n\nFather, thank you that you are good, thank you that you are kind and compassionate. Help us to exhibit those attributes in our lives as we follow the Lord Jesus Christ, who is kindness Himself. In Jesus' name. Amen."};
